荒冢水邊村髠奴識寶氣神劔辭泉閽千載有遺恨一抔空斷魂青苗曽抗疏高義動乾坤黃景昉字太稚晉江人贈陸嗣端年丈時以水部郎小謫經年監厰獨賢勞玉勒珠弓金錯刀如汝火繩猶見謫是誰錦瑟更能操薊門戈甲連遵永麟閣丹青想鄂褒仍送封書留御榻主恩終念漢功曹朱應祥華亭人麟溪道中一川流水半村花舊屋南鄰是釣家長記歸篷載春釀雲籠殘照雨鳴沙弔梅道人墓梅老清風不可招橡林寒雨日蕭蕭武塘一曲烟霏外山寺鐘聲落暮潮淡滄涇湖上微風蕩水開鳥聲飛過釣魚臺暖雲欲作桃花雨一片輕隂栁外來附考涇在嘉善斜塘漫漫村塘水沒沙清明初過已無花春寒欲雨歸心急懶駐扁舟問酒家潘暘升原名湛烏程人啓禎時比部郎鴛湖七首花發名園酒滿巵錦韉爭逐是春時小庭碧影鋪清晝留得香雲出院遲細細香生賸可擕碧窗垂露影參差相思鎮日憑誰見和雨和烟傍一枝上二首隱所見姓氏秋滿晴空月正圓隔湖聼唱小遊仙不因蘋際微風起那得清音到畫船平波㶑灧羡雙鷗草借晴光緑滿洲花事又殘人未到一時憑遍畫山樓望望蒹葭擁去艭愁分寒影渡楓江無端想起芙蓉衩繡出鴛鴦七十雙種成修竹待棲鸞三五東生月影團重到歌樓看寂寂蘼蕪深映碧窗寒五色雲開寶鏡升繁華舊日轉難憑桃花慣逐春流水何事漁郎認武陵劉繩之字永思慈溪人居畫閣次秋潭韻卜築微分小徑隂山花落果駭飛禽曽聞野鶴如人瘦自覺冥鴻得趣深一簇烟雲供逺眺數聲雞犬隔疏林此地由來可乘興何時拋卷足幽尋附考閣在鶴洲草堂之東胡應麟字元瑞蘭溪人孝廉登烟雨樓寄沈純父夾岸春波漾緑蘋千家曙色照垂綸獨為烟雨樓中客遙憶昆明殿裏臣九塞兵車閒仗鉞五陵冠蓋避埋輪應知屠狗風塵下大有華陽擊筑人陳鶴會稽人發武塘吳天日暮海雲低白水孤帆思欲迷惟有愁心似明月今宵先度武塘西瓶山平山高閣帶疏星醉倚瑟琶倒玉瓶落日未回青雀舫行雲先渡白牛涇張岐興濟人官憲副資聖寺重光井石井荒涼古寺邊偶因鑿翠得甘泉斷碑剝落埋衰草猶記將軍捨宅年陳塤江隂人弔梅道人墓見說梅花舊有庵清風遺落滿江南茶烟散雨經春幾橡樹連雲合抱三玉骨巳隨和尚化𤣥關不放俗人參我來欲為彈流水今古同心照此潭周相吳江人汾湖舟次懷友仙槎微放汾湖曲新洗匏尊避俗喧梁月幾回驚倒屣秋風何處迓行軒臨溪倚杖隨流水落日懷人檢贈言漫興肯虛真率會不妨促膝慰寒暄張𢎞至華亭人官給事中瓶山瓶山山房小有山陽溪流水送聲潺傾瓶不盡相留意離思滿天風色寒李恕過張文穆公墓嵯峨荒土亂堆雲傳是前朝學士墳泉石清標存别業風流豪思見遺文竹雞帶雨啼春草石獸和烟卧夕曛縱有枇杷生滿樹何人載酒弔吟魂附考墓在崇德治西北十七里陳子龍字卧子青浦人官兵科給事高寓公書來詢豫近况余適從石齊先生築講壇於大滌山留連竟日遂書此報之三山迷漢使更起白雲壇環珮天風滿旌旗海日殘草侵羣帝靜月度九霄寒惆悵乘鸞者焚香獨夜闌陸應陽華亭人題水月閣舞堤搖曳木蘭舟月色歌聲半入樓我亦有情消不盡一瓢春酒為君留附考在嘉興南湖烟雨樓側周升走馬岡數里長岡似掌平將軍戰騎昔曽經至今原上青青草猶帶英雄汗血腥附考在桐鄉相傳吳王宿兵於此沈艾登史山考見前殳山東畔小芙容秀拔諸峰數萬重安得身閒陪老衲看雲終日倚孤笻趙宦光字凡夫蘇州人題鶴洲圖二首一片亭前雪何如萬壑雲開籠須逺適寧復溷雞羣别墅背山開門臨緑水來夜深村犬吠小艇賣樵回附考鶴洲在嘉興縣南三里唐裴休放鶴處今為朱太守子葵園林汪明際字無際吳縣人都門閲鶴洲圖題贈九臯方唳徹邀響在圓沙松際影新出月光疑舊斜平居煩接翮石室可棲霞逺意同閒賞何勞問歲華沈友儒海寧人官員外殳仙石不須問道向崆峒煮汞丹成似葛翁一旦紅顔生羽翮千年華表語遼東荒臺此日迷蒼蘚蛻骨何時瘞碧叢安得餐餘吞一粒會能乘鶴上遙空無名氏烏夜村荒村烏夜栖忽繞月明啼生得東家女身為萬乘妻至今種高樹不遣烏飛去居人凡幾家愛聽啼啞啞啼啞啞忽驚怪婦開門向烏拜附考村在海鹽縣南三里晉何凖寓居一夕羣烏啼噪乃生女後選入宫今有何后冢釋德祥字止庵錢塘人洪武時僧周元初禱雨詩蘇臺羽仙餐玉霞鶴年松骨輕如花晝騎金背之神蟇奉持緑章扣天家請陳旱魃為妖邪惔焚原隰疑燒畬草葉焦卷鑠石沙大田秋稼縮不芽忽聞赤子聲嗟嗟帝呼將吏乘黑騧驅逐電雨鞭雷車𤣥雲著地手可拏雨腳不斷紛如麻來蘇百物活魚蝦博哉隂功上相嘉濟濟多士稱欒巴羽仙不以名為夸飄然鳬舄辭京華冶城仙子邀相遮拍肩挹袂爭喧譁憶著安期棗似瓜招呼不上松風槎釋觀白周元初詩仙姿寒湛玉壺氷斬叱羣魔走百靈萬里風雲生赤日九天雷電下青冥瑶壇鶴唳秋如水蕙帳人幽月滿庭安得相從過衡嶽飛行同躡鳯凰翎席應珍字心齊海虞人洪武中道士來鶴詩瑶壇法黎土簫臺聳岧嶤縹眇白玉京空歌協雲韶靈駕御八景多士嚴趨朝琅風揚清微天花雨層霄皎皎羣胎仙嘯歌雜雲璈前參紫霞蓋後繞青霓旄覽兹孝子誠赴此仙人招阿母錬魂仙高超謝塵囂控駕不待轡飛飛凌泬㵳置身王母宫坐看石劫消贈周元初春晴步屧黃泥坂楊栁隂隂水拍城童子候人如鶴瘦羽仙飛舄似鳬輕碧桃花繞巢雲屋緑酒香浮貯月罌醉裏却嫌天下窄倚䦨吹笛到天明釋洪恩宿天寧寺基陛稽前代浮圖想舊標風鈴天外語法鼓海門潮衣鉢猶傳奉津梁未寂寥假令吾道在斯地豈蕭條附考寺在海鹽城西三里舊名禪悅院宋宣和二年為天寧永祚禪寺內有海月樓釋普莊卧雲軒為嘉禾大機禪師作卧雲軒中人塵事不能到心與雲俱閒看雲聊寄傲雲之從龍自可期達人應世當有時乃知舒卷本無跡六合茫茫隨所適殷勤為告卧雲人雲中有路須致身大地蒼生望霖雨胡為久卧南湖濱釋圓信字雪嶠寧波人早秋過朱子葵太守鶴洲草堂對雨分韻得飛字方花礎潤晚涼歸隔浦蓮舟望漸稀林下自聞秋葉雨燈前亦有草蟲飛巡檐半濕黃藤杖倚檻重添白苧衣明發霅溪新水下前村應沒舊漁磯徐小淑吳縣人范允臨妻有絡緯集烟雨樓麥隴春殘曲徑幽長堤疏栁繫扁舟香鈎玉鯉芳洲月岸隔花烟在一樓范壼貞字蓉裳吳縣人嫁吳氏烟雨樓圖烟嵐無限雨中情逺近樓臺一望平吳苑草荒麋鹿走越江春盡鷓鴣鳴長隄栁樹迷春渚白水菰茭繞郡城最是晚來新月下萬家燈火隔湖明吳山字巖子當塗閨秀適卞琳禾水道中春早猶寒草未齊落梅村墅鵓鳩啼虎林烟月勞清夢秀水雲山入品題竹岸人家門巷靜桑園風景夕陽低小橋漁艇閒來往何處花源更有溪湯淑英字畹素蘇州吳嘯雯配烟雨樓樓空靣靣緑波平向晚輕舠試一停隔岸烟生天際月敗蘆漁火幾星星檇李詩繫卷四十
