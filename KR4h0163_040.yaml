body:
  text: 檇李詩繫卷四十平湖沈季友編明羅洪先字達夫吉水人官贊善題天寧寺塵外樓和唐荆川韻高閣春殘始一登忽忘去住似遊僧齊鐘已罷鳥初下江雨欲來雲自蒸笑指風幡看動息屢從火宅試飛騰年來漸解無生法誰信生前也試曽唐順之字荆川武進人官都御史題天寧寺塵外樓閒裏香臺盡日登默然一笑又逢僧衣裁野薜緇塵淨飯試山精石鼎蒸大士西方談實相仙人東海說飛騰人間多少亡羊路一一行來也未曽題趙漸齊序芳園為耽泉石謝塵纓散髮扁舟羡獨行數畝荒廬堪自老滿川鳬鷺欲相迎已知野叟無機事不向漁翁說姓名余亦洞庭洲畔客因君轉切故鄉情王守仁字伯安餘姚人官尚書封新建伯從海日公授徒資聖寺登杏花樓賦東風日日杏花開春雪多情故換胎素質翻疑同苦李淡粧新解學寒梅心成鐡石還誰賦凍合青枝亦任猜迷却晚來沽酒處午橋真訝灞橋回附考寺在海鹽治西五十步本晉右將軍戴威宅井中發五色光捨為寺海中行舟望此塔為標的中有杏花樓云遊金粟寺金粟峰頭縱逺觀山林不動萬松寒飛崖㵼碧雨初歇古澗流紅春欲闌佛地移來龍窟小僧房高借鶴巢寬飄然便覺離塵土一笑天風振羽翰贈芳上人歸三塔秀水西頭久閉關偶然飛錫出塵寰調心亦復聊同俗習定由來不在山秋晚菱歌湖水濶月明清磬塔窗閒毗盧好是嵩山笠天際仍隨日影還寓海鹽資聖禪房落日平堤海氣黃短亭衰栁艤孤航魚帆入市乘潮晚鼓角收城返棹忙人世道緣逢郡博客途歸夢借僧房一年幾度頻留此他日重來似故鄉石門晚泊風雨石門晚停舟問舊遊烟花春欲盡惆悵逺溪頭方豪字棠陵東陽人正德時官副使鴛鴦湖鴛鴦湖邊落日明荷花十里櫂歌清丈人自折碧筒飲醉看秦塘海月生任洛字仲伊鈞州人正德時桐鄉令過祥符蕩碧樹雲林隱驛樓新題舊咏姓名留停舟莫向斜陽裏楊栁烟蕪綰客愁吕屛太倉人正德時以貢授嘉善學訓皂林古驛萬頃祥符蕩今朝載酒過日熏人易醉風靜水無波客路爭搖槳漁舟漫曬蓑到家明月上舞袖正婆娑附考在嘉善北二十餘里受雙葑南尤北尤並甓溪諸水達青浦界泛文水漾芳塘緑漲潑蒲萄花壓重樓栁染袍水護溪橋三四里太平村市出英髦附考漾在嘉善斜塘鎮後有泉縈回清徹不滓土人取以釀酒丁旭有記謝家橋菜花零落麥初黃栁絮東風燕子忙橋下巳無王謝宅年年猶自集空梁附考橋在嘉善永安卿田汝成字叔禾錢塘人嘉靖間官參議嘉興晚發别陳子常江南春盡落花天桑柘籠烟水滿田野店酒香新雨後斷橋人渡夕陽邊羈懷瀟灑惟歌嘯世路﨑嶇只醉眠傾蓋逢君成坐久片帆乘月下吳川蔡汝楠字子木德清人嘉靖間官侍郎烏戍唐氏林亭訪舊烏溪畔空林别戍間鑿池通暗水移石壘高山微雨秋雲後疏花夕照間平生愛幽寂于此欲忘還史朝宜福建人浙江布政同沈兵憲狄參戎登嘉善西城玩月霜天步凉月清影上樓白邀歡命儔侣金杯當皓魄舉袖翻露滋引商入雲逖萬室烟火收四顧天寂歷樓高參正中境峭思方益人生良宴㑹三五不常獲偶愜方成歡貪趨寧為適平時所經遊俯仰成今昔氣緣覽眺高情由拘攣側參軍美情性沈侯固逺識酒至每自斟興來呼五塞而豫不解飲強半聊自力即事真堪咋拍肩比莫逆火明樓下山賓散湖上鷁今夕雖同遊明朝各異即不作久流連因以長相憶沈奎江隂人隆慶時為嘉湖兵備和史大參朝發西水濱夕登城上樓慿樓望行客落日明長洲天際征哀雁雲邊急歸舟相擕得高侣呼尊成宴遊滄海放孤月桂滿清光浮良暏豈前期嘉賓信難求露下忘嚴寒城隅行且謳慮淡勢自輕心交意終投此夕是何夕張筵為誰留中夜忍分袂城戍傳更籌不寐憶清勝翻疑夢初收人生貴適意一遣遺百憂劉鳯字子威長洲人官御史晚行石門鎮望西湖寄杭州太守乘興逺遊無定期舟行常及暝鐘時河平兩岸月初上溪到石門帆自遲春來花鳥宜晴日湖上風烟有夢思為報使君多勝事酒深蘭棹更堪移陳良猷字廷弼晉江人相鄉教諭殳山仙蛻金鼎三年大藥成等閒騎鶴上蓬瀛惟餘舊日栖真地一壑松隂月自明陳潤嘉定人桐鄉訓導石門故壘古塞千年尚有基斷碑殘石草離離風烟不散英雄氣猶似吳兵百戰時嚴嵩字介溪分宜人官宰相有鈐山堂集泛鴛鴦湖樓閣開煙霧汀洲似畫圖城隂度䆗窱天影入虛無岸逈傳清吹波深洗玉壺兹辰春日好留興在鴛湖三塔寺留別子謙徐使君年丈三塔移舟望若仙穹林翠壑俯江烟鶯花對酒春城麗鐘梵登樓海日先世路無端頻送客空門不礙擬逃禪與君更是燕吳别衝雨開帆各惘然徐階號存齊華亭人官宰相題趙漸齊序芳園一竿東去意何如蘭芷鷗鳬共隱居晦迹久焚封事草遣閒聊注攝生書鶴歸世重林逋宅龍卧人方諸葛廬我病正牽泉石念從君端欲謝簮裾王問字裕夫無錫人官僉事有仲山集嘉禾西津驛簡錢滌齊萬里真成汗漫遊東來猶為故人留天光映水潮初靜花氣逢春暖未收郢國江聲先入夢西津草色暫登樓已將身世同虛幻獨自開簾見白鷗附考西水驛在郡阜成門外李攀龍字于鱗歷城人嘉靖時官按察使有滄溟集烟雨樓南湖迢遞俯丹梯烟雨蕭條拂檻低越徼層隂千里合吳門春樹萬家迷江流欲動帆檣外山色遙分睥睨西一自不齊多暇日新詩還與醉同題王世貞字元美太倉人官太僕卿有弇州集莫大參招飲天寧寺東風依步屧愛此禪房幽一雨忽秋色諸天來暝愁鳥隨托鉢下僧逐鳴鐘投尚有三車喻能同信宿留項女操君是歧路人女是父母身父母業已許那能不屬君君今既玉折女豈獨瓦全生當愧白日死當快黃泉丹旐從東去素旐從西來兩旐東西合纒綿不得開黃檗化為松那知苦中久十六項家女千年周家婦君靣女不知女心君應得不似郤家兒倉舒渾未識團欒女貞樹煜若銀河洗不似韓憑木將情作連理伯夷豈殷民為殷表君臣首陽一抔土萬古稱其仁我欲竟此曲此曲悲且長結為金與石融為氷與霜附考項貞女許配吳江周應祁未婚夫死自縊年十九海鹽石堤觀日出日者萬物母海為百谷王兩雄未蕩摩衆有皆摧藏天雞警霄發波臣道余望窮紘露黝紫極際見青蒼回首顧中原破睫猶茫茫倐忽金輪升流光浴扶桑一髮界灙漭萬鬛競縱橫湛湛天酒晞曄曄雲旗張波將駭駿上猋與蹻龍翔無復虞濛泛陽德熾方昌弔馬將軍一代馬新息英風颯至今能將裹革事了却據鞍心樂府歌都護孤兒備羽林清源務持重不愛肘間金附考馬呈圖海鹽指揮好古能詩有儒將風嘉靖間倭冦海上自青村犯白馬廟被創而死子繼武擒倭剖心祭父吳國倫字明卿湖廣人祖籍嘉興嘉靖中進士有甔甀洞稿途中得吳中望書有感祖墓在嘉興闕下仙班夢未回白頭相望逺登臺馬經芒部山烟過雁帶昆明瘴雨來萬里論心天咫尺百年懷土日徘徊離離高冢虹橋畔猶是延陵王氣開嘉禾道中津亭落日繫蘭橈檇李城臨海國遙百里魚鹽長水市萬家煙雨瑞虹橋青樓越女歌相屬白苧吳兒舞自嬌最是江南佳麗地可憐機杼日蕭條蘇小小墓我裁錦繡段郎灑薔薇水一顧兩相當持為合歡被徐渭字文長山隂人桐鄉馮母詩二首三遷近俎苦霜時一尺殊恩湛露垂自古男兒嬰臼少誰家嫠婦帝王知高齊客飯寧辭髮落葉寒機幾斷絲見說仙郎栖海曲更無魚鮓到塘西青史他年定幾行太夫人傳在中央不須竊藥居明月自解將心結暗霜片匣逺飛鸞字重卑雌親刷鳯毛長羅敷雖老擕筐在付與吳姬出採桑附考濮鎮張氏馮倫妻也年二十九夫死課子馮孜登進士詔旌之王稚登字百穀長洲人嘉隆間太學夜泊嘉禾此邦名檇李異代産嘉禾煮海嚴刁斗栽桑富綺羅魚舟歸市盡雁塔出城多百里分吳越鄉心奈客何嘉興夜泊樓船旗鼓舊征夷檇李城邊屢出師河繞戰場俱是箭雨當蠶月盡如絲寶刀亂後條桑用白馬功成負米騎來泊闔閭軍敗處越人猶自笑吳兒檇李橋步月澤國菰蘆色星橋檇李名亂楓丹染寺高栁碧縈城月白虹霓卧天寒駟馬行越姬歌並起一半採蓮聲附考橋在嘉興治東五十里入平湖界平望夜泊四首魚鱗成石量桑葉論斤賣珍重絲網難家家月中曬雨多楊梅爛青筐滿山市兒女當夕餐嫣然口唇紫月下壓酒聲將船繫楊栁明日到家近不須沽一斗店傍栽紫薇顔色鬭江霞我家庭下樹歸日正開花石門曲三首採桑復採桑蠶長桑葉齊妾住石門東郎住石門西蠶成桑葉空門前青苧長一半織郎衣一半結魚網賣絲家復貧哭解紅羅襦將絲繫妾淚可得作明珠莫如忠字子良華亭人嘉靖問官布政嘉禾三塔三塔倚霄半凌兢躡紫烟分標倚净土列搆指諸天一一呈金粟亭亭間白蓮光遙龍藏日劫數雁王年珠栱慈雲合雕楹法雨懸攀危超上界眺逈鏡迷川舍利存仍幻浮屠起亦緣我心元不二證取一燈然申時行字瑶泉蘇州人官宰相登烟雨樓湖心傑閣敞雲扉雙屐凌高一振衣雨外菰蒲青黯黯烟中楊栁緑依依平沙水漫魚爭躍逺浦天長鳥倦飛恍惚瀟湘看暮景憑軒徙倚欲忘歸皇甫汸字子循長洲人官雲南僉事秦駐山萬乘留秦蹕千秋望越山水從溟海外雲自㑹稽間草樹回窮髮魚龍候駐顔不知徐市去靈藥幾時還王叔承字承父吳江人入越觀潮同陳濟之諸子石門雨宿孤帆下石門旅宿暗秋原兩岸蘆荻雨幾家桑柘村酒堪今夕醉心與故人論此去錢塘近江潮引客魂潘梅廣州人嘉靖間官郎中秦駐山提封猶禹甸望海自秦山萬樹花爭發孤雲鳥共還方隅從眺覽磴道足躋攀擬叩金銀闕丹砂少駐顔趙桓字雲川烏鎮人冇感古集興懷樓秀溪橋東溪水流朱甍畫檻溪上樓樓中羽客紫霞服每攜好客閒登遊開懷眺景豁心目逺近溪山畫圖幅西來百箇芙容青東來一曲葡萄緑春烟里巷桑麻村桃花小橋修竹門日紅鳯鳴縣堂曉雲黑龍翔山寺昏窗屏寂寂絶人語白鶴如賓松似主夜可彈琴晝可棋冬宜白雪夏宜雨我因客路停孤篷羽人别久今欣逢焚香瀹茗語終日雍雍兩耳絃歌風羽人告我登樓士半是壺觴半文史惟有任侯戀闕心紅雲北望三千里附考在桐鄉縣陳履字德基東莞人隆慶時崇德令春日邀彥吉集烟雨樓漫賦秀州城南烟水多當年此地頻經過同遊俱是高陽侣臨風呼酒還悲歌湖上高樓鎖烟雨歲久荒凉巳非故周遭雨浦只菰蒲來往烟汀但鷗鷺此時遊客皆大驚一方勝槩徒有名酒酣倚劒湖天暮唏噓感嘆空含情不堪歲月隨流水世路萍蹤渺難擬鏡裏星霜十二秋眼中烟水三千里今日重來覓舊遊更邀詞客同登樓雕窗洞豁霞光入綺檻交疏翠色浮翠色霞光紛不了詞客憑虛騁吟眺豪懷勃勃薄晴霄共倚春風發長嘯人間世事多乘除向時感慨今歡娛與君且進杯中物風光此後知何如鄧原嶽字汝高福建人官副使元夕宴烟雨樓蕭蕭宿莽曖空洲傑閣平臨湖水頭火樹正當春夕永星橋還帶暮雲流疏鐘月落僧歸院平墅風高客倚樓此地相逢判一醉良宵樽俎暫淹留曹代蕭河南人萬厯中郡守次前韻烟霧霏霏漾逺洲仙郎青雀到溪頭尊前燈火紛紛下檻外湖光靣靣流雪霽春山誰泛棹月明晚渚共登樓年年樂事堪稱賞肯令東風不暫留趙世顯字仁甫福建人萬厯初嘉善學訓題任氏貞節卷自苦氷霜操那知歲月深塵埋千里鏡腸斷五絃琴亹亹丸熊意悽悽化石心共姜嗟已矣攬卷一沾襟附考嘉善顧闉妻任氏有奇節三十餘年袁宏道字中郎公安人萬厯間官稽勳郎中嘉興道上古寺金盡沙為地竹苦水過籬龍池蛙帶子佛頂雀銜兒古迹錢王是殘經宋代疑道旁龜剝落草裏卧豐碑嘉