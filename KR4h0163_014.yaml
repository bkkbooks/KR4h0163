body:
  text: 檇李詩繫卷十四平湖沈季友編明沈繼山先生思孝思孝字純父號繼山嘉與人隆慶戊辰進士神廟初為刑部主事疏論江陵奪情杖八十戌廣東神電衛踉蹌萬里徒步行亂山深樹間就獠族寄食比至劉撫令囚致之思孝乃仗劒往至恩平謂縣令毛鳯彩曰撫軍年已望八班在六卿欲殺罪人取媚權相故來赴死耳但不知若何靣目見天下士大夫毛與劉皆楚人見思孝意不善遂欵之馳書止劉蔡觀察文範作仗劒行指此也江陵沒賜歸晉尚寶丞歷遷府尹思孝感上恩益發舒無少顧忌浸失當事意調南太僕卿時御史房寰以私憾詆海忠介有三進士上書直忠介俱罷去思孝疏救有旨切責乃嘆曰時事如此不去將自及遂拂衣歸久之起右僉都出撫陜西寧夏難作思孝躬擐甲胄出窮塞轉餉濟師而為督臣所擠移河南不赴尋召為大理卿論殺內官郝金後晉工部侍郎右都御史兼兵部侍郎疏減羊絨及止盔甲之請省金錢無算日夲封貢議起上疏力爭不得乞歸家居蕭然築繡野莊以老天啓初贈太子少保著有行戌郊居西征陸沉漫稿溪山堂吾美堂等集其詩格調幽疏聲文華潔長於近體使先生不以功名顯猶當獨立詞場孤遊藝圃况矯矯者耶求諸文行之途可謂全人矣調撫中州上疏乞休作優詔及潛夫秋風病未蘇雨荒深院菊霜落半庭梧豈合中諸嶽唯應長五湖天王自明聖休咎肻容無同叔祥宿雲山上人禪院可是津梁倦祗林共息機講師名寶月賦客字玄暉香積分齋飯泉堂施浴衣苦吟眠未穩松月夜鐘微冬日遊虎丘侵曉入蕭寺寒山霧裏登鏡殘香塜月劒合碧池氷野飯新辭祿禪衣舊賜繒回頭看悟石遙憶六朝僧秋夜劉玄子過飲時玄子還自遼左西堂秋氣清上客過劉生共把鵝黃酒高談鴨緑兵三邊來燧色萬井急砧聲持贈唯雄劒燈前風雨鳴夏過能仁寺秀雲禪房考見題咏宣公祠精舍石橋東停舟訪逺公諸天初見月大地旋生風火乞紅蓮裏香聞緑桂中更憐功德水能洗俗塵空九日在告與叔祥小飲何處不登臺門扄一徑苔官貧黃菊少客好緑尊開寒色衣初授陽春曲並裁科頭松下坐遮莫朔風來送戴給諌謫戌嶺南倉皇出禁垣時事不堪論得罪緣宗社全生是主恩猿聲雲外戌椰葉海邊村獨喜扶桑近光生照覆盆贈殷方叔徴士居然大布衣所貴在知希卧雪非中聖占星是少微兒驅晴犢出婦摘晚菘歸除却催詩債誰敲白板扉夏日過皋兒别業衡門盡日間野趣獨相關池割湖南雨雲封海上山田家㩦酒過江燕喜人還寂寞幽源裏居然銷夏灣秋日間居堠火照西州專征白露秋蓬婆城不閉羅鬼戍還留轉餉盤江惡徴兵蜀道愁銅標誰更勒空憶武鄉侯李季常過訪息駕在雲林多君逺見尋狂將郢中唱調入廣陵琴聽雨嫌宵短憐秋坐竹深當杯莫言返天地幾知音喻邦相同羡長集恕醉軒白雲邀上客黃葉繞貧居缸面沽來酒槎頭膾得魚山川連越絶雞犬類秦餘一日千秋意相看老不疏京邸懷緑蘿莊笑我遊燕似客卿五湖三畝獨鍾情種魚可有千頭美養鶴將無六翮成池上墨花沉夜雨簾前帶草自春晴明朝定乞初衣去肻使山靈謝姓名行邊青春蹀躞紫驊騮又見邊城葉作秋橫槊漫題鸚鵡賦登壇猶著鷫鸘裘尊前八陳生風雨腰下雙鉤燭斗牛翻笑故人稱燕頷自來無意覔封候趙張二閣老以書勉慰故云漫興凄凄涼雨醉初醒草長間門晝亦扄但使拂衣辭鵲印不妨胠篋有鵝經時鄒給事劾豫以千金市右軍真迹病來鬢向愁中白興盡山從夢裏青漫道主恩歸未得東吳已著少微星立秋萬里秋生督亢亭暮蟬寒葉豈堪聽愁來自厭屠龍技老去誰憐相馬經塞上風煙高太白雨中山色落空青銜杯漫遣蕭條意不謂人間忌獨醒胡元瑞將歸蘭溪以詩言别作此留之蕭蕭黃葉度寒窗萬里歸心繫短艭聖代終須收竹箭故人何必卧桐江將雛且聽房中曲泛蟻還傾燭下缸傳語五陵諸俠少好容文苑樹麾幢有所聞虗傳物色動燕州愧我浮名已白頭馬角生來殊感晚蛾眉妬後不禁秋帷中運䇿惟三相塞外橫戈有列侯曛曉便㩦雙槳去桃花深處覓漁舟送黃履常赴楚任桃花紅露桞枝黃相送河橋緑滿觴北極久占卿士月南天暫借使君霜帆前雁呌過彭蠡江上魚肥到武昌况是古來春雪地和歌知爾興偏長答寄張明成閣老當年心共繫安危一别滄桑未可知龍劒夜占南斗近鴻書寒下朔風遲黃茅應變還丹日黑髮仍留去國時底事先憂消不得並垂清淚濕江蘺立秋刀尺新裁白苧輕寂寥山館早涼生雲窺林外雙鴻影蟲識階前落葉聲九塞羽書初告急六宫紈扇幾含情總知秋色江湖好為買鱸魚壓酒鐺六十初度煙雲滿眼足憑闌殊勝風波行路難名士已裁生志就野人猶索諫書看飯炊香稻分雲白盤出青菘帶雨寒神武近應無客到相逢多詠鶡為冠寄懷史奉常松雲秪隔五湖流湖畔年年憶舊遊病懶我曾無雁字時清君亦愛羊裘縱憐玉女潭邊月史有園在玉女潭側應念金人掌上秋見説追鋒方四出林中猿鶴漫相留座上初見周文因懷辛謙之乾雀雙雙繞樹喧七香車忽到間園調歌自薄鴛文錦得意誰誇犢鼻褌籬外花開酣白墮天涯葉落怨黃昏憐新怪底偏懷舊銀燭燒來見淚䀶初夏雨中卧病有懷朱心園空林雨氣未全收枕簟涼生半似秋艾以三年成立骨蓬知一月不梳頭臨風輕顫荷珠落坐石徐看竹粉抽漫道長桑元客舍故教盲豎尚淹留秋日繡野莊即事萬竿清玉小窗西鼓枻來看日欲低當下開簾驅野馬可中分食施山雞碧梧葉墜仍三徑香稻花垂定幾畦客有求羊誰復至獨留明月伴幽棲訪王百榖賦贈春風載槖到詞壇旗鼓知君意未闌酒緑且留狂客飲花嬌任擁細君看臨將舊草名鵝帖著得新篇號鶡冠翠竹倚窗添幾個蕭蕭長護白雲寒吳江道中同叔祥釋凡可片席斜飛趂夕陽一尊相共答滄浪人間只合尋鷗侣僧好何須識雁王簾外樹低江市月盤中橘冷洞庭霜計程堪作平原飲欲向青簾典鷫鸘哭徐子與先生寂寞摛玄尚有亭蕭蕭拱木若為聽青蘿自合依山鬼下箬真疑墜酒星龍去儘埋豐獄劒鶴歸須唼太湖萍不堪門户風流逺淚灑斜陽石上銘吳興城南即事翻然載槖傍孤城一笑高天雙眼明刺史洲空白蘋老尚書社冷碧苔生地偏不獨堪棲隱時難空聞好避兵最是峴山朝暮見可容題却寓公名李尚寶樂樂字彥和號臨川桐鄉青鎮人隆慶戊辰進士由縣令拜禮科給事終尚寶卿所至以清直稱有見聞雜記烏青志長林石徑在密印寺內散躅探幽幾度來徑開如矢淨無埃年年溪上春歸後千樹隂濃覆石苔鍾郎中庚陽庚陽字長卿號西星秀水人隆慶戊辰進士官刑部郎有焚餘草真州守風嶽水部石帆移酌舟中同是飄零客江濆載酒過潮生秋氣早樹帶夕陽多鳩拙方棲棘鴻冥豈受羅相看此風色不飲夜如何周學博雲石雲石失名嘉興人隆慶間揚州學博有泮鳴集送彭主簿去官還重慶曉促征夫設去輪西風撲刺馬頭塵拊膺白日誰知我仰面青山不顧人巫峽天低雲氣黯楚江潮淺石䀶新到家松菊開三徑竹杖芒鞋别有春馬參政千乘千乘字國良號映臺平湖人隆慶戊辰進士授分宜令歷升廣東僉事羅䧛山多盜會兵平之晉四川參議復遷廣東按察黎叛泛海諭降黎泣拜曰此昔平羅䧛使君也兄文學千里亦有盛名題湖亭此亭堪極目蕭瑟起幽思帆路行平水雲隂上釣絲九枝凝一碧連岫畫秋眉憑對曲闌霽涼風吹杖藜陸巡撫萬垓萬垓字無畦號仲鶴鼇之子隆慶戊辰進士由部郎出守蒼梧拊馴洞猺遣子就學尋遷雲南副使緬冦亂親冒矢石下兵隴川擒渠魁收叛卒聲震西南纍擢僉都御史巡撫江西築墟千頃積穀百萬兩賑大荒瓷運嵗輸回青費萬計垓力請以土青代之民困得蘇卒於官立祠章江之上李贄有詩哭之云二十年來但寄書草萍消息竟何如巨卿未解山陽恨垂老那堪䇿素車癸未春入覲南歸重過新嘉驛池亭有序丙子春余同李宏甫北上憩息此亭喜其佳勝命酌論心於今八年未嘗一日忘也今宏甫已挂冠髙隱而余復行役過之景物依然感念中惻賦此以紀所懷芳亭春曉憶曾來千古襟期向此開魯酒飲非河朔醉素心人是草玄才層軒秀色仍蒼檜四壁新詩半緑苔悵望冥鴻天萬里招尋空復意徘徊自永趨騰經打板箐渡潞江宿八灣地勢盤鬱炎瘴最深中間有磨盤風洞高梨岡分水嶺蒲蠻哨五十三參皆危崖峻坂猿啼鳥語之處平生所未嘗見者用韻漫咏石盤風洞幾高低箐惡蒲蠻雜漢夷轉餉坐看民力盡何時銷甲尉陀西胡龍巖其久其久字懋敬崇德人隆慶丁卯舉人官龍巖令和蔡使君登尊經閣高閣春雲滿追陪此眺臨關河千里色禮樂百年心樹指青山逺鶯啼緑桞深談經誰上席有道屬於今丁清惠公賔賔字禮原晚號改亭嘉善人隆慶辛未進士為句容令擢御史歷南大理太常鴻臚僉都提督操江凡九任轉北京工部侍郎尋晉南京工部尚書前後在留都三十年革債辨科減月糧之弊除上江二邑廂坊僉役之條濬浦口諸河以利涉廣京口外塢以通漕復鎮江石橋勒船禁以救溺疏丹陽朱巷濫泥河洪以溉田治南北四百里孔道甃石蔭榆桞以便行旅其居官實政大抵如此尤好行德於鄉老而彌篤年八十有八買小舟渡江謁孔林性儉朴卧榻無重茵下置一雞比曉聞即起卒贈太子太保諡清惠謁方正學先生祠花雨臺前石子岡孤墳松柏自蒼蒼從來灑淚成新土何必遊魂返故鄉山色一林俱積翠江流千古半斜陽欲知直道人心在祠廟于今信有光洪郎中蒸蒸字惟進號鸚洲平湖人隆慶辛未進士授陳州知州停解京俵馬三百餘匹又議處河北嵗𣲖驛費省數千金擢選部郎有來鶴軒稿子世基孝亷有文名錢塘懷古山靈曾見紫宸朝蔓草銅駝久寂寥崖海星沉王氣盡鼎湖龍去蹕聲遙英雄出塞魂猶壯臣妾和戎恨未消城郭不殊風物異六陵鴉樹送寒潮碧山學士黃洪憲洪憲字懋忠號葵陽自稱碧山學士秀水人隆慶丁卯解元辛未進士文名冠天下選庶吉士升編修奉使朝鮮止擕圖書數卷丁丑江陵以人望推憲分較禮闈欲屬其子憲堅避之歷庶子少詹事侍讀學士當憲初入翰林時為館課輒傾其曹前輩無敢雁行者性又嚴峻好直言遂為時忌萬厯戊子主順天試取王錫爵子衡為榜首李鴻又申時行壻也言者遂以攻憲下廷臣覆試文皆如格事乃白然憲遂自劾求斥慰留再四疏十上竟告疾歸著有皇明文憲朝鮮典志鑾坡制草學易詳説學詩多識碧山學士稿等書詩頗俊雅不多作其於文特精制藝神聖工巧合併為一評者謂其體凡三變初為渾灝踔厲之文嘉靖辛酉甲子間風氣冗弱先生與同里趙玉虹獨為古學救之以精練典則隆慶辛未後文體復振皆先生力也庚寅歸里文益簡淡高逺宦成之後嗜此不厭文成人爭購為竒寶逺方之士重繭而來及門數百人如會稽陶望齡晉陽王濬初華亭董其昌同郡朱國祚陳懿典馮夢楨陶鑄甚衆嘗曰此王制也即唐之詩宋之表也君子有從周之思切勿視為羔雁其持論如此同幻休上人登二祖庵遇雨迢遞青山暮崚嶒石磴斜孤雲生杖履細雨濕袈裟林靜時聞籜臺空欲散花何年謝塵鞅老此覓丹砂逹磨洞訪大鞋和尚舊是傳燈地今棲玄鶴羣千峰窺積雪一衲擁寒雲挂鉢餐朝露忘言對夕曛知君超浩劫永勿墮聲聞題鴛湖秋月圖澄湖明月浸樓臺一望波光萬頃開星轉銀河天外落風搖蘭槳靜中來蒹葭兩岸青楓合砧杵千門白雁催勝地總憐秋色裏幾人清夜踏歌回登十三山塞外岧嶤第一峰孤臣天畔寄萍蹤胡笳吹墮關山月漢壘隂銷瀚海烽巖樹晴光浮鸑鷲劔花秋老照芙蓉從來細桞軍威壯勒石銘勳在幾重過山海關長城古堞瞰滄瀛百二河山擁上京銀海仙槎來漢使玉關衰草戍秦兵星臨尾部雙龍合月照平沙萬馬鳴聞道邊陲烽燧息書生直欲勒燕銘郭按察子直子直字舜舉崇德人隆慶辛未進士官閩臬有三遊草歸後杜門掃迹招里中工詩者吳大今郡宋山人旭西林僧明曠諸生沈稚圭等為殳山社子張虗姪孟韜皆與焉方宋元時高人結社殳山姓名莫考至明初貝清江朱以貞輩繼其盛而舜舉復行之風流不墜矣小園扶疏草樹繞空亭隱几山光雨後青吏散鴉啼明月上一簾花影讀黃庭薛序班文炳文炳字有孚號鶴樓嘉興人隆慶間以資授鴻臚序班有調疴集鶴樓稿題鶴樓壁松閣茆簷夕照邊海山青列几闌前洞庭霜落柑如蜜泖澤秋深雀帶綿白酒且從今日醉黃花不改舊時妍不才性懶成孤癖才説為官便惘然沈太學如封如封字慰先一字是莊宏之子幼頴敏工詩尤精八分施青州埈范司成應期咸器重之隆慶間入太學不第歸而任誕放浪詩酒間好蓄古法書名畫通曉太乙六壬遁甲演禽諸九流家言構樓黃墩上眺陳山顔曰見山觴咏其中嘗言宋儒頭巾氣撲人國朝摹擬先秦文者鳥語耳著有見山樓集北遊稿吳中蠶法機婦吟婉孌機中婦燦爛機中錦將以獻天子願補日月袞豈道風塵黯顔色殘絲斷縑不成匹意氣空驚抱璞人獨把流黃暗中泣姚秀才舜漁舜漁字仲陽號玄澤兖次子隆萬間文學詩非所長特精禪理有西玄草訪秋潭上人不值豫亦逃禪者每來逄閉關不疑師避客但負我偷間乞食淹鄰曲經行過水灣暮禽歸欲盡佇久竟空還石門山人宋旭旭字初暘崇德人家石門號石門山人隆萬間布衣好學通內外典能詩善八分尤以丹青擅名于時層巒疊嶂邃壑幽林獨造神逸海內競購之年七十有八苕上諸名流招致繪白雀寺壁時稱妙絶與雲間莫廷韓同邑吕心文友善晚入殳山社所作偈頌多透脫生死語非區區一藝之士也卧雲樓與莫若江郭禮亭夜坐春隂天欲雪虛閣夜生寒竹葉探鉤盡梅花秉燭看風塵餘短劒時俗且高冠無限憂時意聞雞耻素餐賦得五峰秀色在郡城天寧寺前招提橫翠靄駢峙兩三尖仙掌高擎漢佛頭青映簾呪雲龍出鉢施食鳥窺簷示彼西來意優曇取次拈周珍珍嘉善人陳賢良祠仰公高節拜公祠舟艤風溪落日遲欲向白牛尋舊迹幾行蒼蘚蝕殘碑斗野山人郁敦易敦易自號斗野山人嘉善人父天民博學善詩文纂靖難盡心録敦易撰述頗多有言志稿陳賢良祠青苖新法世無何抗疏佳時志不磨廬阜峰巒曾眺覽星湖風浪幾經過碧梧翠竹荒丘寂野草寒煙落照多莫嘆山僧為伏臘裕陵無樹長新柯沈璋璋嘉善人過淨蓮庵不禁煩惱過僧房一靜從教萬慮忘白石有緣留我坐青山無語笑人忙間庭雨過藤花落古壁煙侵薜荔黃獨倚小窗凝望處目隨孤鳥送斜陽附考菴在嘉善西十里元創沈槃槃嘉善人過石井橋石井塘隈小市㕓步雲橋外蓼花鮮輕橈載月隨風渡乍送冥鴻過逺天附考橋在嘉善麟瑞鄉過硯池灣渚清沙白硯池灣唱晚漁舟罷釣還風致漫看元絶俗一林疏桞淡秋煙附考灣在嘉善麟瑞鄉姚秀才懋勳懋勳嘉善人胥山山小秋容淡登臨倍感傷挂袍人去逺磨劒石留光風露忠猶烈松濤怒未降蘆花明月上歸興咏滄浪沈嘉賔嘉賔嘉善人朱頂蝦月色平鋪映碧流孤村寂寞冷煙秋偏憐澤國長鬚侣也占朱衣一點頭附考嘉善祥符蕩中生此顧忱忱嘉善人六斜塘九里灣頭放棹行緑楊紅杏帶啼鶯望中咫尺西塘市我亦曾來有葛盟附考塘在嘉善西北五里金景西景西嘉興人唐莊清溪環抱碧村流莊上花明宿雨收壤接桑麻生意好家全雞犬臘時優林饒古木藏深屋岸覆垂楊繫短舟每到斜塘尋往迹故家文獻足風流風涇白牛塘上酒旗中南北長橋挂綵虹煙寺曉鐘蕉葉雨水樓晴檻楝花風衣冠文物名猶在舟楫魚鹽利尚通東望雲間酬二陸舉杯南向酹宣公破瓢道人吳孺子孺子字少君號玄鐡蘭溪人性高僻有腴田頃許盡易磽瘦鑿溝引山泉繞入玉雪厨銅池中曰如此庶不辱自親釜竈耳以此破家及妻子喪遍遊江湖所至率蕭寺及名流韻士家好採夀藤癭株為几杖槃盂尊壺罍洗之屬手自摩挲光澤可鑒客稍諦視輒不聽曰勿令為俗塵所觸嘗以數縑市一大瓢過荆溪盜碎之抱而泣者纍日王元美作破瓢道人歌有一緑蕚梅杖名紫玉又有一紅斑竹形製竒古皆三代物也按孺子遊屐半海內而吾郡尤數數往還始客於項氏戚氏或姚氏鍾氏梅溪李氏海鹽錢氏及釋戒襄處最久後終於梁溪答旅中兒僕本金華人少小親耒耜三十始讀書一命期強仕褊性命疏狂怪辭來哆侈一年復一年世事難料理面垢鼻無紋短髮披兩耳瓠落在江湖飢寒忍將死寄謝旅中兒無勞問歷履間來澤畔吟顧影還自喜夜深魍魎啼遙拜相依倚躡電樹兩幢促我不能止駕之驂白螭羣從來何愧下視塵寰中茫茫若螻蟻海上僦居僦居來海上又是一家村日落旋吹角天寒早閉門無勞遊子恨不盡主人恩更喜南簷敞衰年且負暄别錢懋榖幾月為歡在君家花滿溪酒奢泉不竭詩細草能齊别去情何恨重來路恐迷徘徊江上棹疑是武陵西寄王元美日暮歸鴉遍鄉心可奈何病隨新月長愁比落花多細雨亂階草微風起夕波西陵有嚴武不必淚懸河將歸溪上留别李將軍兼呈何太史説謊定推何太史相嘲無奈李將軍桃花細雨且歸去江上吹簫弄彩雲題畫玉露凌寒萬壑空洞庭秋水醉芙蓉小舟不放尋詩夢撑入村南卧晚風頑石老人陸光宙光宙字與常號巨石晚稱頑石老人平湖人比部伍塘子四嵗而孤遘家難匿車中走京師至武惠所十六補順天弟子員聞母訃南還一時飛甍連隰灰滅殆盡遂退處郊圃晚年超絶世好與宋初晹璩君瑕諸名輩友善每當初秋徂署以紫薑青豆破帽野航浮遊三泖間嘗泛震澤一白衣叟執紅梅造舟宙曰必佳客也載與酣飲作紅梅詩以别曾過嘉善觀幽瀾泉寺僧不為禮乃題一詩於壁云山僧不曉事客至莫呼茶羞殺瀾泉井青苔覆落花既去有一顯者見詩追迹之不得其托寄高曠若此崇禎巳已夢一道士持靖節小像索題諦視之即巳也題云在晉為淵明躬耕辭五斗昔以節自持今惟義自守千載復歸來春風吹五桞曾識白蓮人逺公是吾友翼日遂逝年八十六有鋤餘集贈友詩十五首送居士旭摩詰畫山水自言皆夙因焉知宋居士乃非金粟身融貫得妙理氣運奪鬼神堪與虎頭絶凡品何等倫覺路一以開頓悟超上乘璩山人之璞君瑕負竒氣才藝真絶倫天地總睥眤悠悠何足論胸次富丘壑落筆生風雲誰能賦鸚鵡令人羡禰衡沈丈人維鑘丈人名門子氣意挫不舒古道世寡合况復閭里兒珍庖宴佳客學仙愛樓居途窮愈睚眥日暮耽詩書陋巷樂不改太音知者希沈太學文猗矯矯沈公子薄榮負竒趣制作耻雷同含毫想天際開軒玩鍾王篝燈了章句彼美瑚璉姿終為廟堂器張烈士朗張卿任俠烈歌嘯吳市中不憚貴公子罵坐開心胸沾沾常自喜黃須炯方瞳書法亦遒徑吐竒或如虹軒然慕遐舉望之其遊龍王儒林彥淳孟還事筆研謀生亦何拙朝耕暮出門誰云耰不輟太宰自虛左一刺懷中滅洗硯拓黃庭夷然而不屑彈鋏歸來兮雙擁茂陵妾王五經滕王公祖道術飄飄儼神仙逺慕古蒼頡六書究精研篆隸法鐘鼎下筆能鉤玄靜知草木性察見鳶魚天嘆息兹人去入耳無微言方高士道成婺老故多資身著千金裘任俠獵聲譽盡散裝吳鈎易轍誦墳典上䇿不見收文章古作者詩些洪波流晚悟無生理身世同浮漚頽然一貧衲不易五諸侯胡先生順伯胡翁鄞中客余家三世交內行實耿介外易同兒曹吟詩貴真率為文喜不雕頭白老書記功名等鴻毛白蓮道人如本道人故緇髠墨名乃儒行遁迹鸚鵡洲觀空照心鏡禪悅每臨池作草銀鈎徑遊戲竹下吟林鳥久相應一歸祗陀園何時還出定吳山人漸吳公本姬姓束髮喜誦詩破産結賔客出伎歌新詞趣尚樂山水入城但攢眉選勝亟嚮往扁舟載西施常恐溘朝露不惜千金資泰山有遺表遼鶴歸何遲石高士藴齡若翁為邑博君遂為邑氓白鶴鎩雙翮棲棲向雞羣乘興灑翰墨率意成丹青詼諧隱吳市和光復同塵側注傲冠冕於我如浮雲朱文學訪子道尚孤潔闤闠皆蓬蒿偶拾江臯珮萋菲生青袍歸家徒四壁滿屋挂蠨蛸文君吟白頭相如讀離騷蓋棺土不掩空有諸兒曹潘逸人宿德輝江湖客笑傲王公前入山訪桑苧時開顧渚船謔浪傾四座新聲亦翩翩耽棋夜分寐留朋涉芳園老為孟嘗客瀟灑覺爾賢沈國醫友忠青囊乃餘事雅好論典墳家世業神術遊遨更多聞揮灑落風雨高歌停白雲服食翻自誤地下應修文曹氏園半畝池連竹三間屋對花草玄揚子宅傳易种卿家白日摩晴鸛青天點暮鴉客來村店近沽酒趂魚蝦暮冬送顧孟及遷居乾坤皆逆旅又復此離羣共作無家别同為落葉分壯懷傷晚嵗行色動寒雲以我他鄉淚臨岐灑贈君氷雪淹旬詩以寄感二首日灑爭春雪如珠亦間花望從梅處密舞到竹邊斜高剎標紅寺孤舟釣白沙幸無沽酒債一月斷魚蝦卧雪惟高枕傷春只閉門圍爐消白墮擁衲伴黃昏覆壓從橫樹糢糊逺近村又將寒食近依舊是消魂和答曹三萊即事載酒竹林過風流似永和常疑叩門響忽訝棹船歌野色浮青氣江聲湧白波小山申再約桂影月婆娑秋莫過福源塔院贈靜修上人暫釋塵中鞅聊舒老去身夙生如有約幻聚豈無因蝶引徐行客魚窺久坐人一乘開覺路誰復問迷津木芙蓉冉冉木芙蓉翛然出翠叢破炎承曉露凌壑待秋風未倚佳人醉先怡楚客容渚宫期不逺翬映夕陽紅仲秋九日金吾弟淵泉訃至半生南北各分天一晤重違又十年黃耳走殘吳地月白烏啼散薊門煙委先慈竹應難化長未孫枝亦可憐老我獨存君不見夢魂飛繞落霞邊鸚鵡病劇垂死百計療之得生鸚鵡含顰憶隴山雕籠病翮欲飛難豈無縱爾西歸念萬里鷹鸇妬羽翰鄰鄉姪死一年矣詩以志哀不違旬日便開尊底事今年靜掩門一十二畨三五夜獨留明月到黃昏溪橋送客桞下花前日半曛赤欄橋外水如雲黃金散盡無長物留得鶯聲把贈君洪秀才默默字惟緘蒸弟隆萬間文學宿東禪寺薄暮維煙艇循溪上講堂山圖秋水濶樹接浦雲長僧集諸天供風回合殿香臺端聞寶偈心寂萬緣忘陸郎中基恕基恕字淡園以父光祖蔭工部郎述懷有序豫攝事通惠目兹民艱雖勉致寬政猶杯水救車薪無補於炎炎也惻然寫懷以識感嘆泛舟無榜人勞勞愧𢎞濟少年志沮喪卑秩多蹇滯司農告不給秋稅從新制時艱但增慨匡救難為計多捐念國貧重斂民為厲張羅置疏目寄惠在微細項通判桂芳桂芳字楚東襄毅玄孫官韶州通判有歸來草南湖秋泛水滿長湖一片秋微茫煙雨鏡中收芙蓉夾岸迎青雀蘆荻平沙隱白鷗載酒自宜消嵗月埀竿還擬向滄洲採菱何處歌聲斷木落天高動客愁檇李詩繫卷十四
