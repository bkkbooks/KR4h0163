錦圖大嫂二十餘小姑年十九大嫂織倦花下行小姑弄梭不停手纎纎玉指柔且温機聲似鳳啞啞聞一尺一尺復一尺織成一片湘江雲東家郎君大驕劣倚䦨漫把春情説玉梭信手忽自抛白日觸翻雙齒折題梅道人畫二首山中種木圍書閣無數好枝生屋頭白浪吹雲湖艇晩青松含雨石忩秋賦詩當似韓宣子作器定従樊敬侯更愛小亭深樹裏竹根洗硯細泉幽江南春盡雨涔涔繞樹篔簹合積隂園曲疏泉石苔滑籬根繫艇漲痕深山寒翡翠巢密葉日暮鷓鴣啼逺林此時世慮淡於水聨牀燈火百年心丁僉事豫豫字叔寛號蘭室海鹽人洪武初以儒術召對稱㫖授江西按察司僉事過醴城時奉詔兩廣求賢作奉使南来過醴城春風得得馬蹄輕鳥飛緑樹隂中去人在白雲堆裏行巫峽有山千嶂出湘潭無雨百花明行行不厭登臨倦欲振荆陽滯璞名髙知縣岳岳字彦髙本輝和爾氏髙昌裔也其祖仕元為御史中丞岳博洽有才儀容秀整工草書凡丹藥卜筮之術咸究識焉洪武間薦知雲陽縣免官寓嘉興復寓魏塘嘉善志又作岳彦髙號雪樵寓崇徳青鎮南亭橋下水無波獨客扁舟試一過撫景自慚佳句少思親還恨别情多東風燕子穿花雨落日漁郎起棹歌却上髙篷望西北青山雲影共嵯峨小西湖漁者錢鈞鈞字志衡嘉興人洪武中以明經授本府訓導喻良奉命治水甫按郡即與鈞講求水利籌畫頗多復以疾辭扁舟放浪雲水間自號小西湖漁者復聘至京卒有半隠集凌孝子歌凌孝子渥洼種鸑鷟姿金精玉魄藴藉骨與肌老蠙秀毓明月顆濁海挺出珊瑚枝十五志學富文史燈火夜夜蔵書帷二十應門足賓客交游往往稱白眉凌孝子父典粟人揑詞一朝逮繫歸京師仰天哀號眼流血突地吼急心剜錐重明不照覆盆底壯氣直拂青雲涯上書欲雪父非罪父罪既釋身先萎水航陸走有餘苦風餐雨宿無良醫天公與才不與夀吾黨堪恨仍堪悲凌孝子死絶奇生年未永人見推鄉鄰聞訃杵不舂親戚奔喪淚再麾白楊風悲雲慘淡蕙帷月冷香逶迤空懐手提如意舞無復夢把連環持鵲巢伶俜哀錦樹琴絃㫁絶凋朱絲嗚呼月溪篆周郎引扵公辭當時三絶人見之石湖大篇又超邁東柯八句同追思香名膾炙衆人口風烈照耀羣賢詩嗚呼半隠老材力薄人品卑縦有空言何所施筆力既無扛鼎勢文藻適足為時嗤願求當世採風者表而出之天下知不然排雲呌閶闔請樹綽楔光門楣遂令首行身朽譽不朽簉迹二十四子肩相随卓哉簉迹二十四子肩相随天荒地老磊磊落落名聲垂附考孝子鈞里人也永樂中父以典税被逮孝子號慟上書得釋竟以勞卒陸教諭宗學宗學字熈之崇徳人洪武間由儒士薦為教諭天清宫青鳥曽傳海外書瀛洲消息近何如燒丹既悟神仙訣避地何妨水竹居石子種来都化玉藥苗分出半登蔬天壇月冷秋如水夜夜吟風起步虛農圃居士周徳行徳行自號農圃居士嘉興人洪武間歴官工部營膳所丞英華失載従湖海耆英集録之寄田吏目蜀江曽共買歸船聴雨篷忩夜不眠小范胸中兵十萬老田門下客三千宦情絶塞烏蠻外歸興滄洲白鳥前老圃隠憂詩裏見被人多向話中傳寄泮水諸公早年曽許筆如杠老我扵今興已降作客渾如錦江杜攜家未遂鹿門龎沙鷗睡熟原相並梁燕飛来偶自雙昨夜夢魂歸别墅富春山鎖白雲忩丁太守麒麒字彦楨號淡庵豫長子洪武間以貢授濟南守舊志載其煙寺行吟詩得句更題林外竹脱巾常挂塔前松天星湖詩堤畔馬嘶芳草碧沙頭人上畫船輕聞琴村詩别鶴不聞空外語野烏時向屋頭鳴亦清整可誦今従武原集録一首送唐士幹回貴州濩落江湖失所依還家又著老莱衣西山日薄烏啼切南國風髙雁影稀目送長空何忍别心交方密又相違一尊寄爾庭幃逺滇樹花深五馬歸唐縣丞貞貞字士幹號抱拙海鹽澉浦人洪武間以貢任東莞丞嘗従鐵崖學詩韓履祥贈貞有宦遊踰嶺海聲價動京師之句又有送貞還貴州詩云楚山鬱重重巴水深浩浩丁麒亦有送貞詩豈其従貴竹家澉者耶題深雲卷軒構深雲隔杳冥一時遮㫁萬山青谷中虎嘯風摶陣洞口龍歸雨帶腥卧石衣襟嘗自冷出林鐘磬慣曽聴披圖作者皆前輩小筆何由問草亭王御史貞貞字貞徳嘉興人洪武三年庚戌開科貞中浙江行省鄉試授合水知縣調茌平治有成績左遷廣州司獄召拜監察御史石鼎歌老年落魄猶非昔破帽遮頭誰識得不知水郭與山村杖藜到處尋陳迹清寜仙觀栁溪阿松扉晝掩縈藤蘿𤣥聖之前石為鼎蘚痕雲色何其多蒼煙騰入蒼虬口神氣冲天貫牛斗奕傳鞏固不知年㫁送㡬人先白首嘆余老眼空摩挲暈碧重重奈爾何古往今来成一嘆不須見此復悲歌附考嘉善西北三十六里清寧道院中有石鼎龍頭豕腹宋熙寧中剏院時所置王舉人鏞鏞嘉興人洪武庚戌舉人出處無考按其詩我家舊在梅溪上今王墊鎮也聞川蔣氏有家蔵明初水竹居詩一卷謂距禦兒東六十里曰澄林其地多竹溪水瀠洄青螺翠合不啻左泉而右淇也處士朱克恭家扵此顔曰水竹居郡人馬盛為記貝瓊為志後列題咏甚盛俱一時善鳴者中得鄉賢數家不忍遺軼姑選存之水竹居為朱克恭賦碧水澄潭自作洲琅玕多種屋東頭旋燒新笋當茶竈時斫嘉魚上釣舟客至好従明月飲居閒何必五湖遊我家舊在梅溪上遥憶清風度早秋王鈞鈞字天全鏞弟前題文采風流偶晉賢由来踪跡托林泉候門童子清如鶴留客軒忩小似船錦鯉寄將書咫尺綵鸞飛下月嬋娟何時把酒同燒筍却訪東坡笑渭川金天藻天藻未詳前題溪流抱迴沚春深帶芳洲軒居得佳勝水竹繪清幽日麗雜花明雲深嘉樹稠蘭杜發光采鳬鷖共追遊有客来扣門風晴氣和柔布席具芳醴觴詠時唱酧悠悠起遥矚侃侃㤀隠憂従此謝簪紱樂焉終林丘陳鱗鱗未詳前題白雲宿虚檐蒼雲墮髙棟日暖魚弄姿天晴鳥呼夢髣髴篔簹谷未數薔薇洞忩迎山氣佳地隔市聲哄居然有六逸亦豈無二仲分曹時對奕課子夜猶諷清泉且自酌冬笋宜修供匡牀白髮翁笛聲或三弄陳熊按清江集遊殳山記熊本貝氏門人前題竹逕茅堂相與連清江一曲好林泉動門碧色帶初雨滿地緑隂遮暮天春留客座烹鮮鱖老倩人扶拜杜鵑却笑九衢塵没馬城南回首思茫然陳振振未詳前題小築瀕溪日掩門琅玕萬箇似雲屯玉簫吹徹天如水釣艇歸来月滿邨秋雨巳堪垂鳳實春風又見長龍孫野人自得滄洲趣與世相違更莫論孫太守詢按郡志為嘉興府學生洪武初鄉貢官知府與宣徳年孫詢官檢校者兩人前題髙竹臨水上翛然絶塵跡野人適幽趣結廬在其側涼隂汎渌浮滉漾侵几格坐待明月来秋聲印寒碧丁御史麟麟字彦祥號樸庵豫次子洪武乙丑進士官御史彈劾百僚無辜見法臨刑有哀親訓子詩哀親有親有親怙恃全瓶罍依倚期終年我生不辰天怒癉漂鴟化碧雙親前雙親有孫初學笑孫母無夫鏡空照北堂椿瘁萱亦衰憂不忘兮花不開嗚呼一歌兮歌正哀飛魂暗逐東流迴題畫梅木落江空嵗晏時春風先到最南枝繁華各有生生意莫嘆棠梨造化遲西湖竹枝詞湧金門外春水多賣魚船子小扵梭三三兩兩唱歌去驚起鴛鴦可奈何韓御醫履祥履祥字採芝海鹽澉川人能詩工醫洪武中為御醫成祖尤加恩遇巧扵對脈言無不驗董兩湖穀為撰傳懐惟則大師每憶幽尋到上方紙忩石鼎漫焚香天花入座散晴雪空翠撲衣生晝涼龍化老翁求妙諦鶴偕童子守禪房别来江漢頻回首塵刼茫茫道路長檇李詩繫巻七
