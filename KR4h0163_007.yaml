body:
  text: 檇李詩繫卷七平湖沈季友編明貝助教先生瓊瓊字廷琚一字廷珍别號清江初名闕字廷臣崇徳人少頴異師同邑黄次山及㑹稽楊亷夫而學益進年四十八始領元鄉薦張士誠據吳累徵不就隠居殳山教授生徒洪武初徵修元史同官李敏卿輩服其史才文重京師壬子校士浙省入為國子助教乞歸其在史館時與金華宋景濓友善凡有撰著互相推讓亦一時兩雄也黄巖方行贈詩有云殳山仙翁髮如雪胸蟠太和吐日月手中鍊石輕女媧五色曽将補天裂其推重如此著有清江集其詩博大警敏矯然不羣評其才質當不在髙楊以下有明一代吾郡詩人林立以清江冠之斯無愧焉雜詩春山一雨過百草皆縦横百草不出山山中人逺行懐金别妻子徇禄辭父兄寒暑忽已易燕趙千里程龍門能碎舟風浪安可争性命輕鴻毛苦為朝暮營愧此山中草萋萋林下生真真曲有序姚文公為承㫖時一日玉堂燕集聲伎畢奏有真真者操南音公疑而問之泣對曰妾建寧人西山之苗裔也父司筦庫於濟寧坐盜用縣官財賣妾以償遂流落倡家公憫之遣使白丞相三寳努為落籍且謂翰林屬官王棟曰汝無妻以此姬配汝吾即其父也貲裝皆出扵公棟字棣華後官至翰林待制噫以西山之賢子孫凌遲宜不至此然辱扵始而正於終是亦天也篔谷筆談記其事予乃賦二十四韻而沈鬱凄婉亦足以盡其大略矣㫁絲棄道邉何日緣長松墮羽别炎州不復巢梧桐請君且勿飲聴我歌懊儂在昔全盛時冠蓋紛相従盤游易水上意氣天山雄金刀手割鮮酒給葡萄濃坐有一枝春秀色不可䝉娉婷劉碧玉綽約商玲瓏寳髻金雀釵已覺燕趙空或聞操南音未解歌北風上客驚且疑姓字初未通問之慙復泣乃起陳始終妾本建寧女逺出西山翁父母生妾時謂是金母童梨花鎖院落燕子窺簾櫳迢迢官朔方南歸山水重侵貸國有刑桎梏加父躬粥女以自贖白璧淪泥中秋娘教歌舞聲價傾新豐永為倡家婦遂屬梨園工覽鏡拂新翠吹簫和小紅身居十二樓屢入明光宫京華多少年門外嘶青驄自傷妾薄命失路随秋蓬不如孟光醜猶得嫁梁鴻客聞為三嘆祖徳寧未崇回黄忽變緑人事何匆匆有客傷緹縈無人憐蔡邕遣使白丞相削籍歸舊宗小史三十餘勿恨相如窮配汝執箕帚今夕看乗龍鴛鴦並玉樹鸚鵡開金籠銀甲不復整紅牙不復供提甕自汲水絺綌亦御冬應非事羊侃頗類歸建封琵琶感商婦老大猶西東崔徽怨顦顇浪寫丹青容依依章臺栁落絮春無蹤小妾恨題驛竟與瓊奴同時多因坎坷事或欣遭逢焉知百尺井歘登羣玉峰借問為者誰内相姚文公十月既望鳳凰山晩歸邨黒畏衝虎且復歸柴門風林月未出宿鳥争且喧浮雲忽㫁續萬丈飛金盆湛湛天宇髙光氣相吐吞我行月還逐是身亦無根試求不死藥飛騰同久存老妻有斗酒洗盞當前軒酌酒消我憂萬事俱忘言贈迮元霖迮生同長貧賦詩朝忍飢破裘連百結但覺詩愈奇鏘然擊天球未作秋蛩悲嗚呼識者死舉國無人知鼓柁洞庭湖逺過三髙祠我無一斗酒為生開兩眉宇宙非不大四顧将安之日落萬山黒百鳥争寒枝翩翩五色鳳寂寞雙翅垂聖人坐明光遲汝一来儀皂林考見題咏朝發白水村夕次皂林驛水腥無飲馬林黒有歸翮昔時兵交地白骨如山積萬竈今已夷風亭煥新飭居人尚星散父老悲古蹟團團關山月夜逐南征客采芝生詩負版行欲僵飛蠅死猶集赴燭夜蛾焚好酒猩猩泣所以思逺託道路方險澀寧希百金賞豈慕千户邑永言従我求鷦鷯唯一粒有材實為累無欲安所入韓彭苦不悟羞同匹夫執商山今寂寞髙風邈難及嵗初度日書懐余生若小草望成百尺材強因客土植苦被秋風摧徒慙五十過況經元二災白髮不可變青陽忽已回未忘藥裹好㡬見桃花開殘編掩黄石虚室生蒼苔故人且共棄王孫誰復哀終歸葛洪井詎上鳳凰臺衰榮置勿論待月酌金罍對酒懐邵文博擬東野今日忽不樂緑酒徒盈樽酌酒云解愁愁生如有根安得二三子促席相與言尚思滄洲地十月花更繁雲隨鶴蓋合雪避貂裘温終筵復秉燭歌吹髙堂喧盈盈二八女白苧鶴翎翻月落猶未歸清夜宿西園到今題詩處素壁龍蛇昏荆揚忽雲擾海内俱星奔㫁腸臨濠謫回首潁上屯昔如鷹脱韝竟作駒在轅淒涼城南路甲第今空存瀟湘忩下流三神鎖朱門江險隔秋夢山寒啼夜魂詎望白璧贈更戀綈袍恩索居悵無匹落葉滿孤邨秋懐露下百草變凄凄天地秋亦如中年客玉顔安可留山鳴迅商激水涸行潦收恩方改團扇意復存弊裘梧桐葉盡脱孤雛夜啾啾光景忽已逝感之雙涕流四月十日兒子翺䎘来鳳陽留一月遣歸因令早營草堂殳山下為止息之所云老病不得歸獨處長戚戚二子江南来眼暗初未識生常戒垂堂肌肉如雪白一月長途間海風吹盡黒買酒為相勞問答向中夕迢迢漢陽簿春来㫁消息阿宣在母旁頗知工翰墨艱難且撥棄頓使沈憂釋所愧無定居百嵗半為客經營須及早尚愛龍湫僻況近讀書臺雲銷四山碧泉深出丹砂地冷多琥珀既非匡世資庶遂陶阮逸良辰戒童僕悤悤又南北五月方鬱蒸日氣成霞赤出入非所宜川陸慎所歴惜别豈無淚向汝難再滴秋江有鱸魚當挂吳淞席出都門寄孟兼張主事日落宿都門雞鳴發淳化城南夜来雨連山色如赭青松夾髙岡煙火通旅舍到家須十日畬田熟秋稼如何山巨源未知嵇叔夜野鶴終去人疲牛豈勝駕寄言謝所親吾今老林下遊菩提山值雨宿存思菴連山挿天危欲崩木客結構當千層我来看山風雨惡入山喜見靈泉僧閉門留客共野飯風回雨絶清無蠅酒酣熟寢喚不起夜深花落龕中燈軒轅已恐即韓愈許汜未可譏陳登天明僮僕催欲去却嘆世故来相仍重尋曲折恐蹉跌安得逺討閒支藤林開川豁見鳥下山寒石峻愁猿騰呼舟獨返草堂路他日重来共毾㲪鳳凰山歌大城週迴三百雉紫㣲閣對吳山起天目西来為鳳凰蒼然不過錢塘水玉輦金輿北去賖行人折盡上楊花杜鵑夜呌葛洪井燕子春歸蘇小家燕歸不識更新主王氣凄涼作風雨城南楊栁鬱金黄一束纎腰為誰舞雨中江南正月如臘月花開未開春尚慳空中白雨急飛瀑海上黒雲深抱山老夫閉門愁不出十日西忩聴蕭瑟公卿鞴馬五更朝且獨髙眠舒我膝銅雀破瓦不補天哦詩強學號風蟬荒邨無路竹雞喚載酒何人尋鄭䖍白頭為農計亦足棄書耕田買黄犢正月廿九日楊鳴鶴席上分韻得㡬字兩山昨夜風雨止水漲新痕沒沙尾黄知彭澤栁初芽紅見武陵桃欲蘂老去逢春更惜春平生酒伴誰知已白髮楊郎古奇士千金已散歸田里閉門留客為張筵共喜一時成二美小兒行觴不計籌大兒割肉能操匕冬薤下筯白扵肪秋蕅洗泥寒刺齒且須快意在今朝況我中年㑹能㡬亂離相見亦偶然海内交遊半為鬼顛狂豈顧傍人毁但恨白日無淹晷賦詩已覺無曹劉罵客安知有程李坐中一鶴能商歌歌作連珠盡傾耳風卷新聲入夜雲豪竹哀絲静如水若為倒卷玻瓈江百尺髙樓眠不起穆陵行并序西僧嘉木揚喇勒智利宋陵寳玉因倡妖言惑主盡發攅宫之在㑹稽者㫁理宗頂骨為飲器僧敗歸内府九十年矣洪武二年正月詔宣國公求之得扵僧汝訥所乃命葬金陵聚寳山立石以表之余感而賦詩一首六陵草沒迷東西冬青花落陵上泥黒龍㫁首作飲器風雨空山魂夜啼當時直恐金棺腐鑿石通泉下深錮一聲白雁渡江来寳氣竟逐妖僧去金屋猶思宫女侍玉衣無復祠官䕶可憐持比月支王寧飼烏鳶及狐兔真人歘見起江東鐵馬九月踰崆峒百年朽骨却南返雨花臺下開幽宫流螢夜飛石虎殿江頭白塔今不見人間萬事安可知杜宇聲中淚如霰題火龍烹茶圖并序右火龍烹茶圖蓋寫古帝王事而㫁縑落粉半為好事裂去獨有茶具及黄衣中使拱而立者二人烹茶者二人曲江錢惟善定為唐之𤣥宗豈嘗見其全者歟然人物位置非院工所及未暇考譜實之姑為賦詩一首題其左云松聲一作秋濤雄銅龍吐火鱗甲紅黄衣中使備玉食泉出金沙甘露濃春風一旗色尚活建溪山人雨前掇蓬莱殿裏沃焦餘玉椀分沾侍臣渴名花喚起海棠魂細葉未數丁香根宮中一日歌舞散世上千秋圖畫存開元盛事何人省書生亦解誇雙井空山掃葉燒破鐺閉門讀書秋夜永殳史吟并引余避地千金埒屢遊殳史兩山酒酣興發賦詩一首惜山中無賞音者空桑亦同扵瓦器耳姑録以自娛云神人夜割蓬莱股蒼然尚作青獅舞殳基得道此飛騰煙火千家自成隖前年盜起官軍下存者如星纔四五我来欲置讀書牀出入未愁穿猛虎山寒月黒無人聲夾道長松作風雨珮環何日歸公主泉下銅棺閟千古石仆麒麟罷官守林宿鴟鴞聞鬼語苦耽勝槩惜殘年共説當時悲老父錦繡池臺已零落田翁八十鋤新土傷哉土俗尊巫覡伏臘荒祠沸簫鼓祠旁鑿井深不枯雲氣随龍有時吐試上崔嵬望沃洲直將培塿齊天姥春前野栁渾欲放雪盡黄精亦堪煑興來起挾李長庚重載琵琶雙玉女郭忠恕出峽圖巫峽何危哉夾拱如龍門禹治九州不到此峽口水作雷霆奔問汝江中人㡬日三巴去峩眉五月銷古雪灧澦堆深虎須怒巫峽之險安可攀胡為吳檣楚柁日日来往乎其間髙堂中有如花顔銀屏翠箔青春閒涉此萬里道經年猶未還黄金不買死直欲髙南山汝舟非龍汝非虎黿鼉出沒饞蛟舞前者已脱後者號江神無情天又雨石巉巖兮利刃攅一葉宛轉行千盤覩此魂魄悸豈待杜宇夜呌猿聲酸安得鑿之盡平土萬古不識風波苦送迮士霖歸天台赤城雲氣神仙家千樹萬樹蟠桃花十二樓臺起花外石門水長通烏麻當時劉郎亦草草出山却憶山中好莫信丹丘日月長玉人已共桃花老山空水流雲自飛劉郎看花須早歸張繼善寄桃源圖因賦詩張生寄我桃源圖桃源有路歸何日髙堂坐見武陵溪犬吠雞鳴猶髣髴雲氣挾山山欲行山窮水濶桃花明仙家只在流水外世上無人知姓名一日花間問漁者山河百二如崩瓦赤帝西来祖龍死復見同槽有三馬太元去秦六百秋子孫生長不知憂商顔黄綺亦何事白髮出侍東宫遊龍争虎戰俱寂寞絶境空存已非昨種桃何必指秦人春到花開又花落題董源寒林重汀圖天下畫師無董源學者紛紛工水石雲山萬里出巴陵白首河南見真蹟亂石平坡净無土松根裂石蟠龍虎偃葢千年飽雪霜深林六月蔵風雨江上邨墟何處入浮空逺黛蛾眉溼漁人日暮各已歸小舟如鳬落潮急我昔西清嘗看畫南唐此本千金價坐移絶境在雲間月出霜猿啼後夜薄遊未掛吳淞帆令我一夕思江南安得買田築室幽絶境開忩日日分晴嵐十月十三日過梧桐涇時官籍濮彦宅妾龎氏唐氏自經感而賦之天寒水清石齒齒杏葉初黄豆花紫舞榭歌臺不見人頭白烏啼月明裏當時豪俠輕五侯一榮一枯八十秋緑珠亦解死金谷草露作淚無時流冬夜嵗月悲遊子風塵老腐儒兵交連北冀客隠向東吳草白秦皇道天清陸瑁湖昔時尋樂處撫事一長吁過王景脩不識滄洲路還經白石磯林深煙似織江黒雨初飛野店多先閉漁舟獨未歸幽人宅已近薄暮叩柴扉寒食不知春已去一月雨聲中蒲短初侵水花殘更受風病疑耽酒過窮覺向詩工失喜聞鶯語飛来草屋東澄林客居寄戴良佐沈復東借屋暫移家當門亦艤槎地蒸雲觸石江漲雨崩沙盧橘初垂顆冬青未落花老夫無一事日日醉流霞排悶白首尚為客飄飄天一涯耳鳴通夜雨眼暗隔年花畏酒従今㫁題詩浪自誇有村如栗里准擬便移家題馬文璧畫龍江今喜對雁蕩昔曽聞樹黒深蔵雨山青半出雲行人窺虎跡仙客叱羊羣老我来何日林泉定許分辛亥春偕桑子才丁一鶴遊殳山野濶天無際山青雨乍晴路従鼇背上人踏鳳毛行謖謖松風細輝輝竹月明浩歌猶未已新曲和流鶯夜泊四更風露静敧枕獨無眠野濶天斜倚江清月倒懸誰家横塞笛有客盪歸船可惜雲深處凄涼不及前壬子冬至日過来青堂二首示勉中祖南二友衣冠且従俗猶有晉風流我愛陶貞白人稱馬少游蜂房寒未割雞柵暖宜脩不必論三仕何如號四休擾擾知何事人間即夢間試従千佛轉能見㡬人閒水落元通月雲行不礙山長歌和樵者日暮抱薪還龍泓洞逺通羅刹國近接梵王臺海客燃犀入山人採乳回林間無日月地下有風雷聞道蜿蜒去寒潮自往来夜泊武塘考見題咏風帆如健馬一日過嘉興水鳥如相喚秋蚊尚可憎照人明月近接地白河澄耿耿渾無寐中宵對玉繩横港考見後南行入横港茅屋到林丘落日猶斜照寒潮忽倒流牛羊平野散鵝鴨小溪浮喜見平生友籬邉一繫舟送王克讓員外赴陜西貂裘萬里獨衝寒舊是含香漢署官白雪作花人面落青山如鳳馬頭看闗中相國資王猛海内蒼生望謝安應念東南有遺佚采芝深谷尚盤桓十月聞雷天氣初寒春尚賒坎中夜半有鳴蛙百年宇宙喧戎馬十月雷霆起蟄蛇老栁黄垂霜後樹小桃紅破雨中花王公燮理非無術愁聴空江度鬼車即事少海旌旗落照中沙陀兵馬雁門雄朝宗乆廢諸侯禮翼戴方尊節度功今日豈宜求騎刧當年應失倚全忠丹書鐡券存終始萬古山河帶礪同雨中書懐漢苑秦宫跡已陳金沙一簇為誰新山河有恨空懐古風雨無情只送春南國鷓鴣愁北客東家蝴蜨過西鄰尊前莫唱昇平曲白髮秋娘也自顰秋思三首兩河兵合盡紅巾豈有桃源可避秦馬上短衣多楚客城中髙髻半淮人荷翻太液非前日花落蕃溪又暮春莫上髙樓望西北逺山猶學捧心顰翠栁無枝拂御隄風来閶闔更凄凄玉籠别主鴛鴦拆金井啼秋絡緯齊水上拾紅韓氏女忩間織素竇家妻傷心又送韶華去直似黄河不向西帳望知音阻漢臯海門秋水欲成濤鷓鴣未肯随胡雁燕子長教辟伯勞錦繡莫酬青玉案琵琶空續紫檀槽可堪獨閉簾櫳坐花影鋪堦月正髙送楊九思赴廣西都尉經歴卭笮康居路盡通西南開鎮兩江雄漢家大将推楊僕蠻府參軍見郝隆象跡滿山雲氣白雞聲千户日車紅明珠薏苡無人辨行李歸来莫厭窮過泐季潭長老三塔院飲於志逺宅賦詩城南看花花正開清明㣲雨灑塵埃路従周處臺前過山轉曹彬廟下来墮地遊絲輕復起近人嬌燕去仍回髙歌擊節狂歡賞共盡生春酒一杯殳山隠居夏日陸熙之過訪病客従教懶出邨兩山一月雨昬昬野花作雪多辭樹溪水如雲忽到門無復元戎喧鼓吹試従田父牧雞豚来青處士時相過猶是平原舊子孫寄陳性夫灑埽天壇事老君即従年少悟奇文青童汲井朝分乳玉女裁衣夜染雲水上赤魚還可駕山頭白鶴自成羣遥知去客能長嘯月冷天空半嶺聞苕溪陸文寳挾筆過雲間持卷求余言而一時縉紳之作不啻百篇有論筆法自趙松雪用落墨而始廢者有為筆卦者近膚學小子率意妄作類如此可歎也已因賦五絶近代何人下筆精吳興松雪最知名欲過大令歸前輩競學中郎恥後生吳興松雪真奇士書到通神逼二王漫有兒童誇並駕更無弟子可升堂退之作傳聊為戲子雲草𤣥真好奇更有區區工畫卦強分奇耦學庖犧石鼓鐫功元自缺秦碑頌徳久應訛一時篆籀今誰解白髮江南玉雪坡漫秃霜毫臨北海更求雪繭寫蘭亭也知不改無鹽陋浪抹青紅鬭尹邢辛亥七夕五夜天邉輟鳳梭長生殿裏望秋河玉環他日無窮恨更比牽牛織女多冷協律謙謙字啟敬嘉興春波門内人也元中統初與劉秉忠従沙門海雲遊讀書博學尤深扵易至元間秉忠為相謙乃棄釋従儒游霅川交趙孟頫常同在四明故相史彌逺家觀李思訓畫遂效之深得其趣因以善畫稱曉音律善鼓琴飄然有塵外想後隸淮陽遇異人授中黄大丹傳張氏悟真之㫖迨至正間年百餘嵗矣顔如童孩值亂避地金陵賣藥市中神效駭人復隠居杭州吳山洪武初授太常司協律郎與少卿陳昧學士詹同待制王禕儒士熊太古等定郊廟諸樂章謙攷撰為多有友貧不能自存謙扵壁間畫一門門有鶴使細觀之則門啟入取金玉以出而不覺遺其引他日内庫失金守蔵吏持引姓名迹捕之因并執謙謙渴求飲拘者以瓶汲水與之謙且飲随以足揷入缾中身漸隠拘者惶急謙曰無害第持缾至御前拘者如其言帝問謙缾中輒應擊碎之片片皆應竟不知所在後有人扵蜀中見之初謙作蓬莱仙奕圖以遺三丰遯老即張刺撻也永樂三年遯老手提此圖以歸太師淇園公丘福題其上云冷君名啟敬龍陽子其别號也君有畫鶴之誣隠壁仙逝此卷乃至元六年五月五日為予作者予將訪君於十洲三島恐後人不識奇仙異筆混之凡流故識此今郡城有冷仙祠禱夢者多奇驗云余向購其詩不得近従吳門陸生廢簏中得其一詩遂録扵此劉青田有泉石歌為啟敬賦及聴冷協律彈琴詩題燕肅山水卷依稀廬岳髙僧舍髣髴商山隠者家我亦抱琴酬素願白雲深處拾松花陳經歴雷雷字公聲號窳庵嘉興人參軍秀民子洪武初薦授山西布政司經歴有窳庵集自城東復返感化舊居留别徐徳厚孤雲無定水悠悠又復㩦書返舊丘橡栗樹空猿呌夜蒹葭霜冷雁知秋懶梳白髮頻搔首笑對青山獨倚樓暇日清遊可乗興到門題鳳亦風流早春寄周致堯百年身世渾如寄何處他鄉是故鄉栁態正須弄春色梅花自與雪生香揚雄寂寞𤣥猶白賀監風流醉亦狂倘許勝縁同晚嵗梨林風致即柴桑竹所次盛孔昭韻萬玉森森䕶草堂八忩虚敞夏生涼清條迥出風塵表瀟灑駢生水石傍浄埽莓苔聴翠雨閒題詩句洗鉛霜籜龍更放新梢出相並梧桐宿鳳凰附考元吳𢎞道遇異人授子午流注鉄灸