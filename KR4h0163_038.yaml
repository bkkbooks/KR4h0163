body:
  text: 檇李詩繫卷三十八平湖沈季友編宋李綱字伯紀邵武人髙宗時為相諡忠定嘉禾道中遇夏子陽京華契濶巳再冬扁舟野岸欣相逢天寒水逺飛霜風談笑坐覺回春容年踰七十兩頰紅真氣上泝泥丸宫剖符南海窺祝融欲求丹砂訪葛洪問豫執筆侍九重胡為謫墮溪山中迂愚久合親耕農君恩未報徒忡仲飄零孤跡隨斷蓬他日相憶看雲鴻吕祖謙字伯恭婺州人孝宗時官編修諡成公送丘宗卿博士出守嘉禾以視民如傷為韻檇李國西門道里去天咫訟庭人摩肩客館舟銜尾凉燠變須㬰怵聽復駐視心平理自見周道本如砥堂下萬休戚堂上一笑嚬是心茍不存對面越與秦豚魚尚可孚况此能言民君看津頭栁葉葉皆相親奮髯疾抵風解衣徐探雛古來多快士氣吞兩輪朱簿書髙沒人迎筆風摧枯自許豈不豪嵗晏終何如折肱稱良醫識病由身傷開府事如麻豈盡昔所嘗平生老農語易置復難忘麥黃要經雪橘黃要經霜沈與求字必先吳興人髙宗時為樞密諡忠敏曽守置酒月波樓同賦詞語平生故自蕪登髙重愧賦成初諸君此去識老子右衛向來煩長輿波上旌旗飛退鷁樓前歌管出金魚回䦨後夜同延月直下方池可更疏羞墓富貴因人德未酬繡衣歸去竟何求荒墳三尺斜陽裏千古徒增女子羞月波樓突兀晴樓壓郡城樓前波面縠紋生何人合作佳從事來伴胡牀看月明㑹景亭栁株髙下隔桃蹊萬頃烟波似渼陂畫手無人邈平逺小亭風冷立移時過嘉禾野塘木末孤烟起夕炊茅檐直下釣魚磯蒼荒逺水連天碧一葉短篷何處歸周紫芝字少隱號竹坡宣城人髙宗時為興國守有稊米集送黃文若歸嘉禾烏帽猶衝九陌塵扁舟誰釣兩溪春久慿歸夢尋香國忽喜清樽對故人滿眼窮愁嗟我老此生交舊獨君真華亭一水無多地細作來書莫厭頻將軍十載半鳴珂才武憐君中異科但把長吟作回雪不妨瀕海看熬波時黃授鹽監方愁隻影身如寄便買扁舟意若何一别應須五年事好詩從此為誰哦文若擕家來逰西湖袖出新詩其歸和以當别黃郎滿袖出新詩别後篇章欲造微老驥但含千里意翔鸞還帶九雛歸如君好事真前輩笑我為生盡昨非小别不堪頻作惡灞橋楊栁亦依依蘇小墓野水橫分青草陂誰埋玉樹與瓊枝湖邉山自向人緑門外栁今何處垂行雨行雲均是夢施朱施粉未相宜一從蕙死蘭枯後剛道桃花好面皮陳造字唐卿髙郵人淳熙時為淮西安撫跋簡齊二帖夜光一百八十七簡齊三進劄共一百八十七字有底六丁忘下收密勿端知紫皇側鎮欀猶計子孫謀題椿桂堂四首為莫倅作日日髙堂笑臉新五株芳桂拱靈椿枝縈非霧根盤石共閲壺中不盡春靈椿移植自仙宫丹桂年年不辦供材薦明堂皆巨棟君家培植富隂功蒙莊漫詫楚冥靈獨秀吾今陋郤生更笑田家紫荆樹每隨人意作枯榮鴈影聨翩上綘綃庭蘭再世更竒標義方可但燕山竇行跨當年八葉蕭髙翥字九萬號菊澗滄州人烏鎮普靜寺沈休文故居寂寞梁朝寺深廊十數間碑存知殿古香冷覺僧殘斷岸舟橫浦平坡樹補山休文如好在依舊帶圍寬遊九言字誠之建陽人諡文清秀州道中二首一春烟雨歇空濛髙下川原杳靄中畢竟春光遮不得滿村花栁自青紅漠漠秋原禾黍空藤蘿古木梵王宫孤村野水斜陽外無數歸鴉落晚風范成大字致能吳郡人紹興進士官大學士有石湖集烏戍密印寺青堆溪上水平堤烏堆東岸曰青堆綘瓦參差半掩扉殿角純紅瓦我與聖公俱客寓聖公汀州白衣岩主號定光佛者連南夫知州載神像歸寄于寺之藏前人傳帝子尚靈威寺有昭明太子祠勝緣齟齬三重障東佛閣三造不成今据見材取次成之猶殊勝志士辛勤十載歸鐘樓乃一僧束髮為商走川廣得錢二萬緡凡十年復髠而歸樓始成花木禪房皆不見但餘蝙蝠晝羣飛僧房皆為狹門深泂行入百餘步不見人附考寺在桐鄉縣北二十五里吳越王戍兵處又稱戍上烏堆之東曰青堆又曰青墩取青宫之意昭明太子師沈約有先墓在此每嵗歸掃太子就之因築書館名青􅖰閣後約遷葬金陵太子捨館為賢德寺後改密印題崇德莫氏椿桂堂君不見衣冠盛事今猶昔前說燕山後崇德聨翩五組帶天香世上籯金賤如礫他年詩禮到雲來日日髙堂稱夀杯桂長孫枝椿不老却比竇家應更好附考堂在崇德宋邑人莫元忠兄弟五人俱登進士故扁其堂秀州門外泊舟拍岸清波撲岸埃黑頭霜鬢幾徘徊禾興門外官楊栁又見扁舟上堰來楊萬里字廷秀吉水人紹興進士官學士有誠齊集崇德道中一徑青松露三門白水烟殿橫林外脊塔漏隙中天地曠迎先見村移眺更妍客程坐行役不得泊春船烟雨樓考見前輕烟漠漠雨疏疏碧瓦朱甍照水隅幸有園林依燕第不妨蓑笠釣鴛湖漁歌欵乃聲髙下逺樹冥濛色有無徙倚闌干衫袖冷令人歸興憶蓴鱸秀州嘉興館拜賜春幡勝中使傳宣下紫宸鏃頭濃染御香雲綵幡耐夏宜春字寶勝連環曲水紋癡似土牛鞭不動老登金馬愧無聞强簮華髮知難稱只有新詩頌萬分過崇德二首北關落日送船行欲到嘉興天已明睡起一河氷片滿槌瓊摐玉夢中聲水面光浮赤玉盤也應知我縴夫寒滿河圭璧無人要吹入詩翁凍筆端劉克莊字濳夫莆田人淳熙中官學士有後村集朱買臣墓考見前翁子平生最苦貧晚將丹頸博朱輪老儒五十無章綬歸去何妨且負薪曽揆字舜卿南豐人題資福院平緑軒終日勞勞雁鶩行偶然來訪贊公房扶疏草木四圍合縈繞溪流一帶長倚檻豈能成傑句把杯多是說名方問師乞取安心法老坐蒲團對佛香附考軒在崇德治西素商門外三百步宋嘉祐間創劉仙倫字叔擬廬陵人冇招山集過嘉禾惆悵嘉興路三年幾度經航船連夜發更鼓隔城聽落月低烟樹秋風冷露螢客懷容易感宜醉不宜醒魏塘道中霜葉紅於染寒溪湛若澄幾聲歸雁急數㸃暮山青深盞頻斟酒長塗小作程萬緣天已定得喪一毫輕附考嘉善縣古魏塘鎮相傳魏武帝窺江南駐蹕故名乂曰武塘在府城東三十六里治為元萬户陳景仁花圃至正時有星隕石陳取為山縣治定基於此古為嘉興之東北鄙明始析邑領思賢遷善麟瑞永安奉賢胥山等六鄉葉適字水心永嘉人寧宗時官學士諡忠定題椿桂堂九官八士古之良靈椿丹桂後騰芳馮公詩意雖短陋閭里傳誦終難忘君家同生五兄弟短檠伴夜東方啓黃旗兩紀張慶闈紵袍五褫趨文陛辭華摽角人力能科名均齊天所興作堂不須棟梁好但種此木髙千層透日垂隂香未歇滿堂車騎同時列更將磊砢替團團留與北風觀壯節秀州寄王道夫二首衮衮紅塵五月留來時落木不勝秋只今春事濃如許萬里滄浪又一舟潘君狂甚詩能古葉子文髙世莫驚何處有田求二頃向來三月决歸耕王信括蒼人題椿桂堂向同子直逰膠庠是時子明居侍旁友于學問相激昂聲華日馳翰墨場仲氏一第如探囊伯氏隨即凌雲翔已快雁塔書雁行君家餘慶未易量二龍三鳳同呈祥一門競爽如圭璋聨翩不羡金華唐㑹稽何獨誇諸黃羞與竇氏爭頡頏吾家頗亦推吾鄉五登科第於太常枝分派别各一房敢與君家相比方源深允矣流必長孫枝更繞秋風香葉紹翁龍泉人寧宗時人過崇德野塍泉自注斷岸栁空存雨霽雲開塔船過犬吠門柴籬斜著水草徑别通村翻羡田家樂盈盈酒瓦盆黃幹字勉齊宋進士閩人為石門酒監石門吳越天下富京畿逰俠鄉隴畝盡膏腴第宅皆侯王世言蘇湖熟霑溉及四方自我來石門觸目何凄凉清晨開務門有酒誰復嘗纍纍挈妻子汲汲求糟糠父老稱近年十載常八荒聚落成丘墟少壯爭逃亡附考石門鎮屬崇德吳越時疊石為門故名唐置驛宋置贍軍廨及酒庫務紹興中半駕駐蹕之所有行幄殿元設稅課局於此太平廣記云唐大厯中王垂盧收乘舟至石門驛遇幽怪即此本朝以崇德為石門改為玉溪鎮瀕於運河又曰玊灣崇德憫雨四首檣頭五兩搖空飛船頭百丈牽何遲數篙塘水清可涉故鄉千里歸何時塘中龍骨髙數層龜坼田中縱復橫青裙箬笠倚車卧但有空車無水聲牛女盈盈河漢傍清風肅肅吹羅裳朱門達旦聽歌曲莫遣濃隂蔽夜凉老夫年老百不悲夜聽羣兒聲吾伊呼童握手長太息不見儂家數口飢崇德喜雨詩用前韻莫愁塵土座天飛六月栽禾未是遲待得麥麻收拾後通宵好雨定何時雲霓天外起層層畢月相隨徹夜橫費得天公能幾力數州愁苦變歌聲睡覺歌聲古道傍有人中夜攬衣裳牀頭斗酒聊自酌不為書忩一夜凉山中書生休浪悲燮調自有臯與伊清香一瓣來天竺更把民飢作己飢程珌字懷古休寧人理宗時端明學士有洺水集送常世卿歸嘉興悔作唐山來山深交友絶相逢忽相得乍見乃乍别嗟此氷玉人寒梅疏帶雪胸次羅文奎筆底耀離纈朝家渴英雋結網仍髙設行且收殊科勉哉嗣先烈一編忠義傳姦萌嘆先折千載懦夫魂脆骨變竒節識此吳中竒復幸拜前哲何異魯國人一朝獲雙玦晴雲起芝田東風催啼鴂慈庭有近書明朝動歸轍新抽草可茵微露花堪折相思復相思後夜天邉月戴復古字式之天台人有石屏集初夏逰石門張園考見仙鬼乳鴨池塘水淺深熟梅天氣半晴隂東園載酒西園醉滴盡枇杷一樹金汪莘字叔耕號栁塘先生休寧人嘉定間布衣臘月立春夜秀州船場橋玩月鴉聲欲斷雉聲起栁眼巳青桑眼黃故鄉春事正如許春事只緣思故鄉朱南杰古徐人淳祐十年為海鹽澉浦監酒十一年為市舶官曉發嘉禾曉發嘉興路人家門未開閘關船側過水漲堰平堆濃緑暗官栁肥紅綻野梅城中簫鼓發知是使君回泊崇德堰未抵長湖先從古縣過詩舟尋舊岸酒市鬻新歌傍水人家密依山僧寺多夷猶觀未足無奈月明何出嘉禾舟出嘉禾五里城僧樓山塔互崢嶸酒旗密比隨風舞漁網橫拖漾日晴畫舫貴人帆去穩單衣逰女著來輕山歌已接長河堰到得臨平月又明烟雨樓錦繡初開城角東規模綿亘境相通一亭舊占梅邉月兩徑新添竹外風山色有無烟變態湖光濃淡雨收功憑欄正好催歸去橫笛數聲蘆葦中餞海鹽史後樂秦溪邑大號難治後樂三年以德為海濶有樓還舊觀堂深無日不新詩虛舟祗載來時物實惠常教去後思相業真傳公不忝蒼生况是望霖時陳必復字無咎閩人有山居存藁舟行崇德落日挂征帆西風客袂單燈明村店近船重水程寬蘆蓼作秋意汀洲生晚寒鐘聲烟外寺山色夢中看嘉禾境上聨疇岡勢斷缺岸浪痕垂村店茅柴酒人家槿樹籬逆風魚上少連雨稻開遲客路秋偏好歸程盡是詩葛紹體建安人招鶴所詞為澉浦監稅趙潛夫作君之來兮鶴自九臯駕以去兮渺天地而逍遙縞衣𤣥裳兮橫大海之驚濤雲旗先驅兮霓旌旖月皓皓兮風灑灑青山之上兮黃灣之下挹北斗兮椒漿羽扇綸巾兮佩璆鏘盼而笑兮玉潔氷光鳴鸞鳳兮舞黿鼉馮夷鼓兮虙妃歌魚咏龍吟兮蛟螭護呵眷言歸兮南圃飄飛兮過舶櫓春復秋兮終古吳龍翰字式賢新安人嘉禾沈園景物何其異虛岩人力成清池沉鳥影髙樹落蟬聲花月樓臺麗香風簾幕輕客來堪一借莫惜百杯傾嘉禾道中趂得東風便千錢買一舟嘉禾三日路隂木四山秋野色緘詩思鵑聲替客愁煙波渺無際是處可盟鷗林逢子鏡香亭緑楊深處兩三家幾度慿欄聽沸蛙雲錦已空烟水濶空教人憶舊時花附考在府城內宣公祠二首仁義百篇同孟子排姦徑節凛秋霜人生一死固不免死落忠州骨也香千年舊事隨流水一縷殘杳弔蜀魂門掩落花人不到野風吹月照黃昏文天祥字履善號文山吉水人官丞相次韻劉左司營繕司落成適潘祕丞得郡檇李并餞以詩蓬壺日月四時春金碧新來絢帝宸俎豆幸陪麟省雋衣冠中有虎符新詩餘和氣生談麈坐久風光入醉茵多謝蘭臺舊盟主好歸羣玉領儒珍朱繼芳字季實建安人有靜佳乙藁送僧逰檇李師今逰檇李自刺釣船篙地說三吳勝人誇二陸豪草黃工女績波白課丁熬近海寒應早霜毛怯剃刀周文璞字晉仙錢唐人有方泉先生集檇李道中吹徹鵝笙醉碧桃古城斜日泛輕舠此行憶著維舟處緑樹黃桑一樣髙何昌弼海鹽橫塘道中一舸凌風去縈紆度幾村水清魚引子地美稻生孫路僻塵埃逺秋晴枕席溫悠悠迷處所疑入武陵源附考塘在海鹽西北四十里即常豐閘通郡之南湖方回字萬里徽人宋末知嚴州元為建德路總管有桐江集烟雨樓樓壓重湖實壯哉樓前圖畫若天開鷗從沙際衝烟去燕向花邉捲雨來傍栁一橋相掩映隔林雙塔共崔嵬欄干倚盡催詩處晴日須來三四回過崇德縣枯栁無風影不搖敗墻頽屋意蕭蕭忽然喚醒承平夢猶有紅闌夾畫橋聽航船歌四首北來南去雁還飛四十年間萬事非惟有航船歌不改夜深老淚欲霑衣南到杭州北楚州三江八堰水通流牽板船篙為飯碗不能辛苦把鋤頭雇載錢輕載不輕阿郎拽牽阿奴撑五千斤蠟三千漆寧馨時年欲夜行南姚村打北姚村鬼哭誰憐枉死魂爭似梢工留口喫秀州城外鴨餛飩癸辛雜識作跳上岸頭須記取秀州門外鴨餛飩家鉉翁眉山人官學生宋亡不仕寂照石佛考見前溪上石人何往矣山中石佛是其疇若教石佛能談妙應有石人來㸃頭林景熙字德陽平陽人午日寓嘉禾學宫顧東浦載酒相過二博士偕來飲就醉翌日留詩為别嘉禾古三輔積水何蒼茫舊逰夢厯厯况此逢端陽束艾肖人形傾葵抱天常蕭蕭老縫掖得依夫子牆鴛湖無五月宿雨生微凉客從東浦來手持紫霞觴采蒲泛纎玉沃我書傳香殷勤兩博士雜出肴與漿書囊談未了一醉齊彭殤酒醒忽不樂起看北斗芒嵗月感疏鬢風烟渺殊方明當理征棹斜日鱸魚鄉宣公祠氷玉為骨秋為神堂堂內相真天人諫草數百垂清芬仁義一洗功利塵刳肝瀝血空排雲白日不見吾忠勤奉天詔下哀痛新將士感泣天亦聞皇威雷動清九垠一紙可敵百萬軍草茅學古期致君以額扣關九虎嗔玉堂雲霧當華津耿耿何不批龍鱗一樽酬古凄夕曛鴛湖之水春復春題劉伶墓碧落當年墮酒星醉中萬事一浮萍不知人世無窮事一醉松根不肯醒蘇小墓歌扇風流憶舊家一丘落月幾啼鴉芳魂不肯為黃土猶作燕支半樹花羞墓逺望車塵汗雨流自知覆水已難收為君富貴妾羞死富貴如君不自羞吳思齊語云括蒼人考端平三年有澉浦監稅錢塘張思齊疑即其人題鹿苑寺應夢尊者祠是法本平等無怠亦無敬如何證無生却來見參政附考寺在海鹽西北三十六里宋治平初建魯肅簡公宰邑夢胡僧來迎參政及瞻羅漢像與夢符合因建寺又有一擊軒蔡翀揚坡石馬詩異代豪華事已非空餘石馬傍山蹊千年故物埋荆棘風雨時聞半夜嘶附考海鹽縣西南五十里冇揚山在永安湖閘南有宋常氏墳無名氏朱買臣墓貧賤難看俗眼低區區何事使雲泥㑹稽乞得無他念只為歸來詫故妻元趙孟俯字子昂吳興人諡文敏題延陵義孰禮義生富足為富誠不仁誰能如吳君捐已以惠人開孰延師儒聚書教比鄰豈圖名譽美要使風俗淳人物方渺然作養當及晨文章雖致身經術乃新民宣公相業著輔子禮樂醇二賢鄉先生千載德不泯吳君真盛舉勉哉繼前塵何富襲春服從子語水濵附考孰在崇德元皇慶中邑人吳英建秀州秀州人家知幾多郎君兒女唱山歌白馬橋頭拾明月鴛鴦湖畔折夭荷碧水朱樓為誰惱短簫長笛奈儂何共歸田園對山色江南江北更巍峩馬祖常字伯庸光州人官樞密有石田集送史正翁經厯之嘉興京華春滿眼楚客榜船歸花送行衣舞鶯從上苑飛蓴鱸隨俸入桑苧接田肥鈴閣文書少還知小吏稀貢奎字仲章宣城人元初官集賢直學士有雲林集和馬伯庸學士送史正翁赴嘉興幕官春日思家切那堪送客歸自憐舟似繫却羡羽能飛麥隴青鳩閙花洲紫鱖肥登臨多暇日應報訟門稀黃庚字星甫天台人有月屋漫藳石門羸馬東山路駸駸抵石門落花春雨夜流水暮烟村久客悲行役新愁攪夢魂勞生多感慨餘恨付乾坤傅與礪字若金臨江人送唐子華赴嘉興聞君秋思滿南湖行李今晨發帝都幕府初乘從事馬江城還憶步兵鱸樹浮白日山侵越湖蹴青天海入吳閒暇慿髙動詩興須來一醉掃新圖陳孚字剛中天台人嘉興二首簫鼓聲中十萬家垂楊淺映緑窗紗象梳兩兩蟬鬟女笑擁紅橋買藕花燕子穿烟水荇開顧家猶有讀書臺平生雙耳松風裏乂向華亭聽鶴來薩都刺字天錫雁門人過嘉興一作過秀州南湖三山雲海幾千里十幅蒲帆挂秋水吳中過客莫思家江南畫船如屋裏蘆芽短短穿碧沙船頭鯉魚吹浪花吳姬蕩槳入城去細雨小寒生淺莎我歌水調無人續江上月凉吹紫竹春風一曲鷓鴣詞花落鶯啼滿城緑皂林舟中春溪野鴨肥可射幽樹深隂叫山鷓逺人三月酒船過栁絮飛時杏花謝行行水竹上雲林往往人家或僧舍小官便欲賦歸來何處買山錢可借附考皂林在桐鄉境張士誠攻嘉興元將駐兵於此明徐逹討士誠獲其俘六萬即其地也石門懷友夜坐道人挂劒丹陽去欲入茅山恐未曽飛去難尋雲外鶴歸來獨禮斗前燈夢回洗鉢分秋水酒渴敲壺碎夜氷獨有江東未歸客西風詩骨瘦崚嶒貢師泰字泰甫奎子官祕書即有玩齊集風涇舟中白髮飄蕭寄短蓬春深杯酒憶曽同落花洲渚鷗迎雨芳草池塘燕避風烽火此時連海上音書何日到山中故人别後遙相望夜夜空隨斗柄東附考嘉善東北十八里有清風涇舊名白牛村市元易為鎮陳舜俞居此方瀾字叔淵莆陽人有叔淵遺藁石門夜泊積雨暝天豁炊烟隔林起人