姓莊户版抄入商人籍夫陳亦是海鹽商逺來壻莊圖久長莊時年當二十四于飛和鳴雙鳳凰豈期得子才四月幡然去作諸畨客海中使船惟信風倐忽千波萬波隔五稔弗歸鄰媪疑情以諷莊欲嫁之正詞厲色却鄰媪將焉置此呱呱兒久乃陳從海外至子生五年能捧雉銀燈坐照夜堂深勸諫夫陳詞不已海中日日生風濤千金之軀同一毫人非金石當自保北斗那共黃金髙夫陳耳聽心不悟趣裝出門衣楚楚莊憂水底有蛟龍陳恃蛟龍莫豫侮信回乃在九重淵莊走入房羞見天引刀自刺刀墮地哭抱孤兒仍自憐指有此兒堪嗣續不爾從陳葬魚腹良人雖沒天可移績紡教兒買書讀兒名寶生既長年知父之死常泫然母告汝父之海鹽有子盡典祭祀田汝往贖田還祭祀妾身無愧歸黃泉寶聽母言即長往未知海鹽先採訪果得前兄名寶一泣訴二天成俯仰歸復母命母大喜恨不相與携手至轉頭滄海作桑田奉母還鄉談笑耳兒亦一來拜母莊母子三人涕淚􅗈浮雲行天失變化鳴鳥集樹休翺翔寶也奉母孝益謹母子更相為性命母呼寶也語近牀貸汝父錢名石章章負舶錢今繫獄汝父雖沒錢須償喚婢賣珠遣寶送泉人義莊作歌頌十子不如一女英男兒負義真何用天朝史臣髙與王大書特書相發揚傳聞滿紙作龜鑑無不讀之眉目張誦莊之賢無逺近夫婦綱常自莊定關雎之詩今復作還有刪詩如孔聖三光不滅天地存教子錫類皆弟昆陳母節義天所報駟馬何獨于公門陳彥兼作春草堂養母詩以美之綦履鳴環左右間佳兒佳婦及承歡天回白日臨瑶席露洗紅萱出畫闌小爵注春宜燕適長裾曳翠可髙寒升堂拜母俱名士一記何慚在史官蘇小小墓香骨塵埋縣治前西陵魂夢隔風烟好花好月年年在潮落潮生更可憐張憲字思亷㑹稽人顧野王讀書堆昔聞野王宅今上讀書堆篁竹最深處菊花時自開天風響鐘磬海氣結樓臺回首梁陳事悲歌付一杯錢惟善字思復松江人福源宫得月樓明月未離海幽人先倚樓清臨半江水髙占一天秋太白偏能賦元規亦共遊何人夜吹笛栁下暫維舟附考樓在嘉善治北二十四里宋道士唐介夀居此用朱符息錢塘江患明宣德時西塘文水漾有怪木晴明不見風雨輒出形如黑魚遂以刻三清像早發葑門得風抵皂林白龍廟前風浪生扁舟初離闔閭城嬋娟霜月雁千里顛倒衣裳雞五更櫓答漁歌江入夢帆迎野色樹移程葦間何限秋蕭瑟愁絶胡笳出塞聲楊維楨字鐵崖㑹稽人和金粟道人逰永安湖韻秀州城外鴛鴦湖郎官帆開十幅蒲人逰玉壺天上下鳥度屏風山有無起舞或呼謝鴝鵒賦詩爭傳鄭鷓鴣酒酣不怕歸路晚將軍曽識李金吾附考湖在海鹽縣南澉城西六里四圍皆山中間一堤俗呼小西湖又曰澉川水經注谷水出為澉浦以通巨海晉光熙元年有毛民三人集此蓋泛乎風也元季顧瑛與客逰此作詩正德初孫太初訪許雲村放舟雅集雲村曰昔青蓮居士與張謂逰漢陽湖改名郎官公今至此可名髙士湖矣陶莊村落成行市井連日中雲集自年年刀錐有利圖衣食貿易無人索稅錢漁鼓畫橋楊栁外酒旗茒店杏花前陶家義孰相聞近教子何須孟母傳附考莊在嘉善西北三十六里有南北二莊宋紹興中保義郎陶文幹自蘇徙此地産黃雀圓覺禪院圓覺招提隔市喧潮音滿座自晨昏雨來寶地天香匝風動珠林貝葉翻供養竒花慿白鹿齊分珍果仗𤣥猿從今結却東林社淨土修持禮法門附考院在陶莊宋景定時建賴善卿到嘉禾為豫作金粟道人詩使瀕行曰金粟吟友為元璞尊者胡為無詩走筆一解兼東西白仲銘兩宗匠一笑琦公口有綺語債年來不誦西胡經宫詞在古無師剎野史於今有贊寧劫灰何曽燒汲冢世祚時聞語塔鈴林下寧無讀書者夢中應見伍喬星逰淨池汾水南頭第幾灣淨池初曉鏡光寒漁舟曬䋄日將出酒肆招帘露未乾楊栁淡烟迷隔浦桃花新水漫前灘習家回首今何在風物爭如此地看附考嘉善汾湖之南有淨池蘆墟栁溪諸水逰汾湖分得武字有序至正九年三月十又六日吳江顧君遜招客逰汾湖客凡七人㑹稽楊維楨甫里陸宣大梁程翼金陵孫煥雲間王佐吳郡陸恆汝南殷奎妓二人珠簾金粟也出武陵溪過五子灘詣陸氏翠岩亭觀百嵗棠出鐵笛一枝云江南後唐物也豫為作清江引一弄抵柳溪飲鮑氏池亭過登瀛橋遂步月歸用主人武陵溪上花如錦之句分韻賦詩時期而弗至者茅山張君雨界溪顧君瑛也蕩舟武陵溪朝出五子浦還過西陸家仙童啓巖户棠樹大十圍桃花燦欲語遺我古鐵枝色比修月斧為作古江調江鳥凌亂舞攜之謁龍君湖水吹暮雨晚飲花石岡亭臺已無主瀛橋步月歸竹枝和銅鼓道人早歸來脫冠挂𤣥武陸恆吳郡人分得陵字春風畫舫錦帆乘鮑陸池臺次第登翡翠花枝人似玉蒲萄銀瓮酒如澠泗州寺裏看題竹伍子灘頭聽采菱歌扇斜搖波縠皺舞衫輕脫唾茸凝七星鐵管金為㸃萬斛瑶琴寶作層臂脫珠韝明越白燕衝胡帽濕吳綾推詩奪錦欺三謝俠氣凌雲比五陵醉卧氍毺驚露下芙蓉月浸碧壺氷陸宣吳江人分得溪字翠巖亭下問棠梨上客同舟過栁溪花下停歌聽鸚鵡行間把酒引玻璃緋桃照眼春無賴石洞關雲路轉迷金粟彈筝銀甲冷珠簾度曲翠眉低錦帆捲浪風生座羅襪生塵草被堤屢舞不妨飛野鳥醉歸遮莫報鄰雞梵王臺殿空陳跡鮑氏池亭憶故栖鐵笛吹殘山月白竹枝唱過駟橋西程翼大梁人分得上字樓船載酒汾湖上萬頃玻璃緑新漲玉簫檀板館娃吹銅鼓雲璈仙侣倡凉蜜金盤荔子漿紫駝銀瓮蒲萄釀挑心大舞天魔宫分班小擺花神仗人坐盤陀古翠巖鶴立海棠青錦障醉揮玉麈奪詩魁氣噴鐵龍驅酒將三五朱扉流水香十二闌干花氣王歸來凉月白紛紛湧出雲濤三萬丈王佐松江人分得花字青簾畫舫載吳娃皛皛行雲十里賖湖光逺帶栁溪水春色好在桃源家十幅錦帆風正健一聲鐵笛月初斜玉壺香醪興未盡更醉海棠嘉樹花孫煥金陵人分得如字今朝好天氣天朗隂雲舒湖中朱雀舫花下碧油車題詩過子建鳴琴續相如四美古難具餘歡重躊躇殷奎汝南人分得錦字其詩不傳顧遜吳江人逰汾湖武陵溪上花如錦花氣熏人如酒濃簫聲時倚鏌鎁鐵雲影忽落琉璃鍾小娃傳令覆蓮掌遊子掀篷照玉容汾湖歸來夜何許明月近挂青螺峰陳基字敬初天台人有夷白集三塔寺訪寬老考見前人世難行路禪房獨掩扉鶴飛知客至雨歇見龍歸天地干戈滿江湖故舊稀愧非韓刺史臨别更留衣三月七日過三塔寺留别寬老軺車來往每匆匆此夕相看一笑同軒外竹添千個翠樹頭花吐萬年紅茶烹日鑄龍分水榻近雲巢鶴語風梔子雨肥蕉葉大恨無好句續韓公倪瓚字元鎮無錫人春草堂詩春草堂中隱几坐中有袁髯閒似我謂袁子英欲浮青海狎羣鷗擬向鴟夷借輕舸二月水暖河豚肥子苦㽜我我懷歸半鐺雪浪熏香茗掃榻蕭條共掩扉麝煤繭紙齊梁筆寶繪珍題品神逸洗滌古玉龍眠池臨搨竒蹤淨名室紅蠡掩碧春將酣檳榔蔞葉嚼香甘夜闌更鼓湘妃瑟笙磬同音咏雅南别君此去何草草山為回旋海為倒令威白鶴㑹重來世人胡為易衰老元初真士居嘉禾紫虛觀好與吳仲圭隱君遊今年十月出示畫幀命僕賦詩因次隱居韻題於上鴛湖在嘉禾湖水春浩湯家住梅花村夢繞白雲鄉弄翰自清逸題詩更悠長緬懷圖中人看雲杖桄榔附考觀在海鹽治西南二百步元至正中創楊載字仲𢎞浦城人宣城推官贈丘子正之海鹽州教授珠生滄海底玉韞碧山中夜氣交明月陽精見白虹有材兼重價當代振英風好學由天性能書出化工知名傳冀北作賦擬河東始欲徵揚子旋聞薦禇公隂符難獨美遺教實爭雄絶藝雖宜進竒才事不同交逰傾上國掄選屬南宫鄧禹官初試匡衡對漫通海邦終寂寞學館尚穹崇已注千人録當成五典功星辰皆在水渤海倍浮空把酒歡何限乘槎興不窮文章趨浩瀚物態入牢籠子必登雲閣吾將守桂叢索居彌寡陋荒業孰磨礱弗獲披雲霧惟思對華嵩知音期郭泰流俗易王充江海從兹逰飄飄任轉蓬方行字明敏黃岩人元末官行省參政登秦駐此地曽經駐蹕來秦皇遺跡尚崔嵬採窮滄海無靈藥歸到驪山有劫灰萬里黑風迷鬼國一杯弱水隔蓬萊詩人弔古多遐思落日髙丘首重回阮孝思字維則陳留人春草堂詩海宇升平今一統化日熙熙萬家共孝子堂前愛景長霞絢晴光浮畫棟東風百草映階生緑縟幽叢若新種生意應從樂土滋獨訝芳心露偏重孤衷未足報春暉陟岵仍懷九泉痛每歎歡情不及施觴俎春秋寄哀慟猶幸庭闈慰母慈孝愛深期百年奉祀膳晨昏有㫖甘婦饌中㕑子親供筍穿寒谷忽抽萌鯉躍氷溪暗消凍承歡已自樂無涯願得長年兩眉縱夀酒傾來拜膝前杯面椒花春影動慈容有喜正忘憂佳句無人空入夢衣上朝看碧色新母手辛勤表微縫兒生宛似草根芽長養還因昔培擁母今白髮映顔朱太史升堂有新頌戴良字叔能浦江人元末為儒學提舉有九靈山人集雨夜泊秀州城下憶僚友作晨風變淑景春霞啓隂期雲根結翳翳雨足散垂垂鄙人獨言邁去掉不得維路無行輪聲岸有荒楚滋暮抵秀城下夜泊河水湄遊魚返深渚帝鵑起重基客途玩物理寧不戀所思王逢字原吉稱席帽山人江隂人題董良用徵士釋耕所詳本傳百畝松田十尺廬釋耕為樂野人如隴牛飼卧春犁後水鳥低飛午饁餘殷喪蕨薇原可食秦炎種樹獨存書老豫擬就龎公隱嵗莫相看兩鬢疏張簡字仲簡吳人元季隱士有白羊山樵集周元初來鶴詩事見本傳手把芙蓉攝羽裙飛書南啓魏元君祝融峰頂雲初起借與長風送鶴羣張經字德常金壇人張士德選為松江府判周元初禱雨詩崑崙之西東海東中有一士巢雲松朱顔黑髮神所鍾服食雨露乘天風朝騎黃鶴天門穹夜被紫霞栖崆峒人間有急嵗有凶禆補造化多其功巳酉之嵗夏五中連月不雨何當爞祝融司令百怪叢妖精吐焰天地雺大星出走穹壤紅海水欲竭山為童官僚揭䖍士庶恫焚尫剪爪百慮窮大龍酣睡癡且聾小龍戢戢潜其踪君能獨出超凡庸拔劒起指天南虹噓隂吸陽神且恭囊括萬象羅心胸有書直達上帝聰泥金倒寫不暇封當空舉手祝未終霹靂直下西南峰道人足踏金芙蓉口呼六甲丁與從神龍不興吾不容縱以烈火焚其宫須㬰龍伯施乃工海波監立銀河通桑麻菽粟青且葱野花石竹俱纎濃道人之術孰與同調和燮理偕孤公方今海內殊未雍焦頭爛額愁邉烽煩君為提九節笻直上閶闔躋九重凌風大笑招羣雄一洗宇宙皆冲融馬臻字虛中為道士錢唐人有霞外集送范起之赴海鹽州判分得一字喬木留髙隂多君富儒術分符佐海郡不減江左逸眷兹鄉黨彥餞祖賔筵秩此邦足魚鹽利自氓庶出願言問凋瘵惠化均所恤萬物適生意兹理在得一維時青春深鳥語桑間日懷君鬱素袍返軫守蓬蓽倘寄雲中書飛鴻及秋律寄澉浦楊如山吾聞沙丘之馬黃驪牝牡世莫知九方臯去不復有天風吹我滄海邉忽地相逢釣鼇手論文托契輸心胸傾倒金樽斟緑酒登髙望逺古意多百年之樂能幾何男兒屑屑志不展秋霜滿鬢空蹉跎酒酣眼極情未畢笑指青山歌落日却憐徐福向蓬丘蒼蒼烟浪無消息明朝挂席我歸來西湖十月梅花開梅花開動詩思思君不待春雁回因之一寄平安字鄭洪字君舉永嘉人來鶴詩緑章朝帝駕雲車白鶴升天下玉除赤壁已無身後夢丹丘應有寄來書五鬛松隂秋落落三花樹影夜疏疏琴心三疊蓬萊淺兩翼剛風響佩裾許椿椿未詳詩見栁志觀吳興甲兵之語當是元末人孟姜搗石我昔看山在乍浦傍有石砥臨行路至今相傳是秦時孟氏當年搗衣處老眼拂拭曽見之臨風搔首空嗟咨想當衣成親寄逺持慰杞梁千里思築城未成夫死久誓言從之埋夫後慟苦號天天亦愁長城一倒名不朽秖今吳興尚甲兵三關格鬭殊未寧豈無貞烈若此婦使君當為聞其名君不見望夫山頭人立玉壯士觀之髮如竹附考石在平湖乍浦金玉未詳詩見栁志當湖秋霽海風吹雨過船頭雲靜波光映素秋百里秦山當落日千年霍廟立孤洲蒹葭霜後依漁屋鴻雁風髙起棹謳相送使君人載酒醉歌白苧不勝愁附考平湖縣古當湖市也係海鹽舊治即漢順帝時陷為湖處括異志唐陸府君葬於蘇州海鹽縣齊景鄉當湖則當湖之名已見于唐宋設當湖酒庫元設當湖務李東陽跋聚芳卷云元至正問學正陳遇所葺詩內冇平湖錢永春則平湖之名已見於元明洪武初改為當湖稅課局宣德五年始立平湖縣割海鹽東北境為之治在府城東五十四里治內有天香亭領大易武原齊景華亭四鄉又據潘之恆當湖記云縣東陸地有畨僧曰是當為湖後果陷立縣日平湖言與湖平也後漢志云有婦人産蛟遂陷一統志云白沃史君乘馬走以䇿指湖留東北一角不沒民至今祠之又聞漁人於湖中獲一鐵鏈長不可計舟滿懼而棄之或曰即繫蛟者有十景見後檇李詩繫卷三十八
