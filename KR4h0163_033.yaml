歸徑山白雲堆裏冷難辭鍊得身心百不知試問凌霄峯頂月何人先見上松時送聚之遊黃山七十二灘一客舟上崖不必問徽州白雲成片風吹散三十六峯多露頭落梅零落枝頭春已窮或沾泥土或飄空莫言桃李多顔色盡在東風幾日中山居門前一徑向雲開萬壑千崖腳下來行到翠微深絶處數聲啼鳥喚人回髙庵道人宗泰宗泰字古笠平湖德藏寺僧受法於費隱老和尚時喜濡墨作顛草或作小畫後復往徑山髙庵自稱髙庵道人柯魯山謂其詩凡三變而益進有閲世堂稿苓山夜話時天童報恩二師應召入京春日思雙徑苕溪取道還十年勞夢寐兩度到苓山庭柏依然古苔花似舊斑近聞雙詔下何處有人間無垢寺在天目之麓梁昭明太子翻經處一徑當門細無人竹户開古藤緣殿角老柏舞荒臺日射松鼬走林昏石虎埋斷碑橫古道繡遍六朝苔懷髙庵髙絶懸崖處吾廬向此分鳥啼寒澗竹樵語石牀雲樹裏江光逺忩中岱色紛夜深羣動息天籟定中聞惟仁上人還日本兼呈同門黃蘗和尚孤帆縹眇日邊來積水波濤一望開雲近石焦連合島氣蒸天柱擁蓬萊山王草長青駝出海國花明白象回萬里扶桑心印在從教華夏起風雷次友人海內住山翁韻敢叨海內住山翁無用何妨立下風竹榻穩眠鼾似虎松橋間眺杖如龍白搖絶壁千尋瀑青惜當門三四峯滿架琅函看不盡啼殘黃鳥碧蘿中寄懷虞山髻珠頭陀南疇水湧尚湖平天畔茅堂傍日明半榻琴書髙士傳滿林松竹道人情披雲采术尋虞仲帶雨鉏瓜訪邵平一住千秋忘理亂有時長嘯數峯青重登雙徑六年不上五峯顛聞道松杉幾變遷猶有凌霄一片月清秋仍照法堂前天目道中九月風髙白露寒短笻拉伴出臨安亂餘山店人家少一路花開秋牡丹松阿樵者常岫常岫字蒼林別號懦翁又稱松阿樵者姓鄭其先本浙之黃巖人生京師十五嵗剃染於大千佛寺為法華老人之孫性沉靜喜讀書與人交無貴賤皆敬禮之所居堂前有古松數株吟咏其下翛然自得如是者三十年徙上房山之邃園再遷良鄉𢎞恩寺慕永嘉天台諸山水思歸老於浙髙淡人詹事居平湖得馮氏舊圃為北墅割其中一區招之駐鍚名曰籜藪以戊辰八月入園已已七月示寂其詩髙簡沖淡有郊島遺風居千佛寺有祖華堂集聽濤稿寒濤閣稿墨香幢集遂清堂集住大房六聘山有邃園稿東峰蘭若集寓良鄉𢎞恩寺有復古堂稿今僅選其籜藪詩之一二焉髙詹事淡人得當湖馮氏耘廬舊業分別館一區為余卓錫地漫賦四章志欣感之意寄詹事杖錫窮幽徑居然是辟疆愛鷗先浚水馴鶴亟謀糧金粟圍香國曇花落寶牀嗟余遲暮眼煙月近微茫去郭五六里舟行多板橋到門仍隔水入塢不禁樵荇淨波如拭簧低鳥故嬌長林真得地不枉主人招湖口逺相望松聲靜處聞轉因多痼疾來住此煙雲上藥千年樹嘉苖五色耘儼同香積國與子欲平分學士思歸隱頭陀得遂初紅芽經露軟紺甲帶雲舒徑闢鈎衣石池涵避餌魚漫云中散地疑是小匡廬漫興倩得名園水一灣老梅修竹幾重關忘機且住因鷗狎抱膝成吟待鶴還剩土欲栽蔬脆美新苔任點石斑斕青青黯黯君知否絶勝他家大好山金粟徑桂乃山之幽胡為在原野迢迢越溪渚密密敵椽瓦開時仗好風香氣自飄灑最惜浪遊子采摘輒盈把真隱豈用招匪類必久假悠然傷我情婆娑詠其下籜藪紫籜解別徑分翠環一區茶煙出叢篁乃在東南隅聞鐘知有僧藹藹望若無過橋見蔬圃沿泉問灌夫此僧何所似云是一枯株落盡餘枝葉亦少好皮膚靈隱越嶺來探海內竒湖光山色兩相宜泉流不異臨川日石老猶懷未鑿時魚梵悠揚清曉發綺羅雜遝夕陽遲新逢宸翰褒巖壑千古雲林道可期南髙峯無門洞追悼敷先大師四十餘年懷此地今朝親上碧峯頭攀藤誤入無門洞恍見當時老比丘將之檇李留别霽和尚當湖名勝足煙蘿師本生居我後過縱有園林堪隱遁爭如杖履共婆娑長安路上相逢晚雁宕山前結念多不識何時能返棹江干立待老頭陀山道人行深行深字山年自稱山道人居平湖北郊曲水精舍有寄寄吟局老貽詩次韻世路多岐折勞生未有涯喜君來竹户同我飯松花晝靜忘談麈溪喧過釣槎間身遊物外煙樹望中斜村居不住山居與水居間棲樹下即吾廬窮陬地逺人煙靜好夢宵回月影虛破俗攜鋤栽剩菊試間燒燭讀焚書從他晦朔頻更序自嘆年來與俗疏訪沈補石不遇野色晴開天氣和雙溪溪水碧於羅詩同白也還耽酒書繼羲之可換鵝四海交遊名下士半生磊落市中歌尋君正欲論心素芳草衡門空我過南嶽道人元琳元琳字氐庵乙丑至平湖止於德藏寺自言溫州人從兵間居數年復自海外來紫髯緑眼偉岸人也其全稿未可得姑録其瓢藁數篇妙嚴山房小集小集蕭齋興獨豪蓬門星聚碧天髙曽收蒟醬扶行竹久擲昆吾切玉刀白眼看人懸斗印紫髯許我著方袍少年遊俠渾如昨不覺頭顱巳二毛超質上人超質字石璞居平湖曹溪蘭若秋夜宿三河黃昏依古岸漁火照沙洲秋滿千山白灘銜亂石流推篷光入枕繫樹影移舟不識誰家子清歌水上樓冬關老人通復通復字文可别號冬關老人嘉興胡氏子家世儒者多病出家梵誦之餘咿唔不輟於儒家書無所不窺詩宗浣花書法松雪好事家爭乞之晚年遊東粵歸格律益髙曹侍郎秋嶽稱為畏友資福院古柏用少陵古柏行韻雙林不合生古柏交柯橫掃經臺石伊誰手植自何年拔險亭亭勢千尺地偏在昔失流傳物色人今爭嘆惜再誤田家父老談里人相傳宋景定問院僧手植恐非幾憎僧臘頭顱白昨秋烽火塞江東煙飛金屋連娃宫百年塋塜遍樵採無復松檟撑高空爾非不材獨何幸巋然殿角森幡風輪囷竟謝斧斤厄偃蹇翻成霜露功根深豈必求楹棟招提似假神靈重蒼虬蟠攫陰雲歸寒鯨吼答驚飈送一枝亦足供鷦鷯千仭寧爭下鸞鳯擬叩庭前話已陳西來響絶兹焉用仲書由大梁之雲中二首布帆連夜發報我太匆匆老覺情難别貧看淚不同岸花迎短棹江栁作長風莫過侯嬴里荒涼汴水東皂帽因人重青樽待主寬路逢南客好暑到北天寒詩卷驕征槖鄉心熟釣竿秋風上雙鬢知爾渡桑乾春日松山小磴容深坐苔連醉客茵晚風松落子晴日草浮春石逼孤支屋橋危側過人回看雙屐路又見落花新陸氏西源山舍興披蓁莽入曲塢倚嵯峨樹黑山魈遁天青峭壁孤出林鐘磬少搖檻麥葵多一瞬成今昔雍門意若何答倦圃夏日見懷不見中林使炎颷月再過興傳詩札到愁破草廬多曉色開青雨新涼到緑蘿何當狎猿鶴分榻伴金陀寄梅村先生天曠冥鴻羽投林自有真江湖髙縱酒日月老垂綸黑髮還初服青山奉潔身秋風瓜再熟未許故侯貧戊申除夜擾擾今何夕天涯習俗同髮稀霜後草身逐夜來鴻日赩山雲外潮昏海氣東那知聫榻地亦有佛燈紅寒食懷歸春欲盡忽忽又清明柳暗遊人路花深帶甲城江帆寧我待石瀨幾時平何物禁愁得林鶯囀晚晴同周青士項東井徐敬可過倦圃五首之二用少陵重遊何氏山林韻時公備兵雲中舊識穿林徑重尋故壁書一溪平曲檻萬竹莽精廬果熟呼蒼鼠風晴跳白魚邊鴻多近信強半慰離居興發傷頭白蹉跎恧問年強能驕杖履未敢失林泉里社虛軍壘人煙瘦郭田但令吾意適百感莫紛然懷鶴江客燕邸春林尚記晚香中短棹頻呼野渡東别淚吳亭斜夜月旅琴燕市渺秋蓬誰傳兵外加餐字醉惱霜前過枕鴻容易風塵銷骯髒侯門少為布衣通滕王閣二首千帆煙火章門市逺水低銜雉堞浮髙閣一登窮戰日宜人多在晚山秋棟雲簾雨飛紅葉估唱漁歌起白鷗吳楚茫茫煙樹外滄桑依舊此江州秋色蒼茫歸雁急客心搖落大江橫斷碑無復三唐物曲檻多屯百粵兵衰草衡門髙士里西山返照落霞城思鄉易作登臨賦急浪長風日夜鳴送天然和尚還丹霞出山又見還山日兩地千江一月身熱喝雷驚聾耳客苦言藥盡死心人直提倒嶽傾湫句不動攙旗奪鼓塵歸坐丹霞最髙頂梅花開遍雪前春將之廣州留别南雄陸孝山使君二首凌江南去是羊城崖石溪雲路幾程日暮櫓柔迎宿鷺峽中山好逼啼鶯東風冷換征衣急春草愁連客鬢生真為荔枝紅勝玉叨夫蹤迹易紛更曰歸未遂經時改問爾何為更向南急浪長風如可借翠崖丹壑故須探城髙蜃市連青海山壓蛟宫老碧潭回首兩湖霜夜月一星佛火淡茅庵酬陳堯夫重刺寒灘訪舊船踏莎猶記菊籬偏忩遙林散經時雨厨冷禽窺過午煙杖笠路難搖落後登臨事異亂離前知君未肯論湖海間數飛鴻過晚天南華道上口號二首山上溪連山下田午煙村店接朝煙回岡復澗多疑誤背後山頭忽在前輕雲旋合忽旋開好鳥依人去復回七尺短藤圓笠子一溪行過一溪來石菴師琈琈字石庵楊姓蘇州崑山人得法於徑山費隱容禪師隨侍甚久出世石門福嚴復主海鹽金粟座下常及千衆頂有肉髻髙寸許天下以石古佛稱之塔在臯亭佛日之瑞初山有法語并詩偈行世遊山寺挈杖尋山水鞋香二月泥苔深人未到松靜鳥還啼逺嶠隨雲斷疏鐘隔樹低薜蘿堪結束斜日挂西溪癸已秋同午明兄檇李夜話客中晤客意偏投蕉露虛忩滴茗甌巳向龍池傳白麈漫同鴛水賦清秋梧桐葉落砧千里蟋蟀聲殘月一樓坐徹繩牀忘夜永東城曙色急更籌送古兄和尚住徑山髙庵髙庵栖隱亂雲中雙徑嵯峨望莫窮百尺寒松侵日月千尋瀑布落虛空竹爐茶沸黃昏雨瓦鼎香消白晝風定起蒲團猶有籟猿啼蟲語溼花叢萍蹤道人如曉如曉字萍蹤蕭山人栖隱天台石梁下晚居湖上往來嘉禾善畫竹有萍蹤道人巖艇草春暮雨過郊原遍落紅柳絲無力繫東風春隂何處棲雙燕寂寞梨花小院中行日行日字獨明海鹽人有萍遊草徑峰天慧山居詩和元栯堂禪師韻不談塵世有炎涼靜坐龍山絶校量石室雲生渾似玉地爐火暖灼然香間吟乍嘯風敲竹髙臥誰吁露結霜幽鳥數聲剛逗巧緑蘿忩上艷清陽通微通微字萬如嘉興張氏子年十九出家受具厯參名宿路傍聞叱小厮云看汝藏在那裏去不覺躍然大悟得法于密雲老人主曹山復住龍池順治丁酉冬示寂與本徹禪人䇿杖尋君偶上臺白雲深處見歸來隔年記得談詩處門外刺桐花乍開通乘通乘字石車金華朱氏子草六嵗棄家受具逺參天童密老人機契得法繼席金粟宗風頗振出住童光將示寂僧問此後向甚麼處與和尚相見師曰遍界不曽藏僧作禮曰恁麼則向者裏與和尚相見去也師曰莫錯認泊然而逝簡黃端伯司理料理荒厨飯甑空深山索處即空同修書逺寄黃司理愛爾忩間紅蓼風老僧霜作髭鬚雪作眉衲衣不怕朔風吹間拖拄杖過橋去流水聲中訪阿誰徐斗支斗支字梁父嘉興萬夀宫道士有蜀道吟荆南雜詠敘州逢鄉客留飲南溪古僰國信宿也相宜月白山當户風輕水滿陂鳥呼秦吉了藥咀五加皮萬里逢鄉客銜杯話所知歸舟寄朱子蕃春江自蜀來半是岷峨雪千里下江陵山山響鶗鴂性琮性琮字白法嘉興楞嚴寺僧有剩草夜坐新涼微月上雜坐小庭前莫更燒明燭飛蛾絶可憐淨洢淨洢號願菴原名丁元公字原躬嘉興布衣晚嵗從古南牧雲學佛題畫木芙蓉吹遍鯉魚江岸風露條霜蘂一重重謝家池上秋容潤十里長隄間白紅靜挺靜挺字俍亭仁和人康熙壬子嵗住錫嘉善慈雲興建叢林改教寺為禪寺有雲溪近稿十笏齋詩鈔採薪行西山日苦貧竹木摧為薪採薪猶自可村里虛無人彌望春郊絶青草渾無樹枝托飛鳥厮養小兒大如天紛拏路人捶路邊路人抱頭仰空泣囊中攫去官稅錢船子望之捨船走行船那敢出渡口東村老媪伏斷垣少婦含涕都不言貿貿逺來誰氏子白金深裹衣帶裏徒卒奪之不肯與奮刃一擊路傍死蕭條百里罕人煙舉目川原倍可憐黃昏隂黯鬼火照清宵但聞猿狖呌錢塘懷古青丘西郭水連天慶忌孤墳落照偏夜夜海潮飛白馬年年江月度烏鳶越王臺榭愁荒草吳苑笙歌泣斷煙七十二峰零亂後只今依舊采蓮船東浦橫連第一橋御園煙鎖晚風飄櫻桃露重浮金碗楊柳春深度玉簫波湧兩湖漁火亂沙明十里馬蹄驕傷心華月髙樓近郊外青旗久寂寥秋雪菴秋空一片白雲迷夾岸蘆花雪嶺齊迢遞梵王宫闕裏曉鐘飛度隔溪西𢎞言𢎞言字文逺號簡葊秀水人弱冠披緇吟咏成什後證心印於忍堂傑公有澗菴草過苕帚精舍贈怡中和尚楓林曳䇿步猶輕四顧紅黃列錦屏香稻穫殘分鳥啄蒼松積翠引龍經慿闌話古追苕帚倩壁題詩作砥硎壁間晦山和尚東蒙居士有題咏愛摘新蔬深欵客不知斜日傍沙汀禮忍堂先和尚塔荏苒流光屬夢侵重來墓木拱幽森生機簇簇峰頭見古路條條腳下深旋繞靈幢薦勺水恍於淵默聽雷音慣拈一喝聾人句個話誰能契此心木魚頌靈山玄要許流通枯木龍吟貝葉風幾度斜暘敲不盡滿庭新句落花紅陳泓泓字白浮嘉興萬夀宫道士有榔梅居詩藁寄鄭子擴暇日相期蕭寺東別來三月巳秋風朝來載鶴船人報極浦芙蓉幾處紅墨禪師銘起銘起號墨菴文學沈中畏孫原名起字仲方於東禪寺出家好遊覽著書甚富嘗曰明之亡不亡於流冦而亡於厰衛因撰明書絶筆於成化十二年秋始設西厰又學園集八卷續集一卷宗門近鈔二卷康熙壬戌病歿越明年曽學使王孫葬於東禪寺之東南隅三噫歌有序溪上計起三先生自號為蘆中老人抑聞蘆中人之風而興起者乎抱道終身賫志以歿墨子起有感焉為賦三噫之歌噫彼蘆中人遇兹漁父不以蘆中老亦唯漁父噫惟今之人兮漁父為誰宜終老於蘆中兮沒世以無知沒世以無知噫噫我行蘆中經春與冬鼓枻中流將安適從噫惟今之時兮此老為誰感蘆中之茫茫兮一往其莫追一往其莫追噫噫東溪有蘆西溪有蘆溯遊從之為有為無溯洄從之非夫斯夫噫又烏知其所之兮曽不我思庶蘆中以為期兮朝亦以為期暮亦以為期噫南都行君不見南都形勢何其雄九門天闕凌鴻濛又不見長江汗漫千萬里江流直接蓬壺宫髙帝精靈尚慿此龍翔鳯舉紛來同我行正值秋風老夜報羽書天未曉壯年伏櫪徒悲鳴擬將投匭長安道長安健馬指當國之姓食粟肥長樂歌鐘待漏稀滿堂窈窕矜神麗别樣新裁大內衣龍灣鼙鼓江波急秦淮絃管追遊集司馬阮大鋮庭前傳殺人中書門下招舶客犀貝珊瑚不計錢鮫人緬人貢竒特此時離宫門始開沉沉紅日鳯凰臺永巷宣傳桑落酒洛中忽報媫妤來掖廷真偽難陳説俄聞帝胤潛東浙乘傳京師臨百僚東宫舊臣驚蹩􅍷是日沖人歸內廷頃刻神龍變為蛭微蛭拘囚龍莫稽都人肝腦為摧裂只今淮甸誰最尊名藩乘障比雲屯出入不由天子詔黃金填咽通侯門江南江北如敵國史相名可法孤軍不遑食精誠訴天天莫聞一似汾陽間廢日國法可刑犴狴髙空傳龍種尚垂髫天家疑案懸九鼎旅人一夕顔為凋送倪鴻寶先生入都詔進兵部左侍郎兼翰林學士聖朝方側席兵事重兼文司馬平邦國非熊獵渭濆韜鈐今用老朋黨爾離羣此後煩神算無忘宵旰勤廣陵寓中海陵太守陳函白貽我南金十二鐶逆旅由來非細故商歌為爾一開顔秦中冦盜兵戈際薊北風塵夢寐間只合傾囊同客醉賣漿屠狗未曽間平沙厯厯下橫塘遙憶幽人水一方旅次相思餘縞帶春來香夢浴鴛央崑崙夜曲誰消息湘漢遊雲自渺茫依舊孤清慙窈窕滿庭寒玉到琴牀檇李詩繫卷三十三
