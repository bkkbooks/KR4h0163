body:
  text: 檇李詩繫卷三十三平湖沈季友編明筠隱禪師大遂大遂字梵印號筠隱萬天間平湖乍浦會濟庵僧覺承講主之法子有出林草小萍菴曰遂公潛蹤林樾景企前修或時托寄長吟不覺詞意俱逺可與齊已並駕也贈朱白民山靜猶空劫惟將木石親肯居於此處豈是等間人寫竹賣供米刪松破作薪只因尋異藥衣染别峰塵西山道中懸壁杖難容盤旋青萬重到來深竹院行盡數聲鐘瀑挂雪邊雪雲圖峰外峰此中皆靜者日暮不相逢林栖當簷林靜立老屋破從遮作梵鄰聽熟翻經風攪差地生無種藥瓶活不根花偶與雲同出歸吟任月斜猿聲懊恨應無爾臆侵胡為清夜發哀吟三聲豈是羊公碣一淚惟沾楚客襟秋漢月明悲更切朔風天冷怨尤深誰能聽此腸非斷只合間僧不住心鹽官道中風緊孤帆只半懸近村才動午時煙倒波獨樹枝猶活傍道交蘆葉不全聚石牧童堆野竈過橋漁婦上溪船日長未是殘陽候人説鹽城已在前柳沐雨梳煙千萬枝春風挽住定何時青窺鏡裏愁人眼翠染機中織女絲柔舞難容鶯坐穩輕搖易惹燕飛遲可憐嵗嵗章臺路腸斷忘歸遊俠兒秋扇莫以涼風多棄捐敝篋裏試記無風時是誰引風起冬日淮上懷了能凍斷黃河與月河行人馬上帶冰過惟君生得梅花骨獨占江南曖日多無礙老人大持大持初名持衡字圓印號薝蔔吳江人雲栖剃染受具初住桐鄉華嚴庵次依竹寮住密印寺後居郡之無礙庵為詩文俊宕超逺如幽巖邃徑賞音者爭愛之有佛華院録負鉢草問答語無礙庵藁初居無礙庵錫倦依苔壁松髙挂鉢囊始知心地穩翻見水雲忙夜黑鬼生火天寒雁呌霜深林人影少日月似鴻荒贈王粹甫入竹避生客家人無處尋燒琴成獨響拜石作同心花底白衣酒雪中黃面吟有時修小節醉不到東林過沈明德慮君倘早出却覓尚眠時客可科頭欵咒能彈舌持掃氷去鳥迹敲雪起花枝竹裏一幽徑寧容俗客知普善庵謁舷師老年一不好松竹對間身或以無師智相酬有學人雪明難曉夜梅凍易寒春已簡形骸禮中誰是主賓溪上同孫孟朴溪上幾叢緑多從新雨生足於清水濯路在落花行竒石即思拜好山不辨名柳條莫盡折借與倦啼鶯出郭出郭未半里滿船青載山岸危不長樹沙亂欲無灣直路雲梢去斜陽樵背還已知箬下水清可鑒吾顔村居三首荒院無金磬誦經石可敲苦虀何異藥破屋不如巢一受田家供因多桑者交洗蔬莫剩葉流出恐人嘲僧來逢雨漲欲以笠為舟行腳非騎馬安心須牧牛破村無大樹剩水有清流衣絮不憂薄蘆花雪滿洲未及開新徑行由草莽間尚多無事事但得不間間竹欲潔頻濯樹須髙屢刪田灘風雨後亦有小潺湲過朱文寧太史莊居素心相與老只有此田鄰種竹惟知冷移花不在春口恆存死友門怕報生人丘壑如堅臥國風誰一陳過黃葉菴未知有水可通船先問桑田細路偏門帶夕陽敲樹底人隨宿鳥到籬邊癭瓢再食便終日禪榻初安已老年地不近山無怪石夜來留得斷雲眠秦駐山山靈曽受始皇鞭松至而今不仆顛天為濤吞無北限地因沙湧有東邊下灘黑剩先秦石對岸青髙舊越煙非此雲牙撑海角稻畦或恐作鹽田廢褒能寺枯松亂竹一丘陵曽此開堂演上乘瞰祭鴉如放生鳥掃墳人似逺歸僧剎竿倒處見翁仲鬼火移時替佛燈片碣欲書間姓氏不知敕賜有褒能廣育廣育字扈芷四川人住嘉善大勝寺有東塔詩次答茅止生元戎見贈韻十年重屈指只此泠然心看劔雌雄合論文今古深鳥歸黃葉影蟲吐碧絲吟不少知音者還揮霹靂琴卞玉陽談故山有懷不聽猿聲已十年偶隨孤鶩下斜川山中别後無他憶只恐長松礙月圓病癡道人廣衍廣衍字雪音秀水普菴僧聰慧爽拔詩格清瘦早攖癘症而夭徐明樗梓其病癡稿黃葉老人為立傳遲五雪幾回驚出犬空吠雲影常疑船進橋日暮還來溪上立乳鴉如葉綴寒條如山如山字鷲峯秀水天寧寺僧陳眉公曰山公匠心刻意語多警拔真秋潭的骨弟子也有碧蓮院稿落日落日即朝旭升沉似不同明霞流雜綺芳樹隱微紅近壑欲垂水在山疑觸峯眼前道不出更聽一聲鐘題黃葉菴黃葉菴居老所宜梅花清瘦最相知地餘半畝多栽竹屋只三間僅著詩乳燕坐簷驚夏早亞藤上樹覺春遲聊將垂意新蓮社月到門前擬鑿池大定大定字一印海鹽福業寺僧有浪錫草新涼一雨洗庭竹微涼覺頓生亂螢移濕照小鳥在巢鳴葉有先秋意詩多入夜成自堪髙臥足日已報忩晴大生大生字等印海鹽資聖寺僧見十印社草初夏訪趙凡夫巖扉皆掩緑客至不知迎習靜小成坐翻經微有聲竹隂如水淨山氣學人清莫謂吾多事因難負爾名大受大受字朗印海鹽天寧寺僧見十印社草小萍菴曰受公矯庸激腐探景副情洗削鉛華別生孤調然亦不自知其出入𢎞秀集中也息柯亭亭緣幽士築額借息柯稱路鑿山根上忩開樹杪憑甕泉専飲鶴下榻半留僧役役風塵者何年得此能照源照源字道生號氷如海鹽人住秀水古井庵小萍庵曰源公乍耽律韻遂冨篇章茹藻含毫時發清響有雪林草挽大年法師影堂燈永夜想像似安禪授法兩三子深心二十年矮松才挂月新塔已生煙氣結更何語徒為歎逝川題指月庵短扉將緑掩小徑倚村斜老樹借菭葉新桐布屋花漁歌傳外港鷗夢立前沙靜者離言象門題指月家落花飄零思雨露撩亂點蒼苔苦被風常掃因傷春鬭開嬌鶯歌緑轉癡蝶想紅來事盡如花事榮時瘁亦催法衡法衡號秋巖海鹽天寧寺僧有竹西齋稿咏雁嘹嚦天邊羽離人靜夜聞雨寒孤夢短風急數行分北去歸龍塞南飛度嶽雲人間多矰繳髙舉莫離羣過趙凡夫山居選勝探竒境相將采石英前峰如地湧隔座得天平松響疑風雨雲深失晦明還嫌葛衫薄五月太涼生照楞照楞字鏡玄秀水寧慶庵僧遊黃葉之門有松月軒稿水底竹影回溪日澄湛竹影倒寒清如簀竹間立何因水底生鳯來栖不得魚過觸還驚每日微風起湘君夢裏聲𢎞已𢎞已字孤雪秀水普善菴僧舷公每誦其除夕詩云百年猶一年定有今夕時輒愀然改容秋雨灑竹驟鳴秋易知兼風況打敗荷池茅簷一夜溜聲裏想起石梁聽瀑時景定景定字寂生秀水報恩寺僧有香露菴草子規呌道不如歸不知家何處春歸花亂飛何事不歸去海旭海旭字竹浪平湖東林寺僧有蕪林草小萍菴曰旭公清真孤上簡默沖夷怡神淡漠之鄉創句物情之表遇其得意不知司空表聖于武陵諸公何處著腳也宿甘露菴舟出太湖險語溪投暮鐘聽風多在竹看月不離松柝護城三里雞鳴村一重長安明日路宿草滑歸笻遊趙氏居小港難通棹行知經幾灘敗荷還立雪寒水不生瀾掃石容苔瘦栽松待鶴安梅花如有月借我一宵看雪溪上人圓映圓映字元徹號雪溪嘉善西林菴僧鋭志教理作詩清新崇禎間居平湖乍浦與李潛夫唱和有西林焚餘草小萍菴曰映公雲移梗轉鴻迹風蹤凝神茂樹底覓句清流邊設遇靈一處默猶當雁行並邁也初冬同社過陳山寺出郭見山瘦翻思春獨來雲間過水淨楓老學花開人影夕陽裏松隂古殿隈龍泉堪煮茗分坐石為臺秋草護蟲吟月苦襯馬滑蹄行螢火燒難死霜花落也生誰傷當路踐自怨不春萌獨有秋江上離離動客情挽玄珠上人殘燈耿耿夜何其虛室空悲禪坐時草載形骸孤鶴弔一生心事故人知雨添郭外沉龕草風涸忩前洗硯池白社曽同秋後集而今惆悵泣題詩智旋智旋字瑩密號松濤嘉興圓通庵僧有寄林草夏日過雨庵未識西行路誰知對夕陽得菴松翳暑坐石竹分涼庭有佛花發池無魚草長蟬聲齊閙柳惱亂我詩腸成受成受字戒滿嘉善人嘉興螺潭院僧秋夜坐到燈殘月又明寒蛩泣露若為情已知去日如流水莫恨秋風白髮生一漚一漚字冬江秀水精嚴寺僧萍菴法子黃葉翁云漚為人魯鈍有確志作詩峭秀雪嶺孤松寒泉瘦石年二十而天有鏡月稿送環中遊廬山匡廬竒絶處歷勝證前人以杖開雲路將衣抖世塵瀑飛明鏡膽峯戴礙吾身問取於中住誰知面目真德藴德藴字五雪嘉興興善寺僧從萍庵遊問為詩律新藻有致送友入匡廬一條竹錫健於龍踏破匡廬雪萬重别後我如天上月照君禪坐在深松濟深濟深字慈筏秀水金明寺僧早夭黃葉翁稱其慧性好學即事清晨放棹城東南歸宿城中百尺潭夜半老龍作人語驚破夢魂春雨酣清梵清梵字竺音秀水東禪寺僧有半秋稿嵗暮期友不至欲悉經冬計歸懷誰與裁早期雲外錫共掃徑邊苔夜永鼠方出鐘殘月又來寒梅似相慰橫過一枝開寂瀾沙彌寂瀾字法孺秀水天寧寺沙彌吕文懿公之裔作詩秀雅善行草丹青燕紫燕來春社銜泥補舊巢不嫌茅屋冷肯與作貧交病馬今日方知行路難垂頭顧影怕金鞍儘教伯樂能調養恐有當時指鹿官斯承斯承字景山海鹽慈會寺僧贈崔潛叔仙蹤暫隱白雲層大膽雄心似五陵幾度東林風雨過山靈常護讀書燈普福普福字可中桐鄉密印寺僧烏程人窮僧破衲不掩肘破瓢不住寺帶月望冢歸和霜藉草睡正賢正賢字三石海鹽天寧寺僧海上晚歸潮落平沙望眼空夕陽回照海城紅鑑明秋水芙蓉老歸棹乘風入畫中明來明來字亘南秀水通濟菴僧樵夫惟隨麋鹿羣運斧斫秋雲和擔束雲去歌聲隔嶺聞志淳志淳字恆嶽嘉興東塔寺僧徽可之孫小萍菴云英機敏發詩多警語有雜華林草春日過月公蘭若孤村相叩嗜禪翁一徑春風到寺中人語悄聞楊柳緑鳥啼幽出杏花紅經殘瘦坐焚香起茗熟傳題得句工足迹不留簾外土小庭深寂雨空濛照旋照旋疑即智旋見禪林詩輯小萍菴曰旋公沮貧履巇時發悶語深情酸楚豈堪再讀掃苔久雨滋苔力青錢塞徑荒掃之空夜露留也待秋霜鶴迹冷無襯龜行滑不妨斂歸林下去護菊久含香智道智道字生一號環中嘉定僧挂錫秀水三塔禪栖崇德西林小萍菴曰𥪡義談經世服其辨發藻吐詞屏袪凡近有紫芝社集池上嘯動清池藕葉風孤懷欲絶句初工偶然月照無言處疏磬一聲松閣空心寂心寂字含虛嘉興興善寺僧春郊景物逢初霽郊原擬畫中柳開新眼碧花綻舊心紅嬌鳥鳴幽樹遊絲撩逺空春光知幾許吾欲問東風小萍庵文貞文貞字蓮生晚號夢堂桐鄉人秀水精嚴寺冬溪之裔孫從秋潭老人遊得其詩法善為景句亦工書著有萍菴草藻影雜藳嘗取吾郡詩僧裒其遺藳勒為成書曰檇李禪林詩輯附以已作大持序之以為禪源學海各詣精深一時同社楊若木陸叔度沈明德丘叔遂輩為之點定行世送汪黃海還新安新安西望空行李帶秋鴻馬足髙低路人衣草木風母慈開口笑弟舞説心雄此最非常樂勞勞莫便東與楊若木駱天遊夜話久别忘如憶相逢意更深言多交後夜情苦見中心病葉風條響哀蛩露穴吟不須悲未遇自古少知音答蒯周生秋來情況淡無滋一枉緘題慰所思不改長貧存舊友却經久病識新醫形疏現影何殊鶴髮短蒙頭乃類絲楓葉湖邊霜待月相期莫漫又愆期秋潭師黃葉庵落成二首一瓢一笠挂西林不負生平有此心易補髙低籬作障難分新舊竹為隂瓶添水滿澆松大杖撥雲開引步深愧死吾儕諸弟子相依難學樹栖禽不貪幽寂不辭喧野外茅堂可省煩求法人穿荒冢路放生魚過小橋村雲將白繞間排牖草引青長靜掩門深更深山只如此花開花落更何言林璧林璧字竹憨吳江羅漢寺僧久住嘉興王江涇歷寓具足清逺興福諸精舍能詩善書畫山水竹石俱得梅道人筆意而寫竹尤工性嗜酒乞其筆墨者必攜一樽餌之竹裏一衲濕空翠蕭蕭竹幾枝茶聲和葉細琴響瀉泉遲拂石人初靜窺林鳥不知徘徊有同調刻緑半成詩秋夜與友人别莫謂相知晚應憐野性投哭非傷逺别酒不