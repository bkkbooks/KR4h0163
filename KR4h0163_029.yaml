body:
  text: 檇李詩繋卷二十九平湖沈季友編國朝維風先生魏允柟允柟字交讓孝子學洢子當孝子卒時妻嚴氏年二十七截髮自誓允柟孝養備至既沒刺血寫經里人皆謂孝子之後復有孝子栁州詩學之盛均奉柟為主盟陳増新云體合雅騷義兼正變吾邑近來風氣日上實開其先李煒亦云天雞始明曜靈啓途人倫之弁冕風雅之先驅其推重如此有維風集有所思佳人邈難見逺在天一方夢想覿音輝彷彿接容光文犀為君門紫貝為君堂珊瑚為君枕玳瑁為君牀駕言我所思山川淼以茫方舟雖利渉道逺不可航何以寄相思篋中雙明璫早秋遊北園炎夏駕云邁涼飈發新秋爰有同懐客招要出行遊修松交宻䕃嘉木翳崇丘時禽變好音雌雄鳴相求綺疏結長軒户庭一何幽攜䇿登高岑揚舲眺中洲芳荷映綠池遊魚激清流良苗亦懐風逺烟輕且浮為樂未須㬰白日忽巳道弭節薄虞淵丹霞夾重樓聆彼蟋蟀唱聿為良士謀賞心寄所宣使我忘百憂豫章行嘉樹挺竒植托根于崇山上葉蔭通衢下枝俯流泉蕃衍非一朝賦質固已堅霜霧萃其條鳥鼠穴其巔車徒憩道旁行者為美觀匠石需良材執柯過我前根株被斧斤顛仆大道邊嗟彼山下樹樛枝互糾纒堅脆何可恃寜爾能獨全願為朝華草榮落任天年七哀詩炎運覯陽九羣盜肆陸梁中原盡淪沒烽火遙相望宫闕成荆榛草木𤣥以黄離獸東西馳羇鳥不成行登高發長嘆感慨心内傷出門何所之去去適他鄉他鄉路阻修川途浩縱横孤兒啼草間思婦怨青陽呉會為邱墟無復冠與裳言念生平交睽隔天一方逺望使我愁佇立以徬徨寶綸篇有序予内兄周子茂蘭故明吏部忠介公長子也忠介公既罹黨禍崇禎改元周子與同難諸家子伏闕鳴寃俱得褒䘏故事追贈不及三代周子引會典例凡死忠諫者贈先世如其官疏上報可於是皆給三代誥命予先人亦䝉䘏典焉追贈之及三代自周子始乙酉天兵下江南潰卒四竄封誥盡失周子呼天自責以為宗社既淪先人誥命不可復得矣居無何有武人縵纓雙鞬從甲騎至門請見周子周子度不可謝延之入執禮甚恭曰僕某標將領也竊慕足下義甚髙部下卒從某處得先大夫封誥數通欲歸足下久矣今幸得謁因出特授周子周子大喜酬之以金不受而去人咸以為周子孝感云余因作寶綸篇以紀其事泰階不平三光瞀君門九重虎豹怒吾祖時為珥筆臣朝上彈章夕禁錮崇碑已列黨人名吏部周旋若疇素金吾使者來吳趨少年投袂爭相赴公也慷慨謝故人檻車北走長安路陰陰土室對南冠碧血青燐向誰訴須臾帝座日月明兩觀誅竄鵷行清賜環初雪九原恨箕尾迢遙朝玉京孤兒拜疏嚙指血天子動色羣公驚䘏典下頒尺一詔詞臣彩筆抒生平係倪文正公視草重淵一介草茅士珥貂三葉俱列卿椒漿桂醑弔毅魄萬人㑹葬看佳城銜書丹鳳五雲下闗西大鳥來悲鳴只今荏苒二十載白髪朱顔不相待牛衣猶是泣王章駿骨無人憐郭隗曺彬一旦下南唐盧循幾隊逃炎海處處潢池桴鼓鳴村村萑澤弓刀駭剽掠兼擕紫誥行蕭條空有青氊在草閣俄驚鐃曲吹雕弓白馬來者誰手持錦軸前致語君家舊物今在斯重寶誤落黠冦手吾偶奪取還相貽揮金出門去不顧道旁觀者皆稱奇我聞此語長歎息鬼神訶䕶非人為吁嗟乎鬼神訶䕶非人為凛然正氣天地知君㸔字字皆碧血展觀覺有霜風吹贈淮上李條侯兼夀其尊人長淮東走入海流淮陽城北黄雲秋中有竒士李條侯少年意氣凌滄洲讀書喜學萬人敵擊劍常從俠少遊下車但揖朱亥輩入坐不乏陳遵儔西泠吳生與余善自言曽識李生面縱酒每登南昌亭走馬時過下邳縣方今四海無風塵遣君半世居貧賤干將未拭華陰土已有光芒中夜見李生有父夀且康萊衣鳩杖同徜徉李生有弟不可當精采奕奕神飛揚安車蒲輪㑹有時且調甘㫖娛高堂三山宫闕在咫尺坐㸔滄海鳴枯桑憐余夙昔事章句三十年來少知遇生平願得肝膽交路傍擾擾安足數浮雲不蔽長淮路渺望淮南叢桂樹他年結客豐沛間握手登堂拜生父古意蕩子戌龍城倡樓月自明綺疏蟲網合碧瓦昔邪生萬里金微夢三更玉杵聲遙傳鐃吹入含笑下機迎從軍行堠火甘泉急徴兵合虎符枕戈霜下臥負弩日中趨漠北逢歸雁城南聽曙烏横行萬里外不羨執金吾塞上曲都尉方乘障單于未請和帳懸孤月冷烽雜曙星多絶漠還榆塞揚兵渡栁河軍中横吹曲新奏白狼歌宿華山寒法師禪房偶爾㸔山色攜笻到上方鶴從珠樹出龍向鉢花藏夜壑流清磬春雲䕶石牀逺公棲隠處日夕坐相忘拜文文肅公墓一拜先賢墓還生故國悲松楸依舊壠土木廢空祠鴻隙歌來日平津客散時石湖秋色暝隂雨夜迷離贈余澹心佳麗江南異昔時馬卿車騎暫棲遲丈人安坐誇三艷客子窮途賦五噫到處池亭非舊主何當縞紵問新知天涯行路難如此故國春風且下帷柬侯硏徳春風結客向呉闗把袂江亭别淚殷海嶠不傳青鳥信疁城遙望白雲間已將名姓留南國莫使移文到北山挿架嵇康髙士傳可能千載一追攀李秀才炳炳字令文號燭崑煒之弟醉後放歌左把浮邱俠右拍高陽徒鷫鷞碧玉珮脫付酒家壚酒酣耳熱雙眼白仰天長嘯歌烏烏有時射獵南山下渇飲黄麞血轆轤快意當前無不作惟不能作噉名客膩顔裙屐低兩眉把臂逢人論肝膈覆雨翻雲俄頃間奔走百年更何益古人白骨成青苔李志曹蜍安在哉且為買盡山中酒浮名于我如塵埃登峴山荆南峴首悲羊祜苕上登臨亦此山風景未因呉楚異興懐同在亂離間光浮碧浪羣峯逺日暗黄雲宿鳥還賸有羣公尋逸社芒鞋藜杖一追攀沈秀才椒衍椒衍字心仲嘉興人素以俠聞而隠居寜都曾畹偕秀水陳莢訪之東村入見曾張目問漢書數則椒衍哂而條荅之曾謂陳曰此豈特魯朱家耶即㸃鬼簿爾我勿若也雜感顧影徒慚鬢已絲浮沈身世竟如斯貧嫌節候迎人早老怯風情倚枕遲舊雨知成招隠賦新愁頻展感懐詩寒燈夜館凄涼景沈水烟消月落時陸秀才埜埜字我謀號曠菴平湖人少與趙沺陸葇沈皥日陸世栻陸來章沈隆峴稱當湖七子日擁書嘯歌不染塵俗著有曠菴集七哀詩有序抱病閉門幾絶人世追思曩日交逰道兼師友者半已凋謝徳音猶在而墓木已拱不禁涕之欲墜也友道日非好學積行之士不可復見以此思哀哀可知矣作七哀詩穉農倜儻生早歲遊燕趙論交㢘藺前結客荆高表才高數何竒國歩方糾擾筆削竟誰任孱弱力難討脫身歸故里著書頗不少落落南村路林菊自窈窕藜藿長苦飢恥向時人道玉樹土中埋長夜不復曉未聞遣所忠誰為収遺草右錢南邨士馨仲木東海彦卓犖洵絶倫厥考太常公嶽嶽社稷臣棄地計不用慷慨獨致身令子奉家教友讓聲克振鄒魯道云邈朱陸委埃塵抗心尋遺緒微言啟後人憶昔避兵日相聚依水濵流離淚欲盡患難情彌親死者良已矣生者徒逡廵右呉仲子蕃昌孝㢘第一流意氣何瀟灑不屑五陵豪深心托大雅筆落自驚人著述追董賈對䇿金馬門一枝終不假峻節邈難儔曲高和乃寡汪汪千頃波誰能澄淆者龍卧或在淵虎變亦於野名盛時未遇道廣心彌下滔滔東逝波日夜無停㵼斯人不可作三嘆淚盈把右沈孝㢘日昆孫子真隠士浮家托友生獨尋千古業了無人世情談笑頗自得四座覺風清忘年與我交歡好若弟兄生寓主人園死葬園之側一坏宿草荒墓道誰與識撫琴心自摧解劒意何極楓林秋蕭蕭燐火夜惻惻巫陽不能招白雲黯無色日暮山陽道平生空相憶右孫西陵之琮篆鴻美少年矯矯青雲器芝蘭挺堦前已見光華異竹馬共遨遊美酒壚頭醉得句各自矜先鞭恒並轡自謂金石交寜知中路棄白日浮雲掩朱華嚴霜墜繐帷既以除三徑蕪不治一歌薤露辭遂使心憔悴右蔣文學瑑北郭佳公子翩翩獨豪舉性僻不諧俗矯首思古處卜居水之涯蒹葭蔽孤渚室邇人自逺邈然莫能侣往來方外人瓢笠無定所時復談風雅唱和共爾汝松風山上來窓牖竄蒼鼠身死竟無兒寂寞自今古右馮涌齋秉恭復仲天下才聲名冠江左意氣攬豪英寜肯親圭組丈夫貴快意黄金視如土破産不言貧屢見塵生釜文章既軼羣丹青復媚撫遺俗有高踪鄙彼寄人廡南陽羅浮巔烟霞恣所取旅櫬何時歸蕭蕭江浦雨右黄麗農子錫述舊二首空聞四鎮擁淮徐誰向沙塲發羽書䖏䖏龍吟聞畫角朝朝鷁首醉清渠雲迷滄海征帆滿月落長江戰壘虛一劍横磨留碧血至今風雨不消除右黄侯得功相國雄風振栁營維揚百戰決孤城秋風屢見帆檣動落日空悲鼓角鳴五丈原前荒草沒八公山上戍烟平忠魂定逐靈胥去終古江濤拍岸生右史公可法蔣布衣禹錫禹錫字尚陶嘉善人少罹患難而有沖愉之色隠居著書以樂其志有漁村稾過㫖新蘭若僧舍臨溪水幽然絶世塵庭空雲拂席窗迥鳥窺人揮麈天花落鳴琴月色新寥寥何所詣閒坐㸔松筠夜半聞雨懐徐初鄰客舍三更雨離人百里情長吟看燭盡高枕聽潮生稚子詩應積元卿疾未平何時書屋裏梅影拂樽明楊處士炌炌字彦方平湖人兆梧次子予姑夫也少負儁才偃蹇不遇年二十八卒丙午曾館予家流連久之今錄一詩不勝人琴之痛矣柬友白雲遙訪故人樓雁字驚傳萬里秋梧雨三更曾入夢楓江八月正同遊尺書潦落憑殷浩杯酒飄零識馬周醉罷茱萸相憶否呉山指顧説南州柯舉人維楨維楨字翰周一字緘三聳季子康熙乙夘舉人有澄烟閣詩望仙亭和韻峻嶺落天風遙凝碧漢通鐘鳴高樹杪人語亂山中雨過奔泉白雲開射日紅從憐巢鶴去丹竈久應空朱砂菴贈佛峯和尚朱砂峯畔曉霞紅杖䇿經過謁逺公檻外泉流穿石壁簾前松子落天風雙林迥出雲烟上五老晴㸔紫翠中邂逅談心難遽别數聲清磬下寒空遊嵩山羣峯高挿太行東絶磴縈迴一線通勢壓三川横地軸位尊四岳表天中明霞晚映芙蓉秀翠壁春懸躑躅紅攬勝已憐多逸興更聞鸞鶴下長空途中雜咏山開隆慮容馳馬路入韓陵好射鵰滿飲芳醪人不醉鄴城東望正蕭條李秀才鏡鏡字無塵嘉興人新晴歸自苕川春隂散逺天歸路下苕川未盡山中雨還流石上泉微風吹細草柔櫓蕩寒烟客思重回首菰城斷嶂邊馬伯子辰御辰御字青蓮平湖人萬方子有絳雪亭集語溪道中一望柔桑色人聲近語溪狹流聽水急高岸覺篷低野槳如飛鶩春蠶盡織綈當年呉越路石壘尚凄凄家㕘軍公歌姬稺春善琵琶忽驚玉折為詩輓之空傳樂府想夫憐惆悵秦簫鳯去年料爾多情歌宛轉還隨司馬伎堂煙李秀才寅寅字曉令嘉興人有視彼亭詩存錢子湘過别積靄蔽晴暉相逢忽啟扉竹邊移舊榻花裏換春衣饌值黄魚出簾當紫燕飛留君應未得風雨送將歸雲陽道中初見楊花雨餘山氣夕陽銜栁絮濛濛逐去帆有客江潭怨飄泊東風莫遣到征衫王秀才庾山庾山字咫岫平湖人早卒有詩未刻過沈仲飛園亭詞客秋風裏登臨意渺然彈棋春賭墅載酒夜鳴絃松逕堪攜屐溪流自放船啼鶯如有意不斷落花前病後過西林萬公山房北渚難為别西林復見君一燈秋落葉雙樹晚畱雲講席應先到鐘聲似舊聞頓生空外想身世絶塵氛呉秀才雲龍雲龍字希淵石門人負竒嗜古才氣横溢時三呉子衿頗難入彀希淵於風簷走筆作七藝一賦一序十三詩頃刻而就文不加㸃補弟子員然久因鄉書貧益甚時從里中博徒遊不羈自放顦顇而死憶癸亥歲與予别于鴛水執手躊躇譜蘭陵王一闋悲歌以為别予歸而希淵亡予有詩哭之因嘆文章在天地間非若金玉錦綉之可衣食也而富貴人得之每不富不貴貧賤人得之則愈貧賤必使之摧挫磨折以老造化忌才豈其然乎擬李翰林宫詞曲檻飛鸚鵡流波浴鳯凰侍臣垂貝帶協律度芝房月似班姬扇雲疑帝子裳承恩嫌粉黛含笑弄明璫葉舍人舒崇舒崇字元禮呉江人寄庠平湖為人英敏美丰儀望之如神仙中人入北雍登康熙丙辰進士選中書舍人戊午舉宏博未試卒大梁咏古剰有離宫認舊畿宋家艮岳尚依稀江南怪石堪停輦塞北飛塵易染衣獨對金門交羽客共將玉液供安妃空壇髣髴遺仙響猶説君王夜醮歸懐宋牧仲小閣紅燈亂舞衣留髠幾度夜忘歸最憐聽盡箏郎曲繡被薰香漏巳稀周貢士珂珂字越石嘉善人康熙戊午歲貢和瑞竹居詩綠竹高百尺乃在庭之垂勁節摩蒼天翠枝拂幽蹊借問何為爾主人前致詞昔年家仲子斬竹架薔薇上有霜雪凋下有螻螘居自謂終萎絶何期忽華滋二載發新篁三載去故枝十載始森茂仲子遽長辭竹枯有時菀人逝不復歸覩兹手植存能不懐慘悽余亦聞此言泠泠有餘思起視明月下竹影正參差折楊柳弱栁三眠日流鶯百囀時春風如有意搖曳忽成絲花下銀驄繫月中玉笛吹為愁君北去不忍折南枝秋懐遙聞仙仗出金溝滄海波澄靜不流日映朱旗連鳯沼風迴錦浪夾龍舟銅盤露冷三更月玉杵寒生萬戸秋獨有離愁江上客不堪重聽古涼州虞御史兆清兆清字鑒斯號岱淵在欽子康熙已未進士知四川綦江縣事督撫以廉能交薦授湖廣道監察御史在任二年卒著有素業堂文集蜀行草雙山雙烈辭有序綦生楊霏璧妻郭氏楊霏玉妻李氏明季遭㓂亂殉節雙山邑人任立相有詩紀之霏玉子岱乞余詩為作是歌楊生再拜前致辭示我雙山雙烈詩憶昔黄巾起闗隴長蛇封豕連巴䕫綦雖彈丸寇亦至膾肝吮血街横屍二母堅貞志不辱雙山洞壑相扶攜挺戈大索那容避弱命遂與刀鋸隨奮舌罵賊激賊怒白璧寜碎不可緇迄今承平歲已久追維往事摧心脾請公一言重九鼎泉壚光賁無窮期我聞此語興感慨培婁松柏池蛟螭秦城百二連楚蜀高墉堅壘多降旗播州蕞爾介蠻僰磊砢節義偏呈竒天地正氣秉賦均纓鞶何必殊鬚眉夏侯截鼻王斷臂况乃生死須㬰時同時羅陳二幼女溺波觸柱甘如飴未若一門出雙烈氷玉相映存綱維我作歌衆莫悲雙山高嵯哦萬古名長垂生其留此作琬琰永興疏傳邯鄲碑龍角溪弔王閣部墓公諱應熊巴縣人明季以閣部督師討賊卒于永寜軍中槀葬此地上將新推轂殘黎舊沸湯力難支大厦躬合瘁危疆桐爵圭空析明封長夀伯松莊徑久荒在渝城巴渝遺老盡誰與發幽光蟂磯孫夫人廟孤盤峭磴俯寒空帝耦神靈縹緲中豈有河山延漢鼎尚留刀劒表呉宫三分城闕金陵月百轉帆檣鄂渚風斷碣摩挲尋軼事欲將信史續江東碣稱漢主之殂夫人悼慕而殞過涪州纔經内相憂讒地又見伊川鈎黨年天地無私容放逐山川有幸遘才賢黔江南映牂牁月僰道西浮越嶲烟猶有物華堪紀異海棠香足茘枝鮮忠州迎春詞青旗簇隊曉衙開萬衆歡迎新守來盡説今年春最好治平蚤放數枝梅治平寺有古梅仙子蘭香佛栁枝采蓮舟亦載蛾眉裁來蜀錦皆新樣何必巴童遜越姬修文門外毳㫋鋪素帳紅緌色麗都蠻榼提來爭勸酒引藤香味勝屠蘇引藤州産可以吸酒綦江迎春詞牂牁按舞夜郎謳亦有勾芒伴土牛借得四街羅綺徧不妨粧飾象渝州元宫棹楔石巍峩征播曾經劉綎過綵隊繽紛殊自笑可同當日羽幢多元天宫發春擎來甸榼自南黔鹿胛初炰兔首燖辛苦鹺商勤酌醴銷伊富義幾斤鹽富義鹽厰在富順縣柯秀才炳炳字煒昭𢎞本子讀書能深思語言必楚楚有風致堯峯汪琬以為沈靜爽拔煒昭兼之年二十三以病瘵夭詩名蘭唐集詞名笙囊瑣語幼時作小詩有牀前花影好但恨不能攀之句識者以為詩䜟寄沈客子鸚鵡湖邊相見時愛君標格羨君詩曉風楊栁張思曼初日芙蓉謝客兒多君珍重新開宴玉壺㫖酒金盤膳片片緋桃拂舞衣翻翻紫燕衝歌扇此際同登蘭葉舟此時同上弄珠樓紫裳花珮弄珠客夕陽遙望空凝眸今君别我燕山去千金駿馬昭臺路才華欣值右文時揚雄却似相如賦丈夫富貴不足言欲得君臣㑹合難凌雲自昔誇殊遇努力中天振羽翰霽園蘚榭蕭條在莎亭結搆疎㸔山嫌樹宻愛月喜窗虛人影連歸鷺泉聲和讀書諸君恣吟賞牋翰各紛如沈秀才嵕嵕字華九平湖人隨父皥日官栁州始學為詩未幾入都沒于舟次有楟花草江舟峯脚倚村郭篙師説栁城山形標虎立江勢折龍行一水宜州坼千家古堞横險灘羅計近波吼暴雷鳴遙輓仲孫舅曾倣文山謌古詞每傳吾母是嚴師翠峯羣玉如相見為説何甥近轉癡張布衣宗信宗信字以純號石琴平湖人有素閣吟釣臺羨昔嚴夫子披裘隠富春雖然不釣利名巳上鈎綸沈秀才蕙纕蕙纕字馨聞秀水諸生從錢清江泛舟至越城作芙蓉被洲渚秋山帶長川客行亦何為愛此風日鮮蘭舟既容與桂檝相迴旋波平靜不流澹蕩任自然遙觀越王城杳靄飛綠煙鴛央愛翠羽弄水明湖邊越女能棹歌采菱復采蓮覽境意巳適把竿心忘筌願齊漆園叟三復秋水篇八咏樓八咏樓頭月遙臨百丈江林疎齊落葉山逺忽當窗水市聞樵唱風鈴颺佛幢醉眠無不可須藉玉為缸徐布衣寅寅字虎侯嘉興人工書精篆刻有名於時海昌陳氏四硯歌何者製硯稱最佳獨數端溪老坑石拙閒堂中慣收藏藉以縹囊大盈尺四硯一一如連城卞和氏璧錫以名象形命意各類此摩挲瑩潔如天成主人書法工無比健筆猶龍墨池起春蚓秋蛇未足云字曰龍池良有以其一膩理石色勻宛若遇雨林宗巾擬之折角毋乃是拂拭且喜無纖塵蟾蜍之形更竒絶天上分明應圓缺歐陽石屏猶不如月窟疑從羿妻竊吁嗟四硯天下無銅雀古瓦何為乎狂呼至寶入我眼興來捉筆為君書徐長洲𢎞炯𢎞炯字長旭嘉興人康熙間官長洲知縣有勝讀齋稾宿白沙驛淡月娟娟白清江曲曲流春燈明水驛秋竹隠孤舟山筍餘朝食殘樽話客愁寄書南過雁應念此沙頭䖍州與黎玉耑鬱孤臺畔水分流歲歲花開送客愁買得芙蓉雙寶劒與君同上古䖍州沈布衣是是字去非平湖人生平謹信老為塾師有稿未刻即事老去城南更卜居歸來邨落伴樵漁春山碧樹啼黄鳥秋水澄潭縱白魚稚子快當新病去山妻耐可薄愁除寒雲結影圍牕牖㑹見先生讀異書獻臣叔有浦東之遊示詩數章率爾奉荅英雄終是薄神仙亂後溪居傲頴川老大經營渾漫興秋來還上載花船過懐木菴示盡心松吼二上人丞相祠堂亂草生尚書墓隴石碑平夕陽落盡心中事夜半青松吼一聲陸太學士煒士煒字昭文上瀾孫好學工文弟士琰康熙甲子發解而煒終困名場鬱壹以死藝林為之扼腕著有蕉侣遺草送家平仲之思州二首君去悲歌上楚臺秋風蕭瑟動餘哀跨鞍仗劍男兒事莫戀文園舊酒杯漠漠黔中接大荒天涯裘馬試輕裝錦屏山畔多蠻女笑看東吳白面郎徐秀才拔慧拔慧字子開海鹽人忠烈公從姪孫入籍海寧縣庠有嚴師堂遺槀立秋日集拙宜園得青字碧梧一葉傳新令相約賓朋到舊亭泉石載更餘古木滄桑幾厯剩流螢生涯且付杯中緑心事難邀眼底青莫怪狂奴仍故態秋風蓬鬢歎飄零沈封君志高志高字幼升嘉善人以子辰垣貴得封查溪考見題咏數道奔流急晴光緑浸扉一天秋氣逺幾樹暮煙微漁子風移棹歸人月在衣茅檐無晉接車馬自應稀陸太學世栻世栻字古璣號仁山濬睿叔子平湖縣學生援例入北雍屢試不遇乃以觴詠自娛有西臯剩稿洋河洗馬篇洋河之水流大荒黄沙漠漠煙蒼蒼洪濤疾走千巖石急浪横飛六月霜六月霜飛水清冽健兒驅馬洗汗血千騎萬隊儼雲屯八駿七良驚電掣雲屯電掣下龍沙銅爵晨鳬白鼻騧金絡縱横攅竹耳元蹄繚繞翻桃花元蹄繚繞邊風起振鬛驍騰緑波裏天鳬駭浪似飛鴉紫燕旋空同躍鯉駭浪旋空渥水湄五雲散采體淋漓疑是龍媒標銅柱更誇神駿刻瑤池瑶池銅柱傳往轍豈意騋牝盡超絶廣漠長嘶落葉飛陰山亂蹴層氷裂此時圉人拂錦韉此時將軍懸玉鞭長驅意欲歸金埒行向沙場復轉旋轉旋形勢猛于虎擊柱悲歌空起舞男兒躍馬須封侯學劍不成良獨苦邨居八詠之二家住西臯絶送迎羅蘭半畝帶煙耕有絃不撫輸元亮無刺堪懐傲正平髙臥方知身世大幽棲始識物情輕一燈紙帳凄清夜夢到梅花斗自横熱不因人滅更炊臨流何必暗生悲千秋誰重無瑕璧當世爭傳没字碑騷筆牢愁同蜀客詩腸木石遜吳兒閒閒縱説林栖好三匝鴉啼未有枝南邨詩逸錢萬里萬里字章逺號秋厓松江人為人疎懶沖淡天真爛然予姑許字之未嫁而卒遂僑寓禾中後歸雲間退處墓廬自號南邨詩逸其詩翦刻鮮凈措置清稳如秋水芙蓉亭亭自逺但每脱一稿于敗紙零落中隨手失却故多不傳為可惜也除夕旅館傾椒酒酣謌燭淚埀艱難為客易寂寞覺春遲寄食慙顔面依人度歲時髙堂雙鬢白羣從賴扶持懐翁紀長翁子文章伯飄零極可憐但垂城下釣誰給酒家錢才大偏牢落時平獨播遷九峯歸未得頭白鵡湖邊聞施孺人之訃賦寄令子大文客子江湖每嘆索居頻報訃書來益愴神與爾各懐終古恨憐予猶有北堂親煙封馬鬛期將近奩鎖熊丸跡已陳一束生芻雙涕淚相看俱是素衣人悼亡旅食梁園方黯然歸來紫燕已成烟驚心道路輕千里抱病房櫳定幾年玉尺金刀閒永晝清燈疎磬失芳縁蘭巖終古棲雙鶴腸㫁松林霞舘邊日靜粧臺蛛網塵崑邱那復輾飈輪但餘簪珥遺諸侍始信鴛鴦誤早春隻影忽分兄妹逺十年未字舅姑貧胷前不帶懐仙草那得芳魂入夢頻又絶句二首空聞落葉哽寒螿久巳甘心短布裳碧落茫茫人竟去小姑不是本無郎為悟無生結凈縁時時蓮座禮金仙早知一死終難謝何事沈吟二十年題沈秋浦畫故事小影六首東山絲竹由來山水有清音萬籟蕭然意自深何必也乘安石興教成歌舞費黄金醉草清平名花傾國倚春暉賦罷清平興欲飛捧硯有人頻顧盼定應憐爾不勝衣北平射虎芸香辟蠧日悠然皓首窮經自可憐願學隴西猿臂種短衣射獵度餘年臥遊赤壁蒼茫白露正横秋萬頃波光一葉舟獨自叩舷孤夢醒前身應記到黄州採菊東籬飄然逸致似淵明時向籬邊數落英知爾有才誇八詠閒來為我賦閒情羊裘垂釣水碧山青野鳥哀多君也把釣竿來故人誰是劉文叔何事披裘坐釣臺上已後八日集大文齋時鶴年醉甚予復圍棋因記二首燈炧香殘覆玉巵暗聞花氣月盈墀忽言詞客風流減㸔取郎當被酒時更倚微酣較奕遲莫因勝負幾回思只愁别後臨空局相對茫茫未有期薛秀才珩珩字楚玉一字艾菴嘉興庠生隠於醫有醫案諸書刋而未竟悼亡憶往難忘執手期孤燈背影去年思泉臺若復能相念細雨斜風獨坐時陸秀才頴武頴武字慧逺號賓菴平湖縣學生寒夜雨過幽庭寒氣加殘燈無焰落霜花浮雲與月何嫌怨纔得明時又被遮朱貢士彞叙彞叙字範臣茂時長子秀水縣貢生以孝友聞于族黨再集秋水菴得農字病起無心䇿短笻故園魚鳥笑人慵特隨嵇阮諸賢後更喜羊求二仲從逺寺鐘來塵慮息中流櫂出晚烟濃相違浴佛明朝是避舍將毋學老農沈秀才貫日貫日字子丹平湖人翫月和顧雲馭先生韻耿耿孤燈客未眠千秋皓魄只依然江湖有恨難同照人事多傷此復圓靜對山窗瑤瑟罷寒生竹砌石牀連幽懐莫謂無知者幾許清輝繞碧天袁秀才揆燮揆燮字岳咸號漁山嘉興人工詩餘有華烟初集詩不茍作守其尊人丹六遺訓五古必學漢魏律必盛唐惜全稿散失惟從雲山酬倡中節錄數章而巳夏日平逺閣讌集林園洵佳麗未與人境違遊憩當溽暑軒庭多涼颸白雲擁茂樹丹閣俯清池石榴曜朱明菡萏凌炎暉游鱗戲澄波倦鳥息高枝憑檻瞩西郊極目何凄凄古道垂楊少邨落烟火稀牛羊下邱壟臺笠瘁新菑征帆半徭役驛馬馳若飛兵荒苦連歲飢饉多仳離伊余耽幽寂邱壑每自怡盛年詎可再行樂須及時主人誠愛客暢飲不知疲綺里居即事繞屋樹婆娑寒烟鎖薜蘿一峯常特立三徑少人過細草當堦發飢禽入户多無能耽寂寞高臥且長歌雨窗同徐臞菴小飲不是南州徐孺子誰憐土室久離羣烟霞片石渾忘世風雨清樽且論文廿載知君高白雪千秋許我附青雲眼前人事同碁局長掩蓬蒿醉夕曛陸汶川洽原洽原字嗣開號話山平湖人弱冠負才名凡試闈之標幟名社之壇坫咸推重之後以貢授汶川令當蜀道極邊羌畨錯處悉心經畫四載艱歸遂不赴補築真曠樓茂修書屋極池亭山石林竹花卉之勝讀書養生罕與時人接年八十七卒有絳雪齋槀玉堦怨清秋桐葉下憶昔合歡裁針穿七夕巧繡作雙鳯迴流蘇凝艷藻麟文拂輕埃瑪瑙相思薦沈香百子開承恩當桂寢侍寵夢瑤臺朱顔鏡裏去白露歲華催恩絶昭陽駕愁滿長門苔人情新間舊天運樂生哀疇昔君恩重空慚獻賦才孔雀吟嶺南之山誕彩禽錦霞閃電縷織金山雞小文不足伍嘗思鳯凰相追尋九苞五彩未敢擬威容璀璨神氣欽離羣屏俗自矜䕶人間物色羞垂顧歎息巖阿藏不深網羅一旦文章悞雄飛振振終莫馴晨曦照影金光吐天成傑性難委蛇清風延頸遲雲路珠膏玉屑弗忍餐區區飲食何勞哺余聞雌伏道家謀曷不依徊學順柔牢籠無計辭君去羽毛蹇落易生秋沈氏讓繼讓産有古道焉歌以美之狂飈吹折紫荆樹原鶺翻飛分異路同巢共本忽摧殘世人那得求其故古人重義不重財今時棄義如塵埃推梨讓棗竟誰属况復紛紛爭似續我湖沈氏舊門楣玉昆金友並肩隨忽焉第五奄長逝傷哉伯道多哀厲伯也有姪當嗣之崩心涌涕前致辭牽裾有母離不得心存揖讓無覬色仲也承祧序有人恂恂少子應其倫皇皇望望心無極盡辭遺産歸弱息兄弟情深生死同交推互讓古人風猶兒故自呼諸父續嗣還當如所怙莫歎悠悠世路乖邱山大義動人懐園居古木㕘霄漢迢迢納逺風地衣當晝濕天鏡過雲空幽借山棲並吟非枯樹同盤桓未䏻去人影綠陰中官舍雜咏岷峨極塞接青雯路闢蠶叢境始分臘雪隔年猶下水秋山終日不停雲方城斗大烟嵐滿冷署氷寒鳥雀羣更喜遐陬仍簡畧從無案牘藉神君羌女盤頭戴野花畨丁洗足踏泥沙身纒罰帶紅綃捲腰挿昆刀電鍔斜上代羈縻同属國聖朝無外即天家須知保障宣恩逺雨露何曾别犬牙輓呉扶九西風颯颯作秋聲二尺孤墳草欲生故友於今半零落好從地下說交情宿灌縣千山厯盡下平岡繫馬斜陽草舍傍一片黄茅遮廣漠獨留虎跡印清霜白牛村人栢古古字斯民號雪耘居近嘉善之白牛村因以自稱寓遊平湖者最久能詩善書議論所至信口而談晚年益自放揖耕牛曰是不素餐者或塗脂粉為婦人裝曰非此不諧俗甚而佯死驗友人之哭與否鄉之人拊掌呼為栢癡而不知其意之有所托也後喪婦喪子女乃笑曰此天之將成我志矣遂遍訪匡廬天都林屋諸勝欲往而不返焉未幾卒於湖清風涇升阜采嘉卉何必伯夷薇涉水釣鮮鯉何必子陵磯心逺隔塵域崔嵬踐危機綢繆因牖户雨細花芳菲種秫造濁醪織布完春衣率性全真趣舍此安適歸搆一椽於清風涇黄九煙題曰栢學士茅屋從杜少陵舊題也即步杜韻涇水洋洋可釣魚棲遲絶似碧山居詩交杜甫千秋上春老陶潛五柳餘學士清風還拂拂野人茆屋豈渠渠年來巳辦漁樵事徒有家傳太史書臥月古松流水間擊楫歌已歇高枕納清風滿蓑散明月虞貢士兆滏兆滏字虹升兆清弟康熙甲子副榜貢有軒渠詩藳冬雷入臘已旬日喜見煖氣浮土潤水蒸溽蟄蛇啟户游靉然沈雲合飛電光四流靊霳奮神武匉訇散鬱幽陰陽日回薄大化難推求斤斤推䜟緯陋彼甘石儔望岱宗嵳峩特立勢無倫作鎮東方自古尊桃峪春陰蒸雨脚蓮峯翠㵼動雲根金泥玉檢憑誰覓宋嶂唐碑可尚存一十八盤凌絶頂便應呼吸到天門邵太學翼翼字汝為號沖菴平湖人延齡少子太學生亡年三十有柘農集送王復園南旋次周白門韻一泛秋江客夢清銜杯乘月放舟行他山梧葉辭風下隔岸蘆花帶雨生尚有田園供健飯還栽松菊學逃名歸與恰好題餻字慰我詩郵兩月程陸盧龍楙楙字林士號匏湖深原子垂髫補弟子員試即冠一軍貴人則揶揄之以故浮沈燕邸者十年康熙丙寅謁選得盧龍屬兩京孔道輪蹄蠭午且多宗室貴戚莊旗人例不得用笞杖乃削木挺挺之兵弁有强買者輒捕而置之獄于是咸震懾勿敢動官署蕭然如禪寮旅舍有僧以佛事請之府府笑應曰而欲我屬之典朝衣縣令耶卒以强項忤罷官歸遂卒有詩訣親友曰而今一枕繩牀好方是人間歸去人楙于經史無弗窺而獨好揚子雲書其詩文曰鵲亭稿劖削町畦穿穴險固以造於峻潔而後止話山叔齋對牡丹書懐三十驅京術四十訓軍牙六十吏邊圉槲笠帶雨拏往䇿微有佩審言如胸哇道仄行豈易杌杌無安車良苗猶襲暵竄礫遲捜爬宻期疑可蹈輟食手三义終慙衛足智漫漶櫻橫罝業蕩禍乃巳徒步還空家鍵門削人跡縁蔓繇滋芽顧彼貧寒炊力折誰為嗟漏屋行題劑山田且負耞伊予季父者落築城東窪累石布卉木亭廡宛窺遮垂當恢台及堦芍朝雲赮置酒呼羣姪狎坐傾杯蝦得休﨑嶇身拭襟陪歡嘉捷語躪隅曲淺醉留餘譁未達富貴理徒㸔富貴花酬天岳上人二首岳公攜錫去千里接幽佳問訊三生石貽詩一字齋冥鴻回墨篆江草屈書釵不劚匡山徑名高未任埋邁物非無寄離塵不任名真山分虎住越澗與人行晨磬通虛麓春瓢洗巨泓石根聞勝義矯欲黜迷情栁二月曲江池牽人栁正宜墮綿斜莫管裊帶錯還施水澑毶毶眼風裁曲曲眉春禽飛不上猶是未眠時戲咏水晶丸日下能藏影空中畧有模熟摩氷雹滑乍結水漚枯属紙懐焦燄承巾恍濕濡老夫雙眼鈍㸔汝只如無寄示子弟早識長安行路難那堪留滯又無端愁中白髮驚人老眼底青氈待汝寛十説精勤傳季子六書渾雅有宜官年來不少鱸魚興督亢秋風七月寒東湖冶泛和仇滄柱宛泛平湖垂暮天西風晴采畫樓烟山迎人面舟移坐月照花身酒入筵相問漘車邀弄篴一時洛咏掩歌鈿遲從燕賞虛幽勝未遣風流付蜀箋猫纖睛團頰白獅猫錦索銀鈴擁柘條為有樓頭紅粉喚不隨雙蜨過溪橋戲題到官雨打羊髯帽去職風搧鹿膞裙為語邨黎休掩泣黄堂好作送窮文徐秀才之福之福號斗錫字櫧山秀水諸生族世貴盛以結客故家日貧嗜酒引杯吮毫千言立就人有丐其餘潤者傾筐倒庋弗吝也後益不得志敗絮決履往來鶴湖漢塘間雖氷雪風雨行吟自若止則索片紙錄之隨手失去不復問卒困頓死有二子亦俱死交遊莫有過而問者南湖秋興千古南湖水偏宜此夜秋清樽邀皓月桂檝蕩中流露溼汀花秀雲寒古木愁美人天際隔蕭瑟罷登樓聞雞不覺聞雞唱方驚旅夢殘風高城角動月落曙星寒袖裏書羞獻堂前鋏倦彈萍蹤何日定撫枕淚珊珊阮公祠阮公遺澤未全忘古廟巍然大道旁半壁河山歸指顧百年父老說金湯彤弓早掛新開府白馬猶嘶舊戰塲瞻拜勞臣增感慨手芟秋草弔甘棠南田留别滿溪蘋葉泛新秋旅客何情傍翠樓日落高城歸鳥没樹連平野亂雲愁十年漫寄梁鴻廡八口思乘范蠡舟蘆月松風㸔不足夢中應作舊時游丙午紀事二首朔方禹版畫雍州天設秦闗扼上游統萬城含沙月白赫連臺壓海風秋七襄織錦輸江右萬騎黄金出帝邱痛哭敢陳三表策儒生須識大官憂石隙乾坤帝制雄蟠江丹嶂截飛虹貔貅豈料從天下螻蟻焉能鬭穴中五郡牙璋新禹貢千盤巖壑舊蠶叢于今海㝢車書合青幕非邀一戰功南塘曉發十里鳴榔樹影稀秋風吹度曙煙微生憐不及鴛鴦鳥一任雙雙臥釣磯陸御史隴其隴其初名龍其字稼書平湖人居泖上少食貧授徒以給専意聖賢之學而一折衷于朱子康熙庚戌進士授嘉定知縣邑劇難治以德化之訟者無不感泣去吳下侈靡風為一變尋以盜案落職後總憲魏象樞舉亷吏十人隴其與焉有㫖復原官補靈夀庚午上諭舉科道員九卿薦之擢四川道御史罷歸屏跡邨舍布衣蔬食泰如也越數年而没題靈邑南寨村佛寺亦是聰明奇偉人能空萬念絶纖塵當年可惜生西土未聴尼山講五倫題墨菊近來紅紫千般色不是東籬舊日裝著筆只拈濃淡墨好留真氣伴風霜放鷴道者李延是延是字期叔號辰山上海人少負逸才善談論熟于舊家典故及諸瑣碎事雲間舊話録其詩文曰放鷴亭稿露抄雪纂晚年黄冠草履自稱道者二子早喪遂無嗣年七十忽病作命龕趺坐而逝齋中讀書結廬西漾陂披雲攬邱壑絶塵自奔軌翰墨欣有託寤言聊獨賞古人良可作非必琴酒娛頗得詩歌樂達生貴知命引興在寥廓微陽明夕扉窈窕青山郭雅坪山房用東坡送孔郎中韻草木餘年厭奔走頭童齒豁衣履垢開簾忽發葡萄香老饕據座驚左右清露將流夜合花斜陽且挂晴川栁諸公詩成如湧泉時到會心一㸃首生平漫説扶桑丸逍遙似勝步兵酒不嫌屐齒頻到門㑹挾匏尊供喚口青士將北遊至當湖言别留詩有志士不羞生業㣲之句因口占荅焉志士不羞生業微衡門詎免寒與飢憐君老去頭巳白跨驢北走雪欲飛浮名誤入時賢耳嘉遯難憑舊釣磯縱横㑹挾三寸管紛紛詞客爭相依别余胡為三歎息濮老汪生能自適濮老汪生皆工詩而隠于市井青士詩中及之燕臺按騎花驄驕呉江刺船野水碧天涯且各事飛潛尺書莫惜傳消息咏君别詩感寸心男兒意氣自淺深沽來斗酒還盡醉蕭蕭落葉風滿林倚聲寜少三叠曲顧影那在千黄金明春土膏動薇蕨縱未南歸夢解尋集西溪山房分得規字白社將投老支公是舊知微波初似縠新月漸成規且漫言吹劒臨濟有吹劒用了急須磨句何勞問立錐寄聲陶處士此地莫攢眉過宣和嶺至義烏界追憶先師孝廉徐闇公先生相期卜居處聞説烏傷界前期似夢中四圍青嶂合一道白雲通棲隠終難遂飄零轉易窮先生沒于潮州門生頭白盡無路哭遺蹤大報恩寺别張南邨垂栁絲絲挂夕陽百花春映遶迴塘他鄉杯酒臨岐酌一曲相㸔各斷腸時布衣達徳達徳字長民平湖人有和施仲芳先生梅花詩百二十首缾梅斗室凄清事不聞膽缾何處得幽芬入門時見烟雲客據案頻窺氷雪文蝴蝶枕邊身栩栩麒麟爐上影紛紛不須更踏芒鞵去春色江南昨巳分沈太學乘乘字洪縡平湖人信子有匏落吟集項王妾有序武平五年彭城人開項羽妾塚得道徳經一帙及傳奕考覆道徳經諸本項羽妾本亦在其中此妾好視簡編且以殉葬亦一竒也秦政焚竹帛英雄薄詩書季矜馬上得羽以姓名嗤何彼綺羅質研心反在兹柱下五千字閨中獨得師我聞老氏教知雄守其雌何不説老蠻項羽小字曰阿蠻當無垓下咨抑或叱咤主不可進言辭彭城葬者是何年劃溝霸業猶未湮免使英雄悲逝日不共虞兮喚可憐神劒埋幽有時出惜無姓字與人傳岳王祠孝女井黄龍未飲詔抽輪三字含寃千古呻弱女偏能存大義天王甘自號藩臣萇𢎞碧化銀牀影精衛魂填玉鏡塵不是鐵欄留舊蹟岳家故第已難詢井上有鐵欄刻孝娥字今按司署宋為太學舍係岳王故第也以井故截出立岳侯祠胡秀才申之申之字令修夏客之子世其家學順治辛卯中副車尋以目廢精岐黄術兼能服食引氣嚴冬單裌無寒容性嗜書先世存稿刋布不遺餘力盲坐斗室左右前後擁書數千卷凡賓戚子弟至輒命抽帙朗誦一過闇解應荅疑義如流舉鄉飲賓七十八卒有復菴心在錄壬申元日舊病小愈書懐此身復健今朝始百病都從昨夜除已分窮來文莫送幸驅愁去酒仍餘木何巢不栖良鳥架有書惟飽蠧魚泉石本無軒冕意謀生長筭在樵漁巢雲主人姚敬明敬明字景滌嘉興人太學生兩舉鄉飲賓晚號巢雲主人有虛白子格言鴛湄小集諸刻四桂堂小集昔過陪佳賞今來續勝遊天香雲外落仙馭雨餘留厯代多秦晉聨吟是白劉麈譚霏玉屑映徹一輪秋沈山人麟麟字友聖松江人與呉梅邨龔孝升顧西巘為忘形交妻彭少君亦能詩唱和甚夥壬申僑寓當湖祗林諸弟子相從學詩不踰年卒于北寺之昇震房汝寜司理彭公罷官後作此懐之罷官仍謂拙巧宦總難為一失山中足常愁世上眉名原因自立清已被人知便學陶彭澤須裁歸去辭追舊雜感羽毛零落嘆㝠鴻十載乾坤吾道窮徒使少年譏賈誼每於高隠羨龎公浮名滿眼矜巴曲大雅何人問國風可識江河流萬古後先十子記嘉隆偕隠空懐大小山頻年搖落感塵寰桃花萬樹仙人宅秀草三芝逸士闗嶺上行雲㸔縹緲枕邊流水聽潺湲風流四皓知誰是自許畱侯共往還讀七子詩信陽北地久沈淪剩有婁江一曲新我學濟南操白雪不知誰是和歌人詞壇季重舊知名白璧堪償十五城誰念憐才成黨錮至今空憶漢東京陸貢士攀攀字威咫平湖人楙弟康熙丙寅拔貢工書善琴兼精岐黄之術為詩縱横兀奡頗肖蘇梅著有易義枕上吟樹根文殊像得之五臺山僧五臺古樹蟠杈枒幾刼山中雨鬘華蛟龍穴石五千仞善根不受諸泥沙文殊説法忉利上厯厯白榆依瑞相忽然倒影落青冥印入祇林自成像老樵腰斧若猿猱掀蘿擔取儕蓬蒿歸來夜半霹靂聲圓光照眼怖欲逃蒼虬脱鱗木蘭裂中有文殊身似雪莊嚴螺髻妙無倫純漆㸃瞳香海澈南來有意伴長耳應與肉身笑相視古佛法相總天成刻畫丹青徒幻詭人言此是真文殊我來瞻禮撫掌吁聊作轉語開䝉愚是相非相何别區萬川月影皆如如浙江潮倒㵼銀潢接大荒禺强不受走錢塘白横一縷遙拖線碧湧三篙陡峙牆直有雷霆翻地軸更無魚鼈上河梁吟毫粗寫瑰竒狀親見還應走且僵病起一臥經旬瘦更狂喜清聊復起徬徨破除久溽吟齊女擬答高秋試索郎醉裏行藏消歳月胷中磊塊入膏肓素心何事初來雁不省拚飛逐稻梁宿雨初收薜茘乾欣然坐對碧霄寒花含薄曖嫣如笑樹裊輕雲秀可餐老驥摧殘闗塞晚秋鷹横絶海天寛倚闌無限登臨意寶劒璁瓏獨自㸔沈太學中棟中棟字隆九桐鄉人以太學生操選政有主敬齋論文諸刻詩宗石湖劒南亡年纔二十五見螢火空庭時見碧螢流散帙空幃影亂浮風雨忽飛潘岳思江湖偏伴杜陵愁小明自照聊應爾腐草含光得自由上苑即今多瑞露可能再向景華遊秣陵雜咏浪遊未得買歸船料峭春寒旅思牽閒補秣陵風土志新年門户貼花牋長干古寺墖崚嶒乘興摳衣一再登不管人間興廢事孤僧自禮佛前燈陸秀才枝山枝山字仲孫原名世權平湖人補秀水庠生博學工制藝年三十三卒讀孝山伯兄思州諸什漫成二絶高臥長餘五色箋重攜琴鶴到南天衡陽雁盡無消息贏得新詩幾百篇粤吟纔罷復黔吟此地離情黯更深好似少陵䕫府詠孤城落日故園心牆東居士項奎奎字子聚號東井秀水人少補弟子員久躓塲屋工詩精繪事自稱牆東居士年七十嘱友人葉燮為生壙誌銘有晚盥堂詩學武林翁康怡進士于呉橙齋所見余黄葉邨莊卷謂得古人之法詫為必傳以宣徳紙徴畫藉銷長夏并題而歸之巖阿絶䆗窱鑿翠愛樓居貪㸔雲霞色采芝隨荷鋤神仙那可得時復近清虛同時馬文璧獨稱黄一峯烟墨曾無多遂分蛭與龍旦暮得懸解妙悟定所宗過盛匏菴溪南新築拈菴字彷彿蘋洲與菊潭櫓搖指㸃過溪南偶因興僻閒鋤地便許心空老結菴索笑琖中遊妙伎放顛花裏得真㕘眼無俗物身無病宻邇天倪仔細探李竒峯案頭供蕙蘭一枝較夏月所開特痩余仿於便面意頗生動寫山樓上膽瓶中蕙草秋來痩不同硯北香生茶味足偶然閒坐一簾風呉山懐古當日偏安游翠輦殘山剰水趙官家重陽樓閣遺香甕試聽黄冠述夢華渡河誰灑中原淚北望還登第一峯瘦削乾坤博花石冬青老樹識提封畫菊秋在柴桑舊草堂不因風雨廢重陽先生自愛南山好却借東籬作酒塲呉源逵源逵字辛劬秀水人性耽吟咏不事生産竟以窮死有城西集贈江撫宋牧仲先生刻漏聲從鈴閣聞畫旗不動日初曛春衣莫笑山人陋曾到匡廬惹白雲張秀才渭渭字子瀾平湖縣庠生暮泛裏湖北風陡發從西陵橋歸昭慶游行自無所薄暮意如何嶺色漸浮紫湖流忽擁波晚鐘僧課足高塔暝禽過市火江城滿月明何處多許布衣箕箕字巢友號龎菴海寜人寓居秀水書法遒勁梅里周篔性好結客而箕閉户獨吟嘗戲語篔曰與為熱周寜為冷許有捫膝軒詩月夜感懐寄繆天自惆悵東林月凄涼故國同不堪仍對酒祇自感飄蓬江逺魚龍夜天高鴻雁風還歌桂之樹招隠小山叢吟懐此亦一空空何須計拙工未嘗摹漢魏曾不問初中梧葉松巔雨桃花栁外風一觴兼一榻隨地是鴻濛金秀才煜煜字朗如平湖諸生少受知于邑令呉春枝在任三年不屑以片紙干凟著有舊聞薈萃如干卷子作輅康熙甲子舉人邨居雜咏開門長見九山青楊栁方塘鷗鷺汀三里龍湫居士宅海天一㸃少微星孫秀才荃荃字高陽嘉興人肩子弱冠受知學使谷霖蒼補學官弟子旋困羸疾棄去時藝詩酒自娯有岣嶁山人詩稾送王白民楚行大江遙接石城烟江草江花路十千為問章臺宫裏月可隨春到白雲邊沈􅀈生􅀈字叔璨號耕隠錢塘人晚居秀水善丹青弔沈治銘攜手孤山各賦詩白梅黄鶴笑人痴茫茫歸去無家别月下疎鐘喚夢遲宋徴君是是字懼聞山隂諸生康熙巳未薦舉博學宏詞不赴有辭朱徳園中翰書今僑寓禾中居山之一綠隂多樹處老屋紫苔肥坐久溪雲出日長山鳥依偶占詩句好補索韵音稀㑹有鄰家子花時來叩扉呉元渶元渶字尹侯元洲弟有尊樂堂詩趙遊草恒州雜詩自駐中山國頻登般若臺臨風一以眺春色又東來大陸凝殘雪禪房發舊梅老章畱句好吟罷重徘徊天寜閣有盛宜山題句試馬孤城外周遭足芰荷美人不可見遊子意如何風細流香逺霞翻散彩多隔花聲宛轉髣髴似呉歌半完居士錢爾復爾復字仍始號肻齊海鹽人蚤棄儒巾隠于鹽邑之邏邨築小圃自娯以為人生出處相半吾樂吾圃于隠處之道則完矣故自號半完居士年八十一卒有半完圃詩集杜鵑花比杏爭桃别作叢春來皆遜此花紅可無粉水重施的何用丹砂更守宫醉裏忽驚朱鷺下霧中疑有絳紗籠當年曾記鞦韆畔飄颺榴裙血色同種梅口號寶雲遶徑盈三百光福分林即萬株却笑一枝新買得日停拄杖數花鬚題陳書墨梅畫裏得逢林處士女中今見鮑夫人世有此花無此筆誰人能賞畫堂春張貢士之楚之楚字幼青海鹽縣學生年少工詩太倉呉梅邨贈句云愛君詩似謝宣城康熙辛酉貢入成均有留之教習者以母老辭歸卒年七十九有掃雁齋詩鈔楚中楚中真秀絶山杳水層波嘉樹橘初麗清江雁正多騷人哀已甚遷客怨如何欲弔長沙傅因之問汨羅李隠居紫庚紫庚字微京海鹽隠士贈何商志紫雲之山澉湖水山光水色真無比其中高隠有何生商洛遺蹤差足擬何生家世本簪纓有才不欲干時名傳經早入杏壇席議禮還輕魯兩生生逢明季兵戈亂赤眉銅馬交奔竄匿影惟修忉利天無心更入承明殿遂能絶跡向空山牧豎樵夫相往還林下不嫌賓客到籬邊深喜歲時閒即今老作邱園客閉户著書聊自得十畝猶存丙舍田數椽不改扶陽宅年來城市少經過坐對雲山且放歌木食草衣忘嵗月不知鬢髮復如何呉大震大震字子濤號濤廬嘉善人蚤涼何處賖秋蚤秋賖卓午餘風喧平奪日蟬寂不驚魚栩栩眠能穩珊珊病欲舒逆知皇甫七池上興非虛徐秀才晟全晟全字孝績號余人海鹽人入籍嘉興有聲士林著三里考一百卷刈園稿六十卷午日偶至憩雲菴即事彌江亂飛鳬踏歌喧敗鼓千載此風俗三閭意何取牽愁雖百斛不向斯時吐隨步披荒榛東湖更東浦矮屋敞孤篷四望曠蕭莽中涵明净几牓字燦可數始憶憩雲名詩僧皎貫侣解衣坐前楹山水供仰俯翠袖列畫屏明湖鑒林羽老禪自束縛良久乃出户清言滌煩襟秀色撲眉宇瓢攜匡山雲屐帶越溪雨匡筍淡而腴越茶甘更苦悠然對湖山少啜亦揮麈羈旅耽幽尋遷延及亭午别師入紅塵氷壺換湯釡欹枕思少憩夢攪巫覡舞逢逢敗鼓聲又轉牆東廡河南道中中原大道直如髪今古勞勞此問津栁帶亂飄鞭尾雪麥波遙送馬蹄塵未分名利爭馳驟别有謳吟荅苦辛偶爾片雲閒出岫也隨流水逐征輪金山寺用曾文定公韻芙蓉削出水晶宫臺殿層層碧間紅鎖鑰滄溟添壯麗標輪白日斡西東嵌空石漱驪珠穴架險亭招鵬翼風瞻仰天文霄漢上茫茫元氣滿寰中馬上舍煇曾煇曾字學山號邁菴平湖人給諫嘉植仲子有三湘燕趙游草登黄鶴樓厯棗亭瞻純陽畫像地闢神仙宅層樓起百尋估帆飛日脚漁火逗波心秋盡楓如醉丹成棗是林漫傳黄鶴去玉笛有清音鍾知縣定定字靜逺號冬星石門人司鐸江山遷陳留令士民均懐其徳報國寺雙松枝葉相當映碧櫺空庭偃葢似虬形天齊古幹封霜雪地近宸居煥斗星㸃筆畫師驚絶倒著花凡卉失娉婷風聲坐愛能清耳厯亂蟬號未肻停任畫士星客星客字右宸嘉善人以畫蘭得名題畫聊抒幽思寫知希只合林隈與石磯賴有騷人紉作佩與君臭味不相違許山人黙黙字鳴一平湖人嘗以詩受知于郡守許堯文學使谷霖蒼行誼甚高婦喪繼娶馬氏初入門情緒慘淡詰之再三乃云前夫尚存特鬻身償逋耳急令攜歸不索其金口占一詩以送有好守糟糠到白頭之句與趙道闇為詩友而工力過之邵學使延齡為刋當湖兩山人吟稾采桑行江南春水清如藍邨邨婦女攜筐籃柔桑巳采倉庚老聽歌桑韋又再三頭眠甫過渾調息二眠三眠心亟亟紥山歴亂呼平明素手纖纖那敢惜薄暮歸遲憂蠶飢飼蠶弗省兒飢啼葉聲宛轉入清聽松風閘水兩依稀繰絲晴日茅簷下大車小車爭嘔啞蠶女何曾著一絲曳向青樓鬭妖冶賦秋鳥同陸氷修呉慶伯分韻得紅字八月胡椒熟羣來自海東屠墳推獨産野戍見摩空葦岸張羅宻庖人入饌工吾鄉佳客坐常配菊花紅登呉山七寶嶺呉山南壓重闗險埤堄中分對石屏宋主衣冠成蔓草錢王烟月賸離亭江濤萬頃連天白嶺樹千盤接地青指顧西興人影絶昔年鼓角起沙汀白蘋花㸃㸃寒香傍客舟傷情晚棹白蘋洲故鄉多少離人淚并作横江一曲秋贈鴛水歌者李老時曲新翻合管絲秋風落葉下階墀慙予不及龍標尉閒煞昭陽李教師姚秀才甡甡字生生號㫋麓松江人入籍平湖與張帶三呉日千董樗亭輩飲酒賦詩為忘形交所著有修竹廬稿修禊行妾家舊住章華里含情日日飄羅綺祓禊來游洧水潯春風搖蕩採蘭心盈盈皓腕臨清渚水光掩映霓裳舉弄態輸情妾自知眼波迭送郎應許紅日西沈起暮霞可憐催度七香車郎行若道東門逺辜負晴川芍藥花雨霽宿雨一朝霽邨仍二月天巖風晨捲霧絲栁晝辭烟箏墮檐前韻花舒濕後妍傷春詩最好只有杜樊川華嚴閣書懐小寺初鐘後秋深夜更清酒醒僧語罷人靜佛燈明古木蕭蕭下寒蛩切切鳴此中有真味誰與証無生採蓮曲江渚採蓮歸隔溪見郎過日暮風浪生回頭但烟霧曲水棹輕舟舟輕似蓮葉但恨荷珠流不比儂心結檇李詩繫巻二十九
