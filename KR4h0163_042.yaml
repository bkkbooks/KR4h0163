body:
  text: 檇李詩繫卷四十二平湖沈季友撰秦水市謡長水土人有此謡始皇聞之乃從此過與人乘舟交易以應之按水市合爲沛字應漢祖起沛也水市出天子長水謡時有老嫗聞謡甚懼日往窺城門門侍欲縛之嫗言其故後門侍以犬血塗門嫗見血疾走忽大水至遂淪爲谷城門有血城當陷沒一作城門當有血城䧟没爲湖三國吳西鄉兒語黄武二年由拳西鄉有産兒便能語因謂其鄉曰語兒天方明河欲清鼎脚折金乃生一作天明河欲清脚折金乃生唐廻波詞嘉興令楊廷玉武后之表姪也貪猥無厭時人爲之詞云廻波爾時廷玉打獠取錢未足阿姑見作天子傍人不得抵觸華亭君歌唐末琅琊張聿爲嘉興軍華亭令有以干乞至境上者聞民此歌不謁而去華亭君來幾時免我疾苦療我饑元方推語至正中淳安方道叡爲嘉興路推官讞獄明恕民爲之語云方推一斷死而無怨丁酉謡丁酉八月張士誠來攻嘉興㕘政楊完者以大軍四伏使小舟誘之至杉青閘多積葦以待風大起舉火焚燎敵死甚衆遂舍舟登陸戰於東𤓰堰大破之張士誠伏水遁然完者㐫肆掠人滛汚婦女少拒即指以通賊民間謡曰死不怨泰州張生不謝寶慶楊明京師語潁上李芳中永樂中進士任刑科給事中執法不撓忤權倖謫海鹽丞棄官歸宣宗嘗顧問曰李芳何在近倖畏其剛直多沮之京師爲之語曰永樂紀綱宣徳李芳洪令語𢎞治末金溪洪範爲嘉興令有才略大類楊大守繼宗士民爲之語云洪令楊守承前啟後徐守語正徳間貴溪徐盈爲郡守有善政郡中語曰徐公祖步楊武謂楊繼宗也張令歌張濓蘇州人正徳末爲海鹽令民歌之前堂無吏人後堂無優人堂下無犯人安妃語憲廟安妃姚氏郡城人生而端静毎遊息必御大道中央家食貧常習䌟木棉躬貿易俟日中市囂屛息乃就市目無忤視人多異之一日早盥覩靧水中有日月雲霞五彩扇夾兩旁爲白父母甚驚怪未幾憲廟遣中貴人下江南廣小星之選里人以妃幽閒多令徳且居恒有怪徵爲白中貴人應召父母昆弟念入宫無相見期聚族而哭妃顧謂曰是行安知不大吾門何用涕泗爲既治裝登舟過平望妃髪素種種不盈尺一夕髮長委地進御數年生夀王縣官貤恩澤抵郡父母皆物故無可踪跡者其弟福圓方躡屩負擔鬻諸菓于市中得之令習禮博士勉教爲拜起跪立即日授錦衣衞指揮同知民間語曰誰氏子賣青梅朝藍縷夕錦衣潘明府語平湖潘鵾正徳丁夘舉人家貧力學授肇慶府判未幾乞歸窮如故談經爲後生師表里人爲之語曰書中車馬多如簇潘明府無一舟一僕陸青天謡嘉善陸垹知武昌府郡人謡曰陸青天勝明月青天無不青明月有時缺王𤓰諺嘉靖庚戌春三月大風雨三日李樹生王𤓰遂有倭難李樹生王𤓰百里無人家花瓦謡田州女土官瓦氏嘉靖十四年調之征倭至蘇州索有司捕蛇爲軍中食敗倭於王江涇時人語云花瓦家能殺倭腊而啖之有如蛇洪遇謡歴城洪遇嘉靖間爲秀水令有恵政以艱去邑人謡曰洪遇再來天有眼某某不去地無皮楊令語楊挺高金鄉人嘉靖中由進士任海寧令有亷名後補平湖􅊩湖三年即服食細品必衙中紡織藝圃以自給入覲時語云天下清官楊挺高閩中謠嘉興譚昌言爲福建提學人有投私書者槩不發試竣題數行裹原書復之閩人語云來一封去兩封以爲不信視郵筒平湖諺平湖俞瓛字廷貴有行誼熊卓知縣事引與計事行之民輒曰神明或干以私遂謝弗與通里人諺曰郭東俞生當春握氷涇縣歌嘉興高承埏知涇縣將去民歌之曰眄公車來何暮計公程去何馬公内召我何之急攀轅告上司上司揚言不可止入都門見天子楚雄歌秀水朱大競知楚雄府政尚亷静甫半載丁内艱幾不能治􅑽歸郡人歌曰清亷太守一世難百鳥有鳯鳯有鸞江南諺江南田家占雨諺曰甲申尤自可乙酉怕殺我按二語宋南渡時即有之見范石湖詩註相傳至今吳諺二首官糧辦便無飯南道如虎升官半府吳中諺六首有利無利但看二月十二花朝日晴則百果多實三月溝底白莎草變成麥三月無雨麥乃有收六月不熱五穀不結秋孛鹿損萬斛立秋日不宜雷若要麥見三白冬至逢第三戌爲臘臘前雪三次謂之三白大宜菜麥除夜犬不吠新年無疫厲當湖二諺當湖象𤣥珠九水環繞案山有塔及陸敬輿祠今廢自來相傳云九龍爭珠大物且至案山脊出奎光乃發童謡朱竹垞太史靜志居詩話云此予童稚日偕閭巷小兒聨臂蹋足而歌者不詳何義亦未有騐貍貍斑斑跳過南山南山北斗獵廻界口界口北靣二十弓箭國朝二令謡順治中平湖有金鍜倪适二人爲令皆貪穢民爲之謡曰金皆鍜去倪盡适來公歸謡平湖陸隴其康熙庚戌進士初任蘇州嘉定知縣清操飲氷愛民如子以詿誤去官與妻同駕一舟惟有圖書數卷織機一張而巳邑人爲建生祠刋公歸集以送之幷爲謡曰陸公歸舟何所􅑽圖書數卷機一張檇李詩繫卷四十二
