body:
  text: 檇李詩繫卷十八平湖沈季友編明錢閣老士升士升字抑之號御泠又號塞菴晩稱息園老人嘉善人萬厯丙辰狀元除修撰崇禎間召入東閣加太子太保進文淵閣務持國體據事盡言上寛簡虚平四箴嘉納之奸人李璡請括江南巨室士升力爭宸聽雖回而共事者嗛之遂引疾歸築放下菴以老五君詠五首魏給諫孔時秉介性卓卓雞羣鶴揺筆挾風霜勵志在溝壑剛腸病貪夫冷面絶請託峭潔衆所讎形影了無怍髙總憲吾師子髙子繹聖傳宗㫖研幾析毫芒靜坐觀無始徳輝藹春陽心境湛秋水形解何超然虛空起滅爾周主事蓼洲好奇節衝口不能咽意氣死生輕怒詈齦齶决捐軀得所求長嘯浩然别莫邪固折摧光焰耿不滅楊副院應山挺勁骨筮仕勵冰蘖矯矯出風塵謇謇居禁掖三朝戴國恩一疏褫姦魄惜哉蚤發機血肉悲狼籍李御史仲達風雅士弱冠致青雲夙禀烟霞姿自攜冰雪文佩囊立螭陛摩空逐雀羣一朝剥落盡蕙草嘆芝焚臘盡雨雪檢東坡書北堂壁詩次韻二首烟樹迷離數㸃鴉勞人草草上征車貰來茆店三杯酒濕却貂裘兩袖花冷落新亭惟有淚飄零東海已無家不知縞素空山裏留得冬青樹幾义春風已動麥苖纎猶覺寒威入被嚴海上白銀留曉闕山中青箬裹餘鹽回和擁衲嘗新醖曝背推窗近板簷試看蕭條池上栁枝頭㣲露嫩黃尖錢僉都繼登繼登字爾先號龍門晩號簣山老人士升從叔同榜舉進士授刑部主事鞠珠商與大璫乾没事不少貸轉郎中摘猾胥魏成銓等弊出守饒州淮藩驕縱閩師驛騷皆制之不擾陞督學江西丁艱補蘇松兵備以事譴歸崇禎十七年起江防僉都御史未赴而淮楊失守終隱於東郊之客園著有壑專堂集讀髙景逸先生遺疏亦有不義生權門締𤓰葛亦有不義死倉皇自引决彼生如陳屍暴露未就穴彼死亦大慚鬼面猶䝉甲公生如霜嚴公死如電掣君恩不敢忘逆焰不可爇至今秋池水冷浸千年血從饒郡東歸過采石柳絮飛香風滿川鰣魚價賤不論錢日昏沙市催收網雨落江灘好放船十里一逢留客埠三春半是養花天輕衫白袷危檣底倚看鍾山幾抹烟送彭觀民南歸連牀聽雨話雙歸獨馬愁看向落暉懶不作書鄉訊逺淡無回味宦情非窮邊客久人偏痩澤國秋深蟹正肥遥憶東山花事盡空將秋淚濕征衣憶饒郡舊遊二首隔堤野柳環山寺湖東即薦福寺遶岸紅粧倚畫樓遶岸皆妓樓恨不湖中了公事朝朝暮暮住浮洲浮洲寺名彭澤鰣魚雪色螘彭澤五月饋鮮魚餘干沙地鼈如鮐餘干琵琶洲有沙魚鼈建昌逺餉麻姑酒建昌酒名麻姑佳甚快試浮梁御樣杯景徳鎮燒御磁必先進數器於太守曰御様杯黃參政承昊承昊字履素號闇齋洪憲子萬厯丙辰進士累官江西參政有闇齋吟稿秋日過語溪小憩吕園即事秋暑名園憩陰濃涼自生影花臨砌弄飛翠隔簾明曲沼矜魚樂深林變鳥聲宛然濠濮處儘足愜幽情金郎中麗兼麗兼字雙南秀水人萬厯丙辰進士授行人天啟間擢吏部主事崇禎初陞員外郎中以廉靜稱初值璫焰先幾假歸著焚香録以見志有補軒集閒居寂寞南城一草堂新栽桃李漸成行石牀人靜春苔長花塢陰濃午夢香溪雨落梅銷蜨粉閣風開柳露鴉黃荒園未許追金谷好句還應似輞莊次吳王廟片帆春水泊危廊大帝英靈野店旁壁上宫娥惟黛粉簾前羽衞只風霜苔封古碣青千㸃鳥颭閒門白一行劒閣已隣祠後主江東猶自憶孫郎彭太僕先生期生期生字觀民宗孟次子萬厯丙辰進士由部曹守長沙南昌時州郡多立璫祠生不可府藏有羨金數千吏以成規請徉受之三年憂去呼吏還之封識如故癸未冬獻賊破江西三郡御史李邦華薦生擢湖西道未赴而甲申難作將誓死聞金陵建號遂莅任以一寶劒繫黃縠自隨曰此吾畢命物也至江西屢晉太僕卿乙酉金陵破生與督師萬元吉為固守計遣二客東歸作書與家人訣有妻兮莫望夫子兮莫望父我道固當然忠魂恨無補之語及大兵圍贑州六閲月城中食盡生呼長隨吏楊大器杜鳯蒼頭張卿輩託以身後事大器等泣請突圍出生不可城陷朝服再拜登章貢臺解黃縠自經張卿馮吉詹守道皆從死時丙戌十月四日也大器與友人曾堯㫤解其縊排牆覆之未幾臺焚大器等殮骨石函瘞臺下識以墜鐘明年大器將入廣移至萬安百嘉村僧舍屬堯㫤守䕶以待歸葬越二年生仲子至江西求之不得又十八年堯㫤白萬安令胡樞贈以資乃負骨歸海上人稱曾義士云過湖上僧寮覩壁間伯兄題句感懐二人泫然成詠二首三載重悲廢蓼莪不堪蕭寺屢經過明湖似亦知人怨故遣寒波著雨多為祝延年禮梵文板輿三竺傍慈雲望中蕭瑟長堤路愁絶嗁烏繞夕曛劉布衣兊兊字西成海鹽人萬天間布衣有秕廬稿夏日遣興竹塢花溪坐臥閒清暉常沐鬢毛間自饒詩思非闗酒小有園林抵住山松管祇將髙士傳柴門渾似老僧闗不愁永夏銷無計日喚遊魚集釣灣過俞鶴故居巷夕風陰扄竹門陡醒人去直消魂樓還舊主登難再手憶當年握尚温緑字曉窗迴白眼青尊暮雨斷黄昏追尋往夢憐何益轉幸詩腸昔細論項秀才利侯利侯字于蕃利賔弟萬天間文學有薙餘草無患社萍樹録諸刻其詩務為組鍊字字徵實甚有備往蹟于一篇兼數事于一句者詠布廣布含𢎞均釡權後宫何獨祀蠶先華黄輕淺葵傾藿秀頴包函栗剖氊三寸鋤鋒仍日削暮春播種早秋搴吐非鮫淚茸疑羽韌等桑皮白睨牋殘緼董京資覆體敝綀元道拯攣踡苞跗採擷囊垂槖車軋槌彈弓控絃細宻偶純𢎞被儉枲勻表裏損蘆緶諸于輕暖推清獻赭􅜎奇温拒百年火浣冰綃妖服袨駝羢翠錦類裘膻刷經梳髮三梭子標鬊飛花一兩絟夜雪曉霜侔粟帛文沉武露扞脢肩明衣齋潔宣尼製宅曠桑麻賦里㕓一尺可縫漢宗室綢繆添線宋宫縁甬中升越來卉服緤錫緰㠿交阯縣義取綿延行久逺名因逺播體安便箕薪翳菓仁藏莢核碾充芻脂液燃蠙貢絮纎殷薦廟襖胖襯鎧授寒邊啼號挾纊陽回澤閨閫經綸媧補天縫掖士林彰樸素御禈郊禘染青𤣥期頤節烈昭恩賚徳備夭喬志草棉卜秀才舜年舜年字孟碩吳江盛澤人入籍嘉興補弟子員詩學孟東野頗饒别趣字畫皆擅名書佳於畫而詩又次之眼空氣銳介然有難羣之志自牓其廬曰鄉人皆惡國士無雙里中目為狂生好狎遊平康又多與孌童處以故早卒有緑曉齋稿登天平山作來遊不倚笻踏踏天平路峰矗萬雲立壑虚衆風赴攀蘿陟其巔螺翠盈四顧下有小范塋慷慨發髙慕贈姪倩湯將軍昨夜五星攢北斗朝來印繫將軍肘我家嬌客氣如虹勇略不數湯國公外家兵書從幼習久矣江東無老熊三吳不比九大鎮人民宴樂皆髙枕左薄大海右太湖内冦外倭相應呼時虞冦窟狡于兔更慮倭帆開似鳬至尊拊髀懋簡爾愛爾裘帶閒且都白面依然儒者象赤心自與常人殊草檄擊賊無不可懸得江門太平鎖畫竹歌寄女郎徐安生世皆畫竹槁竹身刀劒紛披難割人我能白地抽靈氣導窽批卻走鬼神與可一𣲖近鄉愿子瞻灑潔隣狂狷我筆如椽影空庭須㬰印罄鵝溪絹當今朱白民前身應是梅道人亦有徐孃子管氏仲姬未曾死徐娘自不凡與我差可擬涓涓翠露罥晨流習習涼飈扶晝起晝起晨流憑筆之茶緑香清琴罷時李廷珪墨薛濤紙隠几含毫走妙思爾姿如冰志如雪磊砢䝉茸展奇節月明千里掃罡壇紅線隠娘傳劒訣但願冩此竹枝葉化作徐夫人之匕首盡殺呉傖不染血春晴山居水滿失灘沙林開曳綵霞晴來旋曬藥雨過急收茶鶯坐一身柳蜂歸兩股花人言無事得多事最山家丹陽道中裘單俠骨寒鞭冷馬蹄暮楊柳負西風掃徧丹陽路陳布衣堯徳堯徳字安甫嘉興布衣任俠肆志視名利如唾家無三日糧而好緩急人自謂與朱郭伍儈魚為活暇則闔户讀書與陶景先卜舜年駱雲程諸人結社往還著有小草母死妻與弟相繼没蕭然一身浪跡江湖間或曳裾王門或滌器酒市或寓興青樓或棲靜梵宇入楚適郡人王維新為光化令讀其詩折節焉病作死署中維新收遺稿授梓仍其自命之名曰數莖髭葬孟浩然墓側襄陽狂士歌贈佘容之襄陽城北有狂士一雙白眼空天地愛月頻登嘯月臺分泉每入甘泉寺瑟工羞向王門鼓酒篘只共英雄醉紅線牀頭擬健兒灌夫眼底猶童穉魚服陳生人不知臭味何縁一交臂醉我金叵羅贈君狂士歌歌成一笑朱顔酡青蚨向眼奈我何武林包氏園遇仲仲子林花半塵土春巳破三分竹暗鳩催雨松髙鶴唳雲飛泉當户落清梵隔溪聞日暮空山裏行歌獨見君送王友虞還越相好忽相違臨岐怨落暉柳將心共折花與淚俱飛未了尊前話重牽馬上衣故園千里月有夢寄君歸寄懐卜孟碩吳楚江為限悠悠兩袂分如何九峯月不共五湖雲病久詩無力思多酒易醺夜來貪一睡為有夢隨君甘泉寺一綫甘泉寺峩眉嶺際分蘚碑淪鳥篆蘿壁走蝸文佛毁金成土僧貧衲是雲逺公已千載花雨尚紛紛惜春無情一夜雨漫送春歸去野鳥獨相憐落花啣上樹西湖竹枝詞二八嬌娃蕩槳來西陵渡口采蓮迴自憐未慣傍人見欲攏船頭又教開留别周公美爛溪楊柳青於眼却似周郎顧我時日暮溪邊此分手折來都是斷腸枝欒塾師景初景初字稚行一字公輅不知何許人自言家本松江屢試不得志來遊禾郡陶希廉涵中延為塾師其人磊落不羣為詩豪邁時有出新之句有湘南稿舊水齋集曼詞化工失權輿鬼物侮真宰培塿俯泰岱騏驥後駑駘青蚨血痕爛芙蓉土花改龍池聚魚鼈韭畦鬱蘭茝日烈豹文渇風死隼翮怠朱顔槁飛蓬雕題飾繒綵老蚌泣魚目古蠧蝕豕亥天翁夜半號掬淚溢滄海二妃祠蒼梧山老湘流渇古竹新痕幾明滅重瞳玉棺置何許江上紅扉祠二女錦瑟聲沉調不起小女琵琶老郎鼓鼓瑟憑誰問水濵風吹野花滿路春何物情癡遣不去峯頭來往女兒神賈太傅祠洛陽少年善哭世憂危震動明天子閶闔晨開絳灌入夜半虚勞諭温㫖筆下經綸至今在後人叢生此人死洞庭水接瀟湘來中流白日常陰雷漢庭吞聲迄今日一掬灑入滄溟開英雄學術㑹須爾媕阿者流安在哉汨羅江鬻熊廟鬼啾啾泣嗣王大醉無醒日秦虎豈無攘袂來楚姬猶綰纎腰立纎腰競借君王顧小子為歡老夫怖靈寶何堪坐授人不聞鬼恫見天怒天怒無如君夢夢獨醒那能偕醉衆醒醉都難不復支聊借江魚收頂踵不散精靈哭到今楚俗無知抛角糉陶布衣匏匏字子白初名􅀈字不食秀水人性好潔飄飄有烟霞氣能詩文善書與崑山歸季思嘉善吳子往讀書荻秋菴風月之際狂歌長嘯興趣所極或窮日夜不返其豪致如此年二十而卒遺文散軼詩僅七古七排二首予登其一外見廓園集者有亦道青年難遯世不堪白面向時人啼破夕陽何處鳥身藏緑樹幾時人惜不得全首録之贈别歸季思沙明苔碧兩悠悠辜負寒江獨自流愁聽梅花吹鐵笛肯將竹葉盡金甌霜風獵獵千行淚露草蕭蕭一去舟雁字不從衡嶽斷猿聲偏向灞陵愁斷腸豈為青天落回首空憐黑蹇遊孤館誰能歌白雪片帆應自怨黃牛雨餘半夜同吟榻月滿三更獨倚樓詩思已隨殘菊悴夢魂獨喜大刀頭明年燈火黃昏市目斷吳雲望紫騮漫翁范應宫應宫字君和號雪廬應賔弟後流寓舊京更名迂字漫翁内子姚氏亦能詩有玉鴛閣同咏詩鈔及姚没有悼内雜言宿香陰齋有懷彩霞忽散夢悠悠獨擁瑶琴弄碧流一夜霜欺青鬢冷芙蓉零落墓門秋石户子范明泰明泰字長康號鴻超亦稱觙子應宫姪太學生讀書嗜古買宅城東有竒石曰舞蛟蓋李唐時物元趙魏公所題也日夕婆娑其下與名流韻士髙僧道者持螯捉麈自以石癖與元章同因蒐輯元章行事與詩若文輯米襄陽志林吳門王穉登序之以行其自著詩文亦題曰石户篇送春日舟中望虎丘沽酒楓橋雨乍收濕雲無力散春愁急拈蕉葉船頭飲欲趂東風看虎丘畢秀才星燦星燦字雨宿嘉興人萬厯間文學有藝餘小詩倚帆剰業閒居於世誠無用居閒道亦尊家藏釀酒法自作闕肝膽誰憐俠圖書且率真最堪櫻笋熟客至不闕陳無功歸自楚中千里歸來一葉輕煙霞琴劒半縱横試將篋底新詩讀盡是瀟湘暮雨聲别胡繼章當筵莫唱渭城歌君亦天涯可奈何今日酒闌歌歇後恐君離思較儂多姚秀才昌謨昌謨字景文號幼海兖之孫萬天間文學久不第去而為詩有問𤣥居草失傳秋日園居平生躭嶼壑卜築傍雲根野鳥閒情在殘書午夢存竹寒晴作雨林宻晝常昏巷僻無車馬藤蘿日繞門陳吉士萬言萬言字居一初字孟諤號𢎞景秀水人萬厯癸卯解元已未進士授庶吉士辛酉卒其人品節自好耽心古學詩亦錘琢有鈃園集天台積翠千層合飛泉百丈開秋凝寒雪下雨駕白虹來洞底花成藥潭中石化苔若尋華頂勝咫尺是蓬萊寄張賔王十載秋霜滯逺槎同君漂泊各天涯一江夜雨迷桃葉二月春風落杏花不是先生耽北郭可如蒙叟著南華只今海内論兄弟先達朱門且任誇曹居士隨隨字是誰初名爾善字令民别號簡在居士徵庸弟以諸生遊成均與孫令𢎞毛脩之齊名著有壹是山居集大泌山人序之雨花臺法雨何年散江雲此日開花明子石出澗滴乳泉來撥溜珠挑杖歸樵翠拂臺翻經人去後講坐久塵埃徐隨州世淳世淳字中明必達子萬厯戊午舉人累官隨州刺史闖賊亂襄鄧間攻隨城淳以死守相持七晝夜食盡援絶城陷淳單騎巷戰賊脅之下馬淳罵曰有死州官無下馬州官也飛矢貫頤眼鼻横斷既墜馬猶罵不絶口仲子肇樑抱父尸罵賊賊殺之臨死語州人曰印埋廨後好䕶還官淳妾趙氏亦罵賊死僕從死者十八人按臣上其事贈太僕少卿賜祭葬恩廕肇樑贈助敎命楚浙並建祠焉野田黃雀行北山豺狼橫於虎南海蛟龍不敢舞吁嗟黍苗間啾啾唧唧相驚喧卑栖恐遭網髙飛或被羅飛鳴罕得志飲啄不敢過縱使蕭條蓬蒿下不如隨風入海化為蛤飄没沉浮無絶刼有時網羅寛有時豺虎滅蛟龍飛騰脫鱗甲落大田仍變雀天地爾時不卑狹沈舉人徳符徳符字虎臣晚字景倩自邠子萬厯戊午舉人有清權堂集其詩尚雕刻好徵事規模晚唐間入宋調評者謂自王李之學盛行吳越間學者拾其殘瀋相戒不讀唐以後書而景倩獨近捜博覽其於兩宋以來史乗别集故家舊事往往能敷陳其本末疏通其端緒家世仕宦習聞國家故事且及見嘉靖以來名人獻老講求掌故網羅放失將勒成一家言以上史館惜其有志而未逮也與友人夜話予幼習楚人中道得伯敬示我𤣥對稿序者曰譚柄友夏小字也抗論卑時賢齒少氣獨横最戒傍人門位置須堅定欲還真大雅必斥偽先正斯語吾堪師一笑嵗寒訂二子世楷模藝林作司命歴下與瑯琊一朝廢不競蚤逝悲鍾期朱絃絶髙聽之子獨雄視萬夫禀號令陋哉枵腹子貌尊復口佞詭云薄繢藻所貴咏情性動即擬鍾譚叔敖豈優孟譬學膺米畫一抹枝巳竟斯道大域中孰授爾蹊徑初意汰鉛華究使俚醜盛枯骸較豐肌臧糓殆同病排擊敢辭苛奏韶先放鄭四詩雅頌風三體賦比興豈汝索乞兒唾餘堪餖飣快語實起予嚶鳴旋互慶始信銅山傾洛鐘亦東應努力進竿頭津窮更開境㑹心兩忘言疎櫺一燈熒貍奴行憫流冦也貍奴睡向閒堦足坐閱花房雙蜨宿利爪飈馳粉翅摧栩栩魂隨莊夢促更憫疎籠吚啞雛弱羽無多初脫殻深更一决棲塒敗毛血離披汚裀褥豈少䑕鼯晝夜行不獨飲河兼飽粟縱遊竝狎更羣嬉同穴何曾在山谷有時五技出無窮竄走狂奔翻畏縮調來飢解搏鸚鵡仙去飛看化蝙蝠近聞調發諸銳師邇者江淮逺秦蜀坐甲將弭赤縣災行營先播蒼生毒但曉摸金與發丘幾曾破的兼飛鏃姬姜驅往馬前啼程鄭逃回路旁哭奇珍異艶入褊禆剰馥殘脂歸部曲黃昏帳下輸欵誠白日壕邊偽馳逐亦有兒嬉陷伏中投槍崩角求收録酋豪置酒盛歌呼降卒更衣盡扶服我今始悔責貍奴汝但傷生猶異族誰信貔貅均猰㺄不甘牲畜甘人肉方方肆勍蝗蟘行冦冦相生薪火續四年淮蔡尚屯兵九帥安陽皆退衂蟣蝨翻成當道豺狐狸也逐中原鹿張角猶存道陵起黄巢未滅宗權伏發機豈吝弩千鈞坐使無牙恣穿屋恨少丞家守舍兒掘肉為書磔置獄君不見唐宫蕭姬真癡物誓死扼喉雪寃酷阿武居尊過八旬骨醉何曾知報復嚴子陵真人興白水處士只青林俗腹何堪足閒竿太有心天勞垂象苦公悔結交深懶續商山績椒宫久嬖隂糓雨日抵家襯日魚鱗水烘人卵色天久晴貪糓雨新火活茶煙夜讀偕兒塾春耕老墓田浪遊頻計左益悟杜門賢閨意二首枕墮晝朦朧沈煙裊夢中韻花私睡蝶冶葉鏤春蟲字錦迴文杼薫籠小退紅倩誰圖倦繡殘縷唾屏風繡箔芙蓉國雕梁燕子家顰多翻惱鏡鬢弱僅勝花畫斂開眉手紅銷繫臂紗自傷通體俊如栁不藏鴉陸駕部席上聽家伎譜熟猶翻理粧遲稍恨催軟腔鶯學去驚態蜨齎來艶惜將終曲香留未盡杯聞絃歡欲舞不信雁箏哀泗上有懐卜戩甫仆栁危橋側昏鴉古渡前艱辛如再世容易此三年骨有違時性文無役鬼權聞雞今罷舞不畏祖生鞭自劒浦入昭武舟中即事霽久帆增健暄深木頓稠㸃頭行樹鳥浮鼻渡溪牛巢飲榕承席邨舂磑貯舟篙工私笑我明日匪安流端午鄰舟詩風媆應蠲夏暄輕似衍春雕闌重複面繢水動揺身知瞰佯他瞬緘歡故小顰一簾司聚散忙殺目成人度夏漫興池酌看新漲農歌起暮田秧將青報雨蕉竟緑無天香昵深埋火茶甘久霽泉熱中多冷韻輸盡夕陽蟬朱天倩新居二首藥欄一色到還疑稍益蘭蓀減菉施樓徙全家勞燕子門停誤馬吠猧兒花繁鄰院春無禁燈徹深幃月有私北里誌成重閣筆記來方曲倘參差枇杷花下綺窗開眉史前頭貯麝煤錦綆重沾棄脂水畫奩先就避風臺敲籠戲惹春禽罵下箔教迷暝燕回坐對清溪應借問小姑何日肯為媒杪秋閱稼二首孤學違時路每窮敢因智叟笑愚公生天孟顗元難佛早世終軍未免童老去計應依馬磨寒來辭又祝牛宫農塲新滌漁菴舊匡坐斜陽說嵗功雨晴難準未忘情芒屩無營但閱耕鷗夢一生多在水雁裝千里不覊城貴人謾作揚州歎老婢空傳洛下聲禮數雖殊賔主洽園翁野袖盛逢迎北上虎丘河干示送者纔到河橋别夢新短袍又擬裹勞塵㑹心我自知濠上勝事君其問水濵老面能紅楓似酒故腰倦舞柳如人浪遊亦有堪驕處嵗向長途覓賤貧園荷盛開招客同諸從賞之清池一例澤芝妍茶具新移水石前蓮社以花持供佛竹林將酒當遊仙風欹葉勢齊傾露月寫波香不剰天相府舊歌元豔曲可應誤作想夫憐天啟宫詞八首二廣雙甄陣脚牢御營日麗戰雲髙封章臺鎖俱休進萬乗臨戎正内操白騾唐代御𤣥宗踣後將軍始受封爭似生叨三品料驪駒賜號小烏龍保姆天家自不貧酬勞偏罄累朝珍也知漢武非英主回顧猶勞郭舍人衣冠上道盡纍囚麗景門中例見收龍比巳知非俊物何妨一日付來侯萬方輻輳助雕甍觀闕嵬峩北帝京趙鬼不須重誦賦柏梁未燼建章營御鞭指處騎爭馳玉靶金弧月滿時顯徳殿前曾教射吾皇能將亦能師樞宻承恩珥左貂俄分旄鉞下烟霄細旃讀史能師祖故事偏遵永樂朝六宫抆淚但吞聲後命何須罪有名鉤弋競傳尸解去聖人依舊戲昆明錢舉人陞陞字紫芝與映子萬厯戊午舉人有西乗菴稿哭湛公緑螘浮春斚吾來哭湛公鬢輸秋色晩人與落花同水閣經聲在雲堂影照空祇應身世事留付一杯中閉門薜荔空齋手一巵㣲酣不減獨醒時閒來更不捜奇句只寫衡門閉影詩陳解元山毓山毓字賁聞嘉善人萬厯戊午解元辛酉負病屬纊前三日為文自祭坦然徂化門人私諡曰靖質有遺集六卷騷賦特多雜文次之詩止吳歌七章而巳然騷賦諸篇奥博宏肆雖未能方駕馬楊亦足與獻吉次楩相伯仲也吳歌哭子伏枕不能眠月明疑天曙雞鳴薤露喧知是儂兒去鄭靖江士奇士奇字平子嘉興人萬厯戊午舉人崇禎間官靖江令將至廣信舟中望兩岸羣山如畫層巒驚陡削峭壁挿天青灑滴疑來雨懸空似落星石斜防虎伏壑冷帶龍腥好倩長康筆圖將一畫屏髙屯田道素道素字𤣥期號明水初名斗光字如晦嘉興人萬厯巳未進士天啟間授工部主事督造桂邸崇禎初陞屯田郎中以邸第傾坍罹法有牛馬任呼還世網刀山離却即禪牀之句景𤣥堂集中頗多佳句煮茶亭戲倣坡翁作紫笋峰前桑苧鄉通川絶巘青茫茫鏗然一磬墮雲外樹裏禪翁鎖竹房青莎裂痕走玉液白石迸髓流雲漿杏花風㣲蜨影薄麥毛雨浥鵑聲忙僧厨數畆新茸膩靈草驚雷待人祭蘭叢抽笋罥新芽竹簜穿籬撩芳蒂花滿香泉碧映窗林垂珍實紅生砌數葉尋條度晩春瀹甌掇碾娱清嵗鑒公弟子本書仙茗椀流連侣玉川瓦鐺雪浪分秋月石鼎松風夾夜泉大瓢小杓那能數枯腸醉眼俱茫然白日琅函突兀坐清秋瑶席支離眠湖影林光媚朝夕偶賸閒縁到閒客疎狂不乞素師書標韵惟憐積公癖飲罷煩襟徹骨清寒堂幽夢未能成城頭月出春雲歇坐憶千山嗁鳥聲春日漫興野色千林葉東風一夜花碧烟炊石竹紅雨落山茶幽興偏心賞流年任鬢華阿誰多意氣尊酒不慳賖雨中過陳居一愛爾抛書臥憐予躡屐過俄驚風折柳忽訝雨翻荷野市花連屋春橋水滿坡賸將尊酒意乗興弄煙波湘江道中寄内輕帆短檝泝烟波疊渚迴洲奈逺何一路客程吟裏見十分秋色病中過江通漢水晴偏緑山入湘雲晩更多何處思鄉腸欲斷楚妃祠下聽吳歌客閩雜咏疎齋小閣稱天涯客夢何須更憶家夜半酒闌殘睡醒隔簾香送素聲花吳參政麟瑞麟瑞字石袍號秋圃海鹽人萬厯己未進士歴官江西參政著有閒草已巳詩諸刻其詩清真婉暢頗近中唐風調宿𢎞覺寺晝登白雲梯夜就雲中宿歸雲逐孤僧冉冉入厓谷江月遲未上清譚屢呼燭一枕足幽夢滴露響秋竹長安行長安多冠蓋輪鞅日夜馳更代無舊軌榮悴遷瞬時去來各有營懊喪常半之馬上共揮手岐路復多岐謀面且造次况乃言心期伊余類海鳥飲啄安水湄矯首視天漢猶怪鵷雛癡一朝窺樊籠眩惑難自持厮役見愚弄奔走使我疲朝出每不飽暮歸恒苦飢凌霜叩鬼謁且嗔駑馬遲髙駕恣前唱引避如伏雌舉目見滓穢投足良嶮巇漆園樂曳尾萊妻嘆為犧安知巧勝拙孰辨妍與􅑦人生適志爾富貴亦何為冬夜寄清溪子柝聲喧夜雪門外馬蹄深有月怯孤枕無枝愁凍禽酒傷天下事劒識古人心何必同林樾山盟詎自今長安春興四首塵封官柳眼猶迷黃鳥吞聲不肯啼二月羽書掩塞草十年馬足負香泥長纓有策終難請短札多愁未易題忽憶孤山此時節亂堆雪片斷橋西宣室平臺幾度聞誰言尺五隔重雲馮唐未老猶能對鄧禹笑人何足云投璧無因徒咄咄彈冠有語謾紛紛不知底事長安道策蹇歸來又夕曛長安舊日看花地懊惜風光擲等閒孤竹已非商版籍時永平陷盧龍誰賣漢河山邊笳入夜難辭淚徼戍逢春不解顔身在日邊容易老何須更問玉門闗一官無賴日登樓腰帶年來侣隠侯謀國此時須管樂買山何地着巢由溪藤半幅圖秋圃曉鏡千絲㸃雪鷗多少五陵衣馬貴玉珂朝下有深憂仲僉事嘉嘉字子復原名景亨字孟雍秀水人萬厯已未進士厯官山西僉事報國寺短松歌報國寺中之古松枝葉如葢皮如龍肩隨有二各奇絶秋月冷照光溶溶髙風過頭影不覺如紙半皴千山峰霜鱗雪脂帶苔蘚針葉短短無春冬鋪階過檻三丈地譜以嵗月知幾重㑹看歴盡大小刼帝城萬古青雲封陸布政懐玉懐玉字石含號獻之平湖人萬厯巳未進士歴工部員外郎出守鎮江陞三楚備兵轉鹽法俱有政績秉臬山東出死罪數十人擢閩藩謝病歸家居長厚有古人風終身無一涼薄態好奇石自能壘山又善種樹凡四時氣候澆植之法纎悉必盡園林清勝幅巾往來晏如也有也園唱和詩也園自種雲根二十年也園十畆總悠然豈無幽徑過韋曲亦有奇峯學米顛半砌苔衣清似水一池花石小於錢歸來便是西疇長晩稻秋香滿社田俞秀才恩曄恩曄字二酉别號五如乹之孫諸生負才尚俠書法酷似董文敏文敏欲致之笑曰予寧作董氏客耶不赴有五如逸稿登南屏慧日峯禮永明墖逺眺盤屈南屏路來尋慧日峯堂開宗鏡法塔定永明鐘兩水分清供千巖向古松前朝留錫處露滴草茆封楊太學瑞枝瑞枝字若木秀水人萬天間國子生有萍水閒吟西林寤言工五律以淺淡取勝似張司業一𣲖山行一夜空山雨淒然江上春巖花垂露重石壁掛泉新徑曲煙藏鳥谿清水照人家家茅作屋猿鶴自為鄰谿上窺園何不可隨意水之濵落日短於杖片雲孤似人嶔崎應自笑寂歴也宜春恐作臨流羨漁磯未敢親南湖春詞桃花落盡杏花天啼落杏花鶯可憐近水柳絲長拂地過牆桑葉大於錢周徵士念祖念祖字孝脩嘉興人萬天間茂才兩參撫幕薦徵不仕有葯房吟紀桃葉渡風裏夷猶只水涯沙棠上指見城陴秦淮古渡仍桃葉吳苑新詞盡柳枝紅袖兒家相對出黃衫客子獨來遲亦知嫵媚銷魂處欲似巫陽入夢思盛秀才時龍時龍字雲將嘉善人萬天間茂才有天選篇北遊雜咏二刻咏物小詩頗饒情致燕南北多營壘寒暄任爾過不將毛羽重轉覺語言多亂翦花驚墜輕翻水易波春風嘘拂處入幕意如何落花二首細數寒枝影漸稀翻因花痩得春肥同心那忍單飛去異蒂何妨結伴歸楊柳浪傳能作絮芙蓉差足剪為衣芳菲轉眼驚開落朱實含胎又壓扉萬疊流紅度逺村眼看花事轉銷魂幾因窣地空存蔓縱使凌霄直到根青草為茵留錦簇緑苔擬鬢得鈿痕從來艷質誇桃李回首芳菲幾在門陸教授官官崇徳人貢授松江教授咏郜邨廟松沃野遥山抱神壝獨此松羽張飛夕蓋琴響如晨鐘曇翠來翔鶴谿長有臥龍假饒秦蹕過應得大夫封蔡貢士胄徵胄徵字闕崇徳人貢士桃蹊東君爛漫送春來㸃㸃無言襯碧苔不向武陵千樹放野人籬落數枝開陶秀才晉楧晉楧字若英號觀心秀水人文學有楚遊集江月夜靜波流照清暉上客衣冷雲愁帝子香草憶江妃野曠千林合天髙列宿稀故園同此夕歸夢正依依鍾處士鍵鍵字大吕庚陽孫有南征小言擬登靈山六峯洞不果本擬扶藜上六峯却因行役絆孤篷巖僧虚掃三千白地主時分十八紅夢傍溪頭尋勝事思從洞口覓仙風山靈應笑塵埃客何日能來問桂叢卜秀才世臣世臣字長公號蘭史秀水人萬天間文學有詩未刻而沒自題云正平簡傲乏人知此日并無大小兒鴻寳著成誰鑒賞好鑱禹穴葬吾詩又嵗月蒼茫事轉非欲逃海上築漁磯獨留艶句三千首尚有精光燭少㣲亦自負甚矣柳枝詞掩映章臺束紫騮枝枝葉葉帶離愁楊花不比無情壻慣裊東風入翠樓浣紗石浣紗石上蘚痕多千古紅顔别苧蘿嘶徧紫騮無覓處隔溪殘雨顫新荷題義士手植冬青樹有引按棘津曲品収冬青記并載其友方諸生之言曰當日瘞骸事實我邑王監部名英孫號修竹者為之蓋王本國戚又世家也若挺身以前慮敗泄罹禍時唐玉潛珏林景熙徳暘謝臯羽翺諸人皆其館客王特捐資募里閈少年挾二士經紀其間王固自諱人即但傳唐與林也今幸漸白於世雜見王氏家傳暨勝國張孟兼孔希魯趙子常跋謝翺冬青樹引又李長沙辨義録近張太史修會稽新志内載唐林四絶繫修竹倡之諸人屬和者修竹亦才士詩極慷慨淋漓著有王修竹集林有霽山集謝有晞髪集其間屬和篇章厯厯可証不然唐一窮學究林一羈旅客安所得措手于毒髠烈熖中而保一木卒無恙耶今已未初夏七日予客遊其地往弔六陵拜雙義祠漫占一絶并勘明此段公案以附記於此半壁寒灰爾僅存無家寃鬼托朝昏樵童亦識孤忠意手掬黃沙䕶淺根王布衣照照字秋朗秀水人萬天間布衣有梅花屋稿蚤春湖上作寂厯湖山一樣春望中風景不闗人羈魂莫道無依着到處梅花伴此身倪太學煌煌字令倩嘉善人國子生有小宛集弟㸃亦能詩贈康使君柳洲煙碧鶴湖清帶雨行春竹馬迎布榖能知使君意野棠枝上勸農耕西少山人沈嗣貞嗣貞字紀常自稱西少山人嘉興人萬天間文學有荀草堂稿鶴夢煙暝古雲根苔花見臥痕有因來箭主非想入雷門不識夢中境應歸物外魂肯隨鳬與雁徒感稻梁恩許太學恂如恂如字恭伯秀水人萬天間國子生有秣陵遊草燕遊代奕集秀州百咏炒麩庵沽名不許齊眉案苦行甘為辟糓清休笑於陵陳仲矯炒麩咽李總非情附考在郡城内報忠坊相傳裴休女名祖貞棄俗學道捨基創庵炒麩為食又有橋亦名炒麩辟塞吳越烽烟漲海昏城樓征客幾銷魂清平王路無分土雞犬桑麻自一村附考越絶書曰吳從由拳辟塞渡辟塞者吳備候塞也又有柴辟亭吳侵以為戰地水經亦有辟塞渡之名在郡拱辰門外一里洪武初置演武塲世廟時徙置杉青閘北今稱武寧里俗呼舊教塲螺潭翻雪楊花糝徑開滄浪時度釣魚臺月明顆顆螺呈白可是驪珠出峽來附考在郡城南五里生白螺潭西有廟為趙氏宅元名妓羅愛卿葬處臙脂河女伴何須苦效顰五湖飄泊苧蘿貧縱令膏沐同西子終是紅顔命薄人附考在郡治西經楞嚴寺東北折而過天寧寺前相傳西施傾脂水於此徐偃王墳考見二卷處處喧闐賽社時徐王廟裏獨題詩麗牲有石無人掃空見斜陽下柳絲沈演之墓司徒荒塜逢寒食惟有鵂鶹樹上嗁麥飯更誰澆宿土東風芳草自萋萋附考演之武康人劉宋元嘉中為嘉興令墓在秀水治北望吳門外二十里趙大夫宅黄葉前朝古寺門豐碑仍記趙王孫汴杭宫闕消沉盡莫向雲堂獨斷魂附考在秀水縣治西南二里宋淳祐九年朝散大夫趙汝徘捨舍為報忠觀元楊璉真伽改為寺丘山人遂遂字叔遂嘉善人初為嘉興憩雲庵僧名通凡字凡可工詩與諸名士交善性狂放好詼諧馮開之贈之詩云凡公氣不凡只合住巉巖又云才多應八斗舌在可三緘後見罪於岳石帆即蓄髪業儒補弟子員世稱丘秀才及避地松陵不期月又棄去稱山人有樹下汲泉等稿為僧時所著又有丘叔遂詩刻則晚作也江上懐沈明徳風雪聮牀夜雲山憶别時客情新柳解鄉夢落梅知天濶雁聲逺江寒草色遲一言我不忘曾有更來期過張元􅌢經時不出户秋老一幽探真率成心賞英雄見手談家貧餘紫芋樹冷落黃柑别去如相念鐘聲在水南同饒公訪黃葉老人臥病不離榻聞聲知我來足方雙疊起窗始一推開籬縱初髙竹扉安舊積苔自嫌稀跡到巾幘鳥難猜問司馬沈公怪來㣲疾抱清秋減放南湖十日舟起色詎須聽七發索居先巳借三休枕邊黃葉饒新咏帳裏青山詫舊遊聞道好懐仍不廢月明扶上夜深樓夜雨雨憑深夜扣柴扄佛火沉沉四壁青入夢不嫌依榻響洗愁偏愛隔窗聽溪喧有獺過前渚水漲無鷗失舊汀侵曉試臨臺上望濕烟猶未散郊坰南湖訪叔度因值孟樸分人字路旁苦李亦逢春未與君言别後貧處士原能維世道故交安可失斯人雲萍不易知何處嵗月空勞問水濵相顧二毛休嘆息嘯歌無恙惜年身同漢冲羽侯由三竺至法相雨後嵐光濕不飛山空春冷尚侵衣松欹耳帽生清響雲讓肩輿入翠㣲後逕易過花未宻前峰難近竹深圍若為方稱追隨意行到西湖始似歸村居竹間獨立時涼風自相接囘顧碧池中蜻蜓踏萍葉王布衣路路字仲遵平湖人家虹霓里僻近海隅蕭然窮處集古安貧之士為書曰冰檗薈又著花史約言并客窗留三十咏步月萬里清光步步旋凌波顧影為誰妍柳梅疎處吟秋夜未必年年個樣圓白鷗翩翩長嘯自來身荆棘如何日與鄰翻羨白鷗無繫累滿湖秋水去來頻鮑教諭應選應選字太鹿湖州人博學洽聞治春秋得麻黄之傳執經者户屨常滿萬天間館於平湖馮氏因家焉後以明經秉鐸山陰子季方之髙之元文名赫然學者稱春秋三鮑壬午夏旱馮茂逺禱兩陳山姚叔祥以詩見寄次荅曾到陳山頂上峰相傳聖母此中封老翁寄我驚人句灑入寒濤走白龍三楚府君沈瑞鎜先曾王父徳載府君一字三楚平湖人為人誠信孝友樂善好施當析産時讓膏腴而取磽确遂以長者之行見稱於鄉萬天間為諸生久不遇失志早卒時我曾王母年二十九奉寡姑撫幼子流離患難遂成奇節季友不肖遑敢自詡祖徳但茲帙所登一以表㣲為務而我祖懿行炳然其敢勿述耶謹陳一詩附於諸家之後村居豈敢為髙隠聊成十畆家緑翻三逕雨紅積半巖花農父移耕耒幽人捧釣車不須思逺去一臥即煙霞檇李詩繫卷十八
