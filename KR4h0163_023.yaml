body:
  text: 檇李詩繫卷二十三平湖沈季友編國朝倦圃先生曹溶溶字潔躬號秋嶽平湖人居秀水崇禎丁丑進士由行人授御史入本朝以御史視學畿內厯副都御史户部侍郎外轉廣東布政使後降補山西陽和道裁缺還里甲寅逆藩叛閣臣薦為邊才隨征福建丁母憂不受職而歸戊午以宏博徵復薦修明史俱辭不赴乙丑八月卒年七十三溶天性梗直為御史劾輔臣謝升削籍熊開元密參周延儒廷杖溶疏白其寃甲申為流賊所執拷掠三晝夜委廄中得不死後任副憲時遇熱審多平反居塞上五年嵗飢力請賑救生平長於經濟未竟其用乃獨肆力於文章諸體雄駿而尺牘尤多長箋小幅人爭寶之其詩源本少陵蒼老之氣一洗嫵調與合肥龔鼎孳齊名世稱龔曹晚年自號鉏菜翁築室范蠡湖顔曰倦圃蒔花種竹置酒倡和無虛日愛才若渴四方之士倚為雅宗者四十年家多藏書勤於誦覽嘗以明季門户紛爭是非失實輯續獻徴録六十卷又痛崇禎朝輔相失人著五十輔臣傳五卷外有靜愓堂詩文集三十卷年來豫每從倦圃遊始歎先民風流未墜兹録其詩概置巳刻者惟取閩遊集及癸亥迄乙丑之作用冠斯卷一代巨公足以起衰式靡矣下建溪諸灘辭家違素心薄質困戎輅水宿以圖安涉險豈復怖挂席繇浦陽連旬溯風霧割嶺置洪潭居卑向誰訴劍戟起搏人犀利不可忤偃者類牛馬掉尾飲而顧茹波隨㵼之噴沫鼓餘怒吹舟捷若浮長風那足慕翕忽遘盤渦巨嵼躓前路捩柂屢折旋簸舞慎所措爰悟乘勢巧趨避都有故願策陽侯勳縮地使相附將無邱與陵吳楚特朝暮惜哉南服殊千里局庭阼僕本振竒子擇友及鷗鷺佳遊慰目前一笑失沉痼上建溪諸灘粵馬未全歸八閩儼南塞崩洪方疾趨巨石摚而礙萬石為一灘起伏互禪代疑從太始來屏山觸浪碎忽散等飄鳬虛際浴微黛縱逸不可羈參伍寫其態雖有百斛舟摧剛力相戴噴空千丈雪束之拳曲內水德本善柔一怒莫能耐洶洶浩有聲足以激頑憒長年工審勢奮氣與之對側戛風雷魂逆摩蛟螭背瞬目爭纎毫既進駭復退艱澀愧利涉功半事乃倍未覺異登車檣櫓皆歷塊寧無居處安盤錯我所愛百鍊終不辭出險荷天賚苦蕒往者登北嶽庳隘愧未稱黑壤育貞松五鬛覆天鏡首夏尚悽切氷窖礙途徑苦菜獨含和青荄挺寒穽采擷敢告疲實礪齒牙徑兹涖三山隅水族既繁盛上客進雕盤肥腯茹餘佞朔南雖兩鄉是物有恆性荒世任奢取儉者得其正羣營目睫歡難療畢生病野趣滿數莖執匕悚而敬飽食謝煩憂灑灑夢飛磴重與神人期遐舉發清詠瓶山詩我禾枕川藪有地稱瓶山體非石所作壞土居市闤牂羊牧其上童稚爭牽攀既失雲雨潤枯榛穴中間小物冒嘉諡久假而未還喻彼斗筲質夸大潛相姦遙探漢武紀整師驅百蠻酒算此由立征利輕痌瘝茍可浚民脂歷代孰肯刪綿延南渡初境蹙勢乃孱禾城充右輔扼要如當關人户頗殷庶貢稅馴不頑設官營𣙜務良貴出納慳儀狄為我師美醖職所嫺安知杯勺微堪敵九府圜嵗長堆斷缶冗雜生彎環其髙二三仞蟲嚙苔花斑聊供憑弔資登眺則己艱治王御廣宇軍旅咸就班方斥管商術力馭黃虞還枝署豈復贅陳迹徒荒間永為名士宅締造需百鍰巍墉謹闌入列卉垂煙鬟青泥煩掃除朱楯增斒斕嵇阮雖可追沉湎摧壯顔動發千載愁涕下同潺湲題東井畫黃葉村莊圖為吳孟舉贈昔賢畫品重人物近代始用山水竒輞川北苑好標格白戰安藉膠粉為千年沿襲罕傑制似策欵段當金羈非關作者腕運薄靈境未遇難力追吳鄉勝迹細如髮其間坦迤失險巇延陵先生擅丘壑手挽嵩華開階基滄江一道剪芒忽卧對終日生清漪曲房倣佛美人下廣庭或與高僧期昨嵗我曾掉船入自起酌我白玉巵遍探窅邈至曛黑妙得神解非掇皮木葉飄飄滿溪路傲岸恰與秋情宜一别已傷塵事隔寧料復慰胸中思乃知敏手善體物滿眼蕭瑟經營遲豈特纎毫極形似意在寫出凌霜姿據坐一揮奪萬卷四方賓客合不離項子纍朝傳畫訣謹師堂構加淋漓平居義不受煎逼祗取放浪酬心知此莊此圖實交警肯學豪俊徒趨時兔毫盞歌報陳若水建安黑窑天下竒土質光怪欺琉璃內含紋澤細毫髮傳是窑變非人為宋家茶焙首北苑必須此盞相鼓吹銀絲氷芽潔莫比取白注黑乖所宜誰知往哲嗜淳雅目擊彩翠心不怡求器求才兩無異力斥炫耀追純熙太素將窮祕文出中山之頴開威儀六百年間幾灰劫兵喧火烈仍孑遺嵗加斑駁異常制砂䀶蝕盡參敦彛陳公知我饒古癖拏舟割愛來見貽栴檀作室法錦囊啓視端可輝鬚眉涼軒酌水敢輕試覩物想像元祐時緩火筠籠點新鍔拱揖歐蔡瞻清姿陳公脫屣名利場亦如此殘堅自持席上新珍浮薄子修飾猶恨青黃遲先民矩矱世難識祝公高蹈慎勿疑徐器之出所藏宋硯為長歌夀我有眉畫春山之句戲答南遊曾鼓滇江舵峽口鋩山青數朵篝燈涸水鑿鴻濛紫雲垂乳當空墮春星之堂白石遲鴝鵒回光清向我是時年方四十強欲追左馬相頡頏即今老矣滯海域皮皴肉瘦髯如霜臨岐蹶步不得騁天寒夜黑眠氊房晨興絲淚淋漓罷尚磨敗甓雕羽商掉頭不借軍前箸西風飄動旗亭絮造物與人善玉成重到蓽門棲隱處甘持殘齒付縹緗矻矻校讐還達曙徐君念我邸舍窮好古徒復矜豪雄篋書盡捲入酒肆絺衣兀坐黃蒿中家有宣和祕殿石墨䀶濃漬生蛟龍攢花蹙結晝流液骨骼太朴神明豐定經蘇米擅波磔北狩不入葡蔔宫國步頻移貞自若論夀直須河嶽同開囊輟贈靡所愛故人與石千秋在滌除肺腑出槎丫又對遙山寫眉黛君為硯計良未俗豈知綺語干深戒五湖帆影况蕭條親捧玉環安可再只宜閟迹避三災真手摩挲長不壞匏杯歌酌酒當用黃金樽近年以來貴陶瓦物巧生新定莫窮易以堅匏更淳雅尚象恆思謀始難西楚東吳無作者禾里遺風差不俗逸客栽匏滿原野纍纍結實飽霜霧夏秀秋貞互傾寫巨者嘗聞濟險津酒易溺人此其亞鑒古足藉息流湎目前寓意在杯斚光踰栗玉謝雕鐫嵗月摩挲賤聊且我里魴魚尾頳赤甲乙之間嘶戰馬故家筐篚無一存插羽徴求到松檟猶餘匏器侑麯糵賓筵秩秩見瀟灑小製翻為四海珍鳯凰鸚鵡徒土苴乃知治器等治國羣材精粗趨良冶不然棄擲老田廬蟲吟雀啄誰能把後匏杯歌郡中攻匏始王氐其後模效紛然多各能推擇尚堅朴八月九月留霜柯宣武平生誚形似精微以往皆淆訛石佛羣生稱好手工惟急就虧揩磨流傳空復遍燕粵賤售祗辱幽人薖東郊周生最晚出家無尺帛顔常酡思窮莽蒼得竒竅盡刷詭怪還中和終年黯慘與神遇歘起奏刀如擲梭不規而成妙天質因物纎巨無偏頗瓶罍滿眼總適用譬若聖教陳四科其間卓絶首觴器琴軒書榻光相摩捧之宜俟偓佺輩侍坐可斥妖秦娥愚也好古徹骨髓周生之室曾經過持贈不惜倒筐篋皓若片月來煙蘿南滯閩堧北沙塞塵坌戛擊催沉疴糟邱已隤謝歡伯不飲奈此匏者何墮驢行簡星期橫山山人出無車浩興欲訪鍾山墟葛衣炙日僅掩骭腹底萬卷聱牙書竒書嶽瀆鮮能載况此風雪橋邊驢雲昏石滑驟欹側前却俄頃紛趦趄涉足直須氷在凛坦坦便覺囊智疏仕路艱危靡不有陷阱往往生巾裾萬物之靈盡如此驢也學步師其餘曾聞倒騎入金殿蹩􅍷仍返中條居噀紙倐令皮骨動舊史所紀終荒虛山人前年宰𨝍邑陽侯毒囓不得舒堤城澤國始平陸遍挽魚鱉歸耰鋤豈徒民族快完聚驢行孔道皆安徐偃蹇竟觸長官怒一朝宦籍邅削除多才自昔召傾覆更乃傲骨高難鋤瘦驢力薄良偶然未若此輩深而狙山人熟識倚伏理細事那足煩嗟歔長干六月暑氣合畫橈宛轉銜清渠三日行藥兩日卧趫健不異少壯初慎勿悔此暫時失詩腸遽使添鬱紆苦吟驢背古有諸且畫霸橋風雪圖星期墮驢後意氣彌壯喜而作歌鄭公騎驢踏氷雪山人效之在暑月觸暑江關途路長那免塵埃生一蹶鳴聲粗急極可怪晉賢聞此翻叫絶好尚從來不可齊若輩要知非俊物山人炯鑒端在兹扶擕顛覆將屬誰負重寧無千里骨致逺良藉層霄姿街亭統軍敗蜀績陳陶流血傾唐基用才衡量各有分大小倒置鴆毒隨前車之戒亦仁愛山人好遊終不悔輕􅋔側帽轉風流緩鐙垂鞭多意態真成詆驢被驢笑栖霞山色方清峭凍蕊含煙應候開飛觴石上參孤嘯回首天門光若拭高軒八騶能者得日暮徘徊古道旁我為山人重太息答林坦庵當年謫客喜投間困頓戎車又入關天下可懷惟老友生前能踏幾名山常因赤子勞心計擬借青春拭鬢斑别業橫塘松徑逺何時蠟屐訪潺湲以枯銀魚飯客伯騶曰是少陵所賦白小也豫謂少陵不及枯者補十二韻入筯連千族寧嗟盡取難封題離密網瑣碎侑加餐飪覺霜條短箱餘玉縷乾徑如驕骨鯁名略慰飢寒小品撈波得微生曝日殘非鮮仍水錯為臘類蔬盤乙去針芒細苞來道路寬製常因市賈餉豈藉漁官圖贊當論寸刀砧荷獨完自須班脯醢不復戀波瀾廉吏懸無策髙門鋏再彈娛賓聊佐酒笑比素絲看檇李四首淨相僧房起盛名徐園舊價頓教輕嘗新一惜潛夫齒嚼出金鐘玉磬聲滮水蟠根奕葉長筵前氷齒得仙漿上林嘉種休相借驗取夷光到甲香膚如奈子能加脆液較楊梅特去酸江北江南無别品傾城傾國借人看青綃圓轉密交枝繞蒂中懸玉一絲莫怪幾回停食指傷心吳越被兵時病中漫興三首年少逢辰定出遊如雲駿馬絡吳鈎休將舊日紅樓意攪起山翁夜夜愁借書南北久忘貧暖意雖回不記春勤掃松毛烹甕雪此生端合是詩人鼇磯勝與鶴洲鄰雙槳蓴香下釣綸祗是金陀扶病叟不曾孤負故園春雜憶平生詩友十四絶句鼎鐺有耳玉為盤周雅還登上將壇遼海鶴飛曾不返浮雲相望路漫漫陳素菴相國詩集名浮雲文采風流壓萬人觥船動處墨花春于今無復凌霜手落鳥絲網路塵龔芝麓宗伯每宴集必與客賦詩杯闌角韻雁門隂草載綢繆縞帶心自捧天書將母後斗杓髙坐萬山深李天生甫拜官即歸養母詩為海內第一蛾眉自昔寵難同敢信天家結網工挽盡南朝新調弱松陵傑士氣如虹潘次耕近有貶官之耗五嶺曾看續楚騷名家更拾錦成毫參差那得聨征袂緑桞城邊響夜濤聞梁藥亭名未與相值分部甘陵起愛憎人間甲乙事難憑男兒也叶稱量夢文選樓中半夜燈鄧孝威有詩觀之刻落紙隨人換酒錢雄才合在楚雲邊一生慣得安心法懶向衝波駕鐵船杜于皇詩自為一格學成早嵗謝軒車偕隱花林俠有餘特向峰頭尋俊語具區千頃浴芙蕖葉已畦進士髙蹈山中情芽本易惹間愁翦翠雕紅未肯休别體江湖成日下西崑翻訝少風流近時詩𣲖推二馮兄弟沿襲西崑為世人所尚好竒爭欲逞新裁元祐頻令入管來恰似賞他春色遍雜花還向野亭開長安舊侣頗尚宋詩艷才驚目五茸城結社珠盤盡有名堪怪酬身堅似鐵韶年偏賦綺羅情雲間自陳夏兩公後稱詩極盛婁江學士擅風華璧玉光中驟玉騧重唱鐵崖新樂府倩他紅袖拂琵琶梅村學士詩稍闌入元人東南空谷少同條剩有幽人卧碧霄松葉滿庭秋磬杳夜牀誰與聼芭蕉文可禪師談詩最契今已矣野服從來拙自知胸中木強未隨時鴛湖百頃氷花滿乞與先生下釣絲余自喻也客子貽燕京春詠讀之感懷四首煙月無情兩鬢秋禦兒亭下繫歸舟多時不屬垂楊管重為春詞惹舊愁晴沙小隊玉驄鮮屢見朱樓換舞筵縹眇仙風吹不絶尚留金掌似當年桐乳琉璃法釀開紅霞密砌擁瀛臺别煩楚調含蘭手剪取西山黛色來漏寒遺怨入琵琶宫體題成護絳紗三十九年如電抹因君惜取鳯城花胡教諭明逺明逺字子迂號九玄本朝改崇德為石門遂為石門人天啓辛酉舉人崇禎時舉賢良膺徴辟以親老辭不赴順治初秉鐸衢州開化縣再補台州之仙居有壽花居詩鈔自吳興歸遇大風舟覆前山漾中逾刻賴救獲免既而飲酒頗爽因作覆舟歌同患者郭彥深范翠華兩孝廉黃蘗山前黃風惡白蘋洲邊白浪作風狂浪駭拍天來萬斛之舟如屈蠖吾舟一葉輕于鳬妄與蛟龍爭馳驅快哉莊生千古論五石之瓠浮江湖自喜踈狂急欲寫操舟惜非長年者撅頭車子揚高帆迅如落鶻疾奔馬一局殘棋尚未終翻身忽落水晶宫誰言至人水不濡左挾馮夷右弓隆相國池頭雨初住蘇公潭西日將暮鷦鷯敢擬大鵬飛竊慕風流趙子固蘭亭至寶性命輕愧我唯餘折腳鐺死生雖大曷足痛一笑掀髯鬭酒兵大瓢小杓頗自適餘生何異逆旅客中秋明月滿西樓狂問青天眼空白弔高陽孫相公公諱承宗平生敦好學問崇尚氣節崇禎戊寅髙陽城陷闔門殉難雪鬢霜髯氣尚雄丹心不沒五湖中台星忽隕埋黃石元老云亡感白虹三尺藐孤麟鳯在公殉難之日祗逃六歲幼孫事詳行狀六千君子鶴猿空九原未了平生志松柏長生謖謖風屯溪溪雲渺渺白不辨山與水濤聲疑天風身在雲霄裏桃花洞次縉雲李若矦韻古洞如斗室雲深鎖不開桃花亦仙去繞徑盡蒼苔題節義顧仁陪祀忠節公像仁為華州姫忠節公文胤門役公知滕縣事越五日而蓮妖難作城陷公投繯死以印屬仁仁拜受歸與其父藏之遂同公死妻高氏聞之亦自盡事上聞特恩褒異仁與妻並祀公側翩翩年少髮初鬈仗節何曾愧昔賢下走莫驚陪祀典嶽公墓上附施全葉舉人方宸方宸字遇之平湖人天啓辛酉中式旋丁外艱絶意仕進與兄方寰鼎新報本塔樂善好施里中稱葉氏二長者同瑞芝兄遊乍浦諸山疊石栽松各有儕並欹石背拂松叉成連海畔擕琴獨何似漁樵一醉皆徐學訓柏齡柏齡字節之號殷長嘉興人𢎞澤子崇禎庚午舉人受知於黃石齋石齋贈詩云節之貽我詩十章文情脫灑筆睨古今鐘鼎如鴝掇放浪遺形骸瞻眺留日月不作悲離音不著窮愁筆不蹈辟支禪不弄飛騰術蕭然寄天地風雨絡膠漆授訓東嘉甲申後往來閩越間歸卒有朂光樓集題王鐵山房師桴園葦岸荷堤晝不醒板橋書檻傍煙汀飛來鳥似眠沙慣放去魚常借蔭停雲氣逼窗爭水碧竹隂連屋入簾青坐來不覺生遙想便擬乘風泛四溟大雲菴舫閣二首買得浮家不在江竹梢分緑影漁艭秋風颯颯三更後月擁寒潮到紙忩坳堂縱説芥為舟不信移來竹樹頭坐久但聞林葉戰恐隨風雨打蘋洲陳秀才許廷許廷字靈茂海鹽縣學生崔貞姑廟野塘臨練浦祠屋類團蕉近社初聞鼓開門側近橋靈衣金粉蝕煙帳蕙蘭銷欲采蘋花薦回波一水遙計秀才善善字廉伯嘉善人性倜儻博極羣書家貧以孝友聞有宜園集龍光吟黃輿之英化金鐵飛入洪爐煅霜雪擬將鋭采照人寰指定風雲見澄徹越工歐冶親為之秦客薛燭稱絶竒錯鏤金環鎖瓊匣龍吟幽寂誰能知便向豐城同蠖屈紫電凌霄訴沉鬱司空固是神明君拔出重淵表靈物太阿感泣龍泉愁此恩卓絶何日酬及鋒當為知已用清光騰躍風颼飀即今牛斗輝天宇猶憶司空求劒處千古英雄一片心試看三尺秋波去贈張潔宫先生舌在輕為相身間忘列矦未酬黃石略先愛赤松遊坐竹觴移月看蘆枻弄秋曲江風度老祗合韋編求題菊自憐霜節計蹉跎不向春風照綺羅栗里醉來山氣夕洞庭愁去水曾波清芬歷歷傳高士寒影垂垂對素娥一自白衣成往事空餘山徑獨悲歌從軍行羽書昨夜發諸營匹馬交河踏雪行收得思鄉未乾淚入雲孤角又三聲程沔陽于古于古字範卿號谷簾秀水人明末以貢為沔陽知州有谷簾集詩思峭刻是欲效孟東野而去其訴窮嘆屈者也得山中書撥火圍爐伴歲闌又驚書信過江干山中漫説雲如絮不護山人永夜寒龍坑先生程觀生觀生字仲孚嘉興人其學研精於易自漢以來所閲注疏詮釋凡二千種送魏忠節至京口踧踖披玉綸鐵木憑其身萬族爭耳目哀呼徹髙旻堪怪彼何為涕泗一何真三代直道行或者嘗不泯念此感生平介介以為珍雖無回天力風化關其人夫子今行矣鄙心胡能為滔滔江水逝瞻望須臾時迢遙三千里何由接清姿六月氣如焚械梏安可支恃有氷雪心化作清風吹况乃精貫日鬼神將涖之禇舉人廷琯廷琯字硯耘亦稱研民嘉興人崇禎癸酉舉人居甪里以善書名於時乙未正月十四日沈仲方過我留飲即步元韻雪殘當户虛生白林際微明見逺山月映中庭空似水人如孤鶴老逾間梅花入坐成三絶畫舫延光蕩碧灣小室名春水船贏得夜深多况味此情與子最相關題畫贈禪友四月鶯啼緑掃天蘭香筍嫩桞含煙竹風瑟瑟催微步花氣濛濛撲晝眠山出夏雲昏欲雨亭臨秋水坐如船知君好事多幽勝與爾相期共入禪鍾侍郎鼎鼎字梅城石門人崇禎丁丑進士順治間官太平知府歷升廣東按察使入為刑部侍郎左遷陜西副使夜遊虎丘古寺藏林丘乘興夜登陟金虎有時銷愛此舊月色顧秀才問問字去疑桐鄉人少好學晚年以方書活人年八十終贈桐溪日者張宿之知君本是赤松流偶作人間汗漫遊識邁九師玄獨剖爻分三畫祕全抽清風入幕頻揮麈白日侵簾半隱鈎每與問竒開妙義百文常挂老鳩頭朱樂陵萬錡萬錡字潔湘桐鄉人少見知於張溥崇禎丙子舉人入國朝除山東樂陵知縣著歸來日注并惠風堂集僧房看蠟梅風光浪擲惜年華已見新黃作異葩仙骨夜涼偷玉笛小香冬暖透鮫紗座無雜客妨佳句庭有幽禽守凍花都説上陽金谷好如何及得老僧家袁貢士袾袾字丹六嘉興人與范驤朱一是為文社知名於時題海昌北城樓東南佳氣鬱樓臺畫棟霞連睥睨開吳越星分從檻出江湖水合抱城回煙含萬樹天邊盡浪湧三山海外來此際臨風瞻北極五雲深處是蓬萊徐秀才濟貞濟貞更名贊宸字湄棫海鹽人忠烈公季子有霞蔚軒稿新蒨可喜又嘗集海鹽先輩詩曰海谷遺風集春日讀書山中隴上紫雲飛池臺積翠微山􅈨香未歇石鞠種還希翦水呢喃鳥盤峰薜荔衣門前清露重幾架溼薔薇漁浦野眺長途寂寂越山前日暮孤征見輞川牙槳銀篙飛鶴渚雨蓑風笠捕魚船溪邊落木三江地城外歸帆半霧天漂泊只今嗟已甚滄洲不斷有荒煙汪司幕砢玉砢玉字樂卿號玉水嘉興人明末以貢官山東鹽運司幕職有鴛水月社篇西山品蠟屐音樹石異綴諸刻學繡塔胭脂水色浸浮屠為識夷光巳沼吳不數回文挑錦字偶成浣帛孕明珠桞顰絲絶安柴辟花費針神賜屬鏤果證摩登伽位上七重寶樹鎮嘉郛蘇小墓無限春風無限情千年猶想碧油輕歌殘井畔桃花落舞剩亭邊桞葉生漠漠香魂疑月影茫茫玉質斷雲橫仙才山色何曾死不獨錢塘夢得成項氏所藏管仲姫竹卷友人得之已斷後跋忽有得其題語者為中峰及松雪兩翁手迹時反疑為贋作為賦一絶露葉煙梢幾幅攤晴忩影落石泓殘堪嗟重合延平劔却被人間兩樣看陸舉人上瀾上瀾字芳洲號狂生平湖人崇禎丙子舉人為文古奧年八旬日居荒村手不置卷所著詩文集并間齋志林南渡野記湖邑記聞玉鈎小史諸書我湖稱博雅者近代以來未之敢匹也和汪晉賢悼其小姪女金媛冇寄生略紀事雲外來清影花間拂繡茵勝無憐早慧希有念前因玉碎天門謫龍歸水府新白衣先受記仍侍畫中人挽俞烈婦一時薄命總雲煙誰向霜秋唱可憐古戰場成埋玉地衆香國覩散花天六千短後隨潮遁二八修蛾捍刃殘如此貞魂堪慟否芳名獨藉大家傳附考俞氏庠生君振女進士張樞次子豹烈妻丙戍五月二十日山中白冦猝至張家西廊下氏匿竹叢中既被執欲挾之去不從以刀擊背且牽之出牆力躍墮塹復迫之攀樹大呼曰若不速殺我終奈我何冦怒斫一刀撲地殞絶元旦四首氷車才歇又香輪雲卧荒村自在身百戰曽經窮甲戌六旬重得遇庚寅未除土石愚公谷無恙風帆妬女津屈指春田蒼翠滴提壺行喚踏花茵南北驅馳今倦遊蒼茫雲物祗浮漚自甘老婦身藏繭笑看時賢氣食牛欲媵梅花尋竹石漫調鶯語佐箜篌未知何處煙雲滿小白長紅遍緑疇嵗華取次寓間身未辨分行主與賔青眼自難容俗物蒼天原不愛才人書成廓落同耕石年少推排類積薪花鳥憑闌供逸賞浮名何事逐風塵客冬層雪滿槎丫春乍霏霏林影賖清韻不須煩水遞寒威未肻放梅芽曾從觀獵驚談虎無計搜林學捕蛇此日間吟聊浣俗墨痕點染亦生花漫興昨夢如今醒未間庭明月窺人老子興復不淺煙鋪草藉花茵竿竹亦稱竹林拳石聊呼石丈我意正不在多衆譽何如孤賞誰言天上無憂但許人間如願閉門半帙殘書對客三行皛飯清泉浴雨潺潺白石耕煙齒齒且尋栽桞先生勿問種桃道士蔣伏羌薰薰字聞大號丹崖海寧人嘉興籍崇禎丙子舉人國初授縉雲縣儒學教諭康熙癸卯升鞏昌府伏羌縣涖任二年以賦詩立碑被劾歸里有塞翁編擬古有客唱白雪豈惟和者稀下里會成羣顧曲紛是非奈此數千人孤響何因依縱鬻秦娥歌梁塵空自飛使非謝安石捉鼻當見譏馳馬長楊道小隊列圍場蒼鷹兩臂鞲寶劒䱜魚裝雕弓白羽箭走狗亂無行灑血空禽獸飛揚誰家郎獨有中牟宰馴雉不忍傷觀政非肥親讒言反為殃效李賀傷心行憂接如懸絲脈脈悲秋素落葉點敝裘回風嘯急雨古劒苔花緑不平鳴欲舞月出照羈人牀下寒蛩語羌中風土詩十首録二少陵入蜀思華為言形勝美風土惡其巫峽蜀江比之華嶽黃河美矣若風土之惡詩人不忍斥言三百篇美刺並列何以訓焉豫仕羌寓羌留滯未歸為著風土詩庶幾太史採陳悉兹民囏不獨後之遊者將有感於斯章地瘠民如寄窮鄉半古莊無人居曰古莊開荒聊種麥懶織不栽桑寒水魚無樂春山草尚黃耕田難得穫更覔禹餘糧少婦氐羌飾重窑閨閣深插花叢緑鬢解辮受荆簮羌女適人始解辮傅溺楊妃粉投鞋卓氏琴以溺塗面取其光潤孀婦再嫁不憑媒妁投鞋報帕為訂鄰家聞夜哭幾處白頭吟寧河王鄧愈祠將軍麟閣與雲齊絶塞荒祠落日低不是捫苔尋斷碣更無人説鄧征西愈為征西將軍直扺崑崙山封寧河武順王登鎮邊樓次解大紳先生韻學士思親幾度秋大紳謫河州衛吏有隴樹秦雲萬里秋思親獨上鎮邊樓之句塞翁去國更登樓百年遷客遙相望白水河西定白頭朱上舍茂曜茂曜字子蕃號惟木天啓中補嘉興府學生承蔭入國子監晚栖心禪悅謂人世大夢録古今史傳及所見聞凡夢兆之可徴者號徴夢録暇賦六言詩積纍千百沒後其稿悉亡人日過伯兄貴陽守放鶴洲别業是宋朱希真園林舊址壁上題高工部詩戲作舊業朱三十五曾種梅花滿枝恰喜草堂人日高三十五題詩希真逹夫俱行三十五題畫小言有序冬日施水菴居韻石山兄出華亭瑩公所贈無心出岫圖見示乃戲為隨意拈咏菴為墨林先生昔年習靜處題為色相一樓月聲聞雙樹風因并識此清淨吳箋逾玉興酬筆落雲屯此處那堪無屋宵來移到南村比屋可封之俗歸來不是無舟坐看今春又過鄉心遙挂浮丘鍾秀才諫諫字惠逺後更名啓秀水人順治諸生觀吳巨手畫歌吳生高竒世無匹眸子炯炯當秋日文苑風流自許豪閉户窮愁人不識少年百事皆能工畫畫一日來神功江天瀟灑勢獨出蒼蒼咫尺千竒峰細莎軟草江頭緑山靜無言流斷續空讓陶濳歸去來雞犬桑麻武陵曲吳中先輩沈與文揮毫疾走追其羣一時翰墨照光采九天唾落春空雲吾觀此事非小術吳生下筆重心得今時作者但寫真秋毫豈是神明力誤落塵埃二十年時聞雲水思悠然對君此畫不肻住從買山隂道上船十載十載如今日長年亦苦愁草深周子宅月散庾公樓弄笛招黃鶴疏池引白鷗平生江海志雁鶩野塘秋沈舉人日昆日昆字以白號丸掌平湖人萃楨長子崇禎已卯舉人沈靜恬雅無貴介氣弗計家人産國初授縣令改學諭未仕卒南徐道中次查子宣二南叔姪韻長途屈指半淹留猶喜高歌度晚秋夢繞河山應化蝶人衝風雨似飛鷗關前只望浮雲滿泗上徒悲逝水流阮氏才名今更重相逢何事哭窮愁王同知睿睿字聖若號愚谷嘉善人崇禎已卯副榜本朝授福建興化同知多善政有曠期堂集莆陽稿餞羅篁菴少詹致政歸里何事承明客飄然謝帝京賜金明主意祖帳故人情匡嶺聞琴曲瀛臺憶履聲幾時傳尺素千里問王生送沈一指之任高陵新除大邑復秦關左輔仙鳬别上班自按紅牙歌白雪好斟緑蟻寫青山龍門髦士車爭御鹿苑兒童馬共攀兩度送君情轉切多因别恨損朱顔哭凌日旦老驥鹽車雙耳垂英流天絶更堪悲却將冀北窮途淚併向山陽笛裏吹鈕漳浦應斗應斗字宿府吳江人秀水籍崇禎癸未進士任漳浦知縣平波臺積水明千鏡中流峙此臺雲從湖岸落浪湧寺門回栁外千帆去沙邊一鳥來昔年題咏處古壁滿莓苔汪進士挺挺字無上更字爾陶嘉興人崇禎癸未進士高尚不仕書法似歐陽率更年六十五無疾而逝有曾城遺稿朱太守鶴洲草堂落成同諸公宴集澗紆巖削徑初成雅稱歸來物外情近郭門無軍將打過橋龕有佛燈明雙栖煙島昂藏鶴獨囀風林斷續鶯敢謂幽蹤希二仲深煩折簡費將迎魏封君廷薦廷薦字無咎號友莊忠節從弟少為諸生以子學渠貴贈朝議大夫有息踵居集家子一畫淵明采菊圖見貽戲作茅屋四五間修竹一二畝東籬繞曲折南山安户牖芙蓉既盛開菊又當重九此際陶淵明寧無人送酒張貢生賡奏賡奏字道柯嘉興人順治初貢為江西藩幕有紀遊詩黎元寬文德翼序之稱其感事悲涼有古人之致送友從軍秋風此日挂弓情一劔書生仗䇿行天柱江流鳴塞角燕山夜月駐秦筝軍麾南下從王粲羽獵東巡薦馬卿重典新開麟閣待幾時齊看海雲平曾畫士鯨鯨字波臣閩人來居桐鄉青鎮善丹青寫照妙入化工梅花和尚塔每從清夢憶梅仙杖履尋幽破曉煙竒石尚餘髙士節寒花猶得野人憐乍看青過春塘草却怪香生陸地蓮我有幽情懷隱去蹉跎還負入山年胡太學夏客夏客字宣子一字鮮知海鹽人震亨子博極天人凡七略九流無不閲覽好模周籀秦篆雖竹書漆簡􅌏敦􅲷彞一見輒辨其年月有谷水集題楊妃吹笛圖玉笛玉環吹掖庭李三郎和李謨聼險程蜀道辭同輦芳訊仙山感二星樂府罷歌胡鞛子梨園新曲雨霖鈴馬嵬千仞清秋月曽照蛾眉向翠屛遙和李因仲孝廉灌園詩破廟鄰僧勿習禪相尋白話共陶然看舂罷亞如農老特煮黎祁供佛前細摘棚間垂綻豆輕划􅣙去採鮮蓮歇勞儘噀茶滋味留得迎梅雨賽泉留姚當世小飲賦贈叔祥先生嗣也海山靈秀啓真源同調同時破俚言七子齊名爭日月一編傳世繼乾坤平生久快心期合後嗣都傳手澤尊八十年來壇坫在通家異代復寒溫海鹽石隄歌三首海潮頭起與城齊百萬金錢築石隄隄路逶迤三十里襄陽枉唱白銅鞮石隄自北接秦川最盛觀潮八月間隄內白洋河一道畫船簫鼓那曾間到秋水母圓如蓋白蟹擎螯筐似輪賺得逺方遊客喜歸誇海味向鄉人江南曲三首劉黃花馬夾淮邦髙鷂翻山直到江天塹一時增設險侯藩四鎮列旌幢大帥髙傑號翻山鷂劉良佐號花馬劉與黃得功劉澤清皆封爵鎮淮陽國母才從土呰回貫魚長信詔新開莫愁爭抵西湖好選淑欽升御史來選后已遍金陵遣中使至浙選良家女相傳彭某升浙江巡按以佐中使六院笙歌己沸天內家舞隊更翩躚庭花舊曲不堪唱司馬新編燕子箋宫中教習優伶少司馬阮大鋮新劇名燕子箋屠教授爌爌字暗伯嘉興梅里人為諸生從遊甚衆客遊死于粵東有朂齋稿古意素絲非一絲機中織成帛卷舒生容光從郎自搖襞慎勿染為緇終身不見白贈别袁重期髙飛鴻雁滿關河此日寒江起夕波庾信哀時常作客梁鴻去國獨行歌霜凄茂苑清砧急月照荒臺落葉多為問吳中舊知已空山叢桂近如何東湖遺老錢士馨士馨字稚拙復名􅠒字稚農平湖人崇禎壬午貢入南雍見知於吳梅村尋入燕公卿爭欲客士馨士馨久而厭薄之人漸目為狂生李自成將逼京城中允李明睿疏請南遷士馨私謁之泣曰賊已盡得秦隴日夜行四五百里倘聞南遷之事以輕騎繞出畿南突犯警蹕公將何辭以謝天下明睿慙懼無以對及京城陷士馨匿迹樵林流竄于兵火之中艱難辛苦無不備經多寄託於文章後奔走無所成貧益甚自彚其騷賦詩文為一集然貧不能剞劂遂散佚略盡今所存者零璣碎玉耳士馨輕財好客工古文詞兼精書畫每抵掌古今必縱橫數千言卒至窮老以死亦可哀已秋雨感懷自愛尋溪躡屐看獨傷萬木到秋殘青螺逺黛千山黯白練澄江七月寒歸燕已辭梁上盡鳴蛩還向草中闌乘流晚出橫塘水贏得漁蓑緑未乾暮春畫溪栁垂隄送溥子南歸楊栁芊綿水照隄三千故國一青絲送君愁疊陽關唱但寫垂條記别離黃解元濤濤字觀只嘉興人崇禎壬午解元出陳子龍之門國初為龍遊教諭遷滋陽知縣未仕卒有檇李古迹詩秋蟾墓六里離龍墓迢迢兑脈長滇池分貴族仙術費長房附考宋嚴處士賣藥秀州遂家焉墓在蒯塔坊烈女河市井雙閨秀臨危大義明天留一節在人誦二貞名附考至正戊戌紅巾至民錢子順二妹結裾投河死河在州治後橋下其嫂俞氏亦守節洪熙時表為二貞一節景范廬薪膽沼吳宫主憂臣辱同淳熙景范客志在滿江紅附考在金明寺後宋淳熙戊戌狀元姚頴築冇喬木參天幽若山谷向為項氏别墅今屬曹司農溶額曰鐵舟姚有滿江紅詞二闋傳于世石笋夫人廟地實有情生笋女如介石為神白苧都中賽社賣花村裏尋春附考府城東南石笋自地出窮其恨不可得土人立廟祀之義婦坂烈女從夫矢不更丈夫感激自成名報仇死節非容易天遣黃巾葬吕榮附考漢吕氏女名榮由拳人吳許升妻勸夫力學應州辟為盜所害州捕得盜斷頭祭夫黃巾欲犯之不從見殺大風雷電賊懼而葬之太守麋豹為冢于由拳郭里墟北花月亭多花少月何堪愛月好花殘更欲愁每羡倅州張子野一亭花月四時遊附考宋張子野倅秀時創亭取雲破月來花弄影之句朱舉人一是一是字近修海寧人崇禎壬午舉人僑居嘉興之梅里有聲譽三吳文盟推為領袖有為可堂集觀五重所設水柵關廂有嘆兼悼其弟緯光戰合三千騎關封十八盤亞夫真將種行已本儒冠論世憑多口亡家痛二難紫泉流不盡落日水聲寒懷楊彤宣萬里投人急遊魂道路長河才過玉斧山忽見銅梁節鉞開新府綈袍檢舊裝懸知今夜夢君會到錢塘雜咏旌旗縹眇鼓闐闐澤國揚波勢蹴天幕府防秋新築塞樓船跨海舊衝煙田橫結客真多事楊太稱兵更幾年天命有歸爾何益時看戰骨一澘然遊虞山輕舟十里泛平沙雲外虞山一半遮隄勢逺回言偃墓草根青入仲雍家野泥初坼未開笋溪雨欲流將盡花乘興不辭今日醉此身誰記在天涯虞舉人相堯相堯字在欽給諌廷陛子崇禎壬午舉人國初以母老陳請終飬有復旦堂集聞雁白露下庭柯拂拭驚衣薄燈昏影倍親忩虛月易落飛夢逐文鴛清聲擬鳴鶴知從故里來無書慰寥廓駱馬河阻風四望郊墟絶暮煙停橈躑躅路難前杳無漁火堪呼渡賸有鯨濤欲拍天雨滴衾禱氷作伴風搖檣櫓夜如年自來不得江神助阮籍窮途豈偶然除夜感懷一宵迎送問如何竹報平安獨寤歌半世浮名疑畫虎全生拙計學藏螺詩因慵懶無心祭鬼避清狂不待儺往事華胥空記省五更庭燎動鳴珂浪擲金錢卜大刀絶裾未忍擁星旄灌園何事營三窟攬鏡爭看有二毛短笛笑吹青玉案斜封恥進鬱輪袍新恩雨露𢎞將母感馮中丞郁大理得請折得梅花當木桃莊封君日思日思字汝立號立初學正嚴子崇禎時副榜貢以子鏻推恩封中憲大夫有四書尚書説凖白苧草集山居一自山居後塵心滌幾何疏林人迹少峭壁鳥聲多天逈騰黃月溪平皺緑波那知蘆荻裏驀地發漁歌晨起觀雪用鏻兒韻淅瀝驚殘夢推忩白滿枝光搖疑隱雀風拂似垂絲極目雲山幻遙看天地竒蕭然無一事相對洗塵思籬邊聨句有花盈架不愁貧立初花亦當筵淡蕩人巨觀晚節凌風能玩世子元幽芬帶露自含真抑園欹斜似笑三分醉堯夫嘯傲常空萬斛塵宿孚一自籬邊同賞後幼陳秋光佳處即陽春東曙李教諭新枝新枝字森若肇亨子崇禎壬午舉人康熙丁未就教棄職終飬有淡巖小脈和新室落成卜築臨清渚柴門愜素心無山路自轉有樹境偏深博物搜竒乘怡神托藝林蕭然獨高寄慕古欲忘今題畫與魯千巖葉落深林見逺山山前虛閣小灣環溪翁有約來相訪先度清吟出樹間芾園先生朱茂晥晥字子芾人稱芾園先生太傅文恪孫崇禎初補嘉興縣學生甲申後棄去教授生徒先後著録者百人故友邱嶽以子相托浮海入粵轉徙閩南而死晥視若已子為之娶婦教以學文居室三楹書籍釜鬵鹽豉蒜果雜置几案客過或自執㸑徒步闤闠中手自擕持菜把遇之者不知其為三公後裔也有顑領集讀陶靖節集人生兩儀中形與影相親雖曰勞逸殊好醜豈不均形影莫贈答贈答辭苦辛賢愚等湮滅醉者詎千春衆輻共一轂有以無為珍思慮濶然空但隨時運淪至矣柴桑訓形影不如神沈太學章章字宗玉一名璋居嘉興之白苧村有魚梁藕花溆水竹灣諸勝皆自為題咏集名苧莊頗能拔俗淮隂侯祠淮水十斗泥半石行人入門三歎息王孫功高天下疑赤龍雌雉俱慙德前有渭水後桐廬進則不足退有餘曷不歸釣城南魚靈谷寺看梅下馬看碑度孝陵山椒十里樹層層半開香氣清於水一路人家靜似僧春動粉鬚都化蝶夜寒花片欲成氷無煩襆被兼燒燭月白煙黃睡未能隋隄懷古煙火春隄翠黛連垂楊不綰舊龍船阿嬤曾濺風流血一樹瓊花變杜鵑𨝍溝新碧晚濤平楊栁曾遮殿腳行誰道雷塘歌吹歇月明重按玉簫聲草四橋邊揚酒旗玉鈎斜上草離離風吹一陳梨花雨又是江南寒食時姚秀才佺佺字山期嘉興庠生居於吳有抱經樓諸選其已刻者注釋昌谷集嘉隆七才子詩選詩源初集聞鵑何事催歸鳥鈎輈喚我頻故園經戰後歸去巷無人孫貢士一騮一騮字天卿秀水拔貢生有硯隱居集重過高工部寓公西園十畝間園舊板橋道南重過黯魂消秋花黃蝶猶成隊曉露紅蘭惜易凋事去英雄時坎坷年來車馬巷蕭條靈均一去何由返空對江潭賦大招張秀才履祥履祥字考父桐鄉縣學生其學一以鹿洞為師仁宅義根言規行矩間作韻語有楊園備忘録題屠處士爌村居霍原六聘山焦先三詔洞漁子定迷津只莫桃花種徐太學仲選仲選字華海一字鶴友海鹽人國子監生有鶴友詩稿水村照檻晴光眼未迷瘦藤斜影度橋西沙頭白鴨黃鵝睡籬畔竹棚豆架低屋似魚船疏荻繞亭如僧笠稚松齊此鄉風景真堪戀只合攜瓶老菜畦沈太學原淳原淳字伯淳平湖人明末由諸生入太學與陸叔度諸公友善多酬倡之作兵火以來後嗣凋落遺稿無傳殊可嘆也乞衣五栁先生詩乞食乞衣我亦賦哀情一堆敝絮封雞骨半卷殘書擁墨卿堪嘆鶉隨原憲老誰分綈使范雎生孤村僵卧無人問冷落芙蓉照水明徐秀才淮淮字愛竹嘉興庠生有愛竹軒詩宿金粟寺昨嵗曾遊此莓墻墨尚新雨花長似粟觀海更無津下榻便行客烹茶費主人年來稀戰伐鼉鼓但迎神鼓係孫權所留沈秀才文輝文輝字履亨嘉興縣學生有瓜田遺稿西莊乍喜人煙接都無俗客喧漸能諳稼穡不復厭雞豚仄徑苔梅古疏籬竹屋存東塍近僧院清磬報黃昏戈金湯金湯字帶如平湖人郎中用泰子郊遊雨過青山碧四圍春風輕揚百花飛極知良會非容易馬上何妨酩酊歸檇李詩繫卷二十三
