body:
  text: 檇李詩繫卷三十七平湖沈季友撰周文種吕氏春秋云字㑹楚之鄒人廣輿記云字子禽鄞人為越大夫鎮守禦兒城練卒禦吳五年五月吳破檇李王入吳與羣臣臨水祖道軍陳固陵作祝詞二章皇天祐助前沈後揚禍為德根憂為福堂威人者滅服從者昌王離牽致其後無殃君臣生離感動上皇衆夫悲哀莫不感傷臣請薄脯酒行二觴大王德夀無疆無極乾坤受靈神祗輔翼我王厚之社祜在側德銷百殃利受其福去彼吳庭來歸越國附考郡為古揚州城春秋於越敗吳於檇李及越滅吳地歸越周末楚威王取越地屬楚秦始皇二十五年置長水海鹽二縣屬㑹稽郡東巡掘汙長水徙今治改名由拳海鹽陷為柘湖移治武原鄉在今平湖境二世元年項氏據為西楚地漢髙祖三年立兄賈為荆王地屬之十一年賈誅復立㑹稽郡十二年封賈子濞為吳王海鹽置司鹽校尉新莽元年改海鹽為展武東漢建武二年復名海鹽順帝永建二年海鹽縣陷為當湖移治顧邑山在今平湖縣南乍浦吳大帝黃武四年割由拳海鹽二縣地為鹽官縣黃龍三年由拳野穀生改為禾興因以紀年赤烏五年避太子和諱改禾興為嘉興東晉咸康七年海鹽縣移處馬嘷城𨽻南徐州八年復𨽻揚州梁武帝天監六年海鹽縣屬信義郡太清三年析海鹽東北境置前京縣治京浦在今華亭縣東南與嘉興海鹽俱𨽻吳州陳武帝永定二年割海鹽前京鹽官三縣地立海寧郡治鹽官隋文帝開皇九年罷吳州并信義海寧郡改吳郡為蘇州升錢塘為杭州廢嘉興鹽官入錢塘屬杭州唐武德七年復置嘉興海鹽縣屬蘇州八年嘉興又廢唐太宗貞觀元年復嘉興縣省海鹽入嘉興仍屬蘇州𨽻江南道睿宗景雲二年又復海鹽縣屬蘇州改𨽻揚州先天二年省海鹽入嘉興𤣥宗開元五年於馬嘷城西北置海鹽縣即今治也天寶元年割嘉興之東境海鹽之北境崑山之南境置華亭縣大厯五年升嘉興為望縣十四年改𨽻浙江武帝㑹昌四年升海鹽縣為緊縣昭宗大順元年割海鹽歸杭州乾寧四年吳越王平嘉興梁太祖開平三年立吳江縣分嘉興之北境與焉後唐莊宗同光二年吳越王升嘉興為開元府割華亭海鹽二縣屬之明宗長興二年文穆王罷開元府復屬中吳晉烈祖天福三年析嘉興之義和鎮為崇德縣明年又以嘉興為秀州另立嘉興縣與華亭海鹽附焉自是不復𨽻蘇矣宋太宗淳化三年𨽻浙西路徽宗政和七年改秀州為嘉禾郡十年割嘉興之梧桐等五鄉益崇德宣和三年復改為州寧宗慶元元年升嘉興府領嘉興海鹽崇德華亭四縣元至正十四年升為嘉興路置華亭府屬焉元貞元年升海鹽崇德為州元亂為張士誠所據明太祖吳元年改路為府以海鹽崇德為縣華亭屬直𨽻宣德四年分嘉興之西為秀水北為嘉善海鹽之東北為平湖崇德之東為桐鄉領本縣七之改崇德為石門縣朝因越人二十一年冬十月王伐吳國人各送其子弟於境上三日徙軍檇李作離別相去辭躒躁摧長恧兮擢㦸馭殳所離不降兮以泄我王氣蘇三軍一飛降兮所向皆殂一士判死兮而當百夫道祐有德兮吳卒自屠雪我王宿恥兮威振八都軍伍難更兮勢如貔貙行行各努力兮於乎於乎附考越語勾踐之地北至禦兒越絶書語兒鄉故越界以為戰地置石門為限在今桐鄉縣西北二十五里及越敗夫差增封勾踐地北至平原在今海鹽縣北平湖境柴辟與檇李界乃吳南境也顧新于主四城暨射襄胥山伍塘練浦逰屯涇千乘鄉千步路走馬岡紀目坡皆吳地何萱晏管四城暨馬嘷長營千人坡烽火樓范蠡塢皆越地並在今嘉興海鹽石門桐鄉諸縣境上則吳越分界本在我郡故前人謂到江吳地盡隔岸越山多與吳越一江分二詩未足深據也秦無名氏秦駐碑始皇承天越受帝命業超上世殲周滅鄭七雄靡餘六國是併功齊太古道深前王埒炎均昊美冠顓黃通靈七代敬構商堂縱聖凝賢將記百幾奄藹餘輝蜚聲萬祀附考山在海鹽縣南十八里海上始皇東遊登此望海又名秦望亦名秦徑始皇美人死葬山下有美人廟又相傳五百童女避秦難於此後得仙今尚有秦皇石橋柱十二沒於沙中山下長堤沿海為始皇馳道山下有秦溪廟前有飄松一株伐去復生時顯戈甲光怪之異云碑係梁天監二年八月二十三日右判史敬素立字多磨滅不能全載按宋王象之輿地碑記目曰始皇碑在嘉興縣意即此碑然不知何年移郡城耳三國吳無名氏題海鹽侯陸禕墓皇綱不振天裂地剜南基蕩蕩北辰桓桓帝命作鎮龍嘯江干承泰六合響威三壇求其隱逸將彈南冠入賓金室講道儲端我翼未輝摧折永歎何用不德命此執翰鏤金作頌億載不刋附考陸禕字元容凱之子也赤烏中為黃門侍郎封海鹽侯加偏將軍行左丞相鎮西大將軍事厯征北將軍入為太子中庶子剛方强固在戎果毅其墓碑係泰寧七年乙酉十二月壬戍立文甚可誦宋政和間毛滂取置月波樓建炎三年冦亂太守鄧根碎為炮石晉陸機字士衡吳郡人武帝時官內史賜爵關中侯有平原集為顧彥先贈婦二首辭家逺行遊悠悠三千里京洛多風塵素衣化為緇修身悼憂苦感念同懷子隆恩亂心曲沉歡滯不起歡沉難尅興心亂誰為理願假歸鴻翼翻飛浙江汜東南有思婦長歎充幽闥借問歎何為佳人渺天末游宦久不歸山川修且闊形影參商乖音息曠不達離合非有常譬彼弦與括願保金石軀慰妾長飢渴附考顧榮字彥先其先以勾踐支庶封於顧邑子孫遂以為氏今其地自海鹽析屬平湖榮係吳丞相雍之孫與陸機兄弟同入洛號三俊拜郎中厯廷尉正嘗與同寮宴見執炙者有欲炙之色割而啖之曰豈有終日執之不知其味者乎及趙王倫敗榮為長史被執賴執炙者為督卒救免齊王冏召為主簿冏驕恣榮懼及禍終日昏酣馮熊知其意曰府大事殷非酒客任乃轉中書侍郎後以討葛旟功封嘉興伯廣陵相陳敏反榮與甘卓紀瞻輩起兵攻敏敏衆萬餘見榮麾以羽扇皆潰散元帝鎮江東以為散騎常侍謀畫皆咨焉贈侍中驃騎將軍開府儀同三司諡元榮素好琴既卒張翰鼓琴而哭之陸雲字士龍機之弟官清河內史有清河集為顧彥先婦答二首悠悠君行邁煢煢妾獨止山河安可踰永路隔萬里京室多妖冶粲粲都人子雅步擢纖腰巧笑發皓齒佳麗良可羡衰賤焉足紀遠䝉眷顧言銜恩非望始浮海難為水逰林難為觀容色貴及時朝華忘日晏皎皎彼姝子灼灼懷春粲西城善雅舞總章饒清彈鳴簧發丹脣朱絃繞素腕輕裾猶電揮雙袂如霧散華容溢藻幄哀響入雲漢知音世所希非君誰能讚棄置北辰星問此𤣥龍煥時暮復何言華落理必賤孫綽字興公太原人官廷尉卿康僧㑹贊㑹公蕭瑟實惟令質心無近纍情有餘逸厲此幽夜振彼尤黜超然遠詣卓矣髙出附考康僧會本康居人吳赤烏中為大帝祈獲如來舍利建海鹽金粟寺尸解後每現真身眉間放光頗顯靈異張林陳夫人墓詞柔惠清順中和聖善婦德既備母道亦踐志厲永玉厥德彌顯靡靡其操翼翼其仁明景內映朗節外新芳徽風邁淑慎其身附考夫人姓徐晉時吳郡嘉興人見趙志齊陶𢎞景字通明丹陽人諡貞白先生書海鹽陸逸沖十賚文後賚爾十事事凖前史對揚嘉䇿循言求理無或驕惰以騫斯㫖援筆甲懷敢告處士附考陸逸冲字敬遊海鹽人陶隱居弟子齊永明中隨隱居於茅山西嶺立華陽館皆逸冲之力隱居嘉其勤勩名為栖靜處士作十賚文䇿之按許長史碑隂載上清弟子第一人乃華陽前館主吳郡海鹽陸逸冲也梁簡文帝題海鹽令蕭特墓威鳯五色朝陽千仞孫枝發響將雛流韻瑾既誕子恆乃瓘𦙍銀鈎之巧重世遹雋况此臨池蟬輕露潤附考蕭特字世達子雲之子早知名善草𨽻梁髙祖嘗使之書謂子雲曰子敬之書不及逸少適兒特迹遂逼於卿官太子舍人出為海鹽令坐免唐宣宗題嘉興水西寺殿閣連雲接爽溪鐘聲還與鼓聲齊長安若問江南事報道風光在水西附考寺在郡城內秀水縣治西爽溪上相傳唐宣宗為光王時避武宗害為沙門名瓊俊從香嚴閒禪師逰曽晦迹於此作詩書歧路人背以示朝臣由是迎歸即敕水西為資聖禪寺內有風光太子樓回龍橋御書閣大中亭諸蹟或謂宣宗所遁本宣城水西宋時有僧自宣來住資聖供宣宗像故傳其事云顔真卿字清臣萬年人官太師封魯公登平望橋作登橋試長望望極與天平際海蒹葭色終朝鳬雁聲近山猶髣佛遠水忽微眀更覽諸公作知髙題柱名附考平望地名為嘉興西北界獨孤及字至之洛陽人官郎中觀海弔秦皇北登渤海島回望秦東門誰尸造化功鑿此天池源澒洞吞百谷周流無四垠廓然混茫際望見天地根白日自中吐扶桑如可捫超遙蓬萊峰想像金臺存秦帝昔至此登臨冀飛翻揚旌百神㑹望日羣山奔徐福竟何成羡門徒空言惟見石橋足千年潮水痕薛據河中寶鼎人開元中官禮部侍郎登秦望山南登秦望山目極大海空朝陽半蕩漾晃朗天水紅溪壑爭噴薄江湖遞交通而多漁商客不悟嵗月窮振緡迎早潮弭棹候長風豫本萍泛者乘流任西東茫茫天際帆栖泊何時同將尋㑹稽迹從此訪任公劉長卿字文房河間人至德間攝海鹽令終隨州刺史有集十卷海鹽官舍小邑滄洲吏新年白髮翁一官如遠客萬事轉飄蓬栁色孤城裏鶯聲細雨中羈心早已亂何事更春風附考海鹽縣廢置已詳前簡今治在府城東南八十里宋時治內冇雙檜軒深椒亭燕鹿堂喜雨堂熙熙臺海月亭丞㕔有清節軒宋李益作尉㕔有綺川館領開濟永寧德化澉浦甘泉等九鄉吳赤烏間龍見於海鹽晉太興間海鹽雨雹漢桓靈時有陸穰為海鹽令三國時有步隲孫誼為海鹽長駱秀為司鹽校尉晉鮑陋為海鹽今齊周顒為海鹽令孔德璋作北山移文王羲之有海鹽帖晉恭帝女諱茂英宋文帝第四女梁簡文帝第九女俱封海鹽公主過橫山訪顧山人祗見山相掩誰言路尚通人來千嶂外犬吠百花中細草含香雨垂楊弄軟風却尋樵徑去惆悵緑溪東附考山在海鹽西南三十里有顧况宅在禪寂寺側秋夜雨中過靈光寺晤語青蓮舍重門閉夕隂向人寒燭靜帶雨夜鐘深流水從他事孤雲任此心不能捐斗粟終日愧瑶琴附考寺在郡治西北晉徐尚書熙因井發光捨宅為寺錢文穆王時掘地得一小龜尾繞身三匝改名靈龜宋賜額精嚴今仍之攝令海鹽上浙西節度李公久客田園廢初官印綬輕家憐雙鯉斷才愧小鮮烹懶慢羞趨府驅馳憶退耕榴花無暇醉蓬髮帶愁縈地僻方言異身微俗纍并潮聲來萬井山色映孤城滄海今猶滯青陽歲又更倘無知已在今已訪蓬瀛李諤字士恢長慶中為鹽令於縣南搆秦駐館張祜有詩悼之過施水菴勝地開蘭若幽尋信短笻僧貧只施水客至但聞鐘講座天花滿香臺翠靄重何當謝塵紱白社此相從附考庵在郡治北一里唐為施水庵宋賜名天寧寺今仍之有漢風閣嚴助墓將軍井宋徽宗御書屏等蹟權德輿字載之秦州人元和中為同平章事蘇小小墓考見前萬古荒墳在悠然我獨尋寂寥紅粉盡冥寞黃泉深蔓草映寒水空郊曖夕隂風流有佳句吟眺一傷心司空曙字文明廣平人貞元初官郎中寄海鹽凖上人昨聞歸舊寺暫别欲成年樵客應同出鄰僧寂伴禪後峯秋有雪遠澗夜鳴泉豈藉公卿論人間事並傳附考良凖唐時海鹽法喜寺僧也寺本吳大帝夫人建於吳郡曰通𤣥寺唐武后移於海鹽西南三十里曰重雲寺宋祥符元年賜額法喜凖塔在寺東廊烏不敢棲時有舍利放光大德九年碑記稱凖有飄幡擲布夢藥設輪之異云寺旁有石鐫秦溪二字樹水濱是宋時物錢起字仲文吳興人官考功郎中題凖上人蘭若向山看霽色步步豁幽性返照亂流明寒空千嶂淨石門有餘好霞殘月欲映上詣遠公廬孤峯懸一徑雲裏隔忩火松下聞山磬客到兩忘言猿心與禪定李端字正已趙郡人官杭州司馬題凖上人房髙僧居處似天台鍚杖銅瓶對緑苔竹巷雨晴春鳥囀山房日午老人來園中鹿過椒枝動潭底龍游水沫開獨夜焚香禮遺像空林月出始應回白居易字樂天下邽人官尚書見殷堯藩侍御憶江南詩三十首多叙蘇杭勝事余嘗典二郡因繼和之江南名郡數蘇杭寫在殷家三十章君是旅人猶苦憶我為刺史更難忘境牽吟詠真詩國興入笙歌好醉鄉為念舊游終一去扁舟直擬到滄浪徐凝睦州人元和中官金部侍郎語兒見月考見前幾處天邊見新月經過草市憶西施娟娟水宿初三夜曽伴愁蛾到語兒嘉興寒食嘉興郭裏逢寒食落日家家拜掃回只有縣前蘇小墓無人送與紙錢灰附考嘉興縣廢置已詳前簡自後晉以縣為州治始别置縣治於府子城東二百步流虹坊之西治內有換衣亭近雅亭春風春雨二亭樂全齊領勸善感化移風里仁新豐永豐白苧大彭嘉㑹長水等十二鄉吳陸凱封嘉興侯晉顧榮陸玩俱封嘉興伯唐陸德輿贈嘉興開國侯陸敦信朱桓俱封嘉興子陸扆封嘉興縣男宋婁機封嘉興郡開國侯潘圖未詳晚唐盧肇有送潘圖歸宜春詩肇係㑹昌咸通中人題劉府君墓詞地號烏夜鄉名海鹽長松藹日青嶂連天南枕秦駐北抵武原東流滄海西接甘泉野霧蒼蒼寒郊茫茫猗歟芳馨俄遭夜霜附考墓在海鹽縣南三里唐開成元年葬彭城劉府君於此君諱源字文宗徙居海鹽隱居不仕李賀字長吉官奉禮太常蘇小小墓幽蘭露如啼眼無物結同心烟化不堪剪草如茵松如蓋風為裳水為珮油壁車久相待冷翠燭勞光彩西陵下風吹雨劉言史趙人為棗强令嘉興社日消渴天涯寄病身臨卭知我是何人今年社日分餘肉不值陳平又不均溫庭筠字飛卿并州人大中末年授方山尉蘇小小歌買蓮莫破劵買酒莫解金酒裏春容抱離恨水東蓮子懷芳心吳宫女兒腰似束家在錢塘小江曲一自檀郎逐便風門前春水年年緑雍陶字國鈞成都人官刺史殷堯藩明府縣池嘉蓮詠青蘋白石匝蓮塘水裏蓮開帶瑞光露濕紅芳雙朵重風搖緑蒂一枝長同心梔子徒誇豔合穗嘉禾豈解香不獨豐祥先有應更宜花縣對潘郎方干字雄飛新定人嘉興贈許明府檇李傳聞風俗好重門夜不上重關腰懸墨綬三年别身在青雲一步間勤苦字人酬帝力從容對客問家山升沉路别情猶在不忘鄉中舊往還題嘉興縣署池閣指畫應心成周回氣象清林間沙鳥語案下錦鱗驚細桞風吹旋新荷露壓傾微芳緣岸落迸笋入波生舴艋舟中醉莓苔徑上行髙人莫歸去此處勝蓬瀛五代羅隱字昭諫餘杭人開平間官給事蘇小小墓魂依檇李城猶未有人耕好月當年事殘花觸處情向誰曽豔冶隨分得聲名應待吳王宴蘭橈暗送迎秦望山僧舍巉巉危岫倚滄洲聞說秦皇亦此遊霸主卷衣才二世老僧傳錫已千秋隂崖水賴松根直蘚壁苔侵畫像愁各是病來俱未了莫將煩惱問湯休韋謙題常樂菴五雲堂吾匠慕先哲至理皆融通一法果有至五雲疑在空講香侵棐几夜月鎖簾櫳弋者何由預冥冥出塞鴻附考庵在崇德治西八十步梁天監二年建宋改悟空院天禧間改崇福寺俗呼西寺李翰又作李翰林未詳朱都知嘉禾屯田紀績詩茫茫九區陽九躔災丘荒札瘥田卒汚萊天步未移連師滿野不耕不穫仰食於下嗷嗷遺人糊口饋軍帝曰豫憂爰立其屯且戰且耕古之善經辟師肅祗王命是將嘉禾之田際海茫茫取彼蓁荒畫為封疆朱公蒞之展器授方田事既飭黎人則康我屯之稼如雲漠漠夫位碁布溝封綺錯朱公履之勸耨趨穫稂莠不生螟蝥不作歲登億計征寬稅薄息我蒸人遂其耕鑿我屯之庾如京如坻嘉量是登方舟是維贊皇獻之達於京師飽我六軍肅將天威畎距於溝溝達於川故道既堙變溝為田朱公濬之執用以先浩浩其流乃與湖連上則有塗中則有船旱則溉之水則泄焉曰雨曰霽以溝為天俾我公私永無饑年公田翼翼私田嶷嶷不侵其畔不犯其穡我倉既盈爾廪維億屯人熙熙邑人怡怡不擾其務不干其時我無爾暴爾無我欺我有官屬朱公訓之我有徒侣朱公恤之我有衆役朱公率之我有微功朱公序之起於田中印綬纍纍何以况之福祿如茨何以久之刻篆於碑附考朱自勉廣德中為嘉禾屯田都知修水利畎畝之政民始殷富釋常雅唐時僧詩見邑志胥山伍相廟考見前蒼蒼古廟映林巒鼎鼎煙霞護石壇精魄不知何處在英風猶入大江寒無名氏書陳環墓山作田兮田作海萬古存兮誰不改青松新壠曉無年千載維留名記在附考唐陳環墓志云穎川人以㑹昌二年八月十八日窆於蘇州海鹽縣東二十八里齊景鄉雅山之南不著作者姓氏吳越王錢鏐字具美錢塘人還鄉歌三節還鄉兮掛錦衣父老還來相追隨斗牛無孛人無欺吳越一王駟馬歸附考王微時有舊館于禦兒後改為祖祠祠側建寺曰寶林中有千葉梨無核棗又殳山有洗劍池走馬塘皮光業字文通蘇州人文穆王時官丞相屠將軍墓詞河山育瑞帶礪鍾英徒步奮跡赫聲濯靈么䯢叛梗九首慿凌磨牙王國吮血蒼生公怒飈發撻伐擊膺矢屠猰㺄以身殉君功髙盟府猷壯干城光啓前烈垂裕後昆忠孝纘襲勳土褒旌連岡崇窆妥綏義魂桓赳世選焜耀貞珉附考墓在海鹽縣南三十六里澉川之青山德政鄉歸仁里開化村明正德間斸地得此碑磚屠環智見本傳謝鶚里爵未詳觀文中有幸同王事一語蓋亦當時寮屬也朱府君墓詞挺生英特邈爾奇形素藴豹略能精武經戈鋋再舉氛祲廓清從茲勇冠大播家聲盛績既彰威名遂振靜守謙敬動知逆順惟此侯王賞其忠信不有殊功那遷劇鎮匡吳志大佐越功全一人注意百辟推賢方務剖竹宜分重權孰謂梁木俄隨逝川生作忠臣沒留遺䇿眷彼令嗣恭承帝澤丹旐斯引𤣥宫巳闢萬歲千秋芳塵永隔附考朱行先字藴之海鹽人從吳越王征討纍功厯檢校尚書右僕射以寶大元年嵗次甲申十一月乙未朔六日庚子葬於海鹽縣南十五里德政鄉通福里澉墅村之原宋王禹稱字元之巨野人太平興國進士官終蘄州守冇小畜集送人尉嘉興縣有蘇小舊荒墳應作行雲入夢頻猶勝白公尉盩厔庭花剛喚作夫人鄭獬字毅夫安陸人仁宗皇祐進士為學士終知州有鄖溪集檇李亭閒抱琴書檇李遊仙壇古屋一笻留驛橋通市人沽酒湖水依城客放舟葵扇桃笙聊却暑蘋花楓葉已知秋坡翁仙去詩聲在寂寞林塘卧白鷗附考亭在秀水治西二十七里本覺寺中即春秋檇李之地月波樓考見前古壕鑿出明月具樓閣飛來兔影中野色更無山隔斷天光直與水相通溪藏畫舫清紋接人在荷花碧玉叢欲解金魚避殘暑晚雲深處待歸風寄題靜照堂招提去山逺還似在山家晚日惟歸鳥春風自落花空談消劫火醉墨灑天葩更欲拏舟去清溪月正華附考郡治西北一里唐曹刺史圭捨宅為羅漢院宋改招提院嘉祐中僧慧空住院作靜照堂遍乞名公吟咏明洪武初定為華嚴講寺今廢梅堯臣字聖俞宣城人仁宗時為都官有宛陵集與海鹽李寺丞即李惟幾吳帆千里去邑屋富魚鹽霜鶴亭臯唳風烏海客占滄溟朝日近紫翠晚山尖若過陸機宅寒蕪應不嫌題檇李亭土化吳王甲骨朽越王兵五月菖蒲草千年檇李城蒲根蛙怨嗥城上烏夜鳴吳越滅已久客心空屏營落日孤亭間悠悠鐘磬聲題羞墓考見前食藕莫問濁水泥嫁婦莫問寒家兒寒兒黧黑面無脂驥子縱瘦骨格奇買臣貧賤妻生離行歌負薪何愧之髙車來駕建朱旗銅牙文弩擐犀皮官迎吏走馬萬蹄江湖晝起橫白霓舊妻呼載後乘歸悔淚夜落無聲啼吳酒雖美吳魚肥儂今豢養慙猪雞園中髙樹多曲枝一日挂與桑蟲齊送羅拯知秀州陸雲嘗誇千里蓴便輕羊酪同埃塵君今得郡正千里已患無羊厭此珍乃知南北各所樂乘舟不如乘馬惡水邊不見秦羅敷縱有西施肌肉薄使君事事不稱意緑水芙蓉定何若金魚池考見三卷月波樓誰得陶朱術修治一水寬皇恩浹魚鱉不復取垂竿司馬光字君實夏縣人仁宗寶元進士官太師溫國公諡文正悼靜照堂僧寶閣灰寒靜照新馬蹄從此踏京塵金門乞得詩千首蕭寺歸時老一身弟子去來渾領袖交朋存歿半簪紳西風又剪梧桐葉不見蒲團舊主人張瑴字伯玉臨潁人寄嘉興守令狐挺羡君席上碧雲句吟盡江南烟雨春豈惜笙歌連夜醉且看風物逐春新花開花落何時盡閒是閒非愁殺人何似陽臺雲畔曲細聲拂拂下梁塵蘇舜欽字子美范文正公薦為集賢校理送張統尉嘉禾濯濯桂枝郎尉邑上檇李青衫未足勞蘭衣應自喜萊子衣荆蘭之衣威聲入萑蒲吟思發山水美才仕云初令聞當日起秀州城外九里有竹樹小橋豫十八年前與友人解晦叔飲别于此今過之景物依然而解生巳亡悲歎不足復成小詩當年共醉此橋邊話舊狂歌至暮天得句旋題新竹上移舟還傍亂花前君埋塵土骨應化我逐風波心欲然落日長號感人事沙頭寂寞上漁船過秀州通越門外八九里臨水多嘉木茂林以風便不得停舟一賞愴然為詩密樹重蘿覆水光珍禽無數語琅琅驚帆瞥過如飛鳥回首風烟空斷腸蔡襄字君謨仙逰人英宗時為端明學士諡忠惠崇德夜泊寄福建提刑章屯田宿昔神都别於今浙水遭故情彌切到佳月事追遨太守才賢重清明土俗豪犀珠成戍削鉦鼓去啾嘈湖樹延天濶船旗罥月髙醉中春渺渺愁外夕陶陶新曲尋聲倚名花逐種褒吟亭披越岫夢枕攪胥濤論議刀矛快心懷鐵石牢淹留趨海角分散念霜毛鱸鱠紅隨箸瀧波緑滿篙試思南北路燈暗雨蕭騷附考崇德縣古禦兒地本嘉興之西鄙唐乾符中為義和鎮廢置已詳前簡治在府城西南一百里晉天福中定址治內有讀書堂平易堂治東有觀風亭北有承流亭東南有春風樓西南有澄碧堂臨賦閣皆宋置領南津語兒千乘積善石門等六鄉唐時餘杭吳公約隨董昌禦黃巢於此授義和鎮遏使盡道瑶池瓊樹新仙源尋到不逢人陳王也作驚鴻賦未必當時見洛神王安石字介甫撫州人神宗時官平章柘湖考見前柘林著湖名菱葉蔓湖濱秦女亦何事能為此湖神年年賽雞豚漁子自知津幽妖屈險阻禍福易欺人又用前韻茲土久陷沒千歲嗟水濱不復吳鹽邑空有秦女神浩蕩吞海日曠濶迷天津扁舟誰能在日暮逢漁人顧亭林考見前寥寥湖上亭不見野王居平林豈舊物嵗晚空扶疏自古賢聖人邑國皆丘墟不朽在明德千秋想其餘秦駐山馳道穆王得八駿萬事不期修茫茫千載間復此好逺逰車輪與馬跡此地亦嘗留想當治道時勞苦如山丘金魚池野人非昔人亦復水上居紛紛水中遊豈是昔時魚吹波浮還沒競食糠粃餘吞舟不可見守此歲月除寄題靜照堂任公蹲㑹稽海上得招提靜照堂新構幽栖客屢擕飛簷出風雨灑翰落虹霓投老黃塵陌東風路恐迷蘇軾字子瞻眉山人哲宗時為端明學士諡文忠題靜照堂鳥囚不忘飛馬繫常念馳靜中不自勝不若聽所之君看厭事人無事乃更悲貧賤苦形勞富貴嗟神疲作堂名靜照此語子謂誰江湖隱淪士豈無適時姿老死不自惜扁舟自娛嬉從之恐莫見況肯從我為東禪寺修竹軒清風肅肅搖忩扉忩前修竹一尺圍紛紛蒼雪落夏簟冉冉緑霜沾人衣日髙山蟬抱影細人靜翠羽穿林飛道人絶粒對寒壁為問鶴骨何緣肥附考在秀水治北三十里元祐間建泛南湖四首聞道南湖曲芙蓉似錦張如何一夜雨空見水茫茫水殿穿湖入風欄過雨憑微微夕陽外時見出林僧盈盈緑水際泛泛白鵝羣借問乘舟客何如王右軍碧樹圍青殿朱垣接紺堤王孫少逰豫馳路草萋萋題劉伶墓考見前常笑劉伶死便埋豈伊忘死未忘骸烏鳶奪得與螻蟻誰信先生無此懷韓維字持國神宗時官門下侍郎寄題秀州檇李亭雲水浩無極茲亭安在哉傳名落人間猶使塵抱開昔為兵戈地今以逰觀來物變未始窮千年一浮埃何時江山秀曠然當酒杯柘湖􅀢雍淪此地柘山巋其瀕復驚秦時女化作湖上神世事善反覆孰能識涯津物變雖萬殊不惑固有人秦始皇馳道秦皇騁奇觀不憚阻且修萬里走轍迹八荒開囿逰勞歌久已息遺築今尚留千載威靈盡驪山空古丘陸瑁養魚池林塘豈如昔尚想昔時居秋草自鳴鸛寒波猶戲魚紛紜釣餌底瑣碎刀七餘任公有奇術默坐歲幾除附考池即鴛鴦湖又云城北金魚池之舊址也俱詳前簡瑁字子璋遜之弟好學篤義大帝徴為議郎選曹尚書題靜照堂道人幽棲地瀟灑臨江湖江湖置外物妙觀造無餘匆匆從世役沒沒徒為愚何况毫髮間計畫窮萬殊檻外簷蔔林几前沉水爐世人欲問道指象聊躊蹰蘇轍字子由軾弟哲宗時官門下侍郎題靜照堂有僧訪我攜詩卷自說初成靜照堂已得篇章書壁素不論塵土漬衣黃故山别後成新嵗歸夢春來繞舊房看取盈編定何益客來無語但循牆范鎮字景仁成都人神宗時官內翰封蜀公前題堂構虛閒處師心靜照中當門是流水滿院足清風趺坐通禪觀髙談說性空那知人世上日月有樊籠閻詢字議道鳯翔人神宗時為提舉前題浙右僧居盛虛堂葺有功迷來隨萬化淨後照三空夜永松軒月秋深竹岸風我心閒已久夢到水鄉中李大臨字才元成都人官待制前題地勝堂新構僧閒晝杜門山林誰樂靜城市亦非喧客到空彈指風來不動幡祗應長晏坐對境一無言張芻前題檇李舊禪扉叢林自翠微寺居天外靜僧向日邊歸野水涵齊几閒雲宿釣磯庭前祖來意誰為柏依依顧臨字子敦㑹稽人神宗時官學士前題踏暑夏日長履霜冬日短乞詩賁新堂經年不辭緩虛室莓苔青客衣塵土滿自矜非俗求容色長衎衎盈篋飽珠璣東歸春正暖靜照名巳傳主人宜亦反王圭字禹玉成都人神宗時為平章諡文公前題身居在城邑趣不落人間門外塵埃滿庭中日月閒風隨朝梵響雨入定衣斑幾欲攜笻去松隂一叩關張掞字文裕厯城人官侍郎前題牛斗光芒下江山形勝中招提萬法本靜照一堂空花木含春意門庭話古風支郎乞詩什愧匪雅南工祖無擇字擇之上蔡人官龍圖閣學士前題院靜逺纎塵虛堂結構新幾招台嶺客共話沃洲春活脫山中業優游物外身公卿詩滿壁雅正日相親宋敏求字次道嘉興節椎前題叢林起新構燕坐水雲鄉本自禪心靜能令世纍忘幡花圍晝永鍾梵度宵長歸祴新篇富籠紗映寶坊錢藻字純老和州人祥符中知秀州前題去年秀水拍橋深聞說幽堂緑可臨自愧塵埃闕澤上空思瀟灑太湖隂經臺罷講吹紅燼齊鉢留生下翠禽應是禪機終息處不須此外覔雙林李常字公擇南昌人元祐中為嘉興守前題藻户面通漕飛甍出重城堂成未遑息復作千里行塵埃䄂短褐蒙暑踏寒氷其求異求食志欲詩篇盈寧辭聞吏慢聊為一堂榮都城競名利日出車馬聲詩云方外士奔走亦有營惟靜制象動自照中乃明胡為撓山水風急帆更輕歲闌歸勿緩恐負新堂名王存字正仲皇祐中嘉興主薄官至杭州守前題曽過檇李古禪關十五年來夢想間聞說新堂增勝槩又憐遊客變衰顔香檀印篆消晨暮題墨籠紗記往還能了一心隨處靜何須辛苦逺人寰曽鞏字子固建昌人神宗時官中書題夀聖院即施水菴已見一峰瀟灑背城隂碧瓦新堂地布金花落禪衣松徑冷月臨經帙紙忩深幽栖鳥得林中樂燕坐人忘世外心應是白蓮香火社不妨藍輿客逰尋周邠字開祖錢唐人神宗熙寧初為嘉興守羞墓詩當年一棄㑹稽侯大墓烟蕪鎖别愁惆悵不逢郎衣錦至今粉骨尚含羞吳潛字毅夫寧國人元豐中判秀州官至丞相封許國公陸宣公祠凜凜清規百世師功名僅見奉天時忠謀任起姦邪忌感泣寧無士卒思落日桑榆存舊蹟西風蘆葦護荒祠忠南流落何遺恨留得良方與後醫附考祠初在郡學曰宣公書院宋知州李正已建吕祖謙有記建炎初程守建於駌湖上至元間兵毁以賈似道太初堂改作之後又拓其址周伯琦有記明洪武初郡守劉澤民重建于城內宣德初巡橅胡概復置于郡治西北二十七里新城市春秋致祭相傳為公故宅唐為福業院宋曰承天院後改能仁寺何執中字伯通龍泉人元祐間海鹽令官至太宰題夀師塔南軒焚修七十齡內外巳圓成教相論因果冥心契死生紙忩應自白花砌本無情燕坐觀浮世誰非走利名附考軒在海鹽資聖寺中周夀大觀時人題金粟寺清池帶蒼巘結構俯林麓扶疏竹外山相向隔羅縠老禪謝人境嵗晚收白足誰聆跫然音息影尚爭逐道場作十劫不愧桑下宿窆中觀潮汐絶事心已熟附考金粟山在海鹽縣西南三十五里山以其周六里又名六里山上有秦皇劍池山後名夾山俗稱龔墳山有陶給事墓下有茶院市唐開寶間武肅王幸金粟令僧施茶故名寺為康僧㑹所創宋紹興中降御書法帖一十軸又有藏經千軸用硬黃繭紙內外皆蠟磨光瑩以紅絲欄界之書法端楷而肥卷卷如出一手墨尤黝澤如髹漆每幅有小紅印曰金粟山藏經紙好事者剝取為裝潢之用稱為宋箋徐嘉言西安人大觀四年知海鹽和前韵招提敞山巖新庵隱蒼麓石沼引清流風漪皺文縠晴暉滿虛室一水令自足心明身晏閒境寂誰尋逐寒林帶月行夜榻和雲宿若欲問西來一齊飽秋熟陸䝉老字元光歸安人宣和初為嘉興令有嘉禾八詠後人因建八詠樓考俱見三卷㑹景亭清入闌干酒易醒春風楊桞幾沙汀平波抵得瀟湘濶只缺峯螺數㸃青披雲樓城角危欄見海涯春風簾幕暖飄花雲烟斷處滄江濶一簇樓臺十萬家月波樓月移宫闕下銀潢碧轉䦨干萬頃光我是水晶宫裏客倚樓猶是羡滄浪宣公橋當年倉卒倚鴻籌清白堪封萬户侯陵谷巳非家世逺畫樓依舊水東流五桞橋五桞先生倦折腰孤眠千載仰風標青衫令尹頭如雪不厭朝昏過此橋金魚池池上春風動白蘋池邊清淺見金鱗新波已縱遊魚樂調笑江頭結網人蘇小小墓瑶臺歸去鶴空還一曲霓裳落世間秋雨幾畨黃葉落朝雲應缺到香山羞墓玉顔羞見錦衣侯草木烟村雨鎖愁不似田文門下客一貧一冨不知羞龔頤正湖廣人陳山龍君祠迎享送神曲海波淵淪兮海山巃嵸其下潛通兮君之宫時思其母兮來舂容菖葉生兮杏帶融君之來兮雷隆隆雨我田兮秋芃芃我之懷兮無初終君稅駕兮芬陽斯陳鼓鐘廣享兮列鼎重茵君之宫兮屯雲蕙肴蒸兮芬芬我黍我稌兮抑亦薦其萍芹君明其𠂻兮無吐芳新吹洞簫兮望極浦君之歸兮雲在下十風兮五雨祐我海邦兮汙萊斥鹵君不來兮使吾心苦千秋萬歲兮為民所怙附考祠在平湖縣南乍浦陳山上宋紹興元年鹽令李直養禱雨於此見金色四龍之異乃修其祠元令顧泳復新之朝說之字以道官徽猷閣待制贈筆處士曹忠葦管豫何愛輕圓稱白毫固知今獨妙舊數浙西曹自注四十年前杭秀問有曹用筆見稱于世檇李詩繫卷三十七
