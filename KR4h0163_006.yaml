body:
  text: 檇李詩繫卷六平湖沈季友編元江翰林漢漢字朝宗㑹稽人元季客吳中落魄而返經崇徳濮氏延為上客明洪武初以文學徵授翰林編修應制賦元日早朝詩稱㫖賜緋袍請老歸遂家濮院今析桐鄉與親知遊宴嘗著賜袍有月夜清遊歌以下十人俱仕於明因元季流寓並列卷末題破窗風雨圗君有客兮青雲衣珮玉玦兮光陸離爰處兮爰居左琴劔兮右圗書客心兮孔厪聲吾伊兮夜達晨輕富貴兮浮雲保厥美兮天真山房兮寥落秋清兮氣薄天冥冥兮雲漠漠雨瀟瀟兮風夜作心耿耿兮不寐嗟斯時兮落魄滴曉露兮寒窗紛遑遑兮求索彼薄夫兮貪婪唯聲色兮是躭文繡兮膏梁蓀芷兮懐慚秋蘭兮青青我所思兮古人雪案兮寒檠甘與君兮相親濮川月夜清遊歌考見題咏有客来扣門邀我清夜遊夜長苦不寐夜遊慰淹留於時仲冬十五夜小星嘒嘒奎與婁乾坤上下絶塵滓團圓月色如中秋恰如銀盤出東海照我毛髮寒颼颼此時清興發與客相綢繆即従西街入便至西河頭行行渡溪曲石梁跨清流魚鱗萬屋佀城市市㕓行盡皆田疇我行興巳盡客指歸路休歸去語妻子此時足清幽不知百齡内夜夜得此不生平不作不平事遊時不覺心優游髙太常㢲志㢲志一作遜志字士敏號嗇庵河南人元末僑居郡中嘗受業于宣城貢師泰鄱陽周伯琦遂昌鄭元祐為文深純典雅成一家言以薦為鄮山書院山長明洪武二年徵修元史入翰林累遷侍講學士未幾引退又召為試吏部侍郎以事去官謫居朐山建文間復召為太常少卿壬午靖難兵渡江㢲志遯去入永嘉雁宕山其門人文淵閣侍書蒋兢亦潛踪於此㢲志病卒兢為經紀後事𦵏芙蓉峰北或云先壬午而卒與臨難自經者皆非是卒謚文忠盖私謚也其詩僅見檇李英華而石倉詩選所録皆因之予復採金蘭集中數作并入後在京師朱太史彞尊授予嗇庵集又得其裔孫髙佑釲授予家傳始獲其全覽之詞㫖幽邃音節豪宕亦詩家之表表者也荅徐以文我本不羈士少年知逺遊結交盡豪俊英風邈難儔浩然志四海壟㫁非所求羣雄亂天紀誓将除國讐驅馬向京邑道路阻且修曠望空嘆息失計成淹留時哉茍未㑹白璧寜暗投恥同五鼎食笑視千金裘袁絲尚遊俠枚臯事俳優知巳竟不遇行蔵誰與謀白日如逝水冉冉春復秋人生久羇旅豈不懐故丘芳時倐徂謝悲緒寒颼颼客華易憔悴安能常黒頭放歌吳門市洗耳長江流雖然不得意常為蒼生憂心隨去雁逺目送孤雲愁夫子東海裔濟代多良籌既無陳仲舉雖賢罕見收何如共脱屣速駕赴滄洲有感退之少苦貧干禄頗浮躁長安三獻書時宰終不報飢寒日哀鳴踰壮已瞶眊向非董張徒宦轍誰與導少年屢摧抑大器天所造茍不涉患難尤足長雄驁嗟余樗散材時邁未聞道雖云寡知巳敢忘固窮操狥利多乞墦賈名争媚竈薄俗諒如斯何事傷懐抱以少陵文章憎命達句為韻賦五章違世甘濩落撫巳徒憂勤既通金閨籍方思策竒勲何為竟鎩翮復與沮溺羣念往每懲咎縦學求多聞朝飲西澗水暮宿東山雲境静思疲薾心清遺垢氛森然冨藻思載道非空文尚賴特立操千載揚清芬積雨滿汚瀆蛭螾聊自藏商飈振修簿箆簬依崇岡動植各生遂伊人獨何傷謫居窮田野與世殊相忘緬懐昔憂患髪短心日長所願免飢渇孰敢謀稻粱戸庭罕遊跡琅然誦文章歡来意自得遐想起黄唐従此遂閒逸投老終徜徉鱣鯨擊洪濤一躍龍門登驚風落潮汐失勢投岡陵鬐鬛日巳槁窮涸何由興翻為獱獺笑敢望餘波騰畸人感物理冥思多所徵雲翔避矰弋淵潛避笱䉕胡為徇世務轗軻常兢兢朂哉保素履勿貽人所憎荆璞不善蔵輕售與時競雖無泣玉恥棄捐揜光瑩伊余昧先幾妄往成蹭蹬貪得違素心徇名忘積行通籍曽幾時三年絶朝請久暌徒侣歡轉失鄉黨敬剥喪非偶然且委時與命功名期宦成文章止詞達千載求全能如何罕竒拔夙抱稽古志纂言窮櫽括幽闡天機深精思元化斡豈徒賁皇猷将以繼往轍于今不自足乃復恥被褐好爵難久縻世途多慘怛放意樂丘園長歌襟抱豁甲辰九日東塔廣福寺登髙同牛士良陳彦博徐大章周致堯釋元璞玉田用杜少陵玉山髙並兩峯寒為韻分得兩字浮圗鬱嵯峨遥睇青雲上跼兹城府中間嵗不一往今夕復何夕謝此塵務鞅侵晨拉寓公登髙叙幽賞涼風起天末林霏發清響檐霾瑣陰壑鐵馬精神爽穿彼游龍窟容與巨鼇顙徙倚珠貝闕捫摘璿璣象感此懐古人窮愁一滌蕩嘉㑹難再期良辰應不兩上人知雅意丈室豁宏敞沽酒采芳菊忘情非放曠羣公中州士遭世何極㒺辟地僑寓此辭氣俱慨慷王師何日下恢復舊輪廣仍趨清朝列脱卸江湖網賛理新治化日月増輝朗坐令瘡痍洗四海起瞻仰鈎詩寫房壁嶮題筆枯强他日重追遊於以動遐想題茅山道士沈秋淵海鹽聴潮里小瀛洲録呈畊漁隠人我聞瀛洲在滄海此説相傳數千載一杯弱水不勝舟雲霧軒窗眇何在憶我初冠遊江東開帆直指三茅峰瓊樓玉殿倚天碧丹光飛射金芙蓉只今可望不可即跬步之間成異域坐令塵土凋朱顔墮落干戈空歎息沈仙慕事三茅君曽開石壁觀璚文晨朝環佩空外響琅玕杳杳雲中聞自従遭亂山林燬避世歸来聴潮里崇搆崔嵬迥絶塵雲和草静環流水瀛海遥連咫尺間三峰宛似三神山金雞呼日扶桑曉念爾孤鶴應當還嗟予本是瀛洲客幾年欲歸歸未得羇棲且待靖風塵名山歴覽無南北題江行初雪圗宿雲黯慘埋巖壑疾風颯颯捎林薄孤舟擺浪何處来雪片縦横向人落一翁蓑笠度危橋一翁荷擔轉山腰崖傾石凍竹傴僂不辭辛苦歸途遥君不見軟裘貂帽馳快馬遮莫氷花徧原野人生得意能幾何相逢俱是窮途者送孫照庵還吳昔客吳門日於今四十年故居蕭寺外遺冢石湖邊結友唯髙適論文憶魯連翁今重㑹面訪舊一悽然次韻答徐良夫半生遭亂欲歸休塵事羈縻豈自由逸氣那堪操雁贄閒身端可被羊裘烟光樹色千山晩楓葉蘆花兩㟁秋别後莫教音問少相期重泛木蘭舟徐徳厚司丞隠居放棹南湖春水深昔年遊覽得重尋陶公未許辭彭澤龎老那容隠漢陰落絮雨餘沾墨沼遊絲風暖罥書林自憐久客渾無賴亦欲攜詩與盍簮城南小隠為松江郭彦禮賦步屧幽尋古㟁隈柴扉正對郭南開林間野逕穿雲入溪上春潮待雨来過客停杯歌白苧鄰翁吹笛坐蒼苔羨渠髙隠空相憶浪迹多年素髮催贈章安甫老人籃輿迢遞出郊坰野服翩然鶴髮星柱史不辭周問禮伏生須為漢傳經汀湖水落蒹葭老澤國霜寒橘柚青自笑隠淪縁底事時危踪跡一浮萍簡蒲菴長老論交猶憶自前朝亂後誰憐意氣銷元亮歸来依恵逺少遊久客過㕘寥山房黍熟供蔬甲石鼎茶香薦菊苗名勝想無今古異禪龕容我避塵囂送程彦明之松江同是他鄉客俱為避地人興来猶浪迹别去更沾巾山路常疑雨江花已報春荒烟投逺戍落日扣通津樵笠歸墟盡漁蓑渡水頻揚帆驚宿鳥鼓柁駭遊鱗俗薄誰知巳時危不計貧飄然滄海上也欲共垂綸鴛湖秋月雙湖偃長虹月出微瀾静鼓枻獨沿洄流光蕩空影秀水飛帆挂席曉烟收忽與天風遇誰唱秀州謡恐是南塘路苕川夜宿山繞荒城水自流霜空月色滿溪樓夜長欹枕渾無寐二十五聲都是愁題雲林畫蒼然古木石巖幽移得江南一段秋共説倪君知籀法數竿瀟灑更風流陶淵明像玉山頽矣葛巾偏老僕扶持步不前莫道先生渾不醒醉中猶記義熙年贈相者薛電目炯炯雙瞳巖下電秋風江海布帆寛如今亦有新豐客旅次相逢莫易看題盧元佑所蔵江山圗結茅曽住白雲間遊宦多年客未還開卷偶然鄉思動數峯渾似鄂州山過海鹽二賢祠思魯橋邊月較明二賢祠下水偏清如何水月無情物也重當年邑宰名附考祠在海鹽縣南思魯橋之左祀宋縣令魯宗道柱上有聨云舄去古祠留鳥翼名従青史識魚頭後并入黄郎中主故名二賢祠牛尚書諒諒字士良山東東平州人元末寓居嘉興與鮑恂張翼諸名士友善學者多従之遊自顔其堂曰尚友徐一䕫為記明興應詔除翰林院典簿同學士張以寜使安南御製歌詩賜之歴陞禮部尚書嘗與唐肅有丁未九月聨句詩著述甚多盖明初才士也送陶九成東歸大江秋漲滿沄沄緑波注送爾東歸人愁懐渺烟樹方謀耕釣隠巳遂滄洲趣圭組尚予縈京華獨淹駐他日漫相思離舟従此去甲辰九日東塔登髙得玉字拏舟出東城秋髙氣應肅雖無龍山境華林亦不俗雙池水清白于以濯纓足飛觴坐苔石寒泉薦幽菊迺登梁朝塔觀海望天目諸賢快先歩嗟予苦踡跼不及終雅興徙倚䦨干曲分題寄遊勝抛甎引羣玉秋林圗題贈曠伯達回風蕭蕭吹北林行雲冉冉生夕陰天寒雁去洲渚净秋雨龍吟波浪深飄泊共憐今日興畫圗因見古人心幾時螺子青峯下深結茅堂更逺尋庚戌五月十三夜夢侍讀張先生枕上成詩出使艱難萬里同歸期日日待秋風寜知永訣蠻江上纔得相逢客夢中㟁幘尚看頭似雪掀髯猶覺氣如虹起来扶淚凭䦨久月落啼螀繞殯宫破窗風雨圗風雨東南接漏天客窗吹破碧紗烟十年世事關心曲一片秋聲到枕前花落不妨尊有酒客来未覺坐無氈老予㑹覔蘇端隠藜杖春泥緑水邊題畫梅梨花雲底路參差折得春風玉一枝南雪未消江月曉欲従何處寄相思題恵麓秋社圗澤國霜晴過雁天翠微秋色浄無烟歸来好記登臨處苜蓿盤香第二泉東吳棹歌二首太湖茫茫水拍天吳儂只慣夜行船竹枝歌罷燈将滅風雨蕭蕭人未眠玻瓈冷浸洞庭山雪竹攅青橘柚斑白髮吳娃笑相語官船不似釣船閒陳博士世昌世昌字彦博號西湖真拙錢塘人力學古文不慕禄仕至正間由布衣徵授翰林編修奉勅代祀海上值道梗遂留嘉興作南湖賦傳頌于時授徒養母張氏據吳屢致不屈明初徵修禮書授太常博士尋以母老辭後徵至京卒有希言作希賢誤集憶别予本念鄉井風波忽巳臨翩翩一長别慷慨増悲吟況當季秋月千里漫沈陰驚風振西郭繁霜飛北林羇情逐馬首哀思悽蟲音小人誠有母主命恐難任珪紐詎匪榮喜懼鐫我心當年惜形影此日悲商參不用深追昔還須重念今甲辰九日登髙東塔分得山字登彼城東塔殊勝遊龍山褰衣甫二級頓覺小闠闤肩摩螘蠭集比屋蝸居繁田疇類龜坼穜稑於菟斑秦山翠屏列秀水練帶環㣲雨従西来寒風襲衣單況遭禽鳥聒阻我相躋攀上人好儒雅展席花林間清酤泛幽菊新粢勸加餐緬懐運兔靈立倚中朝班遭屯離蹇来僑寓南湖灣初依遂考槃菽水歡慈顔叨陪賢使君盡此一日閒鈎詩冩青竹日落方知還題張外史詩卷不識華陽舊隠居髙情還憶聴松餘百篇真籙修都徧滿卷新詩手自書一去丹臺閒日月幾回飛珮在空虚重来化鶴應無恙華表春風動里閭張學訓翼翼字翔南先世建徳人徙嘉興篤學好古博極羣書屬文敏捷好為竒澀語至正乙巳薦於鄉與金絅俱以龍門賦中髙等舉甬東書院山長不就明初徵入禮局事竣賜白金歸洪武三年郡庠延訓諸生其家居近宣公祠庭有鉅梓顔曰梓宇同局梁石門撰記釋雪廬有詩著有梓宇集不傳題徐良夫遂幽軒遂幽軒人古冠裳乃在具區之陰穹窿之陽山中雲深白日永睨視濁世憐劻勷行人摩肩車擊轂耋穉不得怡康荘紛紜鬼朴徒夸衒相比行列居狎吳姝彈絲龡笙簧珊瑚木難貂裘子寳釵九雛集鳳凰燒燈接席不知曙凘盡彷彿雪沃湯是時軒人起視夜山外碧海天烏翔遂幽之志始獨著彼嗜冨貴俱茫茫山幽谷寂衆鄙厭此足慰意躬徜徉西山朝来致爽氣東柯茂林延疎光一塵不起萬籟寂斂輯縹簡清琴張劃㝠虚室皦生白嗒然喪我幾坐忘熙皥似太古坦道無敚􅔯陽和渙解凍沍息條風煦日花吹香千厓無人塢墅美峰迴岫轉飛嵐長溪明遶㟁路不㫁三十六曲春洋洋流目縁空澄具區入浩蕩放舟縦所適擊楫歌滄浪洞庭舂撞竊隙穴林屋夐僻苔花蒼左招浮丘右安期振衣矯首望八荒乃知天壤間遂幽樂無央此樂我可圗脱屣蠻觸蝸角塲儗邀雲卧髙敏君握手徑躡穹窿岡㟁巾軒中一長嘯神遊太始朝羲皇鬻石篇同張仲簡賦二儀磅礴氣鬱積土壤精英乃為石由来萬植有竒趣平地峰巒皆兀硉淵哉至人心妙與元氣并謂兹質凝胚渾各有始塊石磥砢欲與造化更相成山中歸来一茅宇束薪㪺泉夜半煑蒸浮為雲潤為雨追工補天天莫補五色徒鍊神鬼泣巨爐呼風鼎水立元氣淋漓漲空溼飛丹射瞳光煜熠至人之心澹以寧呼吸萬籟收風霆飱和導氣窺黄庭枯腸厭飫芒角生隠文秘訣不可徵深函内蔵歸穀城夾溪樓寺下幽溪小登樓亦爽神檐虚多受月天近不生塵唐代風光逺宣城氣象新何時暫棲息瀟洒一吟身賦得韭溪春水送張别駕春風吹花澄海門韭溪雨足浮春雲碧漪分流入城去石欄倒壓玻瓈紋使君青驄駐溪側搥鼓官船送行色片帆直遡五湖風水晶宫中夜吹笛題蒋灝畫翎毛曽向山中倚玉闌瓊葩相映碧琅玕翠禽啼破香雲夢别有春風釀早寒西湖竹枝詞南髙北髙峰頂齊錢塘江水隔湖西不得潮頭到湖口郎船今夜泊西溪徐教授一䕫一䕫字大章天台人博學善屬文危太樸在元時嘗言于朝授建寜路教授元末避兵於郡之白苧里有屋三四楹牖外有一大柞因作獨柞軒記以見志錢塘潘時雍題一詩曰瀟灑幽軒面水開軒前老樹倚雲栽閒来倚杖過三匝醉後支頤看百迴風雨欲隨龍化去雲霄常聴鶴飛来結鄰儗共榮枯事遮莫人知是散材明吳元年以詔至都時方置三局一曰律局定律令凡舊官練於憲章者居之二曰禮局究禮儀凡宿儒通於古制者居之三曰誥局譔誥命凡俊才優於文辭者居之一䕫特撰誥文賜蟒衣綵幣縉紳欲薦入禁近堅以足疾辭終杭州學縣教授有始豐稿嘗作賀表有云光天之下又云天生聖人為世作則太祖覽之大怒曰竪儒乃如是侮我耶以生字光字作則字聲律犯忌欲坐以不敬禮臣請曰草茅不知忌諱乞宥之并請欽定表式頒示天下従之送崔孝子南海尋母詩崔生秦川来面有憂戚姿問生何所為念母無巳時母今在何方南海渺天涯涉川水増波陟嶺路多岐區區寸草心不敢辭險危晨興霜露零夕息烟火微去去一萬里視若跬步為人生穹壤間母子故相依胡為若鴻燕南北相背馳白日行中天寜不照所私願言崇令徳逺大以為期甲辰九日東塔登髙得髙字澤國豁平野何地堪登髙蕩舟且出郭逾彼東城壕夷猶六里塘悠然見林臯云是故賢里閒世居方袍乃遵游龍街鞠為茂蓬蒿摳衣歴層塔凭䦨瞰秋濤講師雅知已採菊酤新醪懽餘發清嘯屏息塵務勞同遊潄珠玉白首徒自搔題破窗風雨圗疎窗久零落亂帙自縦横方與聖賢對那堪風雨鳴乾坤含暝色林壑度秋聲想子心如石看書夜到明題徐良夫遂幽軒臨風一讀遂幽篇鄧尉穹窿在眼前愧我未安三畝宅思君欲問五湖船春明載酒穿花隖日暮扶藜看稻田多少長安軒冕貴枉勞魂夢到林泉訪玘法師宿夕佳樓詩寓縣俄多難湖山亦被兵名藍俱泯滅别搆獨峥嶸翰墨看前輩登臨愧後生嚴城圍列嶂半鑑出澄泓直篠侵檐上纎蘿附牖縈倚䦨雲鳥度極目鏡天平日夕景逾好秋髙思轉清殘陽樹間没薄靄水邊横紫翠霏㣲合丹鉛㸃染成茅津有漁唱麥嶺少人行暝色松間動寒飈竹嶼鳴疎鐘度餘響逺火露青熒仙梵微微出鑪煙裊裊輕山盤堆露實石鼎泛雲英洗濯塵凡近歸依誓願精行當陪竺士聴法破無明寄題陳彦兼春草堂青青草色映簾帷夀母朝朝玩緑滋有句不縁春夢得旁人錯道謝家池丘侍郎民民字克荘廣陵人家饒于財一時同里諸彦多事徵逐民獨従師友以學問為事及揚州被兵攜妻子奔浙西僑居郡中入庠序訓生徒自給至正壬寅用流寓籍以毛詩就試與選徐大章及雪廬作序賦詩送其㑹試明洪武初為松江學校官殷孝奎有踏雪入汳城訪丘克荘詩顧謹中曰余年十五游郡庠當時為師者全公希賢丘公克荘楊公孟載貝公廷琚魯公道源包公叔藴皆一時名士由是慕學之士無慮千數松江一時文風之盛不下鄒魯後民官至禮部侍郎楊基𤓰洲逢丘克荘詩云江水靚如空江花冷未紅憐予猶客裏羨汝已鄉中白苧青衫雨烏紗短帽風不須揺艇子垂釣五湖東周𤣥初祈晴詩閼逢嵗之半白祲白如烟野人不敢出封户聴雨眠夢跨蒼精龍六丁相後先手持五色石直欲補漏天剛風忽引去天門方洞然忽見一道士青眉長娟娟緑章冪紫霞稽首上帝前上陳太守辭下述萬姓瘨稌無一尺苗潦涵累百㕓陰霓走白日黒蜧嘘長川百怪不自閟三光何由宣帝怒叱力士磔裂無留連即遣東王公髙掣羲和鞭金雞怳驚覺日出搏桑顛題柯博士竹奎章閣下文明日遍寫琅玕寄逺遊疎雨夜啼湘女淚飛鸞朝下羽人丘月移簾影金閨夢風度簫聲玉宇秋幾見畫圗憐往事碧雲零亂使人愁和顧阿瑛平湖草堂詩十二行窩摠是春平家湖上草堂新養来白鶴須教舞浴出花驄不受馴桂樹漫歌招隠士鹿門今屬姓龎人錦囊合貯詩千首聲價流傳海内民送友人之杭又隨南雁度錢塘不道并州是故鄉江上秋風蓴菜美山中春雨石田荒杜陵老去寜忘蜀江總歸来不是梁欲采芙蓉贈君去錦雲零落倚淒涼孫司業作作字大雅後以字行更字次知江陰人至正末挈家避兵於吳盡棄他物惟載敝書兩簏而巳張士試聞而廪禄之以母病謝去衆為買田築室於淞後為嘉興府學教授遂寓居南湖明洪武六年用禮部尚書牛諒薦召修日厯書成當授翰林編修以老病乞外除太平府教授八年選天下學官内任作與焉廷對第一授國子助教明年分教中都又明年召還又明年陞司業作為文醇正謹嚴弗尚異同或數年不獲一字及遇得意窮日夜筆硯不輟著書十二篇號東家子宋景濓比之法言通書詩亦竒僻古雅有滄螺集六卷謝馬善卿送菜嘗欣食菜羮自謂肉不過今晨齒頰間屢嚥安敢唾持梁囓肥鮮野籟誰當課使君可憐人異味諳小大我本江南樵酸寒羮不和空腸轉藜莧糲粟連穅檜雨韭春割苗霜菘秋飣座羊蹄釀㫖蓄蒲歜雜細剉芋魁掘地底茭首洗泥科木魚三百頭竹筍一萬箇朝湘出山厨夕煑吹烟銼堆盤青黄具入口生澀奈以兹媚盤餐頗復如君作採之諒有時蒸或躬自佐白鹽㸃葱橙紅椒羅臼磨蔗餳質劑調釅醯芳辛破香飯炊屢熟宿酒酲方餓鵞掌推不受鼈裙空欲蜕饋案連十罌飽食深自荷霜根咀寒虀三嘆論竒貨氷壺奪仙厨適口騰軒簸四海一東坡拙謫常坎坷參軍半畝菜詩句劇嘲賀我惷不償一造物知何那抱甕力不任負鋤筋苦墮亦欲賦歸田自種百畝稬傳君作菜法華瓷檢封裹食勤不愧天日晏従髙卧夏日與諸友文燕平生四海交佳友一二數蚤年識黄九黄叔彞詰屈盤新句爛漫多文辭晚復親李杜李可久杜子才牆東避世公王原吉十載厭城府暇時得相過雖夕欵蓬户太丘兩佳兒元方吾所慕陳希文半升折足鐺白石日夜煑低頭誦經史未覺霜月苦今春一相逢春色動眉宇従師入天台擬讀興公賦我行適四方日與樵牧伍敲門三益友驚散林下鼠一呼未即衣再呼那及屨起陳四席坐李杜黄及予相對出肝腸遂忘親寡旅上馬来及晨投轄過映午談諧肘腋腕拜跪肅樽爼歴數座上客坐欠兩公語兩公今何在江湖渺修阻缺然螬化蝶又似蟨迷駏㑹合疑有時交親不在故凡此宿昔契毎懐連牀雨誰知一餉樂竟違通昔晤誓去挽莫留盡日空詹竚飛魚有序暨人航海得飛魚于黒水之洋其長二寸頥兩鬐各廣長寸餘張為兩翅海風發作従波濤飛集船上如燕雀既止則不能入水意者爰居海鳥亦此類歟荘周所謂鯤化為鵬不荒誕也為賦一詩海於天地中物不能比大陰陽浩出没造物窮荒怪力足浮三山勢欲吞大塊豈惟日月浴兼疑鬼神㑹披經案山海異族紛瑣碎我時一徘徊足躡二儀隘焉知賈客輩入海如入闠風昏白波駛雨慘黒洋邁批石嗔火發海船夜投物波中如火烈囓指愁舟壊舟人見海怪則囓指注血于波其怪乃没飛魚集檣柂翅尾錯珍貝初疑燕雀翻復駭蝗螟墮非類感所希枯腊拾海外三韓雨霧洗百鳥風烟帶參差挿雙翰欹側張兩斾形模小鮮具意氣鵬鶴類祗慙海若笑狹小矜此輩我復嗤海若萬彚同一態神靈數巨魚鯤鯨鰌鰐魪智屈雲雨能肉大何足膾龍門萬魚躍此翼吾所快菽乳豆腐本漢淮南王安所作惜其名不雅余為改今名因賦是詩淮南信佳士思仙築髙臺八老變童顔鴻寳枕中開異方營齊去聲味數度真琦瑰作羮傳世人令我憶蓬莱茹葷厭葱韭此物乃呈才戎菽来南山清漪浣浮埃轉身一旋磨流膏入盆罍大釡氣浮浮小眼湯洄洄頃待晴浪翻坐見雪花皚青鹽化液滷絳蠟竄烟煤霍霍磨昆吾白玉大片裁烹煎適吾口不畏老齒摧蒸豚亦何為人乳聖所哀萬錢同一飽斯言匪俳詼還陳檢校山谷詩蘇子落筆奔海江豫章吐句敵山嶽湯湯濤瀾絶厓岸㟧㟧木石森劔槊二子低昂久不下藪澤遂包貙與鰐至今雜沓呼従賔誰敢倔强二子角吾尤愛豫章撫卷氣先愕磨牙咋舌熊豹面以手捫膺就束縛纎毫剔抉難具論宛轉周腊為鄭朴烟霏淡泊翳林莽赤白照耀開城郭沅江鼈肋不登盤青州蠏胥潛注殻洞庭東南入无野二儀清氣㑹有壑士如此老固可佳不信後来無繼作我嘗一誦一回顧如食橄欖行劒閣忽聞凍雨洗磨厓拍掌大笑工􅟥摸作詩寄謝君不然請従師道舊所學約潘元飛遊恵山錫谷名泉誇第二江水猶来勝山水中冷天畔隔蒼烟九龍眼中差可喜我夢臨此鑒眉鬚裹茗烹煎攜緑珠老僧毿毿妙而臞忽来説禪坐跏趺三生豈是舊縁法明日買船當下牐共君烏紗一裹頭野㟁春洲看晴鴨歸帶恵泉邀諸友茗飲江南浙山俱可人澤比恵泉常入夢昔年濯足望具區船頭百折頻遮送髙情數與此山期舟不衝風雨尼之天公忌人如忌疾十年欲去事長違昨宵拄杖落林谷畫舫載泉贏百斛為倒龍堂明月珠共試蛇坑小蒼玉故人談頰翻如河舌本嚥枯知奈何此泉此茗不易得緩飲緩煎還可過人間酒肉誰厭臭我味此泉渠閉口身如瓠壺過渇羗慎勿與方傳不朽送人往宣城送客宣城郡吟詩憶土風雪膚銀杏白火頰木𤓰紅楚殿荒山裏澄江出樹中君親三載仕我友一樽同沙上百年神物㑹出此逺人邨浪洶江翻屋沙崩樹嚙根芋魁鋤地底鹿角長溪痕開闢當天意瀰茫恨土吞大堤曲君騎白馬来我騎青驄去背面不相識兩馬驕嘶住大年雨中見寄二絶因次韻十載青春伴旅遊無田安敢羨歸休夢回讀罷凄然句正似彭城風雨秋筆端江浪貯雲烟愛汝新詩字字傳為報客懐無一事日慿花鳥唤春眠元夕寄先輩碧沙官渡栁揺新燈火蕭條不負春誰道黄昏先閉戸天街雪色最冝人題雲林溪亭山色二首過雨山如罨畫明溪聲直到白雲亭雲遮不㫁溪聲去流出平蕪兩岸青白髮雲林老畫師一生辛苦竟誰知何須更上峰頭望滿目清秋滿目詩丹厓居士唐肅肅字處敬自號丹厓居士山陰人至正末授黄岡書院山長轉嘉興學正遂家焉髙啟有送唐博士移居檇李詩云楊栁發初齊春陰廢院西故人乗醉别新鳥傍愁啼舟重全家去詩多一路題杏花開北郭誰復共招㩦其自作輓郭秉心詩亦有吾昔居秀州友有徐一䕫句明初以薦擢為編修罷歸卒肅文章稱大家時有唐劉毛蔡之目行尤修飭縉紳咸推重之有丹厓集和牛士良咽咽銅虬水瀏瀏青瑣風掖斜觀斗轉簾疎望月空出門步清影循階行露叢睠此光霽景感予㣲渺躬觀國豈非願懐親方蔚忡題張孟蒹所注西臺慟哭記後宫中六更初罷鼓藍田璽玉沈崖浦廬陵忠肝一斗血去作燕然山下土桐江水落秋日頽有客歌上嚴光臺石根敲㫁鐵如意萬里北魂招不来西風又涸灤河水故老寥寥知有幾珍重睢陽季葉孫箋簡能禆兩朝史智伯頭飲器歌飲伯頭些伯鬼伯死寜知頭作器玉盤酒滴猩猩紅血波倒浸泥丸宫雷吼無聲電睛墜伏犀骨㫁漆花膩老龍一吸銀海澁飲䦨擲杯怒髮立英魂夜半不敢泣君不見君漆頭臣漆身恨君藍臺争諫臣秋江曲妾家住銀塘石楠秋葉香憶君蕩槳去江水與愁長西風夜泣葓花露鴨觜岸低人不度冷荷如鍼刺烟素鴛鴦飛来鸂鶒去過漂母墓昨日下淮河船河流滚滚不見天逆風一日行十里黄牛黒驢牽不前今日過韓信城城邊蕪荒田不耕人傳韓信此發跡至今城留韓信名當時乞食向漂母母哀王孫心獨苦一朝富貴報千金不記淮陰少年侮我来不弔韓将軍悲歌獨弔漂母墳英雄貧賤少知巳不在男兒在女子劉松年山居圗曽逐大茅君峰頭卧古雲鳥青呼作使鶴白養成羣客較丹砂法童窺玉券文近来烟火㫁花氣作爐薫賦海東青應制雪翮能追萬里風坐令狐兔草間空詞臣不敢㤀規諫却憶當時魏鄭公題陶穀郵亭紫鳳檀槽緑髮倡玉堂見慣可尋常作歌夫必腸能㫁明日聴歌更㫁腸題柯敬仲竹石緼真齋裏揮毫日多得青城太史題今日南州把遺墨石篁秋冷蟪蛄啼沈知縣鉉鉉字鼎臣錢塘人元末道梗與同邑陳世昌俱留於禾鉉博學邃於春秋洪武初知石首縣髙啟沈徵士鉉野亭詩云清時猶在野獨卧見髙情移艇聞烟唱鈎簾看雨耕江晴雙鸛下樹晚一牛鳴回首徒相憶柴車不出城楊維楨沈處士林亭詩云楊花作絮撩行路荷葉流錢盖野池黄鳥一聲啼晝寂不知春去幾多時鉉二作及陳王五詩皆咏禾中名蹟並見栁志真如雪霽祗園雨瑤花窣堵削寒玉峥嶸聳層霄皓彩炫晴旭變幻境非真忻然寄遥矚秦山逺翠考見題咏出門無寸矚凝望立溪灣修眉在天際料得是秦山陳銘銘無考春波漁市考見題咏瀕溪有居㕓並㟁舟競艤風含水氣腥曉作漁人市魚美何處無無錢買金鯉西驛歸帆考見題咏帆收麗橋邊暝色巳帶浦臨波據胡牀且聴官船鼓三塔晨鐘浮圗枕龍湫飛觀出雲杪鏗鍧吼華鯨聲震禪林曉淵靈斂陰氣扶桑日将杲雙溪夕照溪分燕尾流中洲吐龍舌落日飈彩虹飛梁影横截慿䦨且遲留東望待出月王峪峪無考東墅歸鴉别墅荒涼落木秋寒鴉投暝客歸舟斜陽流水孤邨路不是離人不解愁髙尚志詩見金蘭集朱檢討云尚志㢲志之弟題徐良夫遂幽軒閉跡銷聲與世疎巖居蕭散屬潛夫竹間展席移茶具花底清吟擊酒壺喜向山林便野服嬾因軒冕溷泥塗令人長憶鴟夷子欲趂髙秋泛五湖至正庚辛唱和詩有序人情莫大乎歡戚而情之歡戚則又係乎時之治亂何者當其亂也雨覆雲翻天地否閉對此茫茫無復生理雖有花晨月夕適足動我之感愴欷歔及其治也上清下寜日月開朗耳目所遭無非佳境雖當凄風苦雨皆足助我之酒腸吟思此二者無他當由情以時證時従情得如知情之歡戚可以卜時之治亂矣至正庚辛唱和詩為嘉禾同守繆君廣文曹君偕諸名輩分韻之什也讀其庚子兵後之作則知方岳匪人苗獠驕肆悲音於邑何其戚也比讀辛丑避暑之作則藩衛有人民庶樂業逸興超舉何其歡也盖其為時不過一再踰年而二十八詩之歡戚頓異要亦一係乎人焉耳矣余奉使以来稽滯嵗月毎毎以損辱使命為戚乃者太尉公順承皇命報使有日為歡可知適舟過檇李以方外故知新公請序此詩不覺因己之歡戚有觸於此詩且知詩可以觀時之治亂若著蔡如此鄱陽周伯琦序至正已亥兵後明年庚子八月之望同守繆公招同諸彦小集南湖以杜甫不可久留豺虎地南方猶有未招魂為韻人得一字即席而成亦足以紀一時之變且幸此㑹為不易得云爾承事郎司農右丞郁遵識繆同知思恭思恭字徳謙吳陵人至正間為郡同知丁酉張士信来攻檣艣蔽天排川而下思恭於杉青閘東西岸積葦以待時南風大作岸上舉火敵舟焚燎至四十里治郡三年民大悦服終淮安總管得不字我生胡弗辰守土愧簮黻亂離歎斯瘼兵氛駕飄拂貴臣既防求苗獠薦驕怫比户䍦毒淫流殃痛未訖大軍有凶年荆榛莽茀鬱天地塞無歡三秋翳沈沕當國哀黎氓方来濫朱紱所冀民社寜優詔非為屈頓覺元氣清太空如蕩祓借問今夕娛還思去年不髙㢲志巳見得可字皇風遘中否微命亦遷播豈謂託喬林依然駭烽火前年奔山壑去年匿檣䑨妻兒怖欲死崩憂不知我賴此干城将揮戈挽将墮趙佗既足王天子詔曰可人能閉殺機三光自寜妥湖波瑩宵鑑芙容顫秋朶且共醉明月狂吟莫還舸徐一䕫巳見得久字青丘緩殛殪黒飈撼九有海立翻蛟宫山飄若螘走雖愛赤城霞噴瀑當窗牖棄擲不敢顧欲卧豈能久孤翔覽徳輝于焉得林藪衍原饒粳秫詩書足朋友何期復中兵難作在丁酉東西競奔竄顧尾不救首幸云全此軀常疑是夢否還見湖上月兼之對名酒狂奴有故態㗲然開笑口姚教授桐夀桐夀字樂年桐廬人博學多才識元末為餘干教授與僚友鹽人沈穀善結姻盟穀死攜子就婚值世亂遂寓居豐山之陽與雲間楊亷夫嘉禾貝廷臣潘澤民張子晦本州楊友直遊時于春林夏澤尋討舊蹟著有樂郊私語得留字驚波蕩四海桐江失安流睠言秦溪側因依有舊遊魚鹽庶混迹暫忘兒女憂寜如王宣仲洵美不足留飛塵俄焱舉吹動城南樓閉景層闉裏歸魂故山頭阽危幸無死重見湖邊秋白月漫相笑誰無歡與愁釋克新另見方外得豺字大千一塵刼刀兵動三災修羅摶日月兩間塞風霾舉目何所見莫非狼與豺生民飽湯火像教淪灰埃世道既交喪大塊何為哉非仗威徳尊誰闢乾坤開南天埽一隅清光濯人懐雖見舊時月風波尚喧豗諸公賴經世好為蒼黎哀我将従此去杖錫尋黄梅江漢巳見得虎字文淵客西河幼安寓遼滸中原雖板蕩兩鄉若安堵予従稽山来寄家鴛鴦浦謂當侣魚蝦何知鬭虯虎操艇匿菰蘆不敢歌萇楚須臾雷雨動羣妖碎天怒歸看窗中月依然挂當戸逺人慙未賢良由得所主陳世昌巳見得地字寄家檇李城情為姻交繫時登城上樓吳山望天際去年向西湖重尋烟水契驀聞兵變起諜問若天墜舉足不敢前念之心欲碎兼旬難方解歸舟急偏滯半道聞鄉信十言九不是踉蹌入郭門閭閻成赤地到家見妻孥喜極翻涕淚具言鄰公衙吏兵救逾至男女十九人幸免毒蜂刺琴書賴復完疎狂更容肆翹手見輝光恍惚疑夢寐鮑恂巳見得南字舊業帶郊牧受時勤耕蠶傾筐董機女負表責諸男得酒共慰勞中堂相與酣醉従草窗裏逺看函山嵐交遊恨濶絶引領望東南瞥見穿雲燧惶駭憂何堪孤帆川上来問之且再三為言脱巾呼大亂由凶貪燒城但餘堞流血瀦為潭懐我同心彦驚淚不能含何圗共明魄相對重髙談樂架閣善善字為之岳忠武王之後當時有所避忌變聲為樂元季寓嘉官江浙行中書省架閣庫管勾受知於平章政事徹爾特穆爾因哭其父左司員外嘔血而卒得方字伊余本竒薄受知徹平章親老繫微禄覉官在江鄉一朝不得志投劾歸山荘豈謂逢亂略松菊萎兵荒平川鬭波浪衍陸成太行故園窅難覔蕪沒在潯陽中原漸陸沈懦将空鴟張翻増紹興恨血戰念家王月色似為苦凄凄滿中方今古成浩歎涕落沾衣裳金太守絅絅字子尚嘉興人元舉鄉試明洪武中歴蘇州守百姓苦官民田則輕重不齊里胥為奸絅上疏請減重額得罪賜死子頴伯克傳家學嘗従俞紫芝遊以能書見稱于時得猶字妖狐呌夜澤欃槍照神州大地無完郛人血當川流四塞失危阻况乃此平疇林坰盡野火園榭為荒丘奔竄竟何所進退徒夷猶不有良守牧何以得依劉仰面見明月清光似君侯既照我心曲還慰我離憂潘府史澤民澤民名著以字行其先大梁人扈宋南渡占籍我郡中至元鄉試備榜補吳郡甫里書院直學巳而北走京師遊公御間薦為行中書省従事黄晉卿王思魯陳衆仲皆作詩送之至杭丞相府以常選俾録廣徳儒學三年改諭銅陵辟吳興郡幕力辭因留主郡學再辟浙東元帥府史病暑卒得有字少小客燕趙南北事奔走蓮花與㕘従菁莪長生友風塵撲人面荆榛掣人肘棄却頭上冠歸種門前栁門前栁未緑驀訝驚風吼豫章隨飛蓬喬松若摧朽況此初生稊吹落竟何有春陽賴萌動翠色仍如帚還将舊時月夜夜當窗牖始信蔽芾陰可以覆衰叟殷統軍従先従先不知其世系官代但詩有猥屬勤王師之句盖亦當時與張平章士信處統軍撻伐者也又觀其姪原善與雪廬和尚書云聞巳涖軍武林與平章公不甚相協想不日投劾作抽身計原善之兄近仁明洪武間㕘政得未字處治則憂賤當亂必避貴所憂自徇恥所逃實多畏昔余在泥塗意欲干井胃帝閽乃齎怒摧排奪人氣氣奪不可伸抑鬱更誰謂恨不如梅生早謝南昌尉歸来閉門卧門外抉羅罻猥屬勤王師何以息鼎沸明月如向人問我進耶退貴賤兩弗居癡人醒還未朱處士徳輝徳輝無考其詩有嬌女殉節語大抵女死苗軍耳嘗築室讀書顔曰存道齋雪廬為之記得招字種梧在東園邀月庶逍遥月色如我心梧枝冩風標十年坐此下攤書悟寂寥理復竟成剥晏極生塵勞兵凶起袵席豺䝟恣咆哮兄弟忽星散骨肉紛號咷還憐有嬌女殉節不可招義命委善敗肝腸故摧燒自謂閒園樹野火等蓬茅使君不陳力安得坐今宵郁右丞遵遵字子路郡之永樂鄉商陳邨人元末官承事郎司農右丞得魂字曠仕愧無補甘讓桑孔尊歸卧青林下猶然䝉國恩有田可種秫有室可避喧問余家何所家住商陳邨邨南遶溪浦屋後榆栁蕃莫帆急歸鳥朝日滿平原鼓腹循臯隴看雲池上軒人傳有兵燹焚刼痛煩寃門巷走狐兔墟里多遊魂老人竟髙卧何必尋桃源願乞甘棠枝和月種田園至正辛丑秋七月十有三日永嘉曹睿以休假出西郭憩景徳寺諸公攜酒相慰藉環坐以唐人因過竹院逢僧話又得浮生半日閒之句分韻賦詩雲海師裒集成什以志一時之良㑹云吕安坦安坦未詳得因字人生苦易别良㑹悵無因況復牽塵事悒悒不少伸今日是何日涼飈度蒼旻薄言攻我車縦步西城闉行行抵龍淵蕭寺誰與隣波光蕩秋色修篁浄無塵覩兹風景殊不樂空逡巡開尊有清醑列坐總佳賔笑談雜諧謔酧酢見天真開士雅投分延欵倍情親醉来歡自劇詩懐浩無垠賦此紀同遊重過卜佳辰鮑恂巳見得過字凌辰訪古刹幽氣集林阿雕甍旭日眩紺宇晴雲摩疎松奏竽笙修竹鳴佩珂禪友素所識名流喜来過俯澗潄寒溜陟磴捫翠蘿瀹茗佐芳醑𤣥談間商歌遂令塵土懐如濯清泠波斯景豈常遇追遊亦無多流光逐奔瀾飛翼援髙柯賦詩留苔壁千載期不磨牛諒巳見得竹字靈湫閟馴龍古殿厰金粟僧歸林下定雲傍檐端宿伊余陪雅集於此避炎酷息陰悟道性習静外榮辱坐石飛清觴毎歎白日速别去将何如留詩滿青竹釋智寛另見方外得院字涼飈動新秋逺寺集羣彦虚檐靈籟發列坐停揮扇情愜引杯觴懽劇雜酧獻酡顔映落日林光散凌亂池深魚自樂林宻鳥相唤芳桂扳幽叢天香滿西院懐哉鄭廣文樗散絶崖岸常真巳見得逢字避炎恨無地偶憶西南峯梵宫隠林麓散我塵外蹤人生晤㑹難盍簮豈易逢于焉遂招揺唱咏偕従容冠帶與遊盤不遺采菲葑促席注華觴寜須侑丰茸有酒當盡歡轉盼成飄蓬丘民巳見得僧字上方鬱嵯峨遥睇青雲層餘霏不成靄朝陽射觚稜雙湖鏡光徹涼飈滌煩蒸輕裳欲飄颻短髮仍鬅鬙縦觀極夷曠頗覺秋氣澄載瞻雷音堂招揺肅髙僧英英竹塢雲耿耿蘿龕燈氍毺天花滿爐香夕烟凝散坐百慮息幽懐詎能勝澗泉煮芹葵山盤羅芡蔆伊余風姿美歌遊厠賔朋世事良可嘆有酒當如澠張翼已見得話字郭逺樹稍陰野曠秋始届舟迎浦上迅愠釋林間快紺園幾世闢㫁碣何年壊閣披龍象擁壁翳天人畫良朋蔚胥集僧衲喜出話談幽貝葉翻襟散袈裟掛池深浮菡萏露晞餘沆瀣石田際秔秫秋風偃蒲稗屢愜清賞延迫此日西邁篇什志偕遊毋云棄菅蒯王綸巳見得又字驕陽秋逾炎㕓居苦囂陋出郭謝塵鞅浩氣溢宇宙祗園蔭長流松篁倚天秀簮履適相従萍水欣邂逅主人延客坐芳情重醇酎道合猶通門志洽儼交舊緬懐風塵際東西困羇走餘生獲良㑹嵗月不可又願言慎所止同心契蘭臭日薄嗟易昏明當覩清晝来志道志道無考得得字招提面晴湖出城路咫尺雲林盡蕭爽盤踞神龍宅僧開草堂静鶴避松烟碧延賞非俗流清言足佳客飛光瞰澄波駐屐亂蒼石嘲咏圗罄歡留連竟忘夕吾徒洵疎豪此㑹寜再得風塵莫回首回首増嘆息聞人麟麟字彦昭宋元時聞人為郡望族特麟無所考見尚有輓楊鐵崖詩得浮字精藍煥金碧突兀城西陬盍簮適清暇觸熱偕来遊入門松檜陰堂背篔簹稠盤礴衣未解已快風颼颼清談揮玉麈白戰行詩籌吁嗟百年景汎若波中漚何如齊物我蹔去邊幅修妙理或未悟當以大白浮曹廣文睿睿字新民永嘉人占籍華亭元季為郡學訓導明初遷松江教授有竹枝云昨夜西湖月色多照見郎君金叵羅明朝江頭放船去江亭風雨奈君何著有獨叟集得生字清晨出城郭悠然振塵纓仰見天宇浄俯矚川原平竹樹自瀟灑禽鳥相和鳴龍淵古招提飛盖集羣英唱酬出金石提攜雜缾罌丈夫貴曠達細故奚足嬰道義山嶽重軒冕鴻毛輕素心茍不渝亦足安吾生徐一䕫巳見得半字野曠天愈豁川平路如㫁不知何朝寺突兀古河岸潭埋白氣沒林宻翠霏亂勝地故瀟灑七月流将半合并信難得通塞奚足筭廣文厭官舍亦此事蕭散風櫺爵屢行蘿磴席頻換但覺清嘯發寜顧白日旰吾欲紀兹遊掃壁勞弱翰尤存存無考得日字厭劇謝塵喧酬心趨曠逸芳辰霽景浮疎林照旭日靈飈激虚籟灝氣還盈溢卉木雜敷榮川流何蕩潏清芬吐芙容蒼筠宻於織幽賞非人間超忽詣兠率憩此丈室中誰云但容膝禪翁抱沖姿澹然㤀得失周棐已見得閒字終嵗逐城府常有戚戚顔晨登郭西寺逍遥任疎頑林堂含餘清爽塏非人間況兹羣彦集秩秩文翰班善謔等髙咏嘉言振幽孱豈無觴酌歡茗煎亦未慳喧卑受物曠志適㤀世艱耽留陽景馳飛羽當樹還賞心頗逡巡紛慮仍粗關諧此塵外蹤再期永日閒檇李詩繫卷六
