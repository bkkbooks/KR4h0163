body:
  text: 檇李詩繫卷十平湖沈季友編明周布衣寅寅字汝欽嘉善人奉母至孝安貧守義鄉人重之嘗有盜其桔橰者已而復還曰吾有慙於周君初學于周鼎後鼎有疑必咨於寅有百櫞堂集風涇得泉字考見題咏清風義井官衢側泉脈源源來不息居人緩汲行人先丹室仙人方煮石作亭者誰顧虎頭我有義心天有錫凡今錢貨古曰泉一舉偶然成兩得麟溪草堂考見題咏愛爾麟溪水竹居考槃人與境偏宜杖藜我欲間相過題遍琅玕節上詩倪運使顒顒字廷瞻號居易政之子天順丁丑進士官運使題馬紅韁裊裊綰金羈仗立歸來日未西四海只今烽燧息華陽春草正萋萋雲東逸史姚綬綬字公綬嘉興人或云嘉善人誤天順甲申進士為御史巡鹽兩淮鈎剔積弊淮飢畫策賑民以耿介忤當道出知江西永寧縣母老辭歸所居大雲里東饒水木作室曰丹丘又作滄江虹月之舟浮泛吳越間粉窗翠幕擁僮奴設香茗彈絲吹竹宴笑彌日書畫妙絶一時初號穀庵又號雲東子蘭臺逸史天田老農上清仙吏懶仙仙癡紫霞碧月翁並著人間唯丹丘先生為尤顯所蓄書畫最富恐遭回祿搆地一方汙為池池中築臺臺上營室夜不通火一日大雷雨火作姚方踞厠聞報急叩所藏古迹應者曰皆火矣姚驚惋遂不能起得疾卒平生慕張貞居之為人所見片紙隻字無不收藏嘗得其鐵冠與遺像為撰句曲外史小傳搜輯其遺文以序之又伐石樹碑於其墓著有大易天人合旨及穀庵集詩頗清麗不著一塵其流風遺韻為時嘆羡宜矣句曲外史鐵冠歌昔為柱史稱鐵冠螭頭屼立霜風寒歸來野服山林下不類峩然鐵冠者句曲外史人中仙此冠已餘二百年繡斑蝕鐵鐵欲穿稜稜巧製銅色妍黃篾樓中想應貯玉鉤樓邉舊行處二儀三綱浪得名竹籜鹿皮無此清芙蓉吐花金玉并鐵葉細薄不易成外史星壇月明夜醮禮茅君鶴曾借出塵風度向誰彈坐看瑶池碧桃謝豫號逸史雲之東髮已種種今成翁冠乎冠乎磨冷鐵今鐵曷能如古烈君不見古鐵性烈今不如作冠寧住仙人居流落四海幸屬豫著之稱我青霞裾題自寫山水二首春泉注壑挂玉虹一派正落長溪中洲洄渚伏宛轉緑雲裏草堂如瀼東吾聞滄波有老樹就為竽籟間留住我欲扁舟卧看山擊楫長歌少陵句緑楊風髙溪水長五月爽爽如秋涼山中人家少官府曉起出門唯釣航一絲到手輕於髮不釣紅塵釣明月斗酒坐對松江鱸肯換人家雙玉玦題畫為楊司訓作煙光漾風青入樓立馬回望湖山頭逰絲飄飄幾千文不繫白日增人愁春愁太半行樂少渡口桃花鏡中老勸君盡醉如杜陵莫待春歸怨啼鳥溪居水暖鵁鶄浴花香蛺蝶飛青絲聊繫酒白苧已成衣溪濶容蘭漿林深著板扉留賔將薄暮猶待釣魚歸南洪尊開如北海舟進傍南洪客飲總當右月生唯在東漁燈蓬影外人語水聲中不意袁宏渚而今亦可同斜漊來帆詩初望懸風正須臾趂漊斜往來皆過客多少欲還家鷁去帶春雨鷺歸隨晚霞前村遮望眼緑樹正交加桐村小隱詩和韻河流南入市徑路北通村新結草堂好舊栽桐樹繁兒童知稼穡鷗鳥識琴尊有客問竒字乘舟直到門白蓮寺琅玕滿院未全貧節下題詩意自新入社也知須我輩逃禪不識是何人東樓獨倚千山雪北閣空飛十丈塵清曉春風吹棹發曹溪一派正無津陳園二首白日青天醉唱歌子同西塞更如何山前一夜東風急明日桃花水上多黃埃赤日滿人寰擾擾浮生競往還何似衡門修竹下捲簾間坐看青山馬場湖初見菱葉稀漸見菱葉肥馬場湖水濶處處採菱歸追次張伯雨韻春暮雨晴池水添夜深池面漾新蟾刺桐花影毿毿動不省空亭是隔簾暮春郊行春暮郊行溪日斜隔林煙火是田家相逢盡説耕桑計那有間人掃落花吳門風雨風雨舟航未得行重陽節近算歸程老年自是居鄉慣怕聽江湖夜雨聲自弋陽至廣信百里青山十里城漁村燈火隔江明疏篷不識寬多少著盡夜來風雨聲題畫秋風吹空古樹葉白雨壓低新竹枝淨掃石牀看春色滿襟涼影鬢絲絲常山道中鳥未投林日未曛松頭野雀自成羣肩輿歸去身強健處處青山有白雲張州判彞彞字天常海鹽人天順間以貢授州判晉州述懷微官何事久殊方回首田園業漸荒多病一年三乞老知休十夢九還鄉椿隂已散遼陽月鴈影空分海國霜幾度休衙獨凝睇夕陽西下路茫茫張訥訥字汝言號全愚海鹽天順間人名見陳漢昭詩有暑夕見訪一律賦得朝雨送施先生片雨城南曉勞歌惜解擕馬遲村徑滑雲暗海天低弱栁愁含淚芳塵軟著泥那堪當此際又聽鷓鴣啼許主事章章字廷冕號葵軒嘉興人天順甲申進士授工部主事暮秋寫懷蒹葭杜若滿汀洲吟對西風獨倚樓逺鴈不將天外信清砧偏動晚來愁沈郎瘦減非緣病宋玉愁多豈為秋往日少年俱已貴此身何日謝沙鷗鄭提舉延延字世昌鄉稱東谷先生海鹽人以蔡氏書授其徒顯者三十餘人天順中貢授廣東市舶司副提舉諸番無敢以方物及門者陳白沙贈詩云溪漁海舶各歸去明月自照芙蓉峰有存笥集青溪别意送浦玉還金陵溪上晴煙拂栁條溪邉逰子促征橈平蕪渺渺滄波濶野樹依依别路遙三月鶯花歸上國一篷煙兩過楓橋何時重踏金陵道擕手東風話六朝墨竹零亂金錯刀參差鳯凰尾翠影落湘潭秋風吹不起次酬沈元節舟中有懷咫尺青雲是畫圗肯將書劒老江湖經旬不見匏居子筆硯荒來一字無贈鄭山人芒鞋踏遍浙西東歸卧靈山第幾重滿耳塵喧消不盡間來林下聽松風回鴈片影橫斜不作行數聲嘹嚦度衡陽夜寒沙渚清無夢啄盡黃蘆葉上霜白頭公墮樓人去舊園荒野樹殘煙幾夕陽只有多情花底鳥白頭猶自説興亡虞舉人勳勳字舜臣號樗庵海鹽人天順已卯以詩舉於鄉母喪摧毁不起商文毅公為詩哭之云論齒我差長論學子當先胡為抱沈疴長往不復還白璧嗟已缺明珠竟沈淵仁者遽如此疇能叩清玄登鷹窠頂贈松崖道人考見題咏道人結屋懸崖巔蒼松百尺蟠屋前凌空怪石根半露巢鶴老樹枝相纒層巒醉踏苔雲滑洞門長嘯蘿月圓借君九節碧玉杖同探崑崙十二天倪參政輔輔字良弼平湖人天順甲申進士授吏部主事改禮部升湖廣參政一介不茍治洞猺多恩信時焦萬當國輔題畫竹紙扇以遺京貴曰不須髙萬丈清氣滿乾坤任爾西風急何曾曲向人卒於官有類劇遺稿徐州山中雲散千年氣堤上人耕百戰場瘦馬獨行回首處冷煙斜日似咸陽過潯陽苦竹黃蘆帶暝煙水雲深鎖舊江天青衫送客無司馬那得琵琶上驛船題竹送許昌世僉憲四川春明門外斷秋風夢隔煙花紫禁中何處竹枝傳别意子規殘月在巴東沈參政棨棨字元節號吾匏平湖人天順甲申進士授工部主事監龍江稅有亷聲知潮州嚴通番之禁寬私鹽之課歷延平臨江不改其操莊定山有十年清沈美南京今日臨江沈更清之贈因相傳曰清沈終貴州參政詩文沖淡純雅五言古最得柴桑風致有頥貞集行世送陸廷言歸鄉晨興理征棹薄言歸故鄉故鄉渺何許江水悠且長白鴈動秋聲碧雲生暮涼永懷同袍誼感此良亦傷出處諒有時富貴何足臧與徐學禮話舊因柬劉守約太守姚穀庵同年今日試新雨白苧商飈秋灌園得休力新粳候晴收間居寡俗紛愜我心緒幽兒童報客至橘逸儒家流茅堂拂塵榻契分平生投盤餐截雉肪炎菽充核羞呼酒出久藏曾不為婦謀駕言嵗月邁惻惻江湖憂出茍無可稱寧若隱者優送友歸省江天雨繁霜水落見層石北風捲地來寒色晚逾劇之子戒行李詰朝問鄉國青雲多故知而深仳離惜我懷亦何為兀兀殊未釋一官慙素餐十年久為客甘旨願已違雙親況垂白家弟昨致書海潮害秋穫嵗計諒無望何以供肉帛子歸及承顔我客徒役役因之欲奮飛安得晨風翼喜徐仲洪表兄至京我家清溪南君住清溪北君來自清溪我如抵鄉國殷勤問家事歡娛動顔色雙親實康強三族幸安適諸弟復進修孤姪況謙益舊穀雖無儲囷廪足新麥時雨溉我田兹秋望有穫情深坐中夜涼月當天白再遊清溪再得孤舟興兹遊不厭重溪山元有約昆弟且相從北渚水銜月南臯雲度松誰云秋意晚猶及採芙蓉逰靈谷有約尋幽上翠微叢林因叩逺公扉蒼龍護鉢和雲卧白鶴聽經帶雨歸世路賞音人有幾浮生開口笑應稀山翁倘愛松花釀明日重來更典衣挽吕郎中秋雨凄凄草樹疏茂陵無復見相如紫泥漫有新頒詔青管空遺舊著書别墅雲間棋局靜滄江月冷釣船虛白楊髙冢孤村路薤露歌殘恨有餘陳學訓善善字敬佐號友雲又號警齋海鹽人工古文詩賦性耿介寡合家貧甚未嘗下氣求人天順中以貢為崇陽學訓九日詩為藝林所賞九日偶成九日出西郭望中秋色深蕎花霜滿地楓葉錦成林飲馬逢流水登髙問碧岑折腰虛五斗羞對菊花吟春遊澉墅考見題咏擕酒來從澉上逰蒼蒼樹色望中浮林間梵唄天真院空外闌干宣慰樓滄海接雲疑越嶠青山繞郭似杭州醉歸驢背饒詩興東指蓬萊鐵笛秋覺林夕照青山寂寂謝塵氛人世光隂易夕醺漁父短歌臨水聽牧童長笛隔林聞天邉淡影明鴉背松杪餘光認鶴羣託得尋幽遇支遁卧分禪榻半間雲附考寺在海鹽縣南二十里豐山東麓元末建山有石屋三所是始皇屯兵處又有九母冢資聖寺戴井考見題咏將軍遺宅作招提石鉢銅瓶不染泥幾度逢僧談往事倚闌回首夕陽低璵城水雲鄉在舊城西幾度尋幽醉不迷遙憶清虛樓上客洞簫吹徹海天低附考在海鹽縣西北十八里一作歟城相傳袁嵩所築薑太守諒諒字用貞嘉興人天順甲申進士由行人歷官漳州守普濟道院玉甃清寒古殿重苔花滿洞白雲封函關紫氣千年後北極靈威萬法宗露井斷碑題嵗月天瓢滴水伏蛟龍功成若許留侯隱擬覓丹砂訪赤松沈布衣樾樾字元懋號樗軒平湖人天順間布衣懷方孔明梅風吹雨日連連緑漲陂塘已拍天為念故人生計薄一篙春水種湖田胡教授寬寬字景灝海鹽人父繼海為社學師人稱大胡先生寬少孤力學亦為社學師稱小胡先生每五鼓開學堂懸一燈髙竿諸童子望之為候抱書至以篤行率其鄉人人咸重之送鄭東谷之任廣東一官新拜嶺南行多少山程共水程驛路梅花殘雪盡岐亭楊栁曉煙輕文犀大貝來殊俗獨鶴孤琴識宦情想到羊城春正好滿庭榕葉聽流鶯胡星士日章日章字樂素海鹽澉浦人遇異人授以星術每作絶句詩判人一生事無不竒驗張方洲贊曰百世之儒裔一鄉之俊傑所判虞氏後以節終又沈氏詩云年年空佩宜男草不見金盆浴鳯雛竟無子杭人詩云自是豪華多樂事元宵燈下蹴鞦韆後於元夕縊死禾人詩云一雙紫燕入池塘紅粉佳人繞畫梁後以二子溺死其妻自縊海昌人詩云只恐明年正月五枯竹叢中苦又苦果以是日乘驢過嶺墮刺竹枝而死虞氏女詩移得名花向畫堂任他門外蝶蜂狂只愁水涸春歸早香冷簾櫳淡月黃竹隱處士沈樟樟字元美號西溪平湖人天成間文學少頴悟日誦千百言久而不遇乃搆數椽以詩酒自放號竹隱遣懷半百年過志欲灰杳無清夢到三台而今且作偷安計多買松苗趂雨栽劉縣丞琮琮字公贄號可庵又號梅軒海鹽人天順間貢士授松溪丞二隱圗林下投簮二隱君肯隨浮世慕玄纁坐來話到忘情處回首青山起白雲李照磨蕃蕃字文盛桐鄉人天順間貢官照磨翠雲亭人間何處問丹砂因過仙翁海上家燕子不來寒食盡一簾疏雨又梨花桐溪萬年禹鑿東連海百折清流曲抱村風浪不驚魚鳥靜桐花開到邑侯門李推官雅雅字文雅蕃之弟官節推中秋山寺玩月人間何處水晶宮坐看氷輪出海東庭樹受風翻夜鵲檻蕉垂地泣秋蟲香飄金粟諸天近影落瑤階萬象空白也愧豫詩莫敵一尊相對古今同潘尚書蕃蕃字廷芳崇德人成化丙戌進士由刑部郎出知安慶歷升山東湖廣布政使所至有治績擢副都御史巡撫四川五載西陲晏然尋督兩廣海南黎賊亂蕃統兵逆擊大破之思恩岑濬以爭地叛蕃籌其道里逺近險易批亢乘危分六哨以進遂誅濬後復勦豐湖十三猺冦及惠州古三仔唐大鬢等屢戰俱獲竒功正德初升南刑部尚書瑾橫蕃耻俯屈乞休瑾復譛逮赴京與劉司馬大夏同謫戍甘肅瑾誅復官優遊林泉者數年性簡朴如貧士時人為之謠曰尚書歸來無第宅稅地種花兼種魚舉網打魚魚換酒花前醉倒老尚書臨卒誡其子勿請贈恤勿刻奏疏人鮮及焉過九里松扁舟發車溪相將九里許不見舊時亭青松繞遺址逶迤皂林塘岧嶤烏戍寺行行難久留懷古吟未巳欲極逰覽情斜陽下山尾附考在桐鄉縣甑山前與車溪相近觀吳越戰場作吳越興亡宛目前遊屯涇上草芊芊夕陽滿地滋寒色野燒緣溪斷暮煙麋鹿歌臺今寂矣鷓鴣舞殿亦凄然祗餘賜劒當年恨惆悵東風哭杜鵑湯清豐滌滌字新之嘉興人成化丙戌進士為清豐令恆有歸志監察使聞其能詩命賦一律有半明半晦雲間月如有如無夢裏官之句使覽之疑其隱諷湯謝曰此滌自輕其官也將去矣取印綬置案揖而出行李蕭然士民攀泣有思庵雜稿新居築得幽居近此君半牀書畫半牀雲塵埃自絶何須掃風月雖多不可分病眼又看新嵗厯老年重改舊時文人情世事俱忘却獨向雙溪醉夕曛方御史輅輅字宏載平湖人成化丙戌進士官御史貞婦詩誦柏舟吟琴彈别鶴音春來秋自去寧肯負初心屠康僖公勳勳字元勳號東湖平湖人成化已丑進士授工部主事歷大理寺卿上言暑月疏決囚徒兩京一體五嵗一遣官録州郡獄著為令漳冦溫文進作亂詔勳撫輯以功升副都御史巡撫順天整飭薊遼邉備奏罷寶坻嵗貢銀魚及昌平牧馬麻峪山採礦等事民甚便之勳以密雲孤懸每有警救援不相及潮河川積石漫衍守截為難黃花鎮拱護諸陵守備單弱疏請分薊州為中路密雲昌平為東西二路於潮河川作虎落具􅏳石布蒺藜鑿坑窖垜石為城增置戍卒由是三路兵勢聫絡賊不敢犯熊兒峪營去水逺一馬日費水錢十文豬圈頭關地平衍春夏水溢壁壘傾圯皆為兵困勳乃奏移營於峪之南移關於豬圈境外兵既得水又有出境耕牧之利嵗省數百人轉刑部侍郎會河間戚畹與民爭田奉詔體勘卒歸之民武宗嗣位首上郊祀藉田幸學三事拜刑部尚書引疾求去加太子太保致仕卒贈太保諡康僖葬乍浦之鄂陽山楊一清志其墓勳頴敏好學尤善詩歌諸體髙凝整練不愧作手然素無詩名者以功業掩也有東湖遺稿題畫寄楊應寧頽雲濕不飛釀作楚江雪林木凍已僵汀葦吹欲折荒村煙火稀野寺鐘聲歇端居思美人千里成濶别天寒鴻鴈窅地僻音塵絶囊琴誰共彈悵望頗鬱結貽此瓊瑤圖願言誦髙潔題嶽蒙泉葡萄愛此大宛珍豈彼凡卉偶蔓延入炎荒零落等蓬莠舉俗知者希畫亦無好手之子謫戍來一顧咨嗟久淒涼骨肉寒延佇比蘭友揮灑聊適情法從草聖剖柔絲亂虬鬚佳實映瓊玖宛似漢宮移不共秋霜朽芳甘壓酪奴徑節奪髯叟我今重披拂真迹未塵垢悠悠隔冥漠三嘆獨搔首西戎獻馬圗送楊應寧督理陜西馬政烏駥曉度黃河來蹴踏萬里風沙開四蹄垂鐵不可鑿拳毛繞腹非凡材戎人牽過蕭關下毳衣席帽胡為者不辭馳獻到關西聞道楊公來主馬甘涼極望水草新重開監院列圉人此匹真為渥窪種隱起龍文猶滿身馬復令行如詔旨蕃息應看錦雲比唐家莫説惟毛仲秦世徒聞有非子內地養馬連長槽㪺水莝草民何勞楊公一來壯兵氣萬騎逐北天山髙健兒夜撤穹廬遁馬政既成公入覲還將此匹獻天間不是按圗空索駿送盛少司冦弟時正還無錫江上春風動紫荆逺逰兄弟獨關情鄉心對雨燈連榻客袂經秋杵滿城芳草欲迷帆去影短書還待雁來聲太平盡説山林樂况復君兼吏隱名白蓮寺不到東林今十載馳驅王事敢興嗟最佳緑竹此時景無數白雲何處家野逸底須歌爛石山深聊復醉流霞布金卓錫空塵眼寶幕珠幡亂雨花丹丘一景浦雲煙樹路盤紆白首青山興不孤我亦有亭歸未得東風時為長蘼蕪酬沈元節江上梅花逐夢生草堂詩景雪初晴北枝畏冷南枝暖可是東風亦世情梅僉事江江字文淵宋宣城梅聖俞之後流寓嘉興登成化巳丑進士授廬江令興利剔蠧擢南京貴州道御史時儲位未定江首疏請上嘉納焉賜織金豸服已奉命清戎兩廣遷四川僉事屢決疑獄蜀人以梅鏡稱之都門送弟還鄉作髙城曉角意如何執别離亭淚欲沱池館夢中青草盡鶺鴒原上白雲多西風苦憶歸帆影落日時聞鼓棹歌最是明朝傷獨處寒山古木對嵯峨蔣秀才文藻文藻名元素以字行號林塘兢之孫少遊庠郡俞吏部梅莊竒其才屢困場屋遂從姚丹丘學詩及繪事所作枯木竹石筆法幾不可辨詩極清婉有致遺稿燬於倭燹今所録得之收藏家幀幅與六硯齋筆記中偕丹丘先生過蕭山竹林寺醉題壁間門徑蕭蕭竹半池喜逢新夏亦秋時長林不卧嵇中散古字猶存張即之即之蕭山人宋司農丞直祕閣書名滿天下金人縣餅金購募不可得潮打山城鐘渡水雨飄輕閣燕防兒一尊除却真間事醉著瞿曇是阿師竹所自題主人留竹似留仙門掩清隂日日眠客至澆茶涼滿榻鳩啼唤雨緑盈川輕塵不到擕琴處淺水疑來泛月船最愛彭城風格老緗縑長畫一溪煙立夏日俗尚鬭茶戲為煎煮自謂曲几蒲團一領略車聲羊腸之趣啜宋宫繡茶不啻也因成一律復圖此以紀其勝摘得琳腴及雨前日長煮水亦安禪花瓷雪漲雞嗉暖石鼎雲翻蟹眼鮮行到碧藤分小浪聽來清磬繞孤煙願教髙枕蓬窗下檢點枯腸卷五千成化甲辰歲竹醉日寫就長卷自喜題此城中寸土却如金種竹誰能便滿林獨有吾家三徑裏萬條蒼玉晝沉沉吕太常常常字秉之文懿公子少有異質過目成誦揣度時事多曲中弱冠蔭為國子生授中書舍人每以不出科目為恨成化辛卯上疏乞應試言者劾之憲廟念其志特允所請果中式歷官南京太僕少卿𢎞治初改通政司擢太常卿採集纍朝祀典沿革為條例上本寺利便十二事俱見施行讀書為詩文老而彌篤有九柏存稿夏湖聞菱歌考見題咏水村宅東偏平鋪千頃碧夏四五月來菱葉如鱗積吐花隨月光淨掃萍削迹頭角紛埀垂稅薄日多益扁舟作吳歌笑彼紅塵客治河謡古河徙自周定王漢悲瓠子歌宣房後來紛紛建羣議神禹逺矣誰其良黃流一石泥數斗歘忽風霾千里走奔狂力障勢轉狂似止兒啼掩其口古之使者猶為民以身捍水勇且仁今之使者志在名流移未復碑先成張秋巳誇纘禹績苻離廟祀稱無敵君不見蜀之遺愛仰三犀今之鐡牛仆在隄題陳賢良祠先生出處百世豪當宋仁廟登時髦裒然舉首紆恩袍判州宰邑心煩勞力詆言利臣貪叨執政發怒遷貶遭挂冠一笑甘遁逃身騎白牛戲江臯忍覩新法紛如毛浮雲富貴曾足叨聲名同一廬山髙彼哉躁進者滔滔景慕異代即薰陶吉蠲爼豆陳香醪馬則神兮輪則尻既享八極從遊遨魄真蛻矣奚蓬蒿贈楊志仁并引志仁故吏部侍郎惟新子先任山東憲副因河決曹州興役浩繁上封事忤中貴左遷長沙同知余忝與志仁幼曽同學今復晤於金陵感今懷昔情見乎詞去國行囊一葉微敢言那問是還非潮來西澗舟橫渡月照故宫花滿衣往事只須浮白醉髙官或與汗青違何能便逐鴟夷伴湖水煙蓑共釣磯題龍潭驛縈紆壞道瀉鴻湍慘淡輕雲翳逺巒馬渡溪橋松葉暗人穿籬落槿花殘正愁暑氣肩輿晚忽轉江風驛路寒十五年前尚通籍吾衰今去舊長安武塘竹枝詞東風吹緑上垂楊十里朱樓是武塘前輩畫師零落盡何人解寫此風光春晝春晝隂隂正養花東風溪岸弩芹芽秀州樓閣皆堪畫燕子飛飛覔舊家夏墓蕩即夏湖村逺湖深愛此方有鱸即是季鷹鄉秋風入夢未能去空使憂添白髮長劉秀才圭圭字公端號蘭畹海鹽人成化初諸生題竹空谷無人瘦影寒月明時見舞青鸞鷓鴣啼徹黃昏雨猶憶湘妃廟裏看包太守鼎鼎字汝調嘉興人成化戊戌與弟鼐同舉進士授兵部主事升郎中出知池州府為政持大體性恬退年未老乞休蒔花壘石以自適孫節孝俱為御史題漁舟畫逺山落日映漁蓑煙水微茫起浩歌記取扁舟好歸去晚來江上有風波初夏即事滿階槐影日遲遲簾捲南薰景最宜紅杏碧桃都過却如今正是蜀葵時包知縣鼐鼐字汝和鼎弟成化戊戌進士官知縣春日寫懷日長吟罷獨憑闌撫景其如思渺漫歲月無情催髮變雲霄有路致身難鶯啼野樹東風早草緑間階暮雨寒欲約舊時詩酒伴青山隨處且同看陳州同濟濟字以舟號淡菴秀水人皓之子成化丁酉舉人𢎞治間官鄭州同知飲徐孟時宅贈苕溪吳叔禮先生蘭苕花發巳殘春短棹遙臨鴛水濱青眼君能憐座客白頭我已愧山人盡誇詩興間邉得自愛交情淡處真明日起堪分手去青雲無地可相親薑僉事學夔學夔嘉善人成化辛丑進士白頭公歲月堪嗟逐水流人生底處可歸休山禽野性無拘束何事年來也白頭陳推官良良字明遇號廷輔嘉興人成化辛丑進士官司李赴京遇重陽作薄暮江城艤短航孤懷牢落感重陽一尊緑酒愁邉醉三徑黃花夢裏香客路計程紅日近慈闈翹首白雲長遙憐兄弟登髙處獨立西風見鴈行朱靖安祚祚字天錫號拙齋一號雲谷海鹽人成化丙午舉人為尤溪令改靖安有拙齋雲谷集及海鹽志題任景南素軒海濵鶴髮翁朴類隱君子結搆傍林坰蕭然逺塵市軒居固不華窗戶亦清啓虛淨雪月宜淡薄琴書與間驚日似年靜覺心如水真居本自然矯飾徒為爾贈栖真觀道士蘇應玄鈞天清都上帝庭紫微勾陳環太清倐來下界幻化城龍車鶴馭隨鸞軿羽幢翠葆紛霓旌拱衛星斗驅風霆威儀儼肅光晶熒有美鍊師懷至誠星冠霜簡霞衣頳俯伏拜章朝玉京玄天嘉悅錫百朋國祚萬年黎庶寧四海奠安五穀登時暘時雨多休徴百户千門歌太平附考觀在海鹽縣西北五十步宋乾道二年建徐布衣晟晟字公允海鹽人與朱祚齊名大參王公衡延之質漢雋數事稱為徐漢書著有燕石存稿二喬觀書圗金屋銀屏日似年漫抽緗帙並酥肩盈盈秋水嬌相盼不是當初女誡篇馬太守輿輿字文佩秀水人成化丁未進士湖廣漢陽太守挽項大司馬山河正氣竟何其汗簡芳名千古垂足底蒺藜歸漢日胸中介胄定秦時平沙碧草空殘壘古木黃鸝有舊祠頭白書生雙劒在參從無地有餘悲朱左相綬綬字文佩號西谷秀水人成化丁未進士授檢討侍岐王講讀王就邸閹宦専擅綬疏論之自是政屬輔臣著為典尋遷楚藩左相轉晉藩王年耄世子世孫俱薨有欲竊柄者幽王曾孫於别宫綬密疏云有王曾孫在乃得封著有清溪草題畫飢鴈相呼落暮田柔楊裊裊拂鳴舷晚來乘興疾歸去衝破橫塘十里煙陳秀才鼎鼎字邦器號藝窗濟之子文學著有大竹集西巖為徐孟時賦愛山不費買山資寄迹煙霞趣自宜一徑苔香粘屐齒半窗嵐氣濕琴絲松間枕簟知秋蚤竹裏簾櫳得月遲他日宦成功業著毋忘泉石舊襟期姚序班旬旬字用宣號可行綬之子太學生善楷書成化初以冠帶舍人直仁夀殿寫書書成授鴻臚寺序班著有觀頤稿吳中還舟密雨梢林竹顛風約岸花扁舟移北渚孤枕夢南華宿靄迷髙嶺洪濤弄淺沙昏鐘僧寺逺春塢酒旗斜世路紛如織吾生信有涯計程幾二百明發可還家秋夜水檻平添一尺波前溪坐見沒殘荷晚來雨過聞絡緯只有豆花棚上多湯布衣文文字公著號半村嘉興人成𢎞間布衣其先有戍營州者至是應勾補有司以文眇攝其弟質行文曰家任長吾不當其艱而纍吾弟遂偕質往授徒京師資以娶乃歸其友愛如此博學善詩姚侍御吕太常為倡和友晚好與方外交相傳遇仙人冷啓敬授以黃白術年九十有七預為旌銘口占數詩而卒有遺集藏於家秋日追次髙太史江居寫懷韻生涯抱拙為詩窮十載行藏半似翁翠濕苔痕階面水香生蘋末渡頭風催科吏去門方靜問字船來酒不空目斷天涯人更逺滿懷離思暮雲中中秋待月次包藎之韻廣庭坐久月華寒露下蓮塘浥翠盤泛渚有人曾擊楫登樓無客不慿闌笑談此夕成清賞歌舞當年憶舊歡萬古一輪長自好浮生能得幾回看徐通判春春字孟時號西巖嘉興人成化間以貢授通判陳濟父子俱有和徐孟時詩釣魚圗去鳥沒長天疏林帶殘照為問江心人如何未收釣姚布衣翼翼字廷輔號桂巖嘉善人綸之孫成化間人春夜曲金鴉無光蟾欲生十二小簾花影橫銀缸火底玉蟲落瑤笙曲裏青鸞鳴寶鴨灰紅水沈爇侍兒笑脫羅裙褶鞦韆庭院靜無人杜鵑枝上猶啼血遊胥山伍員埋玉地千載閟煙霞草緑藏殘碣泉香潄落花海天歸老鶴林木怨啼鴉飛屩凌髙頂愁雲入望賖九日登瓶山瓶山髙頂即龍山九日登臨霄漢間雲掩夕陽孤鳥沒天連秋水一鷗間詞賡白苧誇才贍帽插黃花愧鬢班諸子同逰況同道十千沽酒不須慳李訓導質質字元粹號月澗成化間郡庠生以貢授訓導題鷺鷥荷葉扇幾行玉立向彤庭環珮鏘鏘沐寵榮誰念滄洲有遺逸敗荷殘照不勝情王省祭茂茂字廷槐號雲松省祭官里居未詳觀駕出金輿遊幸出鑾坡仙仗追隨逐隊過復見湯仁三面網重聞舜德九功歌平原飛走來麟鳯宿衛森嚴駐甲戈盡道此時承輦路寒威應得變陽和周同知澤澤字天雨嘉善人好學有才思為文清婉詩不多作成化癸卯解元𢎞治庚戌進士官贛州同知弔梅道人墓古墓稜嶒卧斷碑白楊髙樹呌寒鴟間雲終日自來去不見梅花老畫師慈節堂詩抱孤泣對韓符篇緑窗破鏡不再圓母道婦道兩無愧古人今人誰可肩夕陽照影寒竹倚凍雪滿面長松堅我亦綵衣慈侍下援筆欲賦心茫然附考嘉善浦潤妻朱氏有慈節堂陳賢良祠曉叱長鬚逺駕船白牛涇上弔先賢清風自喜傳碑記寒食誰能掃墓田直節一時金石貴芳名千古日星懸當時若使從公議不聽天津呌杜鵑宗教授升升字景昭號介菴教授里居未詳恱清自分平生不外求欲將身世學巢由中天月到孤窗夕六月水涵萬壑秋庭草不除周子宅采薇甘卧首陽丘青雲回首多豪舉爭似林泉樂最優潘實實字以誠平湖人凝翠軒小洞幽深日到難蒼蒼煙景隔林看一簾晴翠四時雨半榻涼隂六月寒清晝有時還下鶴碧雲無處不棲鸞莫隨羣卉秋搖落留取青青護石壇題王孤雲畫蜻蜓詩不隨沙鳥度涼風欵欵孤飛過舊宫十里湖山依舊在野蓮無主向誰紅范俊俊字廷秀號菊鄰以下十七人邑里無考詩見英華皆朱翰同時人也題明皇幸蜀圗五王衾枕冷於氷日晏妖環睡不醒贏得愁雲迷劒閣空歌一曲雨淋鈴范睿睿字致和號友蘭俊之弟夏日即事晚涼無事愛間行白苧衣單步􅓏輕佇看一羣兒女戲蜀葵花下捉蜻蜓陳佐佐字邦贊號梅南宫怨幾回飛夢到昭陽夢斷依然隔渺茫起立蒼苔羅襪冷玉階昨夜有微霜陸阜阜字文厚贈范鍊師琳宫瀟灑勝蓬瀛此日重來感物情石徑雨餘蒼蘚合洞門春盡白雲生坐臨淺水鷗相狎行傍空岩鶴自迎却羡步虛壇上月夜深猶弄紫簫聲胡奎奎字文輝號質庵栁枝詞緑楊掩映赤闌橋蘸水含煙著意嬌一自吳王歌舞散東風誰更惜長條周瑾瑾字汝成感懷紫燕營泥巢已成栁花入簾江雨清抱書卧病不出户空好一春花滿城季璠璠字廷用號櫟庵無題緑紗窗薄怕朝東病骨難禁栁絮風幾日不來花下立春光啼盡鳥聲中朱彰彰字有常號琴軒賦得鳥啼人不見花落樹猶香為有尋山癖行行入翠微徑深啼鳥緩風定落花稀濕蘚香黏屐晴嵐暗上衣自然幽興愜吟賞暮忘歸暮秋偶成老去逢秋鬢已霜石田茅屋半荒涼商聲一曲人誰聽疏雨南山豆葉黃朱善善字師舜號淑齋送袁方伯舜舉之雲南綵旌飛命出金臺緑鬢爭推天下才南國只今思召伯甘棠一樹待君開馮騮騮字宗德號松雲虹月舟為張廷翰賦牙籖玉軸載書牀短棹夷猶一水長盡説江湖多樂事風流不獨米元章顧瓊瓊字文玉號惜隂髙彥顒思親堂秋風隴樹悲聲切夜雨燈窗淚眼昏莫問他年三釜志一間茆屋老江村丁銖銖字謹衡號慕松水村欲避城南車馬喧幽懷日日傍江村清風入竹斜分徑新水浮花直到門豈為硯田知稼穡每從詩社醉雞豚東風緑遍池塘草誰道相看是夢魂夏升升字旭之送僧住開化寺浮雲去住本無蹤又報談玄過九峯卓錫定臨湖上寺散花初度講時鐘春臺窺食多馴鳥夜榻聽經有毒龍愧我迷途尚淪落幾時蓮社得相從沈節節字秉中號一間送兄仲陽會試匹馬蕭蕭上紫宸十年霄漢志應伸却憐明日重陽酒沈醉西風少一人郁能能字良臣次陸文厚寫懷韻寄胡以貴人生聚散若浮萍惆悵難為别後情旅館夜燈愁獨對池塘春草夢難成九重霄漢心同在千里關山月其明莫向東風怨流落青袍端不誤儒生沈詠送姚僉憲之廣東路入三江仙棹逺雲開五嶺瘴煙微宦逰正是承平日坐看蠻花落繡衣周軏題畫白蓮社散夕陽收山掩重關樹掩樓迢遞不辭行去逺候歸人在碧溪頭石田生朱翰翰字漢翔號石田生嘉興人成化間學究好吟詠工唐體嘗取洪永以來一郡諸家之詩詮次成集附以已作曰檇李英華惜其搜羅不廣去取未當至同時諸公鄙俚蕪穢亦多厠入集中然用心良苦有功先哲為不可泯若無此刻則我郡成𢎞以前皆作無字碑矣石倉等編都從此選録豫亦得其什一之助云和靖觀梅圖黃雲貼天天不髙萬里一色迷江郊朔風向晚吹不散紛紛變作瑤花飄瑤花飄飄寒氣重萬木槎牙盡僵凍梅花何事得春先獨放寒香暗浮動孤山老翁何灑然對此梅花經草年等間不肯入城去詩名往往人間傳人間傳名名已好化去喜無封禪草當時朝士葬西湖至今羞見孤山老賦得淮隂懷古送朱元魯淮隂城郭枕江濵風景蕭條易慘神漂母溪前猶有路假王祠下已無人空聞笛奏鄰家月誰復歌殘野水春君去若為重弔古且須沽酒薦青蘋桃源圗流水溪頭路迢迢是去津毋將洞中事説與世間人送包山馬世用逰楚鯉魚風急布帆輕酒盡離亭思不勝明月幾時經漢口好山何處是巴陵擬勞鄉信憑秋鴈誰與篷窗坐夜燈會悟未期滄海逺曲闌從此為君憑檇李詩繫卷十
