衣向人哭自言數世居南村紡績為生治杼軸去歲田荒稼不登一春八口無饘粥今年官稅急難供東西呌號驚里族𨽻胥門外呼一聲雞犬倉皇上牆屋小兒聞之走牀下老人見之徒側目向前哀告且莫嗔朝來女兒還枵腹本欲留君無一錢脫粟不能况酒肉白頭老翁筋力衰此去何堪受鞭撲願鬻此女為人奴老人幸免捐溝瀆託身無過錢千貫待價豈期珠百斛提籠採桑憶昔時短髮未許施膏沐歎息此夜朱門深老父不知何處宿高堂置酒歌者誰華筵夜半鳴絲竹閉戶那得聞呻吟多少離魂依草木爪牙之吏虎而冠讞獄未終問錢榖孤村茅舍煙火稀深山曠野虛樵牧里中健兒從征徭三年不歸如逐鹿太平天子昔何時稻粱初肥春酒熟好雨既至農桑間五月蠶繭成衣服于今十室九已空弱者死亡強者戮吁嗟乎此生已矣勿復言吾將歸去青山飯黃犢送敬可之金溪銅井山回昭武城金溪水落贑江清十年短褐渾無恙萬里長風在此行客邸浮瓜應共醉官衙借箸早相迎麻姑壇下逢仙侣試與狂夫説姓名暮春遣興時節催人到白頭蘭亭禊事好重修世情可信門前雀物理無疑海上鷗岐路不勝楊子泣高天尚厪杞人憂緑陰漁市傾壺醉莽莽乾坤一釣舟贈錢三聽雨空堂一酒尊黯然何地不銷魂看人虎步爭當路老我牛衣獨閉門採藥山中新隱士射潮江上舊王孫燒燈夜半聞高咏故國風流此尚存題畫江村無事一漁翁閲盡風波意不窮今日也因魚稅苦持竿逃入畫圖中張進士嘉瑹嘉瑹字文須號搢葵吳江人徙居桐鄉青鎮順治辛丑進士候選推官未仕卒同赤溟表兄過檗持兄齋看菊相携訪菊每淹留看到高齋興倍幽君亞淵明能嘯傲我慙平子賦離愁一簾傲骨爭為傑四座清芬况是秋漫説東籬多異種依然花縣舊風流徐秀才震亨震亨字東敷號乾一受知於學使黎元寬年十八補弟子員後築室青鎮芙蓉浦顔曰溪南草堂著書十餘種有聲最齋集西溪雜咏長林銷夏密印八景之一晞髮行吟日正長桐花落盡又新篁雨餘絶勝探林屋風散渾疑倚石牀空翠飛來衣欲溼緑雲移處屐生香扶笻老衲盤根坐聽到黃鸝晚更涼曹封君爾坊爾坊字子間嘉善人勳仲子髫年應試宿儒不能及太史劉正宗胡世安皆稱江左曹生工詩兼善繪事子鑑倫康熙己未進士官翰林題東干小普陀佛閣曲曲回廊映栁閣探幽幾度到香臺九峰晴黛橫窗出三泖春波拍岸來深澗黑腥魚噴藻遙堤青溼鷺行苔詩成不盡登臨興題壁慚非工部才邵學使延齡延齡字大年號靜山平湖人順治辛丑進士由中書歷升部郎督學江右所取多知名士歸里卒有耐軒全藳東海有迂儒用持國韻東海有迂儒日坐詩書側自誇識之無鑽研似蠧蝕埋頭目光短几案塵弗拭沉思茍有會或歌或嘆息敢謂性稟愚難忘祖宗德詩書本舊疇竊窺聖賢域所居雖海澨頗稱冠裳邑甲第鬱相望近頗推名國使非真有得冠裳亦羽飾所以三十年朝夕常歉灰縱能明大意健忘非鐫勒苦無師友資落筆鮮竒特興到輒一鳴素紙染其墨上下千百年柔腕乏筋力流覽鼎彜文矗矗圭璋植學古乃有獲從繩則木直稍稍髣佛之古人渺難迹有志恨不逮撫膺徒愾惜如彼寫倣童未能端點畫何時窺藩籬一一辨白黑摶沙不聚黏畫餅難充食援筆不肯停徒為人譏忒終以古人師今人未可式如入寶藏中珠璣紛紜積隻手自選攜蛟龍不敢擊况為師儒官詩書固其職南面操鑑衡進退動千百自非規矩精遂令衆匠惑子史為旁枝六經為根極勉旃勿敢渝寸心明得失讀康節公集偶賦午會於今晷未斜先賢皇極世爭誇空中樓閣非忘物書裏漁樵自一家易契先天理有數詩傳後葉正還葩天根月窟由人悟且坐春風看好花題沈南疑紫茜村莊圖用茶星韻欲避風塵丘壑宜竹窗桐屋每相期鳥啼花發尋賢主酒滿茶清趁好時鄰寺月明㩦伴早緑溪舟小過橋遲南園北陌空惆悵記取村莊紫茜詩吳給事源起源起字凖菴嘉興人鑄子順治辛丑進士官禮科給事和江觀察在湄原韻之二喚得輕舟泛日斜滿湖煙雨目重遮有亭佇想當年鶴無路追尋處士花遺迹半銷名尚在登臨已遍興還賖與君再向勾留處百尺樓頭數暮鴉濮布衣淙淙字淡軒號贊夫桐鄉濮院人賣絲於吳市順治初室遇火身入煙焰中扶二親以出耽詩好友有半間樓浣雪居月巢蘧園諸刻嶺南人多購之同靜菴步山塘遠客間無事來過野店家一春三月酒七里半塘花梵閣銜斜照溪雲結晚霞過橋新栁暗煙羃釣魚槎過瓢隱探愚公未回别疑經歲久荏苒一春過但恐間時少還憐去日多門開蛛脫網簾捲燕投窩試看莓苔色青青厚幾何魏秀才允桓允桓字虎臣允枚弟補邑庠生事母至孝工文早世門人私諡孝莊病馬病骨崚嶒苦不支小時亦想效驅馳曾無伯氏才空老縱有蒒翁遇已遲嚴策怕增新慉結橫行羞露舊權竒寄聲好謝蘭池伴此日驕嘶更向誰陸教諭瀹原瀹原字嗣暢號岫丹平湖人少有文譽晚年教諭臨安被放宦途寵辱未須驚歸去南山尚足耕眼底誰青與誰白胸中無我并無卿柴門候月惟搜句竹徑迎風獨舉觥栩栩北窗高卧穩折腰久已薄時名嚴舍人臨臨字覽民秀水人勳之弟貢入國子監康熙甲辰考授中書舍人卒于官送張牖如南歸并訊同學諸子君向金臺好上書翻然南去更何如定知詞賦應陪輦懶託文儒漫曳裾秋雨鄉關隨早雁江程甘旨及鱸魚吳門老友恆相憶不見瑶華一問余朱秀才茂晭茂晭字子蓉號東溪秀水人陶情詩歌專學太白有鏡雲亭集古風孟冬朔風興橘柚落華實凌晨閲場圃穡事已粗畢役車其可休何以嗣我日雲中下鴻雁牀下語蟋蟀黃花既已凋田雀去何疾人生無百年上壽寧可必子有羅裳衣曷不日鼓瑟於潛舟行抵桐江浮溪始安行登山止凌緬鬱紆倦攀陟清曠縱遊衍目對川禽飛耳接迅湍轉回峰沓屢迷連煙晦莫辨夕玩淹水宿晨興愛沙飯已入桐廬溪復歷富春峴雙臺峙中江一竿垂日晚空波澄浩渺春雲淡舒卷但乘逸興多詎覺古人逺南湖醉歌呈薑給事埰及諸同座湖南美景白日徂相呼共泛城南湖湖中酒客十四五縱飲不數髙陽徒吳門諸宋最年少劇狂謔浪任與俞金陵余懷擅詞曲陸生君暘播絲竹轉憶當時度曲人停歌宛轉思相續世事浮雲何足奇興亡大略薑公知屈指間關凡幾載滿目風塵傷别離斗酒重逢共南國諸公何在觴今夕陳孟聲傳已破家魯朱本是偏憐客壯士沉吟空嘆嗟萍浮浪梗隨天涯尊前有酒且盡醉城頭黯淡悲鳴笳登蕭山驛樓驛路青雲暮山城逈足愁江流衝絶壁石勢起危樓襟帶分吳甸風煙繞越州不堪憑眺意揮涕下孤舟白門栁詞上馬與君别下馬與君酒欲知春淺深請看白門栁東溪歌錦鳥迷沙日花飛一水香采蓮聲欲斷愁殺淥川長水色明晴晝江花憶去年前溪好風月未可即回船曹布衣鑑徴鑑徴字徴之號雲客嘉善人貌寢偏眇不修飾家有瘠田數畦嘗不得粟羞與富貴遊所交必奇士與南粵朱斐北平韓畕善日為詩文見忌流俗門有橡樹中庭有紅杏多咏其側偶移石廢二指由是病狂不幘不履行于市數年遂死其集曰紅藥園白石樓皆軼無存者再訪賡上李花初白杏花紅楊栁千條拂面風野店酒旗寒雨外江村漁艇夕陽中地經門巷芳籬熟節近蠶桑春箔同且喜芊綿青草路竹窗書墅往來通得魏子存舅氏蜀中書西蜀東吳萬里餘那堪薄宦久離居舅甥忽憶三年别鄉國初逢一紙書明月啼猿巫峽逈秋風落木錦江虛何緣得貰郫筒酒好問雲安丙穴魚隴頭水隴水流離下隴山髙接天似憐征戍苦嗚咽向秦川栁村處士沈湛湛字淵伯世居嘉善斜塘蓋桐村舊居也為諸生豪邁尚氣與俗抵牾好談兵事論兵法性卞急歡則頭攢耳摩怒則面赤發叱然好交遊不忘故舊其讀書論文最嗜班馬與鍾談詩不喜閲文選尤痛詆李于鱗集後依人入閩刻閩遊草以槖金買田居有五栁遂以名村冉冉將七十耕硯為娛老計時畫墨竹人多寶之評者謂其詩崢泓蒼健善為悽惋之詞浦城客署題流觴曲水圖誰將曲水圖挂向丹山驛約略文衡山氣韻儘超軼潺湲如有聲懸溜注溪澀疏松籠崖長修竹叢巖密昨過漁梁山髣佛圖可憶碧雲互紛糾溟濛渺難測飲者多達人千觴浮澗出酒壚置修坡琴書繞其側或飲或坐起俯仰兼語默隱隱蘭亭裏研墨寫詩帙自有丘壑風飄飄露狂色不知傳舍中何事留此筆似告宦遊人勞勞未如逸晉人豈嗜酒此意醒者得憂歡石夏公曾駐節勝迹在河干此地安溝洫當年怨暑寒溪痕移上下心事别憂歡舊石留官守沉吟仔細看附考永樂二年吳浙大水夏忠靖公立石嘉善福源宫前測水消長鄉人言公自寓先憂後樂之意故名石長七尺有竒蓋樹石測水亦宋舊制也漁梁道中山勢迂回梯磴勞漁梁寂寂瀉秋濤蒼藤古壁飄猿影寒日空山落雁毛自有清音來石澗誰將茅屋結東臯寄言峽裏山翁道我亦從來本慕陶題血子樹小引曉上五顯嶺小憩佛庵仰見奇樹修枝偉幹髙十丈許葉葳蕤有光翦翦如勾剔畫紅實疏布比朱櫻差小而色殷如血僧人謂此血子樹不華而實味絶甘山中無二豫絶愛之賦此志異靈山少凡木指顧一停車應入流沙志希傳種樹書孤撑隨壁迥百尺入雲疏積翠披堪畫流甘釀可茹連珠垂結晚紅露著條初龍眼圓嫌大朱櫻色不如珍奇無别種獨映羽人居題周阿香墓阿香辦一死死乃全其生萬古貞魂在松風吼瀑聲附考烈婦嘉善計明妻正德庚午嵗飢夫與姑議鬻之不從數被箠楚赴水死曹秀才禎驥禎驥字觀機谷子有握蘭軒草小村即事寂寂空林去未回孤飛一雁獨徘徊移舟入浦分流水橫笛當風碎落梅殘樹花邊新出笋野蘿梢上舊成苔醉漁野外知何意歌笑方停月已來周宏藻宏藻字丙仲嘉善人短歌行江湖流日下魚鱉趨雷同力拔水騰上逆之者為龍龍生族亦孤繁多不如蟲異行非衆好獨處勢益崇吐納萬里氣縱橫天地空不為世人怪安得雲霧從塞下曲草盡蒼鷹疾平沙獵騎過紇干山月上蒲類海雲多漢苑歸龍種秦關息鳳戈軍中方宴樂處處起鐃歌送宫人入道才服黃冠换舞裳朦朧何處辨昭陽朝迎神女聞瑤珮夕向元君受玉章顔駐不緣雲母液丹成無藉鬱金香林間鸚鵡曾相識猶説當年侍上皇玉樹後庭花玉樹新聲斷深宫青草生可憐揚子月猶照石頭城沈之灝之灝字希道號達蒼桐鄉人節烈嚴姬行姬為戍上諸生徐浤之妾浤死無嗣內君丁孺人在室姬黽勉匍匐左右之未幾丁亦亡出篋中裝以襄葬事葬畢嘔血斗餘遂死嗟乎姬之死可以風矣為作嚴姬行石家有緑珠樓頭報主捐其軀喬家有碧玉井底投骸主不辱兩媛千古名字香誰云婢妾無肝腸嚴姬嚴姬松柏姿霜凌雪虐赤手支翁亡旋侍白頭媪晨炊宵績容顔稿翁媪兩喪相繼遭買山負土雙墳髙無須𠢐面并截耳願得從容就一死一死了却婢子心寸心不易千黃金君不見鬚眉中有妾婦身錦衣玉食隨後塵暮楚寵兮朝秦臣嗚呼暮楚寵兮朝秦臣安得遺臭之骨留芳芬鸕鷀行霖雨既過村溪渾溪渾且深魚蝦屯老漁不用網罟施持竿拍拍驅鸕鷀漁驅鸕鷀鷀驅魚大魚小魚觸頞趨浪捲波翻看血戰俄頃獻俘來水面鳴呼魚乎誠何辜脫網又遭兹剪屠鸕鷀盍不糊爾口飼爾雛乃為老漁之韓盧吾將膾鸕鷀于刀炮鸕鷀于釡雜魚鮮以為脯夫安知魚鮮之美堪上筵鸕鷀肌肉腥臊難置爼徐之陵之陵字子京嘉善人遠子雨雪曲大漠雪霏微同雲凍不飛玉城翻落月珠樹帶斜暉古戍烽煙斷平原獵騎歸最憐翠袖薄猶是寄寒衣送康小范上若兩世執歸江右霜滿高城夜漏稀那堪臨水送將歸天涯短褐逢初霽江上孤帆帶落暉路近匡廬秋欲暮舟回彭蠡雁同飛放歌且盡樽中酒明發西風振客衣張辰辰字北是嘉善人與兄鶴書齊名邑中有二張之目贈亭彥椅梧蔭百尺翽鳯鳴高枝下有緑蘿草攀援同兔絲結交常相因金石貴不移顧我蓬室士同心賁光儀相與崇明德皓首良可期深情發壯采嘉會及芳時願附雲中鳯千里或差池檇李詩繫卷二十六
