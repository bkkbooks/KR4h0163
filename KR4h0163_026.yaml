body:
  text: 檇李詩繫卷二十六平湖沈季友編國朝南溪學士曹爾堪爾堪字子顧號顧菴嘉善人勳之長子順治壬辰進士選庶吉士兩冠閣試授編修扈從瀛臺南苑世祖褒問諭令與吳偉業同注唐詩丁艱起補轉侍讀旋升侍講學士轉盼三擢異數也性強記諸瑣屑事能舉其原委人一見輒不忘若輿圗要害山川形勢指畫􅊏悉聽者神竦當世以大用期之無何詿誤鐫級尋罷官歸而優遊田園皆二三老友選勝賦詩間為逺遊篇什益富為詩清灑可諷與宋荔裳施愚山沈繹堂王阮亭王西樵汪苕文程周量諸公稱海內八家有南溪集題霜菊卷江南蕅塘涸黑泥埋刺菱芙蓉褪殘靨蒲萄縛亂藤亭亭古松蓋歲暮堪作朋晚花晚唐詩許渾與薛能古銀槎歌贈荔裳長安伏日赤如火曲檻虛亭門不鎖宋公召我園林遊河朔氷盤浸瓜果山雨忽收賔客至出示酒鎗異恆製枯槎怪石坐神仙周彜漢卣應無二元季巧匠朱碧山市隱臯橋稱絶藝倪黃山水吳興書幾與古人爭位置羣賢驚詫手摩挲神刀鬼斧曾琢磨西郵好貯葡萄酒南海空矜鸚鵡螺至正年間遭殺僇野火燒天煙萬斛內府珍裘裂雉頭舊家寶瑟焚蛇腹獨此古物在人間感慨乾坤同轉轂祕器偕藏埒球貝波斯問價昻珠玉三百年來貴有徴請檢陶家輟耕録亟呼從者傾郫筒恢拓智勇開心胸為慶遭逢落公手瓷碗况出隗囂宫兩美相兼且觴月干將莫邪亦神物枕蛇騎虎安足愁讀罷長歌歎竒絶宋公本是神仙才文筆不役人間來何妨跳入銀槎裏御風萬里遊蓬萊鄴城引清漳濁漳注城外城上愁雲大如蓋高臺峩峩生暗塵白楊蕭蕭起天籟君不見鄴中全盛時玳瑁樓前珠箔垂南皮沉李公子醉西園樹葆美人隨建安黃初一朝變千載繁華等流電紫狐夜嘯甄氏宫緑草霜凋武皇殿秋風客思真悲哉道傍疑冢空蒿萊月明繞樹烏三匝猶逐當年銅雀來滄海行滄海晝驚街市空人家大屋火熖紅逆渠奮臂在倉卒屠戮命吏如寒蟲君不見嚴裝夜走沂山腳膠州金錢恣充槖回鞭立破睢寧城浮橋徑渡宿遷郭沸鼎魚遊何所逃徑兵壓陳如鴻毛黃河日落鼓聲絶鯨鯢血赤腥弓刀擒魁方略制俄頃膚功壯氣青天高可知縛虎勢宜亟追奔月沒轅門黑俘馘多歸淮海營勾連自絶湖南賊深山羣盜逋天誅招徠解散今有無後事經營貴全勝聞有逃兵在襄鄧韓聖秋過訪奉柬兼懷束雲雛劉潤生客過門猶靜堂空語自深故人同雨雪竒士獨山林樹沒秦州逺天低少華陰好音何日慰憶爾對牀吟廣陵懷古何須故老話興亡兵後繁華事渺茫𨝍水曲流通汝漢蕪城衰草恨齊梁客尋芳榭驚歌斷馬過朱欄識酒香不盡淚䀶傷往迹野桃紅雨溼雷塘春晚柬屆甫寅仲緑暗池塘春事稀酴醿染紫木香肥銀紗薄映蜻蜓翅宫粉才銷蛺蝶衣梁燕去隨紅雨落沙鷗輕逐白雲飛江干何處添詩興芍藥花船泊釣磯寒食春墅糢糊曉雨漫霏霏寒食江村客正歸杏酪分香茶竈冷麥餳膠齒柘煙微春塘燕子愁相並江店桃花溼更飛如辦玄真青篛笠茜溪東下鱖魚肥無題和王阮亭祠部彭駿孫進士翡翠粧殘睡起遲鴨爐香縷尉相思念珠愛數紅蕉子銀甲愁牽白藕絲綺閣漫矜三婦艷錦衾惟許一人知傷心舊約金尊散寒食啼鵑細雨時元城竹枝詞南方佳果勝侯鯖丹橘黃柑膾緑橙寒夜更添滋味美紅泥鮮筍到臨清衛源竹枝詞舊藩宫殿已荒丘玉蝀橋空水自流百尺觚稜餘碧瓦行人遙見望京樓金陵竹枝詞高館笙歌樺燭紅幾年飄泊各西東秦川公子黃金盡種菜猶栖舊院中天棘條侵舊殿斜秋蟲交語野棠花射生獵盡銀牌鹿誰向鍾山采木瓜李布衣麟友麟友字振公號于苑嘉興梅里布衣贈衣行梅溪野士嘗衣褐冬亦不加夏不脫已經寒暑六七年領緣不完襟百結沈郎敦友無親疏贈我匹練五丈餘製以為衣見賔客舉止覺與常時殊鄉人重衣不重德談笑從今壯顔色登審山有懷周篔沈進諸子長水通梅里橫山近硤川登臨猶可見惜别已經年葉落清秋樹鴻飛薄暮天故人無恙否却望一凄然張太守茁茁字文葭號靜巖嘉善人順治壬辰進士授刑部主事轉禮部厯襄典禮賜金綺廄馬擢知安慶治郡嚴肅上官心折焉有學心堂詩鈔盆柏徑質凌寒雪蒼枝映碧苔才成方寸木已具棟梁材邵窩老人莊孩思孩思字汝揚晚號邵窩老人秀水庠生莊氏自友仁暨孩思三世皆壽踰八帙舉鄉飲賔故人沈雲如暴露年久其子孤而貧為買地營葬里人欽其高誼有邵窩詩略貧子吟故人之子凄以其捉襟露肘衣離披居無四壁蓬為戶瓶空纍日火不炊妻兒委頓飢欲死嗷嗷僵仆誰能支羞將此語告戚屬幾番擬賦招魂詩吁嗟一歌歌聲涼所知曾無升斗移憶昔我友重意氣千金一諾如等夷此道依稀還在人何為今人不古期米如珠兮薪如桂吁嗟再歌歌益悲優孟衣冠學不得何時慰却地下叔敖知送堂主自參十八高賢社何人推道安白蓮開未謝溪水夜潺湲虞美人花放戲拈一絶美人歌罷成黃土今日花開花自舞不信當年泣數行但看曉落猩紅雨偶吟世緣生熟意何分斷壁懸崖總不羣獨有秋空雲外月萬川一樣在波紋錢進士棐棐字子輔嘉善人八嵗賦白燕詩順治壬辰登進士築託園以老張麗華臨粧池佳人惜影厭青銅粧罷獨來臨水整回波兩兩自相憐流入脂香雜絲荇敵兵壓寢碎紅顔鴛鴦乍死清波冷嬌面風來影已枯一片寒煙縈斷梗亡陳豈獨色所為泉咽聲聲怨髙熲君聲玉樹聲未銷馬上已歌清夜永過貢士銘盤銘盤字伯新平湖人京兆廷訓長子少以才筆知名貢入南雍父殁叩闕得贈恤之典年七十九卒宿望海樓月高長嘯醉樓中微掠朱闌海面風夜半天妃鸞馭去射波千點小燈紅附考樓在平湖乍浦苦竹山上海靣靜夜紅燈數千飛躍不定土人云此天妃夜巡也徐秀才啓芳啓芳字梅生海鹽人有竹塢集晚霽野遊長嘯天何濶間遊眼獨明殘霞鳥外落斜日雨邊生不學妻梅隱徒深脫劒情那堪羈旅客向晚聽秋聲嵖岈外史沈棻府君諱棻字子佩號藕菴平湖人順治辛卯年二十六舉於鄉壬辰成進士性英爽喜交遊率任本懷不為隨俗軟美之態遇里中纎兒輒嫚罵好窮治酒饌選妓徵歌座客常滿遇友人患難貧乏傾身濟之時三吳多文酒之會府君青衫白襪吐音如鐘拂袖作梁父吟覺一座無人乙未對策後又七年授河南西平令土荒民散府君招流亡給牛種諭以歲豐取償免其息民襁負至墾荒數百頃又許以布粟代稅即束麻擔草亦瑣細不憚煩歲募河夫多逋逃患乃按貧户充役民喜得食且以償稅率爭先赴工工易竣邑衝差徭不時豪強隱蔽多偏纍乃按户均點一年止役一日歲有餘夫甲辰飛蝗遍野獨不入西平境士民建祠北郊邑有山曰嵖岈因號嵖岈外史府君居官後益復好學于衙舍隙地手植垂栁數株構草堂於緑陰之間與幕中文士乘小駟遊汝墳長林幽寂竟日吟嘯雖山農牧豎無不熙然于令君之側治聲為中州第一顧天性峭直遇事強項不為屈羈俸十餘年向善病至是益甚卒于官年四十七有柏亭稿二十年來孤兒抱痛敬登遺句涕泗從之矣男季友謹述桞梢行黃河春響走怒濤桃花滚滚飛晴郊軍符如火下州縣河夫隊隊解桞梢前年一決孟津後今年又潰成臯口可憐河上小民家千村萬落無人守白骨離離棄北邙青秧拂拂沈南畝洛陽諸邑起千夫挽軸牽輪吏夜呼裝成萬束青青樹去築河堤急上途傷心九曲真靈府駭浪何為禍兹土刻玉懸勞堯帝心沈茭難制馮夷舞古道荒涼緑影空滿堤無復舊春風明年古桞重飛翠淚落殘條剩葉中大梁冷雪如鹽衝繡帽漫漫直走夷門道馬背春寒望眼長花城一抹古大梁山帶橫腰殘靄白河聲出口怒濤黃吾思昔日魏公子結客翩翩到街市十萬秦兵夜叩關錦袍壯士因誰死更聞好士梁孝王座中翰墨生古香兔園花草平臺雪詞客紛紛各擅場太息髙蹤杳難作長街廣陌春風惡沽酒亭荒翠幔低折腰人笑青衫薄傲吏鞭絲怕軟塵那􅍆憔悴過三春斜陽終古消魂事汴水飛花亂撲人汝南道上籃輿來去日愁向積陰繁橋沒多荒徑鷗飛失故灘秋因雨易夕水繞俗加寒比戶荒煙裏何人駐馬看季秋偕雲馭田子三兒泛菊劉文學山莊同宴者薛廣文秋林風日好來赴逸人家已對伯倫酒還思陶令花客情緣少長吏語自煙霞更喜薛夫子清樽共物華寒食祝奠先慈何處芳原問傷心南望時由來泉路感重繞白雲思杯薦他鄉酒花開舊日枝惟應歸路近灑淚滴松脂信陽山行本是青山路如何黃綬來途應知馬老花似笑人開郭近千峰斷淮通一水回行行吾欲賦畫角轉相催申陽寧吳二寅長見枉留飲客舍誰相賞還欣二妙逢長歌惟寧子治行有吳公並繫花前馬如聞松下風清宵涼月裏莫使緑樽空送陸藍田同大兒南還因憶藍田尊人吾已倦遊久君行復此來早隨春雁至猶及海榴回客路河橋晚故人鄰笛哀歸途欣並轡終愧阿戎才章遠南歸骨肉誰能問常時獨爾從貧真同落葉賦可泣秋蛩殘月關河路悲風弟妹容思歸我已晚何處有芙蓉㴠輝入都不果送其南還未久便為别知君難遠遊因思張翰鱠不上仲宣樓小雨梁園夢蘆花吳地秋相如詞賦好終是攬皇州送六弟二首未有寧親計因風賴汝歸同懷陸氏橘猶愧老萊衣夜月鴻難聽秋林葉自飛倚門方念遠驅馬莫教違連枝能幾日戀别竟如何客在依花蕚人歸落芰荷秋程風雨易旅夢弟兄多珍重出門意還時且嘯歌皋旭自都訪我因從歸里詩以送之凌雲久已賦今始上金臺為有故園思還從訪戴回客心殘墜葉秋徑老莓苔陶令歸來後寒花更幾開同三兒雪中行汝南道上朔雪晨行集無邊已道周何人茅屋問著處野僧留帶怯東陽瘦寒深稚子愁長年飄絮裏只自愧間鷗酬吳洛陽鴛湖相望地出宰舊西京嘗念吳公守多慙許氏評春田誰雉乳花縣自鶯聲撫字今難問能無同病情三兒歸詩以遣之望汝成歸計汝歸又繫心雖然春草路多恐曉寒侵藥為長年採門須問世深客亭今夜月猶是聽猿吟宿信陽山寺山城知不遠緣暑漫停茵舊寺僧何在征途老易親栁低堪繫馬螢細只依人無事問禪榻浮雲久此身東郊偶步至寶巖寺冬林無勝賞猶欲問原田日靜寒雲裏人衰落葉前依禪還舊寺訪俗少新煙惆悵斜陽裏從今已幾年西平咏古八首柏亭春靄封國貽來久鄉亭望去新風清山郭曉雲度野橋春雞犬遙連楚桑麻宛在秦行車長駐處爭識種花人雲莊雪霽四望白皚皚高風下石臺官橋氷未合汝水凍初回峭壁參天影窮簷負日開自憐能掃雪不向洛陽來周泊漁歌碧水橫梁筍青絲展釣車空村聞棹唱前岸有漁家夜雨流菰葉秋禽起蓼花江湖吾有興何必上仙槎義岡牧笛入世懷良友長貧感素心非時猶韞玉何地好分金細草全披徑斜陽半在林悠悠牛背上短笛是知音龍淵夜月灧瀲棠溪水蒼龍起石磻青蔥蓮葉劒紫氣繞河干利器藏歐冶前朝慶鐡官清光千萬里渺渺向誰看粧臺野雲贈佩天邊杳支磯石上分荒臺銜晚照滿眼散秋雲澗蝶銷紅粉山光掩翠裙孝思如可問吾欲一逢君鄧陂澄波太尉多遺迹中原感廢基當年曾伐蜀此地早開陂迤北平田濶征西返道遲汪汪千頃在為爾更追思郅冢煙樹荒壠迷春草高丘帶夕陽我來時下馬一拜郅君章史志鴻名舊碑銜螭首長蒼茫煙樹裏父老向蒸嘗九日因積雨不赴登高感懷之作搖落頻驚節候催况無霽色可銜杯憂時祗有愁霖唱對景何心九日臺雁向霜前難聽遠花從開後未歸來田家禾黍今何似莫上高城極目哀感署中栁垂來舞袖已蹁躚因憶青青長客邊幾樹籠煙斜月夜半簾臥閣夕陽天歸思久逐陶潛賦老去空懷張緒年今日春城憔悴甚何當蔥蒨日三眠遂平道中當時攬轡已成蕪極目蒿蓬更問途三户殘黎歸業否六條法吏盡心無月髙茅店聞雞少人去荒原斷雁孤亦自勤勤思撫字自慙拙筆未能圖申陽感事荒城已分一枝安何意還驅征馬看本是盛朝新制節猶傳憲府舊旌干停杯客裏知誰問行路人間覺更難多少巢由車下拜青衫幾溼不堪彈信陽寓何翀六書齋幾度停軒舊此亭疏簾清簟夏還經不辭愛竹王猷看遂有新詩水部聽夜色間來惟小樹春風散後自流螢物華是處須當賞煙月何心老客萍渡河子規聲裏走天涯解纜津亭日又斜果爾飛流同水箭剛逢積雨漲桃花平生忠信誰相許身世浮沉自漫嗟便擬維舟貰殘醉荒煙漠漠楚人家九日病阻登高幾逢令節重徘徊病裏間情只緑苔問俗已疏禾黍外寄身合向藥苗栽猶存瘦骨衫香落始過荒亭雁影來楚客今秋思更苦望鄉猶阻舊登臺秋夕病懷葉丹苔碧總佳辰零落秋容自苦辛久分去官同栗里寧知多病老漳濵宵清只聽莎雞泣芳盡空憐蕙草春我已東陽孱瘦甚柴門難緩舊松筠送寧遂平歸養君恩幸許綵衣裁良友于今勞溯洄畫省雖分行雁杳河陽猶奉板輿回家臨晉水魚因出人到春園萱自開我亦庭闈遙在念吳山彌望白雲來送友人南還瀕年薄宦涉風塵又見春回楊栁新何處易銷潘嶽鬢河陽縣裏送歸人庚戍早春有以官梅一枝獻者感其江南舊種浩然有故鄉之思乃援筆漫吟以寄意焉日落孤城走玉塵誰家長笛弄寒頻隴頭一夜東風緊愁殺霜花點鬢人蘂冷枝寒我欲愁折來還向膽瓶留小梅也是傷南客一樣春風説倦遊陸參議光旭光旭字鶴田平湖人順治壬辰進士由保定知縣擢御史言中機宜而議巡方一疏尤侃侃不事囁嚅遷冀南道服闋補江安糧儲道為羽士朱方旦波纍徙謫以終春日同顧雲馭登靈鷲畏折尋山屐春光我負多關河悲戰壘天地老煙蓑鶯咽殘枝雨花寒夕照坡浮雲堪極目何處可狂歌和東坡西臺簡子由韻寄永錫弟黑地沙寒草不春骨肌銷盡伏蒲身題襟空負􅍆生友泣血猶存誓墓人敢冀九卿疏漢法從來三宥出堯神與君未了前塵事夜雨青山續舊因嚴柝森森氣慘凄為看書牘幾眉低風霜斷侣回峰雁形影難棲折肋雞遠塞每傷驢背弟故園何處鹿門妻寒蛩昨夜啼殘月猶夢疏鐘出掖西蔣涇縣雲翼雲翼本名會貞字鳴大嘉善人由府庠中順治甲午舉人任江南涇縣知縣無題粧成十五盡長眉碧玉瓜期未有期新蝶愛花常護粉春蠶獨繭漫抽絲不看湘竹愁仍結即化巫雲夢豈知惆悵臨風無限恨明璫何處解相思甘山居士于琳琳字貞瑕號甘山平湖人嘗承父志述三易得習學九卷廣變四卷象告二卷皆原九圖之意以立言生平好接異人上至天官家言下及地理諸書以至馬杜二氏之學靡不精妙通繪事善行楷若擊劒談兵諸技時亦為之晚年忽盡去其學發梵經大藏俯首沈思疏注楞嚴法華華嚴諸部棲遲精舍纍月不去啖菜飲水居然苦行卒於康熙庚申年八十五有香祖庵草雜詩灼爍健少年匹馬彎強弓橫視藐四海焉念江上翁老翁仰天嘆白日西欲東我昔十七八目亦無飛鴻上馬舞雙槊下馬賦秋風倐忽年嵗移頽然不復雄為我謝少年日月如飛蓬贈鄭兩為備兵西寧南歸里門建牙開府黑山東此日聲名在五戎苜蓿花濃宛馬健蒲萄酒熟戍樓空風髙吐魯驚傳箭雪滿蓬婆競挽弓生入玉門班定逺何人重報月氐功咏夜落金錢花二首深紅點點映重茵開到金錢花轉新夜靜露濃和月落明朝愁殺採花人輕花灼灼葉田田午半平開近綺筵漏永不聞妃子嘆誰家撒得洗兒錢施訓導鋐鋐字公逺平湖人順治壬辰恩貢任義烏訓導奉裁補平陽以母老乞歸居喪哀毁庭産芝草人稱為孝感云望若耶溪苧蘿山下若耶濵越女如花貌勝春一自五湖煙棹去月明江上有荒津和王文老手談韻玉局丁丁興未休隔垣微聽子聲幽金門不召羊玄保聊與松陰解客愁曾舉人畹畹字庭聞寧都人客至之寧夏衛以商籍舉甲午賢書奡兀負竒足迹遍天下初入浙與秀水陳莢交善常至其家康熙甲寅關中孫玄伯守備平湖乍浦挈家口依之居二載徙通州卒歸賦中原飄泊久親老且歸耕井邑無安土山城尚甲兵霜花餘䉀畝風雁走河聲子弟不相識呼童數問名別鴛水陳堯夫世亂誰知我人猶不識君豐城老劒氣越俗總浮雲舊國三春異他鄉一夜分封侯寧有命坐笑李將軍沈教授煌煌字火文嘉善人明季文弊競獵六朝煌昌明程朱之學設席教授負笈者三百餘人學者稱𢎞益先生順治甲午選貢不仕終有𢎞益堂稿國學觀禮聞雅頌辟雍尊首善逖邇利觀光胄教夔初命賔興旦再揚威儀開萬域耳目聳遐方道式先儒重文隨聖代昌上丁期合吹二酉聽翺翔釋菜因周禮歌芹撰魯章一牢傳漢祖亞獻憶唐皇肆俎推前席燔柴降內香朱絃流挾瑟彤管佩循墻振步依庭鵠聞音覿望羊專家求戴聖釋句仰毛萇天子虔蒿柱名臣出柏梁篆分白玉署簾隱紫薇郎振鷺西雍潔鳴鼉東序喤耦三延矍相更五祝膠庠兄在通侯侍師嚴髙弟彰中原無棄植小草總承筐啓綘欣聨鄭解頤爭説匡性情深誨迪氣運奕柔剛虎觀忘同異龍門疇頡頏質疑勤負劒請業敢登堂于邁從公飲陳常遍爾疆候塵應執御濯德詎施觥闕里麟遊近尼山豹蔚長茆澄圓沼碧桂拂閟宫黃稽古桓榮座箋經頴達牀瓊花連散髻羽扇映絲韁階戺紛干戚邉陲靜斧斨聚奎驅野馬倬漢掃貪狼惟有言靡憾誰云讓未遑蕩平知會極作述佐垂裳玖珮偕鵷鸑簫韶集鳳凰金臺倘擁篲石鼓勒星霜寄贈止嶽弟刺史粵東竻竹城邉試錦衣爛柯山下草初肥春風幾夜吹鄉夢徑傍天南一雁飛天啓宫詞二首豹髓燈懸鳷鵲紅鑾輿宴罷帶雕弓敕教繡鐙三千隊共赴西園看射熊內監傳呼謁聖人押班紫袖學稱臣近來喜黜毛延夀天子臨軒自寫真吳仲子蕃昌蕃昌字仲木海鹽人忠節公子居母喪哀毁而卒再經雞山酬開美祝子送子清溪月當時鴻雁歸今嗟芳草發長與古人違雲冷青蠅散林空白鶴飛山陰回首裏同此一沾衣過南郭江道士舊居水漲蓮溪館秋風自掃除野花埋石鼎間月照金書雞犬當時宅蒿萊此日居還山何處是招我白雲車中秋病作病骨秋蓬似迎風欲共飄白雲千里薄黃葉一城搖月滿山庭舊蟲鳴玉露消客誰陳七法空憶曲江潮吳市重逢陸大立頃有贈西風暮雨下滄浪短鬢黃花並有霜一問故人多宿草再來歌地是衰楊平原舊客今誰在伏勝遺經半未亡還取青尊盡疇昔月明重與向山塘吳秀才謙牧謙牧字裒仲海鹽人生蕃昌從弟亦以母喪哀毁卒里人並稱孝子有困勉齋藁谷水歌雲峰九十九蒼翠滿山松借問清秋月先縣第幾峰我登湖上樓湖上秋風發蕩搖湖水光欲墮雲中月王秀才之圻之圻字肇域嘉善人明季稱詩者率宗竟陵之圻力持風格從粵東歸手一卷詩曰嶺橋山水盡在我奚囊中矣其曠達類如此年未強仕而卒有鳴鶴堂稿悲歌道逺不離刺心立談可期白首結交何多以彼富厚今日黃金盡明日猶相知斯人果安在出門欲何之鸜鵒歌涉溪買鸜鵒羣笑王生癡萬里相攜走庾嶺千金不易連城姿一眼五色光催璨山人愛殺爭題詩君不見陽翟賈揚鞭走馬南越逵詡詡陸賈橐中資明珠不售翡翠死何如端州採石兒人生要在有逺識多忮多求徒爾為錢處士鴻鴻字羽可號若菴海鹽人升之子築室宋湖好行其德鄉人私諡貞毅有撫松居集尚胥亭上步月荒亭寂寂倚胥川野曠應知受月先光湧人如天上坐景浮橋似漢中懸珠藏釋底明生夜水並江心味入禪莫道孤忠徒自苦海濵祠墓至今傳附考尚胥有廟有橋在海鹽縣西北十里並其兄尚祀焉越絶云耕於吳之南鄙城即其地旁有望珠亭賁湖秋望賁湖地僻宋村名荻月蘆風秋自生蕭寺僅存方外想野航恰備畫中情繡衣墓頂松猶挺給諫塋前水獨清可但曾孫懷祖澤隱淪多尚話先生附考湖在海鹽縣西三十五里一名宋村湖俗名宋坡湖錢給事彭侍御墓在焉舟行鸕鷀湖萬頃波平緑漲濃祠開黃道正蒙茸占來澤氣常疑雨聽入山風已逗鐘短屐便將尋紫峽輕帆忽復指青松此中好景偏宜夜莫阻遊人月下笻附考在海鹽湖濵有黃道廟隱見峽山西出為青松塘土人云峽山鐘聲至宋湖吕塜間則天必雨張華亭超超字伯升號檗持桐鄉人順治乙未進士華亭令秋夜聞鄰姬鼓瑟露冷梧楸玉杵催誰携寶瑟漫徘徊無心自譜鴛鴦曲有意偏添鸚鵡杯拂拂梁塵飛綺柱離離鳳影落叢臺髙堂夜永清暉遍疑引瀟湘帝子來張醫士逸逸字泰菴嘉善人精岐黃術善撫琴工詩好畫山水有日休堂詩煙雨樓樓外笙歌列畫船湖光春色總堪憐遊心不待壺觴醉寫景難將水墨傳晴浪忽飛千尺雨逺村常帶幾分煙斜陽乍向層城下月色無塵到檻邉何通政元英元英字㽔音秀水人順治乙未進士由行人厯户部郎督理大通橋監通州糧漕弊盡剔以才望選授御史封事甚多皆關大政康熙癸丑視鹽河東內升厯通政參議乞歸生平慷慨急人患難性好客珠履常滿酒鎗簮珥時在質庫中不悔也豫慨當世士大夫嗟卑患貧作自了漢羞與寒士為伍其猥瑣鄙屑之態豈堪令雅人見之如先生者其今之廣陵散乎送楊武部奉使交趾甲帳雲從象郡開日南驚見使星來披誠自有珊瑚樹懷逺猶存馬援臺澤遍雕題蠻獠舞檄傳浪泊鼓鐘回佇看萬里圖王會漢殿真儒諭蜀才陸知州翔華翔華字季沖嘉善人順治乙未進士授鬱林知州再補廣德均有惠政及人竹原過初傳簡張騫已拜侯一叢枝更密千畝節還修樂向玄池春音從嶰谷求離離芳實好只許鳳凰遊周御史宸藻宸藻字端臣號質菴嘉善人順治乙未進士選庶吉士擢御史有直陳漕規𣙜稅等疏視鹺兩淮盡剔諸弊旋遭遷謫認工贖免歸里後與錢龍門孫子毅曹顧菴郁衷恆沈止嶽盛筠齋輩仿耆英會以詩酒為樂有柿葉齋自東客遊諸詩張稚恭中翰招同髙念侣副憲王蘭陔水部湖舫宴集晴湖如練水雲收畫舫相携興自幽幾處柳陰浮緑蟻誰家花影傍朱樓回思聚散憐佳會過眼風華感昔遊搔首斜陽頻悵望乾坤何地是滄洲秋懷憶昔曾看禁苑花恩深寧敢效懷沙病收陶令三秋菊貧賣青門五色瓜丘壑道存惟我輩江湖歸老已無家不堪往事空搔首獨立蒼茫起暮霞春風幾番花信扇微和繡陌紅樓處處過可道玉關偏不度如何吹入柳條多楊知州應標應標字勝林號南城嘉善人順治乙未進士除江南寧國府推官缺奉裁補江南溧陽縣令再知河南鄢陵縣事皆有政聲升雲南劒川知州抵貴陽以病乞歸有永思堂集靜夜吟夜久羣動息秋潭冷素心推求往古事厯厯羅胸襟守貞道所貴回遹衆乃任滔滔江湖流一往不復禁窮巷罕過轍寂寥鳴素琴長松挺孤秀何憂霜雪侵辛酉初春王師將定滇南奉命出守劒川蓼亭陸先生以詩見贈次韻三宰風塵吏恩綸奉逺遷從戎關索嶺解渴水香泉萬里馳邉月孤鴻泣暮煙才非漢司馬白雪愧稱賢東明河上口占重重堤岸繞東明盡是黃金力築城不用防河桑柘滿老農帶月荷鋤耕項侍郎景襄景襄字眉山錢塘人秀水籍順治乙未進士厯官兵部侍郎長安竹枝詞敝裘冉冉帶風輕絮逐官河栁壓城豎子提筐如百舌春來惟有賣花聲題畫間來結得小茅亭但識煙雲月露形厯日不書藤葉紙年年只記栁條青顧艾艾字病已嘉善人送魏廓園公被逮我髮未燥聞公名私淑于時夙仰止寬衣大袖以布為孤耿知為天下士七載孝廉無所資飦粥星星藉臯比進賢冠著才十年危言危行直如矢至今萍梗無定居圖書幾束同轉徙哀哉失守先人廬三遷隨母為鄰里兩家貴賤隔天淵一樣蓬門對