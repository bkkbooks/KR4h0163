body:
  text: 檇李詩繫卷三十一平湖沈季友編明西齊老人梵琦梵琦字楚石小字曇曜象山人姓朱氏出家海鹽天寧永祚寺得法於徑山元叟端和尚元英宗詔令金書藏經聞譙樓鼓聲豁然大悟遍主法席名滿夷夏泰定中住當湖福臻院晚歸天寧築西齊退老明興再被詔徴建法㑹於蔣山琦居第一賜伊蒲供於文樓洪武三年秋召問鬼神之理館於天界寺示微疾書偈曰真性圓明本無生滅木馬夜鳴西方日出書畢而化賜諡佛日普照慧辨禪師宋濂為撰塔銘銘曰大監密㫖餘十傳妙喜起蹴龍象筵有如大將據中堅鐡卒十萬佩櫜鞬或觸之者命髮懸誰歟五世稱象賢佛日曉出瀛海壖紅焰閃閃行中邊流光所至無幽𤣥憶初飛錫來北燕彤樓畫閣金星躔一擊三際皆廓然火中新敷清淨蓮紺色涵空絶蔓牽自茲口噴百丈泉洗滌五濁離腥羶內而諸夏外朝鮮紛紛來者人駕肩示以實相非空言塔廟赫赩名山川一佛能變萬與千會萬歸一道則全不識誣為有漏緣帝敕中使來傳宣鍾山說法超沈綿萬人瞻依曲兩拳一朝入滅同蛻蟬西方彈指即見前白玉樓閣琉璃田金鈴寶樹演真詮師之往矣神弗遷寂光常定無偏圓我作銘詩翠琰鐫昭朗盛業垂年年愚菴及公有悼楚石詩云潦倒奚翁的骨孫髙年說法屢承恩麻鞋直上黃金殿鐵錫時敲白下門煩惱海中垂雨露虛空背上立乾坤秋風唱徹無生曲白牯狸奴亦斷魂錢與善曰曺溪五派臨濟下妙喜遞傳元叟而琦公嗣之有六㑹録流布叢林電坼霜開金聲玉振姚廣孝亦謂琦公於淨業一門至老力行不懈後雲溪宏禪師亦推琦為明宗師第一有淨土和陶諸詩北遊鳳山西齊三集自楚石倡詩教於永祚正嘉隆萬間詩僧輩起吟派之盛於茲為最矣君子交行贈吕日新君不見車輪碾地不碾塵塵暗却遮車上人又不見馬口吸泉不吸月月明豈解心中渴所以君子交毋為小人絶將軍行城頭積雪滿一丈日出天晴馬蹄響將軍靣如赤玉柈爛醉那知北風猛健鶻森森刀劔翎似聞雲際駕鵝腥今朝得肉便可飽喚婦為公開大瓶海東青行海東青髙麗獻之天子庭萬人却立不敢睨玉爪金眸鐵作翎心在寒空鞲在手一生自獵知無偶孤飛直出大鵬前猛志豈落鴐鵝後是日霜風何栗冽長楊樹羽看騰瞥奔雲突霧入紫霄狡兔妖蟇灑丹血束身歸來如木雞衆鶻欲並功難齊爾輩無材空碌碌不應但費官㕑肉漠北懷古四首曠野多遺骨前朝數用兵烽連都護府柵繞可敦城健鶻雲間落妖狐塞下鳴却因班定逺牽動故鄉情北向無塵郭遙遙接大荒舊來聞漢土前去是河隍野蒜根含水沙葱葉負霜何人鳴觱栗使我淚沾裳每厭氷霜苦長尋水草居控弦隨地獵刳木近河漁馬酒茶相似駝裘錦不如健兒雙眼碧慣讀左行書無樹可黃落有臺如白登三冬掘野鼠萬騎上河氷土厚不為井民淳猶結繩令人思太古極目渺平陵上都王畿千里近御苑四時春苜蓿能肥馬葡萄不醉人衮衣明日月關塞絶風塵古有官名諫今無事可陳開平書事四首舊俗便弓馬新裝稱綺羅平原芳草歇古戍暮雲多翠袖調鸚鵡金鞭控駱駝上樓看月色無酒奈君何絶域秋風草殊方使客還河衝秦日塞地接漢時關萬古悲青冢兼程過黑山從容陪國論咫尺近天顔地勢斜臨北河流穩向東龍庭行萬里虎路逹三嵕畨女裁皮服奚兒控角弓長吟對落景獨坐感飛蓬夜雪沙陀部春風敕勒川生涯惟釀黍樂事在彈絃不用臨城將何須負郭田雙鵰來海外一箭落天邊贈江南故人今騎沙苑馬昔踏洞庭魚結纜荷邊宿移家竹裏居好風橫笛晚新月上簾初每憶江南樂功名有不如和寒山詩三首住世都忘世春深始覓年山花紅似火野草碧如烟月落澄潭裏雲生疊嶂前時時敲石磬驚動老龍眠可愛白雲居長年與世疏花殘無戲蝶水靜足游魚野樹行堪倚園葵懶不鋤茅簷風雨過飄溼案頭書東鄰嬌小女芳意未闌珊眉似初三月琴能再四彈頻來花下坐自向鏡中看不料傷春死瓊樓夜夜寒居庸關天畔浮雲雲表峯北逰竒險見居庸力排劔㦸三千士門掩山河百萬重渠答自今收戰馬兜鈴無復置邊烽上都避暑頻來往飛鳥猶能識衮龍獨石站西望塞北逢春不見花江南倦客苦思家千尋石戴孤峰驛一望雲橫萬里沙去路多嫌葱嶺礙歸途半受雪山遮張騫往往逰西域未許胡僧進佛牙贈王使君君持使節過繩橋已遣蠻方感聖朝良將未誇班定逺大臣猶數蓋寬饒川香野馬銜青草雪暗天鵝避皂鵰西出陽關九千里歸來莫惜鬢蕭蕭余嘗夢至一山聞杜鵑且約雪忩南還出郭尋春未見春東華踏遍軟紅塵不知蝴蝶化為我何處杜鵑來喚人筍蕨過時惟恐老櫻梅如豆正嘗新及今無事早歸去莫待秋風江上蓴羣公子少年意氣向誰傾閒把琵琶出鳯城染草未勻春色嫩勒花不住曉寒輕風飄十里香塵滿日照三條廣路明灑掃東堂逰射處分鵝已足慰人情曉渡西湖船上見月如可呼愛之且復留斯須青山倒影水連郭白藕作花香滿湖仙林寺逺鐘已動靈隱塔髙燈欲無西風吹人不得寐坐聽魚蟹翻菰蒲梁山泊天畔青青蘆葉齊晚來戛戛水禽啼一鈎慘淡銜山月五色彎環跨海霓新摘蓮花堪釀酒舊聞荇菜可為虀北人大抵無髙韵零落梭船傍栁隄相家夜宴璧月未出金風凉羣烏啞啞鳴苑牆西山髙出帝左右北斗正挂天中央繡衣執樂三千指朱火籠紗十二行坐待更闌賔客散蕭齊自炷辟邪香題雲林真蹟好在雲林一老迂畫圖寄到玊山居向來王謝原同調宜住城東共讀書碧山道人宗衍宗衍字道原吳郡人元末居石湖寶積院洪武初住持海鹽當湖鎮德藏寺吳下諸名士咸賦詩送之有碧山集危太僕為序詩家稱其清麗幽茂取喻託興得風人之㫖選本誤收野雞毛羽好一首乃溫州陳氏女作今削去晚凉懷故山疏林生晚凉微月映書幌南山淡相對幽磬時一響懷歸見素心感舊發遐想稍待秋橘香衝波蕩雙槳浴罷浴罷振輕袂潄齒汲古井木落嵗已秋山深夜逾靜細詠倚靈籟清心寄真境松門凉月隂挂杖一僧影墨蘭楚雪春已晴沅湘水初滿去年故葉長今年新葉短波明碧沙淨日照紫苔暖不見澤中人江南暮雲斷楞伽寺得月屋月出湖水湄清暉映林屋山明秋樹靜照見幽鳥宿閉門誰遣入俯澗近可掬道人獨未眠經聲出林竹題畫馬唐朝畫馬誰第一韓幹妙出曺將軍此圖無乃幹所作世上若有真空羣雙瞳精熒兩耳立蘭筋束骨皮肉急何年霹靂起龍池五花一團雲氣濕當年天子少馬騎逺求烏孫詔寫之即今內廏多如蟻縱有騏驎畫者誰秋興一别空山舊草亭衣裳五見㸃秋螢沙沈短艇餘菰米苔卧長鑱老茯苓弱水蓬萊那可到瞿塘灩澦不須經歸帆蚤晚吳波裏嫋嫋凉風望洞庭次瑛石室謝事雪竇歸吳江草堂舊在吳江上江水江花照眼明久客歸來渾似夢比鄰相見不知名蓴香笠澤思張翰瓜熟青門憶邵平一夜西風吹白髮挑燈因自賦秋聲西湖懷古二首當時翠輦此經過天馬玲瓏撼玉珂宴罷湖山芳草合歸來風雨落花多子規夜半啼宫樹翁仲春深帶女蘿自古興亡多有此不須惆悵問如何錢塘父老眼看天霜鬢猶能話昔年岸草忽嘶江北馬風帆不返海南船空陵落木無人掃廢苑餘花只自妍此日西湖回白首功名若箇在凌烟次答子熙見寄韵梁父吟餘自荷鋤南陽非復舊門閭春愁亂逐楊花起秋興頻將柿葉書水落楚江尋瘞鶴草荒吳苑問蒸魚逺遊憶母還歸省安得雲萍有定居送人逰浙東天台雁宕好林丘水竹風杉寺寺幽路轉山腰斜避石渠通海眼細分流經過遂欲留佳處險絶還須到上頭八月錢塘望歸棹江潮如雪倚江樓題畫秋髙山氣佳木落江水靜意固不在魚魚驚釣絲影鶴林髙士周𤣥真𤣥真字𤣥初又作元初嘉興人又云海鹽人生而精神奪目從紫虛李拱端為道士授劾召鬼神之術又於曺貴及霅川神師莫洞乙授靈寶大法於步宗浩授呼役雲雷之法凡劾鬼召鶴禱雨暘若兒戲郡縣大夫皆尊禮之洪武初禱雨京師輒應上數召見賜坐咨詩燕勞有加後住吳中人稱鶴林髙士一時名流多有贈詩具載題詠卷中倪雲林云元初真士嘗居嘉禾紫虛觀好與吳仲圭隱君逰故得其詩畫為多逰仙海南長風挂繡帆散棊初下麗農巖道人愛作逍遙客懶向金樓領一銜龍門山釋良琦良琦字元璞吳郡人住天平山之龍門自稱龍門山釋與鐡史雲林句曲外史金粟道人齊名元末顧瑛移居嘉興琦亦從之住郡城東興聖寺洪武初尚存寺址今改黌序廉夫云琦公既究禪理兼通儒學能詩其餘技耳顧玉山索蟠松因登天平得二本移送賦之崑丘好鳥來雲巖口銜仙人雲錦緘開緘讀之見深意願乞蟠松數株翠疏雨落葉迷秋山屐齒便躡苔斑斑龍門直上天百尺石屋徑度雲三間東林西林何窅冥前山後山還獨經青藜不畏虎豹跡白日還見虬龍形華蓋峰頭最髙處偃秀蟠竒逢兩樹奴僕驚叫答空谷鸞鶴翻翔入烟霧大株倒挂蒼崕巔小株橫欹寒澗邊乾坤凝結太初氣蛟蜃飛騰千丈淵沙土錚錚試長钁險石忽崩雷電落淒籟含風木客嘯深根出地山靈愕祝爾嘉詞爾應喜致爾將歸玊山裏勿愁凡卉妬清標珊瑚琅玕森共倚後三千嵗常青靑根下早看成茯苓仙人服之生羽翼他日相期遊八極冬日過練川黃東溪隱居嵗晚來尋黃處士小艇曉入東溪雲水生栁下鵝鴨喜日出沙頭鷗鷺分枸杞子香浮茗碗枇杷花氣雜爐熏却憐清會難頻得明日南江又憶君羅居仁見過婁東寓舍暉暉寒日照霜筠晨起開門見故人雙鬢已斑真覺老一官初滿尚然貧船中書籍教兒讀筐裏詩篇得意新且盡茒堂一尊酒梅花栁眼不勝春送慧上人海上歸毗山即逰吳門西山袖卷金經便作歸海光晴日蕩清輝鯨魚載足如船穩龍女將花出浪飛玉阜寺門羅樹緑琴臺雲崦橘林稀故人相見應相問為道淮山獨掩扉春日與郯九成過玉山顧君張樂置酒既醉作詩以道其事玉山窈窕集瓊筵手撥鵾雞十二絃巢樹老僧狂破戒散花天女醉談禪鵝兒色重酴醿酒桂葉香深翡翠烟最愛碧桃歌扇靜長瓶自煮白雲泉秋日歸虎丘虎丘共作五年留幾度相擕上小舟楊栁春橋半塘寺芙蓉夜月百花洲長林放鶴閒支遁一室編蒲老睦州此日獨歸懷往事空山草色不勝秋秋華亭片玉山西境絶偏秋華亭子最精妍三峯秀割崑崙石一沼深通渤海淵鸚鵡隔窗留客語芙蓉映水使人憐桂叢舊賦淮南隱雪夜常回剡曲船北海尊中長瀲灩東山席上有嬋娟紫薇花照銀瓶酒玉樹人調錦瑟絃醉過竹間風乍起吟行梧下月初懸一聲白鶴隨歸珮何處重尋小有天湖光山色樓重重樓户燕穿風曲曲紅橋緑水通薄暮鉤簾對凉雨一時秋思在梧桐復初上人自恢自恢字復初豫章人元末住海鹽法喜寺洪武初隱居廬山古今禪藻集載復初漁莊一首乃同時福初字本元者所作故不録端陽前一日於顧仲瑛席上分題賦得崑山馬鞍山在句吳東山中佳氣時鬱葱層巒起伏積空翠芙蓉削出青天中六丁夜半石壘壁殿閣煌煌絢金碧響師燕坐講大乘虎來問法作人立天花散雨娑羅樹聞聲供命雲深處我時細讀孟郊詩興來更上龍洲墓憶昔曾同信信友七尺枯藤長在手數年音問墮茫然頓覺羈懷醉如酒嗟彼習俗耽歡娛錦韉細馬紅氍毺畫船吹簫撾大鼓吳兒棹歌越女歈只今歌樂難再得靣顔已帶風塵色何如張宴溪上樓山光倒浸湖光白我愛虎頭金粟子十載論交淡如水每懷故舊參與商三老到門驚復喜謂盧昭秦約袁華也我留玉山君即歸天風泠泠吹客衣人生㑹合如夢寐焉能對酒成吁嚱我歌長歌君起舞山川信美非吾土褰裳涉澗采昌陽且向山中作端午送海上人還荆門遍