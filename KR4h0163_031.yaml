𢎞治初祝髮蘇州虎丘後為徑山第七十九代禪師耽文證果趺坐而化挽隆空谷講罷西來最上乘一漚幻滅覺無憑交遊已散林間社法印神傳海外僧溪院白雲閒草座石房秋雨暗松燈空遺靈塔西湖上野樹啼猿思不勝送王揮使襲職南還青年較藝謁彤闈衣錦南還倍有輝細雨緑波侵畫舫暖風晴日動牙旗花飛楚驛聞鶯近春盡湘潭見鴈稀四海只今無戰伐到家燈火莫相違雪江和尚明秀明秀字雪江𢎞正間僧巨目闊吻靣骨巉巗肖枯木怪石少時即好為詩與孫太白鄭少谷方棠陵沈石田諸人善處士朱朴陳鑑結社所謂雪江和尚是也族出海鹽王氏祝髮天寧寺晚習定於錢塘勝果山之石門郭公泉側夜夢陳姓者揖曰西有月巖請觀前生所為詩旦乃求之榛莽中果得月巖刻元人詩題曰雪江陳天瑞因悵然有悟著有雪江集其詩清雋新警美不勝收有送王陽明謫官云蠻烟瘦馬經山驛瘴雨寒雞夢早朝驚為傑句他如與許平野云漁舟弄春水野屋卧秋雲子重歸云矮牀地逺坐開卷老鶴天晴鳴近人寶叔寺云林寒巢雀病石峻著花危南國云病起藥苖緣徑長行看荷葉近衣香逢童序班云江城踏雪春沽酒山雨篝燈客在門晚坐云山深長日淨掃地木落清秋髙捲簾湖上云朱閣捲簾驚燕子畫船呼燭照花枝寄胡秋田云江冷水深龍卧月山空樹老鶴巢烟皆為時所誦南山別墅了心但書卷夢不混區寰睡起偶得句開門時見山小渠春溜急斷雨落花閒日暮聞吹笛樵人隔浦還懷瑞石山人數日西巗雨開門黃葉生空林見虎跡落日斷人行野外暮鴉集雲邊秋磬鳴平生江海上與爾獨含情泛舟至桐口路轉青村合山連赤岸斜夕陽飛燕子茅屋落桐花晚墅聞孤笛輕舟閣淺沙前峰望不逺林暝欲棲鴉田叟贈朱可麓早起飯牛犢落花春水渾雨中青箬笠溪上白雲村食力古莘野全生今鹿門不知城府外何處有桃源野眺越南諸峯寺門橫海嶼玉輦舊曾經古道蟠龍勢危松肖鶴形越山烟歷歷吳草雨青青欲弔西臺客空悲許劍亭許泉亭秋日手把傳燈録西巖卧病翁柴關上野色石壁下秋風嵗月飛鴻外江山落葉中菊花知九日青蕊更叢叢宿歸雲堂寺前昨日雨水滿放生池獨往忽乘興幽尋豈有期夜深月未出秋近竹先知重把茶杯坐雲山話所思西巖夏日山盤春雨中筍味殊勝肉數日不窺園南風吹作竹秋興二首天上美人音信稀平時誰采故山薇長城風髙塞馬健夢澤雲淨神鷹飛東籬野老向花飲南畝長鬚踏月歸四海升平歌擊壤何妨卒嵗獨柴扉木落關山嵗莫時風雲萬里憶京師著書獨惜虞卿老懷古猶含庾信悲海郭清砧寒近搗山樓短笛夜深吹江南秋水平如鏡只恐無人照鬢絲西閣與勤長老夜坐不出寺門今幾載祇應坐卧竹西房深雲一徑松千挺斜日半湖山滿牀林杪峯巒晚色淨城髙雉堞秋烟蒼白頭相見話鄉曲勤豫鄉人也篝火茶杯入夜長勝果山中懷朱陳二翁西閣暮鐘雲氣隂南山秋色故宫深半巖落日照江雨萬里長風吹桂林喜見燈花頻入夢病憐物色獨關心青天兩夜負明月黃葉思君祇自吟上竺次邃庵國老韵半空樓閣倚崔嵬海色霞光萬里開驚起頭陀掃花去傳呼宰相看山來旌幢曉日千峯擁騎從春風疉嶂回不向山僧留玉帶恐教猿鶴也疑猜勝果山中雨懷奉柬金近山先生春雨黯黯芳事微經旬獨掩西巗扉花枝欲動寒仍勒燕子初來濕不飛嵗月豈知愁換鬢江山徒有淚沾衣病夫起坐正憶汝混世隨聲同是非謝孫十六山人惠蓴菜山盤一筯湘湖雨路涉江波荷逺將縷縷尚含風露色涓涓猶帶水烟香故人千里情何重病肺三年夢亦凉野岸柴門應采摘小舟蓑笠泛滄浪讀謝翺傳南奔北走家何在七里灘前許劍來崖海夜寒惟月上冬青樹老又花開側身天地聊晞髮悵望江山獨把杯一掬當年知已淚秋風灑盡下西臺書事竹裏虛亭鎖翠微攤書遮眼思依依落霞已受枯桐誚聚雪仍招死草譏桑户雨晴蠶欲繭栁塘風暖燕初飛織成五色寒機錦借問誰能補衮衣春日西村社㑹深深竹樹轉漁沙豈但情真㑹亦嘉過雨軒窗來燕子禁烟村落熟梨花郊西宿麥初鳴雉牆下柔桑欲乳鴉閭里頗淳耕讀在白頭羣從古田家中秋泛湖寺前湖水清如鏡不與遊人照白頭豈獨尊前千頃月更憐笛裏滿湖秋蘋花洗盞香堪把荷葉拂衣凉未收此夜瀟湘洞庭上放歌誰得坐輕舟中秋泛澉溆湖董蘿石許東山朱西村陳勾溪許九杞孫太白沈紫峽同賦人物百年滄海上釣竿裊裊拂珊瑚前峯吹笛月在水中流放歌秋滿湖夜靜魚龍回浦溆天低星宿動菰蒲山川勝槩自今昔天柱洞庭還有無寄九杞先生兩句三年報已成杞泉凉月照人清九華芝草髙踪在千里冥鴻病眼明野墅柴門香稻熟漁村江樹晚山晴憑誰喚起王摩詰畫汝綸巾杜曲行得白泉徐侯書檇李城西從拂袖歸帆直過釣臺西却憐別後無消息忽得書來問杖藜江岸鷓鴣悲暮雨柴門燕子惜春泥海邊猶有甘棠樹幾向花隂憶貴溪賔山駐錫雲居滿地雲山皆幻住此心若了始為僧草茅徑仄須扶杖霧雨堂昏要續燈警露鶴鳴穿壁月弄花猿引挂巖藤閉門細究楞嚴㫖鏡像年芳未可憑楚江秋曉次石田翁睡起長年報水程江花無數傍船明漢陽人語舟橫渡夏口雞鳴月近城寂寞陳圖諸葛計支離心事杜鵑行却從嵗序悲黃葉一夜湘潭白髮生訪夏雲山雲山老翁住南村抱病十日不出門留客細傾若下酒遣懷閒弄膝前孫深林四月笋成竹古屋百年槐露根鄉曲别來無限意白頭相對竟忘言寄勾溪故人久病寒無氊明月弄影箕山泉自搔白髮向天笑開過黃花對雨眠海底珊瑚不乏樹牀頭瓊琚知有篇栩然昨夜入吾夢握手柴門落日邊雙節方洲張公二姬縞素沈沈抱所天死心已在剪刀前主家樓上孤燈淚同灑秋風四十年江村為俞隱君畫史野鳬相次睡菰蒲客至山瓶踏月沽猶記去年春社散騎牛自寫醉歸圖普賢像阮圖靈山獨倡久茫然賴有鸞膠續斷絃末世無人知此調野花零落象王前扇景為顧杞廷柴門曉色掃蒼烟石澗流香洗藥泉憶昨南山買茶去桃花小雨過湖船西塘話別憶昨江樓倚月波隔花聞唱竹枝歌十年往事燈前省秋思春愁積漸多玉樞道士金宗周宗周字歸儒正德間嘉興玉樞院道士遍逰名山歸坐樓居寒暑一裘結髮如氊爪如鉤或數日不食或并日而食嘗有鼻筯下垂雪中趺坐人呼為金仙能出陽神化形至西湖滸遇唐太史荆川與之化席曰我玉樞院中人唐不答偶登岸入院見一道士坐定身下席為火所灼後倭寇至見其入定羅拜而去嘉靖中作詩化去絶句一聲𤣥鶴當頭唳誤入塵寰七十年從此白雲歸去好依然明月在中天九龍長老祖福祖福號谷泉正嘉間秀水三塔寺僧後隱毗陵九龍山人日鴛鴦湖頭新水生白龍祠前風日晴梅花作意開自好柏葉向人殊有情南國十年多羽檄北山此日有柴荆杖藜物色總春事回首江湖眼獨明士墨士墨號梅谷海鹽資聖寺僧江上春江渺渺春草生蘼蕪不盡王孫情青山影帶杖藜逺落日光動漁蓑明鷗鷺羣飛下淺渚村原警柝連孤城人事時憂不自理長歌清淚幾縱橫石林子永瑛永瑛字含章號石林子海鹽人祝髮永祚寺與十老結社往來石林係雪江派澄懷物外意致閒逺禪寂之暇抱杖林泉下筆成詠嘗曰詩理性情已矣使鉤深徼僻以示工如我性何故不尚雕飾天真爛然董兩湖謂其詩宗靈一皎然笑而不答法孫戒襄刻其遺稿僅存十之一二曰石林外集山居江鷗只馴水野鶴不受籠孰云逰方士肯為塵所䝉風清紫芝谷月白青蓮峯學道嵗未晚尋師吾逺從漁父圖為漁嵗頗足水國魚蝦熟結網護黃麻炊飯然青竹江頭日出孤嶼明白鷗㸃破春烟緑勝果寺中峯閣用唐處默韻古寺梯雲磴長松帶女蘿山空秋意早江濶晚凉多白鳥逾青壁紅霞閃碧波西巖昏磬罷猶聽採樵歌與僧夜坐道境隔塵世夜凉因卧遲清風生簟處凉月上窗時法味烹龍井緇衣織兔絲山中無桂樹何以托幽期溪堂晚坐捲簾溪雨歇樹濕小堂凉未晚歸禽集先秋病葉黃浮雲悲世事落日坐漁梁幽意無人㑹鐘聲出院長漫興何處堪消日虛齊水竹邊鈎簾飛白鷺洗硯落紅蓮書卷聊云爾簞瓢每晏然客來無雜話茗飲只談禪中峯亭宴坐時來秋壁下趺坐有蒲團鹿過花遺竇猿歸月繞闌嗒焉真喪我隱矣不逢官入夜風吹鬢髙梧落影寒過茶谷水閣嵗暮焚香虛閣上坐深不倦道人情水流石檻菰蒲冷風動山牆薜荔輕雞口從人論世事馬蹄吾自學全生捲簾更愛青青竹幾箇溪南帶雨橫聞潮閒倚青松讀古詩杭標霅晝舊相知山僧不刻蓮花漏潮白江門報午時栁塘千樹垂絲兩岸烟緑波春雨白鷗天江鄉不近章臺路留得長條繫釣船山房宴坐角角梧桐報粥魚道人卧起小齊虛千山寒氣曉簾薄一徑落花春雨餘晴湖為友人賦岸芷汀花映夕暉柴門秋水抱魚磯一聲長笛秋波渺人在五龍橋畔歸法生法生字化儀崇德人嘉隆間剃染於雙徑二十年不下山嘗游嵩山少林研窮宗㫖與逹大師契合後逹師歸葬徑山以詩弔焉有昔年曾共業今巳各分行之句贈雲東佩芳須紉蘭療飢須采芝之子白足流炯炯珊瑚姿啓我離垢言遺我青楊枝欣然意有㑹千古心相期維時嵗云暮載道皆菉施子行望林壑我亦歸吾廬道濟道濟字法舟秀水人祝髮芝溪東禪寺晚居天寧有剩語一卷山居蘿薜緣門晝不開深林曲徑少人來偶然振錫中庭立風落松花滿石苔檇李詩繫卷三十一
