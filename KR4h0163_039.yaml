屋南村書屋書滿車南村書聲聲滿家讀書不作村學究身為郎官印如斗如今袛令稱書鄉不讀書誰人姓張附考元至正間里人張絃號南村家多書作書屋以為誦讀之所北原牧笛北原草青牛正肥牧兒唱歌牛才歸兒家在原牛在坂歌聲漸低人更逺山蒼茫水清淺霍氏行祠霍將軍古祠下揚靈旗躍靈馬神逰四方適余野霍將軍武且神驅逐厲鬼鞭風雲生能安邦死能福吾民壯哉將軍死猶存附考吳王皓疾有神附小黃門曰金山鹹塘風潮為害余漢之博陸侯也當統部屬鎮之翼日疾瘳立廟小金山鄉人復築宫湖上宋宣和二年兩浙提舉魯詹請于朝封忠烈公賜額顯忠祠為文以記其事部下錢侯尤靈著嘉靖倭寇掠湖人見有金袍白馬戈㦸如雪或作虎象形擊之遂去魯公古墓荒荒髙原鬱鬱古墓誰其葬之侯姓魯君看佩銅章繫青組有酒誰澆墓傍土彼獨何人民亦何心嗟哉魯侯名至今附考瀕湖有宋魯宣義魯夀寧魯文諡墓東作莊知時好雨正當春黃犢犁邉緑水新林外不須催布榖農家自少晏眠人附考莊在嘉善孫詢故居也蘇恩字從仁華亭人正德中秀水令水月禪院平生最愛水中月今日來過水月庵月色水光無限白對渠非我問誰堪附考院在嘉善治西北三十六里宋紹定間建馮蘭餘姚人𢎞治間進士官憲副白蓮寺我愛白蓮僧好事偶然開卷發深嗟才如廷尉亦老吏詩比醉翁真大家方外禪心空去住水西秋色半烟霞芳期更卜明年夏來看峰頭十丈花史鑑字明古吳江人桐村小隱詩和韻髙年厭㕓市小隱在烟村溪水到門緑野花經雨繁隔鄰呼酒伴對坐且開尊醉卧人來問兒童出應門沈周字啓南長洲人有石田集梅花道人墓考見前梅花空有塔千載莫欺人草證𧦬光妙山遺北苑真短碑深刻字古橡未回春欲弔誰為伴秋塘老白蘋桐村小隱詩和韻不煩王録事結屋自深村靜覺道心苦老嫌人事繁書魚登竹几酒蟻落匏尊幾箇梧桐樹秋來葉滿門題沈月溪卷月為大家物何獨此溪有千溪萬溪月同光無薄厚惟是溪上人雅與月相偶君于此溪外他月能識否逍遙見在境此月隨所取低頭弄清華白璧落我手尚呼酒酬之溪月我三友文徵明字徵仲吳人嘉靖中為翰林待詔景德寺考見前古屋無人犬護籬偶拋塵土得幽棲不知何福能消受滿樹松隂一鳥啼雲村為許黃門賦茶磨清風不可攀髙人先我十年閒懶搖玉珮聨青瑣故擲銀魚卧碧山新水旋開田二頃紫雲深占屋三間若為便置蒼生望見說青青鬢未斑附考村在海鹽敢浦唐德宗時有村女出耕紫雲覆之後詔選入宫故山與村皆名紫雲茶磨山在其北白鶴在其右東西水皆九曲村人並織屨為業山有天只峰星晶石弄月臺枕流巖豐崖諸勝文彭字夀承徵明子官博士逰鴛鴦湖秀水亭前水荇香鴛鴦湖上浴鴛鴦逺天簫鼓迎歌扇倒影樓臺浸女墻蘭槳夷猶衝菡萏竹枝欵乃和滄浪莫言煩暑無由避月照波光玉露凉莊昶字定山江浦人官吏部郎靜觀亭微月此波寂逺峰何處青我來閒坐好不記是誰亭附考亭在平湖學宫內林光字緝熙東莞人成化舉人為平湖教諭和莊定山靜觀亭詩小月來相照雙眸老更青人間無限事且對靜觀亭泛當湖四首青青湖畔草泛泛波中鳥杯酒入烟雲斷隨秋水杳閒持一杯酒移艇傍疏竹白鳥忽飛來湖田雨初足數聲採蓮歌秋波杳如海不遇種蓮人那得蓮堪採煙火幾漁家邉湖夾疏樹扁舟三五人坐入秋天暮都穆字元敬吳郡人官大理卿舟次石門讀罷新篇如覿面石門知有幾番逰小軒暮坐清閒甚落日蟬聲碧樹頭夏鍭字德樹天台人成化進士官大理有赤城集宿麟湖懷陸宣公斗酒出門去路賖何期一笑落雲涯浙西人物猶專美吳下文章述大家風雨孤舟開束錦江湖獨夜隔鳴笳眼中吾輩還堪數詩到平原國有華附考湖在嘉善縣西十三里有東西兩湖界接秀水嘉興强吞弱委此封疆流水寒鴉幾夕陽兩岸荒烟時盼望眼中應有禦兒鄉張翬雲中衛人成化時桐鄉令鳳鳴寺一水周遭抱梵宫石崕斷處小橋通片雲委地家家雨萬樹呼秋葉葉風供佛野僧來施食放生衲子自開籠邑庭東去無多路已覺閒忙逈不同李廷梧字仲陽莆田人𢎞治間為桐鄉令題鳳鳴寺鳳鳥何時此地鳴誰將下里配周京已無文字書年月空有榱題記姓名落日亭臺橫塔影西風門巷作秋聲遙思噦噦當時事獨對孤雲坐月明周紹濓秀水望吳門外水如油㶑灔騰空映鷁舟莫是西施曽濯繡至今人羡錦江頭附考秀水縣明宣德間割嘉興西北境為之以其地有秀水因名府城之內皆屬之治在子城西北一里爽溪東宋仁夀寺址也領象賢靈秀雲泉柿林等八鄉祝允明字希哲長洲人𢎞治間官通判秋晚嘉禾道中二首晚發西南郊秋深雨氣偏人家低似岸湖水大於天日崦長如閣風檣不用牽辭燕還入越才費半流年湖尾橫波急船頭轉港頻幾家危傍水一木老存身黃菊看如客青山坐送人空舟隨處泊不用擇行鄰顧應祥字箬溪長興人題鍾西臯長春亭長春亭子清更幽主人况是神仙流不愛齊州乘五馬却來海上狎羣鷗亭中蓄書三萬軸夜則髙眠晝還讀希夷山人西華西少陵野老曲江曲翠竹蒼梧手自栽四時無日無花開鴻儒下榻談𤣥理騷客題詩稱逸才世路風塵競奔走英雄幾個能回首富貴浮雲未足論浩歌且進杯中酒臧相台州人進士談節孝婦詩荒庭落葉秋日晡屋頭嗚嗚鳴老烏少年夫婦中道阻羅幃寂寞青燈孤妾身何異秋江蒲十月孩乳方呱呱殷勤囑補嫁時襦誓將忍死為生圖堂上白頭有繼姑姑有繼嫡無親疏是誰妒害䇿三雛一舉直欲相吞屠誰無舅姑誰無夫妾生不幸多舛途薄命敢爾貪生娛嗚呼談氏良無辜上堂甘㫖色而愈風前燭短嗟易枯嘗熊辛苦心力痡姑心不動歡如初孝亦獲全節不汚七十年來甘茹荼地下相逢果有無完君左驗朱墨符况是衮衮多孫孥蚤年更有登雲衢向來志氣容稍渝談氏之鬼血食乎世稱丈夫七尺軀一朝埋沒成泥塗吁嗟乎死後餘名天壤俱安知後日無董狐附考沈氏桐鄉人嫁同里談𢎞三載卒遺孤甫周嵗姑陸氏生三子沈前子婦也素不愛有奴老而狡為陸謀去沈而并其産沈貶身曲事卒能全志楊慎字升菴成都人正德狀元官修撰三塔寺始見椒花緑又驚椒實紅客心正鬱鬱作底對春風徐禎卿字昌榖吳縣人官博士嘉禾道中檇李城何在蕭條草樹存未溫吳苑酒已動越鄉魂問水來天目看桑過石門愁聞鶺鴒語寧聽楚山猿倪璣字公在咸寧人為嘉善邑丞思賢書院六首晴樓髙送目獨立晚風恬近市浮烟重山青欲捲簾右清風樓衣冠遵矩度風俗回人文大雅久不作異言徒喧紛右學禮亭稚子得嚴師以道發明性春館江頭開誦聲風外聽右養蒙館斯道有顯晦人心無古今升堂動遐想時聞鐘磬音右志學堂白日下庭除餘情動春斚鶴韻轉悠然江山入清夜右息逰所獨坐息芬芳髙懷起清詠陂水入春生林花帶雨靜右漱芳池附考書院在嘉善治東百步明正德間倪璣建為講學論治之所陳賢良祠涇水來清風故祠香火崇晚辭花縣令早作白牛翁直道紛更際髙名貶謫中恍疑相對語孤鶴唳晴空附考祠在嘉善治東五里名表賢祠又名光德菴俗名荒墩菴宋嘉祐中舜俞以其地與僧契嵩為焚修之所後因建菴置田贍祭其傍有墓王良佐華亭人思賢書院假山何來搬取崑崙峰屹然映照池波中波中㶑灔石玲瓏石面洗出梨花風一壺中藏小天地三十六洞桃花雨千年髯松鎖不住只愁化作茅龍去孫一元字太初關中人思賢書院題倪司諫竹里圖使君家在渭川上茅堂正對青琅玕皇陂月出夜初靜紫閣雲連秋映寒已愛冉冉坐中見更要森森行處看聞道南鄰有蔣詡擕壺相過日交歡中秋夜永安湖泛月中秋此夜成髙㑹山雨初收澉墅隈望裏星河舟楫近坐中滄海酒杯開月明靜抱黿鼉出樹色晴浮島嶼來爛醉狂歌真自得回頭天地莫生哀同沈紫硤董子言陳用明僧雪江散步澉湖六橋尋勝處去去望中賖樹老秋連石湖酣晚映花山光酬野客詩意愛漁家歸路夕陽裏鏗然拄杖斜題思賢書院六首長天帶川原野水映林薄倚闌吟眺餘紅日當窗落右清風樓幽亭枕溪流春風敞華牖喤喤聞笙鏞禮筵陳俎豆右學禮亭夕隂下松間虛館春風裏夜窗燈火深兒童經誦喜右養蒙館六經立人極萬古如新月遊居日以深春風衆芳茁右志學堂枕簟對青山琴尊事幽暇日夕晏坐餘庭隂雙鳥下右息遊所芳意滿幽亭石池流水活沙頭羣鷗來檻外雙峰落右漱芳池黃省曽字勉之蘇州人有五嶽山人集除日泛鴛鴦湖孔違稅遼駕蘧卷肆長往蜀雄草逾積洛誼誦彌廣時遒歇英妙神超發慨慷岧嶤凌逼嵗濛羲曯升昶澄湖蕩襟目芳臯挹情想逰逰泛虛穆遲遲止幽敞除辰新故判嘉國越吳兩靈剎非曩觀途樽有初賞窈林初竒邁遐嶺一清仰締思馳海隅傒晨理探榜檇李詩繫卷三十九
