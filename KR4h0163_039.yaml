body:
  text: 檇李詩繫卷三十九平湖沈季友編明寧獻王朱權太祖第十六子送御史戈定逺歸覲柏臺御史久思親泗水津頭望白雲幾處别情春晚路隔年小夢夜歸人嘉禾海上青山冷萱草堂前白髮新此日天心應可鑒由來孝子是忠臣附考定逺字尚武平湖人永樂間御史工古文辭立朝有風節漢王朱髙煦太宗第二子懷仙歌賜周元初我懷蓬島之仙人驂駕朱鳳騎紫麟瑶池清宴接談笑誤落塵寰經幾春青童昨夜傳書至中有琅函洞章字洞口桃花似舊時門外孤松發新翠緘書欲報碧雲逺薜葉女蘿若正眼方平倘㑹蔡經家為報扶桑水清淺洞天秋望賜周元初蓬萊宫闕涵清秋羽客臨風閒倚樓海天一碧湛杯水塵埃九野分中州雲裏仙歸鳴佩玉紫鳳琪園自栖宿遙瞻西極半林青知是瑶池桃未熟劉基字伯溫青田人洪武時封誠意伯栁橋漁唱春風淡淡兮湖水波栁垂橋兮青煙滿莎扣豫舷兮發長歌靡白蘋兮亂鴐鵝我前有蛟兮我後有鼉豫往豫還兮吁豫奈何彼湖有波兮此橋有栁我維我舟兮聊以搔我首唱歌以遨兮哀莫豫偶有籜在罾兮有沙在罶逝者滔滔兮羌不可久緑頻兮菲菲落花兮㸃衣江無津兮海無涯嗚呼寂寥兮吾誰與歸附考栁橋在郡城東八里白蓮寺旁俗名常豐橋元季劉基嘗館於此作漁唱詩楊鐵崖題其卷云渭水莊灘此周漢第一流漁父也而未聞漁唱江上丈人誦滄浪曲已落第二義矧乂淫其欵乃以為韶鈞乎欵乃淫而漁德始哀矣直鈎來歸天下不以為釣貪披表終往天下不以為釣亷圖栁橋者為我問之其來歸為渭水乎將終往為莊灘乎秋夜聽冷協律彈琴分韻得夜字秋清衆籟寂華月耿遙夜玉琴奏瑶席逸響發髙榭微微風入林稍稍泉出罅閃閃黃鳥春嘒嘒𤣥蟬夏幽憂北鄷語赫怒西楚吒初疑廣寒府和鑾起仙駕忽驚龍騰霄雷電劈太華凄凉漢宫女萬里異國嫁逍遙商山老芝歌意閒暇斯須變暄凉要妙奪造化終焉返淳朴瑚璉在繅藉鄭衛失其淫秦儀失其詐虎狼失其攫烏鳶失其嚇太音信希聲餘美甘如蔗持此滌塵心永與筝笛謝泉石歌為啓敬賦君不見吳山削成三百尺上有流泉發蒼石冷卿以之調七絃龍吟太隂風動天初聞滑滑響林莽峭若𤣥霄鬼神語冷然穿崖達幽谷竿籟颼颼振喬木永懷帝子來瀟湘瑶環瓊珮千鳴璫女夷鼓歌交甫舞月上九疑啼鳳凰還思媧皇補穹碧排抉銀河通積石咸池㵼浪入重溟玉井氷澌相戛擊三門既鑿龍池髙三十六鱗騰夜濤豐隆咆哮震威怒鯨魚犍尾驚蒲牢倐然神怪歸寂寞殷殷餘音在寥廓鯨人淵客起相顧江白山青烟漠漠伯牙骨朽今幾年叔夜廣陵無續絃絶倫之藝不常有得心應手非人傳憶昔識子時西州正繁華筝笛沸晨暮兜離漫矜誇子獨徜徉泉石裏長日松隂净書几取琴為我彈一曲似掬滄浪洗塵耳否往泰來逢聖明有虞制作超莖英和聲協律子能事罔俾䕫摯專其名鶴林行鶴林道士軒轅徒以飈為輪雷為輿開山養鶴作騏驥上下二儀周六虛雛成洗髓扶桑窟縞練羽衣鏐鐵骨聲飄碧落玉清揚影拂太微雲滅沒永夜月明風滿林竹柏戛擊笙簫音云是旌陽許縣令躡屩佩劒來相尋靡蓱西枝搖倒景借去林問兩丹頂伐蛟北海奠𤣥冥斬蜃南訛封浪井上窮列缺旁九圍却過度朔山中歸歸來贈我桃樹枝朱衣赤郭手所持令我鞭龍扶虓虎攝縛臊魃如奴虜授我堯時松子訣轉睛出電噓成雨鍾山秀色連冶城百花繞屋風泠泠焚香獨坐誦真誥墜露㸃滴流華星土伯駿奔從號令鶴鳴聞天空谷應寥陽寶殿歌步虛河漢當窗回斗柄嗟豫哀朽雜病攻盈顛素髮吹秋蓬空餘硬骨如瘦鶴因子致意浮丘公水西寺東樓曉起聞鶯日上髙城栁影齊風軒臨水看鶯啼初來木杪鳴相應稍入花間聽却迷芳草自深勾踐國行人猶隔禦兒溪思家每恨無輕翼可對鶯花不憯悽宋濓字景濓金華人洪武時官學士濮川八景詩福善翠冷太古烟霞錯繡楹拍天蒼翠纈虛明擘開千佛無文印不似空題雁塔名翔雲髙眺凌虛不用跨青牛拄杖為龍任去留極目山川知已在乾坤冷落片雲浮樁樓旭照曉雲一帶舞衣輕脫體風流最惜卿莫道古人心不見半簾春色露傾城梅涇花午踏穿清淺水雲奔皓日當空雪滿村可笑羅浮山上客一枝明月醉黃昏荷陂晚風潑翻鷗鳥夢驚飛細捲波痕滴翠衣落日半竿花未睡采蓮人逐釣船歸化壇楓映霜花零落暮秋寒一醉西風樹葉丹却怪楓人留不住滿溪月色老夫看幽湖月滿蒼旻不挂一帆絲兩岸漁歌月上遲看破嬋娟全面目菱花無語笑馮夷西院纒霞夕陽倒插暮雲沉碎剪胭脂結翠林絶壁丹書人不識柴門深峭聽歸禽附考濮院鎮古檇李地也在崇德今入桐鄉宋建炎間濮氏搆屋開街因名居民多以織絹為生宋景濓嘗居此取八景繪圖賦詩有福善寺元皇慶中建翔雲觀元至正中建樓曰西施粧樓橋曰粧橋并胭脂滙百丈河洗碗池梅花涇諸勝淨土庵古化壇宋宣和間創幽湖相傳西施泛此范蠡塢洗足灘在焉髙啓字季迪姑蘇人洪武時官侍郎有缶嗚集蕭鍊師鷹窠頂丹房人間不可住混濁同腐腥一落三十年塵夢無由醒稍聞方士說恍惚通仙靈羡門與偓佺相期餌芝苓自顧真病鶴秋風墮疏翎碧海不得渡烟霧愁冥冥師從天姥來身佩豁落經不邀五利寵深棲鍊神形東觀鷹窠峰中天插孤青其下吐浴日其髙罣飛星昔有學道侣井臼遺巖扄愛兹絶俗地遂爾留軒􅀈太鼎生紫烟丹成衛天丁金谷坐可脫騎龍駕風霆積水浮方壺東望類㸃萍紫臺白玉榜中有真人庭飛遊願從師往讀新宫銘附考山在海鹽縣南三十里又名南陽山前臨澉湖後枕大海有九曲涇獅頭岩合掌石有庵曰雲岫山頂十月一日觀日月並出謂之合朔顧榮廟軍師吳國秀機神夙超朗弱冠逰洛師已蒙南金賞﨑嶇諸王幕沉湎務遵養中罹廣陵艱計服非誠枉風雲一揮扇義旅臻同響事成恥言勳飄然理歸鞅晉社始東遷羣賢悉收奬道謁真感㑹矯翼丹霄上德聞一代稱跡泯千齡往時屯乏良佐英謨益堪想墳祠托荒郊蕭條並榛莽蕘童侵雨隧淫巫闖塵幌大夫過停轅式瞻為含愴衣冠復故貌筵几陳新享寡劣忝鄉人因歌表遐仰附考廟在長洲之東與我郡界其旁有墓余既為彥兼記春草堂士大夫多賦詩歌之出以示豫因復賦五言一首靡靡堂廡草托根近華楹膏露既濯芳惠風蕩揚馨匪蒙陽和力孰使微物榮中天駛景流青節坐易盈但憂德澤違豈惜憔悴并願言相蔓結嗟彼春逝程寸心雖難報拔去當復生死亭灣考見前貧賤衆所棄豈惟愚婦人圭組何重輕能令變交親翁子昔未遇妻去恥負薪五十非晚貴不能待終晨一旦謁帝閽還家繡衣新邸吏驚赤綬邦人候朱輪無顔見故夫自殺此水濵誰知孟德耀元在爾東鄰陳節婦詞妾家溫陵近南浦嫁得良人業為估良人長年愛逺逰不敢新粧映門户販寶遙聞去百蠻朝朝海上望青山不仁無那蛟龍橫漂沒孤身不得還君非渡河老狂父波濤如山何不顧尋尸便欲赴窮淵膝下嬌兒誰與哺十載空閨守寸心滄溟水淺恨情深願身不化山頭石化作孤飛精衛禽查家蕩秋老共溪長逰人笑語凉萍開天倒影蓮墜水浮香魚罶和星漉禽罝帶雨張從今搖桂棹不必問瀟湘附考在嘉善縣北多荷花送陳郎中出守檇李出幕方為郡行車動畫輪圖書歸省吏風俗問州人塘水龍鱗細城槐兔目新莫言花已盡君到自陽春送范架閣赴嘉禾陸相祠前路孤舟欲上時空江難晚别荒郡易秋悲月送潮生早雲隨雁去遲幕中知有子太守只題詩顧野王墓南朝舊碑倒墓近樵蘇道應與讀書堆離離總荒草舟歸江上過斜塘漫漫村塘水沒沙清明初過已無花春寒欲雨歸心急懶駐扁舟問酒家章練塘蓮房聨句露冷鏡湖秋宋璲波凉練塘曉盤翻緑雲稠張孟兼錦破朱霞少新苞顆微綻髙啓餘葩莖尚嫋瘦繭綴寒蠶宋尖喙啄青鳥下惟玉龍眠張中有瓊絲裊擎重柄欲折髙含深睛尚窅孤懸類覆杯宋雙立疑擢表初成欣雨滋張漸老怯風掉多子同根榮髙獨婦専房悄粧缷失娉婷宋歌來逢窈窕剖心效諫忠張並頭呈瑞兆裊蹄密竅剜髙魚目微光皎珠珥落盤多宋瑶珍貯囊小空實外莫辨張甘苦中自了剝殘星滿地髙采盡香餘沼雕筵飣戢戢宋玉蟲攢擾擾送看去小艇張薦喜對青醥新嘗勝江芡髙逺覓迷水蓼搴芳想夏初宋感物傷秋杪聊兹發吳咏張一覽烟波渺髙附考塘在嘉善縣北三十六里吳孫權造戰艦于青龍鎮嘗于此張纛因名後訛為章練徐賁字幼文蘇州人洪武時官布政有北郭集逰金粟寺暫息人間事尋幽到上方白雲分石磴落日照山房松暝鐘聲逺林回蔓草長老僧能愛我具衲漫焚香曉發秀州路出雙湖烟樹東舟行長是雨兼風夢回重有離家恨惆悵春寒此夜中張羽字來儀潯陽人洪武時官翰林待制有靜居集蘇小墓冷落百花朝無人上畫橋東風吹緑草依舊似裙腰曉發嘉興似友城烏啼散驛樓空一舸夷猶曙色中不是故人今日共定應愁絶雨兼風楊基字孟載吳人㓋武時官按察有眉庵集寄題水西草堂鴛鴦湖東武塘西桃花滿川蒲葉齊春風二月微雨霽鵝鴨拍水黃鶯啼推窗只見參差栁栁色波光淡於酒烏紗官帽半籠頭紫竹漁竿長在手平生愛讀內景書往往適意追禽魚開門懶迎俗士駕拄杖每叩髙僧廬客來舉酒邀明月細瀹松濤煮春雪但覺身無俯仰勞安知世有東西别今年扈從來大梁錦袍白馬青絲韁信陵宅畔暮鴉集朱亥門前秋草黃輪番夜直中書省霜華滿巾鬚髮冷粉署香銷紫綺袍碧梧影落黃金井魂夢時時到草堂曲欄花藥漫分行他年得遂歸田計多種墻隂十畝桑寄海鹽楊寨官海嶼通村險邉城出敵遙旗燈秋塞雨鈴柝夜溝潮士飽爭投石農閒數舞簫母令廢收穫髙隴有枯苗顧孟時洪武間郡學訓導幽瀾泉秀水東流入魏塘一泓誰鑿近禪房煮來茗碗清無滓分出花渠細有香霜月半空融碧海風濤一𣲖引滄浪客漿此日難成醉聊吸寒泉當酒嘗王禕字子充義烏人洪武初史官海鹽陳節婦詩妾生南海涯窈窕如秋花鄰娃不識面千里隔窗紗一朝嫁夫壻共在桐城住門前有舶船便欲為商去歡好百年身今年涉兩春象牀銀燭下生此玉麒麟轉頭才四月忍作生離别臨行豈不聞懷裏兒聲咽相勸筵前酒絲髮濃如栁槌鼓起開帆參差挂牛斗獨閉香閨卧相逢夢邉過倚户夕陽時不見南歸柁依稀四五年顧影自知憐相傳夫壻死真贋尚茫然脫却繡𥜗襠蓮腮淚萬行收將望夫淚膾鯉獨升堂堂上雙親老都憐外孫好如何妾薄命再哭妣與考隻影坐空帷依依膝下兒兒能學人語口授柏舟詩經年機上織掩户秋苔碧俄聞叩户聲鵲語簷前日開户見夫面翻疑眼生眩喜極却成哀淚并春空霰兒長至父腰再拜可憐嬌褰衣怕父去愁見港中潮歸家才涉夜販寶復東逰蠻巫作神語滄海日安流有約明年返别來期未逺怪夢不勝悲桑田海清淺明年訃音至命與青天墜剪紙獨招魂江流寫雙泪妾欲赴黃泉兒生未十年提擕今長大待與父齊肩唾視鄰家媪不死何為老殷勤諷巧言榕生根可倒妾自願為人人誰亂鳥羣他年泉下路尚欲見夫君夫君前有婦生兒在澉浦年是妾兒兄何須口同乳念彼孤兒隔辛苦謀衣食妾聞夫有田質在他人宅賣妾金鳳叉轉寄外家來說與孤兒道持此贖田回妾身自有子生理在十指紡績不曽閒供渠買經史燈前雪滿窗白髮幾年孀課兒終夜讀不暇計更長兒今長似父祀事真堪付春秋稱孝子銜哀進觴俎妾老兒方壯前期百年養不負妾初心少答夫深望有婦佩宜男如兒奉㫖甘一飲知姑恩嘗羮再至三焚香禱夜初細語在階除願婦同兒老母為妾與夫秦約字文仲淮