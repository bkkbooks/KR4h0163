body:
  text: 檇李詩繫卷二十一平湖沈季友編明陸御史清原清原字嗣白號岫青平湖人崇禎甲戌進士授增城令時瘴鄉羣盜旁掠三省清原輕騎造壘諭以禍福賊受命散去擢御史疏諫營醮劾樞輔止募浙兵及浙西白糧北運纍民等事皆見嘉納巡按福建經淮安疏言史可法兵單不可支宜留諸援師聽其調用不報至漳州賊衆萬餘攻城清原計擒奸宄辛泗等斬之甲申李賊破京清原毁家備甲仗募兵三千勤王請身討賊疏再上奸相馬士英格之乙酉復命在途聞金陵陷曰清原故閩吏當還求死所耳乃入閩疏言閩越唇齒宜亟餉越即命清原度嶺犒師時馬士英擁兵竄越閩故以士英棄君喪國褫其名士英遂激衆劫餉麾其將趙體元僞進見猝起刀斫清原墮三指遂為執禁舟中後錢塘失守士英宵遁清原曰此我授命時也赴江死答黃石齊先生問俗停車到海湄羽書那敢論安危孤城吹笛思當日中夜聞雞豈異時北望烽煙縈夢遠東瞻林墅出山遲蒼生極目堪流涕何日綸巾一視師馬給事嘉植嘉植字培原别號木山平湖人崇禎甲戌進士授武進令擢吏垣莫春雜感和郭皋旭韻舊客新詩長嘯開年年修褉笛聲哀幾番桃浪傷流水七里江灘弔古臺白晝風霾山鬼立黃昏月淡杜鵑來一杯何處澆春恨搖落東風意久灰贈東湖釣隱乾坤多壘洗浮丘猶有東湖枕上流金篋何人探岱嶽玉函到處問滄洲山青攜得隨芒履眼白曽看向貴遊莫道桐江正蕭瑟客星搖落釣磯頭孫秀才淳淳字孟朴嘉興府學生復社始于崇禎戊辰成于已已其盟書曰學不殖將落母蹈匪彞毋讀非聖書毋違老成人毋矜厥長毋以辨言亂政毋干進喪乃身嗣今以往犯者小用諫大者擯僉曰諾是役也淳渡淮泗厯齊魯以達于京師賢大夫士必審擇而定襟契然後進之于社張溥天如曰忘其身惟取友是急義不辭難而千里必應三年之間若無孟朴則其道幾廢蓋先後大㑹者三復社之名動朝野淳勞居多然斂怨深矣有梅綰居存草悲婁吟哭天如也偶因文字立雞壇不料浮言起百端生死幾人知痛哭風波惟我共艱難北門學士虛華屋南郭先生為撫棺不負當年風雨夜並將松柏厲餘寒倪君益以燈字索詩畫船前月醉西陵曽羡新歌續采菱歸去但逢漁火出夢中猶認六橋燈龍湫山人李天植天植字因仲居平湖之乍浦崇禎發酉舉人後改名確字潛夫遁跡龍湫山稱龍湫山人數十年不入城市一子早喪家奇貧門無三尺童厨無㸑婢惟白頭婦相對閒績棕鞋秋冬際俟天目僧至償其值易去又劈竹為器鬻于人往來海涯九峯頽然窮老後復耳聾與人相接無一言久或相視而泣長吏守帥聞其名訪之踰垣避去山中糧絶或給以酒米非其人雖飢勿受也作詩不規規于摹擬情思宛轉多出蹊徑之外又和梅花百咏多以自况尤為清真雋逸得元白之致有蜃園諸刻雪夜泊舟滸墅以下蜃園集朔雪沈宵柝江關泊未安窗虛得疏響舟重壓新寒梅落倡樓笛蘆垂釣子灘鄰航催曉發得共月華看秦溪桞浪髙桞何年樹春來拂舊灘雨絲搖夕漲風葉捲晴瀾碧送征帆遠青迷釣艇寒飛花晚猶急又作白波看清明日長安旅懷節物傷羈思歸程計夢中桞搖深禁緑花發故園紅鄰火分銀燭街塵暗玉驄上林春已老為我謝東風遊青蓮寺香剎從來古春風客到稀溪光平入座竹色冷侵衣地僻鳥無語林深花自飛相過逢勝侣茶話總清機寄題普慈閣為熊王諸君索賦雲樹為鄰鎖斷橋闌干長日傍煙霄溪流似帶窗前抱山色如屏座可邀花滿客攜蓮社酒月明僧聽海門潮秋來擬趁雙鴻翼同禮慈容望泬㵳冒雨尋菊戲簡知已冒雨相尋憶駱丞兹遊不獨古人能芝蘭只許來三徑裘馬遙知謝五陵紫蟹肥時君莫惜青山晴日我還登誰將老圃圖秋色添個看花白髮僧賦傷鄭嬰垣凍死有序老友嬰垣年八十一無妻無子女兼無食性髙傲物不肯干人真介守者凍死雪中殊深悲悼賦此唁之貧居傲性不干人楚楚衣冠逈絶塵昨夜雪中騎蝶去白雲堆裏一遺民江右魏氷叔枉訪賦贈十六韻老病掩衡門髙士訪山社肅客疏禮文入座欽風雅憐豫久失聰煩君為抒寫遁跡棲名山尋友到荒野髙懷空古人奇文妙天下何幸衰朽翁乃得親賢者蒿蓬生輝光愚拙何陶冶貧居鮮供給愧不具杯斝時作遵海遊胸抱真瀟灑觀濤帶夕舂候旭浴初赭海若與山靈不恨知者寡新知樂莫樂分手念風馬因歌黃雀行不覺淚盈把庚子秋杪余七旬過柴溪精舍喜金車空谷雪竇天隨兩禪師偕集分賦誰云七十古來稀白首窮途始覺非漫向匏樽尋世趣喜同蓮社領清機名山有道兩雲衲東海無家一布衣堪笑百年渾似夢不勞生計問漁磯觀濤閣酌萬定遠海浦潮平一鏡空石欄樽酒此時同秋生故邑蕭條處人在新亭涕淚中山鳥隔林啼晚日江豚狎浪拜西風聞名欲訪滄洲客好向鼇磯問釣翁八月十三夜湯山同雪溪諸禪者看月愛爾東峰月宵深叩竹扉林星時隱隱葉露漸輝輝枯坐依僧定無言息客機相看惟有此憐我舊顔非青龍觀古墓有序青龍觀在觀山西麓松江僧湛之圖改作稍拓其址畚鍤咸舉鏗然有聲窮之得古墓焉方下圓上甎長尺餘首作虎豹形側有晉咸和元年八月十五宜侯王作數字中有石板長數尺有鏡二瓷鉢一又小似鉢者數枚時崇禎壬申五年五月草八日距晉已千三百餘年宜侯王者史莫可考墓前有道有石門後壁後有二方孔人疑內為窆所初開時聞香甚有藤繞墓中鉢中水泓然或曰此古人藏丹之所恨無碑碣可考聊作小詩記其歲月姓氏云千載遺弓鎖碧阿新開日月見咸和蘭膏已燼燈何在緑玉猶存鏡可磨南渡衣冠無故物東來形勝只滄波荒丘好與重封志為爾還吟薤露歌山中訪宋爾恆風吹帆影過西城一片浮雲嶺上晴滿地落花春寂寂萬松臺畔讀書聲某上人以詩訪余山中虎溪無復白蓮開羡爾西崑小李才上人嗜西崑體欲向山林尋舊好不妨時趁亂雲來秋日遊暈頂山千古令人笑祖龍巖前空有白雲封兹山頭角今何處飛作東瀛第一峯春日同社中訪林翁于髙宫山有序林翁不識名號行第三人皆呼為林三老年八十餘結茅山腰終日髙卧大抵老而好靜避人自適山下有園多植梅竹青芝爾恆訪之皆有詩林翁隱居一茅屋繞屋青山皆骨肉故人在昔識翁顔攜我乘春看修竹竹籬蓬户春陰陰苔徑松關鎖猿鹿鄰翁為豫前致辭此翁溪山往來熟有時閒投溪上竿有時閒出隴頭牧鳥啼日暮翁未歸相對羣峯翠如簇遊髙宫之海會庵彼岸真孤絶何年築數椽白浮雲不斷紅得日猶先佛冷鄰山鬼僧貧種海田乘桴吾亦喜秋色正蒼然自金家灣出抵桃花灣而歸地險金家口臨危欲杖藜熬波無剩土東有公冶場俱煮海栽稻有新畦海味珍沙虎此地沙最厚故多此山禽賤野雞秋鳥最貴他皆次之夕陽潮漸落寂寞舊桃溪過獨山殿廢殿幽凉色孤峯入破櫺煙銷蜃氣散龍去海雲腥屋覆藤陰古畦留菜甲青寂寥誰是伴鷗鳥在沙汀採雨詩黴天有雨以布盛之味最佳諸名士有採雨詩今因之以下月令詩茗飲清者事擇水乃先務昔人重䝉泉今則邀天澍時維閼逢月萬種欣沾注搖搖青苗風濯濯黃梅雨方幅當中庭俄焉如瀑布簷溜非不可義不取塵汚貯之以素瓷珍之等甘露水性此獨真茗理庶可悟竹醉日碧筠軒賦桃李皆艷竹獨清紅紫皆醉竹獨醒此君洵自有奇節胡然此日煩罍瓶罍瓶罄矣竹不改豈其惝恍迷真宰移方易向惘不知當年髙節今安在吾聞種竹無期雨即移全憑人事與天時若使沈酣終不改青青安得向南枝和中峯大師梅花百詠選八以下梅花詩瑶英無樹不精神厯慣風霜老更真地僻祇憐玉者天寒應少采香人難醫司馬消中渴不濟萊蕪甑裏塵無用只憐我與汝年來甘讓錦城春西湖處士舊交神千古相知此最真得月總為荒徑友棲巖俱是上流人先將素影驚衰鬢不為閒心惱客塵放鶴亭前三百樹而今無復故山春淡淡疏疏一種神水邊林下看逾真已無蝶翅能憐汝不學桃花解笑人林靜儘多閒歲月山空應少别風塵日斜江路歸來晚數遍墻頭屋角春蟠桃名姓注三神爾亦前身侍玉真一味清虛應近道幾畨榮落豈由人寧添白板扉邊影肯羡東華道上塵我本梁園舊賓客當年曽識雪中春驛使安能寄遠神偶從村落見來真綈袍未必寒於我白首徒傷老向人自抱孤情成獨立豈堪隨俗學同塵萬家簫鼓千門月誰問空山寂寂春蕭然無纍是清神深谷如依鄭子真調鼎未逢黃閣老臨粧不妬漢宫人髙寒只對中宵月解脫何憂萬斛塵若問長安舊知已漫勞持贈一枝春一種翛然物外神豈從今日學韜真芝蘭社裏無前輩鴻雁天邊亦故人老去自能耽白業夢來何處著紅塵上林瓊樹知多少怪爾先偷碧海春煙添精爽雪添神臘後年前看始真品格可稱天下士嬌癡寧學掌中人蹇驢尋處聊乘興社燕來時已絶塵今日歲華從此改家家門户貼宜春倪教授端端初名涵字惺孩平湖清溪人父醇字鍾白著白雪談柄端家貧父殁與母遷于龍湫山之陰以教授為業喜為詩好客每蓄㫖酒以供吟友兒輩悉教治農圃有隱者風李潛夫結社海上引惺孩與宋爾恆王青之往來酬和有放蛩集登陳山扶屐盤山磴悠然望不窮海濤斜捲白秋葉遠含紅西北瘡痍病東南賦稅空漫言天地大何處老微躬宋秀才咸咸初名斌字二完後字爾恆覺非其别號也平湖乍浦人工舉子業好詩讀書于陳山潛心易學著有易說李潛夫為作萬松臺讀易圖說性倜儻不拘小節工臨池筆力遒徑又善奕家貧薄遊金陵上湖湘有卜居半山之志不果而卒有覺非草金陵遊草忘機杜詩選莫春李因仲攜具偕同社過訪山齊留宿取意不在遠閉此悠然門讀書白雲午俯仰几席尊泉飛雨聲來我友命酒樽相見各一笑天趣洽後昆情真得薄醉禮簡有奧論取次選髙石振衣望乾坤須臾日西逝歸影馳暮村越客戀清景半榻恬夢魂中宵妙語默淡茗生月痕聚散雖固然依依神理存王布衣偉偉字青芝平湖人登陳山訪李潛夫頽壁疏櫺古寺荒佛臺相傍讀書牀沙彌打餅修山供逸士攜壺探錦囊一片石根雲卧冷萬株松影墨痕凉磁甌飽飫龍泉水問取獰龍鉢底藏徐太學爾穀爾穀字似之石麒從子石麒殉國報忠寺僧以木匱盛之炎暑中將及一月事定爾穀變服入城載至祖塋具棺殮啓匱顔色如生握手沒爪鬚髮怒張爾穀後以松江事波及死于江寧妻孫氏聞夫死一女在抱棄之赴水死立而不仆一門之內臣死忠子死孝婦死節僕死義嗚呼烈矣丙戌夜坐萬籟劃然起凄凄中夜聲鐘鳴秋在寺月出雁橫城簫鼓當年夢琴書此夕情莫嫌山鬼泣白首盡佳兵贈顔先生萋萋芳草望中迷落盡棠梨水拍堤誰向扁舟憐别客白雲相送板橋西倪主事長玗長玗字伯屏平湖人崇禎丙子解元丁丑進士授蘇州推官轉兵部主事生平博學好古善書法精于制義臨文伸紙往往終日危坐不成一字然一藝既就其瑰奇瑋麗幽峭奧崛之致直足驚人駭俗上擬周秦非漢唐以下所及也豫謂自有明三百年來讀書種子無此異才而世之龎眉俗士黃口小兒甫習章句抄襲一二陳言爛語偷取科第便儼然稱縉紳矣嗚呼如伯屏者其無負乎時文者歟次曺秋嶽年兄韻守約安貧賤良朋辱過存吾衰誰與怨疑義幸逢論草上雨珠碎天邊弦月昏坐來更漏轉香減酒巵痕五更風雨急驚聽到桃花薄幸迷紅浪攜賓怯緑莎平疇芳草亂上國美人賖好會浮生僅遲君天外槎徐舉人郴臣郴臣字亦于嘉興人崇禎丙子舉人有文名與張溥並主壇坫為人然諾不茍以友朋為性命其詩務為新奇不肯蹈襲亦一時勝流也初受業陸别駕槐眉先生别駕孫渭沺亦執贄于其門並有聲藝林淵源蓋有自矣題吳娘畫竹五日為斯畫休猜振筆遲湘山無限竹一葉一相思桞枝詞水隔南村渡小橋低頭吟處識纎腰欲教嫩緑剪溪水忍向東風折一條溪默老人錢繼章繼章字爾斐繼登弟崇禎丙子舉人孝友力學鈎纂甚富晚年築溪默園綴石蒔花垂老不倦有逸民遺風詩曰雪堂自刪集素心慧質幾于支許清言矣落葉負薪出南郭危嘯上東門丈夫志不死飄泊不足論歸來問黃葉積墜無晨昏雖懷剝落感生氣歸其根謁于忠肅祠楊公湖海一偉人詩心劒氣山水因觀其精神起落處磊磊洵與古者鄰我今謁于并謁此風吹細草如蘭芷頭顱墮地非偶然自令頑懦低眉死淋漓誰讀壁間題喚起隔葉之黃鸝嗟哉詩句是何物枯瓢我欲投深溪南城日光東市血一寸丹誠空切切石人背上紀歲年髙揖松花落如雪祠為楊修齡先生所葺元夕飲吳仲圭墓上道人死後氷霜在老梅寫出氷霜怪半枝鱗皴半枝僵山鬼守根嘗夜拜琉璃却照梅魂歸薜荔為衣女蘿帶更闌私語孤月前我爾行藏本一𣲖斤斧烏雀不敢辭嚴冷如君君自愛穿街簫鼓漸銷歇林氣夜清喧不礙素琴亂帙同留連惜兹佳會何時再西窗月沒僧晨興抱甕却澆墓前菜題家孟岸舫閣以臨流勝斜陽亦帶寒燕鶯人共語竹石水相安坐客惟蒲褥藏書恥畫欄靜參淳朴意山好不須觀園居風雨漫成二首風雨聊蕭甚山窗啓閉難甫能含野景漸恐著春寒鞭笋橫穿閣雛花矮近灘山居無眷屬松竹慰團圞春岸鴛鴦浦秋籬橘柚門閒風欺獨樹細雨慰空村魏晉談何易羲皇枕頗尊客來能宿此衣染竹苔痕鄴城懷古橫槊髙吟善世才斯人豈肯隱蒿萊赤符尚屬山中裔紫色先華閏位來業擅三分心未死功成百戰老還催冬春射獵秋書史漢孝亷終亦快哉園居次韻土室柴桑潔有痕移家直欲比桃源一叢幽竹新添徑幾個閒鷗晚到門小閣靜資書卷亂髙軒爽愛夕陽昏此中何物清娛眼楓葉蘆花共一村贈徐松之十年師友痛離羣芝嘆無由救蕙焚蠧簡已􅍆同永錮虎賁猶復想遺文髙懷楓葉吟邊露細語松濤定後聞却恐中年損歡趣共君陶寫一溪雲吳舉人晉晝晉晝字接侯麟瑞長子崇禎丙子舉人卒年二十七海內詩人俱為詩挽之有蓬蒿園集詩學長吉多屈曲之音是時如陸芝房姚叔祥輩競以此體相尚而晉晝時有雋句人不能到也釣臺先生自不識天子文叔何曽知故人珠澤涪溪各成志玉璜金鎖俱飄塵當年梅尉附瓜葛比舍桐君遺藻蘋倣佛雲仍自蒙叟碧波深處通濠津粵行舟發檇李敬次大人述懷池草夢惆悵竹林懷古辛一舟千嶂月雙劔百蠻人古繭臨書放仙螺酌味真關河誰物色磯鳥故相親崇德中秋語兒涇上繫輕舸語兒涇前聞櫂歌客逢端正那堪别月惜玲瓏不肯多沙觜一痕牽紫荇浪花雙疊走紅螺坐來幽瑟添無限釂盡清尊可易酡聞磊齊家給諫叔氏以豫告還里志喜三首獨辭仙掖謝明恩吾道于今石介尊天下共推江次伯漢江革以諫議稱病天下重之山中重續許雲村吾邑以黃門髙尚者杞山與叔二人而已霖收碧海龍歸窟露吸青霄蛻在園有别業名蛻園應笑竹林遊子倦不隨童稚候江門綺里當年返鳯阿家風重和采芝歌屠龍手在調猿鶴補衮身閒製芰荷緑野客來呼白滿清齊花發草𤣥多松風未解葵心結消息虞淵望魯戈三年雷雨回天力萬里雲霄去國心大隱宅傳蘿石舊叔氏居為從吾道人舊址遊仙風馭竹田深竹田仙人福地今為别號故云何人共領鷗湖社有客將歸華萼林大人亦賦歸歟未即遂不審阿蒙堪預否談𤣥他日竊知音大忠祠二首祀文信國陸丞相張少傅張陸南行逡復巡文公此去不回輪乞師此日無援楚蹈海何人肯帝秦秋雨浪花千掬淚春風麥飯一杯塵蘋絲荔子來時節拜罷青天泣鬼燐青山何處慈元殿突兀諸公俎豆留趙氏又生嬰杵臼雁門重續魯春秋炎颷欲颭清霜下逝水難消碧血流落日輕霾人不見秋來花外聽軥輈梅花經春荒却讀書臺為惜氷顔敢自回一月伴君差可老百花從此不須開鉛華不愛天孫贈彤管難通鳯鳥媒願與花神乞延夀一教桃李識仙才絶句黑雲如海濕難飛寂厯漁翁暝未歸拾取籪頭雙雪尾秋江深處挂蓑衣劉芳芳字墨仙嘉善人有清喚齊稿留别余小星萍蹤來古剎楓亦在山紅意氣輕文字鬚眉招賤窮何妨相爾汝不覺漸西東岐路一時淚堅持夜月同巢先生鳴盛鳴盛字端明嘉興人崇禎丙子舉人題匏杯回也資瓢飲悠然見古風剖心香自發刮垢力須攻不識金銀氣何知陶冶工尼山疏水意樂亦在其中錢僉事柄柄字仲馭相國士升仲子崇禎丁丑進士授南職方轉郎中察軍政剔夙弊中涓欲有所撓糾之不少枉南都稱健决郎遷廣東僉事請養有南園唱和集文園雜咏二首慷慨還吾輩風流讓古人插成沿岸桞採遍隔江蓴客子新愁渴郎官舊耐貧青門瓜漸長隨地掛車茵天際浮雲散登臺攬翠微西來風雨是北去雁鴻非第宅悲金管關山念鐵衣中原兵氣壯未敢說漁磯園居感事詩八首渺然天水立浮屠風雨西來味不渝橋板斷時衰葉補女牆低處逺山扶文身去國吳公子作賦褱人楚大夫欲廣絶交千百字芭蕉寫盡再編蒲蓴絲未老釣絲輕恰有壺觴訂此盟魚鳥晝閒秋易永池臺夜冷月難生黃花伏枕時情遠紅樹登樓古意橫願借銀河三尺水斷槎浮去海波平東阜蒼茫可卜幽括囊猶恐不安流學他竹裏開三徑讓爾車前看八騶蘭茝有心辭雨露蟪蛄無意識春秋一燈水榭銷孤坐著作虞卿未是愁閒心甘比石頭頑周道今成九折灣天許屠沽藏異物我從鐘鼎辨神姦桃花隔斷終南徑芝草分根少室山幽恨同人渾不可新來乞巧學奴顔功名不敢問天公意氣都銷濁酒中豈有鴆人羊叔子甘為遁世鹿皮翁文心浪說題鸚鵡物態誰能指螮蝀莫笑青雲容易致原來腐草會從風沿坡野草向人凉醉踏啼蛩十里霜聞把唾壺驕處仲亟收焦尾贈中郎幽居剝啄風塵少末世吹彈歲月忙暮倚柴扉無所見羣鳬趁水下橫塘山居不敢夢仙查隱几看澆數種花物外峥嶸唯五嶽人間曲折似三巴隔簾月帶松篁淺照水煙翻門巷斜為語霜楓堆客徑一丸函谷是吾家架閣成樓傍竹叢小山松桂半相同閒僧投足秋光外幽鳥防身樹色中滿地蘼蕪分曉露沿階苔草縱吟蟲年來榆桞尤蕭瑟引得哀蟬一夜風沈伯子長祚長祚號純嘏思孝孫有緑蘿莊小咏阻風江上去郭才數里濤聲尚拍天黃柑洞庭樹白鷺太湖田雲暗客帆集風腥魚網懸何當嗟物役鷁首正茫然沈仲子鴻祚鴻祚字載猷長祚弟有鶯葉軒稿有所思銀漢秋來萬里清憑髙一望四愁生佳人此夕應腸斷公子何時與目成白苧歌殘雲欲散綘羅剪就月空明芳華不信終虛擲曽向青樓浪得名沈季子延祚延祚字遠猷鴻祚弟有玉蘭軒稿雜詩湘簾髙軸越羅垂夢裏分明倚雪兒水調歌殘人不見半輪斜月挂桐枝項太學禹揆禹揆字子毗秀水人崇禎間太學與李尚寶子椿同殁於兵落花一番風信客心驚怨粉愁紅迭送迎香篆三更雞舌冷錦泥十里馬蹄輕夢回故國無知已流落天涯不問名最是芳顔憐易改難將綵縷繫長生孫秀才愚公愚公字伯愚𢎞祖子有惜誦集妻周淑英亦能詩遲月團光一片洗雲緑吹落清寒上髙竹幽人冷掬露下衣欲往呼之入書屋挂我窗端古望舒盈盈望斷金蟾蜍安得晨風鼓雙翼結璘同駕飛雲車朱絲夜冷紅香死直上丹樓讀寶書菊影桞秃楓殘花事非晚香寫照入秋肥籬霞浮動枝隨步燈暈初升蘂上衣空搗𤣥霜羅雪染應分素月簇瓊飛酒闌山谷箋堪賦未許西風鬬葉稀叠雪羅簇香瓊菊名悼內二首花朝半與蘂珠飄淑英沒於甲申花朝文魄雖寒尚可招鬢影隔花芳跡斷衣香伴月膩痕銷空餘指粉青編印冷入琴言素軫凋一幅畫圖誰得似芳懷那許箇人描絡緯聲凄讀史燈蕭蕭殘夜醉瞢騰繡牀剩縷針空聖奩几埋塵鑑似氷雨鬢風鬟人不見鶯愁花泣夢難憑忍寒何日山公報諡作閨師最上乘倪秀才撫撫字曼青嘉善人崇禎間諸生和仲馭南園詩廓落成冬事孤樓不厭憑愛閒先遣鶴忌俗并疏僧詩似交難少泉因雨易增稜稜天地色池月共如氷馬訓導鳴雷鳴雷字國威號伯臺平湖人為靖江訓導經喪亂歸里乙酉七月遇兵命家人曰我老無所之若等各宜遠避城陷獨坐空堂遇害觀海不信春花拂淺紅愁聽新雨積空濛偶來日落登山屐遂覺寒生破浪風蜃市隔煙翻去鳥漁燈吹影斷歸蓬三更起讀枚生賦響合濤聲正未窮吳通判憲憲初名文憲字萬為海鹽人貢授衡陽别駕嘗單車解散廣塘礦賊又率百餘卒援桂陽逐流賊後免歸有陶閣集落花二首連宵花信釀輕寒狼藉燕支樹底看啼老鶯聲隨霧散銜殘燕子到泥乾朝霞忽地吹成粉暮雨時教幻作丹無限春風盡消瘦沈香休更倚闌干亭亭花影照重檐飛向閒階已乍添紫陌有時低拂面朱樓何事競窺簾因風繡户關容入映水金鞭去復黏若問向來承寵渥佳人親試玉纖纖長安雜書所見蘂榜翩翩濁世佳目迷五色戰場譁朱門競奪風簷錦金穴重開鎖院花縣價通都明有數濫觴曲市蕩無涯誰憐貧女荆叉儉夜夜寒機嘆月華拒賊金堤鑿大梁望洋河伯遂湯湯洪濤不剩城三板朱邸全沈水一鄉王氣陰戕衝鳯泗國漕中涸徙淮黃茫茫盡壑誰貽福守汴功先叙未央守忭諸公引水拒賊河反灌城遂陷出山霜簡飭官邪去國青山日影斜從賜玦環皆雨露忽迷天地有風沙清流黜矣鉏黃犢公論譁然降白麻剝盡孤陽陰愈盛𤣥黃野戰日紛拏劉公宗周以申救給諫大行奪職堂司回話敢支吾嚴訊纍人喘未蘇臨案期令寃立洗讞詞肯教法重誣鴻冥千里違雙闕鷗夢扁舟入五湖碩果只今都已盡感時淚血濺春蕪徐公石麒以輕擬姜熊二君奪職淮南雜書廣陵北去接淮陰銀鎖葳蕤繡閣深三十六場多估客黃金買斷阿儂心西湖雜咏二首儂家茅屋翠微深清梵潛聽漏半沈生得阿侯虧佛母攜來雙拜海潮音萬壑松寒集慶宫梵聲依約景陽鐘玉顱醉死冬青老猶有山僧捧御容俞秀才允懷允懷字懷兹平湖人明末江浙多以文社相競一時有婁東金沙雲間西冷之目允懷受知於張天如冉冉名場三十年發為聲歌多髙淡寂寞之想自名其詩曰海濱野老集讀史雜言赤輪起東方流光迅如矢歲月積暑寒往來無善意馳驅多少年忽焉老死至立石峴山頭沈碑襄水次無聊作異想千載憐其志陳秀才時時字九若勾餘人寓海鹽能作大草書遒徑有致兵起時或見其書帙盈兩袖間笑為腐儒釋不殺時拍其肩大呼曰上天好生兵怒遇害歌者以西施舞侑觴巧將歌舞學西施宛見吳宫第一枝秪恐當時浣紗處風流翻不似今時吳推官鑄鑄字鼎吾崇禎丁丑進士司理江西廣信時冦氛方熾鑄計斬渠魁張普微等餘衆就撫平反疑獄如夏桂洲後裔艾南英受誣俱賴昭雪除夕和石鳴咏不窺户外不聞兵村野閒聽爆竹聲世上升沈經幾變山中蓂莢未曽更雁書音斷知何在柏葉香浮儘自傾人地即今先得暖江南無事只宜耕馬參議鳴霆鳴霆字國聲號具嚴嗚雷弟中萬厯癸丑進士由閩縣知縣厯官山東濟南參議以河决罷歸弔閩中陳烈女仙遊陳綸女許配姚楷未婚而楷亡女詣幃痛哭絶粒旬日死漢竹曽分剖九仙貞魂久訝惜芳年伏靈一夢晞朝露辟穀千秋泣夜鵑志烈古來髙截髮聲蜚此去永垂篇峩嵋月黯凄風木疑與槀砧訴墓前檇李詩繫卷二十一
