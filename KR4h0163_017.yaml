body:
  text: 檇李詩繫卷十七平湖沈季友編明談參政昌言昌言字聖俞號凡同一號狷石嘉興人萬厯甲午解元辛丑進士令常熟婺源欒城皆有治績升南兵部主事歷轉山東參政督餉登萊濰令與遼將有隙兵民阻鬭東撫以聞一時鼎沸言諭定之朝鮮李忠弒主島帥毛文龍為介請封擕貂參賂言言拒之時魏璫擅政言不與交通遂造蜚語中其管餉同知翟棟緹械至京言以不能救憤恚嘔血卒思廟登極録贈太僕卿賜祭葬有仕學遺編并狷石居藁贈韜化如祝髮一莖芝草伴名禪愛爾皈依擇勝緣此日髮隨煩惱去衲頭長裹苧溪烟彭巡按宗孟宗孟字孟公號天承紹賢子不就世爵中萬厯辛丑進士知朝城調滕縣升御史巡按湖廣參內監杜茂盜葬顯陵山麓福藩贍田坐𣲖楚省獨多三疏爭之乙卯加賦孟持不可楚得免有侍御集對雨不是逃人境衡門故倦開雲隂淡疏竹雨色長新苔欹枕青山逺窺簾黃鳥來翻嫌揚子宅問字日相催雲岫庵深林絶嶂古珠宮策杖幽探一徑通石竹迎人當户緑山花供佛上階紅鐘回轉覺諸天靜月出真看萬品空便欲皈依尋了義閒雲無著與心同家園薜荔深深覆短垣縱非壺嶺不塵樊久無踪跡煩開徑小有生涯到灌園聊采溪毛魚共躍偶拋菰米鳥爭喧由來海客機能息枉殺人稱養拙尊彭闕宗礪宗礪字闕鷹窠山丹梯杳藹白雲籠極目扶桑海氣紅大壑潮音雷鼓震諸天幻影蜃樓空雪山勢挾神鼇去風御長驅萬馬同何必褰裳凌宇宙新詩帝座可能通孫光祿光裕光裕字子長號瀟湘嘉興人萬厯辛丑進士官光祿少卿有廉善堂集西陲聞警西來烽火照邉隅鐡馬驕嘶塞草枯聚米已籌山谷未防邉曾設鸛鵝無黃河岸上寧遺竈青海原頭有斷弧惆悵從來征戰地蕭條漢壘夜啼烏李龍南培培字培之秀水人少從唐一庵王龍溪逰萬厯間以貢任龍南令有水西集入社有序年來就李諸髙年鄉達結有十老㑹已未春余歸自䖍南姚羅老適轉官北上余補十人之缺獲追杖屨因賦卜築半村郭猶欣隔市㕓清風三徑竹碧月五湖船社結香山侶詩摩大歷賢明忩了無事日掃衍波箋竹枝最是吳娃鬭好衣一番時樣一番宜宫粧盡改從前飾五彩春衫繡折枝鍾太學鶴齡鶴齡字羽修號竒山秀水人萬厯間太學生善書畫著有竒雲山堂集屠隆稱其詩簡淡𤣥散有天際真人想答王崑崙逺道空回首相知即比鄰布衣交莫忘彩筆夢還真夜雨肥黃獨秋江老白蘋只今搖落後得句好誰陳寄懷余宗漢記得秋風裏髙軒到薜蘿接䍦狂欲倒下若醉偏多白練書還在朱絃調若何不知梅發處早晚共誰過東臯子殷仲春仲春字方叔秀水布衣慕隋東臯子之為人亦號東臯子工醫術博通六籍百家書法晉唐有葆楮廠賦為黃學士沈司馬所稱陋室如繭不蔽風日絃歌賣藥淡如也每㩦數十錢行遊市中購古帖殘書補葺讀之往往申旦不寐有子志伊胼胝糞田而好讀晉史父子皆能酒嘗分杖頭之半篝燈夜讀遇顯者輒引避華亭陳繼儒贈詩云櫻桃花開春可憐何處行人不放船却羡白頭殷處士鷓鴣聲外獨耕田贈志伊云一領青蓑五尺鋤日斜槲葉護茅廬歸來濯足城邉石曲録牀頭讀晉書著有棲老堂集息遊庵為陶大冶賦薊北翩翩俠概餘風塵遊倦返蓬廬無車不用彈長鋏有帳還應授異書移石萟蘭春徑曲鳴琴坐竹夜窗虛不妨栁市同為侣咫尺相過賦索居栁枝詞别有新粧更可憐踏歌連袂栁堤邊不愁月出還家去貪看鴛鴦水上眼緑楊垂縷一溪隂掩映桃花色更深花憐易落如儂貌水流不定似郎心王廬州家彥家彥字仲美號繩河吳江人寓籍嘉興中萬厯甲辰進士授韶州推官後補廬州俱有異政卒官著有獨秀軒集丁酉榜後遊龍井遣懷不作世人愁來尋勝地遊虎馴溪有路龍化石成湫列岫偏當户流泉欲上樓悠然起遐思何問水東頭沈秀才中畏中畏字警存號荆門嘉興人其才博洽髙曠工詩古文詞擅書精醫深於禪觀詩酷嗜李于鱗嘗赴省試過按察司徘徊不去人問之曰吾思李于鱗耳人問于鱗為誰因占一絶云策蹇來遊過臬司濟南文物著當時峨嵋天際空相憶說與君家總不知一笑而别有集十二卷不傳其孫起亦諸生明亡祝髮歸浮屠號墨庵人稱為墨禪師題梅道人墨竹一葉蕭疏意出未描前倒折欹枝欲拂肩幾許風霜摧不盡猶餘一葉繞秋烟過府丞庭訓庭訓字爾韜號成山平湖人萬厯甲辰進士授江陵令邑際大江有淤田數萬畝為楚藩漁利訓履畝清丈悉歸諸民升御史疏薦鄒元標趙南星等救荒山東多所全活雲間周積賢題其賑荒圖云男生呼作過公兒女生呼作過公女此圖一獻天顔開敕付蘭臺傳信史丁艱後督學南畿轉湖廣參政晉福建按察時璫焰方張訓恬守外藩久之升應天府丞未任卒崇禎初追録賜祭贈府尹生平好濓洛之學手抄性理諸書或勸以講學曰學何事講為嘗夢謁程明道見程衣冠縞素異而問之明道曰太中先公之喪豫以蚤逝不獲就苫土故猶縞服也訓曰某童時讀定性書終身體貼不盡明道曰家弟更有啓發處遂寤後南都人士竟以從祀程祠似有冥契焉乙卯春奉命至山左恭謁孔林平生切景行今至聖人里曲阜氣葱葱書雲匝天紫上古少昊都春秋葬孔子諸樹藹參差楷木更森峙我聞一太牢始自漢髙祀素王編世家龍門稱長史尼山對防山洙水分泗水摩挲古七碑愾然思杖履大哉聖人風萬世同師理姚尚書士愼士愼字岱之平湖人萬厯甲辰進士選庶吉士改吏科給事中疏諫開礦忤㫖謫福州經歷歷升大理少卿論救給事惠世揚疏云附閹之黨所宜早定爰書擊逆之忠豈可尚稽恩典疏上世揚得出獄奉敕推勘魏奄奸黨以六案定罪升通政轉南刑部尚書致仕詩見館課集重輯內閣藏書有述聖朝崇藝文網羅古所稀牙籖列萬軸縹帙映黃扉匪誇圖籍冨鈎深在𤣥機微臣職編緝仰占東壁輝藝蓀潤几席風清午漏微恣覽豈足多望洋道岸希默思備顧問守要以為歸北山主人沈師昌師昌字仲貞號長浮世居嘉善麟溪孝亷爚之孫也為諸生不得志遊北雍卒於京邸家有北山草堂壘石為重巖絶壑久而與地氣相習一望蒼翠漸成真山中有古松九本扶疏廣䕃師昌處其間與名緇野叟結雲水之契藏書萬卷吟諷蕭然著有詩文集北山雜咏人生非無根厥初不可紀乃自苕霅來卜居麟溪涘諸祖尚敦龎隱名冨圖史爰及百寉公輪奐於焉始思親無停時築山勤仰止匪為耳目娛將以貽孫子封植樹千章奠安石萬只綿延迄於今令聞代可指惟豫困樊籠弗克踵前美登山發長謡永懷在葛藟冬暮與異度遊髙梁橋步至極樂寺溪流曲曲樹參差精舍名園隱墓祠恰似江南風日美蘇公堤上夕陽時悼梅二首有序悼梅詩為梅道人作也道人居邑之梅花里即埋玉于此今海內騷人韻士無不知道人産魏水是魏水藉以重也而入其里弔其墓土不掩槨碑鮮全製所創梅花庵填塞墓前庵僧俗氣逼人使道人見之必當嘔噦遁去余向一再過開士之宅已為狐媚之窟今幸黜去道人始不與摩登伽鄰矣余謂宜倣孤山葬逋翁法繞墓栽梅數十本墓前屋悉為撤去傍搆精廬擇詩僧吟誦其中不可則實行禪那又不可則清修居士如曰猪嘶狗嘷無非道韻棄尸裸葬别有家風余言姑置勿論若欲採訪隱逸封表丘墓成他日佳話則賤孑自謂如上所陳足備邑乘補遺梅老有靈故當賞此勝國名流四大家迂癡樵客及梅花黃金不惜收殘墨白社何曽護半跏東築層臺北築亭紅塵還隕少微星題詩欲寄飛鳬客好傍梅庵再勒銘馮太學伯禎伯禎字正伯敏效長子有青陽集古渡有客新從古渡回潮升潮落子陵臺滄江烟靄接天外一笛晚風明月來馮舉人伯禋伯禋字欽仲敏效次子萬厯丙午舉人有南歸詩弔羅將軍死難詩斗大孤屯是敵衝虎旗飛渡白山峰橫尸萬計名猶壯堅壁三辰救不逢力盡忠心隨白刃時危枯骨抱青松只今義勇曽聞幾幕府須教上實封項中書德成德成字上甫號少林元汴次子官中書有靜逺堂詩訪友人白社人何處青山杖策尋扣門驚雀夢入院踏花隂一榻雲栖冷三杯草坐深低回耽絶勝烟靄碧沉沉祝學博守謨守謨字廷明嘉興人萬厯間婺源學博有滄洲集婺州山齊作草閣春風上雲閒入夢多寒泉飛石澗絶壁挂烟蘿林靜時聞鳥山青日對螺客來開酒甕落日起絃歌陳太學泰交泰交字同倩秀水人萬厯中太學有齎志集相看行宣武門前乍盤馬江北江南臂堪把楊栁枝枝忽倒垂離雲莽互生四野五陵俠客無淚痕今日相看如雨下郊居信是郊居好柴門帶白沙小堪容客坐大略似僧家開徑刪枯籜穿田讓野花悠然濠濮意醉起看明霞費太學朗朗原名慧字元朗嘉興人萬厯中太學詩以淡雅為宗嘗曰古作家苞萬亘昔事型物矩我不能也本朝諸子炫市肆飾倡服汞為金椒刷糞取帙大如山我不忍也竟一生之力得詩一二百首稱詩人待後代位置則不敢多讓以故日事苦吟致病而卒吳興友人茅元儀惜其所志未竟取而刻之曰玉碎集江口送吳凝父還洞庭枉豫愁别緒君自厺來輕作客無常主還山仍獨行江船須次發風信不時生歸卧洞庭夜楓林霜氣清西湖竹枝詞二首妾家北山近湖口但到黃昏郎出漁燈盡歸來天又曉他人只道合船居堤上兒郎盡踏春獨伊馬去轉頭頻想因專為看花出不看桃花只看人沈布衣昭昭字明德秀水人與姚叔祥陳無功為布衣交時沈司馬重九半郭樓落成有作和章畢集叔祥袖出明德詩司馬賞為第一時李伯逺在座大罵曰何來袖中使我居後由此詩名大起蓋諸詩皆崇美司馬而明德獨語語斟酌殊自髙雅著有微吟一卷和沈司馬半郭樓落成韻遙聞半郭樓成日正是重陽雨過時賀客風前誰落帽主人天上獨題詩當空明月臨窗近極浦寒雲到檻遲豈謂青門終屏跡暫憐秋色在東籬送郁文茂之新寧州幕遊到新寧興未闌殊方風俗得相看野苗嗑嗑通人語村嫗紛紛識漢官地少陽坡稀種菜水多薌澤競滋蘭衙齊正見梅花發不似家鄉一樣寒竹浪老人徐𢎞澤𢎞澤字潤卿號春門自稱竹浪老人嘉興人幼業儒既而厭棄之日摹法帖吟陶杜詩閒寫竹石遇得意不論疏密貴賤咸與揮運嘗于三月褉日集畫苑名流寫江干七樹各出意匠而𢎞澤老筆紛披推為第一評者謂書畫在姚雲東上著有竹浪齊藁鶴汀書屋野意曠平逺樹色渺森瑟雨洗沙渚清風捲蘆花白臯禽何處來印此沙上跡警露冲凉霄宿霧斂雲翮景物凄以幽千秋契逋客小築嵌秋空鴛水漱巉石微瀾蕩餘暉漻然爽詩格擁几耽咿唔把酒時岸幘徙倚南榮間徘徊試自適佇目望長空懷此下上隻寄語勿驚起衝散秋烟碧戲效九龍山人竹石日光紅照露初乾洗出鸞凰翠羽翰信得有人傳此法九龍山下筆芒寒馬郎中德灃德灃字淡真號以容平湖人萬厯丁未進士厯任刑部郎闖宮變起德灃與王之宷意合嚴鞫其事尋以擬御史劉光復罪忤㫖降級調外扁舟就道卒於真州天啓初以功在國本贈奉常卿贈吳懷耕抱膝吟梁父秋風入袖微閒鷗浮竹澗疏雨溼烟扉宦薄貂長敝名髙客未稀封侯丈夫事且莫問漁磯髙知縣登第登第字仲登號任野一號嵇散嘉興人萬厯間官醽縣令著有梅庵吟娟娟曲遙想當年張麗華化作娟娟墮狹邪紅粉叢中行第一清歌妙舞最當家娟娟雲夢回巫峽繞湘裙娟娟雨浸漬珊瑚膩於乳娟娟風枇杷花下燕匆匆娟娟月載花船上偏明潔娟娟髮曾向多情金剪落娟娟眉春山寫出捧心悲娟娟目雙星炯出秋波浴娟娟腮兩兩桃花碧鏡開娟娟齒瓠犀乍啓綾束咫娟娟指笑折芙容玉為矢豆蔻含香雞舌輕錦紋羅襪蓮花生一朝嫁作伊州婦鈿蟬零落渾身素