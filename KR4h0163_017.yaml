臺省交薦起補湖廣江防道轉閩藩尋移蘇松乞養歸生平熟于政事凡軍兵多寡錢穀出入以及土俗形勢經濟大略無不矯尾厲角抗論鑿然一代治才也田園詩不淺蓴鱸興君恩許挂冠城隂三畝宅日暮一漁竿風翮秋飛鴿花泥晚種蘭兀然微醉好髙枕傍䦨干曹御史谷谷字愚公號石倉一號鹿柴秀水人萬厯癸丑進士官應天學政御史思廟初以黨纍間住落帆亭青青栁色雜桑麻舊跡荒凉罥綺霞孤鶩聲隨寒磬下盈尊影墮片帆斜榔鳴五兩停遊騎纜卷耶呼泊釣車若箇秋江離思切月明深夜訴琵琶吳知縣中台中台字稚文崇德人萬厯壬子舉人官邑令有淡寄齊集落花紅英飛盡淡春姿又覺臨風動逺思若到明年好時節開花仍是落花枝沈教諭維鎜維鎜字新卿號雲門平湖人萬厯間桐城教諭平原弟招飲秋暑已銷歇芳尊傍晚開月光隨鳥去花氣入杯來興劇宵渾短歌長晚欲催平原一夜飲十日玊山頽沈太學如璋如璋字稚圭崇德人萬厯中太學生􅮶磯二首有序鳩兹之西灤江之滸石磯鬱嵂欱吐濤瀨其上則漢昭烈孫夫人祠在焉井穴叵測神蟂所宫殆亦靈變之翕忽肸蠻之竒絶者歟傳夫人委葉玉體躡跡馮夷信邪妄邪怨耶否耶夫既為蜀帝妃可不復為吳主妹乃謂其返吳歸省則夫人昧有行之針沮蜀勸駕則武侯坐不情之罪篤歡魚水絶愛伉儷則先主召白頭之怨所以千秋之心不白過而拜之者愴然興悲也效矉十絶則踵陶使君為之匪云弔古聊以寫懷一磯突兀撼江空敵國孫劉在眼中不惜珠沉龍窟裏斷魂飛入永安宫春花春樹壓江湄腸斷宫人斜裏時若非秦女磨笄冢自是湘靈鼓瑟祠髯臞翁蔣宗淡宗淡字交如號方泉晚稱髯臞公淇曽孫少攖家難棄制科中歲屏絶外事唯蒔花弄石與道士蘇天頑善究參同抱朴之學著有古逸民傳贊明世說先賢言行録慈濟簡易方碩薖堂吟稿採蓮曲採蓮復採蓮為解渡口船蘭橈擊波去岸岸垂楊烟吳興天聖寺觀趙文敏畫松壁王孫妙染碧虯寒三過苕中偶一看何事世人爭鍳賞懸崖尺幅鄭家蘭崔知縣培元培元字辰長一字孟辰海鹽人萬厯乙卯舉人官邑令有音潮草堂集楊花詞楊栁花飛蝴蝶忙垂絲裊裊繫情長數聲玉笛江南引愁殺春風馬上郎屠秀才中孚中孚字德𦙍號敏瀾應埈孫荗才有重暉堂集金陵懷古江水日潺潺髙臺積翠間眼前渾六代雲外半三山秋氣凋隋栁寒烟隔楚關不堪人事改惟有白鷗閒陸封君在前在前字令瞻平湖人有霏玉集子鏊貴封副使竹塢雙徑塵容盡柴關晝不開燕乘韶景至人約暮春來戲蝶環紅蘂叢花媚碧苔芳郊堪一眺策杖竹間臺般若庵回溪涵碧抱深丘結此禪扉事事幽檐鳥啄花投座客野僧分鉢餉江鷗孤雲靜鎖雙峰翠一水平瀠兩岸秋白社勝踪尋不得竹林空負謝公遊泛泖飄零還合伴漁樵江上烟霞也自招小港舟橫留晚笛髙空雲掃過秋鵰愁憑竹葉消長夜笑買鱸魚趁落潮載得芙蓉比西子酒闌猶悵玉人遙耘廬主人馮洪業洪業字兼山號荗逺平湖人長身鶴立眉目如畫披􅌁衣冠晉巾遇之者如神仙中人家世貴盛折節讀書登萬厯乙卯賢書生平精心釋典鐫大部梵經藏於徑山晚年尤信養生家言以為神仙可致家居城西宅舍園亭甲於一邑其别墅曰耘廬為畝三百周遭浚濠內為連山復嶺植梅三千築室其中名雪窖植海棠千名海棠巢植桂二千名桂香徑馴舞鶴三十餘每於宛樓上擲果爭啅一時文酒之盛比之玉山二十年來劫灰滿眼且有伯道之痛蒼山片石豈堪復問即遺稿一編已為他人覆瓿物乃知前輩名章湮沒不少使采詩者亦有百年世事之悲矣從耘廬往西溪看桃花同孫令𢎞趙退之賦問津良不逺小艇晨相過微風蕩渚尾春水如輕羅香霞掩芳徑紅雨㸃晴蓑豫本山野人晞髮思巖阿之子秉貞素樂此同調多何當杳然去烟水一放歌眼見秦人溪古洞埋青莎揮手顧人世悠悠將奈何屠郎中襄孫襄孫字贊之應峻曾孫萬厯乙卯舉人官刑部郎中栁枝詞灞陵道上栁千條盡為行人送寂寥奈可春風無賴甚更催飛絮過長橋羅秀才仲㸃仲㸃字序生嘉興人千户所籍文學飲酒相將看菊斑聊此滋蘭畹頽然斗室間㑹心不在逺張布衣廷勳廷勳字無功秀水人飲酒支離拋歲月曼衍拓心胸好泛杯中蟻閒消匣底龍林布衣中英中英字儲聲平湖人萬厯中布衣秋懷家在西陂上烟雲盡日封雨深寒落水霜重夜聞鐘招隱千株橘歸來三徑松秋光猶可惜野岸老芙蓉于學究克成克成字叔明秀水人萬厯間學究有薜蘿居草對雨簡洪慶之别館真無賴瀟瀟奈若何愁心生澗草暝色上烟蘿巧哢枝頭鳥秋添水面波懷君情更劇風雨可相過髙秀才松聲松聲字元雅一字谷傳本姓王秀水人萬厯間文學以書法擅名與從弟淑民號雙隱水肥齊獨築茅廬在水西開畦種竹近前溪風翻弱栁鳥聲澀日暖繁花蝶眼迷飲水心安肥病骨拋書夢適類山棲等閒老我無他好五嶽猶思一杖藜王布衣淑民淑民字子逸松聲弟亦工書性嗜酒與羅序生張無功為飲友日逍遙於麴糵之場頗得晉人風致興適則吟小詩各盡四聲得一百六首彚為一卷曰百六詩其詞大似醉中喃喃語意雖率直却無一筆近俗固深於酒者飲酒二首先生何姓氏亦復何許人客固欲知我聖世之酒民愛此稱醉翁嗤彼稱醒老咄哉塵世人誰識醉鄉道孫太學𢎞祖𢎞祖字令𢎞簡肅公孫太學生與陸芝房趙退之陸叔度馮荗逺諸公結詩酒社為人骯􅗣岞崿不為世所可乃一意求快於文詞多詭聞異藻幽踪獨韻迫為感慨淋漓之致自比於怨姬思婦焉著朴語影語可笑言諸刻夢朱懋忠先生有序余嘗言君側之惡自古難去先生在垣首疏女戎逮諸人攻璫大獄猝起先生再召再廢追尋余言顧匡山自老乃亡來一年忽夢娓娓以經生言見示是耶非耶在昔遊京華抵掌天下事標榜由漢東朋黨自唐季安知鼠與狐耽耽有宦寺頗信知幾言擁旄忽如屣奈何生死别芻狗更相覬蟻慕非吾徒鴟嚇復何異經怪桃花源外人莫能避終然不得路黃綺焉足比郡中載花還兼懷黃履素至尊憂社稷諸君營室家老圃竟何事鼓枻載名花言念素心友行行天一涯劒津或可合猿嘯夕陽斜沈雒川瑞鍾瑞鍾字德培號徵梅長水先生長子嗜古好竒祕籖怪録靡勿搜覽為文竒崛深奧讀者棘喙不能句即往來手札必淋漓竟幅纍數百言試冠多士者七十餘次而終艱一第益復清狂自放後以選貢為陜西雒川知縣不習吏事有古鐘聲聞數十里日登樓擊之官舍數楹四壁皆羅古書嘗與夫人乘鹿頭小車帶軟弓輕箭射中其架即翻閲諷咏纍日不厭其髙僻之致往往類此尋罷歸晚年𤣥冠白夾古色照人詩卷盈帙今皆無傳僅從珠樓石刻得存一律編蒲小子不禁文獻之慨云題弄珠樓考見題咏波光如鏡泬㵳天檻外湖風更渺然十里翠飛春嶂小九門寒鎖夜珠圓紫裳神女遺花珮黃鶴仙人問酒錢我亦樓頭舊崔子題詩空擬白雲篇彭秀才宗因宗因字季親紹賢季子少為諸生後棄去與髙僧耆宿結社賦詩有寤歌室稿私諡節隱先生挽元宗上人憶昔匡牀話今來不見師泥香留燕子月色冷松枝未竟三支業唯餘五字詩一空諸有相何異在生時魏忠節公大中大中字孔時别號廓園嘉善人萬厯丙辰進士授行人厯官吏科都給事中性狷介剛毅為諸生家酷貧至不能舉火湫巷數椽上漏下溼晏如也及在諫垣彈劾不避權貴遼左失事之案朝議欲處楊熊以不死中執法與司冦爭謂不當末减於是羣小側目時魏閹初用事於內而外廷猶人才濟濟髙邑趙公為太宰忠憲為御史大夫應山桐城為中丞相引重武定新昌皆在要職而中長首垣共欲激濁揚清以致太平㑹應山上疏罪狀逆閹中繼之抗章極論閹銜之尋值晉撫缺㑹推謝應祥謝嘗令嘉善與中有師生誼忌者因此劾中得降調家居趙與髙亦相繼放逐閹借封疆事謂中受熊廷弼賄矯㫖被逮中從容就道至則下鎮撫榜掠備至誣坐多贓五日一訊必加全刑死獄中崇禎改元贈太常卿諡忠節著有藏密齊集壁立齊歌酌酒勸君君開懷聽我歌君壁立齊男兒志氣㑹有極壁立不立休逼側我無四壁賃人住晦明風雨雜烟霧主人其中弄兩丸周遊太極環無端吁嗟兒女匕筯繁東啼西號驅出門長途奔走事衣食自論夙昔非所存旋已作書報妻子前途溝壑朝朝是丈夫此語非不祥殷勤自護生晶光病婦小瘥且績緝大兒負薪小据拾拂天雙袖長風吹歸乎未歸難與期歸來解槖出乾胏四壁笑人羞欲死君齊壁立無安排酌酒勸君君開懷良鄉彰儀門西路桑乾古渡分長羈乘傳馬不斷出關軍沙白迷荒戍城黃壓暮雲車牛徵到骨募𣲖底紛紛茅檐小詠二首借得茅檐住荒蕪不掃除星寒知怯鼠春漲欲通魚一徑野籬密半墻秋草疏雨餘添蘚暈曲曲作蟲書率爾茅檐住悠然歲五除午階消戰蟻晴盎數遊魚人在靜中妙交於契處疏已知無一事頭白只傭書酬歸父有引中以畸世嘖有煩寃匪罵而笑十人而九既貧且病揣分宜然䝉歸父投之佳句白豫素心詞賦之科謬期司馬遂有此作身以詩名賤狺狺未可聽此心誰許素君眼却為青雨雪憐同病江湖問獨醒只今無狗監章句說明經洢兒能詩却賦慣是貧多事生兒又賦詩未堪供客眼聊以慰吾私每念有窮日仍疑無始時青山應好在何地許從師姚孟長以文于二祠詩見投感而有賦年來蹤跡愧簮冠握手西風為一彈正以憂時圖灑血那堪弔古頌留丹間關海陸徵求急咫尺雲霄伏闕難朝列異同何日定愴懷不獨是三韓觀音巖追次羅念庵先生韻青玉壇前枕雨眠㑹仙橋上更茫然乞修枯竹時燃火駐我孤笻且聽泉葛袂籠雲渾欲溼芒鞋踏石不禁穿山靈若靳重來約耐可歸槎夕照邉息遊一夜秋聲萬木寒乾坤何處足彈冠時名盡向黃金起世事都宜白眼看已自故人嗟落魄更誰同病問加餐風塵伏枕衡門穩行路於今轉覺難乙丑夏五二十日宿睢陽雷雨徹宵砌葵俱仆曉霽葵起有翹然向日之意感而賦此祗此生來一寸丹風風雨雨故催殘傾心不信天長夜霽曉團團仔細看漂母廟偶然一飯在塵埃誤却千年過客來滿地江湖尋漂母王孫如此更堪哀朱巡按泰禎泰禎字道子號白嶽海鹽人萬厯丙辰進士授龍巖令調漳浦天啓初拜御史巡按雲南有𤣥對軒皆山館逺人樓巡滇紀行諸稿曲陽閲武作熊彪顧盼羽林齊雲錦驍騰萬馬嘶番將自來雄噴礴天家今已築鯨鯢刀環寶月橫髙漢貝胄明星爛大堤更有象奴供末技行看雙兕踏新泥夜宿禁中臨軒聖主賜衣裳頭白監官檢藥囊禁漏初長擬封事玉樓天半夜蒼蒼檇李詩繫卷十七
