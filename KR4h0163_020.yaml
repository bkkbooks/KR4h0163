body:
  text: 檇李詩繫卷二十平湖沈季友編明曹侍郎勳勳字允大號峩雪嘉善人崇禎戊辰會元授庶吉士官至禮部侍郎時門户角立勳負時望在講筵每隱護正類侃侃言之乞養十年留都召起見時事難為規切相臣尋以母喪隱居東干自署東干釣叟著有存笥行笈未有居東干諸集詩以情意為主近似公安而就紀律者同館劉胤平方肅之輩同聲共響雖一時風氣使然實得詩人和平之旨舟居一帆無定指聊得避紛紜水宿常疑雨山明更喜雲酒情須午過暖意近春分自活爐中火花前不敢熏南池次少陵韻不為南池勝誰來艤客船橫江人似鶴深樹晝宜蟬李杜千秋句青徐六月天鄉心看逝水此意冷於氊別爾新稍為君留亦不遲且賖山約待他時未行先擬將來訂才晤仍愁既去思欲寫凄迷艱一字終慙決絶負雙巵滿江風雨孤舟夢怕讀方髯南嶽詩指肅之冬日京邸漫成枯栁如柴束幾重煨來榾柮覆缸紅滅炊未肻羞童子徙突何曾誤乃公鼠壯欲消三月俸貂寒還怯五更風春回不管人南北歷歷江雲在眼中三日小飲女郎處相逢便約煮新蔬近水衡門且食魚避客轉憐雛校史辭官猶署麴尚書當場二妙爭花案隔壁三家認草廬最是間人間不得平章風月又春初得左大來梁辰須裴晉卿諸門生京邸書兩年始到天上人間嵗月移故人猶記老漁師登髙肯許乘風便望逺寧愁計日遲吾道不隨滄海變世情惟有碧山知只祈耕稼村村足未敢逢人賦黍離長至後三日大雪白年急景笑蹉跎一線長添得幾何麥種未青方破甲梅稍先白已交柯天昏土屋雞棲早嵗儉瓶糧雀耗多似報明年秋熟好不愁寒壓老漁蓑閨詞澄澄人坐碧琉璃今夜清光定屬誰干瓦鴛鴦俱露宿紫衾輪與睡猧兒沈參政胤芳胤芳字隆生號菁莪海鹽人崇禎戊辰進士授工部主事歷升淮海副使流寇大亂淮西間芳練兵以備禦寇不敢窺欽授參政専理漕儲革陋規十萬剔積弊數十條甫一年挂冠歸里有希園集讀朱稚韜贈許雲公採茶歌茶熟花香簡送迎村齋得此意偏清近來頗怪盧同癖但聽爐頭沸玉聲往澉州弔二吳有感曲曲灣隨面面風故人謾卜永安宫溪流盡處孤峰出多在荒涼萬木中談主事貞默貞默字梁生號掃庵昌言子崇禎戊辰進士授工部主事丁未寒食作春當三月閏寒食半春期冷暖花無奈陰晴栁自知波翻紅燕襪草染緑蛛絲此日江南景偏饒兒女癡次草萍驛讀孫忠烈感懷王文成擒寧籓詩路發三衢説爛柯尋山其奈候人何田餘紫葉經霜老林亞黃團照水多薄暮野亭萍理宿百年怪事夢中過額頭殘墨看燒燭寒雨清吟噉饆饠顔家海茁茁春空暈淺霞軟紅鮮碧泛妖斜生教東郭為名樹但説顔家便看花連蔭弄粧遊女襪出籬撩影酒人艖最憐薄睡臨幽月杜老無言興自賖附考嘉興白苧村顔氏有西府海棠共四株極髙大著名禾地花時士女遊觀甚多采蓮曲睡起打新蓮蓮塘紅日鮮珠兒停葉露曾得幾時圓少年行翦水雙曈面渥丹紫袍繡镼鶡頭冠秋雕度影來天外盤馬陰坡撚箭看竹枝相思子結合歡花連理枝生並蒂瓜情種原來無草木春心到處便生芽料理平林小築簡門人汪爾陶挂瓢未作買山翁且籍吳涇釣户中燕幕鶴寮分置定還餘片席禮希馮地在吳涇橋畔有顧野王讀書堂李太學肇亨肇亨字會嘉號珂雪九疑先生子與掃庵同主鴛社工詩能繪事有率圃吟稿琴言閣新咏所作如秋澗流泉雖波濤不興亦自清泠可恱觀吳繡君寫蘭戲贈粉痕墨筆香濛濛披圖為我開芳叢斜揎翠袖起盤礴十指沸沸生春風數枝柔倚楚畹碧雙蒂半吐湘煙濃緑蛾低映螺黛濕紫幹微雜胭脂紅春宵苦短宿酲渴疑有清露來瑤空吁嗟此花何遭逢不愁零落向空谷常在佳人玉腕中贈王修微女冠旖旎溪雲淡蕩煙水沈香氣暗衝簾生綃白夾輕籠臂粉頰青絲半軃肩清許夜琴同鶴夢舊分曉黛入詩禪散花手腕春風裏自寫蓮經繡佛前畫景霽色石橋流水蒼煙沙塢人家誰向曉風吹笛江寒落盡梅花金陵鍾山王氣曉蔥蘢絳碧嵯峨玉砌重一自君王移蹕後監門不打未央鐘贈吳眺雪家在天都第九峰白雲常繞翠芙蓉杖藜欲問經行地春雨莓苔認鶴蹤畫景千尺寒巖俯泬漻夕陽沙樹影蕭蕭帆檣髙下喧魚市知是江風送晚潮王休寧佐佐字佐之號樗崖嘉善人崇禎辛未進士休寧令宛陵道中鄰鄰石齒潄溪沙片片青山挂晚霞鳥道一痕天半落輕輿扶入紫藤花屠檢討象美象美字幼繩平湖人崇禎辛未進士授行人對䇿稱旨改翰林檢討疏薦倪元璐李邦華等三十七人尋罷歸築園郡城建百杖廊極泉石之勝後房廣蓄姬妾聲伎繁豔乙酉聚兵於郡為怨家所殺與象美共事者倪長玗也贈王旃林思入春風散彩雲緘書意氣動相聞俊民吳越空慙我老將幽燕舊屬君多病士安忘世態窮愁虞相見斯文居然一榻談經處諸子披襟坐夜分項太學真真字不損秀水人崇禎初太學以罪下刑部獄死有甓園詩草括蒼遊草楚咻帆談諸種懷吳稚文吳子談經鬢未絲官間却與懶相宜衙空亦可容魚隊俸薄才堪買鶴騎苜蓿一園知不飽梅花兩載豈無詩思君明月清樽處姑篾城頭望眼遲馬封君德澍德澍字以霖號商雨平湖人襟懷髙曠雅善賦詠以子嘉植貴封給諫有未刻稿一卷西溪探梅露浸東湖一杯酒相送西溪幾回首中宵伐鼓出郊原月在船頭煙在栁石橋竹墅舊往還夢魂先繞秦停山西溪有秦停山紆回百轉迎清旭鶯啼春早開人顔千樹萬樹色皓皓髙枝低枝盡蒼老如濤噴雪搖晴空如龍蟠泥見鱗爪遊人多點夀陽粧輕裙十里吹暗香粉蝶翩躚霜蘂舞滿山石髮俱清涼窮歷幽林愁日落榻借青岑俯層閣浮生心賞人百不能得一花下應須飲十日微醉溪灣月伴衾再起看花聲瑟瑟侖者山翁陳梁梁字則梁亦稱梁父初名昌應字夢張海鹽人年十八皈依蓮池大師法名廣籍未幾走長安上書不用晚年無意於世自稱散木子有莧園詩人稱莧園公有侖者災浣筆池藏稿或稱侖者山翁亦稱浣公自題其墓曰生無愧怍去無牽纒其聨云與爾同龕枕米汁至今孤冢有梅花有個亭集為文光怪崛特竒不可句而事必準古言足垂世詩亦如之評者謂其如湘川亂雲峨嵋殘雪知言哉杜門言懷二首清泉煮白石二旬苦未熟名醴引無數水晶鹽作肉外稿如木死密藏學蟲伏懷人固妄同對影豈恬獨劉倫雖不貴頽然嘗自尊禪阮雖不富而能妄其貧何必富與貴乃可以驚人人生在適意適意在率真病人病心尤靜天晴竹更妍想唯棋客至妙得酒方傳塞竇憂風仄推窗喜月圓了知年命促姑妄話神仙癸巳除夕西湖殘雪碎如苔寒煙一棹開白髮間今日紅裙解進杯鷗來增道伴山暗籠雲回旅寺仍沽酒分題得探梅刪嚴詠暑數竿修竹徑新開容膝吾安禦暑臺懶未曬書愁伏斷間方煮茗待僧來談禪淺亦恬生死説夢空能任踏跆徒自苦無康濟法耳聽得過口銜杯別徐陵如鬱氣結為山自欲拔去髮不見徐陵如如無天上月海上看雪潮留天外聽還停日照沙明布地星但是青山無不白只留白塔一山青賁趾山翁陸啓浤啓浤字叔度平湖人弱冠博極經史不事章句倜儻負竒通輕俠類河朔壯士好談論古今成敗知邉塞事扣之纚纚不可窮也少為貴公子性豪邁嘗遊建業命酒泛舟召舊院名姬大會詞人於秦淮酒半一姬倚檻微嘆曰惜無兩岸紅蕖佐此勝集明日復置宴比客至則晚風拂席荷香襲人舉座莫測其故蓋於是夕懸金購得數百缸碎而沈之自是十四樓中皆目為樊川復出生平纍致千金緣手散去詩法全宗少陵有賁趾山房集讀嘉郡諸先生集十二首有序夫稱詩説禮士大夫之髙行士而論其風土則必首舉其士大夫以為重亦且曰老成人典型在焉客居無事簡攬遺書蓋有鄉哲之集十數家隨手披讀略致景仰若我郡洋洋大國家璞人珠二百年來其與於斯者厥亦孔多他日倘或間暇盡心肆目求之作者之林以補後牘則生晚幸甚大司寇鄭端簡公曉端簡負神姿讀書須一過壯行遂有心逺覽専典故所見非尋常援筆亦貞愫寤寐通明王森嚴備武庫一代憲章言後死鮮其互宫諭屠先生應埈屠公踐詞林文局矜自制有法御中樞無言避廣麗辟彼織錦絲玄黃各分製緯握擇所施毋為澀蠧異巵言曾載區東京雜史裔庶常王先生梅庶常籍金閨漢庭尚寂寞鬱鬱古雅資不得登著作憔悴一官難詩魂更夭折孫子負薪行若敖安所托悲滯搜短編玉也何須尺尚寶戚先生元佐爝火難自飛芝蘭易為感尚寶生嘉隆國華正霳霮賦詩哭濟南胸中具玄覽豈曰黃鍾歇八音吹不散青藜一片光照者猶暗暗黃門許先生相卿黃門秉沖德稍一登廊廟徴彼恬淡操乃在熙和調性靈不藉雕咳唾清自肖龍旌時見招豹隱永呼嘯敢以長者言拘文論年少贈太常前儀部陳先生泰來儀部立朝日十九方弱冠抗疏耀前星志氣何沈悍納獻固嵩髙著篇亦霞燦卧龍回驚波鵩鳥逼柔翰喟焉身後名聊謝無兒嘆司成馮先生夢楨司成文辭家曠若煙霞侣奕奕餐紫芝所革盡凡緒問字酒滿庭卧花人在墅違時無近心養德在逺舉小子生其晚時聞貧士語少司馬沈先生思孝司馬性耿介披鱗不避創慷慨歌戍邉其聲遒以壯一朝天日朗中外表端亮剔歷日以深斫輪見大匠歸卧鴛水濵風流有遺唱曹郎袁先生黃坤儀髙悟人談經舉靈脫沈頓青襟間百家遂隱括一官著書輕千年翳霧撥弗借詞林支自捖儒宗鉢漢代明經者注辭亦己達少詹事黃先生洪憲碧山表卓鍊竒容掩衆色臣工信有専制義罔遺則屈法雕蟲間曼辭乃細德相士握明珠藏身羡鴻翼優遊門第髙養和以登域少司成沈先生懋孝司成大雅流中嵗早閉户身聞王李言落落分其路探經非匿理立誠乏詭步世乃執委端秦漢強自附賁園十萬言白首焉所慕汾州太守曹先生徵庸逺生尚清言冰雪參妙理在衆每遁形涉世偶恱已寥寥秋蟬聲吸露吐清泚明眸欲向人顧影旋自止人事不可論逸散安所紀過爾唯陸舟話别秋風滿天地吹我破夾衣城東照殘火扣我良友扉燒燈待我至沽酒充我飢坐我竹樹間寒氣相與微暗葉響庭右淡月過萎菲萬象咸凄寂談話猶霏霏逺念十載事宿鳥忽驚飛遊子不成寐起視河漢稀出門即道路萬里還依依會面安可必念子當復歸題房大年畫奚官牧驥圖元朝諸君好養馬萬國選上咸驊騮天間牽靮披雲錦畫出屏幛風颼颼學士大夫愛執筆松雪老人名第一曾向平沙畫翻滚筋肉一團舒卷疾蹄毛圓動宛不停牧奴突眼驚欲失詔下畫院爭臨效得其筆意才待詔此畫畫自房大年不畫翻滚變騰跳一匹緩步兩匹前首尾交嚙騧毛旋奚官執轡氣矯結瞻視與馬相接連畫馬宜如相馬真不取形似取其神今之畫者但形似騏驥入手同凡侁三輔種養貴肥腯御廄收牧中涓人可憐天馬不得見俗眼與手徒因循前年天子獲五驥顧視相臣立名字紫霄赤電隨皮貌崇禎十年內出五馬命閣臣題名付之厮卒謹調繫未知此馬何所能過都厯塊誰可乘君不見九方髙相馬驪黃牝牡非所稱良驥終不逢伯樂垂耳伏櫪長悲鳴鬭雞行有序都城有此戲秋時見之客有持鬬雞圖者送錢五百為余取酒命余題之且言此圖出自御供幽燕之人性好鬬放意角爭托鳥獸羊馬怪異久失傳雄氣紛然寄伏鷇觜毛徑發三秋天致養往往先春候𠯑咮雄雌非一種好事詢求必逺購當其羽翼短未成愛惜調護分昏晝辟若養士百千金﨣赳桓桓待禦冦誰家錦埒開雞場泥沙細滑黃花囿五陵年少抱雞來彩袱蒙籠紫苴繡雙手捧入未解開胡髯拂拂映袍袖五色輝煌忽立地昂頭却顧神湥秀驍鋭已覺誇超羣沈頓致許終入彀逡巡睥睨若緩之雙翅忽展急馳驟掉首瞋目流赤星揮膺炮距翻玉甃須叟毛落鬖鬖飄赤身不用披甲胄鷹鴟悍鷙但一垂鸞鵠翺翔少三覆此物好猛不可當取喜與人捐頸脰觀者衆眼逐雞行進退恨不身相當義拳疾視心恍忽踟蹰勝負攫毫芒巨鹿之陳兵百萬諸侯僅從壁上忙世人悠悠詈雞輩此等詎得名尋常羽林介士衆林立虎豹羆熊號不一安能坐借此雞心我武維揚致徑敵披圖攬視中肅然買駿式蛙同爾德不然明世好鳳皇何用畫雞增粉飾送司馬堯夫之津門眼底知交盡憐君復向人食貧無定迹分手即孤身雲濶兵戈路衣寒滄海春北門開幕府帷幄倚天津遊西山自紅光寺至延夀寺地𢎞曠松柘為多過嘉僖寺特荒略存其名折而北曰證果寺泉聲出谷靜野路擘山開背指紅光在身移青嶂來亂松搖暮雨方丈足秋苔指説前村寺當時證果回挽談友夏雅聞君孝友何以獨詩名易簡真新調波瀾恱後生花飛搖弱草栁颭度殘鶯歎息為朋面三緘負此情十四夜棘闈看月愁裏看秋月髙樓畫角中涼陰棲板屋客淚起霜風泥土如新漬衣裳感舊工五更眠不得醒夢兩叢叢郡歸與遐卿談聚一棹回春雨深宵散冷煙别無多日夕話不盡山川詩思教人靜梅花逼晚妍喧喧城市裏誰意可同傳孫孟朴移舟來晤旅食嗟豫活逺歸見汝難路還年少熟天各故人看芳樹沾衣舊春風掠鬢寒尚餘憂國淚自歎不能乾練市道中見此溪流細逢人問亦稀秋田遺犢瘦村桕擁霜肥市古知山近雲晴聽鳥啼小春天不易雙奬莫停飛朱子葆留宿山樓同沈甫受夜談見祇不能去扶攜復上樓一尊風雨足四幛晚山浮昔共薑肱被曾同元禮舟十年家國事淚盡薊門丘伯淳表兄東歸石莊話别有作旅泊君何好經聲月滿壇詩應良友發老畏衆人看夜火寒搖市郵籖細出灘田家風味足豈獨憶張翰和黃存晦念熊經略詩兼呈胡太六大司寇十年天地竟何如重憶橫戈撫劍餘方略虛傳充國老篋中謗滿樂羊書感時黯淡歌臨穴當事從容笑覆車祇有廉生稱弟子向人雙眼似當初同程端伯咏鴈字詩槐葉黃時薤葉丹幾人閣筆眼初寒漫將八法傳雲女裁就三書寄鳥官塞外無風傳帛易閨中有影寄書難隨陽倘過彭湖澤擬作洪橋一樣看歸興側身西望太行山咫只投繻向玉關有容漫然疑白璧無媒終不悔紅顔流離逆旅人情去蕭索寒風壯士還千載披裘懷想像分明意氣滿塵寰得李煙客祝髮廬山書昔年杖履在錢塘又向廬山住草堂參法直皈新慧逺懷人還憶舊髙陽石梁橋滑褰衣穩瀑布巖髙潄齒香指日菟裘吾計就相尋應到虎溪旁次酬黃平立許余逺歸易水悲歌萬里風五湖煙雨一舟中長安大道驅流馬古戍寒秋斷晚鴻醉酒漫勞王處仲抱琴不學李元忠移文正恐君先我十載徒然草送窮戊子八月十七夜宿陳山寺同諸子贈潛夫道友苾芻薜荔倚龍城早向移文共勒盟處士未忘秋菊意大夫仍愛古松名數聞鼓角搖邉戍往日山川定月明海客自諳滄海訊詰朝即聽午潮聲西苑荷花太液池頭水深深繞建章總然顔色好那得見君王咏蘭煜煜深林色青青楚畹風可憐人不見收拾束薪中寄贈武安呼延美人并序呼延名紅菊字大隱善琴詩有豪士風在劉敬仲公席上聞之閔生趙女髙彈鼓瑟聲十三十五笑盈盈兩河劍客知名姓不似溫柔一樣情送王鱗長之襄陽襄水東流入漢長大堤兒女唱襄陽客心滿醉宜城酒不用登樓望故鄉遣侍兒燕市秋風冷十年羈人歸思白雲天未曾賣得長門賦那許黃金奉酒錢莊學正嚴嚴字銘五秀水人以嵗貢除靖州學正與父友仁唱和有蟾香齋兩世詩稿和秋日寄沈中玄韻喜懼當兹日交遊莫可論髙山空盡眼斜照落低門物色一生渺文章雙鬢存愧餘升斗祿能飽未能溫欖生趙韓韓字退之初名京翰字石翰平湖人無聲先生名動海內韓復繼起時有大許小許之目蓋無聲文簡貴故骨徑如山退之文雄竒故才大如海萬厯壬子貢入成均人謂趙氏父子天下才而兩值數竒焉晚年自號欖生著欖言蠟言蔗言並未刻藁嘗自言生平於詩自許獨步豫覽諸篇雄雋傲兀刋落常調誠一時之豪也如題耘廬云瓶花鮮結子石榻暖生雲萬季元示近稿云得意皆莊子渾身是楚詞探梅云酒情空似鶴人意靜于花咄咄萹云妖嫗尊蛇稱帝子塗人敬虎號山君贈沈孟然云李白腰間無媚骨荆卿髮上有悲風題雙溪竹亭云六逸無如李白放七賢唯笑阿戎低夜集云幽窗恰稱瀟疏雨寒夜尤宜落穆人寄錢稚圭云幽心夜度鴛鴦水好夢春迷蝴蝶花早春云有雀可羅玄草室無魚空釣月明船雙梅云厯落友朋窮李杜孤清兄弟老夷齊皆佳句也出門出門何所向馬飢不可策障眼一尺紗安知我顔瘠曉雪下西山照見長安陌熱面吹寒風悠悠路旁客夜織萹答鄒靜長劉半舫兩先生朔風刺寒閨剪尺聲勒勒盈盈機上女鳴杼中堂側手理冰蠶絲纎細指痕識走龍既神工翻鴻亦仙力猶嫌粉膩沾一刻三拂拭鬻此奉髙堂䌟纑妾所職匹縑易一餐終嵗鮮諧直人言天子都黼黻萬方則眷兹荆揚篚何不致通國破産募長年揮手謝鄉域濯以芙蓉水貯以雲母石江湖怒風濤幾為馮夷得衝關易星霜始作長安殖長安遊冶兒所尚貂裘黑蜀錦及秦篝紛紛意昂抑昨夜昭陽宫又進銖衣式吳綾一萬筐慘淡無顔色同行越溪女已借春風翼朝浣若耶紗夕製霓裳飾悴榮匪爾為引分敢不默素業茍在兹徙倚欲何即羅敷與蘇蕙為我三嘆息娣姒勸勿更姑嫜又相逼擲梭淚霑衣辛苦為誰織自棲霞登攝山頂雙屐自泠然孤情入翠煙古壇靈産藥深洞活生泉陵樹風雷窟江帆楚蜀天生平兀突意原在萬山巔夜宿牛首置身雲壑裏翻不見山形卷幔餐新月虛窗立衆星鈴聲通卜理松氣可延齡清到蓮花漏悠悠徹夜聽碧雲寺青山入孤寺丹壁照空王畫棟飛鱗甲清泉走殿廊萬靈朝帝札百鳥共天香每見金容潤知依日月光靈谷寺幽探不肯慵勝具與緣逢花瓣趺千佛潮音響萬松慈容獅象恱咒食鬼神恭無數峰巒入皆為怪石供同孫令𢎞夜登惠山汲泉非關消內熱同此意清寒投級月亦響出林雲未乾最宜新火候不作老波瀾為與風塵敵猶憐七碗難登理安寺山閣望江由來登此地絶閣幾人攀越嶺當孤寺江聲入萬山供餘猿弄鉢慈心虎投關歸到湖堤上如聞戒律還耘廬梅花宿根不斷返魂香幾線遊絲曳日長漢苑妖錢飛玉蝶江南嬌女字珠娘凍雲切切他山石古意蒼蒼老素王猶怪前身留媚骨紅樓曾點夀陽粧和安無咎寓余虹島作心逺非關剝啄稀梅花繞屋水環扉寒禽榻上窺紅子名酒牀頭問緑衣城柝不驚幽卧穩漁燈遙入夜窗微與君撩倒烽煙外總話江南春事肥贈徐冶仙國醫却怪枚生七發篇奏刀翻在越人前更無針砭能醫俗只有煙霞可學仙名酒好儲秋露水竒書多曝杏花天從今擲去黃金藥恐誤他人五百年哭叔度飄泊從軍國士輕誰為公子拜侯生猶慙馬革收骸骨肯學鴟夷變姓名屐底雲山詩欲畫匣中風雨劍常鳴杜陵無數間關句每讀雄篇便不平子夜四時歌四首白馬誰家郎兩頰桃花冶來去酒爐前金鞭不能下擘取同心帶藕絲結鴛鴦分明離却藕空絲不能長歡自照秋水容光徹底見莫令微風來吹作兩般面圍以暖犀屏酌以玉薤酒酒濃屏又溫何事不可有送馮茂逺北上知君丘壑意中多客路風塵奈若何我是長門秋怨女殷勤勸爾畫雙蛾答宛如以畫易詩總是豐肌笑玉環六橋脂粉亦堪刪髙心只在匡廬頂不寫江南無骨山秦淮竹枝詞隔園情暖夜深杯消息他家又密猜最是小鬟低寄語送茶兼復送花來吳王井轆轤聲裏夜涼秋瘦雨滑滑響碧流猶怪五湖人好在風情不似景陽樓甘羅城孤城留得少年名曉日黃河氣尚英我是夷門遲暮客更無情緒説甘生擬作雪衣解語自憐才寂寂簾櫳晝不開見説閨中新禮懴南屏社裏放生來馮子近社集共擬東湖竹枝詞二首白衣庵裏乞蓮胎儂拜觀音郎抱孩繡得雙幡猶未上阿師先送小名來湖底曾留市井殘安知此地不狂瀾尚書畫閣銀臺冢盡作鄰園古迹看孫秀才爽爽字子度崇德人崇禎間諸生秋懷疏寮映山帶竹漾怒泉落蠻氣集杉松漸知林影薄殘英泥輕寒側側護羅幕結志獨傍徨發憤以著作愴悼雅云厚冥觀還自樂馬季子萬方萬方字遐卿平湖人少負不羈好與酒人遊能髙歌作燕趙聲意有所觸忽碎壺痛哭四座皆驚嘗為其父上書幾中黨禍復上冡宰堂大聲白冤事稍解甲申為亡命罹法逸去籍其家有訥庵草野宿憶靈均子九野宿貪棲寺風來湥樹間栁痕猶繫水人影不留山芳草平生夢孤尊此日顔寒山何處是明月一層關鸚鵡湖舟居詩呈同社諸子離城咫尺即天涯魚鳥同淨水似家秋鏡雲開千頃雪文窗煙罩一重紗芙容香逼蛟龍客鸚鵡洲寒蘆荻花自笑垂鈎無所得輕絲聊借縛歸槎齊魯道中流亡極目問黃沙處處門空立倦鴉踏破馬蹄惟白骨溼來人淚盡紅花田疇彌望無殘粒長令依然唱晚衙不識聖明曾旰食却教新草上封斜香奩體角門斜倚半闌干月上層樓素影殘小步羅屏問金鴨沈香風裏玉叉寒朱秀才祖昌祖昌字令回海鹽人崇禎間諸生野步凄風苦縮膝試步自今朝殘雪留晴樹平沙落午潮心隨鷗共坐吟愛草初髫未飽遐觀意紅塵已覺遙陳中書龍正龍正字惕龍號幾亭初名龍致字發蛟山育弟嘉善人崇禎甲戌進士授中書時政尚綜核爭為深文戊寅熒惑守心龍正連進四疏言事天惟在好生致治當責宰輔上感動特諭慎刑已卯彗星見龍正又應詔極陳立冬大雷電又請正郊期當用上辛竟格不行壬午因下詔罪己復三上疏言時政俱優答時盜賊滿天下籌餉無策龍正著議極言墾荒為救時本計朝議相持不決遂乞歸甲申京師陷南都起為祠部不赴賦詩有京華歌舞新南極野哭汍瀾舊帝星之句乙酉微疾死龍正天性純篤講求身心經濟之學貌癯古兩眸炯然有心計善治生居官甚廉而好施豫著有學言政書文録凡六十餘卷輯程子詳本朱子經説語類陽明要書髙子遺書皇明儒統墾荒兆行救荒策會陶詩衍諸書行世夫講學之流動稱性道而其敗類無恥過于庸人如先生者有幾人哉過句容拜先祠雨後生夕陽淡淡西郭隅西郭何所有祠我先大夫念昔為此邦正當強仕餘暮帶不遑解晨髮不及梳琴鶴猶為纍經畫忘其劬豫方處齠齓梨棗詢有無風霜二紀來天人忽乖徂遺範不能仰猶疑堂寢居哀號莫我應居人怪何如僕御告之故婦女皆霑襦情真無復言淚急乃由愚屢過樂瞻對從今非厥初哀哉其已矣勉為守身圖乙丑春季南還春歸無計挽鄉思隔蒼茫霧重平沙軟風柔衆草香村墟描逺翠蓑笠拜斜陽冉冉空遊侣依依獨斷腸顔推官俊彥俊彥字開眉桐鄉人崇禎戊辰進士授廣州推官被劾再補松江後棄官歸放浪江湖以終村居雜興病卧經旬滿面埃梅花落盡杏花開畫梁無數空巢在社雨蕭蕭燕不來陳泰州素素字淡仙一字元白號大淳桐鄉人崇禎甲戌進士授開州知州復補泰州有隨鶴吟塞園小草行邸間箋鴛湖偕隱詩有序檇李吳子巨手居城北秋涇偕其內君項氏吹聆閉門唱和安貧任運致足樂也但以地鄰㕓肆謀徙鴛湖之南其地雖距一水荒僻加深松竹芰荷猶有存者經營畚鍤吳子於是乎益貧然逸氣壯懷故不稍減茍患交謫庸能然乎爰賦偕隱以美之熠熠鴛鴦鳥其采麗以揚恥與雞鶩爭煙霞相翺翔有湖碧千頃亦名曰鴛鴦湖南雲與樹吞吐生文章中有芙蓉池琅玕蔭其傍唱和香風中飲食明月光謝彼北山羅所求非稻粱題巨手明月樓一水隔人境長林逺近間湖光明似月樓迥靜於山叢桂懷賢古新荷製服間不堪登眺處秋色滿江關
