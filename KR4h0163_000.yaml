body:
  text: 檇李詩繫總集類提要臣等謹案檇李詩繫四十二卷國朝沈季友撰季友有學古堂詩集已著録是編輯嘉興一郡之詩自漢晉以迄本朝凡縉紳韋布閨秀方外土著流寓有吟咏傳世者皆録之而以仙鬼題咏謡諺附焉姓氏之下又各為小傳略敘梗概其山川古迹土風物産亦間加附注以備考據初明景泰中嘉興朱翰嘗詮次洪永以來郡人之詩為檇李英華一書所收不盡雅馴崇禎末秀水蔣之翹復續為檇李詩乘其卷帙之富什倍英華而遺稿散佚遂無傳本季友此書踵二家之後而更加詳博殘章賸句搜訪靡遺攟托之勤殊為不茍其間若趙孟堅小傳沿山房隨筆之誤以為卒於元時吳鎮沒於至正間與楊璉真伽時代迥不相及而謂楊發諸墳不及鎮墓此類皆為疏於考核然其甄綜頗備一鄉文獻亦藉以有所徵焉乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4001a5d1d89bb7b28ac45cc5f3c642b71f8239439a2e7df24d17202972d82443
