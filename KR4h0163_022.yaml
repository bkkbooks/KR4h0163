body:
  text: 檇李詩繫卷二十二平湖沈季友編明寳雲髙士馬嘉禎嘉楨字允和號和衷嘉植弟崇禎已夘舉人每聞時事輒慷慨泣下時就里塾課生徒束脯所入以供二人嘗云兄以禄養我以館糓養各供子職焉年六十七卒無子一女適沈晭方易簀時取平日著作悉焚之今所録者皆其散見之什也叔輪捨觀音首兠頌言以紀之兠羅稱號從觀音佩服嘉名㫖義深智運低眉縫玉線慈敷垂手渡金鍼外看𤣥地有花色内結白綿無染心領取此中妙相足多君挾纊被寒林訪隠者樵子相逢不問名指予山上白雲生此中聞有茅菴在清磬一聲山鳥鳴陶舉人學瞻學瞻字原眉朗先子崇禎已夘舉人兩叩九閽白父寃奔走燕兖十餘年荼苦倍至遂屏跡公車自號退菴著述頗多而簡於吟咏所見皆悲思厥考之詞足占其至性矣除夕煩寃猶隔九重天朔塞南翁又一年冉冉塵中還自苦勞勞車下乞人憐愁増馬齒天將曙閒數黄壚客幾眠旅恨不隨今夜了明朝春思落誰邊登蓬萊閣志感上有先君子石刻乗風事業已蹉跎雲斷滄溟淚較多精衛不能填北海翻教隨處作風波楊舉人兆梧兆梧字非棘號蓉城平湖人崇禎已夘舉人幼孤性至孝登賢書謁見房考詢及世閥大哭失聲一座為動容有師儉堂稿題毛羽儀小像深房披道函琅琅瓊瑶色逍遥古史壇含真在守默焚香坐移晷靈禽當户即不知揺筆人神想駐何域髙工部承埏承埏字寓公號澤外道素子崇禎庚辰進士好廣覽藏書不下三萬巻歴宰遷安寳坻涇三邑陞南京工部虞衡司耽情吟咏長於近體有稽古堂集寄懷徐春門細雨黄花徑空山白板扉貧嫌生事拙病覺物情違獨釣尋鷗夢相思數雁飛何時竹葉酒坐對薜蘿衣咏簾佳人怯曉風垂向畫樓東未許楊花撲先教燕子通窺憐波眼碧捲憶茜裙紅戲問行雲者巫山隔幾重姚叔祥以詩巻見示走筆書贈詩法已三唐吟髭尚未霜花分秋夢艶雪貯夜謌香舊賭旗亭酒新圖樂府章總饒明主棄猶説孟襄陽近况謝客柴門只鳥過短垣繞徑足烟蘿風餘榆莢充錢少雨後雲山入饌多病是嬾難違藥裹命因薄合付漁簔抛書試作湖南夢新緑微添昨夜波春閨幾度庭花發無人空自妍記郎初别去剛及小姑年顧野王讀書堆一丘愁色帯寒蘿六代風流逐逝波何處香魂弔書客蒼苔滿地白雲多記事八首擁兵四鎮號雄藩頴泗誰成犄角援門户三朝還要典奏章多是太平言紛綸兵氣但催官文武軍功考察難半部職方尸贊畫盈衢都督噪長安請求窈窕愛君深豈為干戈徹瑟琴典禮一冠三萬直度支先急市珠金相君底事邁羣才歌舞忘憂玉漏催三䇿未須前箸借新聲還進教坊來羽檄連朝震玉階畫船猶自織秦淮登陴寥落城烏坐拒馬惟催柵滿街長江鐵鎖不遮兵但遏輕裝出禁城令箭飛傳魚鑰啟早看丞相送金行北風五月駭揚沙軍令清街禁不譁一道紅燈馳郭外中涓夜出捕蝦蟇抽兵急拒武昌軍直北長驅迫陣雲十䑕自啣同穴慼一時􅍆付捲堂文沈吉水中柱中柱字石厓號摩青平湖人崇禎庚辰進士授吉水令口吃於書無不讀尤好管韓故為文雄深浩瀚卓然成家有懷木菴稿與鄰丈乞芋寒谷涼生萬葉風病來懶去採青菘丈人甕底如拳芋乞與山厨煨火紅李歙縣松松字子喬後更名公柱竒玉子崇禎庚辰進士知歙縣事罷歸遂不復仕有澹齋艸春日柴桑歸去興如何老我溪山活計多白酒春寒逢社醉青簔雨過答漁歌儘容茅屋招新燕更鑿荷池浴乳鵞閒裏韶華元自好願將餘嵗伴煙蘿馮貢士延年延年字千秋夢禎孫寄籍錢塘中崇禎已夘副榜貢秋月庵春暮作秋月庵居春也豪藥苗菜甲滿西臯三㸃五㸃社後雨欲落未落園中桃時光忽憶蒪菜滑采摘不厭輕舟勞一枝栖息吾意足乍可物外違塵囂黄貢士夘錫夘錫字茂仲承𤣥子崇楨已夘貢士江南曲郎去妾心愁朝來獨倚樓片帆雲外至錯認是郎舟兼山先生譚貞和貞和字誾仲太僕卿昌言次子中南都副榜以恩貢改北天啟五年昌言沒於官平賊功為當道尼不叙和瀝血叩閽璫焰方張不得請崇禎元年復上書陳情烈宗憫之贈太僕寺卿䕃和入監讀書擬授中書舎人知誥勑慨然曰當國者不急社稷而争門户黨錮難解天下事不可為此東漢之季也乞詔差南還社集分賦得金谷日月長麗矚溪山餘素期别廬欣賞間更復賔主宜監軍曠髙懷祭酒澹塵思盤礴澗道上澗冽荇參差竹柏既峭倩藥草復繁滋觥飛罍交錯絃急管威夷迢迢錦歩障晃晃珊瑚枝姬侍列雲屏倡舞喧相追豪侈極人目俱言此㑹稀席終方奏序興往各稱詩遺韻珍當年勝遊示來茲不負嵗寒約意氣歡足持馬徴君文治文治字逺之平湖人遊京師三十年不遇歸家杜門以賢良徴不赴乙酉沒於難虎溪看遐卿弟聴雨山樓入山無所見但聞羣鳥啼沉碧擁虚閣巒光蒼徑迷好風從竹至送雨過深溪冷然起暮凉坐卧成幽棲錢秀才應金應金字而介一字上士嘉興人崇禎間茂材有南雅集詩亦清雋可誦贈張甫此身豈合伴雕蟲落落孤踪靡所同貧不受憐清入骨藝成而下老逾工江南欲覔𤣥真子濟北曽無黄石公髙士如君應有待肯將竒癖問蒼穹焦山煙蘿石甃碧雲堆古刹巉巖傍樹開松檜夜號千壑響栟櫚秋沸百泉哀孝然剰骨清於鶴逸少遺書老作苔同在大江山較僻更無人讀斷碑來江署撥悶城上烏啼過女墻檐牙檣影㸃蒼茫荔花衣薄招山鬼木葉聲乾著海王散在廣陵應未絶懷來宵雅允難忘湘靈不見徒工瑟空有浮光照客囊渡江江心風雨挾龍還擊節中流照别顔千片布帆如落葉長空捲影下鐘山黄秀才鼎鼎字平立一字象三秀水人崇禎間文學有咏遇諸稿其詩才思雋永情致幽異然刻意好新遂成僻見以背理處為深竒故余特取其詞意可通者存之金陵篇雖不佳猶是傑作詠遇詩二首銅馬沸中原赤眉毒荆表陣火燒將星勁卒受餘燎何人張國威一出息雲擾流人墾先疇劬勞賦陽鳥桂檝尚藏壑天露空為霞君子似孤鳥小人如亂麻聞言即交喪遇事恒獨誇矜慎蘇門嘯痛哭漁陽撾金陵篇四十韻一劒雄開日月清萬山湧出緑縱横髙盤暗叱風流鎖静極嘗吹雨露生已自踐華誰設險恰從占洛遂居貞白流魚入先符勝赤走蛇分憶降精無外逺通蠻頂踵宅中庭禮漢簮纓天官識𣺌躔先定太史推微歴又成閶闔晨開朝玉帛九天雞語挂珠瓔壯連石鎧犀永士威動朱旗列宿兵御柳曉參青輦路翠華春漾紫絲棚漢宫流赭分馳道軒后飛黄入舊城長樂夜深聴漏永羽林嚴衛立秋更鑄金風馬濡弓劒在藻泉魚濯澡烹祖徳有光前樹厚河宗無瑞不知呈侵梁錦浪翻梭室阻面錢山積水衡苑樹株株常帯霧島門曲曲盡通鶯百靈變現千秋氣萬馬騰驤七萃營朝采壁寒棲鳳扆登封香暖暗搴英屏藩上泝天潢雨戚里遥瞻日觀晴任則文思看博陸茂因鴻緒得東平才髙石室門元李譽擅銅樓種盡檉鄴水自然陵舊長兎園誰肻讓諸盟凉移井絡千門鑰緑轉簾絲九曲筝天廏露啼春苜蓿石城雲換夏倉庚浣紗淚沒長干雁濯鐵泉燒澗屋鐺百尺歩揺金串子樂遊詩在水花名䕷蕪舊滑青鞵跡豈䓻重聴寳璐聲扇響夜深星箇箇巷飛霜白杵丁丁靈和線弱思嬌婉角枕更長上水晶怕向月中長比影笑來煙裏學吹笙謝推雅量山俱定江夢花齊手半驚我亦渉江愁問古君先攜櫂慰兼程時時沙鳥眠蘆白日日孤衷向北傾兩掖紫雲朝王氣滿身榮霧識河明髙深望約非前侣出處人將莫與京曉對鼓鐘悲老大醉看河漢作悲鳴筆揺草色生樓閣夢借湘靈結珮珩義只婉為謀劒口達非容易問蓴羮懷多感激嫌歌吹欄近秦淮記槳行宿昔偶攜儂上渡至今猶有緑澆苹何當惬却従前願散盡千秋此夜情馬太學嘉松嘉松字曼生徳澄子有花鏡雋聲北遊瑣言十可篇東湖著諸集淨業寺賞荷花古樹生涼好輕舟趁晚停臨池横綺席垂幔覆花亭黯黯杯浮白離離屐礙青鳥歸催客去暮氣濕前汀雲王居士王端端字正始别號雲外平湖人又稱雲王居士中年棄舉子業學劒好兵家言時方多事乃撰車戰圖等書走南都干當事卒不用翻然東歸開圃種菊喜為詩將死屬其子以處士表墓龍湫山人為立傳江干玉乳嚴灘雪金枝禹穴梅十年攜研過三度帯帆回雄劒吳星耀竒書趙璧開蒼蒼松路溼屐齒印莓苔秋海棠美人出秋水顔色類春花解語含風致芳心淡月華濃粧紅映玉小睡碧翻霞無限深宵露盈盈清淚斜歸思﨑嶇客路自今難造化茫茫狎弄丸稚子無官騎竹馬英雄有淚灑金鞍徒刪白蠧千篇古未割青氈半席寒我亦扁舟思故國春風吹緑下長干五經進士譚貞良貞良字元孩昌言季子崇禎癸未以五經成進士明年闖賊破京徒歩奔亡達南都授禮部主事典廣東試未達境而南都破羇棲野寺衣食不給竟流離以死初貞良往粤經里門偕親故酌酒城南湖上謂坐客曰少時見聲名為世所指者心慕之自罹國難見昔日負非常者盡䘮其生平使世反以名為諱要之竒士必深沉自好伏而不出其詞慷慨有世道人心之慮舉坐改容又舉一觴曰明日就道恐此酒難重持也舉坐驚起凄然灑涕吁先生可謂無愧其名矣竄跡新豐髙寓公以乙酉夏感詩見示漫和原韻廟堂何事日紛争黨錮成來孰老更未仗屬鏤慙國士誰揮羽扇救遺氓故園曉夢驚無主新鬼宵啼慘有聲血淚共彈珍重意謝文嬰杵舊齊名沈彤菴師疏薦同門髙寓公史才兵畧應以列卿召聞寓公躬耕養母有終焉之志詩以寄懷血表陳情謝典樞漸離擊筑渺愁予孤悰未許依蓮社三顧従教出草廬功在封疆天子詔名髙江左故人書年來國史須傳信莫向灘頭學釣魚樓桑謁先主廟系出中山近名従小沛聞卜鄰占李定望氣得周羣象叶黄龍瑞符仍赤帝文全家頻脱險一旅忽能軍名士收諸葛英雄獨使君志寧摧百戰力已限三分淚盡髀生肉魂歸棧入雲枯桑遺廟折野火斷碑焚繫馬靈風至題詩塞日曛枌榆存舊社絃管尚紛紛錢秀才熙熈字潄廣栴長子沉静簡獸少負雋才年二十七卒有思存集春日風雨小室髙林雨氣微遊蠭衝溼負香歸可憐數樹花千片化作春風一日飛霜華道人錢默默字不識栴仲子八九嵗能為詩文崇禎癸未成進士知嘉定縣有吹蕭艸留别巳庵禪師慟哭青山路已窮西風箬笠梵音宫破家何處尋滄海入社還須問逺公詩思髙樓明月冷禪心古柏小庭空寒鐘一響浮杯去囘首千巖落木中留别其翁居士平臯揺落不堪論滿眼清霜犢鼻褌此去梁鴻非舊日相逢宋玉與招魂鵠飛四海長風逺猿呌千山落日昏擊筑吹簫便揮手不知何地報君恩别道源上人乍雨乍晴雲滿岑松隂苔徑碧沉沉半山樓外聞人語古石龕中出磬音月映空房清客夢風飄寒梵動疎林開門覔得向山路三十六峯春艸深雜興幸買深山與世違探書禹穴淡忘歸鐘沉古寺寒燈滅雨過中林曉月㣲花裏子規愁客路船頭緑水濺征衣六千君子風流盡空見春城柳絮飛吳貢士天泰天泰字謐生嘉興人崇禎時貢生有星帯艸堂集涿州寂寂樓桑邨下路王孫販屨竟何之豫州若向幽燕起子幹應為帝者師錢太學繼振繼振字爾玉繼登仲弟與郁之章輩為柳州社晚嵗築室曰鷗旅以老焉有蕭齋集西園日箋胥山吳越成陳迹空山片石新堪憐檇李事猶説霸圖人荒塜傷人馬青編羡畫麟無従寒食節杯酒薦芳辛孫進士聖蘭聖蘭字子操號心齋嘉善人崇禎癸未進士遭亂不仕有曉傳堂集處女吟幽姿自修潔被服茝與蘅日夕好書史期以古處名懐憂時鼓瑟習靜厭彈筝未嫁失所匹不字堅良盟寄言女貞子霜雪揚其英謝此當春艶獨含千載情髙念東訪道南逰晤於天寧僧舎喜而有賦十年分手悵臨風乾鵲