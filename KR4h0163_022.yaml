住人清孤琴舊取分寥寂警鶴新貽助嘯鳴塗慣晚煙青著案載多春酒緑留棚濡泉冷壤疎栽菊飾羽鮮囊淺佩蘅酥滴露盤銀散液藻沾風研碧滋萌鳬翲赤舄遥岑戲芰紉黄裳下里訇奴往屢懐漫字刺盗趨猶震小音鉦厨藏獨快書知秘匣動嘗憐劒欲擎齲潄轉丹堅類石指彈孚缶響逾筝咮咮解語雞交耳粲粲留斑豹引瞪辜負覈詩存衛鄭悞傳捜史剰蠻荆屠兒市輟翔丸巧乞子貧回守犬獰誣矯雜賔夸入座冶妖胡婢怨吹笙湖旁樹色眉争碧閣裏霞光舌鬭頳喁唱每才庾并鮑記銘疇筆腐叅盲蘇屠印指占當别墖亦名蘇屠齋在秋涇之陽有塔對牖􅀈萬齊音譯巳并苑師之􅀈西域音萬佛胷前吉祥相也此方相傳作卍吳處黙慙仍進技項重瞳妬漫連兵蕪詩續嵗歡當甲陋室營年窘屬庚珠韞衣間窮始覓鐵聫門際静先撐租來舊帖金千兩典去時衣月二正汚耳畏多談屑瑣放懐縁懶計餘嬴窮途阮氏奚偕返閉户顔家㡬並閛孤角有神通蝨射鼎心無恠却梟烹區分任我為寧我法各隨卿用自卿姝子贈鹽名昔昔谷中歡讌侑丁丁愚堂謂學能文柳勝地期參解易京巫暴假妖消嵗旱夢通疑義析朝酲蒲團穏坐舒長晝枕木欹眠愛短更樞冥識知圈外極象𤣥思審律中衡壺盛墨汁氷凝潤鉢漾簾紋浪簇泓銖曵曉星看映帯玉舂宵雨聴琮琤于于醒燕斑梁語泛泛閒鷗白水盟烏髪幻旋螺様髻潔牙英發菡華聲華嚴經願一切衆生得如卍字髮螺文右旋願意善調伏牙齒鮮潔如白蓮花文理迴成卍字鬚芳撚徧花窺牖影碎移頻月過帡模凖縵迴欄楯宻斵方因就斧斤輕蛛蟠巧夕秋應比馬負祥河古似争敷卦聖将疑象轉下棋仙或詫圍縈紆紋黻配姬東避黻形為亞整墜旗輸漢北征盂列古環従狩獮左傳宋公為右盂錦文迴織借娥㜲蘆拈異雁雲颺彩㦸景靈烏日耀晶景讀作影摹就玉章硃誌改煉登磁碟翠題盈逋文果否𤣥成艸現藥真耶紫拾英迓我欲周千矩絜解人祈合六書程符心妙字彎兼直豁眼靈分竪與横膚隠蔡憝還合性宋蔡京胸前隠起卍字同佛相見夷堅志器標周艶詎空情南唐遺事李后主長秋周氏有焚香器曰卍字金呼天向敢慿竒問出户當能儘吉迎荷葉折牽閒櫓槳栁枝垂拂閙干旌吾従好道長無畏國為憂貧暫不寧狐墮半悲人語錯雉離偏惜物心貞拘憂古操愁彈罷復旦虞歌樂載賡隅坐計功嫻者侍畝南招隠達夫耕瑜瑕判世三生慧背向攡方一悟精顱頂灌光輪信解髮毫藏刹寳明誠驅魔大咒傳持猛度鬼諸經教演宏無佛斷難私著論鋪箋雜引卍題評朱中書茂暉茂暉字子若文恪公國祚孫天啟五年承䕃授中書科中書舎人有禹貢補註晦在先生集崇禎戊辰湖上觀毁逆奄祠紀事先王定羣祀舊典猶可詢功宗紀自周大享配有殷或以勞定國或法施於民或捍大災患勤事喪厥身非此族不與議禮恒諄諄亦惟身後然未聞存者均于公縣獄吏創祠東海濵王堂􅊩巴郡任延守九真繼此廣都韋義復有安陽荀勉比於甘棠愛但許末俗循云何承平日壊法自朝紳悉索民膏脂獻媚一寺人始由節使潘汝楨建祠西湖滣嘉名錫普徳過者莫敢瞋羣小齊效尤遑惜耗金銀初時自吳楚漸乃徧晉秦迢迢極關塞各各逞斧斤髙官及大帥將作何紛綸經營擬宫室究度侈堂陳或為九楹殿升降雕采鱗或公門三塗夥頥闢層闉或樹一丈碑褒頌滿堅珉黄金滲厥像丹漆塗其唇青絲綰倭髻茉莉花斬新僉呼九千嵗拜手稽首頻爰有陸上舎萬齡跖犬吠唁唁孔子作春秋魯史盖有因誅一少正卯不足懼亂臣豈若頒要典其言醇乎醇東林宜顯僇以仁殺不仁是誠上公徳至聖亦至神允宜瞽宗祀俎豆垂千春邪説雖未遂聞之嚙齒齗恨乏斬馬劒斷頭擢其筋悊皇忽徂落我后新政勤爰書别六等國法崇朝伸縱有百乾兒安能贖其親我來泊湖曲詔下交懽忻一夫為之倡童叟咸來臻碧瓦碎作礫畫棟摧作薪刀剸莽頭秃土盗鯀壤堙成之累嵗月毁之不終晨世間快意事敗謀在逡巡除惡莫若盡古訓信可遵白日重光昭平湖自漣淪長留關與岳終古配明禋祠址在關忠義岳忠武雙廟間徐居士廣密廣密字闕嘉興人過真如寺陰蘿翳竹房花發定中香寳座依龍女金沙落雁王寒聲出霜磬餘響入風篁妙理參圓頓名言久矣忘鴛湖狎鷗客曽元良元良字君山一名瑟自號鴛湖狎鷗客秀水人潯州别駕丙曽孫所著有烟波集十二巻松針葉葉如針簇拈來試一思未妨従製錦更欲藉砭詩嵗月彌縫老煙霞㸃綴竒濤聲餘鼓盪好辨棟梁姿孫隠君之琮之琮字元襄仁和人少負逸才博徴典故其文古雅軼蕩為諸生試輒第一食貧授徒蕭然自得平湖馮洪業重其才招致之遂挈家依焉十餘年間纂輯甚富凡一切經濟之學及論古詮理山川輿地莫不詳考分註號稱博雅自史論粗細草纂類諸書行世耘廬放梅穿籬靠石滿溪灣幾度東風意自閒痩影忽移幽徑月斜枝猶倚小屏山擬將分被香初細若比辭宫髩欲斑異日西崗逢玉雪蒼茫猶憶舊林間范布衣路路字遵甫蘭溪人流寓嘉興梅㑹里門人私諡貞簡春遊曲車圍繡幰馬銜鑣載取鈿筝間玉簫欲試誰家新釀好東風楊柳第三橋徐處士白白字介白嘉興人徙居吳江初師竟陵詩𣲖後以太湖落日賦見賞于陳黄門子龍晚年持論稍歸和易有竹嘯菴詩鈔江上遇亦于大兄百種愁回一寸腸更罹多難又他鄉與君一世為兄弟只是相逢道路傍山處士岊岊字翠峩秀水人春遊殳山用貝廷琚韻小艇來山麓閒吟趁晚晴看烟青嶂合倚樹白雲行院古搖蘿影林深礙月明緬懐今古事藉草聴流鶯仲秀才𢎞文𢎞文字漢明桐鄉人雨窓讀書一雨彌旬日清隂巳滿堂三春花市廢連夜竹風狂閉户欣開帙憑䦨愛煮香偶然翻閲罷池水漲滄浪三山翁過銘簠銘簠字叔寅庭訓少子龍丘山人王伯和工書年六旬歸自西蜀以草書見貽鳥道驅馳亦壯哉都縁草聖結靈胎常餘劒閣蒼烟在不染巫山媚骨來蕉葉濡毫仍古法榴皮畫壁本仙才故園三徑應無恙待爾重將鐵限開王山人屋屋字孝峙初名畹字蘭九嘉善人有學可齋詩箋陌上桑可憐陌上桑朝看沃若暮萎黄餵蠶不了餵牛羊送黄海歸新安清秋客子嘆歸歟載酒題詩一送渠細雨亂山遮汝去凄風落葉對誰居江邨處處休黄犢野店家家賣白魚見説雅懐多不減每逢佳處輒停車顧秀才玘徴玘徴字文玉嘉興縣學生有讀書臺稿感舊烏衣門巷舊遊非王謝堂前燕子稀有客有客莫遑處式微式微胡不歸乾坤萬里愁雲合風雨三秋落葉飛極目天涯誰與語釣篷日暮一漁磯張太學翊翊字叔韓秀水人乙酉城破遇害子姪妻媳闔門二十七人俱死鶴夢百禽正嘈雜此鶴獨孤眠奮翮豈無候藏神亦偶然庭中人寂寂松下月娟娟知入寥天去緱山何處邊安度先生朱茂曙茂曙字子蘅天啟初補秀水縣學生既卒鄉人私諡安度先生有春草堂遺藁秦淮河春遊即事橋下溪流燕尾分灣頭新水慣湔裙六朝芳草年年緑雙調鳴筝户户聞春雨杏花虞學士酒旗山郭杜司勲兒童也愛晴明好紙剪風鳶各一羣牽牛花金飈初動露華滋最愛娟娟竹尾垂多少紅樓昬夢裏不知秋色到疎籬陸貢生士鉉士鉉字伯玉號古雪平湖嵗貢生甲申聞變絶粒嘔血死有蠧嘲餘集懐比部樊致虚師含香起草漢宫秋仙吏風流在爽鳩千里登龍曽擬郭十年投鯉欲依劉白堤楊柳嬌堪折赤土芙蓉黯未收明月自憐雙入眼寒光遥夜落汀洲異人魯志剛志剛字雲陽平湖魯氏舊族也善飲盛暑中或衣綿絮遇霜雪嘗赤體遊行嬉笑自得至人家索酒言禍福竒中出則兒童競隨之引之坐輒倒挂椅間或抱兩膝旋滚地上望之如圓毬其疾如風時喜倒挂大樹枝上風吹搖曵以為樂又能于城上聳身上下飛走雉堞頃刻周四門如履平地夜則口銜其隂而卧人皆呼為魯癡自言當在雲間脱殻後至松路遇郡守方岳貢出作醉顛狀大呼方當横死方怒杖之往某橋下洗去血㾗即坐脱越二年湖人有於閶門外遇之者已而方守大拜為闖所殺此曹侍郎秋岳為予言者如此醉謌擲杖下丹丘寒花㸃石樓十年殘醉裏不見海山秋張叟叟嘉興人不知名江上芙蓉開江上芙蓉謝開謝總秋風江流無日夜檇李詩繫巻二十二
