body:
  text: 檇李詩繫卷一平湖沈季友編漢嚴夫子忌忌本荘姓避眀帝諱稱嚴由拳人忌與司馬相如俱好辭賦哀屈原受性忠貞不遇眀主而遭暗世乃斐然作辭歎而述之曰哀時命遭景帝不好辭賦無所得志聞梁孝王右文通賔客乃徒步入梁受知孝王與鄒陽枚乘俱見尊重而忌名尤甚世稱嚴夫子自吳越不列於風而秦漢以前我郡之詩無所考見故斷自忌始讀其儗騷一篇纒綿怨思不失其正足開七邑詞源取而録之其猶三閭之遺意乎哀時命哀時命之不及古人兮夫何予生之不遘時往者不可扳援兮徠者不可與期志憾恨而不逞兮抒中情而属詩夜烱烱而不寐兮懐隠憂而厯兹心鬱鬱而無告兮衆孰可與深謀欿愁悴而委惰兮老冉冉而逮之居處愁以隠約兮志沈抑而不揚道壅塞而不通兮江河廣而無梁願至崑崙之懸圃兮采鍾山之玊英擥瑶木之橝枝兮望䦘風之板桐弱水汩其為難兮路中斷而不通勢不能凌波以徑度兮又無羽翼而高翔然隠憫而不達兮獨徙倚而彷徉悵惝罔以永思兮心紆軫而增傷倚躊躇以淹留兮日飢饉而絶糧廓抱景而獨倚兮超永思乎故鄉廓落寂而無友兮誰可與玩此遺芳白日晼晚其将入兮哀余壽之弗將車既敝而馬疲兮蹇邅迴而不能行身既不容於濁世兮不知進退之宜當冠崔嵬而切雲兮劒淋漓而縱横衣攝葉以儲與兮左袪挂於榑桑右衽拂於不周兮六合不足以肆行上同鑿枘於伏戲兮下合矩矱於虞唐願尊節而式高兮志猶卑夫禹湯雖知困其不改操兮終不以邪枉而害方世竝舉而好朋兮壹斗斛而相量衆比周以肩迫兮賢者逺而隠蔵為鳳凰作鶉籠兮雖翕翅其不容靈皇其不寤知兮焉陳詞而効忠俗嫉妬而蔽賢兮孰知予之從容願舒志而抽馮兮庸詎知其吉凶璋珪雜乎甑窐兮隴廉與孟陬同宫舉世以為恒俗兮固将愁苦而終窮幽獨轉而不寐兮惟煩懣而盈匈魂渺渺而馳騁兮心煩寃之􅍵􅍵志欿憾而不憺兮路幽昧而甚難塊獨守此曲隅兮然欿切而永歎愁修夜而宛轉兮氣涫􅘺其若波握剞劂而不用兮操規榘而無所施騁騏驥於中庭兮焉能極夫逺道置猿狖於櫺檻兮夫何以責其捷巧駟跛鼈而上山兮吾固知其不能陞釋管晏而任臧獲兮何權衡之能稱箟簬雜於黀蒸兮機蓬矢以䠶革負擔荷以丈尺兮欲伸要而不可得外迫脅於機臂兮上牽聨於矰隿肩傾側而不容兮固陿腹而不得息務光自投於深淵兮不獲世之塵垢孰魁摧之可久兮願退身而窮處鑿山楹而為室兮下披衣於水渚霧露濛濛其晨降兮雲依斐而承宇虹霓紛其朝霞兮夕淫淫而淋雨怊茫茫而無歸兮悵逺望此曠野下垂釣於谿谷兮上要求於仙者與赤松而結友兮比王喬而為耦使梟楊先導兮白虎為之前後浮雲霧而入冥兮騎白鹿而容與魂眐眐以寄獨兮汨徂往而不歸處卓卓而日逺兮志浩蕩而傷懐鸞鳳翔于蒼雲兮故矰繳而不能加蛟龍潜於旋淵兮身不挂於網羅知貪餌而近死兮不如下逰乎清波寧幽隠以逺禍兮孰侵辱之可為子胥死而成義兮屈原沈於汨羅雖體解其不變兮豈忠信之可化志怦怦而内直兮履繩墨而不頗執權衡而無私兮稱輕重而不差慨塵垢之狂攘兮除穢累而反真形體白而質素兮中皎潔而淑清時厭飫而不用兮且隠伏而逺身聊竄端而匿迹兮嘆寂默而無聲獨便悁而煩毒兮焉發憤而紓情時曖曖其将罷兮遂悶歎而無名伯夷死於首陽兮卒夭隠而不榮太公不遇文王兮身至死而不得逞懐瑶象而佩璲兮願陳列而無正生天墜之若過兮忽爛漫而無成邪氣襲余之形體兮疾憯怛而萌生願一見陽春之白日兮恐不終乎永年晉干散騎寳寶字令升父瑩自新蔡隨晉南渡徙居海鹽少勤學博覽以才器召為著作郎平杜􅌢有功賜爵闗内侯中興草創未置史官中書監王導以寶請於是領國史著晉紀自宣帝迄愍帝五十三年凡二十卷直而能婉稱良史焉厯散騎常侍性好陰陽術數留思京房夏侯勝等傳寶父有寵婢母甚妒及父亡母乃生推婢於墓中後十餘年母䘮開墓婢伏棺如生經日而蘇言其父常取飲食與之地中亦不覺為惡寶遂悟天地間鬼神事乃起撰集古今神祗靈異人物變化之事為搜神記以示劉惔惔曰卿可謂鬼之董狐鶴林玉露載楊誠齋與同舎談及于寶一吏進曰乃干寶非于也因取韻書干字注云晉有干寶誠齋大喜曰汝乃吾一字之師今海鹽圖經亦從之從軍行壯士稟桀姿氣烈有自然俯仰羣雄中何能救世艱闕鞏代縫掖兠鍪易進賢無名氏晉樂苑曰嘉興人養鴨兒鴨兒既死因有此歌阿子歌三首阿子復阿子念汝好顔容風流世希有窈窕無人雙春月故鴨嗁獨雄顛倒落工知悅弦死故來相尋博野田草欲盡東流水又暴念我雙飛鳬饑渴常不飽陳顧黄門野王野王字希馮海鹽人七歳讀五經知大㫖九歳制日賦十二歲隨父入建安撰建安地紀及長徧觀經史精記默識天文地理蓍龜占候蟲篆竒字無所不通仕梁為博士中領軍嘗與瑯琊王褒為宣城王客野王善丹青王於東府起齋令野王畫古賢命褒書贊時稱二絶侯景之亂募兵援京杖戈被甲抗辭作色見者莫不壮之太尉王僧辨深嘉其義使監本縣事陳天嘉中補撰史學士大建中領大著作兼通事舎人與江總陸瓊諸人竝以才學推重遷黄門侍郎卒贈祕書監右衛將軍總哭以詩云獨酌一樽酒髙詠七哀詩何言蒿里別非復竹林期堦荒鄭公草户閴董生幃人隨暮槿落客共晚鶯悲年髮兩如此傷心獨㡬時所撰玊篇輿地志符瑞圖顧氏譜傳分野樞要續洞𡨕記𤣥象表文集行世陽春歌春草正芳菲重樓啓曙扉銀鞍俠客至柘彈宛童歸池前竹葉滿井上桃花飛薊門寒未歇為斷流黄機隴頭水隴底望秦川迢遙隔風烟蕭條落野樹幽咽響流泉瀚海波難息交河氷未堅安知盖山水逐節赴危絃羅敷行東隅麗春日南陌采桑時樓中結梳罷提筐候早期風輕鶯韻緩露重落花遲五馬光長陌千騎絡青絲使君徒遣信賤妾畏蠶飢豔歌行燕姬妍趙女麗出入王宫公主第倚鳴瑟歌未央調絃八九弄度曲兩三章唯欣春日永詎愁秋夜長歌未央倚鳴瑟輕風飄落蘂乳燕巢蘭室結羅帷翫朝日窗開翠幔卷妆罷金星出争攀四照花競戲三條術唐丘庶子為為嘉興人事繼母孝有芝生堂下光啓間累官太子右庶子年八十餘還鄉詔給俸禄之半縣令謁之為候門磬折令坐乃拜里胥立庭下既出乃敢坐經縣署降馬而趨有集六卷王維有送丘為往唐州詩云宛洛有風塵君行多苦辛四愁連漢水百口寄隨人槐色隂清晝楊花惹暮春朝端肯相送天子繡衣臣摩詰又送丘為下第詩云憐君不得意况復柳條春為客黄金盡還家白髪新五湖三畝宅萬里一歸人知爾不能薦羞稱獻納臣劉長卿送丘為赴上都詩云帝鄉何處是歧路空垂泣楚思愁莫多川程帶潮急潮歸人不歸獨向回塘立湖中寄王侍御日日湖水上好登湖上樓終年不向郭過午始梳頭嘗自愛杯酒得無相獻酬小僮能膾鯉少妾事蓮舟每有南浦信仍期後月遊方春轉揺蕩孤興時淹留驄馬真傲吏翛然無所求晨趨玊堦下心許滄江流少别如昨日何言經數秋應知方外事獨往非悠悠尋西山隠者不遇絶頂一茅茨直下三十里叩闗無僮僕窺室唯案几若非巾柴車應是釣秋水差池不相見黽勉空仰止草色新雨中松聲晩窗裏及兹契幽絶自足蕩心耳雖無賔主意頗得清浄理興盡方下山何必待之子泛若耶谿結廬若耶裏左右若耶水無日不釣魚有時向城市谿中水流急渡口水流寛每得樵風便往來殊不難一川草長緑四時那得辨短褐衣妻兒餘糧及雞犬日暮鳥雀稀稚子呼牛歸住處無鄰里柴門獨掩扉題田家廬舍春風何時至已緑湖上山湖上春既早田家日不閒溝塍流水處耒耜平蕪間薄暮飯牛罷歸來還閉闗尋廬山崔徵君日高雞犬静門掩向寒塘夜竹深茅宇秋亭冷石牀住山年已逺服藥壽偏長虚棄浮生者相逢益自傷登潤州城天末江城曉登臨客望迷春潮平島嶼殘雨隔虹蜺鳥與孤㠶逺烟和獨樹低鄉山何處是目斷廣陵西竹下殘雪一㸃消未盡孤明在竹隂晴光夜轉瑩寒氣曉仍深還對讀書牖且闗乘興心已能依此地終不傍瑶琴送閻校書之越南入剡中路暮雲應轉微湖邊好花照山口細泉飛此地饒古跡世人多忘歸經年松雪在永日世情稀芸閣應相望芳時不可違左掖梨花冷艶全欺雪餘香乍入衣春風且莫定吹向玉階飛陸尉士修士修字里未詳大厯間為嘉興尉與顔真卿善顔守湖州士修往來禾霅間多聯句詩峴山窪樽之咏士修亦與焉三言擬五雜組與李萼殷佐眀顔真卿袁髙蔣志同作五雜組闤闠間往復還門上闗不得已鬢毛斑三言喜皇甫曽侍御見過南樓翫月同顔真卿陸羽皇甫曾李萼皎然作露欲晞客将醉猶宛轉照深意月夜啜茶聨句泛花邀坐客代飲引情言士修醒酒宜華席留僧想獨園張薦不須攀月桂何假樹庭萱李萼御史秋風勁尚書北斗尊崔萬流華净肌骨䟽瀹滌心原顔真卿不似春醪醉何辭渌水繁皎然素瓷傳静夜芳氣滿閒軒袁高夜宴詠燈聨句桂酒牽詩興蘭缸照客情士修詎慙珠乗朗不讓月輪明張薦破暗光初白浮雲色轉清顔真卿帶花疑在樹比燎欲分庭皎然顧已慙微照開簾識近汀袁高華陽真逸顧況況字逋翁海鹽人至徳二年進士志尚踈逸頗好詼諧雖王公之貴必戲侮之與柳渾李泌為方外友渾輔政以祕書郎召況況荅詩云四海如今已太平相公何用喚狂生此生還似籠中鶴東向滄溟呌數聲及泌相自謂當得達官久之稍遷著作郎白居易初舉以詩謁況況謔之曰長安百物貴居大不易及讀至原上草詩野火燒不盡春風吹又生嘆曰有句如此居亦何難老夫前言戲之耳因為延譽鄴侯卒況感其知作海鷗詠云萬里飛來為客鳥曾逢丹鳳借枝柯一朝鳳去梧桐死滿目鴟梟奈爾何為權貴所嫉坐詩語調謔貶饒州司户㕘軍況文詞之外兼工小筆嘗求知新亭鹽監人或詰之況曰余要貌海中山耳半年解綬去家縣南横山宅邊有禅寂寺故有家在雙峰蘭若邊之句後結廬茅山號華陽真逸年九十卒人謂尸解去況嘗與三詩友遊苑中坐流水上得大梧葉上有詩云一入深宫裏年年不見春聊題一片葉寄與有情人況亦題一葉放於波中詩曰花落深宫鶯亦悲上陽宫女斷腸時君恩不禁東流水葉上題詩欲寄誰後十餘日有人於苑中尋春乂於葉上得詩以示況詩曰一葉題詩出禁城誰人倚和獨含情自嗟不及波中葉蕩漾乘春取次行有集二十卷皇甫湜為序云偏於逸歌長句駿發踔厲往往若穿天心出月脇意外驚人語非尋常所能及最為快也又曰自吾為顧況集序未嘗許人也其為名流嘆重如此華山西岡遊贈隠𤣥叟羣峰鬱初霽潑黛若鬟沐天風鼓唅呀揺撼千灌木木葉微墮黄石泉浄停渌危磴蘿薜牽迴步入幽谷我心寄青霞世事慙蒼鹿遂令巢許輩于焉謝塵俗想是悠悠雲可契去留躅行路難三首君不見擔雪塞井徒用力炊沙作飯豈堪喫一生肝膽向人盡相識不如不相識冬青樹上挂凌霄歳晏花凋樹不凋凡物各自有根本種木終不生豆苗行路難行路難不知何處是平道中心無事當富貴今日覺君顔色好君不見少年頭上如雲髮少壮如雲老如雪豈知灌頂有醍醐能使清涼頭不熱吕梁之水挂飛流黿鼉蛟蜃不敢遊少年恃險若平地獨倚長劍凌清秋行路難行路難昔日少年今已老炫目春光不長好前朝竹帛事皆空日莫牛羊古城草君不見古人燒水銀變作北邙山上塵蕅絲挂在虚空中欲落不落愁殺人睢水英雄多血刃建章宫闕成煨燼淮王身死桂樹折徐福一去音書絶行路難行路難生死由命皆由