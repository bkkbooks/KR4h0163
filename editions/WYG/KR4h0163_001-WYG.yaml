一聲清磬發孤烟山連極浦鳥飛盡月上青林人未眠題葉道士山房水邊垂栁赤闌橋洞裏仙人碧玉簫近得麻姑書信否潯陽江上不通潮宫詞二首玉樓天半起笙歌風送宫嬪笑語和月殿影開聞夜漏水晶簾捲近秋河九重天樂降神仙步舞分行踏錦筵嘈囋一聲鐘皷歇萬人樓下拾金錢桃花曲魏帝宫人舞鳳樓隋家天子泛龍舟君王夜醉春眠晏不覺桃花逐水流山僧蘭若絶頂茅庵老此生寒雲孤木伴經行世人那得知幽徑遙向青峰禮磬聲越中席上看弄老人不到山隂二十春鏡中相見白頭新此生不復為年少今日從他弄老人早春思歸有唱竹枝歌者坐中下淚渺渺春生楚水波楚人齊唱竹枝歌與君皆是思歸客拭淚看花奈老何湖中青草湖邊日色低黄茅嶂裏鷓鴣啼丈夫飄蕩今如此一曲長歌楚水西山中野人愛向山中宿况在葛洪丹井西庭前有箇長松樹夜半子規來上啼江邨亂後江邨日暮尋遺老江水東流横浩浩竹裏閒牕不見人門前舊路生青草丘員外丹丹嘉興人郡邑志俱失載官諸暨令厯員外郎隠居臨平山與韋應物鮑防吕渭諸牧守往還唱和錢起李端亦多贈言丹有詩七首幷聨句諸作及江南長安十二月景詞行世崔峒送丘二十二詩云積水與寒烟嘉禾路㡬千孤猿啼海島窮雁起湖田曾見長洲苑嘗聞大雅篇却將封事去知爾愛閒眠題湛長史舊居身退謝名累道存嘉止足設醴降華旛挂冠守空谷偶尋野外寺仰慕賢者躅不見昔簮裾猶有舊松竹烟霞雖異世風韻如在曯余即江海人歸轍青山曲奉酬韋使君送歸山之作側聞郡守至偶乘黄犢出不别桃源人一見經累日蝉鳴念秋稼蘭酌動離瑟臨水降麾幢野艇纔容膝參差碧山路目送江帆疾涉海得驪珠棲梧慙鳳質愧非鄭公里歸掃䝉籠室酬重送歸山賣藥有時至自知來往疎遽辭池上酌新得山中書步出芙蓉府歸乘觳觫車猥䝉招隠作豈愧班生廬和韋使君秋夜見寄露滴梧葉鳴風秋桂花發中有學仙人吹簫弄山月中元日鮑端公宅遇吳天師聨句道流為柱史教戒下真仙嚴維共契中元㑹初修内景篇鮑防遊方依地僻卜室喜墻連謝良輔寶笥開金籙華池潄玊泉賈弇恠龍隨羽翼青節降雲烟李清昔去遺丹竈今來變海田劉蕃養形奔二景鍊骨度千年謝良弼騎竹投陂裏攜壺挂牖邊鄭㮣洞中嘗入静河上舊談𤣥陳元初伊洛笙歌逺蓬壺日月偏樊珣青騾薊訓引白犬伯陽牽丘丹法受相君後心存象帝先吕渭道成能縮地功滿欲昇天范淹何意迷孤性含情戀數賢吳筠酒語聨句山簡酣歌倒接䍦劉蕃看朱成碧無所知鮑防耳鳴目眩駟馬馳謝良輔口稱童羖腹鴟夷謝良弼兀然落帽灌酒巵沈仲昌太常吏部相對時嚴維藉糟枕麴浮酒池丘丹甕間籬下臥不移吕渭呌呼不應無事悲鄭槩千日一醒知是誰陳元初左傾右倒人避之迴陸宣公贄贄字敬輿居郡城甜瓜巷年十八第進士中博學宏辭厯監察御史翰林學士徳宗竒其才嘗以行輩呼而不名從狩奉天益見親倚恒居中參裁可否時號内相帝偶與相失夜召不得詔得贄者賞千金及來謁太子以下皆稱賀時機務填委書詔日數百他學士筆閣不得下贄沛然有餘皆周盡事情人人可曉常勸帝痛自咎悔以謝天下詔下雖武夫悍卒無不感泣遷諫議大夫仍為學士天下望以為相權貴沮之又言事無諱失帝意為中書舎人久之除權知兵部侍郎仍為學士竇參讒阻之罷學士參黜始同中書門下平章事贄諫諍愈切或規其太過贄曰我上不負天子下不負所學遑恤其他帝滋不悅以諫用裴延齡罷為太子賔客廷齡日讒之賴陽城等論辨貶忠州别駕杜門集方書人罕見其面順帝立召還詔未至卒贈兵部尚書謚宣奏議數百篇譏陳時弊皆本仁義後蘇軾剳子稱其有王佐才賢于子房賈誼而徳宗始親終疎放逐以死古今痛之錢起有送䞇擢第還詩云鄉路歸何早雲間早擅名思親盧橘熟帶雨客㠶輕夜火臨津驛晨鐘隔浦城華亭養仙羽計日再飛鳴曉過南宫聞太常清樂南宫聞古樂拂曙聴初驚烟靄遙迷處絲桐暗辨名節隨新律改聲帶緒風輕合雅將移俗同和自感情逺音兼曉漏餘響過春城九奏明初日寥寥天地清禁中春松隂隂清禁裏蒼翠滿春松雨露恩偏近陽和色更濃高枝分曉日靈韻雜宵鐘嵐助爐烟逺形疑盖影重願符千載壽不羨五株封倘得迴天眷全勝老碧峰殷御史堯藩堯藩秀州人為秀才時許渾寄以詩云相知愧許詢寥落向溪濵竹馬兒猶小荆釵婦慣貪獨愁憂過日多病不如人莫恠青袍選長安隠舊春再寄云直道知難用經年向水濵宅從栽竹貴家為買書貧就學多新客登朝盡故人蓬萊自有路莫羨武陵春又寄詩云㡬載聞名翰墨林為從知已信浮沉青山有雪諳松性碧落無雲稱鶴心帶月獨歸蕭寺逺翫花頻醉庾樓深思君一見如瓊樹空把新詩盡日吟元和九年韋貫之掌文柄堯藩被黜尚書楊漢公乃貫之前榜門生盛言堯藩屈貫之為重收遂登第後從李翺長沙幕府尋為長樂令有治績姚合寄詩云故人為吏隠高臥簿書間遶縣惟栽藥逢僧只説山此宵歡不歇窮歳信空還何計相尋去嚴風雪滿關擢御史官江南甚著風采有憶江南詩三十章皆蘇杭事樂天所詠江南名郡數蘇杭寫在殷家三十章是也姚合又有送殷侍御遊山南詩云詩境西南勝秋深盡夜蛩人家連水影驛路在山峰地静雲生石天寒雪覆松我為公府繫不得此相從其詩有宋刻本八十七篇評者謂其句有葩艶微嫌肉豐鸛鵲樓一律獨茂碩而婉不愧初盛遺則三日贈都上人曲水公卿宴香塵盡滿街無心修禊事獨歩到禅齋細草縈愁目繁花逆旅懐綺羅人走馬遺落鳳皇釵宫詞吳王愛歌舞夜夜醉婵娟見日吹紅燭和塵埽翠鈿徒令句踐霸不信子胥賢若問長洲草荒蕪無限年送客遊吳吳國水中央波濤白渺茫衣逢梅雨漬船入稲花香海戍通鹽竈山邨帶蜜房欲知蘇小小君試到錢塘和趙相公登鸛雀樓危樓高架泬寥天上相間登立綵旃樹色到京三百里河流歸漢㡬千年晴峰聳日當周道秋穀垂花滿舜田雲路何人見高志最看西面赤闌前韓信廟長空鳥盡將軍死無復中原入馬蹄身向九泉還属漢功超諸将合封齊荒涼古廟惟松柏咫尺長陵又鹿麋此日深憐蕭相國竟無一語到金閨送白舎人渡江曉發龍江又一程諸公同濟似登瀛海門日上千峰出桃葉波平一棹輕横鎖己沈王濬筏投鞭難阻謝𤣥兵片時喜得東風便囘首鐘聲隔鳯城李節度平戎詩百萬王師下日邊将軍雄畧可圖全元勲未論封茅異捷勢應知破竹然燕警無烽清朔漠秦文有寶進藍田太平從此消兵甲記取紅羊换刼年贈惟儼師煥然文采照青春一䇿江湖自在身雲鎖木龕聊息影雪香紙襖不生塵談禅早續燈無盡䕶法重編論有神擬掃緑隂浮佛寺桫欏高樹結為鄰寄海陽張明府春草正萋萋知君道惡溪鶯將吉了語猿共果然啼别路魂将斷還家夢㡬迷定尋雷令劒應識越王笄樹色多於北潮聲少向西榴花好為酒誰伴醉如泥偶題越女收龍眼蠻兒拾象牙長安千萬里走馬向誰家憶家樹擁溪邊閣山浮雨後嵐白頭歸未得夢裏望江南江行暝色滄洲迥秋聲玊峽長只因江上月不覺過潯陽吹笙歌伶兒竹聲愁繞空秦女淚溼燕支紅玊桃花片落不住三十六簧能唤風遊山南寺山中盡日無人到竹外交加百鳥鳴昨日小樓微雨過櫻桃花落晚風晴殷堯恭堯恭未詳疑即堯藩兄弟行也府試一詩見詩雋類函他本作堯藩詩今附識於此府試中元節觀道流步虚𤣥都開柲籙白石禮先生上界秋光盡中元夜景清星辰朝帝處鸞鶴步虛聲玊洞花常發珠宫月最明掃壇天地肅投簡鬼神驚倘賜刀圭藥還成不死名茅山隠君顧非熊非熊况子性滑稽好凌轢為衆所抑然名在朝野長慶中下第名流多作詩送之姚合詩云失意尋歸路親知不復過家山向城逺日月在船多楚塞數逢雁浙江長有波秋風别鄉老還聴鹿鳴歌朱慶餘詩云但取詩名逺寧論下第頻惜為今日别共受幾年貧聴雨宿吴寺過江逢越人知從本府薦秋晚又辭親馬戴詩云無成西别秦返駕江南春艸際楚田雁舟中吳苑人殘雲挂絶島迥樹入通津想到長洲日門前多白蘋穆宗怪無非熊名詔有司進所試卷覽之稱旨追榜敕賜及第劉得仁賀以詩云愚為童稚時已解念君詩及得高科晚須逢聖主知花前翻有淚鬢上却無絲從此東歸去休為墮葉期大中間歴盱眙尉唐球送其之官詩曰寂寞邛城夜寒塘對庾樓蜀闗蝉已噪秦樹葉應秋道路連天逺笙歌到曉愁不堪分袂後殘月正如鈎後慕父風棄官亦隠茅山項斯贈詩云吟詩三十載成此一名難自有恩門入全無帝里歡湖光愁裏碧巖影夢中寒到後千松月何人共曉看賈島寄詩云知君歸有處山水亦難齊猶去瀟湘逺不聞猿狖啼穴通茅嶺下潮滿石城西獨立生遙思秋原日漸低王建贈詩云江城柳色海門烟欲至茅山始下船知道君家當瀑布菖蒲潭在草堂前初况喪子為詩哭之云老人哭愛子日暮千行血心逐斷猿驚迹隨飛鳥滅老人年七十不作多時别其子雖卒魂神常在其家因自誓當再為顧氏子一日冥吏斷令託生顧家開目認其屋宇兄弟至七歳其兄戲批之忽曰吾爾兄也何敢批吾因叙生前事無一謬者即非熊也其詩舊刻僅十七篇今得七十四首評者謂其近體俊婉可諷堊削之功似多於真逸矣題馬儒乂石門山居尋君石門隠山近漸無青鹿迹入柴户樹身穿草亭雲低收藥徑苔惹取泉瓶此地客難到夜琴誰共聴經杭州郡郭遶江濆人家近白雲晚濤臨檻看夜艣隔城聞浦轉山初盡虹斜雨未分有誰知我意心緒逐鷗羣夏日㑹修竹段將軍宅愛君書院静莎覆蘚苔濃連穗古籐暗領雛幽鳥重尊前迎逺客林杪見晴峰誰謂朱門内雲山滿座逢姚巖寺路懐友路向姚巖寺多行洞壑間鶴聲連塢静溪色帶村閒疎葉秋前渚斜陽雨後山憐君不得見詩思最相闗早雁逐暖來南國迎寒背朔雲下時波勢出起處陣雲分聲急奔前侶行低續後羣何人寄書札絶域可知聞寄費冠卿先生九華隠鳥道隔塵埃石室和雲住山田引燒開久閒仙客降高臥詔書來一入深林去人間更不回秋日陜州道中作孤客秋風裏驅車出陜西闗河午時路邨落一聲雞樹勢標秦逺天形到岳低誰知我名姓來往自凄凄經河中一望蒲城路闗河氣象雄樓臺山色裏楊栁水聲中思起懐吳客行斜向磧鴻我來尋古跡惟見舜祠一作遺風天河閣到啼猿閣即事萬壑褒中路何層不駕虚溼雲和棧起燋枿帶畬餘巖狖牽垂果湍禽接迸魚每逢維艇處塢裏有人居夏夜漢渚歸舟即事扁舟江瀨盡歸路海山青巨浸分圓象危檣入衆星雨遥明電影蜃曉識樓形不是長遊客那知造化靈下第後寄髙山人我家堂屋前仰視大茅巔潭盡鳥聲異地寒松色鮮人眠甕牖月鹿飲竹門泉多愧隣高隠無成又一年寄太白無能禅師太白山中寺師居最上方獵人偷佛火櫟䑕戲禅牀定久衣塵積行稀徑草長有誰來問法林杪過斜陽送馬戴入華山古木亂重重何人識去蹤斜陽收萬壑圓月上三峰雲裏泉縈石窗間鳥下松惟應採藥客時向此相逢送僧歸洞庭江山萬萬重歸去指何峰未入連雲寺先齋越浪鐘島香迴棧橘秋䕃出庵松若救吴人病須降震澤龍長安清明言懐明時帝里遇清明還逐遊人出禁城九陌芳菲鶯自囀萬家車馬雨初晴客中下第逢今日愁裏看花厭此生春色來年誰是主不堪憔悴更無成瓜洲送朱萬言渡頭風晚葉飛頻君去還吳我入秦雙淚别家猶未斷不堪仍送故鄉人張堰官祜祜字承吉清河人作宫體小詩辭曲艶發長慶中為令狐楚所知以詩三百篇薦於朝為元稹所抑失意東歸嘗領嘉興冬瓜堰税堰在郡東北二里冬瓜湖上一作東瓜又作東郭雲溪友議云祜為冬瓜堰官多取給於牛户錢唐酒徒朱冲和為詩嘲之曰白在東都元已薨蘭臺鳳閣少人登冬瓜堰下逢張祜牛屎堆邊說我能又桂苑叢談載祜以詩上盆牢使出其子為漕渠小職得堰號東瓜人或戲之曰賢郎不宜作此等職祜曰冬瓜合出祜子又按嘉禾志舊堰官張祜死嘉興監裴洪慶命其子杞兒領之則祜固終老於禾者也題海鹽南館考見題咏故人營此地臺館尚依依黑夜山魈語黄昏海燕歸舊隂楊葉在殘雨槿花稀無復南宫賞髙簷紅燭輝題嘉興蘇小小墓漠漠窮塵地蕭蕭古樹林臉濃花自發眉恨柳長深夜月人何待春風鳥自吟不知誰共穴徒願結同心蘇小歌三首車輪不可遮馬足不可絆長怨十字街使郎心四散新人千里去故人千里來剪刀横眼底方覺淚難裁登山不愁峻涉海不愁深中劈庭前棗教郎見赤心嘉興縣男陸扆扆字祥文贄族孫光啟二年進士累遷翰林學士属辭敏速若注射然一時詞臣皆以為不及昭宗甚寵異之常侍金鑾作賦帝嘆曰朕聞貞元時有陸贄能作内廷文書今得卿斯文不墜矣遷尚書左丞同中書門下平章事進階光禄大夫嘉興縣男後貶濮州司户死於白馬驛有集七卷今存一篇禁林聞曉鶯曙色分層漢鶯聲繞上林報花開瑞錦催栁綻黄金斷續隨風逺間闗送月沈語當温樹近飛覺禁林深繡户驚殘夢瑤池轉好音願将棲息意從此沃天心裴節度休休字公美孟州人操履嚴正終年著書擢進士第為監察御史文宗太和六年進同中書門下平章事詢按歳漕著新法十條又立税茶十二法人以為便秉政五年不為皦察為人醖藉能文章書遒媚有體宣宗常曰休真儒者嗜浮屠法當時嘲薄之而所好不衰晚年披毳衲於歌姬院持鉢乞食以為樂後罷為宣武軍節度使卒每自發願世世為國王𢎞䕶佛法後于闐國王生一子手文中有裴休二字聞於中朝其子弟請迎之彼國不允而止按休寓禾不見本傳今郡城南有真如寺相傳為休捨宅所建湖上有裴島為休游宴之地攷其父肅貞曾為淛東觀察使則僑居於此固未可知郡邑志皆失載余為入之題銅官山長史祠潯陽賢太守遺廟古溪邊樹影赴流水石門當洞天幡花凝寶座香案儼爐烟若到千年後重修事宛然贈黄蘖山僧希運自從大士傳心印額上圓珠七尺身挂錫十年棲蜀水浮杯今日渡漳濵一千龍象隨高步萬里香華結勝因擬欲事師為弟子不知將法付何人五代屠指揮瓌智瓌智字寶光海鹽人少負勇略吳越王兵拒黄巢智仗劒從之時與謀議授指揮使乾寧四年自海道救嘉禾生擒賊将二十餘人天復二年徐綰許再忠叛刺史高彥遣子渭與智同赴難渭曰今日不利智按劔曰違主之命不忠畏縮不前無勇死忠死勇丈夫分也偕渭直抵靈隠山賊壘合圍數重二人自朝戰至日晡身創百處奮刀一呼手搏賊魁數人馬上刃之矢盡援絶為伏兵所害詠志詩輕身都是義殉主始為忠一夜西陵路朱旗走大風唐畫士希雅希雅嘉興人善丹青妙於畫竹羽毛亦工墨作棘針始學李後主金錯書有一筆三過之法晚年變而為畫乘興縱竒因其顫掣之勢以為竹樹故書法存焉其為荆檟枮棘荒野幽尋之属氣韻蕭疎多得真趣非畫家繩墨所拘評者謂江南絶筆徐熙唐希雅二人而已極乎神而盡乎微資於假而迫於真象生意端形造筆下故列神品宣和内府所藏八十有八有竹鹿蘆鴨鷹猴柘雀等圖其同時有陸晃者亦禾人性疎逸好交尚氣沈湎於酒亦善丹雘凡酒酣遇筆揮灑自得善人物喜為數稱如三仙四暢五老六逸七賢之類是也南唐李燝聞其名欲召之人謂其嗜酒無人臣禮乃止宣和畫譜載晃有繡綫圖及大龍烹茶葛仙飛錢諸蹟題畫誰潑烟雲六尺綃寒山秋樹晚蕭蕭十年來往吴淞口錯認溪南舊板橋檇李詩繫卷一
