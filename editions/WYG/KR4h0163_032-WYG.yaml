封着虎跡滿庭三兩松徐春門畫山頭雲濕皆含雨溪口泉香盡帶花此是天池榖雨候松隂十里賣茶家徳舜徳舜嘉興人寄題萍香閣為楊華山居士作夢到萍香一載餘幽竒小閣隠人居春流寫媚鳬鷗狎暮雨凝寒水竹疎空濶四天疑是艇江湖滿地想為魚何時尋爾兼邀月南垞重圖亦不如傳如禪師傳如字戒山又作介山海鹽人㓜出家昭慶通内外典㕘空見性與虞徳園馮具區諸公善萬厯間徒步入京請蔵為􅉪議所中身陷法曹後得釋陳百史曰介山一切定力為教導主脱畧世法不拘隅曲後十餘年學者思之至有奉其教而泣下者予聞其苕溪説法時有巨蟒蜿蜒羣鵲聚聴與曇超何異非定力能如是乎湖上秋興二首晴峯秋翠映芙蓉茆屋思歸路幾重髙樹猶然來倦鳥寒花不復惹遊蜂田衣已破裁雲補山粟旋收帶月舂霜冷曉鐘聲漸逺數敲驚起碧潭龍枯木衡門舊雨疎蛛絲蝸篆滿庭除時分呪食閒供鳥盡謝瑶函不寄魚乗月放歌非庾亮經年病渴豈相如明河瑩澈清於晝坐挹清光夜讀書荅沈純甫司馬不暇㕘禪不暇文支頤兀兀坐南薰年來病骨千金重出岫無心愧白雲妙用妙用嘉興人題興善寺坦舊倫耆法已沈梁碑宋碣跡何尋緑蘿龕掩從僧定白屋門開任草深簾捲野風傳牧篴磬敲空翠抹疎林獨憐慧火無新焰禿首頻搔嘆古今幻華和尚斯學斯學字悦支號庾山海鹽慈㑹寺僧好行脚南陟台雁北至岱嶽與嘉則少君緯真百榖諸公遊築庵於靈祐有幻華集姚叔祥稱其肆力三唐句高前哲嘉則贈詩曰古寺雲林深復深秦山秦水足髙吟行人問是何僧住彷彿當年支道林山行磵道殊登頓盤盤百嶠連空林人打栗深樹鳥驚蟬移盼失佳境息隂聞暗泉客衣渾欲濕嵐翠滴秋烟雨夜客子久投宿主人還賃舂薄衣寒入夢深雨逺沈鐘壁上燈窺䑕牀頭盋隠龍因思故山好雲濕幾株松睦州城上城上殘陽盡西陵晚色濃嶂嵐低粉雉山郡壓烏龍樵子雲為擔田家水作舂萬峯秋雨過飛瀑挂芙蓉寄少君吳山人知君好芳草荷芰半衣裳一别春山緑幾經秋葉黄海門生片月江寺送殘陽曽有天台夢相擕度石梁漏澤寺一逕草蕭蕭三門嵗月遥白雲非舊主黄葉自前朝有法空髙座無燈掩破寮朅來生感慨暮雨作花飄附考寺在嘉興招提庵刹起鴛湖曲菴將鹿苑同客來黄葉雨鬼嘯白楊風溪晚魚龍寂山禅水月空沃洲烟景似卓錫許支公雍熙寺幸踞平江勝碑傳天監年空山惟落葉法水尚生蓮埽榻分寒雨然燈破暝烟逺師幽意洽重續夜深禪題吳氏瀟湘館幽徑湘雲入藂花竹幾竿林清移席動溪碧捲簾㸔不斷三秋色長疑六月寒籜龍應自起雷雨響琅玕五臺山折斗峰樓臺蕭颯雪㠝岏襆被來登六月寒古殿西風吹鐵瓦長空北斗挂䦨干太原山遶中條近小有天通上界寛欲向隂厓振鳴策恐驚林下黑龍蟠邊城晚眺獨上層臺望欲迷滿城砧杵更悲悽河流曲抱内黄北山勢遥連太白西落葉亂扶秋雨下斷鴻斜引夕陽低自來幽朔寒偏早繞樹啼烏未肯棲贈毛豹孫少年曽見賦青霞老去猶能採石華脱穎自歸盟血地逰踪多溷賣漿家牀頭嵗事消殘帙逕裏秋懐自落花一片毛公壇上月太湖霜白滿蒹葭送陳志𤣥逰天台路入南天千萬峯雲邊片片落芙蓉霞標赤映深城路瀑布青懸絶壁松靈藥更尋丹士宅石梁還聴飯僧鍾桃花莫問劉郎事江上長風跨白龍送俞孝廉天目讀書擔簦遥度白雲層絶世髙峯只見僧夜夜龍厓風雨過山靈常䕶讀書燈同錢懋登王永之南還道中用趙廣平韻去時歸日是何年染得秋霜白滿顛為問鉢囊何所有臨行多是故人牋贈王蜚之酒盡狂歌盼國門風塵逰子舊王孫如虹意氣如霜劔不肻尋常説報㤙呈周明府半肩錫杖半函經身世何人入訟庭為謝官人入山去紫雲長護石門青徳彦徳彦字徽可郡之東塔寺僧律山門人晚居雙徑送僧自楚遊燕撮土人間世何云道路長瓢空燕市月衲敝楚天霜乞食花邨暖行吟草色香臨風雙眼碧幾度立髙岡聖行聖行號智河桐鄉菩提菴僧初不知文苦㕘十餘年通詞翰有山宗緒言麈餘集月下月下凴虛眺芳叢遶梵宫亂山疑霧重定水覺潭空澹影松闗引浮光石竇通已無塵垢累冷露滴梧桐正治正治字慎初桐鄉人秀水精嚴寺僧有客塵稿題畫雨笠烟蓑問酒家漁竿生計却無涯倘然醉入桃源去惹得秦人怨落花竹寮和尚方擇方擇字覺之號振林烏程人幼入桐鄉密印寺薙染博通禪講淹貫百家為焦漪園李臨川曺能始諸老所重倡和者吳允兆茅孝若顧嘿孫唐祈逺也學者稱竹寮和尚其詩清真和雅無一㸃塵俗程尚甫梓以行世立秋日同温新之集顧黙孫雪堂物候已徂夏園池凉氣新逺雲低入户片雨澹宜人有語捜名理無營似隠淪一龕虚在室期我坐宵晨仲夏田家屋邊新剪百株桑一抹村烟逺可望斜徑短橋交竹翠乍晴又雨到梅黄秧針簇簇當蓬户蛙鼓喧喧隔土牆相囑隣翁先刈麥前溪水漫也無妨虎跑寺次蘇長公韵草齊澗口動幽香寺入深林晝自凉隔嶺雲昏疑雨近懸崖藤老較松長偶然樵唱傳中谷時有鐘聲出上方况是昔人泉品勝分余半鉢喜初嘗天耳和尚海湛海湛號雪谷蘇州寒山僧擅書畫見知於王百谷繼與趙凡夫陳眉公善有耳疾對客㑹意㸃頭微笑而已如晏坐清談則能了了萬天間來寓嘉興王江涇李氏墓所十餘年終於静峯庵有寒巖集谷中餘草雪龕草蔣之翹作天耳和尚歌贈之登趙定叔寒雲閣香溪衣帶水白苧小邨東閣掩寥雲外門開亂葉中茶烟浮石鼎松雨灑詩筒盡日看圖畫能令意自空匡山僧智明智明字若昧匡山僧南通州人早事㕘遊將入雲栖寓嘉興王江涇夀生院五年晚居黄巖有空響集蔣之翹稱其詩有風塵雙眼盡水石片心孤萬山當夕照一室掩空江日正鳥聲寂風遲花意閒古松一壁石為屋飛棧半空人在天江上青山三島雪門前綠樹五湖烟亦可稱警句宿圓通寺石耳峯頭寺遊笻薄晚過鳥棲寒樹遍山入亂雲多孤興憑誰發清宵起自歌來朝更何處前路杳烟蘿棲真道士余月汀月汀字湛虛號秋沙萬厯間海鹽棲真觀道士觀廢月汀倒槖興葺其自述有人愚自墮移山計天漏誰傳補石方之句有水月軒稿舟中逺水浮髙漢扁舟載夕暉人家隨岸斷沙鳥背㠶飛俗况消村酒新寒戀布衣片雲何處起先我向南歸蚤秋山院梧桐隂未稀西風連日撼柴扉水香湖上蓮房嫩雨足籬根豆莢肥愛月未能捐故扇聴砧因想到寒衣蓴鱸味似當時否張翰扁舟不見歸暮春出城飲田家朝曦流彩射疎櫺睡起披襟步出城山鳥亂啼如有意野花無數不知名信潮催上風初急細雨欲來詩未成一笑且投邨舍飲坐聴田父話春耕書竹溪僧扇碧玉千竿水一溪風光絶勝瀼東西山僧定起不知午滿地綠隂沙鳥啼白雲散人廣印廣印字聞谷嘉善練塘人出家杭州開元寺蔵修徑山結茅白雲峯頂不出山者十載後主缾窑真寂觀以老器宇沖和神觀閒止窮老㕘究終不以悟自居堅辭僧衆不許開堂數年退院七載南遊腰包杖錫飄然於荒山野水之間孤行獨往搘拄大法於衰殘充塞之餘紫柏雲栖海印入滅真修退蔵密傳三老之一燈者一人而已登天台髙明寺晴日度幽溪松蘿青靄迷路隨峯上下雲逐樹髙低猊座支郎到雞園學士題此中堪隠處應在響巗西石林庵覺道金繩絶巘開半空花雨濕樓臺長林怪石皆龍象曽受生公記莂來祖印祖印平湖人東林院僧後住焦山焦山寄天逰小隠非無意清修迥莫羣園蔬常自摘缾粟與人分倚竹春江雨攤書暮嶺雲毎逢遥夜月孤寂更思君以貞以貞字純白海鹽資聖寺僧夜泊野泊趂鷗邊天空暮雨懸山雲寒擁樹江火夜明船物色生新態鄉思到昔年跏趺難就寢夾岸有鳴泉過友人故居石徑荒凉鳥雀悲閒雲幾片隔牆窺茅堂日暮無人見零落秋蟲挂網絲本中本中字淨覺海鹽天寧寺僧雪江裔孫有天香草送㢲陽若水禮頭陀此去江東望浙西桃花一様草萋萋莫言風景家山異到處春光有鳥啼法印法印字楚章海鹽天寧寺僧有五畆山稿阻雨城中未即出城去多因風雨侵且分題作計以苦句為吟濕豔花垂地寒聲竹在林稍稍淹此聚一悦主人心水芝開士正勉正勉字道可嘉興人祝髪於長水廣福寺後結茅郡之白苧村水芝菴讀書談道儒典梵筴靡不淹貫獨苦心於詩理出句簡冷不襲浮綺卒於天啓辛酉有蕉上編香牙團草古今禪藻集譚埽庵取黄葉水芝兩稿梓之題曰長水兩僧詩過子胥廟古廟蟬聲裏秋風肅將旗野花窺木主山鳥啄苔碑恨未收江賦忠曽入楚詞存吳應有筞欲問恐還疑悦支師北歸見枉紅樹河橋別青蘿水寺期去來惟杖錫得失只稱詩細雨依松色孤烟結栁絲東林嘆無主三過落花時乙已春日避地山中有詢予所自者因賦二首芳草牽行脚春山引息遊林風清擊磬壑雨失蔵舟地不為秦避人將抱杞憂潤花君莫賤飄泊自枝頭故林無日返烟莽任奔馳三十身猶困千秋事可知梓材徒自負桂性屬人移躡屐多窮路深慙伐木詩大泓大泓字野白嘉興小杖林僧有挈瓶草題一笠烟霞老三衣嵗月深經行慵剪爪趺坐靜忘心木落山容痩雲歸鳥道沈人來乞無畏舌上海潮音除夕懐兄弟爆竹聞村落還鄉信轉遥愁難同嵗盡魂不待春招燒燭依孤影支身剰一瓢風塵走兄弟天末淚今宵中洲上人道敷道敷字覺明嘉興興善寺僧遊黄葉庵之門詩律婉勁有骨宋獻儒云敷公詩劌濯性情含吐韋孟後得心疾蓄髪逾年而卒有中洲草結夏誤教人不識日日此茅亭雲石枕長髪繩牀支痩形瓶花乾自落堦草放還青愧未離文字尋常黙誦經費元朗濮仲闇楊若木見過離別有懐此住無人識叩扉誰獨來都應看樹入半作訪僧猜炊飯但收葉留雲不掃苔闗心江上路去後值風雷題元朗水亭微徑樹邊入亭偏池水涯即能通竹屋兼亦占鷗沙晚色湖生月秋香荇作花柴扉夜分火只與釣魚槎贈用上人心自貪孤寂形骸殊可憐微言疑入道偶坐亦枯禪經月不出户有時還放船晚㕘曽共汝猶是記當年道耕道耕字牧隠萬天間秀水真如寺僧定湖之孫有遊燕藁秋日千載竟何事支離卧薜蘿壯心憐病久新句感時多夜火螢然草秋香風在荷有身原自幻隨意學維摩題潘朗叔園中臯蘆墅移來珍重品無端割破烟霞數畆寛煮雪擬忘新雀舌揚旗妬殺小龍團雨前摘翠三春秀松下生香兩腋寒客到漫言逄水厄毎當七椀放歌殘照梵照梵字全初烏程人桐鄉密印寺僧夜坐茅屋坐來山寂寂江城風冷漏遲遲老僧不是悲長夜此意惟應秋月知如恒如恒字見源號雪竹嘉興初地庵僧有小刻種竹無事郊居治藥欄竹移清露葉聲寒忽篩凉月窗前破却放烟梢雨後看税地慳分剛十笏教雲深䕶在千竿為憐欲托瀟湘景莫使刋題粉黛殘大居大居字同六秋潭之弟以兄為師住普善庵喜模晉唐書法亦工詩月無心孤月似相知一度開窗一度思常是梅花枝上白黄昏直到五更時智證智證字生明四明人出家雪竇後同谷響覺明蓮生同依秋潭住普善五年寂於三塔之東堂有寓黄葉庵草落葉憐非耐寒質難禁醉霜姿始信叢生日不無秋後時辭條翻月墮飄徑掠雲吹寜用嗟揺落榮枯倘自知白苧村訪編通禪師桑野濕烟斂秦溪曉霽開我迷行處草君埽坐邊苔簷翠放新竹庭香墮熟梅自期留一宿不慮雨鳩催性廉性廉字無染嘉興大雲菴僧過沈澄溪新居小睡呼不起白雲常在家籬邊十笏地夢裏也栽花沙明沙明字照淵海鹽人善畫住秀水三塔寺范涵輝過訪怪君多野興雨歇出尋僧入夢隨時是探梅隔嵗曽夜寒春故淺溪濶水新増何限懐歸去西齋月掛藤如觀講師如觀字藴虚海鹽雲岫庵講僧有夢花幻住二集春日雨宿友人庵中曉霽作出浦漁歌到曉牕將飛小燕語雙雙濕雲未動歸山思幾片低垂護法幢通章通章字闇然號慧越桐鄉宻印寺竹寮之門人秋日溪上楓葉蘆花水上村烟蔵野寺日初昏溪邊晚步多愁思獨叩漁家竹裏門寂觀寂觀字内惺嘉興大雲庵僧精古籕工詩有跛鼎齋稿雲丆集不寐竟夕翻書卷依然理不分鳥曽深夜語鐘到五更聞暎竹無全月横窗只斷雲素懐猶未析曙色亂溪濆碧印上人大述大述字碧印海鹽資聖寺僧玉芝孫有如是齋集小萍菴曰述公尅意創新吐華茹質如遊孤村絶頂曠不逢人四顧徘徊頗多幽趣過天池廢寺迥絶秋山上翻因廢寺登松濤猶作梵螢火似傳燈日冷埋塵佛雲孤守殿僧放生聞自昔池水漫空澄贈林叟名不聞於世一生事在幽養花多小本抱甕得新流藤剪寛松腹籬編䕶竹頭孰知翁樂志皓首此林丘題水竹居竹室過牆深更深水邊籬落䕶清音生成世外無雙地隔絶人間秖一林活逕晚雲隨鶴宿死庭秋草抱蟲吟已知着意探新句響激能摧百物心檇李詩繫卷三十二
