body:
  text: 檇李詩繫巻三十二平湖沈季友編明玉芝和尚法聚法聚號月泉嘉興人出家海鹽資聖寺嘉靖間嘗結庵澉湖荆山芝産座下人稱玉芝和尚後居武康天池示寂聚初投偈於王陽明陽明有荅人問良知詩即聚也晚㕘夢居禪師得悟與王畿蔡汝楠唐樞董澐諸公共證儒釋大同之㫖焦弱侯稱其透脱為不可得有龍南漫藁題樂耕巻小隠鹿門逺躬耕意自便野花茅屋徑春水石溪田黄犢林邊雨青蓑谷口煙謳歌忘帝力人在太初年陪金侍御泛南湖看山遇雨好移席與雲遲舟楫還今日鶯花只舊時宫袍明白豸僧菜出青絲山簡風流在峰巒入詠詩西湖和錢公溥學士大堤迴接鳳山遥金勒東風細馬驕芳草不知埋帝舄栁枝猶是學宫腰天空水月三千頃春老鶯花十二橋聞說樓船醉年少平章獨免紫宸朝吳山秋望呈張侍御子胥廟前江日晡越王城頭雲有無故宫䑓榭幾黄葉南渡寢園今緑蕪長篴闗山瞻北固清尊花鳥傍西湖不堪落木蕭蕭際破屋炊烟幾處孤石城夜泊石城山勢鬰岧嶤燕子磯寒落暮潮雲際樓䑓開佛界水邊巖洞繫漁舠龍蟠鳳翥留雙闕草色江聲漫六朝形勝不殊傷往事短篷春雨坐瀟瀟越王䑓越王臺上客登臨范蠡湖頭草正新敵國荒涼吳鹿豕故宫行在宋君臣杖藜逺塞風烟暮花木深城雨露春往事不湏悲落日髙歌獨立恐傷神冬谿道人方澤方澤字雲望後稱冬谿號無㕘嘉善人嘉靖間住秀水精巖寺嗣法濟法舟生禀異質日誦萬言詩偈文章下筆無碍一時如唐荆川張王屋方棠陵徐子與王敬美彭沖溪陸五䑓輩皆敬事之有華嚴要畧内外集與諸友庭前春候歸細草發柔翠坐感東逝波忽焉薄秋季風凄木葉下霜冽鴻鴈至物化無暫停前修歎交臂役利已困愚賔名亦牽智所以英俊人兢兢自磨勵送吳山人落葉滿江邊秋風急暮蟬我思天姥寺君上洞庭船束帛丘園少徵兵澤國連不知方處士鍊藥幾時仙仇生仇生有父風能畫擅江東縹緲千峯勢㠝岏尺素中坐增吳苑秀不謝輞川工倘寫天台勝添予補衲翁送范菁山之任雲南北望雲霄迴南征道路長山逢驅象客地入卜雞鄉碧海常飛霧青林不隕霜聖君勞禦逺非似漢文皇西天目髙峰塔院千丈巖扉不易登真身長閟最髙層日中乍見馴簷鳥雲外時逢禮墖僧行道石邊分異草挂衣松上綰長藤青年即有棲遲約白首誰知尚未能送𤣥岳入京故人多半在燕京病裏逢君話北征可是秋來無定力千重離思一時生溪莊即事寒過西堂布被重江頭楓葉想應紅天明自起看霜色不在江頭在鏡中守節守節號虛堂雪江之嗣孫與仇博士董漢陽唱和有東林遺稿秋晚鴻鴈過滄溟前林木葉零露華侵曉白山色逼秋青㣲霽金塘水髙寒玉宇星幽居聊自適不覺醉初醒左街講師正念正念字西洲秀水三塔寺僧世宗朝以詩中式拜僧錄左街講師送林平厓之京八月髙槐樹樹花平橋流水逐溪斜比來北雁無音問望入南雲有嵗華燈火幾羣蝦菜市朋從何處斗牛槎酒杯碁局平生事白首都城別是家送王生歸蜀已從三巴來復向三巴去借問行路難猿啼子規語圓理圓理字雲東秀水天寧寺僧有漫藁二巻慈雲嶺徑仄縁蘿上山空伐木聞兩崖危石抱衆壑細流分曉竹含蒼靄春田䕶白雲回看萬松裏惟有鹿麋羣景昻景昻字雪巖秀水東禪寺僧秋日過邨友老翁家住瀼田西占斷風光花滿畦巗桂香浮秋氣早江楓紅映夕陽低浩歌閒引林間鶴沈醉能聞午夜雞最喜嵗豐新釀熟時邀六逸過潛溪無趣老人如空如空自號無趣老人秀水人俗姓施未為僧究心内典適野翁曉禪師寓東塔老人往謁盡闢夙解益自刻志夜半聞雞鳴大悟曉師遂付衣鉢薙染居敬畏庵萬厯已夘付法於弟子性沖曰明嵗仲秋五六之期吾欲逺行子宜來及期沖至老人示微疾説偈而逝漫成我懶不出户白雲常在山雲應嗤我懶我愛白雲閒如本如本字南詢嘉興白蓮寺僧善書天台道中松林行盡又梅林流水閒雲無住心從此西盤千萬嶺逢人莫問幾多深戒襄上人戒襄字子成號平野海鹽天寧寺僧石林之法嗣體魁碩如布袋和尚㓜事文衡山又與張靖之許雲邨陳勾溪朱西邨遊吟道不在雪江冬溪下能書兼善蘭竹畫山水亦斐亹不輕為人作有禪餘集沈嘉則序之烏夜邨烏夜邨邊烏夜棲月落霜天烏夜啼昔年皇后墳中樹樹盡為薪空有墓今日名留烏夜邨烏飛何處樹無存千秋陳跡荒郊外風草蕭蕭吹墓門春日寄鏡池上人香林春二月烟靄日冥濛灑徑桃花雨飄簾燕子風客來青嶂外犬吠緑蘿中借問今支遁何如舊逺公山居鴈堂依綠水萬木翠隂遮沙暖魚吹沬山春雀啄花惠風舒栁眼榖雨長茶芽室内嚴獅座門前閒鹿車居山幽居山水間蓬户靜長闗有月皆含水無雲不戀山香浮茶椀細花落筆牀閒數日稀來客庭階蘚積斑硤川道中雙峯髙處占僧家夾浦橋連斷㟁斜槐市客沽吳女酒栁堤人賣蜀葵花蠶山處處收氷繭秧畝村村動水車風俗尚傳前晉事葛洪井畔有丹砂曉過横塘半幅蒲帆九里汀石湖秋水接天青舟人指㸃蘼蕪外一帶青山是洞庭越王臺辛夷花落海棠開吳苑春深燕子來野衲不闗今古事坐看雲過越王臺出山黄厯無書嵗月移白頭不記入山時出山借問經過客春到梅花第幾枝定湖老人真謐真謐自號定湖老人隆萬問秀水真如寺僧冬谿之門人也有學行㕘方歸後搆室三楹於長水法師墓側遶屋四五畝細竹翠烟碧霧籠密深通蛇徑風過之蕭然非禪流韵士即蔵躱不出王百谷至每信宿不去栖静三十年有谷聲集詩語淡雋與項少岳同調項子京為作定湖圖掃長水大師墓雪作同雲四望暗雨雪七日多祇樹絡珠纓古塔起嵯峨南圃予舊業莊嚴復如何躡屐獨自往樵採蹊徑訛鳥雀寂不喧草木皆已皤前修有遺蹟長水窣堵波皜皜表梵行行堅喻尸羅停立遡年嵗四百春秋過竊忝藐裔孫掃除倚中阿運帚拂其上寒風動松蘿繚繞還再拂彌天曜羲和清淨本自然斯言良不磨結夏小構碧溪上叢篁獨閉關風從髙樹落雲向別峯還忍草時趺坐蓮花日照顔却嫌空谷響猶是未忘山圓㦂圓㦂字心柏秀水天寧寺僧有青蓮居藁過福源寺訪梵華禪師孤城來數里紅樹幾家村曲水深蔵寺扁舟直到門清言能不厭碧眼笑長存禪指空千刼知君道故尊懐黄山吳仲玉千里黄山別幾年冥鴻不見一書傳昨宵忽共殘燈夢三十六峰青插天訪清真觀俞道士黄庭書罷復題詩白石燒殘又采芝還道日長閒不得青天跨鶴夜歸遲方潤方潤字梅溪秀水精嚴寺僧東明寺沙口東明寺迴峯暝復登烟封捫鳥樹石抱挂猨藤過水留雲磬明龕上佛燈永言同白業脱屣卧巗層徳勝徳勝字梵華號律山嘉善人世姓蔣居嘉興福源菴又名祁堂菴有藕花社集同張生宿吳興山中落日宿溪亭僧堂雨乍醒振衣濕嵐翠開户滴松青瓢挂半邨月溪流萬壑星爾曹全借色何以荅山靈海汛詞二首有引古有出塞凉州等曲極言邊塞兵戍之苦今東南定海闗外楊周諸山守汎者屢因倭警風景淒涼殆有甚焉竊怪詞家不形賦咏用補絶句二章百萬人看青海月兩三冦嘯白旂風洪濤怒激雪山立落日夷歌別島中羽書南海報猖狂守汎樓船黑水洋忽聴倭酋螺四起教人一夜鬢如霜晚巖上人斯徳斯徳號晚巖海鹽天寧寺僧有金粟齋稿嘉禾夜歸我行非旅涉何事亦黄昬螢火禁風淡蛙聲過雨喧一燈魚子艇三户酒家村漸見東來月蒼蒼照海門贈一初闗主坐闗期必悟善閉不緘縢丈室寒暄外髙窓晝夜燈巢林多施鳥乞市有歸僧莫受天厨供令人説小乗春日遊城南園贈主人霽雨日暾暾佳辰處士園池通九折水地接五家村茂草全迷徑髙花半出垣知君學桃李寂寞自無言法濟法濟字慈航嘉興人石佛寺僧有竹閒語得養性兄書故人寄我白雲牋夢裏深談去住縁萍散偶隨鷗浪逺松髙不免兎絲纒舒懐晚嘯千巗月薄視秋横萬里天懸想已知河海味歸來共煮故山泉本中本中字養性嘉興石佛寺僧禪林詩輯又有海鹽釋本中另見過本覺寺三過堂文翁蘭若接邨墟滿徑蒿萊嵗月餘塔擁珠光銜舍利池涵碧水浸芙蕖疎花鳥語和清梵古壁蝸涎學篆書寂寂空堂誰復過去來今事總成虚戒言戒言號少林海鹽天寜寺雪江之𤣥孫有五畝山居少林遺藁題田家野老林居竹樹低白頭志願樂卑棲石矼新水魚貪荇茅屋深村燕惜泥明月采菱歸渡口梨花沽酒過村西由來生事湏當計學稼何妨復灌畦戒逸戒逸海鹽天寧寺僧山居小窗擁被晝偏永髙枕寥寥聴雨眠匣中古鏡有片月壁月素琴無一絃春深何事寒更作落落幾畨風夜顛東郭美人期不至維摩有室榻空懸紫柏大師真可真可字逹觀號紫柏俗出吳江沈氏嘗居嘉善荒墩五嵗不語有異僧過其門摩頂謂曰此兒出家當為人天師言訖不見遂能言兒時志氣雄放不可羈勒年十七仗劍遊塞上至蘇州遇雨宿虎丘聞僧夜誦八十八佛名心大悦即薙髪嘗過匡山窮相宗奥義逰五䑓至京師㕘徧融笑巗諸老發明大事還住嘉善景徳寺掩闗三年郡城楞嚴寺久為勢豪割其半志欲復之萬厯壬辰至京於石經山得佛舎利玉函聞於慈聖太后賜紫伽黎迎供因奏請興復楞嚴又刻蔵經於徑山復戒壇於檀柘西逰峩眉下瞿塘過荆襄登太和憩匡廬復歸宗古寺後聞憨山師以𢎞法被難逺戍雷陽嘆曰法門無人矣南康太守吳寳秀以礦税被逮其妻投繯死嘆曰閹人横行至此世道不可為矣乃决筴入都曰海印不歸我為法一大負礦税不止我救世一大負傳燈録不續我慧命一大負捨此一具貧骨釋此三負不復走王舍城矣及妖書獄起逮入詔獄執政意在鈎黨欲牽連殺之被笞血肉狼籍索浴説偈堅坐而逝牢山訪憨山清公不值吾道沈冥久誰倡齊魯風閒來居海北名誤落山東水接田横島雲連慧炬峰相尋不相見踏徧法身中楞嚴廢寺萬花叢裏畫樓新玉女凭欄天上春明月一輪簾外冷夜深曽照坐禪人吳氏廢園二首汾陽門第晉風流縹緲湖山感勝遊今日松蘿誰是主斷雲殘月鎖江樓築成金屋貯嬋娟草魘花迷知幾年愁見向來歌舞地古槐疎栁起寒烟重至荒墩庵流水桃花大士家道人曽此泛星槎白牛塘上閒吹笛歸去兒童日已斜紺園詩老明曠明曠字公朗隆萬間崇徳崇福寺僧蚤見知於沈嘉則黄貞父諸公四方作者過禦兒必與逰善病築寳函樓居其上西南可望臯亭諸山同邑郭舜舉輩結社殳山招之賦詩著有紺園集沈嘗有詩寄之云憶汝從逰日追予尚盛年傳心招秀句授法凖佳篇薝蔔齋香篆禦兒溪水船追隨宋居士初暘吟詠謝丸仙道化風日朋儔合騷壇爾我偏名園友芳勝畫筆許舟傳士載大運蒼茫裏飛埃桑海前一從鳬令去吕文心遂斷虎溪縁夢接真闗想書來詎偶然新詩三過讀白雪五成絃頓悟知禪理明心見道筌從茲超上乗笑殺辟支禪山隂道中蘭舸逐江開秋深勾踐臺探竒從竹箭即事坐莓苔白雁行行急丹楓樹樹摧霞標望不極疑是赤城來秋日同吳公治明府沈孺真沈稚圭沈伯龍李莫勝郭張虚諸丈結社大雅山堂得書字竹掩西園引鹿車傍城丘壑混樵魚霜蕪半入林堂屐風籜時侵石几書白社多情髙士駕青山無恙野人居不縁湖海成嘉㑹那得驪珠薄紫虚别友昨逢山寺中今送清谿口山水無別顔行人自分手傳相傳相字無為號鹿林桐鄉鳳鳴寺僧有薰蕕漫藁慕果軒鏡園集九日登東林山沈東老遇仙處貝錦峰登九日中孤村小寺有淳風長歌欲問當年事回首斜陽滿樹紅明導明導字心空桐鄉密印寺僧與顔將軍樊昌過楊庵林間一聚首莫謂非夙心勝偶難再逢明日豈似今殘紅已落盡子規無續音向夕來凉風故