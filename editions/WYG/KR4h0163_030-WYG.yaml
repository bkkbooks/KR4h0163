body:
  text: 檇李詩繫巻三十平湖沈季友編唐無著禪師文喜文喜姓朱氏崇徳人七嵗剃染徧㕘諸方嘗往五臺至金剛窟遇一老翁牽牛而行邀入寺堂皆耀金色翁踞牀指繡墩命坐翁曰近自何來曰南方翁曰南方佛法如何住持曰末法比丘少奉戒律翁曰多少衆曰或三百或五百喜問此間佛法如何住持翁曰龍蛇混雜凡聖同居曰多少衆翁曰前三三後三三翁呼童子致茶并進酥酪喜納其味心意豁然辭退翁曰童子相送喜問此何處曰此般若寺乃悟翁即文殊也稽首童子乞一言為别童説偈曰靣上無嗔供養具口裏無嗔吐妙香心裏無嗔是珍寳無垢無染是真常言訖與寺俱隠但見五色雲中文殊乘金毛師子往來時有滄州僧修政等至尚聞山石震吼之聲咸通三年至洪州㕘仰山一日煑粥見文殊現鑊上喜以攪粥箆掌之曰文殊自文殊文喜自文喜文殊湧空曰苦瓠連根苦甜𤓰徹蒂甜修行三大刼却被老僧嫌後築室千頃山光啓三年錢王請住龍泉奏賜紫衣號無著將順寂告衆曰三界心盡即是湼槃跏趺而逝白光照室竹樹同色塔於靈隠山之西塢五臺山夜行遇童子問荅忽然不見作豁州沙界勝伽藍滿目文殊接話談言下未知開佛眼回頭只見翠山巖船子和尚徳誠徳誠蜀東武信人初㕘澧州藥山儼禪師儼云子後上無片瓦下無錐地大闡吾宗後乗小舟住秀州洙涇後析松江以綸釣舞櫂隨縁而度號船子和尚傳法夾山遂覆舟而逝咸通十年僧蔵暉即其處建寺焉有櫂歌二十九首吕益柔為序而刻之今載機縁集撥棹歌三首千尺絲綸直下垂一波纔動萬波隨夜静水寒魚不餌滿船空載月明歸二十年來海上遊水清魚見不吞鈎釣竿斫盡重栽竹不得工程得便休三十餘年坐釣臺鈎頭往往得黄能錦鱗不遇空勞力收取絲綸歸去來錢鍊師朗朗字内光南昌人少讀書以五經登科歴宦有清直聲官至光祿卿後隠居廬山得補腦還元之術唐開耀間居嘉興魏塘鎮之神仙宫年一百五十餘歳尸解去有遺詩於壁云遺詩有箇仙人騎白鶴曾隨王母到瀛洲於今鶴去仙人逺天際白雲空自浮五代超覺大師慧稜慧稜海鹽人幼出家蘇州通𤣥寺參靈雲問佛法雲曰驢事未去馬事到來稜於是往雪峰𤣥沙二十年間坐破七箇蒲團不明此事一日捲簾忽大悟曰也大差也大差捲起簾來見天下有人問我解何宗拈起拂子擘觜打峯謂沙曰此子徹去也沙曰此是意識著述更湏勘過始得至晚上堂稜又口占一頌峯乃顧沙曰不可更説是意識著述天祐三年泉州刺史王延彬請住招慶後閩主召居長樂府長慶院號超覺大師得度者不減一千五百衆長興三年歸寂口占萬象之中獨露身惟人自肯乃相親昔時謬向途中覓今日看來火裏氷紫霄真人譚峭峭字景升少好道遊名山二十餘年得辟􅂖養氣之術日飲酒醉輒扶杖獨遊夏則服烏裘冬則衣絲布衫或卧風雪中人謂已斃視之氣蒸然也遂謂之風狂嘗著化書授宋齊丘序之齊丘欲竊為已有醉縫革囊中投之江金山漁者得而剖之見峭方醒張目曰齊丘奪我化書今盛行矣後住廬山栖隠洞其徒百人鄰僧於溪滸創亭為頑石所阻峭曰此易耳含水噀之命槌其石應手如粉李後主累辟至建康賜號紫霄真人又居南嶽煉丹丹成入青城山化去峭本泉州人國子司業洙之子海鹽有譚仙嶺相傳是其採藥得道處仙鑑載峭一詩尤其寄跡海嶠之證絶句線作長江扇作天靸鞋抛向海東邊蓬萊原是無多地只在譚生拄杖前雲門大師文偃文偃姓張氏嘉興人出家兜率院㕘睦州得悟嗣法雪峰唱道雲門靈樹凡三十載契悟廣大箭鋒所到往往出於游戲其作偈句尤不能測嘗曰上不見天下不見地塞却咽喉何處出氣天下學者望風而至漢乾祐二年坐化後乾徳三年䧺武節度阮紹莊夢偃以拂子招之曰寄語秀華宫使特進李托吾久蔽塔中宜令暫出李以奏聞有㫖令詣雲門開墖見偃如生髭髪皆長李復上其事廣主迎真身赴闕留内庭供養逾月送歸賜謚大慈雲門真𢎞明大師世稱雲門宗綱宗偈康氏圓形滯不明魔深虛䘮擊寒氷鳳羽展時超碧漢晉鋒八博擬何憑宋枯木襌師法成法成字枯木崇徳人出家吳興金山廣法院後住東京浄因寺晚復歸廣法立化於氷壺峯頂山居雪覆喬林同一色青山上下含虛碧採樵人立渡頭寒極目圓蟾為誰白林酒仙遇賢遇賢姓林氏長洲人毋夢吞大珠而孕貌偉怪口容雙拳七嵗沈大淵而衣不潤遂去家師秀州水安院可依大徳間住海鹽金粟寺醉則成歌警世時號林酒仙後㕘龍華球禪師名心印祥符十一年上元日索浴就室握拳以右舉左張其口而化鐵綱珊瑚載張即之書酒仙詩一卷於淳祐八年刻石歴陽吳寛謂其詩意有髙絶處若寒山子之流雜詠金斚又聞泛玉山還報頽莫教更漏促趂此月明回絶句門前緑樹無啼鳥庭下蒼苔有落花聊與東風論箇事十分春色落誰家本心長老文及翁文及翁字本心蜀眉州人住秀州本覺寺蘇文忠三度過訪因立三過堂勒詩傳焉詩曰萬里家山一夢中吳音漸已變兒童毎逢蜀叟譚經日便覺峨嵋翠掃空師已㤀言真有道我除捜句百無功明年採藥天台去更與題詩滿浙東夜聞巴叟卧荒邨來打三更月下門往事過年如昨日此身未死得重論老非懐土情相得病不開堂道益尊惟有孤棲舊時鶴舉頭見客似長言初驚鶴痩不可識旋覺雲歸無處尋三過門間老病死一彈指頃去來今存亡慣見渾無淚鄉曲難㤀尚有心欲向錢塘訪圓澤葛翁川畔待秋深和蘇學士東坡韻二首萬嵗山蔵不二中九峯峯下善財童敲門問竹機聲觸倚檻看花色界空汝坐蒲團曾有夢我來芻牧愧無功吳天蜀地原來近月照峨嵋日又東身滿華嚴法界中香厨底事感天童那知本覺從何覺纔悟真空自不空若有相時原説夢到無言處却收功一鈎月出星三㸃汝向西來我面東契嵩禪師契嵩藤州人嘗著原教論又禪門定祖圖傳法正宗記輔教編上之仁宗韓琦歐陽修皆尊禮之初居佛日嘉祐中陳舜俞以其宅為光徳菴俗名荒墩在今嘉善治東五里延嵩焚修其中有鐔津集熈寧四年寫偈曰後夜月初明吾今喜獨行不學大梅老貪聞鼯䑕聲遂化闍毗不壊者五頂耳舌童真數珠葬於永安之左汎若耶溪越水乗春汛船窗掩又開好山沿岸去驟雨落花來溪影樵人渡歌聲浣女回滄浪無限意日暮更悠哉寄月禪師聞道安禪處深蘿遶隔溪清猨定中發幽鳥座邊栖雲影朝晡别山峯逺近齊不知誰問法雪夜立江西早秋吟山家昨夜房櫳冷梧桐一葉飄金井長天如水凈蔵雲明月含暉變秋景桂枝花折風飄飄誰在髙樓吹玊簫人間不見槎升漢天上將看鵲作橋年少征人在何處白露沾衣未歸去汝畔今無漂母家江南誰與王孫遇錦溪禪師惟正惟正秀州人住杭州淨土院葉内翰清臣牧金陵迎之一日謂曰明日有燕飲師能為少留清話否翌日留一偈而返曰昨日曾將今日期出門倚杖又思惟為僧只合居巖谷國士筵中甚不宜雅愛跨黄犢出入軍持巾鉢悉挂角上市人爭觀之杭守蔣侍郎與為方外友每至郡庭下犢談笑終日蔣有詩曰禪客尋常入舊都黄牛角上挂瓶盂有時帶雪穿雲去便好和雲畫作圖有錦溪集又工書秦少游極􅈿之冬不擁爐以蘆花作毬納足其中夏秋好玩月盤膝大盆中浮池上自旋其盆吟笑逹旦生平不談禪曰徒費言語煩萬象為敷演耳皇祐元年泊然而逝山中橋上山萬層橋下水千里惟有白鷺絲見我常來此廣燈禪師惟湛惟湛字廣燈嘉禾人入道雙林覃㤙得度首謁神照復往依廣智後敷講於雲間超果天台一宗振於三吳自湛始熙寧六年坐逝舍利無筭示人馬上誰家白靣郎穿花折栁垂巾角夜來一醉明月樓呼盧輸却黄金宅臂鷹走狗歸不歸蛾眉皓齒嗔無力此心能有幾人知黄頭碧眼非相識瑞竹上人懐悟懐悟字瑞竹姓崔氏崇徳人宋僧廬山蓮社詠晉室凌遲帝紀侵羣英晦跡匡山隂樓煩大士麾塵尾十七髙賢争扣几才髙孰謂文中龍翻使伊人思謝公烟飛露滴玉池空雪蓮蘸影揺秋風梅溪僧智鑑智鑑滁州人元祐時僧長依真歇於長蘆大休首衆即器之後遯象山百怪不能惑復住雪竇嘗居嘉興梅溪有詩梅溪即事性癖偏宜雲水間半龕栖隠便相安門深雪護千株老溪曲風迴六月寒白法且從身外得青燈還向靜中看幾回欲斷羅浮夣鳥語花香未肻殘髙僧禪師原妙原妙字髙峯姓徐氏吳江人出家崇徳密印寺後析桐鄉得法於雪巖欽禪師立死關於西天目之獅子巖設三闗語以驗學者世夀五十八有語錄雲菴或淡或濃拖雨去半舒半巻逆風來為憐途路無栖泊却把柴扉永夜開真覺禪師真覺不知何許人徽宗時陳太后病用咒水已之乃令住持崇徳福嚴禪院賜金環磨衲再題草菴道人自結把茅新坐斷溪山秋復春夾竹日開梅數朶此中曾否着香塵彩雲禪師嘉興真如寺禪堂後有彩雲橋相傳禪師居此彩雲偈彩雲影裏仙人見手把紅羅扇遮面止湏睜眼看仙人莫看仙人手中扇髙尚真人劉卞功紹興丁夘七月一青衣道士至嘉興府治東南隠真道院自言姓劉居濵州留數日去雲堂柱間題四十三字云行方便坐方便諸聖察上天見得道安得身健但能晨朝洗靣水不得浪淵起盜玊津能顯九霄雲事劉卞功來字畫透柱如㸃漆刮墨和劑能療人疾乾道間真人復來往望吳門外畫工家自起藁繪其像後為伶人王綺所得一夕綺夢真人叱之曰汝留我在此許時如何綺驚悟訪諸隠真始知顛末遂歸焉嘗有一老嫗丐於塗腹大若姙忽遇青衣人與藥如芥子吞之有水自腹中出即平復問之曰在隠真道院淳熙初雲水客張寅來自金陵瞻像起敬話及錫山寳文李公謨宦遊濱州訪真人乾道間真人一到其家㑹寳文觴客弗及接題詩磚壁墨渗徹背即夷堅志所載日轉庭槐一詩是也真人居濱之安平鎮徽廟時屢詔不起守臣奉㫖寫真真人即自題一詩於上特授髙尚處士時政和六年八月十九日也題李公謨壁日轉庭槐影漸移重門複壁轉呼遲不如拂袖穿雲去惟有落花流水知自題寫真韜光晦跡居環堵閉息凝神事事疎漫許丹青傳道貌難將妙筆寫真如鐵笛禪師妙普妙普字性空漢州人久依死心獲証乃抵秀州追船子遺風結菴青龍之野好吹鐵笛稱鐵笛禪師建炎初徐明叛道經烏鎮肆殺戮民多逃亡普獨荷策而往賊見其偉異疑必詭伏者問其來荅曰吾禪者欲抵密印寺賊怒欲斬之普曰大丈夫要頭便斫去奚以怒為願得一飯賊奉肉食普曰孰當為我文之以祭賊不荅普索筆大書舉箸飫餐復曰刼數既遭離亂我是快活烈漢如今正好乗時便請一刀兩段賊駭異稽首謝過烏鎮之廬舍免焚皆其恵也紹興庚申冬造大盆穴而塞之修書寄雪竇持禪師曰吾將水𦵏矣壬戌嵗持至嘲之曰拙哉老性空剛要餧魚鼈去不索性去只管向人説普曰待兄來證明耳令徧集四衆作偈曰坐脱立亡不若水葬一省柴燒一省開壙撒手便行不妨快暢誰是知咅船子和尚髙風難繼百千年一曲漁歌少人唱遂至海濱盤坐盆中順潮而下口吟一詩以笛擲空而没後三日於沙上趺坐如生迎歸闍維舍利如菽二鶴徘徊空中火盡始去山居心法雙忘猶得妄色塵不二尚餘塵百鳥不來春又過不知誰是住菴人口吟船子當年返故鄉没踪跡處妙難量真風徧寄知音者鐡笛横吹作散塲法界庵主可觀可觀字宜翁號竹菴自稱法界菴主雲間戚氏子十三祝髪宗天台教歴錢塘南屏車谿等山建炎初住持海鹽當湖鎮之徳蔵寺退居竹菴後復住延慶祖刹入門適九日因指座作詩尋歸當湖鑿山月池搆松風臺淳熙九年年九十九端坐而化有山家義苑菊坡等集塔在徳蔵西北隅為築城所毁邑令謝良弼夢一紫衣老僧曰我竹菴和尚也以塔累公旦日因為繕治立石表之九日心中一寸灰已冷頭上千巗雪未消老步只宜平地去豈知今日又登髙淨曇上人淨曇嘉禾人嗣法寳寧璣禪師晚住錢唐之法慧紹興丙寅辭歸四衆擁視揮扇書偈曰這漢從來沒縫罅五十六年成話􅀈今朝死去見閻王劔樹刀山得人怕遂打圓相曰嗄一任諸人鑚龜打瓦收足而化絶句本自深山卧白雲偶然來此寄閒身莫湏問我禪兼道我是穿衣喫飯人法常比丘法常開封人丞相薛居正之裔初依長沙華嚴元軾下髪徧逰叢席於首楞嚴經深入義海自湖湘至萬年謁雪巢機契命掌牋翰後首衆嘉禾報㤙庚子九月語寺僧曰一月後不復留此十月二十一日書一詞於室門就榻而逝題室門此事楞嚴嘗露布梅花雪月交光處一笑寥寥空萬古風甌語迥然銀漢横天宇蝶夢南華方栩栩斑斑誰跨豐于虎而今㤀却來時路江山暮天涯目送鴻飛去護國法師淨真淨真秀州僧也嘉熙三年錢塘江坍淨真以偈呈安撫趙端明遂投於江三日而返謂衆曰我在龍宫説法龍神聴受此塘不復崩矣語訖復入於水安撫與民感徳具述其事聞於朝勅賜護國真法師立祠於杭名曰㑹靈呈安撫趙端明海沸江沙水接連民居衝蕩益憂煎投身直入龍宫去要止驚濤浪拍天赤脚道人湯道亨道亨號清音子自稱赤脚道人宋季引一猱云自金陵來處茅椒於秀州城北猱大如人能主給使亨夜坐時頂中出光照耀一室邦人推異爭飯之豐薄不謝第言分定人益異之施與日多因搆菴以居名太古延竚四方雲水之客久之有軍士戲烹其猴食之亨即嗟嘆與所親訣作偈而逝遺詩八十一年饒舌終日化縁不歇重陽時節歸家一路清風明月蓬居子慧梵慧梵字竺卿崇徳石門顧氏子後析桐鄉嘉定間僧受具澄寂院性孝縛茅奉母榜曰蓬居錢文叔有詩題之居側遍樹梅水仙間寫二花亦極其妙得梵隆茂宗筆法又學詩於陸維仲有蓬居集又見陳起宋髙僧詩選其徒妙寧號棘菴有崇福寺記見邑史詩亦清婉如奸䧺窺草鶻髙潔抱枝蟬又蠏芒鍼刺水鷹翼劔摩空惜不得其全首錄之雨後柴門三日雨幽逕十分苔鞭綻竹間石釵漫松下䑓正嫌屐齒入休放馬蹄來題水仙雪骨檀心碧玉姿抽花多在小盆池道人不寫臙脂色墨淡香寒著幾枝廬陵樵衲紹嵩紹嵩字亞愚廬陵人紹定已丑自長沙來壬辰五月嘉禾太守黄尹元以大雲虛席俾令承乏有江浙紀行集句三百七十六首離為七卷自為序稱廬陵樵衲安吉道中集句六尺枯藤了此生青春作伴日同行牆頭花吐舊枝出原上人侵落照耕芳草似袍連逕合亂山如畫帶溪平杜鵑知我歸心急啼了千聲更萬聲象田禪師梵卿徐氏筆精載象田梵卿禪師嘉興人有上堂偈一首偈春已暮落花紛紛下紅雨南北行人歸不歸千林萬林鳴杜宇我無家兮何處歸十方刹土奚相依老夫有箇真消息昨夜三更月在池元石屋和尚清珙清珙字石屋常熟温氏子出家海鹽崇福寺遍逰天目淮陽遇二髙僧㕘悟禪㫖元統間住當湖鎮福源禪寺歸隠太湖至正間詔降香幣賜金襴衣後示寂於湖州霞霧山建墖焉又因髙麗國王表逹詔諡佛慈慧照禪師明隆慶間一士人發墖視之骨皆金色士人若有擊之者立死其法語山居詩來復序之謂有寒山子遺風及庵嘗語衆曰此子乃法海中透網金鱗也天湖卜居晴明無事登霞峰伸眉極望開心胸太湖萬頃白瀲灎洞庭兩㸃青濛茸初疑仙子始綰用碧紗帽子參差籠又疑天女來獻花玉盤捧出雙芙蓉明知此境俱幻妄對此悠然心未終徘徊不忍便歸去夕陽又轉山頭松山居詩五首吾家住在霅溪西水滿天湖月滿溪未到盡驚山險峻曾來方識路髙低蝸沿素壁粘枯殻虎過新蹄印雨泥閒閉柴門春晝永青桐花發畫胡啼滿頭白髪痩崚嶒日用生涯事事能木臼秋分舂白术竹筐春半曬朱藤黄精就買山前客紫菜長需海外僧誰道新年七十七開池尚欲種茭菱茅屋青山緑水邊往來年久自相便數株紅白桃李樹一片青黄菜麥田竹榻夜移聴雨坐紙窗晴啓看雲眠人生無出清閒好到得清閒豈偶然法道寥寥不可模一庵深隠是良圖門前養竹髙遮屋石上分泉直到廚猿抱子來崖果熟鶴移巢去澗松枯禪邊大有閒情緒收拾乾柴向地爐柴門雖設未嘗闗閒看幽禽自往還白璧易埋千載憾萬金難買一生閒雪消曉嶂聞寒瀑葉落秋林見逺山古柏烟銷清晝永是非不到白雲間絶句八首有人問我何年住坐久纔方省得來門外碧桃親手種春光二十度花開玉堂銀燭笙歌夜金谷羅幃富貴家爭似道人茅屋裏一天晴月曬梅花田地無塵長不掃柴門有客叩方開雪晴斜月侵檐冷梅影一枝窗上來離衆多年無坐具入山長久沒袈裟單單有箇鐡鐺子留待人來煑瀑花深秋時節雨霏霏蘚葉層層印虎蹄一夜西風吹不住曉來黄葉與階齊半窗斜日冷生光破衲䝉頭坐竹牀枯葉滿爐燒焰火不知屋上有寒霜山廚寂寂斷炊烟凍鎻泉聲欲雪天面壁老僧無定力又思乞食到人間天湖水湛琉璃碧霞霧山圍錦障紅觸目本來成現事何湏义手問禪翁寄淨慈平山和尚年老心孤憶弟兄中峰且喜過南屏潺湲一派䨇溪水流入西湖更好聴覺隠上人本誠本誠一作本成又名文誠字道原號覺隠崇徳人嗣法於陵虛谷與天隠笑隠友善世號三隠至正間住嘉興興聖本覺二寺姚綬作記稱其善詩畫寫竹有掀簸之態有文集行世至正七年嘉禾城西有烏數千營巢於地圍八尺崇五尺未幾大盜弄兵海上紅巾繼起本誠著烏城誌五百餘言宋濂愛其文刪之以附集中詠吳江長橋天險不可梯白石不受鞭空疑幻人試幻術神輸鬼運來塵寰躋濤駕浪逕空闊盤結鈎鎖金連環又疑東海躍出萬丈白玊虯挾風半溼瓊瑶冷弱水不隔蓬萊境兩岸邀分白月光中流壓破青天影江吞湖吐水勢䧺南極地缺棲魚龍橋成壯觀奪天巧却笑造化無全功訪山居嵗晏偶到山人家青山遶屋松逕斜隂隂林磵白日凍空庭雪壓枇杷花客中九日小橋溪水遶迴廊獨對西風憶故鄉山崦人家秋色晚可能無菊對重陽題友人壁池檻水揺簾影動石牀風引碧煙斜鳥啼纔歇忽飛去驚落半庭山杏花江亭秋晚獨倚清江秋思長晚潮初上水亭凉海門風起雙巒暝一抹銀花湧夕陽坱圠子蔣清谷清谷不知何許人稱坱圠子年二十五涉獵經史言辭簡邃髼首垢面動靜不羈至正初至郡往來市廛類佯狂者人呼為風子一夕叩府人沈蒲團門拒之不肯去且曰將蒲團來坐我沈異之撱一蒲團導詣蔬圃草蓬中宴坐沈徐暱啓之頗有省發遂傾身為弟子由是人爭施予因以其地為庵融然一室足不踰閫者三年嘗有問道者荅曰且去味中庸又手書二詩示沈一日曰吾乗化盡矣若等勉之言絶而蜕示沈二首萬紫千紅總是春何湏饒舌問東君啞人得夣向誰説竪起空拳指白雲不偏不倚立於中不著西邊不著東超出東西南北外一毫頭上釣蒼龍屠甸僧子温子温字仲言號日觀又號知歸子桐鄉屠甸村寂照寺僧也又常居杭州瑪瑙寺善畫葡萄枝蔓皆合草書法時寫詩文於上性嗜酒豪飲不羈然楊總統飲以酒則不一沾唇見輙罵曰掘墳賊時鮮于伯機得怪松一株移值齋前呼為支離叟日觀時過之醉即抱支離叟或歌或泣毎索湯浴伯機必躬進澡豆云嘗在朱宣慰家作畫題一詩朱雖武夫雅敬日觀軒然笑曰我果㑹賣蘆柴和尚知我厚酬之見堯山堂外紀廣平宋无贈日觀詩云玉山道人蒼壁立胸瀦萬斛松煤汁吐作千年古怪藤猶帶西湖烟雨溼元氣淋漓草木活太隂菌蠢蟲蛇蟄湏縈翠霧痩蛟走睛抉𤣥珠黑龍泣神剜鬼刻字崛竒水精火齊光陸離天魔擎來青帝寳鯨波涌出珊瑚枝墨花酣春馬乳漲醉夢渴想西凉婆風忩秋疑螙葉語露架夜憶虬柯垂須㬰掩巻何所見月落庭空無影時句曲張雨詩云日觀一飲西涼酒解寫葡萄絶代無請師截斷葛藤路還我黑月摩尼珠錢唐馬臻詩云老衲搏空無混沌為之闢拔得天地根不假雨露力寒藤挂鬼眼纍纍冷光碧驪龍亦驚猜夜半風霆急浦城楊載詩云日觀作葡萄電掃無踪跡誰於故紙上㸃綴辨墨筆西天十萬里來往僅瞬息敗闕固不小遺下履一隻題畫昔有朱買臣今有朱宣慰兩箇擔柴夫並為金紫貴月磵上人道隠道隠字仲儒號月磵海鹽當湖鎮人俗姓李其蘭石師趙子固墨竹宗王翠巖題墨竹老節逢春欲破空草堂斜挂翠梢風山僧一叚蕭疎意食肉人休到此中若舟鐵網珊瑚載元檇李釋若舟詩一首明僧𢎞秀集云字别岸題蕭翼賺蘭亭圖笑談相對各懽顔那信蘭亭去不還千古昭陵遺憾在忍將真本落人間雲海和尚智寛智寛字裕之號雲海吳郡人元末住秀州三墖寺後析秀水築愛松軒日哦詩其中張蜕庵翥題詩云何年禪師咒䧏龍遣作亭前數十松根來厚地石穿裂聲落太湖風唱喁時到逰僧常挂笠慣棲野鶴不驚鐘知師見月多詩思吟遶疎隂獨倚笻又云醉李灣頭窄堵波種成松樹遶亭多碧粘老甲渾苔蘚黑入秋隂半薜蘿古寺每聞龍捨宅神僧常以鳥為窠無人倣得韋侯筆為作山堂障子歌洪武初被召至京斯道有京都送雲海還山云朝辭魏闕返家林秋半江南尚緑隂鍾阜雲歸山寺近石城潮落海門深僧中不有興亡事世上寧存去住心此別似難期後會且留茶坐撫孤琴其詩散軼景徳倡和一首已載前編茲不錄送王尚書宗禮轉運還京白髪蘭臺老鄭榮野人爭識舊乘驄青冥斧鉞來方國碧海樓船駕巨風夜指星樞天直北曉瞻雲氣日華東趨朝正及端陽候細葛承㤙出漢宫錢塘懐古鐡馬悲鳴汴水黄翠華南渡駐錢塘至今父老稱行在往昔君臣認故鄉銀海雁飛虛夜月銅盤仙去只秋霜乾坤離合寧非數詩罷長吟意渺茫江左外史克新克新字仲銘號雪廬自稱江左外史鄱陽人宋尚書左丞余襄公九世孫始業科舉朝廷罷進士乃更為佛學益博通外典務為古文元末住秀州資聖寺後析秀水即水西寺也與楊廉夫顧仲瑛逰明初召至京命克新等三僧徃西域招諭吐畨圖其山川地形以歸陳基贈詩云我愛水西新仲銘道空諸友説無生出城看客意最古把筆賦詩才更清杜若洲邊春欲莫鴛鴦湖上雨初晴十載間闗重相見深杯寧惜為君傾又陳翥荅詩云吳楓初冷雁連天夢在江南野水邊詞客欲歸嗟老大美人不嫁惜嬋娟豺狼正爾當官道龍象於今䕶法筵我識新公老禪衲一燈蒲室是真傳初著南詢稿燬於兵今惟雪廬集行世如送總管側失總管還朝序則徴糧於張氏由海道還朝者也蘇院判招䧏詩序則張氏之蘇同僉攻江隂而旋師也大率望庚申之中興美張氏之内附而於明多指斥之詞焉虀甕先生食虀如食肉一日不食心不足淡然中有至味存鳳髓龍肝何足論昔者韓公有髙識五年太學朝朝喫後來易簡雖復知酒酣夜半一咀之長安少年那解此羊肉如林酒如水酒瓶羊栅湏㬰壊先生虀甕長年在荅蘇太史昌齡㣲雨作春寒兵戈道路難百年嗟逺别千里愧相看把酒花聨席揚舲雲滿灘水西官閣靜文字足盤桓題清心堂帖巻後山郭髙堂花木新夜虹穿屋結晴雲繞牀蛇蚓鍾王字滿案琳瑯秦漢文筆塚秋烟迷鳥跡墨池春雨散鵞羣為憐書法湮淪久亂後題詩却憶君為恢復初題畫山上青松山下泉別來清夣隔烽烟霜紅柿葉秋千樹波冷芙蓉月一川土室靜燒蒼术火茅齋閒賦白雲篇披圖總是思歸客腸斷匡廬落照邊送除上人之武林雪花飛送浙江船歌斷驪駒一惘然荆棘銅駝淒暮雨樓臺鐵鳳墮秋煙遼東鶴返塵生海石上人歸月在川回首六橋楊栁外水光山色共晴天荅蘇昌齡學士見寄端居久佩息心銘坐對中庭春草青身後文章歸哲匠世間功業付英靈飯餘倚竹雲千畆定起焚香月一亭珍重玉堂蘇太史躭書如醉幾時醒初至檇李遇蔣漁石大使通越門中逢故人爽溪橋上送餘春燕飛官巷桃花老鶯囀江亭楊栁新行李風塵千里道緼袍天地百年身未聞淮海休兵甲回首闗山一損神登姑蘇城城上旌旗烟霧重樹頭初日出雲紅一溪鷗散桃花雨兩岸鶯啼楊栁風邊塞鼓鞞終日振鄉闗道路幾時通江南春色渾依舊桑柘青青門巷空次韻顧仲瑛移家檇李作畫舸載書隨蚤春平湖雪消楊栁新黄鵠九霄不可致白鷗萬里誰能馴謝安自是廟堂器元亮本非丘壑人聖主徵賢圖治亟未容便作耕桑民次韵陳敬初員外留題三塔寺二首南省郎官金馬客使車遥駐郭西林龍宫乞水波濤險鴈墖題詩薜荔深世外烟花春爛熳雲中幢㦸夜蕭森十年海國論文舊風雨滄江辱屢尋虎林城下棹歌發鴛水灣頭梅雨晴傾葢驛亭看洗馬把杯山館聴流鶯夢迴台府星辰近思繞仙䑓沆瀣清陶逺向來廬岳社只今江海未寒盟題濮元帥别業海國元戎鬢未班歸來拄笏看青山田園暮景烟塵外䑓榭春風錦繡間桐影連溪鷗卧穏桂香吹月鶴飛還碧蓴絲鱠黄花酒時向樽前一解顔附考在桐鄉濮院鎮元濮鑑為寧逺將軍有八宅此其一也次鐵崖送沈道士會稽山前賀狂宅句曲洞口陶仙家參差樓閣五雲裏飛珮時時凌紫霞達丞相承㤙詞金壺玉露逐皇華黄土重封識内家宴罷省門扶上馬㣲風吹側㡌簷花酬黄伯成見寄金華仙伯頭如雪亂後殷勤逺寄詩白石洞中題壁䖏人烟今不似當時奉荅宣讓王太子數椽茅屋數株松蒲榻髙眠海日紅不是賢王招不起山人只合住山中題杭上人芭蕉山寺春深積雨餘坐看花影上階除新詩吟罷無人到只向芭蕉葉上書寄三塔雲海和尚雨後龍孫過屋長半池疎影月微茫鳯凰巢在雲深處日日銜花到上方檇李詩繫巻三十
