body:
  text: 檇李詩繫卷二十五平湖沈季友編國朝魏湖西學渠學渠字子存號青城嘉善人順治戊子舉人除成都推官時蜀道荒涼務以撫綏為政重定嘉眉卭雅賦額民頗徳之擢刑部主事贖魏女之没官脱丁生之謗獄轉兵部郎陞湖廣提學後補湖西道以艱歸渠慷慨好施桐城錢澄之感其惠有詩曰還家擬建懷青閣從此饑驅不出門武林汪繼昌以所贈築園江干名曰魏圃黄宗炎求買山之助出紙襆置其袖視之則黄金一餅也他率類是著有青城山人集東飛伯勞歌東飛伯勞西飛雉翠羽紅襟照江水誰家女兒樓上頭深愁獨坐垂簾鈎楊栁枝低拂官路細乘犢車低不度女兒十五佩明璫爛若朝霞耀扶桑春風飛花春日遲空持可憐當向誰遊祁氏寓園即忠愍先生沈淵處北望首陽巔黄雲愁欲暮南沂汨羅水清光渺難晤我行陟寓山哲人想芳素岡巒互起伏蘭蕙紛無數亭榭欝㕘差夕霞横古渡的的綠池荷飛飛汀洲鷺孤鳥西北来哀鳴如有訴風雨眺髙原慷慨登樓賦之子赴澄潭客徒悲薤露山鬼披羅立湘娥倚竹顧人生不百年喟然怵先露邯鄲懷古黄花白雪悲風埽我來驅馬邯鄲道城中遊俠不聞名樓上女兒為誰好君不見趙王全盛時太行為城漳為池叢臺歌吹青雲聳平原車騎白日馳白日青雲交結是亷藺意氣相為死挾彈鳴鞭出國門殺人報讐在都市賔客慕義來山東慷慨却敵不言功李牧椎牛守代谷主父變服入雲中滄桑世事須臾改舞館歌梁竟何在英雄白骨歸荒丘少婦紅顔失精彩把酒臨風且放歌年年秋水漲滹沱古來憑弔邯鄲者亦逐茫茫東逝波訪顧五玉園居不值猶值梅花路長廊春色披美人遲不見芳草慰相思雨暗迷金谷風生滿習池明晨期再訪拂石勒新詩經吳城疎栁髙梧傍客舟闔閭城上角聲秋風吹白紵清砧急月上紅欄暮笛愁草碧吳天迷北望潮平越水向南流行人無限滄浪思㡬處笙歌繞驛樓淮上訪陳階六明府百尺樓前淮水平三秋客夢使君情蕭蕭雨暗田横島漠漠雲遮韓信城南伐六軍方駐馬北來四月未聞鶯不堪囬首西州路重向山陽聽笛聲江右康味淡先生令予邑去後而邑人祠之湘泉菴志弗剪伐也小范以公車之北過拜先祠作湘泉慕八章漫和一絶處處丹楓繞樹枝殷勤含淚讀殘碑只今故舊㡬人在惟有泉流似昔時江贈君臯臯字黙含六嵗喪父依母屠夫人性最孝年十六補嘉興弟子員順治丙戌避亂為盜所傷昏暈中若有神曰江孝子無恙天將佑汝後遇醫得痊長子溥國朝順治戊子舉人為海城令贈臯如其官謁包孝肅先生祠有感蜀山不大髙淝水不大深顧瞻公祠下髙深在我心古語重寒鐵今人鐵亦消所差在中熱冷面何足驕陸秀才濬明濬明字以昱號梅岑濬睿弟博綜六籍有東園漫興藁九日暮雨有懷以祥五弟二章風林急繁景小雨催暮愁獨處陶令宅逺遊庾公樓余冠戀華髪客棹遲敝裘髙阜聊極目孤鴻起汀洲無復登臨興人言節序良編籬惟䕶菊載酒可飛觴逺寺浮煙際孤帆出水鄉何當薄暮雨兩地繫情長涼州詞將軍血戰取涼州天寶新聲塞草秋凝碧池頭陳廣樂葡萄獨酌上皇愁卜秀才不矜不矜字竽公嘉興縣生棄舉子業専事吟咏有復觚集僧房空庭多木石梵韻雜鳴禽門閉芭蕉雨溪通楊栁隂岸花侵竹入徑草䕶雲深惟有清宵夢還將月印心始安遊水龍洞探竒是處覓行窩前隴煙雲入望多溪帶金蓮浮碧藻峰盤玉筍出青螺松枝似蜕遺鱗甲石乳成花䕃薜蘿轉向虚亭問仙跡㡬行殘碣在輕莎陳知縣増新増新字子更號除菴嘉善人順治戊子舉人授安仁知縣有髙俶堂集富春覽古王氣在吳㑹龍興由富春中原方竊帝滄海未稱臣尺檄親提百萬師先驅鄴下黄鬚兒大喬承寵臨粧閣無那營中大星落可憐人杰孫伯符事業盡付紫髯奴荆州借去無消息餘勇還能撐半壁自此東南斥堠平牙檣日夕逐潮聲欝蔥猶是南岡色遺廟荆榛狖夜鳴明妃怨不分承恩寵何勞省畫圗含嚬辭永巷緘怨即長途􅓋篥邊霜苦琵琶漢月孤燕支山下過曲奏小單于秋日雜感南雲萬里接中華此日滇池泛漢槎戍滿夜郎春舞纛馬騰天女城名晚吹笳渡瀘羽扇揺三伏下瀨兵符按五花周禮職方傳露版行銷金甲事燒畬蜀檄西南未解兵羽書旁午夜聞鉦方愁䕫子沈魚復豈意蓬婆欵錦城赤甲山前初奏凱青羌帳下自通名當知劍閣非難據乘傳相如檄草成寄懐周端臣金州明月路三千目㫁榆關落雁天一自短轅人去後曉烏嗁徹舊臺邊沈貢士純禔純禔字蒼悦海鹽人𦙍方子順治戊子副榜有塵埃喟燕臺意蘂諸刻家園家園今日好霜後菜畦晴肥煮黄衣雀鮮烹白殻蟶宿酲償綠螘新榖傲青精晚到橋西立微風翦竹聲仲知縣𢎞道𢎞道字開一號改菴桐鄉濮院人順治戊子拔貢除嶧縣令有子來堂槀殳山以下七首考見三卷無復仙翁在誰同雲往還月明千里白長祗望殳山史山聞説來青室開軒對史山可憐芳草遍不見燕飛還桐棺塜仙人曽羽化巾氅𦵏桐棺無復尋遺𦵏空悲宿草寒洗藥井山色傍霞紅峰頭水氣融怪來能療疾遺藥在泉中藏兵塢此地戰場遥忠魂尚未消年年風雨夜燐火至今燒潮音院蘭若依長林潮生一院音非關湖海近梵響夾鳴禽顯靈廟三月花開日空山正寂寥神官原有祠村社走漁樵東山未得登臨興東山憶逺遊聊從桐水畔指㸃話林丘甑山誰家遺巨甑突兀俯林丘經嵗無人到煙雲自去留附考山在桐山清風鄉形如甑故名其麓有順慶寺王家山壘土成魁父悠然境外山我從山上過牧笛破霞還附考山在桐鄉募化鄉王氏壘土所成上有靈顯廟宋公主墓深宫常匿影遺塜任蒭蕘花月年年在芳魂不可招附考墓在桐鄉殳山東宋髙宗紹興三十二年孝宗尚在東宫女永嘉郡主卒詔以醫官李師克等付吏訊治孝宗奏臣女㓜多病不宜罪醫乃寢乾道二年贈嘉國公主𦵏于此陸思州世楷世楷字英一號孝山晚號錮翁濬睿長子順治戊子以貢授平陽判姜瓖搆亂被圍五旬楷固守繼乃誘降李建泰平其黨遷登州郡丞判帥海時行聞其名勿敢犯海寇張名振聨䑸深入計却之陞南雄太守一以仁厚為治民戴之若怙恃時兩藩龍票横行粤中楷不為屈奸僧指南倚勢為害立斃諸杖建天峰書院以訓士丁外補補思州乞歸卒有越吟秋吟晉吟齊吟嶺外思陽等集詩格直追開寶合雅歸風不獨為湖中領袖也遊錦石巖登山如觀書開卷見大意自非日紬繹鮮克窮其秘晨興趣歸裝徬徨求杖履扶攜下重阿顧瞻情何已改塗指幽厓牽蘿入澗底劃然雙石門洞府為誰啟堂室皆天成軒渠面江汜丹霞擬岱宗錦石梁父耳何為探竒者至此輒觀止碑碣空紜紜解人良未易所以面壁老終古無一字别義山弟捧檄出帝京駕言返故鄉經途睠吳㑹去國經沅湘分符在蠻郡道路阻且長親交徒悵望誰與傾壺觴眷懷骨肉情迢迢上河梁零雨忽朝降重雲覆前岡車徒嘆寂寞行李減輝光酌酒更相勸臨岐意徬徨垂楊未堪折惜别牽衣裳牽衣難乆留佇立同含愁含愁亦何為棣萼空綢繆委身嬰世網聚散寧自由荆枝怨分植雁影悲孤遊彈冠慕郡邑俄焉南荒投簡書益敦我俯仰増離憂離憂日以積進退兩無䇿舍我琴瑟歡尋彼魑魅迹䍧牱尊夜郎羅施雄鬼國溪洞恒塵昏苗蠻易反側滇南與嶺右所在尚兵革驅馳荒落間一官類遷謫遷謫休歔欷君命安敢違惟念同懷人少壯多别離家居失喪亂宦遊隔京陲况此徼外行後㑹誰豫知行者疲津梁居者虛房帷春草既憔悴秋風彌淒其金門稱大隠臣朔常苦飢苦飢且勿哀侍從誇翹材聨步升玉墀秘書窺芸臺著作擬遷固詞賦陋鄒枚立言茍不謬千載欽良才何必感離索皇皇賦歸來歸來良足思懸車固有期祖帳榮漢廷二疏誠知㡬庸庸守邊鄙忠信恐見疑崦嵫漸以逼拂衣須何時白首依故園猶得樂塤箎萬里自兹别珍重無他辭墨江歌凌江之水淡無色鑑徹繊塵不可匿斜階以下即濁流其水黝黒命以墨凌水自潔墨不侵分流數里猶湜湜世人愛墨不愛凌就中有蜮誰能識漳溪染足此染心中兹毒者何其深相逢矢口説冰檗一杯纔酌百慮淫投珠饋璧未快意雌黄青白時相尋眼前故人盡魑魅知已惟有籯中金吁嗟乎濫觴之波曽㡬年滔滔天下皆溺焉獨清豈能挽衆濁石門况復有貪泉寶摃行逆臣雄據西南際跋扈居然自稱帝驕蹇由來非一朝邸中服物多奢麗王師百萬困滇城城門夕閉宫朝清可憐珠玉焚不盡滿宫玩好猶充盈珠玉全歸將士槖玩好雖存亦零落進獻喧傳寶摃名那知人物同蕭索細腰宫女半雞皮傅粉伶人鶴法垂此輩豈堪充殿陛坐令道路費驅馳道路驅馳一何亟夫輿舁送疲民力牙牀石榻青銅屏攣步僂肩喘不得逆臣據滇嵗未乆安得窮捜詫希有應是前朝黔國遺掌握百年歸唾手沐公功業炳丹青白蠻黒􅈎咸來庭後人席寵漸喻等器制或恐乖常經要知總屬亡國物得此詎足昭威靈皇家不貴珍竒類萬里徒勞貢闕廷馬船行南人使船如使馬北人用馬還用船將軍驅馬一萬匹載馬直須船一千千船費金約五萬其價始與馬等焉粤中盜賊利舟楫千頃蒼茫凌一葉江村遥望隔波濤驊騮雖健難近躡北師藉馬方成功豈知馬更藉船通何如用船且舍馬伏波横海名猶雄黄金費盡龍媒蹶殘櫪蕭蕭閒廏卒馬船已朽馬骨髙朝漢臺邊嘶夜月蟲異有序蟲自靖州天柱而來漸入平清境内大小不一其類飛集榖倉或全食或半食榖有針孔少許中已空矣村民禳之即可獲免此事史傳不載因紀其異仲冬之月百蟲蟄忽有異物從空來細如狗蚤大鱉蝨所至輒為倉廪災蟲本化生亦由濕假之羽翼恣飛集輕于塵霧逺忽踰鋭若針芒堅已入昨年亢旱良可哀葢藏竭矣租賦催幸今有收又侵耗害同雀䑕尤壯㢤或云降罰皆凶人空中驅遣似有神師巫祈禳頗能騐訛言或亦由愚民古來物變不勝窮穆王軍士成沙蟲干戈連嵗多暴骨得無怨骨成鬼雄此蟲曽未見經史紛紛臆説從兹起上天休咎豈易知勤修人事災應弭有虎勿捕蝗勿驅至誠所感異類孚彼蒼降鑒神亦聽區區禱祀何為乎豆異有序施秉狗洞苗寨有豆雜雨而下其色微碧煮食不異常豆唯磨以作漿入鍋即成赤水有持至思州者因紀以事昔聞雨金并雨粟豈真神鬼輸運速為祥為孽理未明不耕而穫恐非福蚩蚩苖民何所知但喜有粟從天貽饑者易食聊一飽化漿為血心始凝聞之逺近盡驚詫蟲災况復當此時余思風力稱最雄能搴巨石旋空中矧知小物任飄隕祗訝色味微不同古今異事多訛傳比來目擊信有焉鬼方妖幻紛堪紀何必齊諧志怪篇懐嶺外詩人王孝亷震生鳴雷升書遭喪亂辟世儗牆東身隠文堪賣名髙刺懶通一椽鮫蜃裏三徑荻蒿中尚記門前轍絃歌樂未窮薛秀才劒公始亨嶺徼干戈後髙人隠賣漿舊交存劇孟新吕得嵇康海國珠璣富山村薜荔香關前相見晚樽酒憶清狂程太守周量可則然綸推巨手倡和羡新詩畫省分雙筆炎方借一麾公餘吟石室没後祀羅池烽火灕江逼孤城盡瘁時尹吏部振民原進休暇當清晝逢迎有勝流趨庭娛綵䄂秉燭醉蘭舟筆格珊瑚麗觥船琥珀浮山公今領選寂寞竹林遊梁解元芝五佩蘭豈獨文髙等詩成迥出羣何人推賈誼頻嵗放劉蕡不羨紅綾餅惟誇白練裙君家詞𣲖逺才子已前聞梁公實列嘉靖七才子喜聞滇城内潰逆孫自盡用少陵聞官軍已臨賊境二十韻六詔風塵起諸方饋運勞誓師張撻伐乘勝逐逋逃勁旅如摧朽崇城若燎毛合圍當要道堅壘逼長壕困獸臨關縛妖狐聚穴號皇恩頻祝網逆志尚持牢未肯生銜璧終看血飲刀市㕓時雨降帳幄彩雲髙往者威權假旋令黜陟操分藩驚異數尚主慶殊遭紈袴皆紆綬輿臺盡擁旄黔山矜險阻椘澤恃波濤奉詔仍驕蹇稱兵任驛騷蕭蕭餘白髮草草遂黄袍隴蜀猶公等孫劉詎爾曹誰能成掎鹿早已獲連鼇閩粤二逆先期蕩平解甲山同積藏弓月並韜車書通越賧烽火息臨洮亟散殘黎粟歡投戰士醪平蠻應誌喜當殿灑宸毫滕王閣晚眺撲地惟看瓦礫存空城鐘動欲黄昏路傍孰進王孫飯臺上徒招帝子魂馬帶斜陽臨石鏡樵牽落葉下松門隔溪浪指秦人洞試問桑麻有㡬村諸將五首元戎専閫夜郎遥􅈎道烽烟萬里銷略地自開諸郡市瞻天還帥百蠻朝階前掾佐多腰艾帳下材官半射雕誰謂南人畏諸葛將軍原是漢嫖姚荆南募府羽書紛丞相威名天下聞到處輕裘懷叔子當時帽落笑㕘軍盤江漸見梯航逺蜀道無勞饋餉勤豈為明珠讒薏苡雲臺不數伏波勲三軍縞素哭賢王秬鬯重看賚尚方自取崑崙通象郡更移閩越控扶桑島門盡解田横甲海舶初歸陸賈裝最是此中能速化直教鱗介徧冠裳開封横浦舊崔嵬虎旅長驅一夕開翠羽不須天闕貢文犀何事日南來蠻歌十部貔貅暇野哭千村鴻雁哀嵗費黄金收駿骨越臺空自擬燕臺朱旗千里擁艨艟北固山頭戍壘空不是水犀來海上已教鐵鎻㫁江中孤軍成敗誰臨汝半壁安危獨倚公聖主酬庸多異數早開麟閣畫飛熊後感事三首浹日三驅中使過似聞炎徼有驚訛夜郎部曲留莊蹻南粤山川屬尉陁天意豈容成割據人情猶未厭干戈請纓不少終軍輩老驥雄心奈爾何老臣自切明農志内相何煩持節迎方報三藩同整斾豈期六詔遂稱兵裹氊入蜀功安在躡足封齊釁已成却羡據鞍猶矍鑠南人應仗伏波平念爾家承祖父賢金符鐵劵已三傳分茅逺控河山外賜第長開日月邊舶泛鱟濤通貝幣旗沈鰌穴息烽煙兵權釋去恩無替歌舞還堪樂少年後感事四首古來開國仗師貞茅土相傳祚不輕姬室尚能存杞宋漢家豈忍負韓彭長驅忽使羣蠻動一跌終看九族烹妄擬長驅收六合却憐忠孝兩無成雄心强欲效無諸縱據全閩亦一隅内顧未能除海患前徒何敢拒天誅姻連北闕情原戚刑服西曹許自愚獨幸聖恩多浩蕩脅從猶許貸文儒弱國猶懐牛後羞比肩屈膝更何求山河自握傳家劵海嶼還通互市舟未見散金酬死士祗聞乘醉快私仇天心厭亂除戎首釁在蕭牆豈暇憂誓爵惟慿六尺孤一朝失守盡為俘前驅竟入鯨鯢穴後乘空存豚犬徒閫内鼓旗誰更屬軍中庚癸自頻呼柏舟勁節同淪没未審終完白璧無廣州嶺外常如五夏天珠江潮汐浩無邊萬家水檻迎朝日隔岸花村起暮烟瀾市喧闐畨帽集濠居宛轉妓衣連滿城第宅勲籓據横海帆檣異國傳里社舊分誰辨樹街衢新闢已分㕓機中織錦霞同艷櫝裡藏珠月共圓帳剪異綃忘酷暑爐焚竒腦識沈涎文牕贈客珊瑚格綺館留賔玳瑁筵每怪細蟲多入饌還誇珍果倍盈前脂凝瓠齒檳榔染玉繞雲鬟茉莉穿巧士材童矜婉孌華琚金飾儼神仙名區自昔稱都㑹沃野于今更曼延火映千林丹荔圃風揺數里綠蕉田小園障日思葵扇深閣迎寒憶木棉蛤粉為泥塗壁堊蠔房似石叠牆堅行人曉起催雞粥估客宵歸覓蜑船留我鷓鴣啼莫惱昵他鸚鵡語堪憐只愁瘴癘炎方甚逐客孤踪獨黯然雄州竹枝朝聞鷓鴣啼山頭暮聞鷓鴣啼江頭山程水程行不得郎今何事斜階遊十三女兒朱顔酡夜來聨袂相經過懷逺樓前明月滿一時齊唱木魚歌讀三大家詩鈔戲為俳體牧老風流肖牧之紅牋碧硯助吟詩東山一臥閒絲竹新得佳人是夏姬玉樹銅駝恨未忘永和一闋擬連昌梅村不作梅花夢閨詠親貽卞女郎珠江簫管擁蘭橈國子先生未寂寥使粤歸來應載寶細君湖上正逍遥野泊桃溪花落隔通津短棹沿洄朗水濱客路賓朋俱散盡嗁猿何事尚依人髙處士陽陽字廷堅嘉興人與内君歸素英有倡和諸刻鍾琴俠過訪不值次答僻地人還朴探林户自收飛英無避酒冒雪有回舟水曲遊魚静沙平浴鷺稠東山吾自望隠隠唱梁州沈秀才日星日星字明阿號大山平湖人君禎子少受知于江右黎博菴補學宫弟子性好山水交遊半天下有蘭石齋詩草詠懷明月照書帷披衣起局促蟾有盈虧顯晦逓相屬静夜百感生青苔臥涼玉流光忽以邁沈思在秉燭大道貴寧澹豈曰從嗜欲躑躅安所如姱脩敢自朂贈姜如農先生抗疏薄功名孤身去國輕廟廊存直道草野播賢聲昔過懸雙綬今來化一莖蕭然鷗鷺狎拄杖説無生雨夜小集同莆田林衡者梁溪顧脩逺餘杭嚴子問子餐相逢湖海氣偏豪坐聽檐聲醉濁醪江表何年推將相中原無地不弓刀且將捫蝨籌方略竚看飛魚上野袍滴瀝閒庭誰刻燭明朝漲水送輕舠張侍郎天植天植字次先號蘧林秀水人順治己丑進士殿試第三人由翰林院編修厯任兵部右侍郎有北遊草湖上偶吟宿山樓喜到山樓世外棲客蹤如入武陵溪石稜侵案開竒壁疎牖迎煙覆淺畦青嶂霞光愁裏去紅塵身影夢中迷何年直踞廬峰頂閒嘯髙雲萬象低句容道中句曲餘風古意存綠疇黄犢小紫門草愁春去消煙黛風繞天空散日痕堤接麥隂垂淺水雲籠樹色暗孤村山農箕踞深林裏笑看行人别故園陸渭渭字宙肩號胥逸秀水人有燕齊遊草登岱詩漱雪堂集除夜與標栻兩皃對雪小飲悠悠嵗云暮塵夢㡬盱衡煮雪頻浮茗尋香獨破橙垣然胸次濶笑對燭花明娛我蘭初茁春回淑氣生丙午除夕悼内孫介畹擁絮桃燈伴嵗寒送年情緒訴人難屠蘇酒在唯兒勸奩鏡塵生有女彈素幕紙錢灰似雪畫樓香硯墨無蘭介畹善蘭竹有硯香閣稿行世虛房蕭瑟如僧舍魂斷西風泣轉丸壺領山人魏允枚允枚字卜臣號功父稱壺領山人嘉善人學濓子順治戊子舉人授西安教諭未仕卒其楚遊集自序云五福無徴漫擬傷心之賦百年將半長謡病肺之篇遂使夜狖晨鶯徒工迸淚春花秋月祇解傷神踪跡難期命途多舛悉其禁抱不無噍殺之音托諸篇章惟以悲哀為主寄六弟作客頻年慣今偏憶故鄉老親能恤緯稚子解扶牀夢入清宵短雲看白晝長愁心逐江水日夜下潯陽經伏城驛次上海朱思皇韵思皇云伏城故魏忠賢懸首地詩因及之其實非也當是阜城縣耳飄零禾黍遍荒丘慙向風塵曳敝裘悞國中涓終古恨傷心北寺至今愁先人不愧陽司𨽻舊徳誰誇滿武秋千古是非青史在張袁著作定搜求郢中懷古六傳趨朝纂大宗星明江漢起真龍金鳬玉虎埋虛寢蓽路桃弧啟故封往事已隨春草没餘愁還向夕陽逢上陵空奏南巡曲白日何曽照萬松武陵竹枝詞三首森嚴廟貌有神靈嵗嵗龍軺導七星南北路爭臺閣巧犢車雀舫滿楓涇鳴榔徐溯碧波紋毛豆香燒到大雲向晚歸來人更閙吸笙揺鼓一時分九松天矯白雲間日夕遊人自往還春末藤花秋半桂名園唯説沈家山江行棹歌二首阿儂家住漢陽江少小生涯託畫艭莫怪風波能見慣曽從開府下韓瀧數行歸雁叫重雲息棹滄江日已曛空向石鍾山下度茫茫何處弔番君吳貞外亮中亮中字寅仲號易菴嘉善人嘗與錢繼振郁之章魏學濓學洙學渠曹爾堪蔣玉立為文字飲稱栁洲八子酒脯筆札亮中典之搆來問堂鍵户力學順治己丑登進士授户部主事督理漢中糧儲有頌聲轉員外郎卒發渭門宿茶喜灘連山草木繁横縱始鋤葺亂離二十年親故不復集榛莽襲衣裾誰能辨井邑結茅漢之厓綆短亦可汲雲深日曚曈作息隨出入種菽在岡原種麥在阪隰待汝供晨炊所願登塲急白鶴山人陸之瀚之瀚字水立平湖人父懋功官四川保寧知府㓜年隨侍徧覽太白峨嵋諸勝歸值鼎革放情詩酒自號白鶴山人與同里錢士馨施洪烈族人濬睿上瀾相唱和晚年食貧樵蘇不㸑泊如也湖中粮役多為豪黠者所持瀚與弟之瀛糾同志九人請諸范中丞立官收官兑法民賴以甦有蜀歸記鶴山草堂集君子行偃息鮮讙虞出門多險艱皎皎時所嫉遵晦良獨難茍非明且哲投足豈獲安宻霰先雪零履霜知嚴寒君子察㡬先戒兹禍福端念彼失馬翁使我發長嘆哭范中丞覲公帝簡初膺控八閩詎知黄屋僭藩臣孤身逺餌鯨鯢窟百口同劘虎豹齦天為吾朝留正氣君今何處託威神即看不軌從天戮義士猶來哭海濱孔提學自洙自洙字文在桐鄉人微時以任俠聞中順治己丑進士厯官福建提學答張剡木同社文章自爾真冰雪咀嚼令予沁齒清柏子篆煙初結鼎梅梢瘦影欲穿楹正愁白璧輕三獻始信黄鍾扣一鳴多暇細論殊不厭日長來共煮茶聲柯通政聳聳字素培號岸初嘉善人順治己丑進士授棗陽令西山寇發勵衆守邑他若船工屯政蠲荒禁鬻皆有實禆于民陞禮科給事厯諫垣十八年疏五十七上如陳椘省之弊恤吳江之災及從祀諸儒春秋四傳等議俱卓卓可傳康熙甲寅轉通政司左㕘議乞歸聳狀貌魁梧修眉廣顙腰腹大十圍上每稱為柯胖子著有霽園詩兒輩讀史偶吟示之儒者貴立身虚聲何足侈漢末競標榜黨禍自兹起行檢未嘗飾鶩名如爭市鄙哉張少府望門而投止栖栖郭林宗京師胡為爾蹇脩質衾影閉户而已矣後有申屠蟠前者徐孺子送譚舟石赴延安郡司馬之任五原為漢塞萬里築秦城雁欲銜蘆下人看叱馭行黄榆通上郡白狄拱咸京後夜鄜州月相思空復情春日扈從南苑大閲賜宴晾鷹臺奉和馮相國易齋韻六龍講武小平津芝盖鸞旂上苑春七萃熊羆陪御宿三驅金鼓肅鈎陳止戈自合孫吳意櫜甲初消戰伐塵最是丹書頻進誡釣璜溪上有師臣雨後偶感西山萬叠擁晴空曉映芙蓉禁苑通過雨翠浮丹鳯闕迎秋凉入玉華宫雲間樹色原無暑石上泉聲自有風拄笏相看念揺落欲將歸思問南鴻寄懷宋尚木太守搴帷一出擁雙旌南國文章有盛名詞客舊傳神女賦使君今下越王城鳳棲嶺海雲長暗鱷去朝陽浪已平自有車書榮賜秩莫將符竹厭承明斌斌子范琦琦字林琦平湖庠生授徒自給有斌斌子游稿惜多散佚西溪聴雨繚曲西溪路未經疎疎涼雨濕花舲此聲可浣千峰色為我來游送曉青丁主事彦彦字文博嘉善人前明崇禎壬午舉人國朝順治己丑進士授工部主事並蒂蓮和丁飛濤韻蘆渡流觴向翠微田田葉上綵霞飛昭陽第望須同后虢國風流却並妃争似春明寒浸玉相將浴水露霑衣思君獨有悲歌客長嘯憑欄看落暉方貢士邁邁字仲拔嘉興人順治初嵗貢初夏新霽野步渚廬即事晴雲西起日初斜極目蒼葭野望賖竹院香凝春不散薫風猶墮小桃花王布政庭庭字言逺號邁人嘉興人前明崇禎丙子舉人國朝順治己丑進士第從王師平定粤東授廣州府知府累陞江西布政使再補山右乞歸庭精于制義堅凝峭刻自成一子為詩五古出入陶韋五七律深得杜法晚乃汎濫唐宋諸家以視倦圃先生猶昌榖之於何李也著有秋閒詩三仕二西諸草雨餘言從田家遊居止得淳朴園林宿雨滋積草深書屋著屐看新晴披襟羡幽獨人影淡斜陽禽聲冷脩竹黄葛篇黄葛施中谷離離絺綌姿勞心日採績終然不成絲良人日南去音信無還期又聞事西北負羽從驅馳妾欲寄音去展轉中心悲日南或自可北邊葛安施漫吟丈夫不得志飄泊如埃塵經營在朝夕惻惻多苦辛四海滿寥廓無處投一身英雄死已盡舉眼悲斯人鳳凰集髙岡鷹鸇無相親世方尚蕭艾蘭蕙詎能紉貧女終愆期壯士行負薪我欲為狂歌駭俗不敢陳庭從王師攻克羊城凡九閲月作王師行王師何桓桓控弦十萬餘鼓角鳴其前大纛當中居輜車擁後來弩㦸夾道趨鍪甲耀黄金其間錯明珠下有紅韎韐上有青錦褕一伍自成行十伍自成旗旗繡盡龍文馬飾仍金羈寶刀百萬裝碎花襍璠璵延衺逾百里照耀滿三衢壺漿逺方民嘆頌神武殊仲春漸三月氣暖雨澤滋室家願獲民耕稼將及時過師袵席上雞犬初不疑小邑各萬家大寨多百圍見㡬蚤自效樂業得所歸兹來闢土地實為瘳瘡痍負固誰獨夫守困支一隅問何恃無恐不獨城與池前海為波瀾後山為藩籬其地産鹵硝石硫來番峓其人習烹煉造藥傳交黎採鐵在旁邑鑄冶惟近畿神砲名西洋大者為紅衣女牆徧羅列懸樓憑設施乘髙擊我營向夕守彼陴果然雲梯爛兼使地隧紆以此務休息慎宻觀機宜九月暑既徂十月寒尚微閒佚乆思奮疾疫先已稀仲冬大饗士朔日卜佳期用大云彼長何獨非我資謀先事乃備器具藥有司其時夜月黒措置人不窺砲後掘土坑砲前開木扉一面陳水甖兩旁團濕茨西城隔濠口排列千餘區千聲應一發霹靂驚電飛十發催城頭百發崩城基天地隨反覆日星俱虺頽連攻積晝夜先登遂須臾縱横滿流血漂溺兼浮屍赫然示天討用以彰國威京觀于焉封巉崖為之碑成功紀東南洋溢千春輝程仲孚舊以興屯經緯見示檢故笥得之燈下再讀誌感天下之大胡憂貧徒然竒䇿勞計臣老農芹曝尚可獻力田務本胡不陳古聞明王賤金玉霸者得之還貴粟但令山海無田荒自然府庫恒財足此言雖好仍甚平千年築舍多不成金城渭水亦粗效可憐兵罷隨休耕只今宇内無曠土盜賊逃亡死無所鹽賈開邊事已荒流民授業謀還阻興屯實舉當奈何去開事例停起科懸之功名即爭奮况于利在賁諸多就中權衡亦殊術小緯大經條理宻旁通曲盡千萬言經濟太平真第一誰先此議虞伯生前輩頗見徐貞明後來程生特居上十載抱書曽未名程生好竒老山野我亦經時有心者箧中擕出幾回看低頭嘆息寒燈下雨夜一雨竟無賴淒然入夜深殘燈影照壁孤枕夢窺心失路愁知嘆懷人病惜吟紛紛風外竹揺斷隔鄰砧自感揺落直時賤支離愧病深暗雲浮作夢秋葉薄為心雁寄交書斷蛛封藥裹深悠悠將卒嵗天地一蕭森晩歸閒林引歸趣曲沼更經過晚月自生照秋風吹奈何傍籬蟲語細近郭屋煙多望處行人盡詎逢狂者歌念别庾清白生二子離筵無汝在惻惻意加傷秋不堪人别寒將去路長城樓烟似雨水夜月為霜只此鄉園地居然己斷腸蜘蛛豈有當門懼仍來比屋居牽絲恒罷織結網不為漁近暖縈煙宻零寒著雨虚殷勤亦生計朝夕爾何如嵇山寒眺同陳卧子孤城縈若帶亂水織如烟晴雪千家碎窮溪一樹懸荒荒紛野艇每每淨原田不見巢林鳥歸飛何處邊舟中晚泊扁舟泊處見雲岑晚色蒼然在樹森風景重催寒露下月涼初照野烟深芙蓉入夜人俱醉蘆荻兼秋水自隂杯酒未能還作賦將歸何事惜登臨雨疎林小雨日霏霏盡處煙深斷翠微濕鳥漫隨風去重殘花自怪蜨來稀當牕蛛織看成網侵几苔生漸作衣十載琴書揺落後不嫌老病乆相違夜泛綠煙散夜川水明扁舟蕩漾秋風清長蘆暗見螢火出髙樹下過浮雲輕兩岸蟲聲聽不徹一夢故山歸未成天涯老眼醉多白中流棹歌非世情西楚霸王廟雄圖騅逝竟何支葢世餘名尚繫思視玦無成非失計艤舟不渡自知時曽聞客淚霑遺像豈有姬魂伴野祠欲弔一巵愁日暮荒原草短細燐吹聞顧若昔之訃有懐其人并感舊遊杉松寂寂掩黄昏白骨西風哭野村塞雁自難傳舊信夜蛩何處語新魂文章半世終丘壠嘯傲平生剩酒樽後事只今遺稚㓜飄零書籍未堪論題平樂官舎城上峩峩百雉齊城中只見草萋萋官衙風寂重茅穏兵竈烟寒一帳迷短樹無枝稀住鳥長宵自曉失鳴雞山中習靜曾堪似未記閒身百粤西對月光隂自徘徊迢遥與愁接照見西林秋疎疎落寒葉閨思䦨干十二曲日夕倚長思只有羅衣伴秋風是舊時玉泉菴次夜懷燈影淒然照客杯黄昏醉罷漏頻催故鄉南去三千里不信如何夢到來感春閒來每欲尋春去惆悵東風已後時只有啼鸚不相笑依然飛上落花枝舟夜嵗度西風雨未晴扁舟徐動暮潮平不知旅客情何似夜半寒江聽雁聲楊妃墓上青草狀類苔鮮色半殷紅他處所無血染羅衣恨未終猶留芳塚泣寒風試看青草千年後猶帶啼痕一半紅阿房故基感懷禾黍髙低隴畆荒行人猶説舊阿房繁華一代同銷歇不見于今有未央咸陽一炬不勝愁寂寞荒基渭水流盡解驕淫看覆轍不知何代又迷樓徐舉人鑛鑛字次璆號鐵崖石門人順治辛卯舉人年三十二卒于京邸子宗淮康熙辛酉舉人亦蚤卒晚坐鼓琴有懷葉子星期鴻雁空秋影離居一撫琴閒雲歸岫逺皓月出林深桂冷遲花氣城孤急杵音楓江蕭瑟甚之子獨登臨蚤春郊逰同登朝斗巖小飲分賦東風㡬日綠成蹊出郭晴煙散馬蹄預擬登山烹白石何當載酒聽黄鸝巖花對客同髙寄竹杖逢僧當觧攜愛煞汀洲芳草徧裙腰一道翠烟迷蔣貢士蒔蒔字若子號碩輿嘉善人所居遭回祿從烈焰中負父出母喪茹素三年未嘗見齒國初以嵗貢當授學博未赴卒贈戈藎臣青髯紺􅄠老仙翁甲子惟應問八公獻䇿昔曽髙冀北平刑今尚憶蒲東歸來賦就勤耕􅐕謝客門閒獨種松生計滿階培玉樹錦堂日日自春風沈貢士槎槎字星浮桐鄉人順治辛夘貢生當明之季與孔自洙張超張方起稱桐川四子乃三君相繼取科第而槎獨以明經老閉門學易晚年更精禪學海昌陸嘉淑甬上李鄴嗣序其墨亭詩鈔咸謂忼慨厯落峭絶凛立非無意于世者其子出家天童得法於嘯堂老人亦善詩昔年曽居予里即予所與倡和之杼山上人元盛也楊義士行有序蔡京鎸元祐黨碑時石工安民乞免鎸名士論愧之偶與友人論英宗時楊漆匠事感而賦此指揮門達太無狀抗論獨有楊漆匠袁彬李賢兩得全至今聞者為色壯條陳指揮數十事詭言内閣促我上詔許㑹訊始得白不然已死錦衣杖多官咄咄稱丈夫心驚膽怯難自誣相公具疏且乞去未㡬奪情何為乎擊節表章一義士此是當時搢紳之所無次皮日休訪陸龜蒙不遇韻晴墟烟煖竹籬斜踏雪來尋甫里家閉户惟遺堆徑葉窺簾還著供瓶花已聞處士宜除令亦號徴君未賜麻百世自當逢賞鑒大𤣥何必重侯芭蒿齋狂士馮秉恭秉恭字子近平湖人名家子放跡不羈骯髒與俗忤善哭意有不適長號者移時為諸生不遇晚居北郊别墅貯法書古瓷以自玩嘗與劒客飲人拔地起舞或醉卧水草間與牧竪為伍驅犢負蓑作野老態奥古之致發為詩歌多憤張之詞亦近代一恢恠士也有亦諺蒿齋諸集長夜燕坐兩童子垂釣得魚老人怯暑朝慵起起來抱甕藥欄裏薄糜照影鹽酪稀㫁刳匏瓜調甘㫖曲木几横叢竹隂出水良苗映鄰里呼兒閒探免園冊前羅珍竒後滫瀡世上大有多藏人此時肉食未為喜冰漿玉碗赤瑛𤓰藕簇金盤瑶雪蘂寒羮脂滑襍消熊琥珀紅香浮綠螘食客蒼頭詫萬錢悦口充腸一飽耳兒言口腹信可賤阿翁澹泊太無比朝虀暮韭若闕如強笑無歡體㾊痏楓樹東頭波潏淪銀鱗撥剌從文鯉漁家乞得釣竿歸圗取阿翁晚食美踏歌逺去俄逥旋兩枝綠玉照淺水大兒憨癡倚岸垂小兒黠桀走中沚翻菱牽荇瞬息間白小紛紛大於指憑陵號叫賀得魚叱咤狂奔如鬬兕拄藜往觀三太息得魚忘蔬嗟可恥廿年溟渤多烽烟斥鹵桑田生棘枳戈船空拜越將軍釣鼇難覔任公子不如結綸理一竿裝成漁艇籬邊艤茶烟詩卷颺清風泛宅浮家今日始南鄰惠菊種名秋裙帶蒼頭傭耕手自種之野圃添新種閒街走倦翁挈瓢兒亦喜荷插婦能同土潤除莎草畦偏畏蓼蟲秋菰今嵗美伴飣夜燈紅沈甥平萬赴粤東幕能文沈約兒仗劍别親時海遶魚蝦異山窮犀象知珠明龍母峽梅老曲江祠辛苦憐同學貪泉好賦詩涵輝過話知城中傳余病死有死人皆諱此翁殊不然故交疎日暮多病受人憐謬忝全歸譽容題自輓篇風塵淹短褐我亦畏長年輓錢穉農北地登樓罷還鄉未十年一編傳圃史百結上花船人事詩名誤天真草聖全松楸即長夜猶恐出談𤣥聞蝗年豐屢慰老來心木榻空堂枕素琴逺害見人低白首甘貧抵死賤黄金濯纓欲寄滄浪水抱膝休賡梁甫吟多難不堪頻北望飛蝗接翅渡淮隂苦熱棲遲疎放百無能花藥深欄盡日憑阮籍忘形猶白眼虞翻死後又青蠅消磨茶焙春前雪潦倒魚餐雨後罾何日芒鞵凌玉井浩歌天外倚孤藤奉贈三一庵拙上人寶地初開祗樹重日看海上兩三峰白雲流水齋時磬黄葉孤村薄暮鐘晏坐不知蔥嶺逺行人只向虎溪逢杖藜許我歸來老多種門前百尺松蔣貢士玉立玉立字亭彦嘉善人少從張西銘遊講求實學順治甲午拔貢名滿長安父有疾夜不觧帶厠牏必躬浣里人稱其孝詩文峭厲力追正始有泰茹堂集挂劍臺延陵空贈劍觧佩挂南枝一去留餘恨重過弔豈知暮山遥對酒謌鳥暗催詩余亦愁心者離離芳草思渡江江流九派盡朝宗六代繁華悵舊蹤千里雲浮𤓰步樹片帆風送蒜山鐘鶯花半落愁邊過烽火頻年客裏逢五岳尚賖他日願何時汗漫一相從寄魏交讓青郊結伴共相招白社風流尚未遥日暖鶯聲聞栁陌春深花落轉蘭橈騷人自紀庚寅嵗旅客重過丁夘橋我念離羣空對月懷君江上影蕭蕭陳舉人秉秉字夏臣龍正孫順治辛夘舉人父殁以哀毁寢瘵而夭月素魄雲中起抽毫憶謝莊寒生金掌露影動玉鈎霜半夜懸清漢三更落故鄉還將遊子意機上照流黄渡漳河馬上闗山雨雪多茫茫北望見漳河寒雲接地行人㫁衰草連天獵騎過倚劍中原逥白日開樽上國渺蒼波何當鄴下繁華地極目蕭條一醉歌蔣秀才玉章玉章一名瑑字篆鴻號禹書玉立之弟九嵗以詩名意致絶不猶人順治辛邜中副車著有三逕草靈威集二蔣風流冠絶一時而皆不遇惜夫五君咏楊孝亷維斗夫子金石操夙昔厲風軌厯事多感激處暇敦素履亮節被時論榮名炳良史臨難永不渝遺形齊生死陳黄門卧子給諫本軒舉任尚懷往哲越禮襧生才好盡嵇公舌砥脩類湘蘅綴調儷郢雪抱石投清流邈焉身自潔顧明府漢石顧公古遺愛行卓品亦正徴異中牟尹適治單父令沈識既内融朗照復外映蘭姿或可摧桂質末愈勁趙記室子玉記室曠達士遺世甘沈伏坐鎮推雅風行吟標竒服隋珠雖善藏炯然别魚目浩蕩歸江湖彭咸同所宿夏内史存古夏子才軼倫髙步徴前矩奮身厠緹幕淪跡混緇羽攄藻振矕文吐論洽晉麈矯矯玉樹枝慷慨就黄土南園襍感與余淡心林衡者同賦故國芳園在垂楊落日邊不知金谷變還聚竹林賢向秀聞孤管嵇康廢五絃傷心歌舞散花鳥若為憐附考園為故武部錢仲馭讌遊之地再訪吳日千因憶遇吳於顧氏東園今五載矣悵然志感辟疆回首五年愁每見吳郎憶舊遊白首自參天半嶺紅泉并作海西流庾公清興偏宜夜宋玉深悲畏及秋山水依然人自老月明無那更登樓鹿城道中懷歸𤣥恭葉嵋初西鹿城邊傷客心新洋江畔搗衣碪陸機漫擬吳趨曲莊舄仍為月下吟煙入戌樓銜暮色雲生驛樹結秋隂懐人此際堪乘興不得追遊到竹林與歌者蘇崑生故寧南侯左將軍客也酒滿壚邊花滿樓相逢猶作少年遊歌成白紵翻新調憶到青門哭故侯玉帳不懸秦塞月璚簫空度漢宫秋傷心莫聽何戡曲三叠伊涼自白頭題蘭寄所知湘江春暮百花稀竹葉叢生蕙草肥折得一枝心萬里可憐不上楚人衣江左天民項隆錫隆錫字子介元汴孫弱冠為諸生有名徜徉詩酒自號江左天民有天籟閣槀嘗暱小史昭華成㫁句五十四首以自懴云枯魚過河泣不見過河魚昨日失水今日枯爾曹相視而嘆息北邙螻螘待爾食庭中細草紛雜課童子琦䂥等芟艾獨存秋色十餘種鉅細各自生于何生去取晨興覷厥根䝉茸若灌莽有黨即有害邪正偶然聚閉塞雨露資尺寸僭吾土縱觀天地間隂陽非共府松栢挺雲霄亦畏九枚侮呼童聽指揮一仰當一俯㑹留青翠佳去者慎勿怒我生嚴好惡不以草無主或恐亂苗莠著言始鄒魯異日買山成竒石疊小圃習習猗蘭香庶㡬君子伍昭華曲簮筆垂囊倚碧紗看來粉黛失繁華移將一樹連卷玉滿院春開解語花結社蘭林讌曲池名流畢集每追隨故將險韻書花片分送尊前索賦詩洞庭霜後橘林開百顆從人走索逥金殻玉瓤親自剖甘酸嘗過始傳來陸封君敷樹敷樹字映蕚號賁葊嘉善人有世滋堂集子榮登康熙庚戌進士贈友有日不再食髙懷劇耐貧望衡藤共架近郭竹為鄰詩似陶元亮人同汜稚春十年聽舊雨交托白頭新借園翁沈信信字驚濤平湖庠生好擊劍工草書築舍城南顔曰借園示寓形宇内之㫖我宗人古貌古心者交推借園翁著有贈言集秋暮寫懷綠楊隄轉蓆門通香散花光隔繡叢檢盡古方憐病乆題多冷韻笑詩窮遥山雨脚經時散遶屋秋隂向月空欲賣舊琴尋釣艇煙波深處伴蓑翁檇李詩繫卷二十五
