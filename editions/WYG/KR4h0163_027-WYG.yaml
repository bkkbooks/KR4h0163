body:
  text: 檇李詩繋卷二十七平湖沈季友編國朝小譚大夫吉璁吉璁字舟石自稱小譚大夫嘉興人甲申後隨父貞良入閩父殁亂山中扶柩侍母及弟妹七人歸禾生産蕩然餬口四方以為養康熙甲辰以上舍考第一授中書居九年出為延安同知吳三桂反運餉入川至寧羌兵變棧道絶走黑水峪以脫既而諸郡宼變惟存榆林一城璁誓衆死守又嘗單騎入賊中招撫之其黨漸平戊午薦博學宏詞詣闕已除登州守之任一年以哭子卒璁好撰述有延綏志二十四卷肅松録二卷爾雅綱目一百二十卷嘉樹堂集二十卷鴛鴦湖櫂歌一卷惜其無後浸至散失文章千古事不能無餒而之憾焉神木軍中雜詩師行六月賦萋萋競唱鐃歌舞白題羽騎乍過圁水北軍書早到定邊西栁弓葦箭盡投誠解甲都將白紙呈盡説降時多富貴讓他先去報頭名紅白旗開似畫屏城南城北盡龍庭蘭臺令史從容在可許山頭勒石銘鴛鴦湖櫂歌三首水市花船一樣忩龍淵學繡一條江憑誰移箇龍淵塔學繡邨邊也作雙勤王子弟秀州多路接臨平百里河舊是蘄王駐師地羅裳錦繖夜深過花時午日白荒荒最愛鶯啼半邏塘一樣橋頭打雙槳郎舟雲母妾沙棠陳處士灋灋字子虚平湖人郊居避俗松枝梅萼掩映三逕間多藏書畫古器無不精妙有寄松堂集錢稚農别十年歸里喜賦汗漫年華老一氊黄雲漠漠送歸鞭半生夢境隨蝴蝶幾載鄉心聴杜鵑笑口重開離亂後馬蹄偏向夕陽邊空堂相見渾疑夢落落無勞問酒錢韓髙士畕畕字經正號石耕興人性髙僻善鼓琴酒酣耳熱拂袖作聲無不驚為絶調人欲學其一曲必奉千金以是遂無傳者終身不娶徧遊諸闗塞晚年僑居平湖有天樵集春日偶成酒社招尋數閒愁總不知月明歸獨晚春好起仍遲清晝唯貪奕長飢久廢詩臨風還自笑貧殺百花時夢登北岳削壁三千仭松杉隔幾重側身驚峻壑仰面落危峰殷女知何在樵人總不逢翠微尋舊路處處白雲封太行春望霄漢接崔嵬遙峰對五臺雲生蒲坂没雪盡吕梁開白日中天近黄河萬里來登臨愁險絶笻杖屢遲迴山行髙下重岡靜潺湲澗水斜細松青接嶺小路白連沙煙火渺無際農人何處家回看晴色遠雲樹是天涯山夜與爾成登月存巖霜風生靜夜雞犬夢寥寥月暗峰當屋雲明火出窰石橋穿澗口草徑上山腰高立寒巖望柴門亦未遙當湖西林寺冒雨歸細雨能留客清棋破寂寥半簷還摵摵中路轉瀟瀟落葉隨山屐寒雲没斷橋西窗今夜宿無奈近芭蕉李教諭明嶅明嶅字山顔號蓼園嘉興人素擅文名入閩久之國初署古田教諭有樂志堂集其九日一詩為曺侍郎所稱古城平原將日落立馬問邨夫廢堞隨高下蒼煙間有無不知誰氏國猶説古人都喬木垂秋色悲啼獨老烏九日風雨西湖泛舟同曺秋嶽湖心急雨一天愁無計登高獨上樓北海樽開誰泛宅西溪客到傍輕鷗亂山欲落新封葉逆浪難翻老釣舟却憶金臺同對菊幾人能得故園秋陳貢士國政國政字憲生平湖人順治庚子歳貢時寶坻杜文端當國延為西席終老名場有陳子古業二卷詩集二卷古意浮雲蔽中野徬徨動四顧物理有同心枯株思雨露當代覯鴻儒折旋中矩度世道殊古今交遊間新故所志在伊吕慨然發深慕窮達自有常聖賢亦由素旦暮無易情千載通神寤凉風谷中來流泉澗中聚抱膝發高吟忘機下鷗鷺送亡友杜紫安歸葬渠梁晚登文昌閣紫薇瞻象肅層閣倚清虛江影流天表雲容入綺疏觀文懐北斗挂劒憶南徐欲盡登臨興幽憂日未除覽鏡覽鏡蕭疎祗自嗤閒思往事獨支頤短才未敢窺鸚鵡白髮何須著鵕䴊生計由來同泛梗歸心今已在江蘺衰年事業憑誰寄百尺雲根五字詩蔣處士睿睿字正言嘉善人憲副英子雅慕髙蹈遇佳山水流連不忍去有聴鴻樓詩集吳山紀遊江南三月風初暖草軟蘭薰梅似霰片帆聨挂五湖濱竹杖芒鞋興非淺鄧尉風寒香氣微梅花還作雪花飛孤笻直上千峰頂萬頃銀濤驚絶奇山塘七里風景好欲乞瓊漿煮瑤草迴船笑指九龍開恍然玉液來蓬島野人本是烟霞骨懶向人間問盈詘風塵潦倒三十年越水呉山恣遊歴飄泊身心天地間酒酣無那一憑䦨含情獨弔鴟夷老千古茫茫去不還張知縣三省三省字鄰曾嘉興人順治間以貢授閿鄉知縣落帆亭離歌催處拂征衣古道閒亭入翠微鴉雜野僧雲脚度葉隨行客馬頭飛買臣墓近秋聲老少伯舟空月色稀回首孤城烟渺未晚江漁唱幾人歸郁知縣褒褒字子弁號遜菴嘉善人順治丁酉副榜貢授江右永豐令調峽江有詩偶一卷和錢仲馭先生南園雜咏十首之二隔溪數籬屋深緑逺檐收曉色披殘露孤光綴蚤秋磵南何處岫林月幾重樓霞裏時廻望寒妍任去留未窮黄葉徑先覺有溪聲栁席虚鶯坐荷珠得月明有懷吹藥竈無意飾茅楹入夜人忘倦花移柝幾更蓮峰布衣吳麐士麐士字𢎞度世居海鹽澉川匿影湖上頽然窮老有吾本蓮峰老布衣與世不合長掩扉之句其集曰斵氷集遊長墻山孟冬天日佳擕笻事閒閲南山遮我前蒼翠如可掇春巒多穠姿寒厓更修潔僧寮舊所憇信足任登涉縱觀大海濤幽憤寄一泄野菊覆澄潭掬手漱芳冽我友甘沉㝠情歡在麴蘖掃石代班荆舉杯承落葉醉舞影傞傞拂袖亂黄蜨昔聞紅樹邨訪近靡遺孑緬懷多感慨先後復同轍歸途勿躊躇落日銜山缺附考長墻山在海鹽縣南三十五里嘉禾志云始皇東遊以山形截海若墻因名澉水志云山外有穿山洞有神曰陳都監又有龍眼潭乃宋時番舶所聚山下有石帆邨古田㽘初度日酬友塲圃初登及小春一年虚過又嘗新從遊每負常因病知已難留始覺貧岐路馬牛風各别覊栖魚鳥日相親檐前短影無多在白髪蕭蕭懶向人秋夕二首凉風此夕爽生襟病骨驚秋漸不禁好似辭梁欲歸燕穿花唼蕊已無心最愛秋來月色清良宵閒坐每三更而今老病惟便卧却怪牀前故故明施秀才湛湛字露巖鋐子年十三為諸生作文有原委得蘓子瞻筆力工吟咏早逝有草堂初集詠冬梅移來何處歲寒姿為愛清幽折數枝遊子悞驚梅信早征人謾道雁書遲芳含陶徑花黄日香吐梁園雪滿時疎雨夜聞窗外滴青縑帳冷不勝悲和沈融谷宫詞之一羅帶綃衣映渌波霓裳舞罷發清歌承恩縱得筵前醉無那東風惹恨多陸平原費錫費錫字大勝桐鄉人順治辛丑進士為平原令能事後母友愛諸弟鄉里重之寄懐仲開一蘭雪堂氷心散作四時春吾道於今見一人雨灑鳬山清有夢月明桐里靜無塵非關栽桞存髙致直溯傳薪得大醇蘭雪堂中香自遠湖光雲影倍怡神褚秀才偉偉字駿如嘉善人勤苦嗜學而以貧病老姪茂章亦淹博能文里中目為二褚送孫繁祉歸盂城秋風薄林臯逢君上黨路結軫廻修坂班荆且道故人生重儔侣豈不感遲暮譬彼蕙蘭花芳春承雨露譬彼雙黄鵠翺翔凌雲霧贈君緑綺琴報我瑶華賦寒枝不改柯秋霜不易素願言結同心永以金石固席上贈妓鸚鵡杯寒玉漏分蘭膏斜映石榴裙歌殘白苧人何處腸斷荆臺夢裏雲蟄園叟翁紀長紀長號逸伶自稱蟄園叟華亭人少負才名見知于陳夏二公孤僻傲睨不合于俗後遷平湖與予為忘年交詩牌酒盞殆無虚日逸伶每㣲酣扺掌詞鋒四射落落有逸氣論詩矯尾厲角尊唐而闢宋其稿甚多手録精楷予昔年常擕觀之今逸伶死矣役嗣無表彰之思索之再四匿而不出殆將埋没塵蠧中為傖父竊去耳因歎此老命薄死後且然悲夫重陽前一日葉已畦招集横山用昌黎醉贈張秘書韻風高山色爽渺渺離鴻聞磊落横山主宛若雲中君托跡横山下海内稱能文僶俛天地間富貴比浮雲緗帙無髣髴翰墨有餘芬浩浩木石居悠悠麋鹿羣但求古人合不覺世事分肥蕨頗可食濁醪亦可醺瞻彼萬仭岡鬱鬱多氤氲造化豈終極人生安足云文章亦經史薄俗徒紛紛剪葵烹九月滋味美于葷東籬黄菊秀賦得碧羅裙秋氣尚餘煖巧簧惟亂蚊良友貴責善孰辨猶與薰好學須好古五典兼三墳古人不偶世莘渭且耕耘身立廟堂上竹帛列奇勲共酌横山酒横山日已曛漁父詞煙匝桃花雨翕翕上灘下灘水何急白頭漁父過灘去鋭頭船子衝煙入挺义着魚好身手大魚潑刺小魚泣咫尺波濤倘相失一朝爼醢嗟何及漁父得魚向南市歸來買酒船頭立煙寒雨細春可憐桃花紅重蓑衣溼鸚鵡詞飲客子湖樓作禰衡㸃筆題鸚鵡蟻視王侯撾羯鼓我亦天涯淡蕩人古來何地無黄祖鸚鵡湖鸚鵡樓沈郎才調儘風流重陽不雨菊花好况有瓊杯消百憂人生一度幾盈缺昔向東呉走西越讀書萬巻濟何事滿眼干戈羞白髪君不見樓前湖水知我心起立蒼茫望秋月匡廬歌送沈南疑君不見匡廬秀色九江口遙挹江煙碧于桞昔者匡生讀書至此小結廬此山遂為匡生有西莊沈南疑雅能讀書頗好奇自言欲向匡廬去把酒苦索匡廬詩老夫乃是樵雲客愛向名山弄泉石寫將長句贈南疑留置金泥劚青壁虎溪橋上薰風微緑陰四合黄鶯飛已知白社無人跡君若看雲君早歸訪施尊師道塲仙雲不可即髙閣舊盤桓石鏡宛如昨金經忽已殘琴存三叠舞爐罷九真丹杏葉悲黄落無風滿醮壇訪客子西莊移櫂西莊去垂楊緑水濱風流沈秋浦留得草堂春開卷餘青靄彈琴落素塵舊交半零落青眼向何人至日浮生猶至日七十四年餘兵亂無長策家貧少著書解鞍知伏馬銜索總枯魚垂老防人面南山埽敝廬夜泊野曠天低日林疎望不斜青山無客路白石有人家蟹舍縁孤澗魚舟刺短沙前邨何巷陌到處欵冬花贈借山偶閲放翁集遂作放翁句了澈凡心寄一枝緑蒲團上寫新詩片雲不作三千界長日何爭十二時飯向午前挑菜甲羮從秋後采蒪絲人間豈少閒滋味不是髙僧那得知登城南樓旅客攜琴去不還登樓日日望鄉關逝將離恨隨春鳥啼遍江南雨後山郭貢士襄圖襄圖字臯旭號匡山平湖人紹儀季子弱冠為張西銘文燈巖所賞三吳社集皆知名焉性倜儻好事交遊談讌無虛日歌舞絲竹六博倡優時時徴逐以為樂乙酉泛舟入海期年歸一日殺其仇于市下獄賴友人以脫自壯至老奔走四方久而無所遇曹秋岳贈詩曰苦吟經戰伐短褐老乾坤其風味可知矣晚年無子買妾居臯橋竟死于吳有更生集夜投一公房聽韓子石畊彈秋鴻引吁嗟兮韓子不得志傲睨王侯輕一世抱琴浪走無知音却到孤邨訪蕭寺寥寥日午不聞鐘我尋眞隱高士逢光明映徹無僧氣口中吐出金芙蓉五嶽跡曾踐磨崖手題徧洗鉢曇花開自竒咒泉卓錫名堪羡怨長笛兮吹落梅回首羅浮花似霰夜寒欲眠不忍眠烏皮文几蘭麝烟坐聽韓子流水絃廣陵遺散今始傳何處哀鴻鳴可憐颷風凄斷飛不前啾啾唧唧聲萬千仰睇兮明月俯眺兮長川川茫茫兮帛書阻月𣺌𣺌兮關山連寫孤臣之掩泣與放士之愁顔怳似羣雁驚飛兮落九天乃在韓子五指間余本倦遊者感此易悲辛空堂不聞人語響急絃高張愁殺人欲為楚歌兮聲咽不可續拂我澗邊石為君進一曲一曲終兮月當牕光潺潺兮澗水緑那旦阻雨不盡翻盆雨愁添丈尺深氣昬千樹暗聲急四山沉苦自投荒徼同誰共越吟此生隨白首飄泊到於今題李鱗長像不必相知早多由傾盖中心雄矜岸幘客到有郫筒貎類丹元子人依臯伯通同君俯身世已是白頭翁涿州道中帝里秋光四望通青山一抹上陽東來同歸雁春將歇去似亡羊路已窮馬足獨行殘月裏棗枝低拂暮山中蕭蕭易水悲風起何處談天碣石宫抵西平贈沈藕菴使君落帆亭北送君行秋月春花歲序更傲吏烟霞甘久卧故人書劒老無成蘭從舊徑思公子酒自他鄉醉老兵今夜莫辭紅燭短十年相見話生平旅夕撃柝嚴城更漏長一聲邊雁起秋霜離情到處㸔皆異月色何曾似故鄉李秀才煒煒字赤茂居嘉善之西塘夙負文望老而隱居有圃趣偶存熱客炎暑爍金石餘威折條柯鳥棲投茂林魚潛蔭深波胡然恩乃公褦襶闖門過主人顰顣迎客來意則那語煩無一要炙背汗滂沱逡巡具壺觴百引顔未酡持杯入夜分客興方婆娑蚊雷驅復鬨燭淚障轉枯寧能免欠伸睡眼強自摩古人避熱方願依百沸渦湯熱猶可避奈此熱客何謁水月大師退而有作大塊震噫氣不能號無竅天游非六鑿自得形神妙吾觀水月翁蒼髯帶白帽人言數百歲豈有他繆巧嗔罵作佛事座供彌勒笑一笑與一嗔如幻何足道中含獅子聲原本在忠孝人種不可失苦來塵俗閙紛紛蜉與螘輒以功名嬲師非卜筮倫妄問或妄告嗟哉婆心切兒童只狂跳同牀各異夢舌敝津亦耗何如蘇門老對客唯長嘯與諸子集沈憲吉北山草堂分賦九松并紀席中勝事秦山五大夫秦官不足喜鍾陵蒼髯翁樵㸑供軍壘誰似北山九老人山深散誕衡門裏霜顔鐵骨飽風霜枕流漱石馨蘭芷從教宇内刼灰飛商山肥遯留黄綺生來甲子今幾換難從絳縣論年紀九老相依一主人少從嬉戲晚逾親湎雲伴月同形影不知誰主更誰賔朴野支離忘姓氏却因昵好更呼名我觀主人有貞骨磊砢正與賔相直不愛翩翩桃李華嘗懷凛凛霜柯色耆英得九似香山海内聞聲更相集佳晨蕭爽八月中張筵皓魄光膧朧主人愛客賦嘉樹客子欽賢賦角弓李生倚醉為起舞忽發清音長嘯翁嘯翁矯矯人中龍龍吟激蕩來天風頃刻霱雲車盖聚麟湖雙珠光歘吐九老初筵靜不譁抗墜低昻亦飈舉分明仙侣宴良常平樂西園何足數風塵聚散㑹難期九老臭味無差池世眼齷齪安能知一時千載長相思東飛伯勞歌東飛伯勞何處棲西烏夜夜空自啼誰家窈窕當壚坐翠羽雀釵向君墮年紀二八面發紅夭桃婀娜臨輕風落花片片東西路何由飛翻復上樹贈梅里周青士畸人棲隱處廛市亦清風飲啄矜孤鶴逍遥笑二蟲夷門公子過詩史布衣雄豈學吕高士寒依米桶中止黙菴江右之行莫似秋來葉霜嚴飛更黄六旬行過半千里去何鄉是處稱龍象沿堦走法王刹竿寧賴汝偕隱勝開堂彭仲謀出其太僕公遺像并䖍州殉難諸札感贈鬚眉裘帶儼然尊正氣長留衣帶言精衛難填空怨魄刑天終舞作强魂鬱孤臺畔生香草章貢江邊哭斷猿應與廬陵文信國同留碧血在乾坤梅谿逸叟孫肩肩字培菴參議光啓子少通仕籍後棄家為僧名詮勝號大山嗣遊江北鶴林寺受牧雲禪師囑付歸葬梅谿精舍以老工草書尤好吟咏有甲乙詩記四卷讀南華經少壯談周易衰年讀老莊在川嘆逝水秉燭勝頽陽至樂翻成苦達生徒自忙嗒焉我喪我意不賦滄浪病中寄懐陳子木陶令攢眉日遠公説法時直教千載後能得幾人知蝴蜨來新夢鷦鷯去舊枝投林思擇木三匝亦何之孫秀才鑣鑣字長清嘉善人貫穿經史豪飲能盡一石有鄂韡樓藁重九後三日谿黙讌集得青字短櫂遲遲傍淺汀黄花滿院落疎星日斜檻外羣峰紫雨過山頭萬樹青公子開樽傾北海故人載酒到𤣥亭只今又過茱萸節一帶晴波動白萍吳秀才周瑾周瑾字虎文秀水人嘉善籍毛公壇包山縁仄徑樹裏見仙壇殘雪陰崖覆孤松落照寒汲泉丹作井承露石為盤見説毛公去雲中跨紫鸞陸秀才之泓之泓字我上平湖人年十二入黌序有聲復社庚子省試已入彀房考爭元竟斥拂鬱而死秋日同郭臯旭葉星期過涵暉飲于甘山齋開軒瀟灑坐髙秋把酒應忘大火流亂後文章淪欲盡樽前唱和喜相投名心漸盡青山逈生計無聊落日愁此際論交真管鮑風塵驅馬自悠悠計秀才敬敬字朂丹嘉善縣學生楊白花楊白花搖落章臺路宛轉襲香裾飄飄引芳步春江拂拂春風吹楊花復逐春風飛可憐楊花飛不住莫向樓前種楊樹謁丁清惠公墓在秀水縣正收宇圩長别歸何處春風此獨尋六朝名世業三問老臣心入廟威儀在瞻碑涕淚深暮風號石獸松柏更森森鍾秀才淵映淵映字廣漢嘉興諸生嶔立子少好學熟于諸史嘗謂五代史與通鑑間有異同而蜀檮杌南唐書之屬及時蒐采尚不下數十家取以為五代史注庶有補于廬陵甫事編纂得嘔血疾後遊京師與汪琬辨論累日竟没于寓時年三十有信志堂詩會稽山登眺名山接靈境白石何磊磊天風吹我來蒼茫俯江海玉簡既不存金沙誰復采履徑草茸茸涉嶺雲靉靉髙尋神禹踪其人邈千載明德無時虧兹山亦不改却望東海邉麻姑披五彩示我蝦蟇丸揮手遙相待隠約金銀臺神山隔塵靄凌風不能飛相思擷蘭􅉅玉熙宫詞漢主離宫三十六雕甍曲曲連金屋千門萬户自交通桂殿椒房相間複長安風月動天家帝里樓臺横地軸憶昔戊辰御極初平臺日日度金輿瀛海不求方士藥封章長讀侍臣書寰宇昇平玉燭調君王日昃罷三朝上苑宫花飛五色金堤御桞簇千條玉堦嬌女臨粧鏡綺陌佳人競翠翹宸遊對此歡無已别有瑤宫相向起蘭窗繡柱一何深金闕銀臺差足擬雙雙孔雀舞庭端兩兩鴛鴦時戲水苑西遼后洗粧樓樓上煙花接御溝御溝紅葉深宫出夾道金丸帝子留游宴頻呼女博士宣傳奔走大長秋詔書新幸玉熙宫絳闕紅樓十二重近臣宣㫖催宫女黄紙書名召樂工樂工此日奏新聲過錦還聞樂府名綵幄徐徐垂趙舞綺筵緩緩按秦箏趙舞秦箏曲不悞依稀記得君王顧供奉時沾太液波承恩特賜金莖露君王聞此意無涯更教煖閣奏琵琶玉軫龍頭傳自古鏤金曲柄出皇家才人嬋娟方二八調來銀甲何紛錯一彈紫塞雁行斜再彈内苑梅花落天上新聲人不識梨園子弟新譜得音節傳來協律郎坐中驚起龜兹客漢皇此夜醉仙韶中有佳人字阿嬌北地燕支開翠靨南中楊栁拂纎腰纎腰裊裊立風前舞雪迴風更可憐學得嬌歌勝子夜粧成墮馬雜金鈿深恩獨在長生殿寵愛三千一人擅趨朝迢遞七香車侍輦飄颻九華扇當年武帝李夫人此日昭陽趙飛燕深院還調鏤玉琴阿母承宣入禁林富貴由來傾一世恩榮長自賜千金豈知一旦朱顔改為雨為雲竟誰在白柰凄凉辭露臺明珠零落沈瑤海哀蟬落葉冷虛房羅袂無聲欲斷腸一枝已絶瓊田草四兩難尋西域香自此君王不解顔更聞洛邑滿戈鋋宫中寂寞唐山曲内庭不召李延年那堪烽火連京邑萬歳山前赤眉入嬴女攀髯未解簫湘靈泣竹難調瑟金屋誰傳寶輅回玉魚飜傍珠􅃭側煖殿春風自落花白頭宫監每長嗟遙聞杜宇嗁清晝不見金衣望翠華五人墓前作寒雲蔽吳關朔風吹古路訪古登胥臺重經五人墓五人遺墓臨江潯長松廣陌何陰陰我聞此事數十載只今過客猶悲吟憶昔明季天啟年銀璫奄宦竊弄權吳中選君負時望忽聞鈎黨來江邊連連緹騎下吳邑黄紙宣傳上官集邑令惟思解綬亡督郵却抱徴書泣繡衣中丞何揚揚金吾隸卒盈華堂傳呼促索勢若虎觀者雲集如堵墻闔閭城中途路塞中外洶洶動顔色五人偏袒左右呼錦衣隸卒皆驚匿直道猶憐俠客存布衣不畏君王勅一朝就義何從容英魂長傍要離側獨不聞烈皇御極雲霧開詔書褒忠天上來逆奄祠字已盡毁朱䦨繡柱成寒灰唯餘此地長荆棘五人遺墓猶能識白楊四野風蕭蕭過客登臨長太息吳宫金井兩梧桐相傳避暑宫瑤臺三十六處處與天通寶鏡留明月粧樓閉彩虹美人化雙燕飛去五湖東送友之湖南迢遞天南路崎嶇阻客程朝雲神女廟秋雨夜郎城入暮悲湘瑟維舟采杜蘅故鄉幾萬里悵望若為情送朱彛尊之永嘉揮手去東甌春江緑水流山花開未盡二月下扁舟落日催津鼓微風引櫂謳謝公幽賞地羨爾得重游冷協律祠猶憶先朝協律郎曽將樂府事髙皇幾時玉洞成仙隠不向金門隸太常琪樹春秋丹竈冷瑤笙晝靜碧雲長城門華表千年在化鶴還應返故鄉附考祠在嘉興圓妙觀中又稱冷仙亭送羅先生暫歸西川白帝孤城落照懸鄉愁迢遞武功天將歸故國無鴻雁行過空山有杜鵑劔閣風雲通五尺卭闗烽火隔三川明年巫峽生春水好上東吳萬里船過宋御教塲址是累朝觀潮處尚憶宸遊處嚴城列會同觀濤臨曲水馳道擬回中翠盖朝承露芝旗晚引風言驅七萃士齊試六軍雄將帥咸思奮君王自即成馮夷朝幕府羅刹蔽艨艟松下秦皇輦雲間夏后宫瑞煙浮五色仙樂聴三終白馬來何疾吳兒技最工拔河傳往事超距倐乘空噴薄凌春雪氤氲接彩虹蜃樓從地湧鮫市與天通雜奏魚龍戲仍論校獵功湖山方宴會襄漢已交訌苑走胥臺鹿人悲朔塞鴻驚沙屯鐵騎髙栁挂雕弓潮汐還從北江流不向東御堤塵颯颯蹕路草芄芄漁父留金鏃征人走玉驄平生懐古意悽惻感飄蓬吳越武肅王祠仙李遺神器羣雄遂陸梁中原方鹿逐維爾亦龍驤牛斗璇規合山川紫氣昌羅平嗁惡鳥天目出真王遂割三吳險平臨百越疆世家異勾踐立國半孫郎犀弩江潮寂樓船海水揚大廷龍馬至雙闕鳯凰翔暇日椎牛酒春風屬羽觴新聲娯父老起舞雜班行五季恩榮備三朝厯數長何年委劔舄此地儼冠裳爼豆虛崇祀英靈憶故鄉寶衣應去匣石鏡黯無光僚佐疑陪列碑銘想道傍我來瞻廟貌髣髴近宫牆苔没黄金座巫登白玉堂清歌聴緩緩明月自蒼蒼已矣英雄略悲哉樵牧場放懐思割據俯仰幾興亡拜手依雲路陳辭薦柏漿寂寥宋陵寢誰與奠烝嘗滇中歌與黄明府雜談滇事作滇江自古接中華匹馬南行厯瘴沙髙髻銅環帶瓔珞由來蠻女盡如花飛雁何曽過五溪南方多半是生黎朝來倒挂縁溪舞夜半猩猩上樹嗁沅江西去是滇池風土依稀記往時銅鼓迎神歌一曲居人多賽竹王祠崇禎宫祠朱邸初移玉殿開至尊新自外臺回單衣不用葡萄錦勅進江南越布來盈盈早歲進昭陽家本長淮到北方一自阿嬌承寵後御前强半學南粧内殿承恩往復還香車不斷露臺間罘罳特令宫紗障不遣春風暗玉顔曹季子爾垣爾垣字彥師勲第四子工古文詩詞壯年早世送林武宣之楚金風秋氣肅霜林翳遠道遊子辭故鄉登途展遐眺寒烟横蒼莽積翠迷深窅揚帆千里去雲山一何杳江聲日夜聞清猿傷客抱抑鬱念伊人抗情寄物表俯仰今昔間爰披江蘺草相思秋水清相見春風杪同心蕙與蘭兩地參與昴側身雲夢澤離懷空繚繞申章托繾綣意氣良自寶採蓮曲菱歌初引日遲遲菡蓞迎風欲放時競打鴛鴦抛約臂生憎兩兩宿連枝陸秀才英標英標字彥威平湖縣學生能文善書卒年二十九早秋野望同友人賦憑高一眺望大火正西行天濶雲無影山空樹有聲葉隨流水下鳥逐去帆輕日暮招鄰叟清樽坐月明卜秀才金錫金錫字嘉名號疎齋嘉興庠生十試棘闈不售晚以酒民自號有春暉閣草疎齋詞魏風初集試新茶分得刪字我生嗜飲過於食放情茶酒無所閑聊復一樽與一椀坐消阨塞開愁顔沉酣幾欲傾家釀採掇常思窮厓攀邇來食貧罕兼給酒或未廢茶則慳徒然雷雨滿盈後垂涎䝉頂丹丘山寶耕老仙近八十杖履輕適心高閒手摘蓓蕾注磁素旗槍入眼何斑斑時値謝庭集子弟不惜珍物羣為頒逈如海外穆陀葉一吸靈液生𤣥關長安貴人知何許滇茶濃液色俱殷若令鮮白見此品酬之當有金數鍰乃畏郡齋減風格招邀逸叟嘗始嫺因而噉啜頻見及亦將滌我腸愚頑昔聞陸羽諸具列鹺簋棄擲眞味如草管甘馨豈容他物㸃雖祀為神經可刪又聞宋元以前皆碎碾製成小餅龍鳯環人工漫添天趣損生新之質全應艱何似先春探紫筍貯烹得候香逾蘭我今對此慰夙好俯窺仰擬殊自􅍀雲影徘徊歴晴樹交枝藻荇横澄灣愧謝玉川走筆贈但覺習習風生兩腋間徐運判發發字圃臣嘉興人必達孫以廪監考授詹録事改運判未任卒有天元厯理清引亭稿諸刻薊門春望和北海于虞粼韻薊北初過雨平臯淨似秋風飜城上斾栁拂渡邊樓宫闕春逾逈關山客自愁浮雲催薄暮千里蔽滄洲聞溪蔣楚穉索先大司馬未刻詩稿簡寄江郭秋風路未賖昔年清麈隔雲霞離人錦瑟愁催雁避地青門學種𤓰兵革論文哀庾信山川博物羡張華一編先澤憑君重贏得餘閒㸔好花湯太學駉駉字公牧海鹽人庚戌十月集柯將軍園亭送柯翰周還武水得明字此日成高㑹頻年得未曾園亭金是谷湖海客為朋月落驚霜樹天寒指玉繩三花㸔已遍日觀好重登沈貢士起雷起雷原名隆峴字平萬平湖貢生送柯翰周得郊字總是淹留客相逢傾盖交開樽當畫閣極目俯寒郊朔雪消河曲明星出栁梢田園蕪欲盡歸興起誅茅吳太學浩浩字岷培秀水人送翰周得開字西風吹别館相送此徘徊衰栁經霜落離筵帶月開酒闌愁客去雁過擬書來春色江鄉好煩君寄早梅梅谿叟周篔篔初名筠字青士號簹谷嘉興梅里人隱于市讀書闤闠間日盡數十卷好交與從肆中得錢輒以餉友更嗜方外遊嘗于元日訪臯亭僧靈章雪深數尺徒步行亂山中見林際燈影始達精舍僧方喂芋共啖之晚年館于武塘柯氏偶步城東見一農舟遂乘之遊九峰訪諸乾一暮至泖上以路歧登岸投一庵庵僧力拒徘徊佛燈下忽覩壁間詩刻指曰此周青士即予也僧素驚其名乃止宿焉其作詩低頭沉思行街市中若無所見曾在白下禪廬往來池上僧疑其赴水竟夕不寐又嘗行吟慈雲寺中誤觸當事輿詢為詩人乃免其迂誕類如此康熙丙寅太僕色冷聞其才延之入都執禮甚恭居久之諸津要求其一刺不可得丁夘藕莊主人載與南歸抵淮而没向在里中嘗過予家輒信宿予輯諸詩方欲詢以遺老舊事而忽焉客死亦此書之不幸也著有采山堂集過白蓮寺觀銅塔是錢鏐時故物蔣子岍僧果所施銅塔如片瓦鎔鑄何工巧隆起欄楯形圖識尚可了知是五代物厥惟錢王造是類萬有千聚散不可保幾歴兵火災存者今已少蔣生偶獲之什襲逾重寶施舍鎮精廬此意實微眇誦公喜我至出示光尚皎窪處塡黄金顯見諸相好屠兒額偏廣下放刀仗小一者既若斯諸餘皆可曉春日臯亭訪靈章禪師巢枸居探竒入艱阻杖策西山巔盤回出榛莽始達精廬前微光射虚堂夕照猶西懸遺薪滿林臯㸑室通源泉愛此山中居所適安自然我來雪初霽巖壑開晴烟叢梅倚絶壁皎潔有餘姸境絶思亦清心止如澄淵清談至分夜擁火不得眠晨鐘發前嶺月落空寒煙曉行曲城頭月落雞初鳴鼓四起坐鼓五行霜華滿野馬蹄滑出門莽莽雲山濶閨人挽衣雙淚流子啼女號愁復愁誰能骨肉更相顧萬里揚鞭且西去乙丑季秋將遊都下過别當湖諸公餞予南疑草堂用昌黎山石詩韻聖代庸顯揚側微雌無偃伏雄奮飛寸長尺短皆効力漫言相者徒舉肥雲羅天網日加密隱淪巖壑今誠稀梅溪先生獨傲兀至死無恨朝惄饑宿瘤嫫母甘老寡不嫁且自鍵兩扉何知名公謬聞聽欲使枯蘖沾濡霏羣公酌我意懇惻深堂促坐相遮圍長征為我慮風雪不徒酒後䝉我衣筋駑肉緩怪中散竊恐失足遭鞭鞿為言知己不可負感恩一報圖早歸再叠韻别陸雅坪先生牛醫駔儈繼業微頳尾忘躍殺翮飛頭童齒豁眉半落身腊那如瓠白肥從憐世棄由識寡敢曰我貴縁知稀平生憂患多所歴垂老不怕還長饑猖狂偶一效阮籍途窮行後歸山扉中筵高論獲今夕傾吐玉屑何霏霏示我周行出艱險恍若為解重城圍尺書十幅意珍重如餒斯食寒斯衣襧衡刺字未漫滅長途早下征韉鞿情親公叔有前約吾身良亦知所歸三叠韻别沈南疑稱聾自斷學杜微心何曾憂不奮飛出慕紛華入道義瘦以交戰勝則肥無人幽谷芳自好猗蘭一任知音稀東方有士常乏食霞餐蘖嚙聊忘饑誰言苦節貞不可白石久拄青苔扉車脂馬秣催郡檄雨雪那顧遥途霏東陽愛我憂軫切腰帶為减當時圍囊裝祗載萬卷帙禦冬尚缺氊裘衣勸飲既竭牀頭酒壯我行色驅征鞿此行黽勉從所事勿以失職思遄歸四叠韻别李辰山志士不厭生業微泥伏何必輸雲飛夷齊采蕨既療餓曲逆亦食糠覈肥衆人碌碌事口腹得固窮困良亦稀吾交同志有數輩立節只在輕寒饑賣絲濮老隱吳市斵棺蕭氏棲㕓扉亦有汪生事裁製結楹天馬林烟霏猿騰鹿竄遂我性束縛不受三驅圍先生高誼獨迥出友彼齧缺師蒲衣吾行何為忽改轍去去輦轂紆塵鞿傷心白頭入賔幕何日巖前同所歸有錢百餘適書客持敬輿集至傾囊售之傍午始得成炊賦示旼兒几靜晨開巻瓶空晚作糜得成兒子學無礙老夫饑揖讓殊臣僕提擕藉友師無嫌家世賤叔度是牛醫客京口覊旅空江上高樓每獨登潮聲沉鉄甕山勢走金陵老驥徒悲櫪㝠鴻偶避矰秋來阻舟楫歸計復誰憑感興與俞犀月朝㸔𤣥髪暮垂絲炊黍光隂更幾時衣食老為諸子役文章賤比百工師故人裘馬青雲迥小徑松篁白露滋和汝倡予眞不惡南邨那遂卜鄰期久不聞家中音耗與友葵榴近檻巳將開濃緑臨堂蔭古槐兒女病無家信慰朋游醉得旅吟哀短衣射虎終推命小技雕蟲不筭才總幸與君同倡和更誰為築伯牙臺九日客中寄弟九日離亭雨三年異國愁故園兄弟在為我一登樓過屠東䝉邨居白蓮寺北水東流白鹿涇西卜宅幽山雨欲來邨樹黑滿湖菱葉罥漁舟項景陵玉筍玉筍字嵋雪嘉興人桂芳子由歳貢令景陵稱循吏酬龍眠方爾止饑鳯求竹實寒蟬隱枯枝秉德固有殊蕭條同此時方子天下士扁舟來何遲扣門登我堂促膝咏新詩把手浮大白結交兩無疑海風吹落木凉月滿南池典裘常苦寒斧氷難作糜還問苕霅舟予心轉凄其歲暮羣動息遊子無歸期願言過敝廬且待陽春熙客銅陵荒城如野寺日午始逢人漁父歸携酒山樵出負薪民閒知賦少治簡覺風醇乘興來江上鶯花又一春李琬琬字閑功嘉興人嘗為詩旌遜國諸臣凡九十二篇惜未見其全稿來䕶君劉理順官左中允居鄉有長厚名賊入城全家闔門縊死賊百餘至其門曰正來䕶君君已死羅拜哭之來䕶君君已死䕶君不得臣之恥北山有鳥南山羅鳥飛羅破當如何得勝門王家彦官兵部右侍郎守得勝門被賊殺仍焚其屍峩峩得勝門藩籬衛宫闕峩峩王莆田生死相决絶臣身有如得勝門藩籬已毁名不存臣心有如得勝門藩籬已毁門常存煤山樹王承恩太監愍帝縊於煤山承恩對面縊古樹下明興宦者時攬權口銜天憲殊未然其間忠正不多得子鵝片肉非常食嶻嶪煤山樹千枝君縊南枝臣縊北兠鍪短袖入宫裏亂臣賊子皆朱履九龍牀坐輿臺軀皇極殿上曾區區天兵一起還西走金珠壑葬烟花藪一年兩度興亡悲囘頭寧見煤山碑朱遹成遹成字求仲嘉善人有名山八懐詩今錄其五懐岱宗岱宗形勝信雄哉萬里天門霽色開秦帝遺碑生緑字漢家㫁簡䕶蒼苔地臨玉女雲霞合峰接蓮花日月迴七十二朝今寂寞云亭封禪有誰来懐衡山岧嶤衡岳接遙天日麗霞明玉洞前七澤濤深連暮雨九疑峰斷鎖寒烟翠華尚憶巡南極白晝曾聞降列仙我欲振衣千仞上乘風清嘯祝融巔懐華山太華真形在眼中烟雲迴合杳無窮捫蘿毛女三峰迥攜屐幽人一徑通絶壁自浮仙掌露層巒不斷石蓮風遙看萬仞芙蓉色千載應知造化功懐廬山廬山逺控斗牛區想像崔嵬翠壁孤雲斷蓮花浮夕雁濤寒彭蠡浴春鳬談經開士空今古栽杏山人定有無見說層巖飛瀑處九天風雨下笙竽懐天台會稽南去是台州縹緲羣山洞壑幽瀑布情翻天姥雨霞標曉映赤城秋漫同太白尋仙隠且學興公賦勝遊瑤草琪花如可問石梁咫只接重樓沈權之權之字孝威嘉善人同羣従夜集大觀樓數載俱飄梗今宵忽聚星何人眉最白惟我眼能青書到憑鴻雁詩成感鷯鴒莫分南北阮最是喜同醒卜淇淇字取新號筠濤秀水人負雋才亡年二十九恨別雕闌坐聽鳥聲頻苔徑繽紛柳色新最是别來凄絶處看花不見折花人戈元頴元頴字長鳴嘉善人工詩古文蚤世題桃源洞天仙圖兀兀天地内川壑開煩襟軒楹芝草長白雲與之深中有餐霞士獨撫丘中琴逸侣結遐契獲事心所欽羣族無近狀清泉多好音山候延晷夕岫景變陽陰滄桑易眺聴遙蹤寄長林呼鸞理瑤策振衣玉山岑蚤春閒居春風不相負重到栁堂前地煖初縈草池寒未種蓮干戈看往事雨雪入新年野外容棲傲江湖正淼然讀無能新詩榴花開徧復紅蕖此日相過下澤車散病樽前司馬賦感時篋裏賈生書中原意氣憐同調京國篇章慰索居欲報瑤華慙玉案北窗風雨渺愁予錢士賁士賁字巖燭繼章子怡情詩酒有晉人風致甫及强仕而卒和陶飲酒五斗不適意解組遂言歸歸来復苦貧四壁空瓶罍我生如孤雲八口常無依故人有王𢎞載酒欵荆扉怡然盼庭柯蹔復忘寒饑髙義不可再空樽誰與揮雜感烟波一望渺吳關岸栁青青漸可攀羞對芳年新雪髩愁隨清夢舊烟鬟小園鶯囀嬌春色大庾花深照客顔遮莫喧歌連曲港閒門流水自潺潺吳越閒者徐之之字逺將平湖人精於天官家言曹司農秋岳以余粗知星象白于制府趙公口占却聘聖主當陽在玉衡求賢懸爵待神京儲囊錐頴難為脫伏櫪駑駘未敢鳴自愧談天無異騐人言翊運有宗盟草茅出處如闗象安道風流且莫爭卜舉人年年字翁洲秀水人崇禎己卯舉人隠于鴛湖之濵晚年肆力于詩惜多散逸題千山雪霽圖呉松綾子千峰闢筆窮造化疑神役長林蕭瑟同雲稠松髯藤蔓失其碧南溪老叟蚤探梅紅衫篛笠攜杖来呼童折花過石梁一路寒香帶雪迴坐看霽色開雲塢巉巖山勢如蹲虎中有飛瀑走玉龍山頭樹樹皆含雨殘雪未消日欲昏清溪㡬曲繞衡門行行更入深山去不知何處是歸村周秀才之臣之臣字爾襄平湖人本姓李少補弟子員康熙丁未受鍊師王崑陽戒于松麈山奉真朝斗壬子上元見黃冠絳服兩道者来迎乃謂家人詰朝余將歸閬苑矣十七日小歛畢夜二鼔繐帳中有光如晝當腹簇湧三寶珠大若雞卵髙射三尺有竒手足皆挺蓮花數朶秋日雨花用寒山韻睡起意闌珊秋光半欲殘空庭花自媚幽怨淚新彈泫露參差舞浮烟仔細看濃陰如未散羅幙不勝寒蔣處士岍岍字僧果嘉興人襟懐曠達卒年七十三屠東䝉輓以詩有作詩凌陶謝學道尊張程之句盖紀實也和屠東䝉田間曉步韻桔橰響榛薄城市猶熟眠蒼涼望朝墩秉耒競欲前老翁起飯牛超遙向東阡瀼瀼草間露漠漠墟中烟衆鳥亦相逐始秋雲物鮮兹焉不努力何以謀粥饘曳裾事干祿斯文誠足憐理生苟茫昧奚取腹便便誅茅念我祖逶迤農圃連長水當巽隅浮圖峙西偏一為化人居棄置頗有年攬物遂興嘆躬耕思昔賢檇李詩繋卷二十七
