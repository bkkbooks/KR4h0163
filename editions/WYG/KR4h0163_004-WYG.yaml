body:
  text: 檇李詩繫卷四平湖沈季友編元張文穆公伯淳伯淳字師道崇徳人少舉童子科與内弟趙孟頫人品相望舉咸淳進士至元中世祖遣程文海訪求江南人才伯淳與孟頫並被薦入見世祖問冗官風憲鹽筴楮幣對皆稱㫖命至政事堂將重用之固辭授翰林直學士詔令皆出其手同修國史謁告歸卒諡文穆有䝉養集虞集為序其詩文耻尚鉤棘舂容紆徐鏗乎金石之交奏也題太初壽星北方有名畫吾愛馬雲章昔年遭亂離流落向武昌孟氏授館餐游戲翰墨場作此夀者相瞳碧髩毛蒼瑞芝生坐石清心炷妙香珍襲知㡬年上射牛斗光車書混一後發此屋壁藏吾宗夢符君得之猶珪璋思與博雅共傳寫入縑緗伊誰㑹筆意述者趙子昂毫髪無少差後先相頡頏太初天下士展卷懷故鄉持此安所施素壁暎髙堂人事有分合精藝足流芳托物尚可傳况乃名譽彰願言斯文夀天地同久長子入京我昔到京師幾度望清光日食太倉粟亦有大官羊承恩入翰苑竊祿三載强絲毫無補報轉頭松菊荒我歸為丘隴駒隙雙丸忙及𤓰不求代日星垂條章求閒遂得閒初志或小償未老苦多病勌翼甘囬翔箕裘汝當勉弓冶本非良去去都門道絶勝鑑湖涼土深氣候齊不同瘴癘鄉然於飲食間過多亦為殃揚沙風力勁外邪襲空腸迷惑非一端蕩則流於狂此行分寸進造化在廟堂奔走形勢途無益多所傷交遊不厭審非類宜深防計日需汝歸秋風蓴鱸香顧步無小差所到未可量題于越亭送梅君石祕校詩後聖俞先生宣城裏經行修明教胄子不特詩名滿世間紀載精詳繼前史當時晦叔誦其文曰二百年未有此先生泰山北斗然管窺蠡測難為言我從聞孫見手澤定知家學來根源繭紙可腐石可泐世美自有不朽存送李公略風雪滿吟鞍長江望眼寛宦清騰踏易聚乆别離難人去鶴應怨冬深梅不寒暮雲依舊碧㡬度倚闌干賈氏望梅樓寂寞千巖萬壑秋欲窮望眼更登樓曾觀海者難為水自出山來無此遊前代衣冠隨世運故園草木染春愁重門深閉閒庭院難掩當年富貴羞陸徵士正正字行正自號率齋居士本名唐輔居海鹽之當湖今析平湖豐頷長耳端毅寡言精於律吕象數之學與華亭謝國光皆有重名程文海求見兩人俱稱疾不出後復與劉因同徵不赴隱居教授著正學編樂律攷七經補註至治三年卒門人私諡靖獻先生古意結漓事君子誓作形與影人事多乖戾彼此睽燕郢尺書沉素鱗嗁鵑催逝景妾命詎終薄君心那得冷開簾花撲面淚落紛如綆學易先生俞鎮鎮字伯貞崇徳人習朱輔之學為傳貽書院山長至大中江浙行省薦授華亭教諭延祐間鄉舉第一官至建徳路知事其行草師李北海學通五經尤精於易得其指授盡為聞人嘗榜其居曰學易門人私諡為學易先生有修辭稿富春吳見心復有題俞伯貞乘槎圖詩云瀛洲獨步玉堂仙曾從靈槎上九天天上歸來人不識河源錯認漢張騫延陵義塾詠桂考見題詠西風起巖幽白露下藂薄朝看木槿榮夕見芙蓉落檀欒月間桂歲踐中秋約仙葩獨紛披芳宴競醻酢瓊宫實髙寒之子真綽約如來金粟影大士珠瓔珞何年分仳離此地樹寥廓語溪古多士往者我先覺陳門列三魁莫氏敷五萼丹青翼堂搆朱紫耀城郭鉅筆上髙懸靈根下盤錯事叶燕山碑調髙淮南作孫枝日長大奕葉隂綿邈終成仰攀志豈但延賞樂相期醉浮螘半夜驂鳴鶴往持吳剛斧竊試嫦娥藥勿謂我言狂詩云善戲謔送崇徳同知蒋蔣山滿解法吏多慘黠文儒或迂拘世有𢎞達才奚必吏與儒蔣君西湖彦身依北辰居皎質燦璚枝清標瑩氷壺明於鏡發奩圓若盤走珠貳州江湘表攷績政已殊剸劇來禦兒依然發硎初儒宫新作興吏牘弊盡除恵澤到閭閻愁歎成歡呼我歸從武林屬君方下車流氓方復業矧我冠帶徒月吉㑹講席旬休挈行厨登臨境增勝談笑訟遂無俄復三載過去作九萬圖非云重離别願言惜居諸鵰隼鷙擊用棟梁廊廟須努力酬主恩揚名報親劬盡職乃人臣素餐非丈夫我當握簡札采掇歌誦餘上陳良史官為君細細書大腹兒塵巫夜禱軋犖山滛光下爥穹廬寒栁城健兒不敢睡四野惡聲嗁狗犴猪龍怒磯老梟腹鱗甲粗踈頭角禿婪酣大肚三百斤偷得真龍半分福范陽氊帳妖潛形平盧寳刀遲發硎金鷄口吐東北赦青螺啼作西南聲鳳凰春池金鏡破獬豸霜臺胡眼大東風野鹿嚼楊花白日妖狐登御座華清玉甃湯作泉洗兒果撒黄金錢幷刀剪綵十大幅錦䙀壓碎宫娥肩象牀夜冷嬰兒哭猪龍爪破金訶玊香齦不痛荔枝漿雄心已飽鷄頭肉長安天奪蜜口臣銅頭鬼鼓漁陽塵赤心一夜變胡腹二十四郡俱無人潼關夜漏鷄聲早馬嵬坡下氷山倒劍兒西寄杜鵑巢練帶玉環埋翠草嘉山土門勒戰功猪兒帳下屠猪龍旄頭星落大腹破機上鸞刀一尺紅屠學正曽曾字體寧小名一郎母樂夢王曾而生故名世居海鹽乍浦北里許土家山永福巷後析平湖宣慰楊耐翁壻也少受書於吳草廬延祐中江浙行省薦為學教諭至治癸亥中浙江東榜第一有虞廷慶雲賦為藝林稱重授建康學正不就隠於家吳元年籍沒楊氏其家遷避齊景鄉黄泥堰康僖公其裔也慶雲賦歌溯厥皇虞敷天孝徳蒸乂格姦祗載夔栗當宁升聞班寮師錫有鰥登庸側陋皇赫徽典敘揆賔門覲辟左禹右臯前稷後益愠解八風教訖四極水邨隠君錢重鼎重鼎字徳鈞自通川徙居嘉興分湖之涯後析嘉善構水邨聚書其中趙子昂為作水邨圖一時名士俱有詩題之選存題咏卷中題髙士圖在昔洛陽雪深丈餘士也髙卧來令尹車今年吳淞雪復何如積素一色鷗鷺有無之子江臯修亭是居有琴有書有酒有魚賞静獨眺聊以自娱挹茲清風凛凛起予此景此圖再卷再舒髙升朱太史彝尊以金蘭集見示云此係里人因載入題徐良夫畊漁軒山中遂髙隠累世業畊漁江浦晩潮急湖田春雨餘自縁甘澹泊何用借吹嘘他日投簮去多君為卜居索蠟梅花蠟花的的猶緘綠應向山家十月開歲晚書窗甚寥落誰能為寄一枝來錢應庚應庚字南金郡邑志皆失載邵復孺蛾術集中有褱南金往海鹽省母詩有答南金知近寓秀水僧寺詩有寄錢南金孝亷詩又有句云美人只在寒雲外破屋依然谷水西南金又嘗居茜涇今屬嘉善境舊選惜無南金全作止錄聫句一首閲鐵網珊瑚載復孺貞溪詞翰内有數詩復採存之㑹合聨句乆别情褱在邵重逢意氣添窮途仍逺役錢吾道豈終潛遲暮身何補邵艱危首尚黔客情鄉態别錢人事物華兼豹隠曾誰見邵鷄羣適自淹故交深閥閲錢髙誼薄閭閻歲晚詩無恙邵更遥夢屢瞻盍簮長此地錢翦燭近前檐近况俱相問邵幽期已素占真成談亹亹錢更復坐襜襜弱冠交遊早邵通家學問漸訂頑唯汝益錢知已不吾嫌春浦隨風鷁邵秋堂滴露蟾楚蘭愁共擷錢湘管醉重拈村市魚蝦美邵盤餐筍蕨酣望雲歌白苧錢蹋月認青帘静賞花當戸邵微吟草入簾平烟孤野濶錢落日九山尖竹影棋枰潤邵苔痕屐齒黏風流原不算錢文采頓能忺芸業猶生計邵𤓰田僅養恬索居期自奮錢微祿覬同霑俗薄輕遺佚邵時清愧孝亷毎驚巢幕燕錢殊比上竿鮎屈賈時多忌邵商韓世不厭固窮君子拙錢競進小人憸璞玉甘深韞邵鉛刀苦較銛淳風難返古錢澆態日疑炎汩汩知何益邵嶄嶄獨好謙富應同土苴錢貧不厭虀鹽暴白心如鐵邵雌黄口莫箝妙年咸仕版錢長晝只書幨坐欲彈冠起邵耕期束帛覘壯裹從曠逺錢短髪任髻鬑未屬麒麟畫邵恒韜虎豹鈐淹留頻撫髀錢慷慨亦掀髯但得襟期在邵何憂歲月殱匆匆投并轄錢忽忽報郵籖江海無忘險邵氷霜已戒嚴詩篇相砥礪錢友愛辱鍼砭邵答復孺與君相知最相憶春水東流春望深十年共坐燈火約兩地忽牽江海心日落瞻烏誰屋上月明夢鶴故城隂蘼蕪滿地不可寄何以報此瓊瑶吟閏正月得復孺先生去冬寄懐詩次韻奉答忽見新詩慰濶踈好褱憐爾獨思予無由横泖同垂釣依舊匡山借讀書自惜交情嗟老矣即今世事轉紛如西園寂寞梅花路腸斷春風處士廬題仲圭墨菜老吳嗜好素淡泊戯畫晚菘三尺强江南物價正騰踊山中此味偏悠長氷壺立傳貴適口碧澗作羮聊塞腸自古食焉難怠事吾儒莫羡大官羊楊宣慰梓梓世居海鹽澉川以豪富稱元時為宣慰使節俠風流尤善音律與武林阿爾哈雅之子酸齋交善酸齋善歌能製樂府散套梓得其傳雜劇中有豫讓吞炭霍光鬼諌敬徳不伏老皆其所著也甞建樓十楹以貯姬妾今稱宣慰粧樓云過湖登樓樓前秋水健帆開樓外秋風舞袖囬萬里梯航通鳥道四時風雨䕶龍堆江山如此不一醉歲月幾何能再来欲問老髯求鐵笛夜深吹上紫荆臺譚復復嘉興人詩見元音有見心小草寄玊筍劉師復道士玉筍峰頭玉作人梅花壇下讀丹經曉分露水洗明月夜掃雲洲拾落星海舄近傳鳬逕度泉琴誤許鶴同聴何當謝却塵中鞅共倚松根斷茯苓梅花道人吳鎮鎮字仲珪嘉興魏塘人後析嘉善性髙介善畫山水竹石題詩其上時號三絶富室求之多不得唯贈貧士使取直焉作字用畫筆如寫竹狀饒有天趣自號梅花道人方元之季類多髙隠倪元鎮居梁溪楊廉夫居干將陶南邨居泗涇張伯雨居勾曲黄子乆居琴川顧阿瑛居玉山然皆風流縱誕廣延聲譽之士片紙一出標榜互髙鎮獨匿影窮鄉日與羽流衲子為羣時或垂簾賣卜言多警世沒於至正中年七十五自題其墓曰梅花和尚之塔人怪之曰乆當自騐未幾西僧毁掘諸墳疑為緇流竟免今名梅花里即其故居與埋玉處也詩更清逸可誦松石圖硯池漠漠吐墨汁蒼髯呼風山鬼泣濤聲破夢鐵骨冷露影濡空翠毛溼徂徠千樹老雲烟湖山九里甘蕭瑟何當閲此明窗下長對詩人弄寒碧畫竹與可畫竹不見竹東坡作詩忘此詩髙麗老繭氷雪冷戲寫歲寒巖壑姿紛紛蒼雪落碧篠謖謖好風扶舊枝猙獰頭角易變化細聴夜深雷雨時食菜􅐘戲作菘根繞地翠光濕雪花翻起玉脂泣蕪蔞金谷巳塵土美人壯士何顔色山人乆刮龜毛氈囊空不貯榆莢錢屠門大嚼知流涎淡中滋味我所便元修元修今幾年一笑不直東坡前題畫平林方漠漠野水正湯湯蒼莽日欲暮年衰客異鄉草店自迴合邨路迂更長渡頭人散後漁父正鳴榔題竹三首湘妃祠下竹葉葉著秋聲鸞鳳青霄下吹簫坐月明隂涼生硯池葉葉秋可數東華客夢醒一片江南雨短梢塵不染宻葉影低垂忽起推篷看瀟湘雨過時青浮山孤山七十布西東水面竒形獨不同㡬向崚嶒高處望青螺浮在太湖中畫竹八首葉葉如聞風有聲盡消塵俗思全清夜深夢遶湘江曲二十五絃秋月明愁來白髪三千丈戲寫清風五百竿幸有穎奴知此意時來几上弄清寒長憶前朝李薊丘墨君天下擅風流百年遺跡留人世寫破湘潭夢裏秋春到龍孫滿地生未曾出土節先成可憐無箇伶倫眼鎮日垂垂獨自清低垂新綠影離離倚石臨泉一兩枝憶得昔年今日見鳳凰池上雨絲絲動輒長吟靜即思鏡中漸見髩絲絲心中有箇不平事盡寫縱横竹幾枝倚雲傍石太縱横霜節渾無用世情若有時人問誰筆橡林一箇老書生瀟灑琅玕墨色新半含風雨半含烟怪来筆底清如許老子胸中想渭川竹林處士陳堯道堯道字宗逺自號竹林處士嘉興人隠居不仕與楊維楨等倡和沒於元季有竹林集子約絅繹緝皆能詩語溪朱志道有喜宗逺復入虚白齋詩云竹林先生陳夫子白髪鬖鬖垂兩耳著書眼似秋月眀為文思入清㝠裏近來學得神仙術欲向山中飡石髓世間自有仙人居何必蓬萊三萬里先生一去竟莫逥我嘗勸之留不止如何擘破山中雲却被茅君强招起月泉吟社詩刻内載陳堯道一首係義烏人存之俟考松瓢齋為王好問賦身外纎微皆長物一瓢飲足寄蒼虬壺中日月懸林表天上匏𤓰下磵幽器大從来成濩落時危那復事沉浮只憂尚渴陶唐化未放先生學許由挽穆爾古蘇小范胸中有甲兵檀公身後壊長城大星墜地中軍愴白馬慿潮覇主傾碧血不隨金石化丹心長貫斗牛明㑹稽髙與浯溪並誰與磨厓刻姓名春日田園雜興見月泉吟社化日邨田樂春風畊織圖秧肥蝌蚪動桑暗鵓鳩呼罷社翁分胙占蠶媪得符傍花隨柳處此事不闗吾竹莊人吳瓘瓘字瑩之隠於嘉興魏塘今析嘉善構竹莊居之自號竹居人善畫梅仲圭題曰吾鄉達竹莊人得逃禪鼎中一臠咀之嚼之深有所得寫竹外一枝索拙作繼和予不能追古人萬一自笑東隣之效顰醜矣語與詩俱見鐵網珊瑚余之作梅聊自吟嘯豈在悦人心目適唐明逺求作寫一枝以贈今置之禹功後何堪依附古人而圭翁序之復作一詩題於後逃禪親授寫梅法二百年来徐禹功竹外一枝清絶處孤山風雪夜濛濛過布衣宗一宗一字貫之海鹽當湖人今析平湖早䘮父獨與母居至正間張士誠䧟姑蘇聞其才遣使迎之以養母辭尋以兵刼遂負母逃海上欲殺其母乃以身蔽面中數創賊憐其孝舍而去傭以給食母卒六年不克𦵏寢苫服衰不變有白燕巢其室眀初事聞建坊旌之顧邑城寄奴王者亦英雄更愛風流老顧榮今日孤城滄海畔一天紅浪晚来風附考顧邑一作故邑在乍浦故邑山下顧榮之先勾踐支庶封此子孫以為姓漢順帝時海鹽縣䧟為當湖移治此山下尋徙馬嘷因名焉宋書劉裕追孫恩築城於此有驍將虞丘進居城養創按越絶書吴王伐越敗兵檇李大風發狂日夜不止車敗馬失騎士墮死大船陵居小船沒水匹馬啼嘷事見吴史夫差駭問子胥胥曰風北来助我越必敗後人因以馬嘷名其城云城在海鹽縣東南一百步水經注曰谷水之右有馬睪城故司鹽都尉吴王濞煑海為鹽于此晉咸康七年移縣治于此殳山隠人陸容容字景逺居崇徳殳山之北今析桐鄉搆来青堂於兩峰間吟諷自樂貝清江遊殳山記中云訪陸生於来青而生以事出其子煑茶来獻乃啜二甌來青堂我来巳過看花時剛到中秋未是遲縱使芙蓉零落盡北窗還有耐寒枝陳布衣寳生寳生字彦亷海鹽人父思恭客泉南娶莊氏思恭賈海而死莊㩦孤歸鹽守節寳生少有才名好為怪體詩兼善繪事與雲間黄子久契宻子乆毎來必為漬筆㸃染山水多至二十餘幅題曰大癡道人為彦㢘先生畫體勢大較飛筆走墨山骨崚崚無事皴法翠微赭脚淡逺濃樹而幅必以淺藍染空若髙穹下冒也後寳生作春草堂於婁上以奉母遍請名人詩文以傳之又居峡石東山以父溺海終身不至海上子乆來鹽嘗拉之觀濤偕至東城輒涕泣子乆動容亦不看而罷因為作仇海賦記其事題石民瞻鶴溪圖雙鶴翩翩入太清溪流不盡松風聲髯翁筆底有仙路倩渠更寫芙蓉城沈孝隠嗣昌嗣昌字夀康元季居海鹽豊山之南早喪母事父曲謹父沒勺水不入口者三日既𦵏構廬其側覆以編茨障以土垣日匍匐望親壟以泣南臺論薦官之不就洪武元年卒邑令造廬旌曰孝隠至今名其居曰孝隠邨誦離騷經叢蘭芳芷滿東臯閒步春風讀楚騷忽憶靈均發幽憤墜厓幾折沈郎腰俞推官庸庸字子中號凝清齋嘉興人為平江路推官有恵政淮兵壓境庸募卒守城郡僚髙安等欲竄庸厲聲曰公等以世臣守大城一旦臨利害先民逋逃不顧義與恩耶髙安持鐵簡擊庸仆地遂開門兵入執庸置馬下頃之甦以計脱去間道而歸太府将授以爵辭曰吴門之役吾有死所今日之生出不幸耳尚負面授他命見天日乎因憤病卒病起口占憶昔辭家塞北遊朝來何事怯新秋牀堆藥裹塵侵几風静書窗月滿樓伏櫪長鳴憐老驥引杯含淚惜吴釣旌旗明滅西城路落日長烟起暮愁堵無傲討賊獲功任金壇縣尹久别無信作此寄之春入椒盤歲復除故人不寄一行書虎頭年少方投筆鶴髪慈親正倚閭鵰鶚雲霄揚羽翮羆貅壁壘悉丘墟丈夫出處皆前定莫向明時較疾徐次韻陳伯昂見寄闗河瑟瑟暗烽烟矯首遐觀獨悵然徒見舟車勞驛使未聞山澤訪遺賢參横古塞初寒夜霜滿征衣欲曙天自笑儒冠只如此窮通何必卜筳篿至正乙已五月三日偕鮑恂張翼金絅訪𢎞道朱聘君於集賢里𢎞道出蔣顥所寫翎毛索題各賦一首按𢎞道崇徳人明洪武初以明經為御史郡邑志皆失載寒棘幽花野思深好山無樹著鳴禽自來春色濃於酒别有髙枝在上林寄亭棲老陳秀民秀民字庶子四明人寓居嘉興感化里至正間官武岡城步巡檢知常熟州張氏時為㕘軍入明不仕自號棲老所著有寄亭集其詩風度邁人綽有古致當張氏據平江部將吕珍守越秀民與饒介之在左右一日陳賦詩寄吕有不驚越女之句饒為書扇詞翰雙絶吕倩人誦罷大怒曰我為主人血戰守封疆豈愛一女子不忍驚乎見則必殺之陳基有寄陳庶子㕘軍兼簡饒介之郎中詩云楚天漠漠水迢迢千里懷人不自聊帷幕喜聞延曲逆行間忝竊事嫖姚江空不採芙蓉寄歲莫唯歌桂樹招華葢仙人如借問為言髀肉近多消送強彦栗歸吴薊門秋月白城頭夜啼烏城中良家子半是南征夫或從張都䕶或屬李輕車道旁别妻子泣下如迸珠自非英雄具孰使禍亂除戎馬暗中國遊子将何趨君歸慰父母繄我獨何如懐古兎走要離墳貍啼闔閭墓寳劍生土花銀池浴秋露迢迢郭西門玉輦迷金步賦得靈巖吴門有佳氣靈巖秀而髙扶輿起中天横絶望四郊築宫念吴王乘舟懐越相如聞石鼓鳴不見西施唱花殘采香逕木落洞庭波鹿銜如意舞鳥合步揺歌霞邊錦樹明石上琅玕長世無赤松子誰與共長往金芝餌處士玊蘭遺使君煩將滄海月還照秀峰雲題王長史所畫天平龍門國月黒山鬼號蒼龍鬭折角仙人一掌擎不令堕深壑秋髙勢崚層日暮氣慘錯闌干氷柱懸凌亂雪花落路狹僅通人峰寒不棲鶴王侯天機峻躋攀故盤礴寫作龍門圖竒氣低五嶽神魚息天池有待風雷作壬午重九日與郭希仲紀叔維馬希逺飲周景父晚香堂上紀畫墨菊馬鼓琴既而各賦一章去年登堂三月三主人置酒澆春衫今年登堂九月九堂上主人復多酒馬生彈琴紀生畫郭子題詩美如炙四明狂客醉欲倒菊花挿帽秋光好百年節序能幾逢人生㑹合何其少人生㑹少將奈何為君起舞為君歌歌殘酒盡更須酌莫待他年白髪多登靈巖寳殿鬱崔嵬華池頂上開山從太白出水自洞庭來閣樹聯珠墖巖花照石臺吴王清暑地那得有塵埃送王紫芝歸天台誰信丹丘王道士乗風歸去骨毛輕玉芝生處冬猶暖銀甕開時夜亦眀借使夔龍興禮樂也聞巢許薄功名胡麻流水他年約莫為躭棋不出迎濠州望古北居庸諸山古北居庸一望中風沙滿眼亂芙蓉曦車夜轉崐崘脊華葢隂移太乙峰金口水流終到海玉泉雲起又随龍兩京形勝今如此可儗秦闗百二重邳州青山一髮見邳州落日雲迷故國愁父老空傳黄石在仙人已伴赤松遊乾坤不信無清氣河水胡為尚濁流野樹昏鴉棲未定數聲哀角起髙樓湘鄉道中日暮倦趨山市逺解衣聊復憇巖阿雲迷險道藤穿石水落懸厓草亂坡木客下時人跡少鷓鴣啼處客愁多向南言語憑誰辨莫問蠻方事若何五月九日調軍入綏寧是夜宿風門嶺值雨五月官軍入不毛重岡複嶺接天髙小臣報國寧辭死大將行兵無乃勞漠漠野烟啼魍魎隂隂山木挂猿猱二更風雨來闗峡自喜挑燈看寶刀送陸徳中赴海鹽知州陸侯有仙骨晚歳學長生服氣歸元海遊神入太清渇唯餐玉露飢不飯青精酒後頻看劍愁米即洗纓宦情聊復爾江海一麾輕園隠為方以常賦爵禄不在念丘園計已成池虚芸閣静地闢草堂靈鐵甕花前灌荆扉栁下扃蘭芽含土碧菜甲葢畦青襏襫春沾雨籧篨夜見星避人修稗史教子讀牛經角角雞登樹翩翩鳥下庭神交陶靖節自喜酒盈罌西湖竹枝歌鴛鴦宛在水中央恰似阿儂初嫁郎擲却郎君金彈子勸郎切莫打鴛鴦吳中栁枝四首吳門二月栁如眉誰家女兒歌栁枝歌聲嫋嫋嬌無力恰如楊栁好腰肢長洲宫苑草離離中有吴王舊沼池至今二八吴中女為人歌舞學西施舘娃宫中花似雲舘娃宫外酒如春花前把酒花下醉莫遣春愁惱殺人姑蘇城邊楊栁絲千絲萬絲垂參差栁絲雖長不禁手難織迴文錦字詩周元初來鶴詩天外誰呼衆鶴來壇前道士本仙才月明遼海通三島能載飛瓊數往迴烟波晚棹圖東林待月月未出長江走烟波著天青山回首不可數幾㸃白鷗飛過船陪同同待制遊南城城南百花開滿洲城中主人招我遊急唤吴姬歌小曲莫令花落起春愁寄紹興吕左丞後來江左英賢傳又是淮西保相家見説錦袍酣戰罷不驚越女采荷花錢布衣大有大有字明逺嘉興人始恨詩不工自忿曰杜甫云讀書破萬卷下筆如有神吾患讀書不多不患作不工也既而于書無不讀下筆流暢輒與前異楊鐵崖稱其善學西湖竹枝詞淡黄裙子縷金衫長髻垂肩短鳳簮不願燕京嫁官去花枝草蔓自江南葉提舉廣居廣居字居仲嘉興人天資機悟才力絶人與鄉人張翼劉堪為文字友仕至浙江儒學提舉晚年築室西泠橋陶情詩酒有自得齋集題范寛畫卷范翁作畫絶代無巖壑交錯青珊瑚玉堂仙人妙題品千載見題如見圖亂後圖書絶狼藉竒珍委地無人識蕭條錦縹世間稀拂拭墨痕三嘆息題崔氏友竹卷璚芳絶交亦已久忘形三逕相追攀髙軒時過翠羽蓋美人或贈青琅玕清風慎截鳴鳳琯滄海勿垂釣鼇竿一朝羣才盡登用空山無人同歳寒寄楊鐵崖聞道西湖載酒還飛瓊弱翠擁歸鞍可無私夢登金馬剰有春聲到玊鸞異國頓消鄉井念小堂新作畫圖看野人未納彭宣履獨向清溪把釣竿自題隠居癭木裁冠鶴氅輕十年塵土厭飄零小山舊隠雲封户大藥新成月滿庭丹井夜交龍虎氣碧霄春躡鳳皇翎西風客舎炎歊净儗讀琴心内景經西湖竹枝詞水長西湖一尺過湖頭狂客奈愁何鯉魚吹浪楊花落聴得櫓聲歸思多芝林居士鎦堪堪字子輿嘉興魏塘人今析嘉善居王帶隠居讀書工文詞尤善古隸不習宦學以易授徒有芝林集費烈女吟永康費氏女年少十八九擇對無可人真心似瓊玖禮法以防身絲麻常在手至正十七載太歲次丁酉逆賊從東來旌旗揺北斗三巴數十城皆降不敢後唐姬與姜氏以漸為賊偶費女涕泗悲勤勤告父母人生棄禮義猪狗亦何有我身不如賊我死骨不朽夜深盛容飾自縊後園栁髙義感行人痛心而蹙首平章瑪魯者左丞韓叔亨低頭䨇屈膝拜賊乞餘生不能受白刃空負朝廷恩茫茫天壤間生死義與仁泰山與鴻毛孩提如重輕費女生草野烈烈超凡倫二公國柱石棄去如輕塵芳名與汚迹遺戒千百春擬古千金買明珠百寳裝帶鈎寳帶綰同心明珠垂兩頭美人結新歡託體相綢繆再拜稱主夀持以奉千秋題西溪草堂三尺茅簷壓樹低浮生聊爾作幽棲雖云身外原無地更有青山屬杖藜陸學士景龍景龍字徳陽號湖峰郡志作景能誤嘉興人至順已已舉賢書或曰貢士官明州學正有湖峰稿不傳詩見元音元詩體要及敦交集詞極𢎞麗時稱其工於咏物題趙松雪人馬圖閣老風流世所誇揮毫寫出兩名騧玉闗秋逺風生樹銀海春深浪蹴花一代衣冠淪草莽百年縞素颭風沙蕭蕭白髪鄞江上見畫令人重歎嗟春日遣懐和吳仲圭韻閒愁日日不能禁漫賦停雲感寸心老去一貧何至此春來多病到如今門前花飛萬㸃急湖上水添三尺深却喜小樓當緑樹倚闌時復聴鳴禽寄上竹深契家以寓懐耿之情竹深先生清隠處盖湖萬頃水雲涼毎聆金玊無來使時見塤箎有和章麥熟崆峒思續食花開杜曲憶傳觴西齋有客如羲獻為致殷勤意莫忘奉次見貽詩韻夏葢湖頭秋日涼碧雲遶屋見蒼筤波光入酒葡萄緑雨意催詩䓿萏香每羨謝公能曠達也知賀老足清狂故人已動江湖興儗借扁舟載筆牀過伏龍山訪諸故舊詩呈竹深老友江空歳晚賦停雲剪燭西窗話夜分山館無人訪遺叟驛亭有客送徵君寒梅近水偏饒笑老鶴昂霄自不羣明日扁舟湖上去棹歌聲裏酒㣲醺酒邊話舊情契綢繆見教二詩詞意深至輙步來韻以呈隔世相逢白髪長行窩十日坐書香義熙處士遭衰晉大厯詩人出盛唐往事荒涼驚逝水髙情忼慨惜流光只今故舊多淪落中夜懷人斷寸腸百年身世累虛名一旦炎涼見薄情溝壑未應甘轉死干戈已幸得更生誰家明月能吹竹何處滄浪可濯纓但得歲寒心事在梅花滿把不勝清畱竹深斬賞雪曹江三冬雪大作葢湖七日氷不開明月墮空銀漢淺白雲匝地玉山摧剡溪舉棹無由去㶚岸騎驢或可來却羡能詩何水部肯延東閣共觀梅故人重見髙誼藹然連日倡酬不已漫賦近體奉呈伏龍山色翠如新兵後重来訪所親喜見芝書徵國士尚聞蕙帳隠山人文章未信窮為祟詩句焉能妙入神慰我梅花窗下酒醉中拍拍滿懐春奉寄竹深識趣二先生兼簡泉上架閣下榻徐髙士彈琴魏隠君相望一溪水只隔半山雲毎憶朋簮盍俄驚客袂分登樓頻眺逺離思正紛紛至正庚子三月七日魏處士昆季邀予遊夏葢湖憇福原精舍胥㑹者九人各賦詩一章石橋流水放蘭舟野水蒼茫涼欲秋山勢截雲横碧海波光吞日沒滄洲岑參渼陂客同泛賀老鑑湖誰復遊醉挿花枝爭勸酒尊前一笑歲如流栁南小隠參軍家住南湖上楊栁䕃門春水生落日樓臺看洗馬東風簾幙聴啼鶯長條拂翠隂垂地三月飛花雪滿城毎為論兵来好客傍人錯認亞夫營榾柮窩安樂窩中興淡然靈根斫得自樵仙地爐伏火春如海雪屏圍風夜似年香透玉酥和芋撥脂流琥珀帶松燃絶勝沉水燒金鴨吹徹參差惱醉眠輓普大夫英英正氣鍾河岳赫赫髙名照古今七道提綱徒赤手九泉飲恨只丹心臺空鳳去秋雲慘屋冷烏啼夜月沉珍重遺章猶絶筆令人一讀淚沾襟題墨菊東籬正色本来真子墨如何强寫神滿目緇塵非舊日西風羞見白衣人題紅梅昔醉西湖處士家酒痕吹上水邉花東風蛱蝶迷香夢一樹珊瑚月影斜陸學正徳方徳方字顯叔華亭人至正壬午舉人授般陽路學正未幾羣雄蜂起挂冠歸時元平章河南沈照避亂鹽之甘泉鄉徳方单貧徒步傭書於其家俄與談經史論時政沈大驚詢知所自遂以女妻之明初以逋臣薦不赴嘗為詩題壁云云蔣楚穉輯我郡詩乘謂即陸景龍未知是否姑識之武原新居題壁我本由拳人何以寓茲土所恨國步艱一官難安堵流離坎􅇄中二天仰恃怙有妻如孟光有翁如彦輔灌園佐辟纑世事任旁午偶出南陌頭易姓知真主㣲服過舊鄉官私迫門户逃名名愈隨披裘釣溪滸夫豈蹈沉淵臣自甘草莽中泠烹一甌博山燒一炷彈琴伯牙臺聖世容巢父聴雪徵君孫固固字以貞海鹽當湖里人後析平湖雅志恬曠長於詞賦元季不樂仕進讀書顧泖之陽顔其齋曰聴雪因以自號豫章胡儼為記明初辟署華亭學不赴與楊鐵崖陶南邨友善所著聴雪齋稿今無傳楊維楨有聴雪齋詩云老夫聴雪龍門寺淅瀝初聞飄雪多龍噴雨花天作瑞象占雲葉氣生和月明蟹過銀沙岸風細魚沉玉海波萬籟一空天地在誰憐聲色老婆娑虞集有聴雪齋詩云樓前宿鷺起星河近歲江南雪轉多投老鍾山寒不寐滿山松竹夜如何陶宗儀有聴雪為孫以貞賦云瑶池阿母教飛瓊細搗氷花擁佩旌郭索行沙林竹偃吴蠶食葉紙窗明短編清夜誰家讀柔櫓寒溪逺處鳴閉户先生俄側耳松聲沸起煑茶鐺西湖竹枝青蓬紙葢小花橈外湖還向裏湖揺人心好似西湖水隔斷中間有六橋顧教授琛琛字淵白一作文琛字淵伯嘉興人恃才傲物元季入京獻燕都賦翰長元公復初不喜曰今大朝四海一統六合一家燕葢昔時戰國名何燕之稱慙恨而歸晚年始得領教岳陽髙照庵以詩送之云豪氣欲吞天下士冷官初到岳陽城時杜清碧本應召次錢塘諸儒者爭趨其門琛作詩嘲之有紫藤帽子髙麗靴處士門前當集賽之句聞者傳以為笑用紫色㯶藤縳帽而製靴作髙麗國様皆一時所尚集賽則内府執役者之譯語也一日訪僧勝福閒遊市井間見婦女皆濃粧問從行者知為僧之寵下此則道人所有遂戲題一絶於壁僧亟去之已盛傳矣其狂致如此遊昭亭我出苦無騎清晨僦輕輿探幽得微逕去郭十里餘層巒拱金碧云是神靈居羈禽呌秋樹旌雲散晴墟懐哉昔太守曾此持麾旟拂石訪遺跡黯然歩踟蹰非無歸隠心茲焉托吾廬壯圖一未遂安能罷馳驅題錢舜舉畫漁翁牽罾圖苕溪道人溪上居一生只慣觀打漁吴兒打魚當畊織意匠别出絲綸餘緯葭縛竹直水口承以宻罟防其逋卒然一掣勢莫禦紫鱗躍出金芙蕖蓬窗艸户色色具茶瓶酒椀尋常俱船頭青山立突兀船後綠樹揺扶踈人間名利不可汚烟水為蓆天為廬西塞山前晚風急醉踏船舷浪花入漁翁心事道人知日暮来看倚笻立囬頭却捉秋兎豪寫入生綃半猶溼令人展卷心茫然辛苦微官悔何及吴淞江上鱸魚肥秋風落葉滿漁磯何不買舟逕東歸何不買舟逕東歸建平道中遇雪北風如弦雪如箭来射長途旅人面黑雲匝道天為愁四望羣峰白於練蕭條聚落纔百家日暮青烟起山縣荒林叢葦人少行斷雁殘鴉有時見憶昨年少輕逺遊曾跨驊騮走畿甸只今潦倒困微官馬上徘徊發哀憤丈夫事業未易論但怪流光速飛電便須大飲敵清寒未用悲吟歎羇賤戲題紅紅白白好花枝盡被山僧折取歸祗有野薇顔色淺也来鈎惹道人衣俞平江俊俊字子俊號雲東庸之子弱冠從顧淵白遊頗得其習負氣凌鑠當巴延太師柄國日嘗賦清平樂長短句曰君恩如草秋至還枯槁落落殘星猶弄曉豪傑消磨盡了放開湖海襟懐休教鷗鷺驚猜我是江南倦客等閒容易安排手稿留葉起之處後與葉交惡竟訴于官必欲構成其罪得以賂免初仕麗水巡檢張氏據姑蘇改判平江娶額森布哈次兄超爾女徙居海上入明出處未詳嘆息百年同轉燭五十始知非老病侵腰膂浮名苦馵鞿閒門羅可設今雨客還稀空羡茅堂燕翩翩傍母飛楚州夜泊漏鼓聲頻欲四更野航燈火對愁明城頭楚語驚鄉夢船尾吴歌動客情漠漠水雲隨雁度瀟瀟風雨自鷄鳴離情逺道何嗟及未必江湖老此生次髙原朴見寄年少簮花壓帽簷飛觴走斚競春纎空餘老淚青衫濕遮莫新愁白髪添生計有涯蠶上箔公庭無事鳥窺簾昔人漫説揚州鶴好事從来豈得兼渡江臈月六日狼山北浪花如雪勢吞舟隔江隠隠聞吴語去國遑遑學楚囚白髪慈親初屬望青衫倦客不勝愁幸存杜曲桑麻地敢望班超萬里侯檇李詩繫卷四
