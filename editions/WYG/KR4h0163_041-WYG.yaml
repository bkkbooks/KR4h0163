body:
  text: 檇李詩繫卷四十一平湖沈季友編國朝吳偉業字駿公太倉人順治初官祭酒有梅邨集鴛湖曲鴛央湖畔草粘天二月春深好放船栁葉亂飄千尺雨桃花斜帶一溪烟烟雨迷離不知處舊堤却認門前樹樹上流鶯三兩聲十年此地扁舟住主人愛客錦筵開水閣風吹笑語來畫鼓隊催桃葉伎玉簫聲出柘枝臺輕靴窄袖嬌粧束脆管緐絃競追逐雲鬟子弟按霓裳雪靣㕘軍舞鸜鵒酒盡移船曲榭西滿湖燈火醉人歸朝來别奏新翻曲更出紅粧向栁堤歡樂朝朝兼暮暮七貴三公何足數十幅蒲帆幾尺風吹君直上長安路長安冨貴玉驄驕侍女薰香護早朝分付南湖舊花栁好畱烟月伴歸橈那知轉眼浮生夢蕭蕭日影悲風動中散彈琴竟未終山公啓事成何用東市朝衣一旦休北邙坏土亦難留白楊尚作他人樹紅粉知非舊日樓我来倚櫂向湖邊煙雨臺空倍惘然芳草乍疑歌扇綠落英錯認舞衣鮮人生苦樂皆陳迹年去年來堪痛惜聞笛休嗟石季倫銜杯且效陶彭澤君不見白浪掀天一葉危收竿還帕轉船遲世人無限風波苦輸與江湖釣叟知項黄中家觀萬嵗通天法帖王氏勲名自始興後人書法擅精能江東將相傳家在翰墨風流天下稱前有瑯琊後檇李項氏由来堪並美襄毅旂常戰伐髙墨林書畫聲名起當時海内號收藏秘閣圖書玉軸裝近代丹青稱董巨名家毫素重鍾王鍾王妙蹟流傳久貞觀在御窮捜購盡隨萬乘入昭陵人間一字無遺漏碑石猶存腕鋒出風摧雨剥苔文脱棗木鐫来波磔非牋麻搨就戈鋩失君家此書何處傳云是萬嵗通天年則天酷嗜二王法詔求手跡千金懸從官方慶拜表進臣祖羲獻與僧䖍生平行草數十紙龍蛇盤蹙開天顔賜官五階帛百匹仍勅能手雙鈎塡裝成用寳進御府不知何事流人間我思羲之負逺畧北伐遺書料强弱惜哉徒令書畫傳誓墓功名氣蕭索江東無事富山水興来灑筆臨池樂足知文采賴昇平父子優游擅家學只今海内無髙門稽山越水烽煙作春風挂席由拳城夜雨君齋話疇昨鳴呼我友雅州公舒毫落紙前人同一官烏橵沒坏土萬巻青箱付朔風少伯湖頭鼙鼓動尚書第内烟塵空可憐累代圖書盡斷楮殘編墨林印此巻仍逃刼火中老眼縱横看筆陣君真襄毅之子孫相逢意氣何相親即看書畫與金石訪求不屑辭家貧嗟乎世間竒物戀故主留取縹緗傲絶倫金明寺謁范少伯祠艤櫂滄江學釣魚五湖何必計然書山川禹穴思文種烽火蘇臺弔伍胥浪擲紅顔終是恨拜辭烏喙待何如却嗟愛子猶難免霸越平吳事總虚附考寺在郡城内西南相傳為范蠡宅有碑刻朱公里宋時有異僧夀萬王療史彌逺疾以建寺請内有湖天海月閣下祠范蠡鴛湖感舊予曾過吳来之竹亭湖墅出家樂張飲來之沒後重遊感賦此詩落日晴湖放楫迴故人曾此共登臺風流頓盡溪山改富貴何常簫管哀燕去妓堂荒蔓合雨侵鈴閣野棠開停橈却望煙深處記得當年載酒来壬辰上已蔣亭彦篆鴻陸我謀於鴛湖禊飲余後三日始至同集有道開師朱子蓉沈孟陽徵詩以補褉事予分得知字春風好景定昆池散誕天涯却誤期溱洧漫搴芳杜晩雒濵須泛羽觴遲右軍此㑹仍堪記白傅重游共阿誰故事褉堂看賜栁年来無復侍臣知過朱買臣墓翁子窮經自不貧㑹稽連守拜為真是非難免三長史富貴徒誇一婦人小吏張湯看倨傲故交莊助嘆沈淪行年五十功名晩何似空山長負薪題鶴洲别業堂成緑野邊養雛丹頂已千年仙人收箭雲歸浦道士開籠月滿天竹下縞衣三徑石雪中清唳五湖田裴公舊宅松隂在不數孤山夜放船張若羲字昊東華亭人丙午夏日題鶴洲草堂二首大地盡榛莽南湖有鶴洲鴛央兩岸沒烟雨一帆收翠篠含青靄髙柯隠素秋華髙何處唳撩起五更愁坐此堪累日何處更深山隔澗人相問輕舟鶴與還風翻花自穏魚戲水常閒安得忘機者相攜共閉闗徐士俊字野君杭州人烟雨樓雲葉四垂皆是雨浪花初起盡為烟城頭鼓響月欲出下有美人纔放船熊輿字柏舉商城人雨集鴛湖分韻乘風聊息五湖濵解帶論交醉後真斜日逺銜城堞暮江花低照野航新客中短劎誰為主雨罷青山故近人還把漁竿向何所此中鷗鷺繫相親姜埰字巨卿萊陽人官給事法名智潜號壹志鴛湖夜泛一笑攜長笛飄然上野航遊魚驚棹唱野鳥避燈光貰酒隨心泊披襟稱意凉莫嫌夜深後霧露滿衣裳李雯字舒章華亭人官中書鴛湖曲鴛湖碧水寒如玉畫閣明簾向城曲城頭萬堞波底明城下千門漾空綠花槳輕橈相鬭飛川光杳蕩揺霏微天雞雲中張錦翼芙蓉露下披紅衣此中雲物亦無數朱門築斷凌波路豈聞金管隨清風時見荒臺滿凉霧季冬霜野無飛葉蘆根雁翅相切切此鄉遊女不綄紗玉梭手凍冰絲絶明年二月桑如麻湖上女兒顔勝花十三擕出青絲籠影落湖中生彩霞孔尚萃字仁初句容人嘉興道中戒嚴鄰舟皆結伴野泊苕霅邨邨水流来有落花好峯行恐盡芳草思無涯棋局雲容變機絲雁陣斜鄰舟星月下野泊即為家陳台孫字階六山陽人有蜃舫集辛卯孟夏朔日同人社集鶴洲草堂分韻天涯踪跡半漁樵對酒當歌客思遥杜宇啼殘春去樹黄鸝唤過澗邊橋章臺栁在誰應折巫嶺雲横未可招賴有鵾絃生激楚魚龍夜沸海門潮王士禄字西樵新城人官吏部員外有司勲五種集禾中江城還檇李望古一踟蹰老寺裴休宅春沙范蠡湖逺烟明渚鳥斜日冷檣烏太息東流水年年浸緑蕪晩過東塔寺二十韻蘭若蕭梁古風流想六朝化城圍綠水孤塔上青霄珠閣浮林影金園絶市囂依幡看刹近縁響趁鐘遥樹偃時遮磵途紆屢過橋到門苔滑滑入寺竹翛翛古碣何年失塵襟此際消皴痕迴側柏暮色隠甘蕉長史遺墳在寺有未買臣墓諸天法界標跨波通石徑對砌敞松寮居士才還辯頭陀偈定超禪燈龍象黯佛日鼓魚銷洗鉢誠微尚長齋况久要刼波巾擬解屈眴服思邀便好從初地相依結一瓢滄洲仍有役白社欲無聊怖鴿棲將穏檣烏待尚迢前期須嵗月客意嚮風飇支許應非忝宗雷倘見招裵回未能去仙梵晩蕭蕭石門縣落日石門路語溪明夕波女牆纔數尺一半入藤蘿陸圻字麗京錢塘貢生有從同集風雨過烏戍昨宵泊鶯脰今此近南潯四野寒烟重三江新漲深景陽曾苦雨子建亦愁霖何况停橈客鄉思淚不禁送魏子存之任成都誰説蠶叢不易行春風三月馬蹄輕銅梁舊枕秦山險玉壘新連楚塞平芳草緑齊過溪口杜鵑紅盡到綿城知君箧底多詞賦諭蜀文應似長卿查容字韜荒海寧人由西塘抵楓涇二首蘆荻風多颭雨涼漁邨厯厯似瀟湘波濤十里横塘路鴉背西来帶夕陽凌風一葉趂鳬鷗小婢依然為斷流消盡客懐何處好水葓花外酒家樓春波感舊三首已收簾幙換承塵一色牕櫳認却真為有對門垂栁樹緑隂曾罩艤船人水盼蘭情不記年来應如夢去如煙青樓事往紅顔盡老傍江湖越可憐半簾小桁壓窗紗屋角棠梨影被遮最是一梢春未透午隂輕罩半開花吳綺字園次揚州人官湖州知府有林蕙堂及亭臯集嘉禾淼淼寒波動畫船南湖春雨細如煙不知脩竹彈何事冷落鴛鴦一萬年戲詠醉李歌舞無端失舊恩蘇臺響屧總銷魂多情只有王戎李猶帶東牕指甲痕沈謙字去矜錢塘人哭黄平之平湖城上弄珠樓浩浩煙波日夜愁一自亂離成死別不堪風月憶同遊孤城何處煙雲斷逺浦依然白雁秋他日挂帆過甪里祗應揮涕弔荒邱寓崇徳縣西寺作秋水開祥河花城初脱駕神幢擁多寳靈輝相激射羅衛龍宫前香藍石壁下金輪轉重漢鯨音吼清夜展拜珠火眉雨花向身瀉或見紺鳥来如聞龍象咤斑斕摩古鼎丹青入烟麝競説無著師譚空如啖蔗至今千餘年女陽有精舍我思此溪水東流無春夏句踐昔憂辱語兒構亭榭采香竟淪替卧薪苦譎詐世系有興亡山川互雄霸至今誰在哉强弱逓煙化何如皈我師塵鞅隨手缷天親非呉越欣戚皆遣謝魏壁字楚白慈溪人有息賢堂前後集梅里宿屠爌宅汝髮黒如漆吾頭白可憐悤悤逢上已衮衮話當年月落吳闗樹春深檇李田明朝須解纜不放老夫眠陶汝鼐字燮友長沙人孝㢘有榮木堂集沈明府來視病邀飲烟雨樓豈肯悽然對古人病餘開酌為殘春樓從烟雨閣中見水是鴛鴦夢裏因强醉自逢花事盡苦吟長與藥爐親使君更話瀟湘舊不獨思家易損神方殿元字豫章番禺人官剡城知縣南湖竹枝佳人結伴似花叢澄湖南畔采芙蓉乍觸郎舟莫相怪木蘭橈小柰東風葉紹衡呉江人輓錢烈婦滿眼湖光一鏡收貞魂從此赴瀛洲惟憑彤管垂青史始信黄泉勝白頭沈荃字繹堂華亭人有充齋集南帆咏壬子長至日過嘉禾適古燈和尚駐錫龍淵以詩見示依韻酬之葭管陽回客裏過幽懐常自遶烟蘿擬從初地窺金相未許雙林繫玉珂塔影曉浮寒樹迥鐘聲晩逐野雲多與君漫話無生諦十載風塵悵逝波萬斯備字允誠靳縣人寄巢端明山居戎馬徧南國荆扉獨隠淪琴書娛白􅄠板蕩失青春世事袁閎老生涯阮籍貧向来髙蹈志寂絶更難論宋存標字子建松江人有翠娛閣集登烟雨樓去去尋幽勝溪花映晩汀飛雲随意逺宿鳥帶煙青水響千魚出湖寛兩岸平懐人秋思老斜月碧泠泠孫自式字衣月武進人有四詩集夏日遊嘉禾褚孝廉園峯在閣髙閣白雲裏相招共怡悦開襟受涼風不覺生冰雪孤塔當窗牖平疇接林樾時時見山僧來往踏松月竹宻嘗晝隂花繁自夜發主人意無窮清歌時散􅄠張琴字桐仙㤗州人夜至東塔寺水濶分山寺臨窗遶碧溪夜深孤艇入雪滿一橋迷鐘響驚僧卧人来伴鳥棲開門尋舊榻煨火向招提沈道映字彦澈松江人登武水城橋望胥塘閒攜雙屐向河橋綠埜青塍入望遥幾處鶯花迷古堞一川煙雨送輕橈英雄去後名還在芳草春来恨未銷無限吳宫零落盡空城猶上伍胥潮何五雲字蜀隠合肥人送友人之官嘉禾水漲官河進畫舟望中烟雨一帆收地連震澤蓴鱸美宦入分湖稻蟹秋應載琴尊探越絶肯因絲繭輟吳鷗十年縞紵虚相憶因爾將成櫂雪遊余懐字澹心江寧人有研山草堂詩稿再集鶴洲旅泊全無事招遥及晩風漁歌城郭外犬吠芰荷中萬竹寒尤綠一楓秋始紅到門聞剥啄相對幾衰翁叢菊花開候孤桐葉落時短牆圍夕照小閣浸秋池地僻聞敲磬人閒看奕棋洲邊聊曳杖更與過東籬趙進美字韞退益都人嘉禾獨飲偶作胥山遥散片霞明舟近啼烏檇李城病欲養生非慢世貧能嗜酒即逃名著書落魄游宜逺掃地髙眠意自平月下揚舲仍擊楫鴛鴦湖水向人清趙端字又吕錢塘人雨樓有感縹緲飛樓帶夕陽南湖秋色正蒼茫煙開蘭槳鴛鴦冷風度蓮舟菡萏香城堞無端悲逺客山川信美是他鄉忘機却羨河間鳥日傍寒漪狎野航徐喈鳳字竹溪宜興人雨中遊沈山觀九松和蔣亭彦韻好遊不避雨戴笠理輕楫江漲盪胸寛村樹含煙宻循岸入麟溪擕手登仙室修廊鶴步閒孤嶼水鳴急風籟洞中聞瑶草階前拾坐數北山松九株雲外植總之寒不凋名狀何須一吾儕學餐霞盍亦采其實丹邱可追尋不負西園集顧贄字蒨來吳縣人石門鎮昔年吳越地此處設王官戰氣千年盡悲風日夜寒采桑成白紵繅水出冰紈筐篚天家貢行人莫浪看張養重字虞山山隂人語兒閒步語兒溪可住攜手岸前行處處門臨水家家樹壓城過橋花犬吠倚閣暮鴉聲滿眼皆叢桂香風一路生錢霍字去病上虞人同朱敬身舟過檇李道中舸船信宿嚮晨開為客欣同作賦才別浦聽歌風轉送薄雲出日雨飛來青青野麥侵書恍拂拂荷香上酒杯擬到姑蘇邀月色相擕取醉虎邱迴葉紹袁字仲韶吳江人官禮部輓錢烈婦蒹葭初長緑萍灣梁孟雙飛獨自還郎夢不離三月水思夫空望五湖山薜寀字諧孟無錫人官太守輓錢烈婦列陣貔貅壯金笳早渡闗黄雲呑白晝碧水塟紅顔杜若遺香珮江蘺想翠鬟傷神荀奉倩時見淚痕斑汪琬字苕文蘇州人官編修寄題鮑聲来草庭鮑生嗜讀書書室開南榮梧石羅四周清隂覆門衡如何了不顧而以草名庭艸類區以別剖晰不厭精蒺藜善蔓延蓬藿易縱横葶藶苦如蘖菥蓂甘似餳茈䓞差可染莬葵略堪烹芄蘭本非蘭壄苹本非萍凡此皆惡種詳在爾雅經生也愛芳草辨之已分明種植與溉壅往往手親營露濃翠甲滋日㬉珍芽萌晨夕觀萬變采香擥其英陶令藝籬菊湘纍珮畦蘅二子不偶俗晩節尤惸惸生也生東南才穎超楚傖行脱薜荔衣飜然出柴荆空留庭前芳揺蕩春風輕董含字榕葊松江人有藝葵草堂藁行世遊當湖塔院眺乍浦諸山登臨還極目浩蕩踏金鼇近海濤聲壯連山霧氣髙岸腥魚集網霜冷雁投壕野渡歸来晩秋風繞桔橰弔朱買臣墓行年五十尚飄蓬乍綰金章意氣雄半世功名甌越外六時鐘磬墓門東檐花落處竄飢䑕松露滴時吟野蛩富貴浮雲何足羨手摩殘碣問西風登烟雨樓片帆落日下鴛湖烟雨依然似畫圖殿廢只餘新覆瓦樓傾空對舊啼烏屧穿翠幔無僧問酒颺青帘待客沽作吏㡬人能好事一川風景至今孤泊西林禪子道場艤棹重經落照灣古松殘碣一追攀殿門雨過金書濕石徑雲荒碧蘚斑沙擁墓潮垂釣坐江飜寒月覆舟還摩挲遺像空歸去那得機縁似夾山楓溪曉發柵外漁燈明滅林間煙靄霏微自起呼童貰酒紫螯黄雀初肥鴛湖夜泊西湖纔別又南湖倚柁秋風興不孤葭菼漸稀霜信早夕陽紅樹散啼烏舟經武塘蔣亭彦杜于皇枉過予以行促悵然而別相看顔鬢各蹉跎欲話心期柰別何準擬論文重放艇白牛塘下水微波陳維崧字其年宜興人官檢討有授簡湖海詩稿海鹽女海鹽徐氏女許嫁印家郎阿翁晝下帷誰何發屋决扊扅提刀躍入白差差公然竈下横其尸兒傍驚怖發狂癡喎唆瘲瘈牛羊􅀈媪令閭嫗來致辭已無婚理休然疑女今决絶勿復遲他家新婦須好為阿女仰天言一一淚作珠子垂女是徐氏女當年許嫁印家兒印家門户碎亟須健婦相為持登車不返顧入户搰搰操帚箕翁家楄柎何纍纍叠若醬瓿鹽醪瓻一兒卧蓐如死灰舊鬼乞食新鬼飢妾身只十指手築馬鬛為封之上堂奠􅊡病夫還復待哺糜茹荼雖苦甘如飴鄰娃近莫代妾悲但知同牢誼遑惜幄房私妾年已過而立嵗至今自為畫蛾眉舟次石門小邑一江明江頭鸛自鳴那堪今夜雨獨宿語兒城作客年空老依人氣未平此鄉烽火後户户𢷬衣聲林鼎復字天友侯官人泛舟陡門訪髙元表晩歸有述歸舟泊寺門風寒聲窣窣泬寥稱孤客疎鐘偶然發晩色滅殘霞隙光生早月去家千餘里顧影何滯越一刺久在懐漫滅于誰謁紛余抱素心不顧憐傲骨煨芋共老僧地爐燒榾柮夜氣涼露侵梵唄初未歇徂秋復涉冬風景倐飇忽東山百世師胸次涵溟渤一往有深情但愁別倉卒姜圖南字真源錢塘人晩過語溪歸棹已如此微微向暮情豈知秋月滿更覺野烟生帆落斜依渚人歸半入城紅霞飛不盡一片樹中明徐崧字松之吳江人過金粟寺值日暮宿舟中金粟兹重過東風日已西扁舟紅樹雨古寺緑蘋溪暮靄氷寒磬晨星落照泥殘僧同水宿不寐候鳴雞趙炎字雙白福清人寄酬武塘錢仲芳韻數畝傍西郭深雲䕶小廬桑麻魚魏晉烟火半樵漁頭白仍躭酒江寒獨擁書向来叩皇甫親見帶經鋤大滌惟君在悲歌不自休中原哀二表九辨動千秋魚鳥存遐思江山寄小樓懸知開徑日許我作羊求才名兄弟蚤大厯席平分想像来三島尋常視五雲山燈蟲裏坐人語葉邊聞回首蒹葭路如何不憶君梁佩蘭字芝五號藥亭南海人官庶吉士有六瑩堂集送沈客子還平湖客中見花發歸思向花濃燕地滿碧草馬頭生亂峯行看南湖月坐聽平湖鐘湖上鴛鴦鳥雙雙栖影重寄沈方舟鴛湖別業南湖三十畝君在鏡中居蔆葉煙浮水梅花月照廬人閒湘簟冷風逺玉蕭疎何地無佳興髙吟出夜魚送徐序仔歸嘉禾為客真無補還家慰倚閭二年湖上雁幾紙嶺南書山驛紅柑樹江城白小魚髙堂有慈母猶得進盤蔬送朱竹垞太史還禾中錦袍爭似紫荷巾異代風流賀季真若道文章留館閣一竿秋水又何人陳三島字鶴客長洲人有雪圃遺藁贈魏允柟子春刺船去伯牙鼓素琴羣鳥相鳴號海水為隂沉寥寥千載下四望無知音朝歌猗蘭操暮歌梁甫吟抱膝一室内俯仰増悲心孟秋涼風至颯然吹衣襟李因篤字天生富平人官檢討陳平湖之官附懐曹秋岳先生宛馬春嘶浴秦淮路入呉風塵雙屐賤雨雪片帆孤把楫瞻青嶂褰衣滯綠蕪䢴溝送湖尹為寄采苓圖塞表香蘭接闗隂玉珮遲夙愁凝薄暮遺恨失臨岐二月歸鴻少三江落日遲相思消鬢􅄠俯仰寸心知日對東流水曾無西上魚自惟成邂逅何敢任蕭疎細栁延彭澤浮雲走孟諸隔江春御短前渡一躊躇楊雍建字自西海寧人官兵部侍郎南湖有感佳人何縹緲緑水夜光浮寂寞梨園曲蕭疎竹徑秋滌愁還問酒乗興即登舟鄉夢蘋花冷浮生愧浪游周茂源字宿來華亭人崇徳與顧震雉別雙帆落處日初斜把袂吳闗感嵗華積雨不分長水路輕寒猶壓語亭花金尊白酒離情切畫舫春燈客夢賖明發便同南去雁那堪子夜動悲笳曾燦字青藜寧都人崇徳縣有萬鴉巢城東古寺感賦鬱鬱城東樹日暮萬鴉集結巢不能穏飛出復飛入樹髙與寺齊攀折手能及鳥性愛清曠此獨巢城邑山路雲木深湖田夏水急乃知稻梁謀使人無獨立汪懋麟字蛟門江都人官主事有百尺梧桐集送陸義山編修乞假歸當湖與君握別當春風可惜東華試燈夜對酒惆悵秋碧空落日無多在簾下山川圖畫正滿眼中有扁舟去如瀉清波灔灔疑當湖烟樹揺空布帆亞君行儼入圖畫中活水輕風不須借寄語承明一輩賢但説榮名舉手謝坐擁小妾看添丁瀟湘琴書倚田舍山中意趣人少知此味依稀如食蔗抛却官書真自閒任取狂吟豈堪怕送君令我生愧心杜宇春深向人罵楊無咎字震伯吳縣人栁州曹掌公暨弟達夫過訪追憶舊遊有懐鶴客不勝黄壚之感因賦一律寂寂空庭遍草萊蓽門重為故人開水沈雙劎三年別雨送孤帆四月來鄴下風流應未逺曹家兄弟最多才獨憐草檄人長逝相對能無使爾哀殷麗字嘉生吳縣人嘉禾道中栁色旗亭半郭邨昔年遊處景猶存船過三塔驚龍窟漁集雙橋見石門乍得市酣銷白日却看戍火又黄昏南行不厭宵征苦十載滄洲繫夢魂徐緘字伯調山隂人南湖昨夜南湖雨㸃齊蓼花灘沒板橋低美人曉起褰珠箔無限白雲飛出溪黄雲字仙裳泰州人鴛湖棹舟過吳佩逺東溪邨舍隠隠茅茨雞亂嗁問程多指隔前溪夫人廟角殘陽滿櫂入桃花路轉迷吳耕字硯田休寧人秦塘晩照昔王遊幸處道路尚留名落日孤城冷晴湖一帶明英雄常代謝雲樹獨凄清隔岸聞漁唱行人無限情杜濬字于皇號茶邨黄岡人有變雅堂集倦圃詩為秋岳賦谿山真意閣前啟對滄浪帖石雲生罅牽蘿翠繞廊蕉深垂露重松老落花香意頗思鄰近邨西問草堂此地推林壑朱家放鶴洲繡衣心更逺倦圃地偏幽萬竹干霄去雙橋信水流遶園無限好收拾在扁舟宇宙行金令江山草木稀如何東嶺樹直可數人圍隂宻長含潤風生歘動衣鶯聲幸親切不到上頭飛沈珩字昭子海寧人官翰林院編修有耿巖文集癸亥秋日同人讌集真如塔院懐曹秋岳先生兩國人文㑹岷峨本競髙于今江布席孰與謝公豪霜染秣陵樹波傳胥嶺濤盤空同極目延望主風騷趙吉士字天羽漸岸人官給事有萬青閣詩寄懐孫古喤傳臚殷勤素謁忍重論舊侣南翔只半存胸次何曾忘醉李眼中久不見髯孫松扉返照依苔井羅幄垂隂覆石樽懐汝杉青無處問離離草蔓古禾墩周斯盛字證山寧波人官知縣謝廣文維賢招同陸秀才聚緱泛舟東湖時清明前一日僧舍經旬祗病眠不知春事滿湖邊相擕步出城東去楊栁桃花氣欲烟令節正逢一百五輕舟閒泛兩三人弄珠樓下波如酒醖碧揺紅㵝㵝新處處招提有茂林鳥啼花落得安心分明翠竹青青意誰向鋤雲去後尋普濟庵為鋤雲上人自焚處呉雯字天章太原人有蓮洋詩贈匡山老人郭襄圖匡山老人齊得喪鬢􅄠蕭騷骨骯髒讀書萬巻眼不昏飲酒一斗神猶王五經腹笥何便便蹉跎一官失少年寄相豈肯借車馬司業何曾與酒錢朅来燕市屠沽飲醉聽琵琶夜忘寢節鼓常敦翡翠盤翻杯輒涴葡萄錦千鍾百榼氣轉豪客帳猶懸舊寳刀起舞身揺謝蝴蝶和歌聲亂鄭櫻桃忽對長空見歸鳥自傷為客何時了金馬門前再住難春明待走邯鄲道題沈客子林屋山居圖紫茜當年有舊廬如何又買洞庭居間名世上喧騰甚待學琴髙控鯉魚具區三萬六千頃隔斷人間事似麻石室金庭休更覔此中大好讀南華黑牛畊熟崦中田橘税茶租取自然清酒百壺書萬巻不須更費沈郎錢送李分虎牽牛花開秋氣清千山萬山君獨行到家甚覺還家樂書巻傍邊絡緯聲李漾字瑶氿號西陂南通州人有南山陲詩集九日嘉禾道中越水吳船去不窮鴛鴦湖畔望空濛天雲漸釀重陽雨客况行愁九月風櫓背菊殘縁兩岸渡頭桑矮列千叢明朝櫂入南屏路似拭秋山翠靄中張守字曽符松江人鹽城訓導有菉園詩藁懐舊詩為禾中嚴扆臣先生作籍甚嚴夫子平生未可忘五車娱嵗月一第老行藏和寡空歌雪知微為履霜寸心千古在欲訴不成章草閣聫吟夜孤城對雨時話兼千載事心獨兩人知北海樽猶在南洲榻未移燈前形影斷但有夢来時黄與堅字庭表太倉人有忍庵集語水道中垂垂雲影黑吹雨入篷窗樹迥爭遮越山俄欲渡江一灣打魚舍數㸃採菱艭更作迴頭望汀飛白鷺雙錢光繡字聖月鄞縣人有歸来閣集范蠡湖西施辭越幾千載此地猶傳范蠡湖梳粧臺下菱米熟暖風吹香香有無幽魂髣髴不可見兩岸桔橰聲厯亂須㬰愁月效眉顰還似入宫初掩面丈夫寧滌臨卭器忍以朱顔博富貴伯圖亦似有良謨何必女戎滋訕詈嗟嗟少伯如可起應悔當年失策矣冶思間情一望深倚棹徘徊夜如水楊樹聲字無聲漳鄉人褚硯耘招飲園亭寂寞揚雲宅蕭疎仲蔚樓雲封石砌暖月出板橋低弱栁迎樽斚名花引杖藜那知千古意珍重付黄鸝董俞字蒼水號樗亭華亭孝㢘有浮湘度嶺集和東湖步月韻送沈南疑歸當湖欲別沈郎哦妙句酒闌挑罷竹窓燈蘸波弱栁拖千縷窺户新蟾透半稜鼓角荒城催暝客魚蝦小市上春罾撚鬚擬和驚人語故步慙余失夀陵叠韻送徐啟逺分明寒食逺邨圖燭影江燈帶夜烏白首交遊惟孺子青山著述有潜夫春風小圃殘梅落暮露閒亭碧蘚鋪即此東湖招飲地野人跂望抵蓬壺叠韻送借山上人採得蒓絲不暫停闔閭城畔漾歸舲座中怪我頭先白花底逢師眼倍青久住雲山偏識路偕遊麋鹿欲忘形何當訪爾禪栖處樹古巖幽一巻經朱克生字周楨寳應人有環溪詩集同計甫草泛東溪訪朱子蓉不遇迴廊髙閣幾追攀鼓枻仍尋舊路還翠竹兩崖不不見塔鈴聲在水雲灣王爾梅字子和海豐人有南遊革晩泊嘉興日斜抵檇李蕭寺起鐘聲燈火移舟見星辰穿樹行近城喧爆竹到岸罷棋枰應對鴛湖月飄零酒一觥程瑞禴字孚夏休寧人有羅浮近草泊王江涇舟横野浦卧沙明五月涼生景倍清燈火照波螢亂㸃鳬鷖隔岸夜無聲千林桑葉留人採萬頃湖田待雨耕記取東風還有意酒旗吹向闔閭城附考在秀水縣治北三十里按宋祝牧方輿勝覽王江涇在漕河東因巨姓黄氏江氏居此亦作黄江涇元岑士貴税署亭記云聞川市又名王江涇舊在官塘東宋徙置塘西錢澄字飲光桐城人新秋登慈雲寺千佛閣武塘彌望盡平疇髙閣憑欄指顧收殘暑已應辭薄暮驚飇陡覺入新秋千家樹簇孤城静百道溪穿滿邑流最是下方憂旱切雨壇鈴葢晩來愁姜遴字萬青華亭人官庶吉士讀柯南陔幔亭集曽讀屯田一卷詞曉風殘月起相思今朝重把南陔集欲倩春鶯譜竹枝不信蛾眉怨獨多新詩哀艷意如何看來李嶠真才子愛咏人間水調歌釋𢎞儲字繼起通州人辛丑赴金粟宿鶴洲竹光水影蕩廻廊叠碧飛青鶴路長身入米家圖畫裏野航清曉坐瀟湘釋曉青字碓菴吳江人壬寅題鶴洲草堂草堂之名雙耳熱大小園林推冠絶憶昔追從杖履遊佳處知難盡曲折十日一山五日水移得畫圖來屋裏縐碧凝寒枉鬭奇筆蹤遺落天然美老樹卧波龍躍潭痩藤結束如花龕我欲借君方丈地晨昬叩擊資冥探瓶鵞一呼應聲出縱去仙禽休再詰千古風流若眼前裴公作事多真率感君不在一飯恩形骸何物肝膽存青鞋布襪自兹始願無謝客書其門釋南潜字月函長洲人原名董説夢至梅里時聞老母過梅里董庵晨起意不懌夢斷吳天空極目西南角越山青幾重夏雲無意緒堆作千萬峰遊子亂方寸躑躅將何從小立青松根新夢聊自理恍愡梅里行孤邨影寒水離親雪晴中鶯聲今復爾母子話溪堂斜陽射衣紫釋觀衡字顓愚覇州人有紫竹林集訪朱涇船子道場考見方外含虚魚口大鈎餌若何施斫盡南山竹空垂東海絲癡心惟自適明眼更誰知獨有朱涇月清輝似舊時釋行明字養拙蒲東人題宻印寺大潙青不了一寺此中開鳥向坐時語雲從吟處來衆僧禅已定新賦苦難裁閣筆一長嘯悠然更上臺釋元志字寓谷餘干人有蘭偶堂集東湖坐雨月影不離水竹聲時到堂檢書忘旦暮與硯共行藏十里湖光曉千函貝葉香何緣時到此秋雨閉山房宿化城菴負郭精藍此最幽長堤風細栁絲柔齋鐘逺入春湖雨梵唄驚回古渡鷗自有神魚霑世澤陸大司冦有放生湖絶無漁網下清流南薫似愛疎狂客吹散匡牀萬種愁附考菴在當湖東岸舊爲邑令化城羅公生祠遂以名庵釋宗渭字筠士號紺池太倉人有芋香詩鈔烟雨樓夜泊落帆亭畔草芊芊放鶴洲邊好泊船片席凉分三靣水半湖暝接萬家烟烏啼霽月高秋晩角吹清霜旅夢懸雖有勝情無勝具憑欄凝眺重凄然朱中楣字逺山南昌人李少司馬元鼎妻寄輓嘉禾三烈為張蘧林少司馬作考見閨秀三十三卷我聞虎丘㴠劔光遊人千古弔貞孃又聞錢塘蘇小小客過唏嘘憐春草如兹二婦何足奇不朽曽不讓鬚眉何况雲黯燕臺月折玉埋香悼三烈三生石上舊因緣矢志長齋繡佛前千廻萬刼祗一死共視㣲軀薄如紙爲子死孝臣死忠三心皎皎將毋同絶命詞成不返顧倐然遂隔泉壤路廣栁蕭蕭易水寒胥濤日夜撼江干楚有蘭兮湘有竹疑化鴛湖滿溪綠而今行道指豐碑風雨酸辛猿鳥悲試看遼東歸來鶴惜哉九原不可作王芳與字芳從餘杭人侍郎嚴沆室憶子餐留鴛湖栁瘦輕烟際迎風引緒長有愁難寄酒無涙不沾裳芳草遲歸棹遥山待好粧問君湖畔宿幾見好鴛央朱柔則字道珠錢塘人沈方舟室遊鴛鴦湖沿流一櫂晩風涼蓮子花多水亦香莫怪成雙還打散由來命薄是鴛鴦登烟雨樓南湖千尺起高樓女伴相扶到上頭一片離愁似烟雨西風吹滿白蘋洲妓文娥松江人賦荅沈上舍南疑幾縷爐烟蕩晩風歛衣閒立小庭東生憎蝴蜨偏多事拂落山櫻滿地紅綠窗無事懶搊筝小捲蝦簾坐聽鶯客到不勞鸚鵡報隔溪吹到踏歌聲檇李詩繫卷四十一
