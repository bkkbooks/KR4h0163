body:
  text: 檇李詩繫巻十六平湖沈季友編明袁主事黄黄初名表字坤儀號了凡仁之子弱冠有文名萬厯丙戌進士授寳坻知縣陞兵部主事時東封事起詔從石大司馬賛畫遼陽平生著述甚多凡經史外厯數河渠隂陽姑布之術莫不洞悉勒有成書至所作詩文不自珍惜㪚逸過半僅得两行齋集數巻而已爛溪夜泊載酒㩦琴訪翠㣲前邨燈火對漁磯孤舟自傍蘆花宿老鶴應疑道士歸明月滿前春樹冷好山猶在主人非百年心事同流水半夜聞雞淚滿衣附考溪在桐鄉縣東爛溪自青鎮達吴江西爛溪自鎮達南潯爛一作瀾潯江夜泊潯陽江上鷓鴣嗁茅屋青燈隔水西獨坐孤篷傷徃事寒鴉飛盡楚天低林居簾捲東風日未斜松蹊竹徑野人家空庭寂寞無人到閒㸔黄鸝啄杏花黄廵撫承𤣥承𤣥字履常號與參洪憲子萬厯丙戌進士以水部郎治河張秋濬伽之議實經始焉陞湖西臬長修梅林玉峽諸道均永新屯田之糈飭萬安營軍之規晉中州右轄裁監兊左轄闗中减嵗額後以副都撫閩歸卒有盟鷗堂集送人南歸落日驪歌酒一觴大河明月引歸航離情恰似東流水一路隨君到故鄉王參議建中建中字維新平湖人萬厯丙戌進士累官參議家居後日夜誦覽两目皆赤古稱老而好學斯無愧焉聞其詩稿成册為人所竊僅從選本中録一絶惜未窺其全也宫詞繡得鴛鴦不上衣嬾臨青鏡畫雙眉閒來女伴低聲喚同徃南宫㸔奕棋陶同知涵中涵中字雪凡秀水人萬厯戊子舉人官建昌同知有清酣草福清殿下召飲泛月筵開玳瑁水盈盈金井生秋裛杜蘅曲徑客留千日酒髙臺月滿五侯鯖蒼茫斷壁平蕪逺爛漫虚檐玉露清誰道蓬萊非咫尺詩成染翰已參横沈邳州𢎞遇𢎞遇字際可萬厯戊子舉人歴官邳州守乞歸荅友人自惜浪遊渾是夢而今嘉遁始全真嬾隨圭組趨金闕欲伴綸竿釣水濵高枕清宵恬寤寐檢書白日静心神一觴一詠從吾好不問﨑嶇世路人項舉人良枋良枋字星華秀水人萬厯戊子舉人秋日謁陸宣公祠孤城落木冷蕭蕭丞相祠堂漫寂寥内禁萬言青簡在荒州千里赤心遥秋風斷雁迷湖渚夜月嗁烏上麗譙祇有忠魂應未㪚傷心欲賦楚辭招戈郎中用泰用泰字耒陽號晴寰思齊子萬厯已丑進士官郎中有適適軒集宿烟雨樓平波千頃座中開盡日笙歌載酒來如此溪山為誰主年年烟雨自樓臺顧廵按際明際明字彚甫嘉善人萬厯已丑進士官廣西廵按劉公䑓和章邑侯韻考見題韻臺榭崔嵬入望雄憑陵應識使君功城連畫閣揺丹壁㟁繞層岡鎖玉虹芳草長烟呉地接蒹葭亂水越溪通晴郊擁碧畦如砥倒影浮光蜃作宫燈火千家喧夜月漁歌㡬處㺯春風扁舟客到青尊合彩筆詩成白雪同此日亭臯開水北從來丘壑擅江東汀痕緑盡年年栁盡在絲絲化雨中岳廵撫和聲和聲字爾律號石梁一號梁父元聲弟萬厯壬辰進士授汝陽知縣厯禮部員外出守慶逺訪趙清獻公講學故址建書院累陞僉都廵撫順天天啟間起補延綏乞歸有餐微子集驂鸞録其詩庀材博取際近抽揚摹畫觸目驚心體無不備但性不好招朋從為壇坫故海内知者鮮耳登烟雨樓遥靄逓㣲波風輕動晩檝同人美臨髙危樓睇廣隰春畦盈初苞宿莽抽㣲茁層林緬重隂洲渚互疎宻延景叶幽襟良時無朝夕何當結茨宇遂初烟雨色薊門行送項庭堅兵備薊州薊門九月狂飛雪朔風凛厲聲嗚咽居庸萬樹寒生花黄厓之谷水凍裂南來太行蛟龍蟠北迤祁連虎狼穴将軍淚墮青海笳戰士心寒黒山血即今赤白羽紛屯東走力兎西火真朶顔蠕望朝河口倭奴突兀駭波臣閉口莫説遼陽事嘈嘈更自憂天津乃知時局多轗軻防邊不獨兼防倭熊羆咆哮方出柙在囿虎兕何其多高牙大纛乗軒鶴金章玉鉉風隨波君去持斧𤣥州道請纓挾纊君才好丈夫赤手便封侯何况節鉞在肘抱左盼澄海石寢烽露布勒銘倚馬草君不見襄毅公勲名噪里耳黄口小兒至今道固是君家王伯考舞蛟石歌有引石在范長康清宛堂南髙三十尺許廣六有咫色黝深宛轉竅泐側眡之蒼罅洞裂若離而合者三有蘿冠其顛盤旋而下時從罅若竅中挺出怒目深爪若饑蛟壑舞相傳有牝牡字之者趙松雪也讀長康氏傳石舞蛟事甚奇最惋惜者一厄於鎮璫脇徙署中以見知故而沈將軍殺去半褏血流三日夜再厄於項孝㢘家夜半作老人舞驚視鬼恠以不見知故殺去趺蓮殆盡乃黄宫詹以未遇時僑處見夢則私恠石丈業含風飲瀣何復與人間事爾予暇日一拜其下因勞石丈曰今日之與長康則可謂風雲之際哉因醉而謌之赤水枯飛蒼烟坼寒濤逈絶隂厓劈蜿蜒盤旋抝餘怒悵望青冥怨蘿壁逺勢欲擊三千里掉尾含風海水滴云是饑蛟失其雌孤雄求牝張兩掖誰令豫且一困之半袖掩抑當幽墀夷股横失將軍斧見夢猶傳宫諭詞以後往往光恠起婆娑野老夜徙倚欄檻蓮生面面鬼傖夫狂走識者喜天教呵䕶属范郎衣冠一拜從兹始清宛堂前宛有情嚴霜痩削孤烟稜藤隂裊裊姿縈碧輕裾長袖廻春晴有時風雨砉然作恍惚玃捫來飛鳴夜半愁坐莽深慮蘚剥終恐成鱗去三千六百自有期不與螣蛇借遊霧應知旦夕驚雷霆雌雄雙合凌蒼青馬溪返棹同之初兄分韻風逗廻舟晩溪寒落照深斷橋通逺墅隔火見疎林魚滿鸕鷀意霜吹鶗鴂音不須愁寂歴無泊也棲心王都諌希泉以極諌逮杖却贈雨雪凝寒閣漏稀驚傳駕帖捧朱衣小臣自許􅍆生死大杖君㤙敢是非九廟山河懸涕淚一時臺諌有光輝喧闐㑹見長安道爭看王公貌痩肥宜春縣中頓宣風館次王伯安先生赴謫龍塲題壁韻殷雷初霽夕陽痕橋外沙溪似酒渾鳥偶歌時來别館花逢開處得孤邨龍塲萬叠征雲苦荔水千程瘴霧昏見説汨羅行咫尺擬将詞賦弔湘魂臨淮道中憶舊十日春來故朔風黄埃眯目逗飛蓬王荘二十年前路記得題詩夜雨中陳少詹懿典懿典字孟常號如岡秀水人萬厯已卯觧元壬辰進士授庻吉士陞編修時傳三王並封典抗疏指斥宫闈歸咎宰輔得中止旋告歸葉向髙薦之起學士辭不赴天啟初輯洪武及肅顯兩朝有關修齊之要者為聖政聖學四巻上之中言宧官不得干政以寓規焉崇禎中晉少詹益堅初志里居三十餘年卒為文典贍詩亦華重有吏隠齋集秋際紅門望九陵形勝敬賦長句髙天蒼蒼雲皓皓紅門悵望橋山道萬樹琳琅松檜隂迢遥輦路生秋草古今勝槩擅諸陵十二重闗虎豹騰紫塞清霜流玉几𤣥宫白日閟金鐙肇自文皇開建日蓍龜定兆探龍窟王氣千年藉地靈代瞻睿嗣英儲出絳節朱旛百辟趨攀髯却憶仰號烏羣峰列衛森如㦸虎拜時聞嵩下呼芒碭鍾離安足羡昌營設險横燕甸萬里投戈控壮圖六龍縹緲乘飛電漢家國脉固金湯一片西山表北邙八駿何勞輝神武瑶京自是白雲鄉送錢湛如孝亷擕燕姬南還岐路秋風思黯然驪歌唱徹孝亷船抱将楚璞何須泣買得燕姬絶可憐月夜鴛鴦䨇綰帶春風山水一調絃壮心暫托當壚見許待相如駟馬年范主事應賔應賔字光甫號果菴言之孫萬厯壬辰進士官工部主事邵養誠走四千里弔包學憲瑞溪予髙其誼以詩贈之一夕秋風薤露新孟嘗門下更誰親􅆐聲送客暮㠶急雁影背人鄉夢頻然諾肻教侵宿草死生應自解窮薪越南燕北迢迢路白馬馳臨慰故人徐侍郎必達必達字徳夫號𤣥丈嘉興人萬厯壬辰進士初令太湖溧水以亷能稱陞考功掌計典一秉至公累擢太僕卿兼光禄其條陳白糧賠累守侯之苦力阻廵漕僱船渡淮之議皆江南所永賴改府尹晉僉都提督操江值奢賊陸梁於重慶連妖變起於山東宻邇留都達度量防勦機宜甚備隨陞兵部侍郎告歸卒贈兵部尚書有南州草南州詩說南陵道中登登不盡青山路瑟瑟松風到處聞飛鳥自來人自去馬蹄蹴碎萬重雲李太僕先生日華日華字君實號九疑嘉興人萬厯壬辰進士累官太僕少卿告歸通籍凡四十四載乞養者二十四載休沐者前後十載其難進易退如此性冲淡嗜古𢎞博風力絶塵有李太僕集尤好輯録神異之事雋永之言如紫桃軒雜綴六硯齋筆記是也一時士大夫風流儒雅好古博物者祥符王損仲雲間董𤣥宰君實書畫亞於𤣥宰博雅亞於損仲而㣲兼二公之長落落穆穆韻度頽然可謂名士矣其自記天啟癸亥十二月廿五夜夢與道者遇談三生事謂予過去七生乃唐天寳中詞臣也憶上與玉真妃御浮香閣宣喚李白白不至因令長孫錫代之長孫錫者予也因作上已觀褉詩曰曉岸曈曈日春山藹藹嵐初逢雕輦出漸覺綺羅團花影鳥飛散絮毬魚觸殘水濵三日宴惟簡麗人看上與妃皆笑曰不忝作圭兒軰師也其事甚異并附誌之三馬圖歌蒲類海西春草生雲花雪片相鮮明濃烟蓬勃中有物鱗龍下地毛龍驚昨夜房星掃北斗星精入胎霹靂走果然汗血世所無虎臆犀肩鳯凰肘畨奴得酒膽氣雄生來降馬似降龍手摶脚扺腰膞撞軒傲激烈同翻空前騎踏沙蹄踝輕浮雲髙翔勢不停後騎頓擲頭鬛獰去來似與奚官争中間一騎獨容與靡頸相隈如耳語肉􅐢拂拂含西風徧身灑落桃花雨主人蓄此古絹素英姿潑天光照座家有纒腰三俊児五陵市中誇濶歩錦堂對酒日髙歌門外長安正當路戊戌仲冬十五夜泊呉閶門外霜月滿江同伯宏子廣寓庸諸友團飲張六姬船頭酒酣客有弹三絃者曲盡其妙因作謌贈之洞庭木落西風多布袍起客登飛艫寒溪繞城月在水渺渺煙樹嗁棲烏笙竽中斷踏歌歇美人盈盈坐霜月杯分緑醑艶金波釧冷衣单露肌雪豪談劇謔意已盡座中忽出三絃客客年三十美丰姿正是撩風弄月時青羢暖耳紫半臂纎手削玉揉花枝一絃一珠珠活潑三珠滚滚亂挑撥化為黄鳥入花間澹日和風響鉤䀨海棠貪睡栁貪眠一齊喚起春風顛沉深堂院下紅雨雨聲滴破青苔甎隔忩有人愁聽雨噥噥唧唧相爾汝須臾蕭颯轉無聊陰廊切切秋蟲語沙頭老鶻亦斷膓劃然驚起天地霜千家砧杵夢魂裏萬騎鐃歌闗塞傍悲歡意緒總不同盡在搊搊抑抑中風筝繫斷刀尺冷珮環何處敲玎􅀈蟲肝䑕膽吉鷯舌蜂鬚蜨翅相䝉茸喜為微溜吐幽籟悲作老樹含凄風四時氣候皆可變何况鬢銷青黛顔銷紅蔡女十八拍􅄞生廣陵㪚潯陽江頭泣嫠婦柯亭老竹驚飛翰何如此客細作碎金琢玉裂繒聲引我詩魂入清境客弹已罷歌亦竟明月欲落不落美人欲睡不睡坐客回頭共伶俜總被餘音嬝人聽若非白骨觀初成㡬為三條絃子愁成病畫扇春江初汎葡萄緑鷺自翻飛鷗自浴烟消月落早潮平山影沉沉壓漁屋笑拈此景付詩翁曽向嚴灘五番宿野寺野寺依修竹藤蘿暝夕烟寒山秋磬底落葉夜燈前此過期休影相逢非俗縁還窮人境外應有鳥窠禅獨遊真如院秋來風日好㪚慮出林郊僧院房房竹沙邨處處橋清吟黄葉句雅坐白雲寮妙悟仍相許時煩逺社招題由拳讀書圖淞陵南指禦兒東小築濛濛烟雨中繞筯王餘千縷白堆盤郭索滿筐紅朱簾竹檻家家月青舫蒲㠶浦浦風合眼不須思岱華一痕猶得見胥峰秋日冩巨然筆意與若休山光沉緑樹酣黄九月江南欲試霜獨坐灘頭不垂釣蓼花風急送漁榔題畫贈友人疎紅穠緑盡闌珊新水初平十八灘釣去欲如嚴子瀨為君著意寫秋巒樗林居士米雲卿雲卿字君夢自號樗林居士金華人萬厯中遊京師妖書禍起朝臣以定儲為念者禍皆不測雲卿叩閽極言其事始得晏然由是名重公卿間流寓我郡二十餘載營生壙於海鹽終老呉興山中著有山居草二刻其秋栁落花諸律尤膾炙人口秋栁詩金陵人多傳寫之又有撥悶詩云十年湖上社雙屐泖東山有子癡難教無家老不還亦可見其老懐也秋栁二首一夜西風那便凋他鄉何處不蕭蕭依稀