麥飯此雛責未必副所期藉手可以没我憐此情真留饌已刷鬲嬌兒畏生面索去肯待喫獨共詩翁餐數盤亦空列契濶㡬何時一旦此衰劇翁其彊進箸努力扶倉卒翁有詩千篇篇篇珠與璧行當一典衣為翁謀鐫剟且為翁立序聊效𤣥晏役翁言亦我心奈費故人褐歸當急檢寄無待再三說我起重為言此意亦無别譬彼逺行人束装常俟發装罷不成行遲速任君歇皇天有深仁諸子仰先達人峰當永標家海豈遽竭且将我血傳快與世眼刮若云七十死可少八十活語罷行扶翁翁去只見月阜城謡魏璫縊處阜昌城南星月昬何來一騎抱頭奔但道薫天曽有勢可知入地竟無門梁頭卸下未絶氣薥蓆裹将麻索繫木場尚有處分時野店暫作送行計北風蕭蕭鬼哭哀誰将㸃淚施泉臺羣兒枉喚乾父來寧夏兵變感賦慶國親王子西寧節使臣風塵羇寳玦膏血汚朱輪天漢元無䇿降軍總不馴爾曹終愛死坐竭大農緡計偕鄚州道中作驅馬鄚州西荒原高復低橋身枯作岸雪跡凍成溪警夜時詢嵗占城數聽雞怕逢闗吏詰老大尺繻􅀈午日小飲口占梅雨纔晴㡬日餘又㸔梅熟薦黄魚嗁殘姑惡麥秋過落盡女貞花事疎老矣難充醫國艾歸歟冷笑殺身蜍眼前只箇菖蒲醆合為年光一破除䝉吉老翁姚士粦士粦字叔祥海鹽人與胡孝轅友善同以奥博相尚後進效之争為離竒詰曲之體馮開之祭酒較刻南北諸史俱出其手復見知於沈純甫司馬開府秦中聘管記室嗣遊邑庠入太學兵興後窮餓以死有見只編䝉吉堂稿其自序曰念樂冩境才不副音口憤趂聲句必杜撰所謂有意振竒不為時調者也原州夜哭壬辰固原州七月九日夜悲風挾竒響飄蕭繞官舍始聞唱吁喁答和幽嗚乍陡如天哭傾萬聲向耳㵼能令旱雷涕足使壮心怕須臾傳鼔急靈州敗軍下甲騎五千人一戰死寧夏更為側耳聽秦聲属垣榭椎胸亂更㸃跳地動兵架極痛逺糢糊情語雜號啞父傷老莫終妻悲我空嫁兄弟相悲吟手足安所借别有兒女啼似将總督罵罵絶聲更哀雞鳴不肯罷明日邉騎來㨗書覆黄帊送沈白生吏部北上蓬勃秋風動船鼓夾水芙蓉照行路貧病還憐一老生强起髙歌送銓部歌中歴歴何所言太平樞機在典銓不道先朝道先代丁亥巳後甲午前句餘當湖三太宰朝宁因之顔色改神鼎誅魂死溼灰鬼工折氣生風采于時曹署誰最雄惟顧掌選趙考功置身毎當特立地縱翮便可雙摩空自兹倒置名實紊用人言資怒言品計書堪作黨人碑野計應多辨姦論祗今當軸能改絃公稱今日山巨源佇看啓書薦才賢手揭名教懸中天贈顧道民耳中有君如古人得見人與青山春雄傑從來名姓重談對愈覺肝腸真破琴長鋏角弓靶當今誰為用君者自憐有足不能飛猶笑零丁脚如馬馮太史言顧能日走千里送郁伯承同朱太史遊天台多君慕雄勝賈勇向仙山抽毫染霞氣題詩蒼翠間胸中别會生烟樹眼青如山口瀑布見藏太史㡬函書擲碎興公一篇賦君㸔天台我㸔君㸔君衣上歸來雲贈呉少君憶過松院夕容鬢念年時能老人翻恠貪幽自不知無家依宻友有杖當佳兒為問簾前雪應催昨夜詩送沈明徳禮𤣥嶽春風知送客吹向謝羅山雪漲浮呉榜雲封劈楚闗足常垂外上身似到空還呼吸通羣帝留詩香案間送化公之五臺名山深代北登躡暫離羣一杖逺穿雪五峯高入雲經行臨朔漠衣帯見河汾妙聽證無語清吟獨為聞題曹鳴臯參軍園池洞壑恠烟霞曽藏太史餘林光悅過鳥山影壓遊魚白掃花和粉青留筍作書毎嗔蠻府夢吟徹夜忩虚周五移居新娶賦贈門䕶新雲第五家鴛鴦影浸小樓斜墻分别院宜男草牕借東鄰杏子花得月已教安曉鏡臨流未許浣春紗擕将滿篋催粧句㪚作機中片片霞登金明佛閣時舷公示疾倒影虛含鳥道明故山不見四愁生黏空草樹全當檻浸地寒濤夜入城雲向維摩邀起色秋憐野客送新晴坐聴竹底來清梵奈可西忩亂葉聲洪慶之移居到門溪路淡秋花手帖吟篇亦五車自覺地先成錦里誰将邨更說楊家所居名楊家邨濃留郭槖宜人樹緑蔓忠宣帯子𤓰還羡小樓空裏勝逺㠶歸雁晩來霞鴛鴦栗同董遐周賦雲鎖金灘曉夢通朅來錦里小園東笑憐一線分黄玉巧學雙飛入紫宫裁出被餘潘令袖自成行數隐侯工繡牀忽借纎纎手剥得先呼與阿儂别德清親舊餘不空憐水上亭水喧情語擾人聽羌山不觧孤舟别猶作當年撲面青見月有懐記得船忩寫夜新去年今夕念相親當軒就是當時月不見呼儂㸔月人過東阿輿人能言曹子建塟處天末雲西一抹晴魚山草木氣如生子桓石壮陵前馬未必輿儓識姓名施儀真時垚時壵字念同萬厯丁酉舉人為儀真令有恵政贈田山人我愛田山人瀟灑出塵埃嘯傲常自得披裘登釣䑓歸卧松林下柴扉晝不開古琴彈一曲自有清風來方壺山人鍾祖保祖保字念之號方壺山人又號孺西晩稱空慧子夏之子少受知於馮具區人成均數竒不售日坐桐忩課子因號桐忩老人博學能詩尤精茶理種竹千竿為一樓臨之髙臥其上不見客者二十年歿後私謚静正有空慧子小草其兄秉文蓄一鸚鵡晨昬念佛必應聲相和及秉文捐館鸚鵡自籠中躍出大鳴呌者三遂郤食死又有夾竹桃一株秉文甚愛之至是亦枯死祖保有二絶云㡬年鬻養喚聲頻燕邸擕來到海濱一自主人乗鶴去羞将言語向他人露井仙桃别様花枝枝穠艶吐竒葩忽然凋萎非無意怕到尋常百姓家春日追悼采茂含中天掩却少㣲星餘得文章作典刑愁殺藍田荘上草春來依舊向人青茂含别墅號藍田荘送善先之徽烏聊龍尾稱竒境大鄣靈巖有異蹤君到新都無别事朗吟還對石門峯曹太守徴庸徴庸字逺生一字平子别號積雪平湖人萬厯戊戌進士官至山西汾郡守為人清疎雋逺有潔癖掃地焚香避俗若凂毎襆被挾兩青童葛巾芒屩自肆山水間殊有晉唐風度讀其氷雪軒詩衰凉曠蕩多出塵之想湖中博學好古者長水太史以還其流亞歟黄岡中道芳草展緑素十里罥長堤藤花覆黄岡下與垂栁齊穀雨春欲盡雙禽自相嗁行子感于役思歸息山谿閒㸔理綸繩坐釣桃花西及春事偶耕烟蓑引鋤犁斗酒勞作苦壺觴漫提携頽然忩欣厭焉知競攀躋何為深泥中沒此青驄蹄答賈宗頴嗟余有竒癖棲遁務幽窅辟彼樊中雉所志在豐草雲臥送日月屈蠖春未矯我生理自薄安敢怨窮昊唯讀古人書起舞欲飄渺思偶素心人凌空躡𤣥道展几二仲來未至履先到仲黙何後生百巻新硎藁舉世塵􅅽言何足係芳抱心期同買山泉石信幽討勿于千萬人而失此同調試語悠悠者撮口但清嘯平原昔聞平原君客皆趿珠履扶僵信百足慙恩輕一死我適自齊右振衣勤仰止言非公子封乃故漢邑里停車三歎息英雄殊爾爾能令千載人聞其似者喜秋栁西風惻惻短亭過遊子攀條晩渡河青鬢漫隨黄葉改春愁欲共夏蝉多箜篌自寫棲烏曲蘆管空翻楊白歌即把唾壺時一擊泫然無與慰蹉跎送魏仲雪南湖詞一抹蒹葭淡不窮筆牀遥住水雲東夜深白露兼紅葉飄入秋風艇子中南康官舍偶往江城池上亭長松苦竹伴餘清墻西秋色斜陽外截得廬山一角明沈副使孝徴孝徴字永思號𤣥海海鹽人萬厯戊戌進士授工部主事轉郎中督理淮陽河道陞河南副使居官勤悴不茍取與雅耽篇咏在淮揚時俗多水嬉長橋風月甲天下公暇輙命小舟具肴核茗酒同四方名士客於是者為汗漫遊遊必有詩毎流傳民間婦人孺子皆能歌之以為盛事有𤣥暢閣集送薛雲卿還海虞憶君訪我風凄凄梅花始開香雪迷君今别去春已盡人歸何似春歸𦂳春歸花鳥䦨人歸詩酒寒君歸即是我歸路我欲從之不得渡恨殺留春不肯住還愁送君君不顧我今送君在何所中泠以南還顧渚飽嚼紫筍噉青梅水底黄魚三尺許纍纍盧橘大於拳葵榴照眼争相鮮一石已盡呼不歇呉姬調笑謌當筵謌當筵聲㡬度醉花何處不留吟雲卿有醉花吟報爾周郎應弗誤爾時回首甓湖頭白雲片片凌滄洲誰更行吟紛未已併入于于蜨夢裏翩翩重問廣陵濤苜蓿齋中讀秋水元夜宫詞二首琉璃琖盡中天色蘇合油薫别殿香六院競翻新曲奏柘枝斜倚御袍黄昭陽殿裏許誰先銀蒜金鋪玳瑁筵供奉上頭親捧案夾紗屏外望神仙沈太學誼徴誼徴字公雅孝徴弟太學生有雲香庵集十六夜水痕澄夕霽天浄恍疑流不覺氷輪仄猶餘金粟秋露寒垂草溼河爛入簾幽萬里堪同望闗山無限愁常主事髙繼髙繼字永仁號少江秀水人萬厯戊戌進士官主客司主事十五夜郁季雅兄弟招飲煙雨樓明月在髙樹凉風來暮天頻呼陶令酒争羡季鷹船坐滿青霞客嚢空白雪篇凭䦨同眺望一笑㪚寒烟支監丞如玉如玉字寧瑕號徳林大綸長子萬厯庚子舉人官監丞有半衲庵集春日遣褱二月鶯聲度女牆碧桃分艶試新粧春光盡属東鄰去寂寞空亭又夕陽沈秀才士臯士臯字汝邁思孝子有滋蘭館集人日泊峴山海上風濤洶林間嵗月頻客星長作客人日正愁人白鳥如窺意青楊未展顰且沽箬下酒一醉峴山春馮涪州𤣥鑑𤣥鑑字三峩平湖白潭人萬厯庚子舉人授廬州教諭陞涪州知州乞歸結廬雙谿之濵髙雅善文尤工書法有雙谿草堂集山寺溪閣重重翠影遮不知雲起溼袈裟千峯樹色藏朝雨六寺鐘聲送晩鴉筆塜天寒收柿葉茶壇風落掃松花倦時毎憶消閒地早晩扁舟向若耶感興何日閒棲一畆宫數竿修竹半畦菘柴門徑僻園丁健不負雙溪作釣翁卜秀才曰乂曰乂萬厯間秀水庠生金明寺佛閣髙閣凌空百雉分湖天晴靄正氤氲僧歸檇李城邉月鳥帯秦溪渡口雲春樹幾家依緑水海門千嶂送斜曛馮闌無限鄉闗思日暮鐘聲兩㟁聞劉知縣世教世教字少彛海鹽人萬厯庚子舉人選閩清令卒官為詩秀美有研寳齋集姚叔祥曰亷吏有窮子髙才無貴仕悲哉其言也霅川訪茅穉修夾岸霜楓引去舟故人何在霅溪頭當門流水堪垂釣入座青山足卧遊賦就東家非好色人如南國不禁秋具區波冷賔鴻下且為清尊十日留相逐籃輿相逐莫愁家絶勝江千問浣紗可似折殘𤣥㶚栁若為重對白門花行雲故合聞歌駐纎月偏宜照舞斜翻訝鐘聲長樂近忍教新旭㪚林鴉同里朱學斌負才而死詩以唁之霜華繢葉雁征秋腸斷城南百尺樓獻賦早時同泣玉繞牀終夜對探鈎才名謝去惟容足客難傳來是責頭零落遺編君莫恨猶勝倒屣問從遊聞鍾念之舉子因憶其樓居之勝有贈灣環清泚帶危樓剥啄從多懶未酬茗戰漸疎三雅舊書淫真擁百城遊長年佞佛稱居士小婦生兒字阿侯似是壮心降欲盡可禁如意唾壺愁寄意珠簾銀蒜度春風青雀飛來綵霧中浪説雨雲原是夢誇他身在宋家東夢中憔悴南來歎敝裘欲将肝膽傍誰收夢中也觧身為客惆悵逢人說倦遊忠介先生趙維寰維寰字無聲平湖人形貌短健有相者曰子骨法孤貴宜以文覇貢入北雍中庚子解元以文格太竒被參及巻進呈神廟卸批云其學則僻其思則苦復數曰異人也自是聲益藉甚入禮闈多士皆翹首拭目争識其面乆之署海寧學諭遷南監丞轉刑部主事訊撫寧侯朱國弼投獻事不少假國弼奏訐寰寰亦疏國弼不法状有㫖削國弼宫銜以列侯就第轉郎官復連疏劾大司㓂甄淑納言劉之鳯格不上遂併參之鳯直聲震一時竟以小臣屢訐大僚罷歸杜門著書年八十一卒私謚曰忠介著有廿一史快編雪廬焚餘諸事子韓孫沺俱有才名湖人三世能文者推趙氏云感事羽書一夜入承明司馬紛紛召外兵帷幄儘餘全勝筭疆塲遲奏凱歌聲将軍肘後黄金薄文吏樽前白簡盈二百年來養士報不知誰為勒燕銘項宜城利賔利賔字于王秀水人萬厯庚子舉人官宜城知縣有藏史居集五大夫松干霄原不受秦官鬱鬱蒼髯拂曉看千尺飛濤雲外捲祗令今日影猶寒檇李詩繫卷十六
