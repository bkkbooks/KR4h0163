body:
  text: 檇李詩繫卷二十八平湖沈季友編國朝趙秀才沺沺字天来號帆青平湖人韓之子性狷介不茍言笑凡經史諸子窮日夜誦覽於詩無體不偹舂容和雅刻意宗唐粤東學使者聞其名聘之抵署即辭歸曰我欲逰羅浮噉荔枝耳寧能作人幕客耶年四十三抱志而沒有資真集度嶺言聽王孫談孫駙馬舞劍歌有引王孫弟述厥祖司鐸髙陽時赴孫駙馬宴駙馬少奉命開幕薊門還賜第髙陽年八十餘醉中拔雙創起舞意示據鞍竟以老廢後至崇禎庚辰卒於家迄今三十餘載談次猶想見白髮跳丸態也宗人沺為作歌主家山第宴仙客月華應譲酒星白花炙􅉊毺霜不流兩行珠額臙脂溼孫郎酒酣擲電影白虹怨落蒼龍井兔魄淋漓挂膽鈎手提八十一神州七星四射金精掃匹練雙飛白帝愁投袂細將心事吐少年曽鎮朶顔部射鹿時臨右北平鳴骹擬到臨潢府如今老去投閒久宫妓如花對白首空餘錦帶舊吳鈎每逢風雨蛟龍吼座客相看慘不語英雄流落多如許誰遣亷頗困郭開翻思馬援逢光武髙陽酒徒不可見王孫見我談如面高詠王維老將行百感蒼茫淚如霰法華山寺觀石門山人宋旭畫十大名山粉壁歌翠微深處招提入四壁烟雲目不給疑是峯巒現化城真宰無功鬼神泣石門山人真好竒厯遍洲島丹青施眼見花宫開十地曾聞芥子納須彌西來東渡威儀好幾座人天筆如掃有相空留羅漢松無情還綴頭陀草匡廬瀑布峨眉雪長夏不消聲不絶行際如將揖列真坐時應得聞禅悦更有白嶽雲去來何似赤城霞起滅雲蹤霞色深復深天目東西雙􅏭嵲攀崖百丈窮飛猿懸澑千條界晴霓補筆高名屬李郎百年古墨生芬芳忽驚窈㝠疑風雨漫嗟剝落凌烟霜何須瓢笠尋名勝九域洞天一覽罄况復登高望洞庭潮音不斷來清聽微塵幻色本無踪眺罷流連撫古松欲向舊題添好句依稀落日數聲鐘戲傚元白體作茘枝歌南行五月殊苦熱火雲莽莽炎飈烈况厯山城瘴氣多復經漲海心如惙乆聞丹茘誇茘洲征夫恰值濯枝節船頭望見繁星垂未曾入齒先怡悦緩程繫纜促舟人亟買盈筐要新擷千顆黑葉須㬰至纔見流涎同饕餮絳綃乍啟即魂驚爪膚未忍憐竒絶細剝嫣紅出瑩然氤氲滿眼咀氷雪潤喉那得顧中消恣噉豈敢辭吻裂座中相餉勸加餐願予多端品題切苞如紫障圍玉顔坼如解襦吹燭滅脱如赤盤㵼月珠堆如肪脂并刀截膜如㸃酪水晶鹽瓤如盛釀玻璃澈光如湯餅試素汗味如蒲萄劇清冽嚼如甘露液無滓含如好女妃脣囓芳澤無定属生香色態有質都不屑茘支之美乃至此似予所見徒饒舌玉環慣愛走紅塵君謨好事殺青列自非親見果予腹飜笑前人作口孽還憶故鄉當兹辰賞心佳果滿園拆雖有朱櫻與醉李一一方此味俱劣人生若不食茘支枉用繁華住江浙作歌聊復倣竹枝傳倡江頭助鼔枻為分餘潤及長年漫停邪許且三咽更擬飽喫百千回蔗漿十斛重須設羊城行江口三板舸行行抵溟渤乗月掛長帆客程指南越南越迴環大海波番禺兩岫争嵯峨樓船自昔通楊僕左纛由來罷尉陀聞説炎荒多瘴癘古今翻覆仍佳麗大道朱門卓鄭家康衢繡户王侯第靖南已去平南留公子嬌娥射獵進百萬明粧調駿馬十千美滴弄箜篌宫中别館横天半五層樓閣迎仙觀相傳舊是越王臺越王當日曾朝漢五羊郭外島夷船進奉還將市舶連翡翠文犀隨處有明珠琥珀不論錢大新街去濠畔落外江賈客聲相錯廿年前是亂離人今日相逢成土著天南幸已斬長鯨嶴門烽息瓊厓清蒿丘難覓任囂壘落日重過陸賈城海濱遷户何從辨忍使嗸嗸集鴻雁極目黎人蜑子愁昇平惟此猶遺患可憐粤女踏歌新乞食還生滿路春素馨匝地香零亂空向花田憶美人沈融谷郵示粤中倡和詩却寄二首為客三年别長隨五嶺逰瘴雲鴻雁避蠻雨鷓鴣愁月暗榕陰夜霜空荔子秋情親依陸賈官舍足淹留聞道丹霞頂幽人採石華手持玉麈尾口吐金蓮花放鶴青天外還山白日斜與君閒笑咏並坐酌流霞立秋日發羊城緑榕三萬樹樹樹挂離愁此地無搖落那知已及秋驛樓催戍鼓瘴海亂漁篝夜半乘潮發孤篷逐野鷗王山人詩爾父前朝俠丈夫散金結士竟捐軀世情誰顧主家客天意終全趙氏孤説到兵戈猶涕淚擕將漁艇自江湖不須更問田横島赤帝長安久定都廣州十韻為到羊城路間闗五嶺賖三春聞蟋蟀十月見梅花處處栽甘蔗邨邨食苦𤓰華裝鏤瑇瑁珍饌薦蝦蟆椰子堪為酒檳榔好當茶夷歌音入鳥汲女髻盤蛇桄實霜如麵蕉絲雪似麻黄螯羮不厭丹荔果無加小吏腰長劔王孫跨短騧若非愁瘴癘應忘在天涯子夜元宵歌儂是三五年月亦三五夕三五月長圓三五年難得採桑渡暮春桑葉密桑下與歡遇筐滿蠶欲饑與歡不得語蟬秖為耽幽寂鳴君髙樹中力微聲自苦詎敢怨秋風輋谷歌東邊插稻秧西邊收稻穀遮莫似郎心一年兩回熟虎丘雜咏二首綺閣迴廊四面侵旗亭絶技少知音不須更接紅牙板内府新傳十樣金紅竹欄干碧幔垂官窰茗盞瀉天池便應飽喫蓑衣餅絶勝西山露白梨山塘夜市畫舫笙歌徧狹斜紅羊燈勝廣陵花慙無紫綺千金值羞到蘭陵沽酒家西湖雜咏吳姬拂袖勸蒲萄那惜千金脱紫貂二十年前歌管夜秦樓直接段家橋贑江歌候風候水始行舟大湖小湖愁莫愁黄石灘頭無數石白頭嶺下白人頭姚秀才安安字拙符秀水人田家數家共一溪比屋相姻婭柴扉映修竹雞鳴落花下沈貢士騏騏字鸐山嘉興縣歳貢生虎丘讌集勝賞由來吳會偏髙堂不夜燭如椽東南冠葢傾三輔呉越交逰滿四筵星聚近連牛斗分鶯求仍值雨花天目前王謝皆瓊樹觴咏依依似晉年童秀才申祉申祉字百㫋海鹽縣學生與彭孫貽齊名而詩篇散秩所見惟孟子詩十章而已句踐事吳陣雲初散日沈西銜璧歸來保㑹稽採葛山頭看狡百花洲上聴晨雞捧心妃子方沈醉嘗膽君臣共慘悽一曲堂堂歌未歇殘兵已過越來溪杜陵生蔣平階平階初名雯階字斧山號大鴻自稱杜陵生華亭人入庠嘉善遊陳子龍之門國初移居嘉興後徙越中卒其詩摹仿盛唐曽寓書于予云時趨俚俗正響寂寂僕與同郡計子山陽羡陳其年蕭山毛大可錢塘丁藥園輩獨持雅宗環視天下可與言詩者斯人而已忽遇南疑居然同調樂可言耶其持論嚴整如此詩集甚夥予特録其寓禾諸什亦窺豹之一斑也重訪法隠開士遂宿上方本項氏子旋䇿叩禪扉非闗問息機相看誇白足憐爾舊烏衣拊掌家風在攅眉世諦稀伊蒲曽置酒陶令正言歸訪彦文于魏里相看猶故友别乆似新知薄宦憑君達為農實我師東郊烽堠緩南陌稻車遲片片飛鳶影銜雲落水湄范季友邀飲吼山陶氏園川原於越地風物永和時花塢陶公築蘭舟范叔移百年新締搆一代舊招提峻閣憑霄逈雕闌倚石危尊罍傾北海詞賦溢南皮萬壑當牕見千巖向晚披拂雲歌去緩坐月酒行遲支遁情深切劉伶死不辭人從花底散路入夢中疑何日滄州興重來倒接䍦李居士碧碧字石水平湖人㓜孤能文與先輩趙無聲陸嗣端馮兼山諸公友為人伉爽不茍然諾有鴻儀堂集閏六月下弦日預擬七夕和錢元長韻佳㑹無多獨憶秋羅帷碧漢兩悠悠淚光㡬滿輕綃軸瘦影難登明月樓有約喜聞青鳥至無眠愁見絳雲流年來鵲使今何在銀浦從無一葉舟徐秀才善善字敬可秀水諸生必達孫詩律嚴整有藟谷遺藁過泰山豈意神靈宅衰年得蹔經風沙三百里一片馬頭青空曲盤龍虎觚稜挂斗星白雲朝暮起常䕶紀功銘寄曹秋岳司農使節臨荒外旌門未可攀騊駼輸互市鴻雁款重闗百戰瘡痍在千家涕淚斑更堪頻水旱甌脫繞蘭山初夏偶作細數韶華覽鏡邊頭須不信已皤然休教逺憶桐臺日便可虛張栢寢年生亦有涯吾分定春今何處夢猶牽衰殘只合忘機去更結青山未了縁江郊幾處唤提壺果否高陽尚有徒泛宅豈宜論去住酒天從此入虛無箏人倚處垂楊裊雉子斑時小麥枯擬趁麴車花外駐夕陽城闕又荒蕪春來稍喜日遲遲文酒爭開罷戰時一夕西園留勝賞千秋東觀接風期支離愧享三鍾逸鞠􅎽終非二斗宜城角尚悲花欲盡莫教征夢更天涯城南半畝舊柴闗碧蔓丹葩露井殷容膝有樓非百尺㝠心無夢不千山溪流四注蓮花巷雉堞平臨楊栁灣余所居有四蓮花橋又有楊栁灣在舍西百餘步疎懶未諳邀轍跡席門苔繡正斑斑送曾青藜之嶺南十年曾賦采蕭詩傾葢匆匆慰夢思擊筑未終燕市夕鳴鞭又及灞橋時帆收横浦春應近地接炎洲雪不隨共説珊瑚枝上好鮫宫待爾一竿垂欣聞鼙鼓息樓船琛賮遙通漲海天驅馬直過霜雁外飛杯莫放早梅前二禺高詠多名彦五管靈蹤半列仙倘遇羅浮倦逰客倡詶應滿鐵橋邊送胡竒玉之長沙君山一㸃望中青天畔長沙應小星此去洞庭秋正好蘼蕪千里待揚舲戈叟中顔中顔字魯公號又度原名湛平湖人逰邑庠善書工篆刻亦能詩老而無子寒餓以終和屠我法雙梅詩寂對難追氷雪經芳聨伯仲翼荒坰風狂骨立沈嵇阮雨妒香孤泣尹邢接武恥談桃富貴比肩笑慰竹飄零爭春凍雀喧空谷相顧聊堪影贈形柯太學𢎞本𢎞本字聿修聳次子由諸生入太學試不遇憔悴自廢卒年二十有五有鼓應初編客瑞光精舍重過尉堂大師方丈今朝少人事重到尉公房野水正趨壑楓林初下霜餐餘筍蕨供袖拂栴檀香余意亦何托巖前興不忘春郊草細風微二月天每從雨後過溪邊春流好待桃花漲社日初㸔燕子還楊栁渡頭低夕照麥苗隴外起寒烟登臨自昔多良㑹何事空嗟物候遷沈知州廷勱廷勱字子相號充齋嘉興人由拔貢歴任新寜欒城知縣陞商州知州有身易實義充齋遺稾南陽舟行候鄭雨隨未至秋深蕭瑟動江津去住浮雲不繫身飛鳥掠檣驚短纜沙蟲試水亂浮萍行空小艇延山入坐對寒塘落木頻寂寞南陽今日路蒹葭鷗鷺晚相親樵道人陸谷谷初名樵字嬾漁又字亦樵後稱樵道人平湖人妻子既喪遍逰名山水以終有夜鴻鳴集逰龍巖渡水探龍窟雲深隠翠微寒松老已化臥石恠將飛客到茶烟起僧閒花雨稀望憐城郭近人事笑皆非送秋悠悠世路總如賓愧不因時問去津欲挽流雲商别意難敎殘月當良辰升沈大塊原同幻㸃檢微生郤是真金井碧梧情未斷山中無厯信天民楚中衡陽南望雁來遲欲採芳蘭隔九疑夢染朝雲遺好事腰依楊栁怯相思行吟江畔孤臣悴作賦秋深上客悲浩淼湖光連月色可餘郢雪似當時粤東竹枝花田兒女學新粧辮髮釵垂金鳯皇雙屐猩紅來踏月絲絲錦帶勝霓裳沈訓導滉滉字路公號霞城桐鄉人康熙庚戌歲貢選授象山訓導在任三年卒秋日詣張子炎貞齋中羨君卜築最清幽半畝瓜田傲故侯山北松深眠鶴穩花南水繞蟄魚浮著書虞氏窮偏作潑墨羲之老未休相對頓忘塵俗想白雲漠漠擁霜楸周秀才大綬大綬字西臨秀水人補華亭庠生邑令張超大㑹同人於栢府分韻賦詩不逾晷大綬詩輒成谷學使常許其文議論正大絶類宋金華武林王晫云纒綿感慨極行文之勝事非溢美也賦得疎雨滴梧桐金莖受凉雨香井落疎桐紈扇裁明月裳衣搗晚風寒生長信殿聲斷未央宫聞説迎飛燕還應㸔射熊聞木樨香不斷香風十里吹小山花信故來遲八公顔色無常定今夜初成招飲詩楊秀才九垓九垓字孚九平湖諸生跅脫有俊才而使酒負氣多蕩詄理法外醉輒擲冠於地曰汝誤杜甫一生今又將誤楊大耶㑹投汝厠中耳尤好訶罵人勿顧衆刃之將剸其背也嘗手錄廿一史類纂三百餘卷工書畫求者必韻人佳客以餽酒為辭則大喜出之丁已疾作而歿偶興朝來靈雨沐芳塵送盡寒威未見春寄語梅花應解意隴頭無限折枝人陳秀才光縡光縡字緯度號謙山海鹽人許廷子少為張西銘所知上已浮觴與王處卿聨席因摘論漢史數則王遂以女字之女亦能詩光縡讀書敏異天官地理靡不究心尤精壬乙之學其詩名調鐘集秋日書懐明月出滄波流光薄雲漢爛爛列宿懸離離夕烟散壯志思逺遊長歌至夜半迴風谷口來石壁花影亂林閒警露鶴忽振凌雲翰茍懐千里心寜為耳目玩牆山石帆村海上行吟憐海樹蜃樓初散餘煙霧石帆山上石帆開似欲乘風横海渡相傳此地有村墟萬樹桃花千室居不知何年海水溢蛟龍鼓浪傾田廬居人一去無消息雲潮雨汐迷南北初晴海上露枯槎細視街衢猶可識有人拾得崇寜錢厯數年厯心惘然石闕殘碑水中泐波紋似刻深迴旋更見樽罍狀殊異摩挲散落松花翠想昔芳筵進酒時幾人歌舞花前醉桑田滄海向誰論何處侯門樂事繁不道有生皆速化試㸔海底石帆村呉中旅思風吹碧浪遶江城旅館清尊獨夜傾離恨未消同夙疾舊逰難憶似前生乍逢雲散憐山色為值花殘怨雨聲萍梗天涯計安定綠楊深處釣舟横梅花通客沈機機字爾任號海鷗桐鄉人居濮川之梅花涇上自號梅花逋客少補嘉郡庠生後老而棄去工詩善書有梅涇草堂集鷃笑軒遣懐二首膏肉來青蠅膏火來鬼蜨燈殘蝶不飛盤空蠅當别請㸔翟公門雀羅為誰設作歌勿引商商聲主激烈較奕勿覆刼一刼生死決刻深鬼所忌百巧不如拙天竺紀遊七年不向此山行衰草連天去路生絶壁惟餘危墖影怪松時作怒濤聲溪深虎渡風初急洞黒龍歸雨未晴猶有當時遺衲在白雲樓下話茶鐺陸秀才淮淮字秀整號胎簮嘉善庠生少孤事母以孝聞送越石肅陶之廣陵煙花三月晚遥向廣陵遊並轡推諸謝聨鑣羨二劉海門懸日迥天柱落霞收歌吹迷樓滿知君繫紫騮張秀才兆治北治字枚璧平湖諸生有粤遊槀懐古諸詩芙蓉堤晚步名園竹樹蔭精廬花外慿誰駐小車水佩風裳零落盡美人渺渺獨愁予計秀才能能字無能嘉善人善之弟詩才亦相伯仲送吕新水省親永嘉永嘉山色近何如春日寧親客路迂花滿江城寒食雨燈明水驛好溪魚碧帆迴渚仙巖近綵袖趨庭講席餘可有新詩過謝客錦囊千里慰離居唐布衣俊俊字聖翼又字西孟號大千平湖人有石田録悼妓李生鶴湖湖水水潺潺家在横塘第幾灣小徑狹斜來往熟朝朝猶憶上缾山鄭太學培培字文溪海鹽人谿園讌集分得文字促駕南還日園亭此送君那知朋好在重與共論文幔卷通花氣觴飛落暮雲欲乗餘興往林月正紛紛又得覃字河朔觴頻舉山陰興復探朋遊嗟聚散懐舟石次耕錫鬯武曹諸子雲樹影參覃漏轉仍呼酒星稀尚駐驂幾能逢好㑹書信寄江潭謂青士舅氏胡秀才采采字英千平湖縣學生孫紹安康熙丙子舉人春郊春色盈芳陌輕飈拂水涼山山横碧影樹樹理新粧病酒何堪醉吟花只覺香漁歌來和我帶月載歸航病足偶感春來嬌鳥喚晴多憎我蹣跚廢短哦小榻坐愁春又老不知堤栁緑如何曹貢士偉謨偉謨字次典平湖嵗貢生嘉善人謁禹陵夏王陵墓對塗山翠輦千秋尚可攀松下衣冠留𦵏地雲中朝珮想朝班靡山有路樵難到越廟無巢鶴引還總為當年巡幸後至今金簡落人間沈秀才甡甡字天生海鹽人有痩山草雲岫菴兀坐晚風石斜曛窺竹扉鹿銜芳草去鳥破碧雲飛樹古喧天籟衣輕澹翠微此中有幽意信宿莫言歸雙松詩老沈晭晭字叔輪號尚廬又號香嚴平湖人家世豪盛折節讀書為諸生不遇棄去日誦佛言梵唄之餘輒作裙屐冶遊老而勿悔也有書屋數椽琴書靜好香茗郁然浮動于筆墨硯席間惟名僧韻士樂為談對庭列雙松日哦詩其下與予居相近情相親毎當月明花謝輒過作夜話故唱和最多尚廬死而無雅人矣山陽之廬且更他姓又何况風雅之頓盡乎茲選其詩不能無三嘆焉解嘲阮籍臥鄰家栁下覆寒女自古曠達人高致有如許予本澹宕流相期在古處情深懐國風離騷寄愁緒偶然逢酒人一石醉相與好色不好淫難與俗人語送南疑子遊廬山歌南疑未到匡廬峯匡廬千仞羅胸中文章驅使巨靈手奔騰絡繹相為雄行囊一卷方筁集横峯側嶺起咫尺或如漢陽高插天或如香爐生紫煙或如瀑布飛匹練或如五老露頭面或如九叠開雲屏或如虎溪列繡亭煙雲出没不可狀破浪乘風自神王從前讀得等身書夢魂常與李白俱一朝特放九江櫂湓浦風帆春浪好自添兩翅忽飛揚不怕山頭鳥道長狂來或作孫登嘯雲中時下鳳凰呌兹山拔地排天門却被南疑作詩料烟嵐雲氣生巾笥神魂蕩漾時一至君獨青春賦逺遊輕風五兩一葉舟到此獨上匡廬頂讀書堂前有舊影昔年讀書有二李他年二沈卜築或在此法螺菴策杖尋西麓禪林别有天晴巒滴翠雨細竹引紅泉古佛旋螺頂山僧玉版禪杳然迷出處雲鳥亦蕭然人日訪秋浦西莊殘雪初晴鼔枻遲美人春早下書帷居舟居陸張融屋㸔水㸔山謝眺詩萱草上階先愛日荆花繞砌共連枝東君更助西園興梅放寒香栁放絲與側室言懐話到燈殘秋夜長浮沈世外意俱涼生依蘭若身能健死葬名山骨自香誓酒劉伶渾似夢遊山阮肇已成狂今宵任爾卿卿我有日清齋學太常奉謝外父馬公和衷見恵靈壁石高閣嶙峋片玉存滿牀書卷濕雲根自披幽壑莓苔迹猶帶前朝風雨痕鞭石不須浮海島移山仍得傍柴門從今寄語𢎞成子五鹿文章好細論西山縹緲峯居衆壑尊神仙彷彿有劉根水邊漁市遙傳鼔花底人家靜掩門黄綺風流猶尚古朱陳生長各成村鴟夷莫笑生涯拙種樹栽桑細討論南園竹枝詞沈郎園裏栁如緜新抽荷葉又田田拾得栁花為儂絮摘來荷葉當郎錢響屧廊響屧荒涼蔓草平空廊無復美人行山僧幾兩芒鞋在時踏寒巖落葉聲宫井故宫金井轆轤斜汲取軍持供佛茶素綆銀牀消息斷石欄夜雨落桐花雜憶兩首輕羅小帳半垂鈎睡鴨熏爐香篆浮憶得酒闌微醉立隔窗紅燭照梳頭芙蓉秋水一扁舟去住浮萍不自由憶得赤欄橋上望喚儂别去喚儂留咏白秋海棠和項東井粉黛霏微露淺紅可憐嬌小托幽叢如何不及蘆花絮飄入秋江釣艇中讀家客子燕京春咏冀北春深鶯夢酣迴波才子擅江南集賢學士如相許第一詩名屬沈三陳秀才學謙學謙字廷益嘉善人白紵詞黄金為門玉為堂堂上作使邯鄲倡氷紈霧縠明月璫朱顔善睞舒儀光拂巾舉袂白鵠翔清音徐轉繞鳳梁今日為樂殊未央錢本一本一字柏園桐鄉人仲夏余有晉陽之行舍弟十一送至瓜州分别兼寄朱近修張考夫汝來送我晉陽遊汝去離羣古渡頭前路塵沙吹萬斛到時風物惜三秋孟門王屋高難度鐡甕金陵望轉愁寄語南邨諸老友鳴鞭今已出瓜州汪澐澐字子倬錢塘人流寓當湖遣興梅花凌朔雪葵蘂迎朝曦從違必本性去就各有宜由余開西秦管仲霸東齊虛名垂竹素零落同蜉蚍我欲䇿高足但恐多路歧眇彼流珠光煇煇能幾時丁嗣澂澂字集虚嘉善人禪隠先生歌先生骯髒負竒骨辭家學道遊天台築室半山傍危木列石為坐浮蒼苔山風一夜飄然來吹得山頭花盡開偶來花下把鐵笛雲衣瀟灑岸其幘泠泠逸響凌太虛宻葉叢條聲淅瀝嗟乎山中詎知秋復春落花掃作巖下塵千松原與人間斷懶出深山再問人胡貢士介介字栁若平湖歲貢生制義之外兼擅吟咏惜其稾湮沒僅從扇頭錄得一絶亦可想其高懐勝致矣書李翰林集後才可壓宫妃氣能輕宦寺才氣兩無虧先生非大醉陳訓導昌昌字漢彬嘉善人龍正孫康熙壬子順天副榜貢領訓處州雲和雜詩秋夜一何長西風清且涼阿閣交重軒雕櫺起中央上有秦氏女所思在朔方朱絃發妙曲窈窕激清商一彈有餘歎四顧心徬徨徬徨亦何之仰見明月光不惜歲序晚但恨川無梁同心且離隔苦音誰見詳闗山月洛水千門月流光滿綺羅曈曨懸碧漢瀲灧濯金波逺戍羈棲久空閨悵望多闗山遮不斷夜夜落交河夜宿松陵扁舟遙泝五湖流遲日牙檣阻石尤夜靜松陵城上月依依清影落寒溝曹舍人鑑平鑑平字掌公號桐暘爾堪子康熙壬子舉人授中書舍人有南溪集邯鄲歌翩翩遊俠兒驅馬邯鄲道直上古叢臺天風吹白草園居雜咏和錢爾斐先生韻岑寂似禪闗苔堦色漸斑綠濃鷗夢稳紅冷蝶心閒對酒春秋社論文大小山入林無俗籟長日聽綿蠻張秀才璠璠字峒一號須裘平湖人祖正叔先生由鄉薦任海門令講學著書惜其詩失傳年譜中載有喜聞新建新㑹餘干從祀得吾道于今又麗天之句璠受業於張侗初才氣豪邁有載石舫諸刻白桃花贈徽之上人𤣥都競作錦霞粧獨洗胭脂傲素芳嫩蘂紛披初破玉落花亂㸃盡飛霜分梅氷骨憐春晚笑杏紅顔戀日長好向溈山問闗捩掃除色相見空王踏春詞綠楊嬌軃不勝鴉幾㸃遙山一抹霞步入春林雲影亂隔溪仙犬吠桃花葉處士津津字秋諾號半農嘉善人有尺雪齋詩集蠅蒼蠅實堪憎作詩冀蠅識爾命甚㣲細生處能作賊所願有幾何晝夜營不息忽至盈千羣散去不滿刻頭背戲翺翔穿裳忽攢膝巧如畫中㸃迅踰襌内蝨亂曉空有聲附驥何煩翼被凍誠可憐長讒犯明律熟視慢無畏舉手已莫即婪喙喧腥㕑癡腸費池墨雖少毒物心却有玷人徳蜘蛛勅守閽闌空莫放入姪杼七歲幼孤迎而撫之為父怪太遲四十丁未添為兄幸已早弟亡有遺男七歲頭角露讀書日諵諵命之名曰杼小戊字不慙何有白氏新自為阮家咸死者如火滅日月如風帆轉頭十年後百巻令負擔題玉馬搥碎水晶宫鍊以補天液崑岡分片珍騏驥比良徳何人錫嘉名清音轉絡驛靜院午隂長曲闌蕉月白希微一二吟歴亂千萬滴䕶花宫女閒銜枚將士疾彷彿吹鸞笙環珮搖空碧未知御泠行徒作風幡識公孫茍騁辨馬非馬奚惑舟中聽呉姬摘阮歌同社中諸子朔風滔滔竹林晚水光酒光嘗在眼水聲挾寒不入窗岸折橋痕霜色淺天低暮急翠袖輕十指動搖隨舌轉氷霜戛戛最初聲老絃咨嗟恨不明調摺柱移意何快豈堪獨自孤舟聽舟中之人人欲絶繁音將盡意不歇衣巾夜染空翠深字字落指如何捻一杯一曲逆殘更一人一影弄烟月紅燭失翦烏啼昏夢霽香尋憾如脫諸兄固是醉鄉籍觴政忽弛酒無則江風湖雪載滿船笑談如逢燕趙客夏晝閒花毎遲落幽鳥不貪啼永畫人無到蒿園路亦迷不眠嘗却夢觸句苦無題秋近𤓰應熟攜歸日又西夜過東菴溪上出門遇明月閒寺亦開扉適到清溪上方逢野衲歸波光搖夜色露氣入秋衣何處捕魚者停橈栁下磯門外門外堪長眺攜笻獨立時禽歸烟火樹牛下夕陽陂稍識清淨理無為世網羈雲山多畫稾句裏學王維寄柏斯民天髙風急奈秋何野曠扶藜一放歌對客愛吟來句好尋花喜識老僧多霜揺烏桕臨溪樹船隠蘆汀帶雪蓑佳節恠從閒裏錯及晴款款又相過高員外以永以永字子脩嘉興人康熈癸丑進士閲七年已未知河南内鄉縣事崇學校招流亡均賦則免私派戊辰陞山西安州知州禁革陋例嵗饑發常平倉粟以賑州西有白洋淀武弁指為馬厰地謀奪之堅持不可壬申擢户部江南司員外郎以勞勩卒於官年六十有三子孝本辛未成進士大水百韻三吳若棲苴陰陽易為厄巨浸連數州所恃瀦震澤三萬六千頃上禀咸池液分流入江海紆迴尾閭隔咎徴一以遘昬墊在往昔徒稱財賦區時見凍餒迫自非古臺駘安得障溟渤伊余菰蘆中往往念禹迹經營不可覩遺法惟典籍上下數千年頗欲究沿革常登㑹稽山俛視梅梁穴宛委玉字書拜頌底定績慨自江左來遂鮮中上䇿去矣單郟輩杞憂亦何益今年異雷電發自建寅月雨雪雜亂下隕光轟若磔自兹困重陰霖瀝迷曉夕潨潨屋摧霤汎汎庭漂麥然蒿㸑愈遲捜粟瓶屢竭平生頗放懷至此亦咄咄君㸔閒齋内青苔上髙壁芳蘭凄已萎薋菉蔓難闢風吹龍􅉬氣坐臥防毒螫水檻指游魚垂鈎即枕席朱絃潤無響獨坐幽思積渗漉虞蠶桑沮洳病滷舄果實壞自零𤓰壺爛誰摘兒童盡咿噢微尰及肘腋吁嗟春已深田父方襏襫捧土作隄䕶鳴金亟工役桔橰晝夜翻一潰失疆場良苗委長川安問庭且碩誰與致此灾無乃鞭陽石夢想醫無閭神超藐姑射置身無爽塏邑邑那可說中心葵藿傾仰望晨曦赤倐瞻蔚藍天笑詠岸巾幘無何雲膚合日影駒過隙愁霖更如晦檐溜漸漰湱水痕縮未寸洊至復數尺耳習鳴垤鸛目送渡海鶻潭底裊花枝林端挂石髮舟從橋上來却向屋内歇昨宵狂飈呼挾雨勢轉劇盤薄迸蛟蜃澎湃躍潮汐􅗄若萬馬犇戰惴刷心魄却疑倒天潢轉恐翻月窟樓觀意飄簸竹樹塞路陌風葉乍㸃㸃先秋氣蕭槭炎蒸竟何有裘葛互披藉出門展跬歩屢折謝公屐負販胥怨咨地厚敢不蹐白波浸門限户有不黔突南隣北里間咫尺斷請謁傳聞墮城闉見說蕩窀穸紛紛村民出水病腳跛躄或哀乞升斗或怒肆嚄唶督促須竹楗箕踞久轇轕直入州縣内大呌速區畫攀號類鼎沸官吏大辟易城外賈客船常時市粟帛衆怒争遏糴頃刻膠數舶聞見遂如此恨不假羽翮奮排閶闔升手取陰翳掲拔劍殲雨師頓令衆庶懌攝衣登髙樓四望積水白優遊羡羣鷗波上自出沒際天孤㠶來茫茫辨吳越海上三神山恍見金銀闕民今其為魚為我語水伯皇矣彼上帝監觀一何赫舒慘自有時那能忍捐瘠女實恣􅐓洞鯨呿復鼇擲横流殺人民獨不畏譴責須㬰天風暮萬里祇一碧返余所棲遲欹枕夢超忽巍峩接神人而自謂淵客言言似解嘲且復曉水脈余悉聆其言驚歎有倫脊降割洵非他人事實舛逆緬懷李唐後水利日齮齕五堰隳金城三江變沙磧千橋與百瀆茅塞殊可惜况自隄為漕湖流受扼搤諸溪復猥至犇潰勢倉卒區區一綫川何以當充斥向來徒補苴遣使空絡繹婁江泊白茒橇檋將安適及今緩修救寖壞益矛㦸井稅數百萬能向水濵索視此利害除奚啻相什伯余悲為此吟豈曰事攟摭用此監門繪異事同哽結疇將呼號聲旦暮逹丹掖鉅公詧便宜芻蕘並財擇捄灾自有要無費馬與璧治水兼治田施設範先哲茭牧成利藪湔剔須改轍下民敢憚勞其究自安宅縫掖窮巷人當亦手加額賦得亭臯木葉下效栁惲朔風起天末嚴霜改林柯亭臯夕陽入落葉寒聲多正愁長安道復想洞庭波誰念棲遲子勞勞為此歌懐江南梅花絶句朔雲邊月久天涯孤客今朝底自嗟為向空庭問芳信不禁清夢到梅花館娃遺構傍巑岏香徑蕭條玉甃寒閒自尋僧㸔花去碧山如畫倚闌干錢塘清境説西溪映水籠雲萬樹齊夢裏移家知向此故人曾許覓幽棲江南寒食落花天滿地平鋪白玉錢家在鴛鴦湖上住斷腸春色自年年顧秀才明傑明傑字越萬號漁山平湖人謹厚能文與兄人龍最友愛後乃留心𤣥學反致疾卒病起訪菊雲亭主人捐館感賦二首蒲團相對十年親此日園亭物候新斷岸空牆迷舊雨藥爐經巻傍寒塵鶴歸華表凄殘夜花落桃源失舊春小徑羊裘餘跡在苔痕重破淚沾巾故人别去夜臺清寂寂空堦鳥自鳴倘有靈文膺十賚更無好夢托三生里居黄菊陶元亮城主芙蓉石曼卿病起漁郎重問渡松山流水不勝情陳秀才苞苞字竹墅海鹽籍徙居郡城以父愫死于兵棄諸生放浪詩酒工草書有屏山堂詩選七里瀨和謝康樂韻客遊淹晨昏縱目恣延眺流沫同所險削成豈為峭墮樵猿岸吟唼流漁火曜丹巘夾清源水石互吞嘯溯舟駭崩奔過者忌其妙亮移成連情遑惜伯昏誚客星高且懸千載不復釣淪落惟平生綿邈悲同調東行二首兵戈底定日烽燧驗殘烟委注懸危纜洄湍迅急弦山容呈窈窕水沸出嬋娟極夜不知罷歌呼萬笏前日行蒼翠裏歸客思無涯逺悟枇杷樹低迷穱麥花江清難變酒水淡却宜茶只此堪浮泛相期理釣車輓孝㢘巢端明隔歲相逢話苦辛秀眉綠鬢舊綸巾每攀柏樹雙垂淚偶著荷衣一見人安坐從容知繕性高翔寥廓得閒身少微星墮慙難借翡翠蘭苕空自春憶昔追隨游璧沼同儔今有幾人存披帷心折編三絶漬絮神傷酒一尊弟子籃輿辭白社故侯瓜隴感青門不須更作山陽賦反覆遺箴巳斷魂嚴秀才訔訔字次良平湖人劉令虞章賞其文以女妻之父客死遺産悉讓諸昆奉母盡孝未幾卒其婦孤苦食貧稱竒節云悠然亭終古自悠然空亭一醉眠能通三泖宅直接五湖天送客愁飛絮聞歌識采蓮倚闌人老矣長望好林泉附考在當湖之中上下作石屋狀其址據湖之最勝處王弇州有記磐石道人屠敦增敦增字閬兼平湖人父象美罹難家室流離諸子貧竄增獨力學能文見重於時然久困場屋康熙戊午挾䇿北遊久居燕邸忽索僧龕趺坐作偈語投筆而逝與予家有姻戚向同下帷者二年嘗自言前身為張文潛又為磐石道人卒至負才不遇鬱鬱以死哀哉同林子白遊沈氏别業復訪古笠上人探幽遙指翠微中曲沼横橋一逕通水榭鳥啼留倦客藥欄春盡落殘紅鐘聲晚動孤村路溪色晴翻小燕風歸去正多塵外想故人今在虎溪東寄呉方之江樹雲連碧水隈離羣懐抱鬱難開風塵漸老潘生鬢痛哭誰收賈傅才二月閒愁芳草亂十年清夢故人來親交是處同淪落短笛凄凄怨落梅周掾史紹宗紹宗字岐陽本姓馬氏繼于姑遂冒周姓海鹽人繼母病體不屈伸宗負之行盤旋室中日數百回病以瘳生母居失火宗馳入火排牆負而出少任俠為掾史久之舍去性喜為詩文有岐陽詩鈔秋晚宿田父樓田父有逸思築樓高于桑修竹借于隣古梅䕃于窓蘆花水邨暮秋蟾上東牆夙夜舂早稻夢與晨炊香聞蟋蟀八月風露涼蟋蟀響空廊不入離人耳安知秋夜長愁心對落葉凄韻感微霜獨步庭除下徘徊攬素裳呉秀才同雲同雲字雲芝平湖庠生同葉藩臺池館納涼小閣浮香渚開襟納晚涼靜觀魚乞餌慵聽樹鳴螿鑄劒無良冶攜琴有錦囊凝眸抒客抱天地一滄桑沈秀才傳弓傳弓字武功嘉興諸生送李斯年閩遊何事還家復逺遊鳴榔伐鼓發中流才人好帶芙蓉劒少婦難㸔玳瑁樓閩海雲山通百越粤江組練壯三秋無諸臺上休南望回首鄉闗萬里愁徐處士無為無為字初隣嘉興人以好客致貧為時所稱查容有詩哭之云療貧無藥病無資嚼蠟生涯死不辭葛帔練裙千載恨忍㸔四歲此孤兒寄匡公水西開士近何如十月無從得素書不見傳言秦吉了空聞致祭魯爰居竹林常夢朝雲溼松閣頻邀夜月虛此日尚愁新戰伐何年方遂老樵漁張秀才勻勻字宣衡號鵲山秀水諸生年十二作稗史今所傳平山冷燕也又為傳竒有十眉圖長生樂二十種海内梨園爭傳播之臨卒書云赤剝來時赤剝還放開笑口任顛頑還時更不依前路跳過瓊樓海上山有鵲山堂集蠟梅雪裏横斜蕊半黄竒香暗襲鬱金堂絶憐蕚小如圓磬不信枝寒有蜜房折供氷壺垂蠟淚插添雲髪映釵梁夀陽新樣圖宫額破凍先開第一粧過秀才澤充澤充字涵輝號滄谷平湖人庭訓之孫紫髯偉軀落拓自放家貧工書嗜酒請書者必置飲酒半援毫或作大書淋漓四壁偶不當意輒狂呼罵座人皆搖手避之更善談謔詞辨風生身後親故燕集曰今夕使髯在不虞寂寞矣卒之前一日題壁云世中煩熱愛薛少府之神遊波底清涼了莊漆園之大夢五十二年一脚踢倒豈不快哉宿中竺山房山房當薄暮石壁度微曛溜竹斜通澗懸厓半叠雲鐘聲空外落花氣靜中分醉後憑高枕寒泉徹夜聞人日馮子近招飲春來不出户彼此一相望小飲期人日輕舟過草堂梅花寒未放竹葉煖生香剪燭論文細雞聲徹野塘報恩塔塔影凌霄漢登臨得縱觀雲開千岫出潮湧大江寒畫閣人初起朱門春未殘六朝名勝地今古一憑闌寄沈客子别後年華又幾更早傳洛下有才名趨庭時㑹鳴琴意倚劍常深懐古情芳草春雲馳馬地梧桐秋雨讀書聲相逢把臂思何極樽酒天涯見月明閨中曲妾家江口第三灣夫壻從征在玉闗最恨鵁鶄沙上鳥早潮飛去暮飛還朱官生茂昉茂昉字子葆秀水人承父司寇大啟蔭好結客所居山樓四方名士多宴集其中九日節物驚心感歲華籬邊叢菊自開花闗河冷落低殘樹故國凄涼久種瓜風景已隨人世換茱萸猶傍酒杯賖天邊鴻雁歸飛急客子衣單何處誇馬秀才上巘上巘字雪偁號銀塘嘉興縣學生有聲文社子夀穀康熙壬戌進士著有詩法火傳左右編行世弔冢宰徐寶摩公六月霜飛重氷心凜獨生簡青原可作喋血矢誰爭夢已江山改靈還社稷撑千年徐稺廟共仰畫溪名公里名畫水馮秀才元白元白字匏憨平湖庠生有則鳴剰業宫詞步過涵輝韻深鎖重門不記年那堪簾外月初圓來朝强把新粧試内信無聞喚採蓮桃鄉布衣李符符字分虎號畊客嘉興人應徴之曾孫梅里李氏多才符與繩逺良年齊名時號三李善詩詞尤工駢體嘗遊滇遇碧雞山道士曰子前身廬山行脚僧也後十年當歸廬山康熙甲子予在京師分虎亦館於龔氏往來唱和月舉一㑹同賦者晉江黄虞稷大梁周在浚太原閻若璩寜波萬言錢塘洪昇嘉興周篁河中呉雯遼陽佟世思武林王嗣槐同里沈皥日暨我兩人也分虎嘗自言將老於桃鄉属予作詩咏之及丁卯予再入燕分虎已遊閩矣已已之正月予泛艇過其家時兩岸燒燈溪光如晝因出酒果話舊并以行脚圖索題分虎亦題予春山圖又言旦晚當再踰仙霞予勸之早為買山之䇿四更始别未幾聞其卒于途次迴感故人不無撫巻揮涕云秋夜宿慧建寺見一老僧頭白如雪聲音如女子異而詢之知為沐黔國故宫監也遂叩其遺事為予道之甚悉聴畢愴然故述長句金風瑟瑟涼秋至客子夜宿慧建寺白頭老僧夜不眠為我深談黔國事自言乃是刑餘身少小曾為宫裏人曲房深苑逶迤入皓齒明眸歌舞頻玉鳯銜鈴聞異響金龍吐佩承香塵第宅非由一朝見分茅始自功臣宴鐵券頻頒朱邸門璽書數下明光殿二王一侯九國公尚有將軍不襲封子孫傳位十數世勲爵食祿三千鍾武僖之後愛文詞徼外烽烟靜一時滇池長讌書生客阿瓦猶傳都督詩崇禎年中亂離始臨安長官謀不軌倉卒横戈尊爼間須㬰拔劒宫門裏從官衛士不敢前樓臺灰燼鶯花死陳焦夫人竄西門一旦自焚普吉邨可憐兩世金閨質化作千年玉女魂上公初遁瀾滄逺一去緬夷不復返曾聞就義死從容至今傳説多哀輓聽君説罷涕交流一門盡節真難求三百年來事銷歇却恨當時沙定州獨倚繩牀三太息珠斗闌干月將入篝燈黯黯不能眠清夜如聞鬼神泣遊牛首山長句秣陵佳山數牛首石窟從古巢神仙晉時更名曰天闕山圖尺楮捜陳編夙宵掛夢脚或跨醒望翠壑仍茫然主人好事約俱往上冬日煖同春妍巾輞對對畫杠插櫪馬匹匹紅韁牽毳袍茸帽十數輩皆云良遊詩作緣呉鞋新蠟痩僮挈到彼著此登臨便城門老兵纔啟鑰萬闠未動朝㕑烟踏霜南嚮三十里巳見嵐彩流蒼巔藤垣蘚嶂裹花刹徑轉目豁朱甍連苔井欄壊冷泉咽塵廊葉積殘碑眠遼王肥字斗樣大寺額剝落金泥鮮槁顔衲子衫右袒以手抱杖揖客前傍指冬青銀印樹為言植自隋唐年斵石排梯百八級上俯樓閣香楠椽信女剪綵繭花活佛缾分供青紅蓮拓牕四眺野蕭瑟村村苦潦荒秋田清齋無糧飯不足咄嗟能辦伊蒲筵蒸壺狀類鴨垂頸煮菜味勝彘切肩祇愁不飲興未劇瓢酤催買抛囊錢㑹須乘醉探窈洞乳水滴衣珠顆圓兠率古崖勢陡絶心懾屐溜飛蘿搴蓬菴僧雛習梵呪隔林遙聽疑琴絃倚笻更陟兩峯頂芙蓉翠削東西偏中道似借五丁鑿可使射騎馳控弦老松伐完穉松矮綠梢僅到雙眉邊重攜酒榼坐就地􅉊毺横陳雜錦韉祖堂車府皆在下長干塔小但一鞭大江微茫潮影白風帆可數不見船朱雀門開恰遙對舊築御道通平平相傳宋齊梁陳代于此除墠郊南天太息當時翠華路付與蔓草鼪鼯穿辟支盂鉢已灰燼休問寶公履舄全建炎之初駐大將曾棲帶甲人三千荆榛瓦覆戰壘得無折㦸埋沙埏越客登覽意雖愜其奈弔往哀思填那能置身聞見外檀龕趺膝㕘枯禪不爾便著逍遙服茹芝餐花學偓佺山花灼灼草芊芊好景須待春風顛且提倦轡下山去他日重來聽杜鵑寄山子自課僮畊十畝田古橋村落結廬偏鄰花過屋梢吟袖畬水成溪活釣船屐響柴門詩弟子壜開竹墅酒神仙繅絲逕裏踟蹰别惆悵西風又颯然竹亭對雨西隣烟舍晝開扄不惜衝泥日再經總是好春何厭雨但逢雅集便宜亭溪魚撥剌投竿得山鳥綿蠻倚樹聽載酒花時尋勝地無如南踏兩峯青題石坪醒釣圖舟穿花底一蓑香釣得溪魚錦尾長醉倒但知吟好句世間那有此漁郎寄逺士表弟桃浦飛花綠水長潘兄阮弟合山裝西湖燈火南湖月何地相思不斷腸登樓花梁鴛瓦舊樓臺窗裏涼雲壓雁開莫訝向江凝望久畫檣昨日此中來知退叟沈進進字山子嘉興梅㑹里人初名馭補學官弟子更今名與朱檢討彞尊周布衣篔詩篇酬和錢塘陸圻堂相遇于潛采堂問姓名大聲曰得非梅花高館落春草斷垣生之沈山子乎遂訂交劇飲而散故人招入都時值六街扌溝恐其穢濁騎驢一頭蹩躠歸里自號知退叟著有文言㑹粹行國錄袁溪文稾東園詩藍村稾半巢居稾退叟行吟力圃蕭閒詞横山蛟潭同朱十彞尊賦積鐵立千仞行人墮蒼黑危風動山根側見雷雨入隂厓閉長廊鬼火白日出視聽驚心魂峯巒俯突兀微涓滴松枝清響久寂歴愛兹叢薄深栖遲慰晨夕庶不孤願言超然慕疇昔贊山廟述事小山勢亦銳登歴無十重草木覆其巔隂映龍神宫老屋支獨木傾石走長松諸天既剝落百身莓菭封當牖雜花草垣牆趯隂蟲山坳藏土穴洩雲如鴻濛旁有十數椽兀坐一老翁見客即長揖問我來何從答云自鹽官還向東園中問翁此何地逺近無人蹤翁言難具陳往者人民豐兹宫初構時禋祀盛村農椎牛宰肥羊珍錯山海充旗斿耀五采簫鼓鳴三冬紅裙曳婦女綵髻挽兒童千家富甘脆百室殷朽紅一朝桑海變世事如轉蓬自酉迄卯辰盜賊恣斥衝其初掠黄金傾槖亦不容次及雞犬豕釡甑時一空婦女載後船丁男陷其胸草木雜鋒鏑雉兔悲榛叢及乎剪渠魁走險勢則窮良民亦罹禍餘殃告灾凶從此無孑遺流離各西東所以神乏祀血食難再崇我寜守兹宇偷生實罷癃我聞三太息此事由蒼穹陽九與百六沴氣生戰攻塗炭良已乆刼運當有終真人應運出車書今大同努力爾自愛體化方冲融當窗織側側復力力東家少女西家織高堂阿母苦相催三日當窗斷五匹徒言織作衣未成秋風一夜蜻蛉鳴海上夕望杖䇿憑高望愁心正未央天寒來鸛鶴日落見牛羊海縣鮫人雜川原獵騎長無為傷逺道鄉淚獨霑裳夜起旅館雞聲報空堂客思侵江邨明逺火山雨滴高林舊事飢寒在新愁戰伐深乾坤正搖落把酒一沈吟渡浙江别陸處士圻悽惻臨歧路蒼黄對逺天春風官舍栁暮雨石林烟檣燕來還去山雲斷復連今宵何處泊愁坐扣離舷季秋月夜書懐十八韻滄海生明月憑高欲問天詩書塵滿積事業鏡虛圓失䇿哀羣盜藏身愧昔賢世情真鹵莽吾道竟沈緜素螘難消恨金丹不駐年放歌成漫興儒術索真詮屈辱寜論命蹉跎待息肩自傷飄雨翮不復逞霜拳枕席江湖外交親記憶前壯懐悲老矣佳節歎徒然抱病登孤閣何心泛小船秋風殊渺渺宿雨自娟娟清切團甘露伶俜墜粉蓮巨魚吹浪靜細草雜花姸徑曲迴紅燭林疎起白烟幾家砧杵急永夜客愁懸地迥星河闊城深鼓角偏只今多戰伐何計稳宵眠寄從子良詒杜門二月寒長晦懶起搘笻雪未晴不信野橋催栁放已㸔春草過牆生香燒碧筍溪魚美響落銀瓶竹葉清賴得此身仍健在暮年書史最闗情過拂水山莊案此為錢謙益之妾栁是帷箔不修而作故存而不削以癉其惡蒼巖拂水水烟荒紅豆歌辭罷女郎碧葉有隂都礙日暮雲無雨獨歸廊津梁謾説能超海碑碣從今失擅塲解爾春風池上絮似曾飛入野花香重過指月菴周處士篔寓櫬於此野棠花落水圍邨碧映晴沙月一痕碁局動隨非逸老松寮依止是閒門江湖浪起蛟龍惡詩卷人收歲月存聞到徐塘原舊里處士曾夢友人云前身是徐塘老衲不應此地有歸魂西洲曲流水石橋邊西洲定何處不見采蓮人月照門前樹石城樂楊栁門前樹飛花近滿堤石城行樂處夜夜白烏啼南湖竹枝詞湖南畢逋烏鳥啼湖上栁花飛滿蹊朝啼暮啼啼不歇愁殺高樓蕩子妻秦塘角角野雞鳴秦塘纂纂野棗生秦塘蓮子幾時結愁見荻花秋水平泛湖作蕩槳芳湖採白蘋落花三月又逢人流鶯語燕闗何事愁殺祠南已暮春聽歌同汪别駕作江湖老去更吹箎白髮梨園弟子師零落南朝後庭曲石頭城下雨參差李中翰榮昌榮昌字琪園桐鄉人海鹽籍由貢生考授中書有觀成堂詩草春暮幽牕風雨過好景暗蹉跎老樹啼黄鳥新荷㸃綠波興縁春去少詩為惜花多俯仰增愁思憑闌縱短歌懐太學應聘應聘字莘臯嘉興人太學生武林旅中汪崑厓金支皇汪蒼舒程奕先江海瀾汪子四諸子過訪西泠山水窟烟雲饒恢竒翠羽巢芳林紫萍漲華池軒車過蘭坂飛盖相追馳廣坐集羣賢染翰抒麗辭既笑枚臯拙或悲相如遲顧念旅遊子被褐懐所知慷慨成篇章河梁有餘思徒䝉和氏盼愧之連城姿謝去不復顧聞問安可期徐秀才然然字撫辰嘉興諸生山行曲逕遶清川溪花滿目前懸厓青著雨峭石碧摩天玉冷千層月銀飛百道泉籃輿經古路樵牧自悠然屠秀才廷楫廷楫字爾際號東䝉嘉興縣學生兵後棄去詩酒自娯而以農桑督諸子余嘗過白蓮僧大梅山房見其與周青士倡和詩數丈之卷盈二皆清真可誦著有鹿干草堂集十二卷藏于家自題荷鉏圖匪種豐矣秉此安揮花源塞矣荷此安歸中田有敝廬兮至骭有短衣勉旃保汝鉏兮離汝於寒飢野步微靄銷澄嵐秋容淡林莽蕭蕭北原下遙挹西山爽遊目信芒屨興到每獨往地偏雞犬寂農暇機杼響落葉靜不飛平川約如掌雲物窮壯觀彌覺天宇廣談笑洽鄰叟夕陽上菰蔣和陶靖節雜詩深綠覆晴窗物變鶯聲老逝者如斯夫韶盛豈長保我今五十三還念髪未燥兒嬉如昨日忽驚衰白早同儕三五人墓木亦巳抱老死何足悲所悲未聞道我家東臯下世守勤農桑及我此術疎八口厭糟糠禦冬必㫖蓄百里宿舂糧俯仰宇宙間食隂飲養陽一飽賴假貸此計良獨傷我老安不才庶敦訓子方胼胝職耒耜慎勿親詠觴過鶴樓得青士留詩見懐東䝉未至簹谷至簹谷已去東䝉過山房祇見往還數交臂相失仍何多此來竹杖啄禪闥九春暮律侵清和巖花落盡綠隂滿雨歇碧漲浮塘坡鶴樓樽爼幸無恙合龠入口衰顔酡揮杯不作勸影酌主人妙義能懸河廿年結契如一日筠心竹柏無改柯語吾老簹共此宿薄言懐子留長歌淋漓醉墨字傾側秉燭伸紙三咿哦伊人宛在不可即弁峴西望青峩峩君為東西南北人予也抱耒山之阿招提歲至一再計况復相見顛毛皤流行坎止亦任運鴻留雪爪萍依波意酣興到難自黙詩成未擬蒼崖磨但屬名山好藏取百年㑹有人摩挲閏五戱書小燕依梁弱圓荷出水新一樽愆舊約兩度負佳辰細葛初便體清泉强入唇違時成獨醒莫歎楚靈均花朝同彦徽游福成因過梅逋山房小飲繞屋溪光淨侵檐竹色幽酒仍沽恵逺詩孰起湯休剝土先賢塚殘編故友樓東風吹客鬢不似昔年游臘日北風吹獨樹牢落野人居俗愛江郊儉時驚蜡臘餘鄰翁能借酒溪女解留魚幽事無人共寒梅昨夜舒青芝山虎山橋外午風輕西崦湖頭眼倍明萬樹梅櫻真陸海一檣烟雨過春城此中恨不移家住道上猶疑入畫行寄語山靈莫相笑廿年吾已謝浮名秋日飲天香閣下感誦帚東䝉至處糟丘峙誦帚亡來筆冢空九地詩魂呼不起一樽𤣥對與誰同雨餘桂粟猶飄霧晝冷松髯自鼓風老去賞音䕫曠盡倚闌細數北來鴻檇李詩繫卷二十八
