舊十三詞賦已知名日日金丸逐曉鶯楊柳河橋春試馬杏花樓閣夜聞箏當年斷夢隨寒雨幾處傷心為月明最是紅顔易零落秋風黄葉悵平生東平詩百首之二簾前倚醉一悲歌自捲蝦鬚入綺羅紅燭背人偷驗取砑繚綾上舊恩多墉宫背燭幾淒淒傳與青衫驗舊啼二十七年惆悵事春風開徧野棠梨黄貢士子錫子錫字復仲秀水人承昊次子善畫山水有麗農山人遺藁艷曲學織九張機香羅叠舞衣輕鸞千二百風起盡飜飛湖中並蒂蓮岸上同心苣三十六鴛鴦飛來不飛去鍾貢士嶔立嶔立字宣逺秀水人明末貢生折楊柳裊裊金堤柳三春漸寂寥新聲傳洛下舊恨憶河橋妾意愁飛絮君行憶舞腰關山吹短笛憑向曲中飄秋涇晚發落日片帆輕春江一望平微風三十里已度射襄城岸岸楊柳接村村布糓鳴不愁明發雨魚尾斷霞生查秀才崧繼崧繼字柱青後更名遺字逸逺號學圃海寧人補海鹽縣學生有澄清堂集揚州詞江都士女蕩輕舟傳説當時翠輦留二十四橋人散後風吹螢火徧䢴溝金秀才􅢒孫􅢒孫字龍友秀水縣學生有鐵巖集詠懷萬籟吹至音悦耳非絲竹至道有餘甘所懽非梁肉衣被葢天下何必綺與縠貴固非吾榮賤亦非吾辱栗栗同履氷粥粥若捧玉毫髪茍有違澥水終難濯箜篌且莫彈簫管且莫吹俯仰懷古昔戚戚心若摧雒陽被謡諑湘沅萬古悲讒夫自髙張楚臣蒙䲭夷卓哉蘇子卿嚙雪志難移翩翩夷門客頭顱酬所知下士羡朝榮朝榮難自持上士希延年延年安可期夀殀同一歸惟貴死得宜歎彼泉下人生氣何纍纍正徳宫詞月射窗紗映畫梁芙蓉闕北鬱金香西宫今夜停歌舞聞道官家宿豹房天啓宫詞玲瓏玉束繫鮫綃素腕雙擎碧玉簫萬夀山頭歌急拍一聲聲唱雒陽橋崇禎宫詞雉扇乗雲啓鳳樓特宣命婦拜長秋賜來榖雨新茶白景泰盤盛宣徳甌馬教授廣軨廣軨字飛生平湖人鳴雷子為人外通中介尤長辨才每當詩酒遊讌賔友歙集輒葛巾鹿裘髙談雄論連舉觥船數十神氣自若喪亂後家益貧遂遊于四方以教授為事凡理學性命興亡治亂之説矢口講論間以笑謔多有别解使人靡靡忘倦於是三吳之士咸歸其門翕然有大儒風殁後私諡端敏詠懷貧者思得玉不採九疑峰倦者思得息不憩三危蹤嗟彼當路子追欲何怔忪朝菌與靈椿誰是金石躬惟有樂飢水可以安吾慵康樂誇成佛叔夜急養生當其抗言時髣髴通神靈一朝不自得終乃違其情我欽蒙莊子無近刑與名時哉適來去躬耕以為經養由方矯矢白猿號平林更嬴鳴虚弓雲中下驚禽末技有至妙神感捷應心何為躭道久徒然歎幽深逝將舎之去翺翔南山岑懷培原大兄行脚雪竇廿載投簪老上方三年讀禮祝空王寧求慧業無生果不為名山一瓣香片石舊尋蓮社地孤雲重度越吟鄉自傷未免周何累薇蕨徒懷向首陽同臯旭對月懷沈子佩臨别勝集愛客當年舊隠侯短亭落日更維舟臨岐細草迷吳角隔嵗殘梅下隴頭才子最憐黄綬好酒人偏愛翠眉愁年來却笑文通老别賦時時戀舊遊莫春雜感同葉星期郭臯旭長洲臺苑一蕪平細雨青霑草色輕華表思歸君子鶴空山有語上皇鸚要離塜畔尋家國林慮傭間識友生回憶舊京歡賞處何人不發五噫聲沈秀才廷鈺廷鈺字文韓號山漁桐鄉庠生甲甲後棄去躭情詩酒其自序有云屈原賦離騷宋玉作九辯憂國既深悲秋特甚余生不敏觸物多忤憂與時遇病復隨之著秋吟詩以見志秋深水墩訪菊次同遊諸子韻髙風吹枯枝葉葉去無迹日色蒼蒼涼溪流泯泯白毎覺秋興悲我意偶閒適采采黄金花衆芳羅咫尺登危據層樓千里接瑶席水迥地勢雄徑轉秋田斥決眥數歸鴻影下寒塘隻煙色隨雙帆厯厯漁樵宅霜飛百草凋節序忽遷易良會當及時何得拘形役漸川老人俞汝言汝言字右吉秀水人身矮善談謔為諸生不遇自稱漸川老人遊燕趙韓魏宋衛閩粤之鄉越雲中雁門歸而閉户著述篇帙之富近代學人莫與抗衡者有漸川集及先儒語要京房易圖晉軍將佐表禮服沿革漢官差次考宋元舉要厯紀年同聲録崇禎大臣年表卿貳表明世家考寇變略弇州三述補品級廣考嵩山志諡法考補雙湖雜録本草摘要晚又著春秋平義十二巻四傳糾正一巻坐是兩目失明然猶口授諸書使人以筆記之遂病而卒予憶戊申已酉之嵗右吉至西平署下帷甚久予雖少每於燈窗硯席間執巻商確頗以為孺子可教而今重有典型之悲矣所登諸詩皆昔年手録者惜不得覽其全集詠懷長安遊俠地洛陽粉黛叢朱樓結綺疏繡帳臨春風皎皎垂素手琅琅振絲桐一為求鳳操車馬塞道中回首四節易凝霜凋朱容明月猶在懸白日已不東翩翩白馬郎揚鞭復何從東村宿瘤姑十五被翟章西家美羅敷二十猶蠶桑窈窕絶世姿終日工七襄容色豈在好逢時即為良語賤有餘惡處貴罔不臧紅顔坐消歇盛年何可常二子篇貽顧寧人李天生邊郡諸侯誰好士雲中雁門稱第一同開幕府向隂山共脱貂裘禮賔客笳閒鼓卧烽息煙尊罍楚楚屏箏瑟甲朝丙夜恣探論如石投水膠在漆鄴下梁園彼一時安論軒車與遺佚就中賔客誰最竒惟顧朱李無異辭朱十自小我好友顧李未面神為馳關中博物因篤冠操管滔滔濯江漢劉曹沈宋未足多古詞鬱鬱星辰爛東吳布衣顧炎武山經星志指掌數古文穿穴鄙夾漈𡨕捜碑版考石鼓好竒尚俠大略同李詩顧筆同千古余來雲中踰萬里貪與諸君共抵几誰知聚散自有時南北東西不並屣李生貽我懷古篇朱生書尺嘗蟬連遊燕幸與顧子俱我出顧入無後先均是山澤姿並為諸侯友記程未嘗隔千里片席劇談竟何有乃知造物甚相忌合并従容亦難偶只今幕府一時歇散去燕吳與秦粤此生寧有聚首期各自孤眠對秋月不爾單父與吹臺髙李杜陵俱異才嘯歌今昔乾坤開英雄奚必非蒿萊二子相見定有日麟遊鳳舞何時哉雲中雜詩蘇武臺安在昭君墓若何垣非秦紫塞堡近漢黄河兵減笳吟少烽銷牧地多當時歌舞麗檀板雜琱戈贈孫孝亷侍史谷音侍史清如玉疑従緱嶺來才偏憐頴士技欲勝方回眉語令人醉歌停待客催何當䝉繡被青翰一帆開井陘道中束馬嶔﨑道路艱尚留古迹在青山懸流苔洗將軍壘落日煙封娘子關垂黍秋田辭戰伐横碑古澗費追攀兩看旅雁違江北自愧征衫不暫閒華嚴寺同閻古古作玉甃金繩奠九楹離宫拓跋舊西京幾經鐵馬琱戈日不壞毘盧舍衛城像試孰開山後地法幢猶紀大康名請看直北諸陵闕白草黄榆縱復横進艇晴川曲曲抱沙堤岸柳依依逺近齊山色欲開疎雨外夕陽愁在亂峰西舟前波浪泇流駚望裏煙嵐魯樹低作客乗春行處好故鄉曾否息征鼙大名九日搔首中原去雁號帝丘景物倍蕭騷愁歌白帽清霜逼風捲黄河濁浪髙在野樓臺臨大澤摩天鵰鶚見秋毫射熊戲馬何年事聞道漁陽羽騎勞鄴中懷古漳河清濁太行東此地曾聞霸業隆川岳無心悲鼓角丘原何處問英雄鬭雞閲馬興亡外氷井銅臺涕淚中獨有窣波雲表立鈴音獨語向西風大同曲纒頭窄袖奏氷絲促柱繁聲斂翠眉道是武皇遺樂府一時齊唱玉娥兒沈秀才克家克家字慶仲秀水人徳符子順治中諸生壬午秋雨中訪石齋先生共快其濛雨公來亦自東子輿友天下𢎞景相山中練界千峰瀑松承衆壑風時賢無大小于邁總從公朱布衣扉扉字開仲嘉興人弱齡多病終其身不婚閒賦小詩自娛而已簡吳生自誦梅花人日詩五旬不見但相思一春多雨愁無麥二月輸官定賣絲行藥橋邊逢客返著書牕下少人知近傳孺子司村社想見麤豪割肉時彭秀才孫繩孫繩字子羽海鹽人長宜子少頴異無閥閲氣著有問業居集國初避兵豐山扶母潛匿復出而求父遇害年僅二十六同青雷夜宿雲岫岧嶤精舎倩雲封遥叩禪扉聴晚鐘龍䕶香臺時卧鉢鶴依錫杖欲巢松風泉落户秋生枕寒月凝霜晚在峰夜半梵音清客思起從老衲問三宗戴長汛長汛字澄齋嘉興人有前後征草苕溪漫歩四野干戈急蕭條此地秋村尨吠山鬼水鳥狎溪牛落葉飛重起哀湍咽更流無才堪濟世祗合老林丘胡秀才嗣璜嗣璜字映日平湖人自號蘭菊主人著墨龕詩清絶無㸃塵不屑為外人示也喜雨忽已脱炎氛羲皇我亦云樹屯煙作障溪篆藻成文助懶嗔氷簟分涼頌海雲偶懷青李帖未敢漫書裙古有扇對格偶賦及之自信迂疎不世情遣懷惟倩墨為卿大椿空語八千嵗且及芳華進竹罌弱水縱圍三萬里每從清夢聴瑶笙但能黙坐胸如雪梨棗于中亦漸生雨久雲容何事墨成堆豈有新詩待雨催魚慣淺波驚白浪樹留殘蒂怨黄梅式相好是松根筆可與言惟鵠子杯我欲曝書方數卷啼鳩聲裏又輕雷鄭秀才輿誦輿誦字覺初桐郷庠生世居柞溪徙青鎮下帷寳閣僧院二十餘年著作等身兵燹後散佚不傳同友人分水墩即事半畆花宫一水浮同人乗興共停舟樓銜越浦芙蓉老門接吳雲薜茘幽紅醑光揺鸚鵡醆白蘋風度鷫鸘裘㡬聲漁笛前村晚卜夜還看月映洲附考烏青分水墩萬厯初同知羅公斗築其東有永鎮巷沈貢士嗣選嗣選字仁舉號果庵嘉興貢生乙酉奉母避兵葭川羣盜知為老孝子戒弗犯破産聚書嘗以厯代文章惟南宋無選本乃輯續之其自著曰儉娛堂集卒年七十六私諡孝貞鄉居不識揚雄字無人載酒來閒窗封薜茘仄徑長莓苔啼足鳥飛去落殘花更開悠哉聊卒嵗興到獨衘杯感事長安車馬競通津西市衣冠血尚新白首同歸成底事青山獨往竟何人華亭夜月堪聞鶴水國秋風好憶蓴竊歎當年朱長史可能重負㑹稽薪雜感二首當年曾結竹林盟邑里爭傳月旦評意氣直教周士貴文章能使古人生一從嵗有龍蛇厄幾度春聞鶗鴂聲此日相思弔􅄞阮酒壚鄰笛不勝情少年聲氣接羣英湖海飄零異死生偶簡姓名堪墮淚傳來事迹總關情春風玉樹先賢塜秋露金莖故國城垂老瑟居無客至滿庭衰草候蟲鳴陸布衣森立森立字中卿號嵩石平湖人亷使鏊孫長身好讀書工寫山水吟不甚冨而清婉有致卒年三十九子琰卓亦髙尚能詩錢塘風湧銀濤勢欲狂萬山空自削蒼茫非關客思無聊賴十月天寒正隕霜陳秀才恪恪字子肅一字威如嘉興學生恂之弟有瞿菴詩草九日風雨作風雨淹重九幽人得自娛東籬花罷采下若酒停沽已免題餻字真成潑墨圖登髙何處望新漲滿江湖何畫士園客園客字閬仙海鹽人長於丹青元日幽居鄰碧里淑氣轉青陽老畏今朝至貧看去日長衣裳任顛倒兒女異存亡誰惜頭如雪栖栖當道傍沈秀才中琛中琛字獻臣平湖人中柱弟少有文名晚偕李潛夫馬允培兩先生作方外遊有抱一軒吟稿山中歸晤允培即訂明春入山之期入山尋舊約出谷訪名賢怪石横窺磵長松上拂天嵗時従漢臘耕鑿詠堯年好句春光熳相期潄碧泉仲秋日懷木菴仝李潛夫馬允培聨句賦得南山當户牖用十七篠韻精廬臨澄溪夕陽展晴眺漸覺秋氣深潛夫能令客思渺蒼涼自南來允培蜿蜒還東繞遥青隠雲間獻臣瑞靄浮天表松風到良宵潛夫海日遇清曉一望極平原允培千尋浴芳沼郊原雨乍收獻臣川谷流方淼虚窗接緑蕪潛夫小艇迷紅蓼栖巖淨瘴煙允培開徑移霜篠懷人夢轉孤獻臣傷往情何悄憂來事薄吟潛夫譚罷澆清醥良晤尚可期賦歸興未了允培褚秀才連時連時字青還嘉興縣學生崇禎宫詞日日南薫廣殿風甆缸初進海榴紅新調於變時雍曲詔許中書譜殿中王拔拔字人表嘉興人秋懷天清玉露下寒河連騎蕭蕭薄暮過萬里風髙鷹羽健千家月落杵聲多故園鋤草留殘菊古陌輸租刈晚禾不是秋深貪習靜畏聞野老説干戈吳祖錫祖錫字佩逺一名鉏字稽田秀水人信陵君墓六國安危只繫君握符兩度抑秦軍一丸幾徹函關土五色徐飛芒碭雲未見特牛陳大爼暫將醇酒酹髙墳可憐異代存毛薛徒倚夷門到夕曛朱復復一名臨字瀹六又字載陽嘉興人七夕城頭涼月到溪亭銀漢無光掩鵲翎可怪女牛終古渡不愁化作老人星金甌甌字完城一字寧武秀水人春晚竹杖筠車處處山遊人日日看花還縦然紅紫風吹盡依舊鳴禽緑樹間俞昱昱字宣夏嘉興星河里人父振紀童年𦵏母負土成墳慈烏巢焉至今人稱孝烏塜四旬乏嗣司命錫以多男之兆果連舉五子昱篤學好古有茗柯堂集子夜歌歡來天未曙歡去雲將雨椒子落水中一身躭辛苦知歡是白日一别終夜寒野梅結三子那曉憐心酸吳自求自求字永言嘉善人送唐闇思先生朔風吹雪上征裾去國投荒萬里餘候雁已南君更北不知何處寄鄉書范風仁風仁字梅隠嘉興人秋日村居一川秋色淨蒹葭南浦風多日易斜越客夢隨江上雨山城月照柳梢鴉薲洲有曲翻漁譜蟹舍無人落藕花秋水滿湖閒縦櫂市喧應不到農家吳晉晉字晝三别號謙庭嘉善人題大兄别業阿兄買斷牆東地蜨舞花深署以庵夢叶池塘來小弟坐消秋暑抵精藍杜湑湑字晼實一字鄰若嘉興人塞上旌旗當落日絶塞陣雲横曉角驚寒雁孤煙照暮城河氷驅馬渡隴草遂人行戰骨悲沙漠年年古北平蔣人人字公凡一字昭遺嘉興人惠陽除夕十年當此夕强半在天涯異地重為客殘冬未到家歌聞蠻調苦燭暗海風斜更見梅花發能無感嵗華檇李詩繫巻二十四
