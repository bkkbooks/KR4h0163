body:
  text: 檇李詩繫巻二十四平湖沈季友編國朝秋槐老人王翃翃字介人嘉興梅里人家故業染日坐闤闠間一手挾古今書以觀一手數錢與市販菜傭相應答飲少而嗜酒屏絶慶弔自處名教外為詩文髙自矜許好製詞曲作紈扇記忌者誣以詆毁里紳訟之官家計日落然詩日益有名既遭兵亂多感憤嘆咤見之篇章張深之北方名賢賃居南湖每置酒召客伎樂雜陳翃輒散髪赤足呌呼號嘯雖嚴客無所避人多以禰正平杜子美目之遊山隂與陳章侯善王季重見其詩嗟賞焉陳卧子作序謂有盛唐之風其舊作曰春槐堂集後作曰秋槐堂集共千餘首壬辰舟次贑州被盜皆没於水深自痛惜每終夜擁被記憶後入粤惘惘自失復摭拾記聞作詩二百餘首買舟而北其稿又為鼠嚙不可綴補益不樂四月泊京口無疾而卒友人朱彞尊曽有選抄一帙其弟王庭梓之以傳謂其夙尚沈雄間為和厚幽淡之句不可一類求也田園偶作落日閉窮巷風雨何颼飀沈吟坐來久悄然生百憂自傷曠浪懷苦為衣食謀朝看孤雲飛暮見空江流何能坐成老拔劍當逺遊草草天下人視我如贅瘤宿董氏山房中夜虎渡水溪樹初風生颯颯吹哀湍衆山皆有聲深庭久無月黯然三四星憂人獨求醉釋此離居情牧牛詞二月三月春雨晴渚田水暖芹芽生牧童驅牛出原隰細草青青牛可食夕陽短笛不見人吹過邨南又邨北人有謂余老者感作一身不遇家屢空談詩説劒心何雄少年雖去壯還在出門千里輕飛蓬飲酒多歡俠遊子尋花常宿倡樓中半生為樂不知病兩耳忽患今春聾梳頭遂見髪初短照面恰怪顔無紅往還後生最輕薄笑云似爾當稱翁繁華零落盡朝菌吟嘆啾唧來秋蟲天地那能禁我老文章可惜令人窮一丘一壑幾時住世上豈有真喬松寄沈十二横山生白雲鬱鬱半空起知君住其下獨宿白雲裏冬月靜巖扉寒泉滌心耳嗟余役風塵引領望之子越中送顧偉南相憐俱在客感别此心同前路夕陽外行人春草中到家聞唳鶴去櫂逐歸鴻欲望雲間逺長懷泖水東石城晚眺客心正揺落獨上石頭城天逺垂垂下江寒混混平栁條南北路桃葉古今情況值秋風後清砧急暮聲自感窮老心還拙衰年鬢復斑文章身後事丘壠夢中山遂欲東浮海不然西出關桃源如可問但去莫須還答范遵甫濁酒空懷田舎歌百年身世半蹉跎人歸野徑殘陽盡家在寒塘落葉多好竹不嫌愁裏看名山竊喜夢中過餘生欲逐漁樵去白髪于今奈老何與客話左寧南事長城萬里羡當年楚澤軍容葢世傳三月晴風髙戰鼓九江春水下樓船韓彭心事應難論李郭勲名不易全漫道勤王師獨正江南處處起風煙會稽竹枝荷葉荷花十里勻秋風吹滿越溪春漾舟谿上多遊女誇道西施是越人漂母祠一飯當年報不遺王孫今日更何之平生自嘆無知己千里來尋漂母祠客中九日細雨成隂近夕陽湖邊飛閣照寒塘黄花應笑關山客每嵗登髙只異鄉宫詞三首金雀傳餐百尺樓玉壺催酒醉春遊内中新有良家選背著君王學打毬春半櫻桃萼尚含中宫初命采金鹽近前公主才能語置膝親教誦二南禁中春樹藹晴煙朝罷簾聲下九天官局進呈新鑄好六宫齊賜草書錢姚秀才清清字永伯號毅齋晚號晦菴太傅思仁孫輓總憲劉公宗周元老猷能壯天胡不憖遺鞠躬忘利鈍注意任安危直道輕三黜深憂毖十思時窮梁木壞臣紀獨肩仔丹徒道上有感緑綺青萍泛水涯瀼瀼零露改蒼葭秋原禾黍閒犁犢古陌松杉噪暝鴉㫁井荒碑何代事寒煙野草幾人家十年舊恨渾如夢拾穂行歌盡可嗟陸秀才深原深原字嗣長號芝石平湖人性伉直不能昵俗當弟昆貴盛時泊如也國初棄諸生以詩酒自娛有覆硯齋集過顧茂長丹室記否髫年君已翁不堪華鬢又君同交從意氣由來淡老共披離不厭濃正好破除杯酒内幾番感咤百年中荒蕪留得琴書在莫愛追隨河上公髙秀才維城維城字百雉嘉興諸生其佳句有月色水鋪地雁聲秋滿天蕭然行李桃花渡何處佳人燕子樓為時所稱桃蹊口占水際夭桃紅映白移家欲住武陵源道人笑我多牽殢此是陶潛紙上言寄廬先生施洪烈洪烈字仲芳號寄廬平湖人少受知於學使洪承疇順治乙酉以明經授欽州牧時粤疆未定乃依幕府流寓五羊城衣敝不完并日而食幸以詩見重李撫軍稍稍得衣食一日藩邸張讌羣吏紛集而王所召客惟一施欽州曰今日非宴下吏重詩人也後復授徒龍灘以自給署程鄉篆悉捐里長營辦費及抵欽綏輯流亡録亂兵所棄子女姓氏榜通衢俾其家領歸陞松江同知與提督馬進寳相抗馬故驍將欲以氣凌轢使之屈伏嘗置酒帥府困以巨觥笑曰當令此老醉死明旦令人伺之則施司馬放早衙矣著有詩史集又有粤遊集觀海集雄遊集天中集諸編晚年罷官歸里先君子延至西平署命季友受業焉燈窗雪案古色照人今登師作不禁三復流涕云書懷生年百感餘落落未聞道豈不歴艱辛河流修且浩征馬嘶春風飛鷹掠秋草清夢搖旦昏出門傷懷抱悁悁黄鵠心願依芳樹老何君出扇頭韓仲生牕竹詩率和千尺虚庭影根盤斜石生新篁吹午夢老籜散秋聲月出當軒白風髙入畫清此君終不熱蕭瑟有餘情九日過十八灘遇兵艘連下客路重陽日横帆十八灘濤聲摧壁立山氣助人寒過客迷花渚歸師束錦鞍書生今老矣曾把寳刀看寄懷増江吳友日珠江迴棹十年蹤遥望鱗飛百尺松愛我莫題鸚鵡賦思君重見鷓鴣峰髙樓雨色消兵甲逺樹晴嵐聴皷鐘已奏徳星還聚井應知膝上有人龍諸將四首葢代聲傳漢將營勞臣千載共知名功成東北來江左威服西南重楚荆丞相祠堂留古柏昆明池水失長城即教尚父今猶在無復磻溪釣玉璜墨縗聲振粤江開銅柱親從擊鼓來載奠金城棲鳳驛移封珠户釣龍臺宫庭撤宴投醪賞旗鼓連山拔幟才誰道賢王偏尚武雄風收盡海天回樓船同日泛牂牁勲業平分老伏波已有陸生南粤紀還勞漢主大風歌當年寳玉江聲壯此地珍珠海氣多何事羽林來鐵騎却教鳴劒走關河何人海上氣飛揚颯颯金戈入戰塲一旅忽驚新草木三軍重固舊封疆傳聞羽檄閒書記頻遣梯航抑富商江岸漫勞横鐵鎖從天誰不識龍驤和客子鸚鵡詩憐爾竒毛賦逺思隔窗宛轉夕陽時翻身却稱雕欄小記曲偏憎翠管遲飲瀉銀屏憐客去啄殘金鎖怪人知聰明若被凡禽笑何日開籠宿鳳枝感懷小孤山上大孤山灘下三姑江月灣天柱石峰留客影一肩風雨過梅關彭貢生孫貽孫貽字仲謀號羿仁海鹽人朞生仲子貌魁偉好詼諧口濶而貪飲人有長鯨之目平生恥為齷齪士動以古人自命讀書過目成誦為諸生試必冠軍壬午省試陳子龍已擬元而次塲忽作寒熱不得第遂以貢終有茗齋制藝名噪于時見中原多事凡憂愁感慨一發於文而詩尤工諸體超秀卓然成家痛父殉國難乃蔬食籜冠終身不出往往遊於酒人又喜與兒童嬉戲頗具不羈致所著流寇志并詩詞樂府共數十巻其佳句如包山云痩林時見石渇澗亦生泉雷澤云歸穴龍収雨空梁鸛伺魚山行云山平雲繞碓雨細犢犁煙踏春云柴門細草臨漁歩花塢斜陽隔磬聲有感云十年心事揮杯盡百感身名掩鏡中除夕云行雖負俗猶佳士劒即無成喜俠兒出郭云經旬㫁客鳥窺户三日無詩花笑人海濵云身非鮫客還多淚跡似閒雲只戀山秋柳云少更幾何無奈老樹猶如此可堪人崑崙山云黄精採罷春盈握白鶴歸來雪滿身皆警動可喜陳章侯畫水滸葉子歌張吳顧陸之寫真三子聖矣吳入神吳後千年有陳子更開生面尤絶倫觀其下手萬象變神鬼觸案窺尖新深竒不止在面貌衣摺古硬堆虬鱗丹青所狀必英物愈拙愈秀無前人雄心恠膽破空出思令盜跖張麒麟東京横行草間客三十六彪鬚倒磔宣和佚事譜豺虎稗官喑火揺脣㦸章侯筆縳牡虎髯白黑蟠屈行蛇蚺夜䦨燈火炯蕭瑟含毫細思垂髙簾即今寇盜鋒相㰱煙霧中原亂鳬鴨張曹左革花刺袍安有斯人不弄刀梁山狂兒握弓笑眉髪槎枒山鬼肖邦人鬬虎杭鬭特豬奴棄子今英妙細看繡梓情性深寫盡張角黄巢心真龍智勇猛獸服雲臺畫者曾平林放鶴洲籬落遮樵徑林扉纒古藤入門唯見竹掃葉忽逢僧茶氣生殘竈波光動采菱漁家堤柳外落日挂魚罾建昌城白水横官道青山繞廢城餘民百戰盡落日一江明露下秋菰㫁營空野鶴鳴僕夫已憔悴前路自相驚社日竹裏山堂午後開櫻桃酒熟客頻來社中人少宜添燕春半花多總讓梅晝靜棋聲連竹響香殘雲縷遶牀回塵縁巳絶閒無事抱甕疏畦手自栽春事修篁十个半林茶採擷春菘煮露芽挿槿預為蘭定界補泥纔與燕移家鈎簾忽挂初三月品水新澆第一花午睡未醒山鳥唤木蘭花下日西斜奉簡真長先輩邨居塵氛不遣入田家卧起髙雲至晚霞却病雲煙為藥物忘憂姬妾有名花山林送客猿司户村落無官栁放衙欲訪先生問漁父絳桃樹下竹扉斜春郊四首次百旃韻茗林春雨乍舒旗立望平蕪枝不移啼鴃催殘花萬㸃閒愁費盡酒千䲭柳陰舟小魚髙坐山月人歸犢倒騎行徧空庭無可語深松獨倚聴黄鸝陌上春隂鬭八哥山樊亂落打巖蘿悔隨狂蜨尋蒙叟願作歌鸚度補陀戒酒似糺中執法拈花還禮大摩訶東園新植梨千箇抱耒宜師老槖駝野寺尋僧過午鐘澗聲恰為小橋衝鈎廊屐齒喧于蝶矮竹花房曲似蜂煙樹隔江荒禹廟山河殘畫愴徽宗變名何地堪逃俗曽向臯橋托賃舂花落晴郊舞亂英雙文小鳥呌新鶯船従紅板橋邉繫人在緑楊隄上行擕妓何須呼杜牧持杯且復作劉伶衰翁不預公家事只自酣歌過一生百旃有春郊四首走筆索和意在險字相窘也如韻酬之更選韻之窄於成聲者凡四十餘得長句十章索和亦如之拾橡空山友鹿麏草衣反得傲懸鶉鑄刀潛訪眉間尺賣藥堅辭手不龜紙碓自舂成側理窗梅全乳半生仁海邊白石多堪煮脱粟何煩更指囷草喧二月漸飛蟁北牖疎風面竹斤土甑添薪炊石髓枯毫搨字得顔筋千觴牛飲卑三雅一葉䲭夷笑伍員誰道貧家絃管缺如簧好鳥故殷勤幽塍澗落故喧豗晚劚春田得芋魁一入深林猿拜侣久辭世網雉驚媒雷催蕉葉時供紙雨放燈花未落煤欲訪名山度江去却憐我馬日虺隤舊植蓀荃間杜蘅荒庭鋤穢走鼯鼪酷尋幽壑為量屐時約山樵與對枰睡㫖濃于千日醉菜香清絶五侯鯖閒居早晚無功課不是詩筒即酒鎗聞道鸕湖勝若耶緑蓑煙底友魚蝦新鱗出網分鱸膾野鳥供厨薦鷓羓梅雨一罏桑苧火池蛙兩部正平撾醉眠不復憂天墜鍊石辛勤笑女媧一竿春水緑平篙小築還當舊馬嘷白眼向人髙岸幘青山對我落持螯雨來桑陌收魚笱月上菱田罷桔橰此外亂離都不問麯生惟勸日餔􅝽梅妻鶴子代姬姜種秫無勞典鷫鸘空谷蘭猶香草莽卑巢鳥亦戀榆枋名園洛下輸迂叟美酒涼州羡渇羌惟有此君成莫逆萬竿牕北種篔簹竹花漠漠曳龍而倒拂風前白接䍦香作篆文銘古鼎䦨雕梵字架荼蘼提壺鳥勸添桮杓曳布妻能共扊扅盆景小山堪㸃綴一拳沐雨緑厜㕒欲辭火食採山茅喜怒寧能問衆狙身賤泥塗行郭索骨寒風雪傲林於箋經老去成書蠧臨帖工來笑墨豬晨起灌花添硯水汲泉自滴玉蟾蜍藜羮玉色下春虀飯罷攜琴付小奚身世多虞恒讀易行藏難卜托扶乩漫同荘恵㳺濠上莫以彭殤感㑹稽無可奈何聊命酒不知醉後奪鸞鑱野泛野渡茫茫春暮矣浮萍泛泛去何之迴溪多曲如成字乳鴨呼名自抱兒出處定師髙士傳行藏半在少陵詩桃花應笑人來晚從此垂竿也未遲灌園和李潛夫先生鮭菜長飢未識貧茅堂藥圃各清真庭前拾橡􅆐三口雨後移花月一身門有好山何必畫徑辭俗客自無