body:
  text: 檇李詩繫卷二十六平湖沈季友編國朝南溪學士曹爾堪爾堪字子顧號顧菴嘉善人勲之長子順治壬辰進士選庶吉士兩冠閣試授編修扈從瀛臺南苑世祖褒問諭令與吳偉業同注唐詩丁艱起補轉侍讀旋陞侍講學士轉盼三擢異數也性強記諸瑣屑事能舉其原委人一見輒不㤀若輿圗要害山川形勢指畫􅊏悉聽者神竦當世以大用期之無何詿誤鐫級尋罷官歸而優㳺田園皆二三老友選勝賦詩間為逺遊篇什益富為詩清灑可諷與宋荔裳施愚山沈繹堂王阮亭王西樵汪苕文程周量諸公稱海内八家有南溪集題霜菊卷江南蕅塘涸黑泥埋刺蔆芙蓉褪殘靨蒲萄縛亂藤亭亭古松盖歲暮堪作朋晩花晩唐詩許渾與薛能古銀槎歌贈荔裳長安伏日赤如火曲檻虚亭門不鎻宋公召我園林遊河朔氷盤浸𤓰果山雨忽収賔客至出示酒鎗異恒製枯槎怪石坐神仙周彜漢卣應無二元季巧匠朱碧山市隱臯橋稱絶藝倪黄山水呉興書幾與古人爭位置羣賢驚詫手摩挲神刀鬼斧曾琢磨西郵好貯葡萄酒南海空矜鸚鵡螺至正年間遭殺僇野火燒天烟萬斛内府珍裘裂雉頭舊家寶瑟焚蛇腹獨此古物在人間感慨乾坤同轉轂秘器偕藏埒球貝波斯問價昻珠玉三百年來貴有徴請檢陶家輟耕録亟呼從者傾郫筒恢拓智勇開心胸為慶遭逢落公手甆盌况出隗囂宫兩美相兼且觴月干將莫邪亦神物枕蛇騎虎安足愁讀罷長歌歎竒絶宋公本是神仙才文筆不役人間來何妨跳入銀槎裏御風萬里遊蓬萊鄴城引清漳濁漳注城外城上愁雲大如盖高臺峩峩生暗塵白楊蕭蕭起天籟君不見鄴中全盛時玳瑁樓前珠箔垂南皮沉李公子醉西園樹葆美人隨建安黄初一朝變千載繁華等流電紫狐夜嘯甄氏宫緑草霜凋武皇殿秋風客思眞悲哉道傍疑塚空蒿萊月明繞樹烏三匝猶逐當年銅雀來滄海行滄海晝驚街市空人家大屋火熖紅逆渠奮臂在倉卒屠戮命吏如寒蟲君不見嚴裝夜走沂山脚膠州金錢恣充槖回鞭立破睢寧城浮橋徑渡宿遷郭沸鼎魚遊何所逃勁兵壓陣如鴻毛黄河日落鼓聲絶鯨鯢血赤腥弓刀擒魁方略制俄頃膚功壯氣青天高可知縛虎勢宜亟追奔月没轅門黑俘馘多歸淮海營勾連自絶湖南賊深山羣盜逋天誅招徠解散今有無後事經營貴全勝聞有逃兵在襄鄧韓聖秋過訪奉柬兼懷束雲雛劉潤生客過門猶靜堂空語自深故人同雨雪竒士獨山林樹没秦州逺天低少華陰好音何日慰憶爾對牀吟廣陵懷古何須故老話興亡兵後繁華事𣺌茫䢴水曲流通汝漢蕪城衰草恨齊梁客尋芳榭驚歌斷馬過朱欄識酒香不盡淚㾗傷往跡野桃紅雨溼雷塘春晚柬届甫寅仲緑暗池塘春事稀酴醿染紫木香肥銀紗薄映蜻蜓翅宫粉纔銷蛺蜨衣梁燕去隨紅雨落沙鷗輕逐白雲飛江干何處添詩興芍藥花船泊釣磯寒食春墅糢糊曉雨漫霏霏寒食江邨客正歸杏酪分香茶竈冷麥餳膠齒柘烟微春塘燕子愁相並江店桃花溼更飛如辦𤣥眞青篛笠茜溪東下鱖魚肥無題和王阮亭祠部彭駿孫進士翡翠粧殘睡起遲鴨爐香縷熨相思念珠愛數紅蕉子銀甲愁牽白藕絲綺閣漫矜三婦艷錦衾惟許一人知傷心舊約金尊散寒食啼鵑細雨時元城竹枝詞南方佳果勝侯鯖丹橘黄柑膾緑橙寒夜更添滋味美紅泥鮮筍到臨清衛源竹枝詞舊藩宫殿已荒丘玉蝀橋空水自流百尺觚稜餘碧瓦行人遥見望京樓金陵竹枝詞高館笙歌樺燭紅幾年飄泊各西東秦川公子黄金盡種菜猶栖舊院中天棘條侵舊殿斜秋蟲交語野棠花射生獵盡銀牌鹿誰向鍾山采木𤓰李布衣麟友麟友字振公號于苑嘉興梅里布衣贈衣行梅溪野士嘗衣褐冬亦不加夏不脫已經寒暑六七年領緣不完襟百結沈郎敦友無親疎贈我匹練五丈餘製以為衣見賔客舉止覺與常時殊鄉人重衣不重德談笑從今壯顔色登審山有懷周篔沈進諸子長水通梅里横山近硤川登臨猶可見惜别已經年葉落清秋樹鴻飛薄暮天故人無恙否却望一凄然張太守茁茁字文葭號靜巖嘉善人順治壬辰進士授刑部主事轉禮部厯襄典禮賜金綺廐馬擢知安慶治郡嚴肅上官心折焉有學心堂詩鈔盆柏勁質凌寒雪蒼枝映碧苔纔成方寸木已具棟梁材邵窩老人莊孩思孩思字汝揚晩號邵窩老人秀水庠生莊氏自友仁暨孩思三世皆壽踰八袠舉鄉飲賔故人沈雲如暴露年久其子孤而貧為買地營葬里人欽其高誼有邵窩詩略貧子吟故人之子凄以其捉衿露肘衣離披居無四壁蓬為戸瓶空累日火不炊妻兒委頓饑欲死嗷嗷僵仆誰能支羞將此語告戚屬幾番擬賦招魂詩吁嗟一歌歌聲凉所知曾無升斗移憶昔我友重意氣千金一諾如等夷此道依稀還在人何為今人不古期米如珠兮薪如桂吁嗟再歌歌益悲優孟衣冠學不得何時慰却地下叔敖知送堂主自參十八高賢社何人推道安白蓮開未謝溪水夜潺湲虞美人花放戲拈一絶美人歌罷成黄土今日花開花自舞不信當年泣數行但看曉落猩紅雨偶吟世縁生熟意何分斷壁懸崖總不羣獨有秋空雲外月萬川一様在波紋錢進士棐棐字子輔嘉善人八嵗賦白燕詩順治壬辰登進士築託園以老張麗華臨粧池佳人惜影厭青銅粧罷獨來臨水整迴波兩兩自相憐流入脂香雜絲荇敵兵壓寢碎紅顔鴛鴦乍死清波冷嬌面風來影已枯一片寒煙縈斷梗亡陳豈獨色所為泉咽聲聲怨髙熲君聲玉樹聲未銷馬上已歌清夜永過貢士銘盤銘盤字伯新平湖人京兆廷訓長子少以才筆知名貢入南雍父殁叩闕得贈䘏之典年七十九卒宿望海樓月高長嘯醉樓中微掠朱闌海面風夜半天妃鸞馭去射波千㸃小燈紅附考樓在平湖乍浦苦竹山上海靣静夜紅燈數千飛躍不定土人云此天妃夜巡也徐秀才啓芳啓芳字梅生海鹽人有竹塢集晩霽野遊長嘯天何濶閒遊眼獨明殘霞鳥外落斜日雨邊生不學妻梅隱徒深脫劒情那堪覊旅客向晩聽秋聲嵖岈外史沈棻府君諱棻字子佩號藕菴平湖人順治辛夘年二十六舉於鄉壬辰成進士性英爽喜交游率任本懷不為隨俗軟美之態遇里中纎兒輒嫚罵好窮治酒饌選妓徵歌座客常滿遇友人患難貧乏傾身濟之時三吳多文酒之㑹府君青衫白襪吐音如鐘拂袖作梁父吟覺一座無人乙未對策後又七年授河南西平令土荒民散府君招流亡給牛種諭以歲豐取償免其息民襁負至墾荒數百頃又許以布粟代稅即束麻擔草亦𤨏細不憚煩歲募河夫多逋逃患乃按貧户充役民喜得食且以償稅率爭先赴工工易竣邑衝差徭不時豪強隱蔽多偏累乃按户均㸃一年止役一日歲有餘夫甲辰飛蝗遍野獨不入西平境士民建祠北郊邑有山曰嵖岈因號嵖岈外史府君居官後益復好學于衙舍隙地手植垂栁數株構草堂於緑陰之間與幕中文士乘小駟遊汝墳長林幽寂竟日吟嘯雖山農牧䜿無不熙然于令君之側治聲為中州第一頋天性峭直遇事強項不為屈覊俸十餘年向善病至是益甚卒于官年四十七有柏亭稿二十年來孤兒抱痛敬登遺句涕泗從之矣男季友謹述桞梢行黄河春響走怒濤桃花滚滚飛晴郊軍符如火下州縣河夫隊隊解桞梢前年一决孟津後今年又潰成臯口可憐河上小民家千邨萬落無人守白骨離離棄北邙青秧拂拂沈南畝洛陽諸邑起千夫輓軸牽輪吏夜呼裝成萬束青青樹去築河堤急上途傷心九曲真靈府駭浪何為禍兹土刻玉懸勞堯帝心沈茭難制馮夷舞古道荒凉緑影空滿堤無復舊春風明年古桞重飛翠淚落殘條剩葉中大梁冷雪如鹽衝綉㡌漫漫直走夷門道馬背春寒望眼長花城一抹古大梁山帶横腰殘靄白河聲出口怒濤黄吾思昔日魏公子結客翩翩到街市十萬秦兵夜叩關錦袍壯士因誰死更聞好士梁孝王座中翰墨生古香兔園花草平臺雪詞客紛紛各擅場太息髙踪杳難作長街廣陌春風惡沽酒亭荒翠幔低折腰人笑青衫薄傲吏鞭絲怕軟塵那􅍆憔悴過三春斜陽終古消魂事汴水飛花亂撲人汝南道上籃輿來去日愁向積陰繁橋没多荒徑鷗飛失故灘秋因雨易夕水繞俗加寒比戸荒煙裏何人駐馬㸔季秋偕雲馭田子三兒泛菊劉文學山莊同宴者薛廣文秋林風日好來赴逸人家已對伯倫酒還思陶令花客情縁少長吏語自烟霞更喜薛夫子清樽共物華寒食祝奠先慈何處芳原問傷心南望時由來泉路感重繞白雲思杯薦他鄉酒花開舊日枝惟應歸路近灑淚滴松脂信陽山行本是青山路如何黄綬來途應知馬老花似笑人開郭近千峰斷淮通一水廻行行吾欲賦畫角轉相催申陽寗吳二寅長見枉留飲客舍誰相賞還欣二妙逢長歌惟寗子治行有吳公並繋花前馬如聞松下風清宵凉月裏莫使緑樽空送陸藍田同大兒南還因憶藍田尊人吾已倦遊久君行復此來早隨春雁至猶及海榴回客路河橋晩故人鄰笛哀歸途欣並轡終愧阿戎才章遠南歸骨肉誰能問常時獨爾從貧眞同落葉賦可泣秋蛩殘月闗河路悲風弟妹容思歸我已晩何處有芙蓉㴠輝入都不果送其南還未久便為别知君難遠遊因思張翰鱠不上仲宣樓小雨梁園夢蘆花吳地秋相如詞賦好終是攬皇州送六弟二首未有寧親計因風賴汝歸同懷陸氏橘猶愧老萊衣夜月鴻難聽秋林葉自飛倚門方念遠驅馬莫教違連枝能幾日戀别竟如何客在依花蕚人歸落芰荷秋程風雨易旅夢弟兄多珍重出門意還時且嘯歌皐旭自都訪我因從歸里詩以送之凌雲久已賦今始上金臺為有故園思還從訪戴回客心殘墜葉秋徑老莓苔陶令歸來後寒花更幾開同三兒雪中行汝南道上朔雪晨行集無邊已道周何人茅屋問著處野僧留帶怯東陽瘦寒深稚子愁長年飄絮裏只自愧閒鷗酬吳洛陽鴛湖相望地出宰舊西京嘗念吳公守多慙許氏評春田誰雉乳花縣自鶯聲撫字今難問能無同病情三兒歸詩以遣之望汝成歸計汝歸又繋心雖然春草路多恐曉寒侵藥為長年採門須問世深客亭今夜月猶是聽猿吟宿信陽山寺山城知不遠縁暑漫停茵舊寺僧何在征途老易親栁低堪繋馬螢細只依人無事問禪榻浮雲久此身東郊偶步至寶巖寺冬林無勝賞猶欲問原田日靜寒雲裏人衰落葉前依禪還舊寺訪俗少新烟惆悵斜陽裏從今已幾年西平咏古八首柏亭春靄封國貽來久鄉亭望去新風清山郭曉雲度野橋春雞犬遥連楚桑麻宛在秦行車長駐處爭識種花人雲莊雪霽四望白皚皚高風下石臺官橋氷未合汝水凍初廻峭壁參天影窮簷負日開自憐能掃雪不向洛陽來周泊漁歌碧水横梁筍青絲展釣車空邨聞櫂唱前岸有漁家夜雨流菰葉秋禽起蓼花江湖吾有興何必上仙槎義岡牧笛入世懷良友長貧感素心非時猶韞玉何地好分金細草全披徑斜陽半在林悠悠牛背上短笛是知音龍淵夜月灧㶑棠溪水蒼龍起石磻青葱蓮葉劒紫氣繞河干利器藏歐冶前朝慶鐡官清光千萬里𣺌𣺌向誰㸔粧臺野雲贈佩天邊杳支磯石上分荒臺銜晩照滿眼散秋雲磵蜨銷紅粉山光掩翠裙孝思如可問吾欲一逢君鄧陂澄波太尉多遺跡中原感廢基當年曾伐蜀此地早開陂迤北平田濶征西返道遲汪汪千頃在為爾更追思郅塚烟樹荒壠迷春草高丘帶夕陽我來時下馬一拜郅君章史誌鴻名舊碑銜螭首長蒼茫烟樹裏父老向蒸嘗九日因積雨不赴登高感懷之作揺落頻驚節候催况無霽色可銜杯憂時祗有愁霖唱對景何心九日臺雁向霜前難聽遠花從開後未歸來田家禾黍今何似莫上高城極目哀感署中栁垂來舞袖已蹁躚因憶青青長客邊幾樹籠煙斜月夜半簾臥閣夕陽天歸思久逐陶潛賦老去空懐張緒年今日春城憔悴甚何當葱蒨日三眠遂平道中當時攬轡已成蕪極目蒿蓬更問途三户殘黎歸業否六條法吏盡心無月髙茅店聞雞少人去荒原斷雁孤亦自勤勤思撫字自慙拙筆未能圖申陽感事荒城已分一枝安何意還驅征馬看本是盛朝新制節猶傳憲府舊旌干停杯客裏知誰問行路人間覺更難多少巢由車下拜青衫幾溼不堪彈信陽寓何翀六書齋幾度停軒舊此亭疎簾清簟夏還經不辭愛竹王猷看遂有新詩水部聴夜色閒來惟小樹春風散後自流螢物華是處須當賞煙月何心老客萍渡河子規聲裏走天涯解纜津亭日又斜果爾飛流同水箭剛逢積雨漲桃花平生忠信誰相許身世浮沉自漫嗟便擬維舟貰殘醉荒烟漠漠楚人家九日病阻登高幾逢令節重徘徊病裏閒情只緑苔問俗已疎禾黍外寄身合向藥苗栽猶存瘦骨衫香落始過荒亭雁影來楚客今秋思更苦望鄉猶阻舊登臺秋夕病懷葉丹苔碧總佳辰零落秋容自苦辛久分去官同栗里寧知多病老漳濵宵清只聽莎雞泣芳盡空憐蕙草春我已東陽孱瘦甚柴門難緩舊松筠送寗遂平歸養君恩幸許綵衣裁良友于今勞溯洄畫省雖分行雁杳河陽猶奉板輿回家臨晉水魚因出人到春園萱自開我亦庭闈遥在念吳山彌望白雲來送友人南還瀕年薄宦涉風塵又見春回楊栁新何處易銷潘岳鬢河陽縣裏送歸人庚戍早春有以官梅一枝獻者感其江南舊種浩然有故鄉之思乃援筆漫吟以寄意焉日落孤城走玉塵誰家長笛弄寒頻隴頭一夜東風𦂳愁殺霜花㸃鬢人蘂冷枝寒我欲愁折來還向膽瓶留小梅也是傷南客一様春風説倦遊陸參議光旭光旭字鶴田平湖人順治壬辰進士由保定知縣擢御史言中機宜而議廵方一疏尤侃侃不事囁嚅遷冀南道服闋補江安糧儲道為羽士朱方旦波累徙謫以終春日同顧雲馭登靈鷲畏折尋山屐春光我負多關河悲戰壘天地老烟蓑鶯咽殘枝雨花寒夕照坡浮雲堪極目何處可狂歌和東坡西臺簡子由韻寄永錫弟黑地沙寒草不春骨肌銷盡伏蒲身題襟空負􅍆生友泣血猶存誓墓人敢冀九卿疎漢法從來三宥出堯神與君未了前塵事夜雨青山續舊因嚴柝森森氣慘凄為㸔書牘幾眉低風霜斷侣廻峰雁形影難棲折肋雞遠塞每傷驢背弟故園何處鹿門妻寒蛩昨夜啼殘月猶夢疎鐘出掖西蔣涇縣雲翼雲翼本名㑹貞字鳴大嘉善人由府庠中順治甲午舉人任江南涇縣知縣無題粧成十五盡長眉碧玉𤓰期未有期新蜨愛花常䕶粉春蠶獨繭漫抽絲不㸔湘竹愁仍結即化巫雲夢豈知惆悵臨風無限恨明璫何處解相思甘山居士于琳琳字貞瑕號甘山平湖人嘗承父志述三易得習學九卷廣變四巻象告二卷皆原九圖之意以立言生平好接異人上至天官家言下及地理諸書以至馬杜二氏之學靡不精妙通繪事善行楷若擊劒談兵諸技時亦為之晩年忽盡去其學發梵經大藏俛首沈思疏註楞嚴法華華嚴諸部棲遲精舍累月不去啖菜飲水居然苦行卒於康熙庚申年八十五有香祖庵草雜詩灼爍健少年匹馬彎强弓橫視藐四海焉念江上翁老翁仰天嘆白日西欲東我昔十七八目亦無飛鴻上馬舞雙槊下馬賦秋風倐忽年嵗移頹然不復雄為我謝少年日月如飛蓬贈鄭兩為備兵西寧南歸里門建牙開府黑山東此日聲名在五戎苜蓿花濃宛馬健蒲萄酒熟戍樓空風髙吐魯驚傳箭雪滿蓬婆競挽弓生入玉門班定逺何人重報月氐功咏夜落金錢花二首深紅㸃㸃映重茵開到金錢花轉新夜静露濃和月落明朝愁殺採花人輕花灼灼葉田田午半平開近綺筵漏永不聞妃子嘆誰家撒得洗兒錢施訓導鋐鋐字公逺平湖人順治壬辰恩貢任義烏訓導奉裁補平陽以母老乞歸居喪哀毁庭産芝草人稱為孝感云望若耶溪苧蘿山下若耶濵越女如花貌勝春一自五湖烟櫂去月明江上有荒津和王文老手談韻玉局丁丁興未休隔垣微聴子聲幽金門不召羊𤣥保聊與松陰解客愁曾舉人畹畹字庭聞寧都人客至之寜夏衛以商籍舉甲午賢書奡兀負竒足迹遍天下初入淛與秀水陳莢交善常至其家康熙甲寅闗中孫伭伯守備平湖乍浦挈家口依之居二載徙通州卒歸賦中原飄泊久親老且歸耕井邑無安土山城尚甲兵霜花餘䉀畝風雁走河聲子弟不相識呼童數問名別鴛水陳堯夫世亂誰知我人猶不識君豐城老劒氣越俗總浮雲舊國三春異他鄉一夜分封侯寧有命坐笑李將軍沈教授煌煌字火文嘉善人明季文弊競獵六朝煌昌明程朱之學設席敎授負笈者三百餘人學者稱𢎞益先生順治甲午選貢不仕終有𢎞益堂稿國學觀禮聞雅頌辟雍尊首善逖邇利觀光胄教䕫初命賔興旦再颺威儀開萬域耳目聳遐方道式先儒重文隨聖代昌上丁期合吹二酉聴翺翔釋菜因周禮歌芹撰魯章一牢傳漢祖亞獻憶唐皇肆俎推前席燔柴降内香朱絃流挾瑟彤管佩循墻振步依庭鵠聞音覿望羊耑家求戴聖釋句仰毛萇天子䖍蒿柱名臣出柏梁篆分白玉署簾隠紫薇郎振鷺西雝潔鳴鼉東序喤耦三延矍相更五祝膠庠兄在通侯侍師嚴髙弟彰中原無棄植小草總承筐啟綘欣聨鄭解頤争說匡性情深誨迪氣運奕柔剛虎觀忘同異龍門疇頡頏質疑勤負劒請業敢登堂于邁從公飲陳常遍爾疆候塵應執御濯徳詎施觵闕里麟遊近尼山豹蔚長茆澄圓沼碧桂拂閟宫黃稽古桓榮座箋經頴達牀瓊花連散髻羽扇映絲韁階戺紛干戚邉陲靜斧斨聚奎驅野馬倬漢掃貪狼惟有言靡憾誰云讓未遑蕩平知會極作述佐垂裳玖珮偕鵷鸑簫韶集鳳凰金臺倘擁篲石鼓勒星霜寄贈止岳弟刺史粤東竻竹城邉試錦衣爛柯山下草初肥春風㡬夜吹鄉夢逕傍天南一雁飛天啟宫詞二首豹髓燈懸鳷鵲紅鑾輿宴罷帶雕弓敕教繡鐙三千隊共赴西園看射熊内監傳呼謁聖人押班紫袖學稱臣近来喜黜毛延夀天子臨軒自寫真吳仲子蕃昌蕃昌字仲木海鹽人忠節公子居母喪哀毁而卒再經雞山酬開美祝子送子清溪月當時鴻雁歸今嗟芳草發長與古人違雲冷青蠅散林空白鶴飛山陰囘首裏同此一沾衣過南郭江道士舊居水漲蓮溪館秋風自掃除野花埋石鼎閒月照金書雞犬當時宅蒿莱此日居還山何處是招我白雲車中秋病作病骨秋蓬似迎風欲共飄白雲千里薄黃葉一城搖月滿山庭舊蟲鳴玉露消客誰陳七法空憶曲江潮吳市重逢陸大立頃有贈西風暮雨下滄浪短鬢黃花並有霜一問故人多宿草再来歌地是衰楊平原舊客今誰在伏勝遺經半未亡還取青尊盡疇昔月明重與向山塘吳秀才謙牧謙牧字裒仲海鹽人生蕃昌従弟亦以母喪哀毁卒里人並稱孝子有困勉齋藁谷水歌雲峰九十九蒼翠滿山松借問清秋月先縣第㡬峰我登湖上樓湖上秋風發蕩搖湖水光欲墮雲中月王秀才之圻之圻字肇域嘉善人明季稱詩者率宗竟陵之圻力持風格従粤東歸手一卷詩曰嶺橋山水盡在我奚囊中矣其曠達類如此年未强仕而卒有鳴鶴堂稿悲歌道逺不離刺心立談可期白首結交何多以彼富厚今日黃金盡明日猶相知斯人果安在出門欲何之鸜鵒歌涉溪買鸜鵒羣笑王生癡萬里相攜走庾嶺千金不易連城姿一眼五色光催璨山人愛殺爭題詩君不見陽翟賈揚鞭走馬南越逵詡詡陸賈橐中貲明珠不售翡翠死何如端州採石兒人生要在有逺識多忮多求徒爾為錢處士鴻鴻字羽可號若菴海鹽人陞之子築室宋湖好行其徳鄉人私諡貞毅有撫松居集尚胥亭上步月荒亭寂寂倚胥川野曠應知受月先光湧人如天上坐景浮橋似漢中懸珠藏釋底明生夜水並江心味入禪莫道孤忠徒自苦海濵祠墓至今傳附考尚胥有廟有橋在海鹽縣西北十里並其兄尚祀焉越絶云耕於呉之南鄙城即其地旁有望珠亭賁湖秋望賁湖地僻宋邨名荻月蘆風秋自生蕭寺僅存方外想野航恰備畫中情繡衣墓頂松猶挺給諫塋前水獨清可但曾孫懐祖澤隠淪多尚話先生附考湖在海鹽縣西三十五里一名宋邨湖俗名宋坡湖錢給事彭侍御墓在焉舟行鸕鷀湖萬頃波平綠漲濃祠開黃道正䝉茸占来澤氣常疑雨聴入山風已逗鐘短屐便將尋紫峽輕帆忽復指青松此中好景偏宜夜莫阻遊人月下笻附考在海鹽湖濵有黃道廟隠見峡山西出為青松塘土人云峽山鐘聲至宋湖吕塜間則天必雨張華亭超超字伯升號檗持桐鄉人順治乙未進士華亭令秋夜聞隣姬鼓瑟露冷梧楸玉杵催誰携寶瑟漫徘徊無心自譜鴛鴦曲有意偏添鸚鵡杯拂拂梁塵飛綺柱離離鳳影落叢臺髙堂夜永清暉徧疑引瀟湘帝子来張醫士逸逸字泰菴嘉善人精岐黃術善撫琴工詩好畫山水有日休堂詩烟雨樓樓外笙歌列畫船湖光春色總堪憐遊心不待壺觴醉寫景難將水墨傳晴浪忽飛千尺雨逺邨常帶㡬分烟斜陽乍向層城下月色無塵到檻邉何通政元英元英字㽔音秀水人順治乙未進士由行人厯户部郎督理大通橋監通州糧漕弊盡剔以才望選授御史封事甚多皆闗大政康熙癸丑視鹽河東内陞厯通政參議乞歸生平慷慨急人患難性好客珠履常滿酒鎗簮珥時在質庫中不悔也予慨當世士大夫嗟卑患貧作自了漢羞與寒士為伍其猥瑣鄙屑之態豈堪令雅人見之如先生者其今之廣陵散乎送楊武部奉使交趾甲帳雲従象郡開日南驚見使星来披誠自有珊瑚樹懐逺猶存馬援臺澤徧雕題蠻獠舞檄傳浪泊鼓鐘迴佇看萬里圖王會漢殿真儒諭蜀才陸知州翔華翔華字季冲嘉善人順治乙未進士授鬱林知州再補廣徳均有惠政及人竹原過初傳簡張騫已拜侯一叢枝更密千畝節還修樂向𤣥池春音従嶰谷求離離芳實好只許鳳凰遊周御史宸藻宸藻字端臣號質菴嘉善人順治乙未進士選庻吉士擢御史有直陳漕規𣙜稅等疏視鹺兩淮盡剔諸弊旋遭遷謫認工贖免歸里後與錢龍門孫子毅曹顧菴郁衷恒沈止岳盛筠齋輩仿耆英㑹以詩酒為樂有柿葉齋自東客遊諸詩張稺恭中翰招同髙念侣副憲王蘭陔水部湖舫宴集晴湖如練水雲收畫舫相携興自幽幾處柳陰浮緑蟻誰家花影傍朱樓囘思聚散憐佳㑹過眼風華感昔遊搔首斜陽頻悵望乾坤何地是滄洲秋懷憶昔曾看禁苑花恩深寧敢效懷沙病收陶令三秋菊貧賣青門五色𤓰丘壑道存惟我輩江湖歸老已無家不堪往事空搔首獨立蒼茫起暮霞春風幾番花信扇微和繡陌紅樓處處過可道玉闗偏不度如何吹入柳條多楊知州應標應標字勝林號南城嘉善人順治乙未進士除江南寧國府推官缺奉裁補江南溧陽縣令再知河南鄢陵縣事皆有政聲陞雲南劒川知州抵貴陽以病乞歸有永思堂集静夜吟夜久羣動息秋潭冷素心推求往古事厯厯羅胸襟守貞道所貴囘遹衆乃任滔滔江湖流一往不復禁窮巷罕過轍寂寥鳴素琴長松挺孤秀何憂霜雪侵辛酉初春王師將定滇南奉命出守劒川蓼亭陸先生以詩見贈次韻三宰風塵吏恩綸奉逺遷従戎關索嶺解渇水香泉萬里馳邉月孤鴻泣暮烟才非漢司馬白雪愧稱賢東明河上口占重重堤岸繞東明盡是黃金力築城不用防河桑柘滿老農帶月荷鋤耕項侍郎景襄景襄字眉山錢塘人秀水籍順治乙未進士厯官兵部侍郎長安竹枝詞敝裘冉冉帶風輕絮逐官河栁壓城䜿子提筐如百舌春來惟有賣花聲題畫閒來結得小茅亭但識烟雲月露形厯日不書藤葉紙年年只記栁條青顧艾艾字病已嘉善人送魏廓園公被逮我髪未燥聞公名私淑于時夙仰止寛衣大袖以布為孤耿知為天下士七載孝廉無所資飦粥星星藉臯比進賢冠著才十年危言危行直如矢至今萍梗無定居圖書幾束同轉徙哀哉失守先人廬三遷隨母為鄰里兩家貴賤隔天淵一様蓬門對秋水耳邊隱隱聞咿唔公子挑燈課青史窗前扎扎機杼鳴夫人織素頽垣裏含飴未得弄文孫驀地從天下嚴㫖赫赫天王自聖明草莽何人敢猜擬萬人擁哭動地來塞滿通衢不容趾夫子拂衣剛啓行一路追隨紛若螘長跪聽詔何從容枷鎻風吹動蘭芷炰烋緹騎如虎狼見此傷心涕瀰瀰低眉翻作柔軟音可見人心猶不死我之熱淚不浪彈此番屑屑竟不已不為夫子一身悲夫子致身應若此最傷不自我後先國步斯頻目其否滔滔皆是等流泉淪胥以亡孰為砥吉凶此去未可知擬將氣運卜夫子可憐一寸地上語九萬何由達天耳計舉人東東字甫草呉江人嘉興籍拔貢順治丁酉順天中式以高才而久困公車有問亭集行世鄴城弔謝茂秦山人鄴中懷古正秋風詞賦由來謝氏工生欲移家辭白帝没隨疑塚對青楓諸王禮數何常絶七子交期竟不終自是貴游多薄倖布衣何必歎飄蓬哭侯朝宗壬辰夏予遇朝宗于嘉禾主客不及通一語而别丙申冬予游宋則朝宗死二年矣為致生芻哭之生前恨汝非知我死後慙余一慟君今日風流推大手他時憑弔在遺文馬蹄遠踏梁園雪劒氣遥横少室雲磨鏡相㸔千里外此中誰許結殷勤葉主事封封字井叔號慕廬嘉興人以父官楚遂入籍中順治己亥進士除登封令入為兵馬指揮遷主事未任卒盧巖觀瀑布山窮壁立劖崖岸如懸大瓠刳其半瀑水遥從雲外來風雨蒼茫吹不斷晴嵐晻藹秋復春霏微淅瀝無昏晨亦覺輕陰散霡霂逶迤石罅生粼粼爾乃滿盈雷雨作喧豗淜湃傾叢薄崇朝霽色洗芙蓉萬丈銀河自天落北望羣峰隱若蹲驚趨哀壑爭飈奔滄溟潮生浪花白騰波急溜衝雲根碧崿承流湱欲潰氷山乍倒璚枝碎玉龍被剸鱗甲摧激怒難回亂飛墜從兹直下埀天紳建瓴之勢無停輪纍纍小珠大珠墮崩濤積雪浮松筠曦暉照見閃虹電雲彩徘徊淨霜練微風忽度相欹斜細雨輕烟拂人面仰觀不足常淙淙厥狀非一難形容晝暮陰晴亦屢異窮工極態烟光重越昔盧鴻宅其下翠庭樾館何瀟灑巖因其姓以為名高蹈應空後來者君不見龍潭石淙皆絶竒竒在嶙峋水挾之盧巖之竒獨在水林壑藉以增幽姿况且嵩中水泉少潺湲不絶無如斯曠然疑是别天地胡勿於此誅茅茨吾將老矣始一遇樂此忘疲忽天暮扶笻出壑久踟蹰猶恐濤聲在深樹大仙峽絶澗通幽徑扶笻擇步過高厓危下鶻重磴曲如螺雲破鳴泉落春寒賸雪多誰言中有地不識在山阿沈知縣兆奎兆奎字崍源桐鄉人順治己亥進士江西饒州府德興縣令初構草舍呈東山隣友六載波臣信所如蕭然蓬蓽是吾廬幾行斷鴈風高處一片閒雲海曙初性僻正宜君輩友時艱并與故人踈榮枯却㸔柴門外好傍昭靈賦卜居邨有昭靈祠支教諭隆求隆求字武侯嘉善人大綸孫順治庚子舉人領教嚴州遂安有閩遊偶草浦城水次怪石瀑泉驚人萬狀嵯峨經千里欵乃復聞聲塊壘胸中伏巉巖波裏行羊腸世路曲雞肋宦情輕一葉舟如寄將心照水盟王經歴辰辰字天市嘉善人順治庚子舉人任直𨽻保定府經歴幕府趨走非其好也晩眺平臯時極目客思自依依沙雁衝人起城烏繞樹飛林開秋色遠山逈夕陽微薄暮行吟罷歸來獨掩扉嚴進士勲勲字扆臣號少華秀水人順治辛丑進士與兄觀弟臨主盟越壇者二十餘年四方有嚴氏三昆之目感懷世事如江湖下流不可挽百年㑹有盡憂來車輪轉所幸天意微倚仗非人辨菀枯時代謝狂且恣驕蹇山水有傾頽哲人戒盛滿秉心察淵妙空洞莫能衍平波起激湍坦途藏科坎日月運灝濛世變日新舛所以古達人行歌以自遣牧豕行淄川老翁善牧豕朝朝暮暮豕邊伺天子一日詔書下老翁杖䇿君門試天子顧之顔色開待詔金馬何雄哉抜起草萊事明主長辭爾豕心徘徊老翁曲學世所賤老翁致身㨗如電峩峩丞相踐台階列土平津重主眷東閣詎有賢人來分茅曾未由折箭君不見廣川醇儒董仲舒江都膠西遍曵裾又不見濮陽名卿汲長孺淮陽卧治泣如雨公孫學術殊不同天子親幸全初終區區豈因對策工轅固老人洵㝠鴻九日懷覽民弟黯黯登臨日蕭蕭風雨來愁心馳冀北極目望金臺遊子悲揺落窮途哭草萊鮫人珠的皪荆客玉摧頽造物殊無意乾坤棄不材浮名消歲月事業等塵埃躑躅燕山道徘徊易水隈黄金知已罄白髪定相催迢遞三千里凄凉九日杯壯心雖未擲落魄實堪哀對菊應多恨悲秋賦必裁親知多不遇襟抱有誰開殳山人丹生丹生字彤寶號山夫從桐廬居吳久之後徙嘉興盛澤三年復遷嘉善蔣湖亦三年每作小賦得漢魏人風骨詩亦雄快晚年無家徜徉五湖以終乙將軍歌題劉公㦷所作傳後乙將軍眞天人烈如南霽雲又如雷萬春冒重圍入孤城出孤城部領二百騎出入風雨旋雷霆誰能從之曰張衡將軍起列校主將䧟陣單騎抜之推主帥上馬短兵接戰身步行乙將軍眞天人初𨽻黄得功後𨽻史道鄰面中飛矢屹不動揚州化作睢陽城將軍戰死舊城下誰能傳之昌黎文余學畫于湯子三年見其畫水入妙自謂頗得其意作畫水歌宋公畫山得山骨五百年來紙猶溼米公畫山不畫山晴天雨天推烟鬟湯子畫水亦如此十日五日袖五指忽然倒峽與奔流幻出澄江對窗几畫濤畫雪兼畫氷低頭聽之聲泠泠老人事過即忘却惟此欲忘心不能古來多少餐霞客誤落塵中人不識湯家水米家山只在虚無縹緲間説與世人皆大笑五百年來稱二妙送徐臞菴遊天目二首送君西去踏丹梯直上青天白日低雲海茫茫㸔不辨一條界破是苕溪千峰竹共萬峰松古寺門前布虎蹤惟有道人逢客至登樓一打報山鐘初陽子顔鼎受鼎受字孝嘉自號初陽子桐鄉人少以孝聞九歲得句曰輕風揺翠竹微雨滴黄花為諸生遊楚遭亂避跡為黄冠歸卒有嶧山堂半樂亭詩田家女兒行田家女兒年十六賣作青衣向人哭自言數世居南邨紡績為生治杼軸去歲田荒稼不登一春八口無饘粥今年官稅急難供東西呌號驚里族𨽻胥門外呼一聲雞犬倉皇上牆屋小兒聞之走牀下老人見之徒側目向前哀告且莫嗔朝來女兒還枵腹本欲留君無一錢脫粟不能况酒肉白頭老翁筋力衰此去何堪受鞭扑願鬻此女為人奴老人幸免捐溝瀆託身無過錢千貫待價豈期珠百斛提籠採桑憶昔時短髪未許施膏沐歎息此夜朱門深老父不知何處宿高堂置酒歌者誰華筵夜半鳴絲竹閉戸那得聞呻吟多少離魂依草木爪牙之吏虎而冠讞獄未終問錢榖孤邨茅舍烟火稀深山曠野虚樵牧里中健兒從征徭三年不歸如逐鹿太平天子昔何時稻粱初肥春酒熟好雨既至農桑閒五月蠶繭成衣服于今十室九已空弱者死亡強者戮吁嗟乎此生已矣勿復言吾將歸去青山飯黄犢送敬可之金溪銅井山回昭武城金溪水落贑江清十年短褐渾無恙萬里長風在此行客邸浮𤓰應共醉官衙借箸早相迎麻姑壇下逢仙侣試與狂夫説姓名暮春遣興時節催人到白頭蘭亭禊事好重修世情可信門前雀物理無疑海上鷗岐路不勝楊子泣高天尚厪杞人憂緑陰漁市傾壺醉莽莽乾坤一釣舟贈錢三聽雨空堂一酒尊黯然何地不銷魂㸔人虎步爭當路老我牛衣獨閉門採藥山中新隱士射潮江上舊王孫燒燈夜半聞高咏故國風流此尚存題畫江邨無事一漁翁閲盡風波意不窮今日也因魚稅苦持竿逃入畫圖中張進士嘉瑹嘉瑹字文須號搢葵吳江人徙居桐鄉青鎮順治辛丑進士候選推官未仕卒同赤溟表兄過檗持兄齋㸔菊相携訪菊每淹留㸔到高齋興倍幽君亞淵明能嘯傲我慙平子賦離愁一簾傲骨爭為傑四座清芬况是秋漫說東籬多異種依然花縣舊風流徐秀才震亨震亨字東旉號乾一受知於學使黎元寛年十八補弟子員後築室青鎮芙蓉浦顔曰溪南草堂著書十餘種有聲最齋集西溪雜咏長林銷夏密印八景之一晞髪行吟日正長桐花落盡又新篁雨餘絶勝探林屋風散渾疑倚石牀空翠飛來衣欲溼緑雲移處屐生香扶笻老衲盤根坐聽到黄鸝晚更凉曹封君爾坊爾坊字子閑嘉善人勲仲子髫年應試宿儒不能及太史劉正宗胡世安皆稱江左曹生工詩兼善繪事子鑑倫康熙己未進士官翰林題東干小普陀佛閣曲曲廻廊映栁閣探幽幾度到香臺九峰晴黛横窗出三泖春波拍岸來深澗黑腥魚噴藻遥堤青溼鷺行苔詩成不盡登臨興題壁慚非工部才邵學使延齡延齡字大年號靜山平湖人順治辛丑進士由中書歴陞部郎督學江右所取多知名士歸里卒有耐軒全藳東海有迂儒用持國韻東海有迂儒日坐詩書側自誇識之無鑽硏似蠧蝕埋頭目光短几案塵弗拭沉思茍有㑹或歌或嘆息敢謂性禀愚難忘祖宗德詩書本舊疇竊窺聖賢域所居雖海澨頗稱冠裳邑甲第鬱相望近頗推名國使非眞有得冠裳亦羽飾所以三十年朝夕常歉灰縱能明大意健忘非鐫勒苦無師友資落筆鮮竒特興到輒一鳴素紙染其墨上下千百年柔腕乏筋力流覽鼎彜文矗矗珪璋植學古乃有獲從繩則木直稍稍髣髴之古人𣺌難迹有志恨不逮撫膺徒愾惜如彼寫倣童未能端㸃畫何時窺藩籬一一辨白黑摶沙不聚黏畫餅難充食援筆不肯停徒為人譏忒終以古人師今人未可式如入寶藏中珠璣紛紜積隻手自選攜蛟龍不敢擊况為師儒官詩書固其職南面操鑑衡進退動千百自非規矩精遂令衆匠惑子史為旁枝六經為根極勉旃勿敢渝寸心明得失讀康節公集偶賦午㑹於今晷未斜先賢皇極世爭誇空中樓閣非忘物書裏漁樵自一家易契先天理有數詩傳後葉正還葩天根月窟由人悟且坐春風㸔好花題沈南疑紫茜邨莊圖用茶星韻欲避風塵丘壑宜竹窗桐屋每相期鳥啼花發尋賢主酒滿茶清趁好時鄰寺月明㩦伴早緑溪舟小過橋遲南園北陌空惆悵記取邨莊紫茜詩吳給事源起源起字凖菴嘉興人鑄子順治辛丑進士官禮科給事和江觀察在湄原韻之二喚得輕舟泛日斜滿湖烟雨目重遮有亭竚想當年鶴無路追尋處士花遺跡半銷名尚在登臨已徧興還賖與君再向勾留處百尺樓頭數暮鴉濮布衣淙淙字澹軒號贊夫桐鄉濮院人賣絲於吳市順治初室遇火身入烟燄中扶二親以出耽詩好友有半間樓浣雪居月巢蘧園諸刻嶺南人多購之同靜菴步山塘遠客閒無事來過野店家一春三月酒七里半塘花梵閣銜斜照溪雲結晚霞過橋新栁暗烟羃釣魚槎過瓢隱探愚公未回别疑經歲久荏苒一春過但恐閒時少還憐去日多門開蛛脫網簾捲燕投窩試㸔莓苔色青青厚幾何魏秀才允桓允桓字虎臣允枚弟補邑庠生事母至孝工文早世門人私諡孝莊病馬病骨崚嶒苦不支小時亦想効驅馳曾無伯氏才空老縱有蒒翁遇已遲嚴策怕增新慉結横行羞露舊權竒寄聲好謝蘭池伴此日驕嘶更向誰陸教諭瀹原瀹原字嗣暢號岫丹平湖人少有文譽晚年教諭臨安被放宦途寵辱未須驚歸去南山尚足耕眼底誰青與誰白胸中無我并無卿柴門候月惟搜句竹逕迎風獨舉觥栩栩北牕高卧穏折腰久已薄時名嚴舍人臨臨字覽民秀水人勲之弟貢入國子監康熙甲辰考授中書舍人卒于官送張牖如南歸并訊同學諸子君向金臺好上書翻然南去更何如定知詞賦應陪輦嬾託文儒漫曳裾秋雨鄉關隨早雁江程甘㫖及鱸魚吳門老友恒相憶不見瑶華一問余朱秀才茂晭茂晭字子蓉號東溪秀水人陶情詩歌專學太白有鏡雲亭集古風孟冬朔風興橘柚落華實凌晨閲塲圃穡事已麤畢役車其可休何以嗣我日雲中下鴻雁牀下語蟋蜶黄花既已凋田雀去何疾人生無百年上壽寧可必子有羅裳衣曷不日鼓瑟於潛舟行抵桐江浮溪始安行登山止凌緬鬱紆倦攀陟清曠縱游衍目對川禽飛耳接迅湍轉迴峰沓屢迷連烟晦莫辨夕翫淹水宿晨興愛沙飯已入桐廬溪復歴富春峴雙臺峙中江一竿垂日晚空波澄浩𣺌春雲澹舒卷但乘逸興多詎覺古人逺南湖醉歌呈姜給事埰及諸同座湖南美景白日徂相呼共泛城南湖湖中酒客十四五縱飲不數髙陽徒吳門諸宋最年少劇狂謔浪任與俞金陵余懷擅詞曲陸生君暘播絲竹轉憶當時度曲人停歌宛轉思相續世事浮雲何足奇興亡大略姜公知屈指間闗凡幾載滿目風塵傷别離斗酒重逢共南國諸公何在觴今夕陳孟聲傳已破家魯朱本是偏憐客壯士沉吟空嘆嗟萍浮浪梗隨天涯尊前有酒且盡醉城頭黯淡悲鳴笳登蕭山驛樓驛路青雲暮山城逈足愁江流衝絶壁石勢起危樓襟帶分吳甸風烟繞越州不堪憑眺意揮涕下孤舟白門栁詞上馬與君别下馬與君酒欲知春淺深請㸔白門栁東溪歌錦鳥迷沙日花飛一水香采蓮聲欲斷愁殺淥川長水色明晴晝江花憶去年前溪好風月未可即回船曹布衣鑑徴鑑徴字徴之號雲客嘉善人貌寢偏𦕈不修飾家有瘠田數畦嘗不得粟羞與富貴遊所交必奇士與南粤朱斐北平韓畕善日為詩文見忌流俗門有橡樹中庭有紅杏多咏其側偶移石廢二指由是病狂不幘不履行于市數年遂死其集曰紅藥園白石樓皆軼無存者再訪賡上李花初白杏花紅楊栁千條拂面風野店酒旗寒雨外江邨漁艇夕陽中地經門巷芳籬熟節近蠶桑春箔同且喜芊緜青草路竹窻書墅徃來通得魏子存舅氏蜀中書西蜀東呉萬里餘那堪薄宦久離居舅甥忽憶三年别鄉國初逢一紙書明月啼猿巫峽逈秋風落木錦江虚何緣得貰郫筒酒好問雲安丙穴魚隴頭水隴水流離下隴山髙接天似憐征戍苦嗚咽向秦川栁邨處士沈湛湛字淵伯世居嘉善斜塘葢桐邨舊居也為諸生豪邁尚氣與俗牴牾好談兵事論兵法性卞急歡則頭攢耳摩怒則面赤發叱然好交遊不忘故舊其讀書論文最嗜班馬與鍾譚詩不喜閲文選尤痛詆李于鱗集後依人入閩刻閩遊草以槖金買田居有五栁遂以名邨冉冉將七十耕硯為娯老計時畫墨竹人多寳之評者謂其詩崢泓蒼健善為悽惋之詞浦城客署題流觴曲水圖誰將曲水圖挂向丹山驛約略文衡山氣韻儘超軼潺湲如有聲懸溜注溪澀疎松籠厓長修竹叢巖密昨過漁梁山髣髴圖可憶碧雲互紛糾溟濛𣺌難測飲者多達人千觴浮澗出酒壚置修坡琴書遶其側或飲或坐起俯仰兼語黙隱隱蘭亭裏研墨寫詩帙自有丘壑風飄飄露狂色不知傳舍中何事留此筆似告宦遊人勞勞未如逸晉人豈嗜酒此意醒者得憂歡石夏公曾駐節勝迹在河干此地安溝洫當年怨暑寒溪痕移上下心事别憂歡舊石留官守沉吟仔細㸔附考永樂二年吳浙大水夏忠靖公立石嘉善福源宫前測水消長鄉人言公自寓先憂後樂之意故名石長七尺有竒葢樹石測水亦宋舊制也漁梁道中山勢迂回梯磴勞漁梁寂寂瀉秋濤蒼藤古壁飄猿影寒日空山落雁毛自有清音來石磵誰將茅屋結東臯寄言峽裏山翁道我亦從來本慕陶題血子樹小引曉上五顯嶺小憇佛庵仰見奇樹修枝偉幹髙十丈許葉葳蕤有光翦翦如勾剔畫紅實疎布比朱櫻差小而色殷如血僧人謂此血子樹不華而實味絶甘山中無二予絶愛之賦此誌異靈山少凡木指顧一停車應入流沙誌希傳種樹書孤撑隨壁迥百尺入雲疎積翠披堪畫流甘釀可茹連珠垂結晚紅露著條初龍眼圓嫌大朱櫻色不如珍奇無别種獨映羽人居題周阿香墓阿香辦一死死乃全其生萬古貞魂在松風吼瀑聲附考烈婦嘉善計明妻正德庚午嵗饑夫與姑議鬻之不從數被箠楚赴水死曹秀才禎驥禎驥字觀機谷子有握蘭軒草小邨即事寂寂空林去未回孤飛一雁獨徘徊移舟入浦分流水横笛當風碎落梅殘樹花邊新出笋野蘿梢上舊成苔醉漁野外知何意歌笑方停月已來周宏藻宏藻字丙仲嘉善人短歌行江湖流日下魚鼈趨雷同力拔水騰上逆之者為龍龍生族亦孤繁多不如蟲異行非衆好獨處勢益崇吐納萬里氣縱横天地空不為世人怪安得雲霧從塞下曲草盡蒼鷹疾平沙獵騎過紇干山月上蒲類海雲多漢苑歸龍種秦闗息鳳戈軍中方宴樂處處起鐃歌送宫人入道纔服黄冠换舞裳朦朧何處辨昭陽朝迎神女聞瑤珮夕向元君受玉章顔駐不緣雲母液丹成無藉鬱金香林間鸚鵡曾相識猶說當年侍上皇玉樹後庭花玉樹新聲斷深宫青草生可憐揚子月猶照石頭城沈之灝之灝字希道號達蒼桐鄉人節烈嚴姬行姬為戍上諸生徐浤之妾浤死無嗣内君丁孺人在室姬黽勉匍匐左右之未㡬丁亦亡出篋中裝以襄葬事葬畢嘔血斗餘遂死嗟乎姬之死可以風矣為作嚴姬行石家有綠珠樓頭報主捐其軀喬家有碧玉井底投骸主不辱兩媛千古名字香誰云婢妾無肝腸嚴姬嚴姬松栢姿霜凌雪虐赤手支翁亡旋侍白頭媪晨炊宵績容顔槁翁媪兩喪相繼遭買山負土雙墳髙無須􅋇面并截耳願得從容就一死一死了却婢子心寸心不易千黄金君不見鬚眉中有妾婦身錦衣玉食隨後塵暮楚寵兮朝秦臣嗚呼暮楚寵兮朝秦臣安得遺臭之骨留芳芬鸕鷀行霖雨既過邨溪渾溪渾且深魚蝦屯老漁不用網罟施持竿拍拍驅鸕鷀漁驅鸕鷀鷀驅魚大魚小魚觸頞趨浪捲波翻㸔血戰俄頃獻俘來水面鳴呼魚乎誠何辜脫網又遭兹剪屠鸕鷀盍不餬爾口飼爾雛廼為老漁之韓盧吾將膾鸕鷀于刀炰鸕鷀于釡雜魚鮮以為脯夫安知魚鮮之美堪上筵鸕鷀肌肉腥臊難置爼徐之陵之陵字子京嘉善人遠子雨雪曲大漠雪霏微同雲凍不飛玉城飜落月珠樹帶斜暉古戍烽烟斷平原獵騎歸最憐翠袖薄猶是寄寒衣送康小范上若兩世執歸江右霜滿高城夜漏稀那堪臨水送將歸天涯短褐逢初霽江上孤帆帶落暉路近匡廬秋欲暮舟廻彭蠡雁同飛放歌且盡樽中酒明發西風振客衣張辰辰字北是嘉善人與兄鶴書齊名邑中有二張之目贈亭彦椅梧䕃百尺翽鳯鳴高枝下有緑蘿草攀援同兎絲結交常相因金石貴不移顧我蓬室士同心賁光儀相與崇明德皓首良可期深情發壯采嘉㑹及芳時願附雲中鳯千里或差池檇李詩繋卷二十六
