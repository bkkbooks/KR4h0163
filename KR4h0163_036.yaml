body:
  text: 檇李詩繫卷三十六平湖沈季友編宋吳山道人括異志曰三山曽先生陟嘗寓館於海鹽陳氏七載有道人自吳山來謂曰子思鄉之切何不暫歸乃剪紙為馬令合眼上馬以水噀之其疾如風囑曰汝歸不可久留須臾到家門户如舊妻令入浴易新衣陟曰我便去妻曰才歸便去何不念父母妻子乎陟便上馬而行所騎馬足折驚寤乃自在書館中隨身衣服皆新製者道人亦不見惟留一藥籃中有詩云一騎如龍送客歸銀鬃緑耳步相隨佳人未許輕離别不是仙翁豈得知桞姓女鬼志曰熙寧丙辰秀州嘉興令陶彖子遇一女偕行至水濵遺以一詩與之期曰仲冬二七月盈之夕車馬來迎自是令子遘異疾不可救療後辨才法師元淨抵秀令亟告之法師過令所除地為壇設觀音像取楊桞灑水呪之夜遂安寢明日始來結跏趺坐引兒問曰汝居何地而來至此答曰會稽之東卞山之陽是我之宅古木蒼蒼師問其姓答曰吳王山上無人處幾度臨風學舞腰師曰桞姓也乃輾然而笑師又為宣説楞嚴神咒痛自悔恨母為物邪所轉于是號泣謂令子曰久與子遊不能遽舍願觴為别因相對引滿又作一詩而去遂不復見按此係秦少遊所載而詩話總龜亦紀其事與此稍異生為木卯人死作幽獨鬼泉門長夜開衾幃待君至别詩仲冬二七是良時江上無緣與子期今日臨歧一杯酒共君千里逺相離曹刺史女嘉熙間鄧州人金鶴雲以琴書寓嘉興招提寺側富家夜聞女子唱歌歌罷排户入與雲會臨别以金贈之女子澘然曰妾曺刺史女也巳得仙術但凡心未除遭此降謫君前程甚逺夾山之會其慎之金後為縣令卒於峽州考其寺即曹圭宅後鑿土得石匣古琴有金繫焉歌曰記得一曲直千金如今寂寞古墻隂秋風衰草白雲深斷橋流水何處尋張總管建炎間崇德有張子修字德夫官為浙東總管葺園于玉灣之北醉花載月築流杯遂初二亭開乳鴨池為流觴之飲人稱東園時又有邑人張汝昌字士隆官迪功郎與子修品望相埓徙居其西稱西園並饒林館之勝結社賦詩子修卒年八十六其詩不傳後石門里中有召仙者降箕云我張子修也昔與汝昌築東西二園今日歸來惟見衰草宛然一丁令威耳乃題一詩而去謝事歸來一幅巾千年華表漫哀吟而今廢沼空留恨好句枇杷更屬人元獨樂園主輟耕録云友人檇李郭元凱舜舉嘗召一仙至大書曰獨樂園主也衆以咏史請為作長篇觀其詩意蓋宋人也三皇之前不可傳堯舜垂衣化自然夏衰商敗兵革起征討有罪非傳賢蒼姬種德極深厚厯載八百何綿綿孔丘孟軻不得位惟有文字登書編春秋筆削嚴一字誅惡褒善持大權丘明作傳詳本末下逮戰國何茫然秦皇并吞六王畢始廢封建迷井田功髙自謂傳萬世仁義不施徒託仙東遊弗返祖龍死赤靈火德明中天漢朝文景稱至治刑措可比成康前無端雜用黃老術是以未得稱其全王莽賊臣篡漢祚賴有光武如周宣靈臺名將應列宿婉婉長䇿抉戎軒絶勝髙祖醢彭越可比周召終天年崇儒往謁曲阜廟典章燦燦羅星躔後人不省創業苦寵任閹宦皆貂蟬西園鬻爵誠可耻黨錮忠士災何延一朝曹氏帝稱魏銅駝荆棘生荒煙關張早死後主弱典午自帝開坤埏五季雲擾亂中國五馬南渡何翩翩六朝興廢有得失豈知合并歸楊堅瓊花城裏建宫闕汴湖春水浮龍船亂離思治否復泰唐室髙祖催飛鶱秦王神武不可及遂承天祚傳髙玄大綱不正有慙色我嘗撫卷思其淵紛紛女禍握神器擾擾藩鎮橫戈鋋乘輿避亂數奔竄翠華幾度遊西川黃巢殘賊不忍説白骨山積血成泉侵凌漸使唐祚絶江海雖大猶涓涓朱溫降將乃一賊僣號暫時得復失後唐石晉暨知逺但以功利不尚德周家亦僣登天基獨有世宗明治術我朝列聖皆深仁天下蒼生得蘇息史書浩浩充屋棟人主欲觀寧遍及小臣纂集作通鑑治亂興亡明似日願言乙夜細垂觀比美成王戒無逸月夜異人魏塘元萬户陳景純名當字愛山闢園有異人月夜叩門題詩云戊子年間多快樂丙申之歲少留連公公莫作綿綿計花圃終須變野田明天民嘉靖間浙省平湖縣鄉中有一仙禱事有驗鄉人遂為立祠亦能作詩寫字欲求其作者不拘多少置卷於廟過日則墨遍還之也自稱為洞賔號天民嘗有贈老年得子者詩爭羡孤梅得遇春暖風殘雪越精神西湖昨夜多奇瑞點破紅蕖已十分蓬萊宫人隆慶時嘉興府治東石獅巷有朱生者一日道經南城遇雨迷路心正驚疑忽有二女童曰奉主母命來迎朱與偕行入一洞門遙望殿陛􅌑瓏兩度石橋乃抵其虜一仙娥自稱蓬萊宫人邀君一了夙願與朱促席暢飲逮晨朱辭歸娥愀然乃設宴正殿鋪陳飲饌較昨愈奇出一錦軸寫詩以贈揮淚而别既别朱忽墮山下若夢焉軸猶在手後事覺軸亦失去見名媛詩緯三山窈窕許飛瓊伴我來經幾萬程好與清華公子會不妨玄露漫相傾壺天移傍郡城壕雲自飛揚鶴自巢千載偶諧塵世願碧桃花下共吹簫海外三山十二樓弱流環繞不通舟此身也解為雲雨迢遞驂鸞檇李遊莫道仙凡各一方須知張碩遇蘭香春風嘗戀人間樂底事無心問海棠百雉斜連一道開為君翻作雨雲臺髙情倣佛襄王事宋玉如何不賦來湖桞青青花滿枝可憐分手艷陽時離官漫自添離思瞞得封姨不我知陽臺後會巳無期眉上春雲不自知那更靈官傳曉令含情騎鵠強題詩驅山縮地逈塵寰從此交情事不關他日離愁何處慰暫將三塔作三山仙女隆慶初朱生少溪名堯封平湖人居郡城聚徒於隱真觀忽一日有偏髾女子招生出東門不數里天且就暝又一女子持燈而待引入林麓間金碧瑩然異香滿室須臾麗人出拜設賔筵非人間常品終席無一褻語諄諄多古今典故生亦不甚解唯唯而已食畢延入書室縱觀典籍圖繪翰墨珍玩畢就寢宛然世間男女叩其所自俯而不答口誦一律有偷間别却諸仙侣好向人間了夙緣之句因囑曰吾與君有夙契故輕就君君密之亡泄也生後稍露其意家人遂謹守之俾不得去女子亦三日不至已而復來生隨之行則道路崎嶇雷雨交作女子曰為君泄此機罰君度七里岡也既逹麗人怒曰薄行子何來吾以心托子子何負我耶使女子送歸及抵家則星月朗然視其衣履又未嘗濕也一日麗人忽至生若巫覡然口誦其言曰君何負德乃爾因長吟一絶曰恨滿塵寰不久留雲軒獨馭上瀛洲憐君一點塵心在誓海盟山不到頭問其居曰天髙地逈海濶江深山明水秀是我蝸村問其名曰草野相逢降玉臺來時有念下天台山人一宿因緣絶解下安冠淚滿腮他如芝種丹田消白日汞燒金鼎度清秋長嘯一聲天地老三千甲子半枰棋之句頗為士林所稱當時聽者為致真假之辨復吟一絶云云且曰仙凡路隔郎君自愛我從此逝矣時兒童六七歲以下有見其絳衣霓裳在雲端拱揖者後亦竟無他異出海鹽崔嘉祥鳴吾紀事此與前事相類疑即一人也我是雲丘散誕人半生三見海揚塵今來寄語夸毗子何必勞勞問假真木人紫桃軒雜綴云甘復生來往江湖擕一木偶長尺有咫出入袖中登几案跳躍趨步發聲與人談論亦能詩自云姓髙名梅金溪人少有逸韻二十餘而卒為煉鬼者刻樟木誦祕咒攝附靈魂遂偕甘生以遊向客友人屠用明所一日有以詩僧秋潭年臘為問者朗吟一詩贈之句意清絶非凡鬼也髙僧如瘦鶴懶得著袈裟雪案堆莊子花函出內家問方醫病竹郵水泛新茶一識沉香氣青煙吐白紗女仙四人名媛詩緯載仙女下降秀水謝彩家異香飄拂從鶴背而下有湘君衣緑玉城仙史衣紅苕上君衣白少室靈妃衣紫等仙後六年又降謝彩之夫華亭丁六郎也王端淑曰讀十二美人書內丁謝駕鶴沖舉蓋崇禎以前事也秋濤子言之鑿鑿定非説夢其歌亦典雅莊重無鄙俗字句煙火人恐不能道湘君絶句吳水迢遙接楚雲瑶臺清露滴黃昏當時誰向蒼梧望休信斑斑竹上痕玉城仙史贈丁生求厥道初端倪莫測杳杳冥冥以誠為宅玄之又玄呼吸之間不矯不疾無倚無偏變化反覆元牝之谷以實為虛靜而匪獨戒之慎之毖爾玉燭苕上君玉如意擊案歌吞吐日月兮啜其英浩氣磅礴兮得長生粳粃濁世兮髙躡乎太清雖天上之無愁兮羡人間之有情溯清風于子夜樂故人之瑟琴白鶴舞兮丹鳯鳴會看迎子之馭而徜徉乎瑶京少室靈妃揚袂起舞歌悠悠浩劫兮逐逝波茫茫大地兮崇者山而卑者阿何人世之迷昧兮鶩于名利而紛拏豈知太清之上更有神凝氣謐超世乎塵劫之外終乾坤而不磨只俄頃兮可以遍遊於九有笑塵世之百齡兮僅剎那子不見夫樵者觀奕兮爛其柯是知清虛之理莫測神仙之樂居多抽子之佩慨且歌于焉不醉兮如此良夜何降道人崇禎辛已道人題探梅六言詩人莫會意王翃曰道人起句謂舟輕則速十里之行等五里雪霽而殘一山所積止半山耳卟書王子可與言詩探梅輕舟十里五里殘雪一山半山我意探梅獨往誰教放鶴先還檇李詩繫卷三十六
