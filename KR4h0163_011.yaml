body:
  text: 檇李詩繫卷十一平湖沈季友編明小瀛洲社十老詩并序嘉靖壬寅四月之望豫舉社會於小瀛洲之時賞軒維時靈雨初霽凱風自南䦨藥翻紅林篁挺翠黃鸝載鳴於深樹紫燕偶語於重檐物情咸欣衣冠萃止鐘鼓既設獻酬乃行童子歌鹿鳴伐木之章繼之以南山有臺之什四美具而二難并三夀朋而五福介盟申可久事續香山維我西村清醇溫粹齒德俱尊東畬恭儉循良喬梓濟美豐崖多聞直諒枳棘鸞棲南溪履道純誠薇垣鳯翥勾溪清修固守吟步少陵古崖慷慨賦歸興侔陶令海村敦詩說禮志樂林泉西臯邃學壯猷道存經濟石林靜崇釋典雅有儒風豫則志在齊賢躬囏寡過皆荷朝家之作養樂王道之平康仕無愧於軒裳隱有光於丘壑者也墨山陳子詢式瞻勝美爰付丹青冠服差殊意態唯肖竚立相語者為西村豐崖西臯聚首閲卷者為東畬南溪勾溪挾童過橋者為海村欲行且顧者為古崖坐以待奕者為石林及豫也東濱歸叟徐咸識西村詩老朱朴朴字元素號西村海鹽人𢎞正間布衣貌修挺音琅琅然隱居腴道絶嗜寡營性耽詩自少至老未嘗一日廢聲律兼善繪事興到輒作雲林小幅每當酒酣月下弄笛作叫霜裂石聲聞者知為諸詩人出遊也直指行部武原下車訪之朴布衣芒屩揮塵雄談大為傾動郡守聞其名欲禮致之鑿壞遁去許黃門葬父鄉俗題主必丐貴宦為榮比當泥首速客則西村老人也曰眼前不乏纓組若年髙有德終讓此布衣耳其為詩孤清警拔頗具排古蕩今之致有西村集并未刻稿一時林下諸賢並邀入社為倡和友後復與錢東畬徐豐崖吳南溪陳勾溪徐東濵陳古崖劉海村鍾西臯釋石林為瀛洲十老之㑹推朴為首更得董蘿石許雲村沈紫硤鍾彥材及僧秋江雪江佐之選辰命篇殆無虛日且命畫士繪圖鐫詩於後以傳焉亦可謂矯世絶俗風流𢎞長者矣豫因想見當時士大夫恬靜寡欲不亟亟於聲利之途故能優遊林泉日以文章師友為樂如古蓮社竹溪香山洛水之盛傳為美談追慕遺風邈然不可復得感嘆之餘附識于此已亥九日登高社集百年過七十去多來日少行樂須及時嵗月秋已杪今辰重陽節木落霜雨曉風流石林師肅客入林窅木鉢崇嘉蔬銅瓶貯清醥捫蘿躡重巖采菊披叢篠履歷嶮巇盡暢然凌物表長歌應林谷逺眺極茫渺仰面青天低俯首滄溟小太息寰宇內蠅蟻何擾擾日暮下山去西麓集歸鳥興劇有餘歡殘尊月中了九日西臯席上得海字去年宴重陽對酒作狂態今年復登高狂態猶未改尊中酒盡君須買枝上茱萸正堪采君不見彭澤歸來忽千載藍田舊客今何在人生行樂貴及時白髮衰顔鎮相待莫辭爛漫倒接䍦亂插黃花歌慷慨白雲杳杳去南山明月離離出東海蘿石山人惠松花餅山風吹林時雨歇雲邉掃落黃金屑并刀割蜜香在手和作銅盆百規月老夫肺病方作殃一片入口心胸涼舌根猶含兔絲冷腸腑已透龍髯香蘿翁蘿翁最知我白紙奚囊封一裹金莖沆瀣常恐詫玉碗酡酥聊許可山中老松三百株崕峰醖液流醍醐春來更裂數十斛乞與一斗知能無謝王雨舟惠靈夀杖武當山髙幾萬丈中有千年靈夀杖金光玉芝秀所鍾生在青霞石嵓上雨舟先生道者流贈我一枝東海頭琅玕潤滑鐵堅瘦昂首屈項蒼精虬老夫病足如跛鱉藉此扶持少顛蹶朝出橫拖石壁雲暮歸倒拄溪橋月乘舟著篙馬著鞭凌髙涉下無不便為尋短句謝逺意繞徑啄碎青苔錢不愁化龍忽飛去不願提擕朝玉陛但使長挑沽酒錢日日登堂共君醉靈隱寺合澗橋頭水飛來洞口山鳥盤蒼壁影僧掩翠微關松露晝還滴嶂雲秋更閒一年嘗一到一到一忘還勝果寺下界聞鐘梵中峰隱薜蘿海門朝日近沙市暮帆多鳯去山空老龍蟠井不波宋家宫樹在啼鳥學笙歌石屋洞隆公房我愛巖居宿因過衲子家山蔬和葛粉野飯間胡麻水帶煙霞味茶收穀雨芽不知春早晚開到木蘭花靈芝寺留别恆愷二師古樹城深處題詩記昔曾清秋一夜雨往事十年燈地勝多芝菌池香足藕菱浮生鴻雪意揮翰别山僧葦村為常州吳通府題常州吳别駕家在葦花莊好雨烟叢緑凉風露葉黃逺村通甪里流水入吳鄉手種沙邊樹他年繫釣航僧月泉結廬悟空寺滄海浩無邊青山斷復連水吞湖面月風度石梁泉我昔狂逰地師今幻住年看花瀹春茗猶記竹林前上已同友出郊三月三日出郭行風和日暄天氣晴銜泥補巢舊家燕隔水喚春何處鶯壚頭小姬酒正熟道傍古墳人自耕勸君行樂貴及蚤明日清明花滿城寺樓杖几松杉回絶磴衣裳雲霧浥髙窗山圍野色迷秦駐海送潮頭上浙江碧樹帆檣移個個青𡨕鵝鸛下雙雙詩狂難挽天河水付與山僧入酒缸三月五日燕集沈紫硤池亭何處尋逰花正開紫微巖下小池臺青山不負新年約白髮重添舊雨來三月暮寒催熟食兩峰春興引深杯臨流却憶蘭亭事便欲劖詩掃石苔楚江秋曉二首練淨澄江露未晞苦吟猶憶謝𤣥暉六朝往事青山在三椘空城白鷺飛霜落水村菰米熟石髙沙岸栁條稀重華一去無消息目極蒼梧淚滿衣卧聞津吏數江程白鳥清沙岸岸明秋色逺連湓浦樹人家多繞漢陽城殘燈野寺鐘初動瘦馬河橋客早行三國廢興何處問荻花風起又潮生友人誦許雲村獨往詩因和西麓興來因獨往客懷秋色兩娟娟白雲出岫淡如掃紅藕作花香可憐風落晚凉巾不整草侵危石坐來偏無因此夜湖邊月共聽松隂萬壑泉懷勾溪苦憶勾溪溪上翁暮年多病少過逢盤餐不乏憐牙健世事無聞愛耳聾誰共青燈分半榻自梳白髮對孤峰滄洲寂寞鷗鳬散目送征鴻意萬重扶杖扶杖東臯望逺山物華消息與情關楝花風過蠶蛾老麥秀城深雉子斑誰氏墓田荆棘裏斬新亭館畫圗間道傍惟有寒松樹吹盡春風只舊顔訪許雲村菰蒲曲渚水添痕小艇浮香直到門十里青山司諫宅千章喬木紫雲村春茶種子多成圃老鶴將雛更有孫白首相看易留戀為君連日倒芳樽茶谷山房池臺六月興堪乘六曲闌干取次憑簾外午隂緣澗竹水中人影過橋僧催詩硯滴銀牀露醒酒瓜嘗玉碗氷白社故人閒散地不妨來往喜相仍許雲村以楊梅惠豫賦謝雲村五月楊梅熟檇李南風李子甘野叟叩門傾瓦缶山童和雨瀉筠籃千金一顆憐髙誼百里同時惠老饞兩地相思無以報啖餘聊復併題緘西臯得新茶以詩索和帶雨新抽粟粒芽山人其夢有生涯細緘已入明廷貢官焙還來太守家香愜社僧閒作倛嫩便鄰客老無牙何因日就林塘汲醉看銅瓶滚雪花病懷落落晨星故舊稀一春消息悵離違磽田變嵗惟饘粥病骨逢秋尚夾衣雨暗草堂蝙蝠舞風輕簾幕鷾鴯飛臨流倦洗雙聾耳厭聽人間有是非東濵席咏芍藥憶昨臨軒把酒看過年花發又慿闌紅芳有約春筵在白髮無情曉鏡寒雲擁畫屏籠繡幄露涵香氣滴銅盤舊家池館棠隂下未許風光讓牡丹西湖竹枝詞三首麥嶺風吹小麥花古藤喬木路三義千年玉骨湘纍墓萬里堅城少保家阿儂家住湖水傍菰米蓴絲野飯香猫頭紫筍尺圍大沙角紅菱三寸長郎從湖上打魚蝦妾在湖邊只浣紗生長不離湖水上湧金門外是儂家紫白雙燕飛來别却烏衣國夢裏猶思白玉樓零落舊巢人不見一簾疏雨話春愁過劉木溪故居不見故人劉木溪溪邉喬木冷凄凄一間不廢藏書屋三畝全荒種藥畦為勾溪畫獨釣圖松吹凉生錦籜冠鳥還雲出坐中看勾溪數畝清泠水更有何人並釣竿歌風臺酒闌歌徹大風詞不是鴻門舞劒時萬里中原皆漢土髙皇猶有故鄉思秋山碧樹經霜葉半殷巖雲不雨自飛還瑤琴曲盡無人聽獨上髙臺看晚山宣慰樓羅綺香消鏡匣收碧山空對晚粧樓樓前昨夜新秋月猶學蛾眉翠黛愁附考海鹽澉城內有元宣慰使楊梓建樓十楹以貯姬妾謂之梳粧樓月色軒蝶老花殘燕不歸酒闌香盡客來稀多情只有黃昏月依舊清光照板扉附考宋時海鹽趙公範兵燹後軒其故居曰舊時月色始豐徐一䕫有記聞琴臺晉代相傳直至今子期曾聽伯牙琴髙山流水依然在寂寞荒臺蔓草侵附考在海鹽縣東相傳伯牙鼓琴於此又有聞琴村聞琴橋烏夜村考見題咏玉貌曾沾帝子恩故鄉環珮葬歸魂千年廢寢無尋處夜月啼烏尚有村碧雲寺塔影蕭蕭夕照間碧雲黃葉滿秋山空堂夜冷無燈火唯有貧僧乞米還附考寺在海鹽縣西五十里沈山唐大厯間建讀書堆蘭若雙峰碧樹隈逋翁傳有讀書堆數聲清磬孤烟外想見高吟待月來錢臨江琦琦字公良號東畬海鹽人幼讀書山中一榻十年燈帳如墨舉正德戊辰進士授盱眙令賊劉七齊彥明等攻城琦以死守同邑吳昂録張睢陽詩遺之琦報曰業遣婦子南還以身許盱眙矣賊遂去歷升刑禮二曹武廟南巡力諫不報時永嘉方爭大禮出疏示琦請署名琦郤之出守臨江左調思南拂衣告老築小樓數椽顔曰東白吟咏自樂與西村輩十老人結耆英社著臨江集公良詩選雩史測語行世有六子蔘芹萱葵蘥蓘皆有集陸師道曰先生詩皆深逺可喜有味其言姚士粦曰如空階鶴夢清山深步屐遲笠外滿天雪坐久換鳴禽雨濕鷓鴣語諸句真五言長城也夢聚上人微月吐疏林幽懷不能已忽夢與支公跏趺竹窗裏坐看白雲生驚風擘帷起覺來秋夜長空山落松子卜居為友人作桃花兩岸春水肥水邊卜築開荆扉雞犬向門未肯入村舍兒女穿竹窺長鑱猶帶故山色短墻初受新雨泥社酒喧喧誰上客東畬先生髮最白醉後出門看逺林從此頻過話長日歌風臺蔓草迷殘碣荒臺走白波英雄起亭長父老說蕭何廢井寒泉少空庭落木多當年懷猛士撫劒此髙歌自靖祠祀練公子寧中原龍戰起萬國撼雷風天意别有主人心獨在公青山無斷骨白日見孤忠到此看臣節羞言靖難功鳯陽道中衝曉出城郭征途未有涯草深山隱路風急水行沙逺近啼春鳥髙低落野花病軀愁跋涉搔首嘆年華過滁西過滁陽道環山一望賖夜涼天有雨秋晚樹無花試訪仙居澗因停部使車臨風動髙興追憶故人家殘春宿雨乾時乳燕飛東風急處落花稀一年最苦春將去萬事營心客未歸舊宅桑麻因宦廢天涯兒女近誰依未能髙卧追彭澤日暮聊為賦式微金陵懷古落木蕭蕭鴈影稀秋風江上立斜暉三山二水依然在萬户千門盡已非商女有花歌白下謝家無燕認烏衣城南城北經行遍獨傍秦淮夜月歸寄吳南溪談經昔日坐春風草載追隨片席同豈謂丁年成老大空教辛苦憶兒童掌中酒映溪流碧林上秋添木葉紅三徑若知黃菊意草堂今在峽山東道中江北江南數日程蕭蕭落木送秋聲夕陽滿地鳥飛盡人在亂山深處行遣懷手種篔簹傍水邊露華抽碧動江煙主人空有他鄉夢辜負青青玉可憐送友人之楚春去那堪更送君日斜江上惜離羣欲知回首相思處只隔湘南一片雲逰玉笥山芙蓉髙插碧天開雙屐遙從島外來玉笥破雲尋不見更隨風上九仙臺徐光澤泰泰字子元號豐崖海鹽人𢎞治甲子舉人再試不第授桐城學博作悲世賦以自廣改蓬州學正上瞿塘泝巫峽縱觀嘉陵山水文益進遷光澤令多惠聲一日拂衣嘆曰余丱角抽毫今髮且種種不自致清祕乃日事手板將無為彭澤所唾遂歸髙蹈海隅寒暑未嘗釋卷工詩古文詞識者以為雄健過於張寧華藻超於朱祚尤好為小文晚患鼻淵作詰鼻文自嘲雖語涉嫚戲亦頭責子羽之流也著有玉池稿玉池談屑春秋鄙見皇明風雅詩談女學諸書西陵峽歌兩山夾江如壁立千尋萬仞青鐵色江流如龍山鏬來動地雷聲喧白日山髙不見飛鳥過舉頭青天一尺多蒼藤古樹翳滿目沿崖亂石紛嵯峨嗚呼峽中之險險莫比昔嘗聞之今信矣商人重利却輕生獨欲何為亦來此黃陵廟下不可逰空舲塌洞尤堪憂十前九却過一險百夫力盡巔崖頭垂堂逺逰古所戒靜言思之心膽駴中流欲歌行路難哀猿又起寒煙外宫人午睡圖深宫沈沈清晝長髙檐影落梧桐涼蝦鬚窣地燕無語飛篆不斷金爐香鳯凰欲繡還停手睡思尋人如中酒銀屏翠簟碧紗㡡濯濯春風卧楊栁弓鞋卸下雙蓮金香浪捲起紅鴛衾鬢雲蓬鬆枕玉膩眼波不流眉黛深侍兒側立不敢語手中團扇輕輕舉曲瓊才下越嶺雲幽夢已作巫山雨君不見楊家海棠睡未足內庭已走銜花鹿秋夜澉湖望月澉湖湖上桂花秋海月當年滿畫樓倣佛錢塘六橋夜至今人說小杭州吳布政昂昂字德翼號南溪海鹽人少時聞海寧祝先生萃履方篤行以員外郎家居教授昂裋褐草鞋負書往從先生竒之曰生來晚書舍滿唯一牛屋生寧得居乎昂欣然受書日夜誦不輟衣一敗絮時解與所從老僕更相衣或周走室中跳踊却寒除夕歸上母夀即走詣祝先生所自是學大成登𢎞治乙丑進士授宜城令改新建㑹宸濠橫虐民不能堪匿丁家山以拒昂入山諭之立散歷遷兵刑二曹擢福建接察僉事有妻殺夫坐死者昂疑而默禱夢一小兒據人腹昂曰殺人者必杜福子也捕得之閩人以為神纍升布政乞歸居白苧溪上著書自樂布袍芒履混迹農漁人或狎之亦不校嘗駕舴艋入郡城遇兩生舟相觸怒止昂索錢以償昂乞至西門湯别駕家行貸至則别駕大驚曰何得辱前輩昂遜謝益恭兩生慙沮而去晚年不涉世故及嵗饑數為請賑又上書請築海塘一方賴之著有南溪集鄭端簡云明有兩方伯天台陳公華亭夏公皆人傑也昂學問淳固如天台見幾明哲如華亭而安貞履順斂華就實尤不可及焉二月二日社飲分得花字分春明日候晴霞二月祥風草始芽無奈寒威侵短褐時驚凍雨㸃輕沙負氷魚陟還潛穴出谷鶯遷未集丫却憶在閩遊冶日山城風暖落桃花集水竹居一溪繞塔過前庭修竹千竿列翠屏潭水照人僧眼碧海山當座佛頭青衝氷鼓棹乘幽興撥火煨爐盡主情醉後歸舟載明月沿溪聽誦寶函經元旦牀頭堆積是書篇晨起朱霞映篆烟晚興偶移溪上屐凍梅含雪報新年勾溪居士陳鑑鑑字用明號勾溪海鹽人幼任俠善騎射擊劒蹴踘從輕薄少年逰長乃折節讀書學為詩歌閉户下帷人罕見其靣詩成出之靡不驚人與朱元素齊名所居勾溪介處海上凡秦峰甪里澉溆鷹窠幽勝之處杖履必到一時瀛洲諸公推為社中祭酒其詩鮮芳幽蒨有勾溪集夢鶴齊獨卧晨鐘破清睡月吐髙林輝棲鴉時一鳴白露搖空扉孤枕寂無擾竹柏光熹微平生百事拙得與塵俗違兩耳㸃蒼塗不聞何是非野心役泉石久住長忘歸山風南窗來松凉上秋衣花明池色淨悠然發天機雙鷗有真意相傍不驚飛已亥九日登高秋風千崖吹老樹擕尊花飲羣公聚兹辰南國屆重陽玉壺載酒登高去川明嶽秀風日晴林嬉野酌都成趣醉插花枝細菊馨浩歌白石長雲暮城南七十六髙峰一年一作登髙處雨中喜西村諸君見過深酌看清雨田家無好春年光餘徑草風味只溪蘋此日有限日幾人無事人醉眠君未去交誼向吾真野卧野卧任遲晏窗凉清睡殘林虛雲影動石沒水容寬微露幽花濕輕風小蝶寒夜來萱草發徙倚碧闌看次石林韻結茆逺墟落白日有禽言野夢牽風石清泉過竹門絶糧憂鶴瘦爭果怪兒喧欲問栽松法僧來與細論春日村居草緑鳥飛散孤村白日虛家貧人事寡地逺世情疏春色遙添水山光半落書草年中外履閒只到僧居訪石林海雨濕山木野泉通竹籬偶隨流水去恰值道人期坐久日移午來稀花笑遲小園春事歇滿舉送春巵席上古鼎煮寒月凉天東老家冠裳臨水淨籬落帶雲斜幽意看黃蝶清吟對白沙不須愁酒盡市近易為賖勾溪暮歸净潄滄浪坐晚凉浩歌篷底又斜陽貧能到骨心方逸懶得成癡事盡忘夢裏風煙詩帙亂手中湖海釣絲長東風吹入勾溪棹碧草清波十里香西村諸社友見訪雨夜分得微字門外泥深草路微滿江風雨暗斜暉春潮正急不可渡有酒相邀且莫歸野服奚囊留竹桁茶烟山影共柴扉重招更有荼蘼帖爛醉花前願豈違看水竹墟看水白鷗來獵獵溪風約樹開幽意不關天下事好山長對手中杯凉波蘋藻時翻動晚日牛羊欲散回短髮醉來思一濯桐江還我釣魚臺除夕秦皇山北梅蕊新展武城西江水春白髮椒花一杯酒清朝泉石百年身杖藜健在何妨老茅屋閒多不厭貧此夕盤筵共兒女江湖應有未歸人書所見倚杖雲江落照中看人舟楫去匆匆豈知宰相馬頭日不及牧童牛背風劒米割腸聊强飽氷紋遺世惜虛功波濤滿眼輕生者翻笑田更錯用工枕上幽窗落殘月帷枕自清恬忽憶山中客西峰影到簾種菜曉日園頭抱甕頻滿衣寒氣露華勻老夫一箸非容易為語人間肉食人紅塵溪上衡門終日開非關遮斷自無來老夫只道無心物丞相門前却作堆睡漁圗滄浪歌闋卧斜陽渡口風來杜若香老我鷹揚還有待一灘秋水夢姬王讀靖康史日短中原鴈影分空將鐶子寄曹勛黃龍塞上悲笳月祇隔臨安一片雲題雲村笠雨圖龍眠畫裏原曾識天只峰前得載看採藥歸來春雨歇蒼崖照影夕陽寒徐襄陽咸咸字子正號東濵泰同母弟正德辛未進士雅度髙懷駿材頴發居官務持大體初知沔陽州擢守襄陽㑹中嫉者免歸孝友之樂終身無間築園城堙與里中耆碩飲酒賦詩名小瀛洲社風流文雅為一時之盛人以白香山司馬君實比之嘉靖壬子島冦入邑所在焚儲當事議徙邑倉或曰徐太守南園便咸慨然曰吾素笑文饒之愚安用戀此即捐地為之著有國朝名臣言行録澤山野録四朝聞見録西園雜記鹽邑文獻志東濵三稿私諡曰文達先生宿柴店鋪落日明逺岫征車止破郵春寒翻勝臘山靜只疑秋酒色浮銀燭梅芬襲罽裘白頭林下叟說盡野人愁望廬山望望廬山勝行行過碧岑有雲峰益秀無雨洞嘗隂飛瀑秋垂練澄湖晝躍金看山到此地已了半生心暮春白日去何速青春不可羈棘林花落子茅屋燕將兒酒債憐清老風塵笑牧之呼童掃苔徑應有客相遲二月盡大雪夜枕唯聞雨開簾雪作團農家三白足别墅萬紅寒剡曲無人到陽春欲和難山妻有清釀相對亦情歡和石門懷陳勾溪沈紫硤紫硤逃名士勾溪遁世翁兩峰盤谷景一曲鑑湖風雪映吟髭白梅薰酒面紅何時過蕭寺共聽五更鐘踏青至太子廟散步出西郭乘風支瘦藤逢人頻問路扣寺欲尋僧花落紅衣亂麥搖碧浪層歸來日將暝渡口已漁燈附考廟在海鹽縣西北二里志云祀皇甫嵩蓋太尉廟也嵩破黃巾平荆揚或當時祠之春興看到山茶又海棠坐臨芳草惜年光舊家燕子尋巢急新水魚兒逐隊忙老鬢未判春興淺愁懷猶喜酒杯長疏簾細雨清明近夢破梨花月滿牀偶題捲簾疏雨杏花寒金鴨香消午夢殘燕子不來人病後玉叉敲遍碧闌干西村畫小幅二首平蕪漠漠逺山青楊栁風多水氣腥好似衡陽舊逰處蒸湘斜抱合江亭水練山屏碧四圍樹隂濃覆白鷗磯扁舟穩繫柴門靜人在湖南罷釣歸陳龍巖瀛瀛字古崖海鹽人正德間國學生為龍巖令愷悌樂易閩人懷之比歸觴咏自適所著失於島冦之亂多不傳贈東畬歸田作白蘋風起釣絲凉解組歸來野興長波浪塵埃非舊夢青山影裏卧斜陽雪夜過妙光寺朔雲卷水氣慿陵此夕山陰興已乘高笠短蓑還出浦滿湖風雪夜尋僧石林山房輕風落樹散林煙海日三竿正熟眠傍午起來花落盡不知雷雨過山田劉指揮鋭鋭字蓄之號海村其先關中人狀貌豐偉慷慨自負以世胄襲海寧衛指揮使蒞事嚴毅人莫敢犯雖係出勳閥而學問淹洽與瀛洲諸老賡和有春臺集鋭有家奴名木者善射應弦命中一日有水鸛集於資勝寺鴟吻木弋之貫其左翮鸛帶箭而翔中庭鋭命拔其矢飼之旬日鳴舞而去咸謂德感云苦雨九十春過半深寒猶絮衣海翻高浪入風帶濕雲飛幽意頻看野詩愁獨掩扉欲將擕釣興江上問漁磯過山家幽蹤何所適來訪野人家藤老高懸樹溪清淺見沙飯牛歌白石養鶴長丹砂渺渺乾坤裏吾生豈有涯胥溪小築耽幽性門前水一灣舟輕同鶴載人老共鷗閒釣弄波間月詩成檻外山客來忘爾我送不到柴關納凉聞警感懷地僻喧囂寂風烟隔翠微月明孤角語林靜數螢飛塞北仍嚴武江南乍解圍幽棲何處穩涕泗欲沾衣秋暮嵗事關心切金商忽整鞕菊開霜信後秋盡雨聲邊晚甕醅新秫寒衣貼舊綿閉門無俗事詩句送殘年雨霽同鄰翁過田家林外晴嵐散晚霞偶因雨霽到田家吳蠶出火桑成椹布穀催耕麥作花流水小橋通釣艇矮籬茅屋礙巾紗村翁欵客偏淳朴瓦缶清泉為煮茶西臯老人鍾梁梁字彥材海鹽人正德甲戌進士為刑曹郎疏諫武宗南巡杖闕下慮囚江南平反死者百三十餘人嘉靖初知濟南府平萊蕪反冦賜金綺後補南昌亷明守法尋乞歸築室西郊稱西臯老人垂四十餘年自為墓志卒年八十二論者謂梁進則攄忠砥職退則潔已範俗為方洲後一人有西臯集追悼四賢懿哉南溪翁抗志風塵表經義啓後䝉探討造幽窈居官三十年節操恆皎皎鄉評符士論孰謂知者少右南溪吳翁顯允吾核翁攻苦食自糲樂善如芝蘭疾惡若芒刺孝友企前修淳朴世鮮儷積學志未酬彼蒼顯其裔右吾核鄭公漸翁明達士靈府洞無涯詩畫奪天巧文章成大家早辭軒冕榮寓蹟一平槎放浪任所適素志薄豪奢右漸齊趙翁杞翁性孤峭𢎞博闡前聞鋭志辭青鎖移家入紫雲著書石屋下速近崇斯文勢利了無涉甘友麋鹿羣右九杞許公九日可久㑹分得一字九日天宇清楓林動秋瑟石師結芳社侵曉掃禪室茶鐺沸寒泉果榼薦霜橘坐客得九人西村行第一稜稜骨相堅畫品合詩律東畬偕南溪霄漢舊儔匹豐濵伯仲間文采兩超逸野翁排塵務溪叟蓄詩帙劉侯與賤子疏坦亦真率雅興薄青雲雄談低白日杜陵屢悲秋世難恐相失吾儕遁丘園暮齡總康吉藐彼王侯尊奚慕神仙術好樂貴無荒君子慎所恤不寐蟋蟀不停聲寒城欲二更月明潮正落霜薄草還生世路黃金重山林白髮輕淵明一杯酒豈止慰閒情春隂正月多風雨長河一鑑平隱雷乘暖發細草帶煙生鹿豕棲林逺鷗鳬入浪輕前村春釀熟泥濘少人行寄友避亂依城郭呼童學治園竹深羣雀下波靜一魚翻壯志依彈劒衰容且負暄汲泉烹石茗拂席待髙軒曉起老去翻多惜子孫閒來幾為問雞豚杖藜何處堪頻往詩草經年祗半存白髮懶梳書在手青苔不掃客臨門孤雲自合幽人意漫對西窗濁酒尊宴天寧寺曲水堂白鷗芳草快溪晴春氣薰人酒氣并漫說惠休無俗相更憐元亮有閒情舟移藤刺還維纜棋散花隂半覆枰他日空齊懷勝賞凄凄風雨夜潮生謝石林病夫欲赴東林㑹黃牘青秧已屇期佞佛豈嫌蔬供薄逃名虛受野雲知泥深仄徑青蓑冷雨鎖平橋釣艇遲為報憂時社中客縣官今幸少鞭笞題養上人竹院曲水橋邉宿雨晴兩崖修竹過人清一聲曉磬白雲破僧在翠微深處行與陳虞山叙舊東吳白粲美如飴黃橘垂垂紫蟹肥朝市誰知風味好西風獨送季鷹歸以上十老集永瑛見方外從吾道人董澐澐字復宗一字子濤號蘿石海鹽人𢎞正間布衣少慷慨慕義家貧工詩與沈周孫一元鄭善夫諸公逰放浪山水年六十有八聞陽明先生講學山中以杖肩其瓢笠詩卷訪之入門長揖上坐陽明異其氣貌又知其為董蘿石也與之語連日夜蘿石悚然起嘆執弟子禮盡棄舊學所逰者誚之蘿石曰吾從吾所好而已更號從吾道人末復參證內典意見更超嘆曰今客始得歸矣與釋法聚結社海門山寺許相卿曰始余見從吾子専於詩遺其家甚難之後志於道遺其詩甚愧之終入于佛嗒然自遺也愈益怪之學三變而卒歸於空云臨沒自吟曰我非汙世中者儔偶來七十七春秋自知此去無些染一道天泉月自流其有得於道者歟真境真境靜而淡得來吾已翁百年鳥忽度萬事花終空好夢宦途上達人杯酒中白鷗先自得睡熟釣絲風石林僧舍對雨蠟屐投僧舍江雲正作隂雨從燈下細夜向酒邉深葉落風還起城寒鼓欲沈煙霞成我病時得飯幽林宿韜光次王明谷看山意不盡信信宿禪家坐石雲生袖談經天雨花閣虛松夜奏林暖笋秋芽老得王濛癖逢僧不厭茶漁莊浦口幽花發門前春水生野翁長是醉魚稅本來輕吹笛栁風細掛罾楓日明白鷗能解事終嵗此尋盟題勝果寺壁亂帆青壁下盤磴白雲間宋後仍唐寺吳中見越山空江鐘夜度古木院春關南內今僧定西巖月自閒過𤣥真觀題壁簫聲隱隱珮珊珊喜有琳宫出市闤洗藥泉深明月冷落花風定白雲閒泥封六一猿窺竈天近清微鶴守關徐福樓船徒泛海蓬壺原只在人間野眺雲山重叠帶江村花落水流天氣昏應有野人春卧穩流鶯啼過不開門雲村先生許相卿相卿字台仲號九杞海寧人正德丁丑進士嘉靖初授兵科給事中疏論罪閹張鋭張忠贖金非法及張欽義子襲職林俊正人被譛等事語極剴切至訾上為氣驕志怠舉朝皆為咋舌未幾乞歸以鹽邑紫雲村山水佳勝移居村南茶磨山剔石引泉疏畦藝茗時跨黃犢短蓑髙笠二鶴自隨往來山谷間嘗大雪上雲岫絶頂賦詩人望之以為神仙自號雲村老人又於永安湖買山置杜曲岡雲濤莊後人因名其山曰九杞其後名益髙薦者十數皆不赴居四十年未嘗一入城市最為夏忠愍所重忠愍召起道經加禾以書致相卿與决進止于時藩臬郡縣艤舟祗候道相望也相卿葛巾荔帶刺一小舠詣夏夏問曰僕此出何如相卿不答苐言可惜李長源却受觀察判官夏正襟起謝曰便當疏辭以奉明教須㬰撾鼓回帆顧諸祗候一時散去夏憤然遂不果辭卒及於難相卿詩多清冷有丰骨所著黃門集行世霽色霽色林廬晚愁吟野水灣斷雲虹外雨殘日鳥邉山海宇湛流涕朝班亦强顔獨嗟身世拙早見鬢毛斑又八月望夜玉帶湖泛月良夜不可負人歸還自留天閒多病客月占兩中秋逺水疑通漢輕風穩送舟露華清到骨寒意問羊裘試杖雪徑初扶杖江城欲罷燈題門全謝客行藥偶逢僧候鴈將辭澤逰鯈已負氷湖山春意動逰興日騫騰暮春雨後至孟家瀑空林宿雨歇近郭曙鐘寒亂水斜吞徑殘雲弱傍灘泉聲人語細山氣客衣單老我足幽勝後誰應感嘆附考孟姥泉在永安湖傍麂山之麓有瀑布如練大雪擕鶴觀孟瀑初雪壓髙帽羸驂揚逺鞭玉龍僵不起白鶴舞爭姸山僻地無主骨清吾欲仙長吟雜孤淚歸路晚翩翩獨往興到海濵成獨往千林風日淨娟娟寒山病骨晚爭瘦白鷺滄波秋可憐天地閒愁塵夢醒煙霞勝事草堂偏斜陽深徑漁樵盡弄影蕭蕭石上泉石門西村勾溪至野人淪放紫雲谷勝友連翩根竺村古渡晚寒初艤棹萬峰秋靜獨開門歷探幽壑尋三秀深話青鐙卧兩尊不厭山家淡風物還來茅屋負朝暄除夕感懷酒冷香消夢不成逼人殊覺嵗崢嶸老如舊厯渾無用醉戀殘燈亦暫明雪霰已應隨臘盡梅花寧復與春爭向來筋力虛名盡白髮無愁也自生中秋夜招同孫太初朱西村董蘿石陳勾溪沈紫硤僧石門永安湖泛月一年好月是中秋向夕呼舟抱病逰大地清輝翻白晝良宵幽興屬滄洲湖山影動孤篷逺天水光寒兩鏡浮酣坐不知吟嘯永闌干北斗挂峰頭月林僧舍月午霜天破衲寒梵音蕭颯度林端經殘香燼秋寥泬時有風枝語夜闌南橋一曲溪流兩岸松石梁蜓蜿卧晴虹錚錚拄杖歸來晚月挂東林屋上峰紫硤山人沈祏祏字天用海鹽人居海寧硤山號紫硤山人正德間以資進官王府典膳家有園亭之勝工詩好交游與孫一元僧明秀及同邑諸公賡唱往來有淳朴園稿夏日園居地僻人來少林深月自幽閒行穿竹逺偶坐為花留蔬筍隨時足山厨不外求謀生真得計高卧了春秋秋日同孫太初董子言陳用明僧雪江散步湖上以老杜山青花欲然分韻得然字斜日南屏路幽尋短褐便忘年流水上得意野花前世隔漁樵地秋高鸛鶴天遲留不知晚疏樹一燈然陶布政照照字時明號一菴秀水聞川人𢎞治庚戌與兄煦同舉進士人目為鴈湖二俊終四川左布政有一庵吟稿壻陸􅀈序之今不傳鴈湖晚眺蘅臯秋色滿楓老葉疑花翠黛銜殘日金波浸落霞牧歸猶弄笛漁散却移槎一水盈盈隔柴桑處士家陸光祿淞淞字文東號東濵平湖人𢎞治已酉解元庚戌進士王端毅恕薦之與修大明㑹典成授禮部主事歷郎中正德時藩國多踰例請乞淞格不行時劉瑾用事倭使宋素卿賂瑾求入貢淞疏言非中國利瑾怒中以他事矯㫖收獄瑾敗纍升光祿卿嘉靖初上疏廣言路辨忠佞節財用言極愷切尋致仕自題其集曰東濵逸稿春興水滿菰蒲翠積池小軒風色晝遲遲柔桑已盡蠶將老春社重來燕自知吟對松隂雲薄護坐看花影日頻移滄江逺隔塵埃路得上漁舟是幾時蚤秋初起感興蕭蕭兩徑竹風微晨起新凉透葛衣朝列中階寧望進年過半百未知非五湖鮮可隨時擊二頃苗應趁雨肥寄語傭奴勤緝繕園林如舊待翁歸金山寺同趙滄江髙鐵溪登樓晚酌萬里風波拍楚天江樓突起暮生烟鉢龍帶雨初歸洞野鶴巢雲不記年雙塔影隨塵劫盡一泉名與古人懸白蓮擬結他年社潄石亭前共借眠趙助教萱萱字慈佩桐鄉人𢎞治壬子舉人官國子助教昭明書館考見題咏滿架圗書雜典墳黃金小屋隱儲君銀燈細剔三更雨瓊闥重封一片雲松下有堂存古像壁間無石記遺文韋編錦軸塵消散留得晨鐘兩市聞施太守震震字亨甫𢎞治癸丑進士由固始令升石阡守懾伏諸蠻招擕有法忤劉瑾乞歸贈北郭山人君不見劒南趙昌以畫鳴又不見河內牛戩善寫生古人一藝名不滅君亦能之儘竒絶焚香靜看匣中圖神妙真堪勝前哲施清河惠惠桐鄉人𢎞治丁已貢官清河令銅棺冢香魄已升雲漢去玉軀留瘞此峰巒君看黃土深埋處一樣松風竹月寒沈參議煉煉字剛夫號一山樾之子𢎞治已未進士歷任江西參議嘗戡定桃園巨冦有聲江表丹陽道中山靈莫笑客囊輕幅幅南川贈别情却憶去年今日事滿篷風雪過江城趙貢士彰彰字用常號梧岡平湖人負竒嗜古藏書數萬卷王柘湖為諸生時館其家已而柘湖入中祕每言我所得大半出用常家書也𢎞治辛酉貢入成均有勸其就廣文者謝曰敝廬薄田足供伏臘竒書野乘不乏披吟安能向少年折腰乎一詩載邑乘龍吟閣直收滄海作竒觀髙閣橫空一望寬微雨趂湖生晚信羣山入座起秋翰眼前紫驥皆千里頷下紅珠得幾丸遙聽曉鐘開講後散班分給小龍團附考閣在平湖學宫前啓元門上周教諭淞淞崇德人𢎞治間教諭洪河誰鑿天長水滿塘菑畬端可足民糧欲知遺愛深於海都在空祠一瓣香附考在崇德千乘鄉正德間洪令異開天長河民感其惠稱洪河姚布政鵬鵬字鳴南崇德人𢎞治壬戌進士授龍溪令邑有二惡鵬按以法擢工部郎出守韶州時廣冦髙快馬長朱白毛嘯聚數千人詔以委鵬三月平之又巨盜岑猛據險為亂鵬身入其巢圖其形勢而出王文成得進兵除勦升山東布政卒玉灣春曉考見題咏一曲清江飲玉虹車塵馬蹟往來通笙歌斷續韶光裏樓閣參差烟雨中漁唱時聞楊栁月酒旗斜挂杏花風泠泠金磬知何處路入雲山翠幾重姚醫士能能字懋良號靜山海鹽人𢎞治間醫士題扇風塵滿目動幽思一棹歸閒樂自宜沙上眠鷗莫飛去海翁原是舊相知屠副使壵壵字文治平湖人𢎞治乙丑進士授常州推官擢御史武宗南巡疏諫不報後纍上書皆切時弊巡按廣西濟荒撫冦多所全活轉山東副使致政歸兄奎亦為御史纍疏宸濠不軌有直聲趙漸齊起任陜西詩以寄之美人何翩翩勳業早已樹彤庭十年餘直聲豁雲霧簡拔出宸衷可自信平素因風寄遙情相期在王路蔣布衣淇淇字瞻伯號竹水文藻長子𢎞正間布衣登茅山迢遞華陽道丹梯躡復停雲蒸三觀白天矗衆峰青餌石期探乳驂鸞欲控翎劃然乘浩嘯風急晝還𡨕蔣布衣澳澳字瞻仲號竹山一號蔣山淇之弟有竹山小稿宿資聖寺資聖何年寺蟠龍護法堂烟縈松徑暝雨浥竹窗凉閣影生秋水鐘聲報夕陽塵中碌碌者到此意俱忘沃教諭饒饒字文裕號友石一號鱗州晚號南白海鹽人正德初貢授華容教諭征東行祁連山前箭如雨健兒夜渡桑乾水天子臨軒命出師幾人報國能輕死軍中不聞喪膽謠健鶻垂翅鵐雛髙衣戎賣餅當一隊銅面將軍閒寶刀沈州判榮榮字懋仁號一𢎞桐鄉人正德間鄉貢官和州判官有詩二卷與正統甲子順天中式官知府者兩人亦桐鄉人也勸課還車作新水一篙滑煙村幾許深未聞歌麥穗詎敢戀棠隂春腳晴原野星軺度逺岑豳詩陳欲遍且復坐鳴琴姚太學惟芹惟芹字惟誠綬之孫正德閒國子生著有東齊稿次瞻伯表兄逰茅山韻繚繞烟霞路逰驂傍石停瀑簾飛練白山髻擁螺青雨過蛙生壁風髙鶴振翎春雲當殿合花落晝冥冥胡布衣顔顔字希仁正德間布衣與朱西村朴陳勾溪鑑王犢舟阡陳墨山詢唱和有詩一卷海上晚歸魚蝦入市水風腥海色蒼黃雨腳晴天昏聽鳥音都怪野曠逢人面轉生毒露濕衣蛇草暗盲風吹浪蜃樓平茫然誰是南洲路逺屋欣看村火明犢舟家㑹飲山烟卓午晴不飛草堂邀賔開翠微白袍入門主人笑青絲繫壺童子歸流鶯侑觴作好語蘿隂上壁搖斜暉紅光溢面我欲去醉矣無煩更挽衣西湖不須湖舫載歌聲只任籃輿雅趂情百里好山行恐盡十年塵眼洗何清雲教笙瑟爭留酒晴喚簮鈿亂出城安得移家此中住枕流隄畔避浮名和西臯初寒詩鴈風吹字㸃秋音自葺蘿房整布衾瘠畝荒來憂稅到紙窗穿處怕寒侵衰年虛倚同花甲生意真慙賦樹心誰似鳯幃聫碧玉清宵香擁錦衾深過伯牙臺瑤琴久寂寞古意向誰傳一自鍾期沒那能整絶絃便面黃茅紫竹弄秋聲近水遙山各有情此地肯容吾著腳不妨分個釣魚名沃秀才商舟商舟字民濟饒之子海門道中四山還逺抱一澗繞斜流鴈陳沙頭沒嵐光樹裏浮青楓堪倚棹白草半眠牛落日催行色悲笳起暮愁陳畫士詢詢字士問號墨山善之孫能詩工畫其稿不傳天寧寺海月樓考見題咏孤城曉日闌干近萬里春光煙霧開晴樹直從天外見亂山青自海門來翩翩鸛鶴平原下杳杳帆檣極浦回自惜平生幾圗畫不知曾有此樓臺陶千户炳炳字德明號友松海鹽左所百户髙談善射能詩翰正德初從征開常纍功正千户家有寶劒因顔其堂曰瑞劒春獵隂山疲血戰春野盛逰儀氷滑龍媒騎花迷鳯藻旗角弓爭鴈翼鐵鎧壯魚麗斜月當歸路肩生屬健兒陳博野金金字用礪號石溪鑑之弟正德間以資進官博野令有咏竹奴詩清節有情憐病骨虛心無意鬭纎腰一時誦之寒食書懷江上客居三十年每逢寒食益凄然青山笑人不歸去白髮滿頭徒自憐茅檐幾處插楊栁梨花半開聞杜鵑身世﨑嶇杜陵老夕陽風浪洞庭船宣慰樓彩鴛飛去曲池荒朱箔依然繞緑楊春色不知歌舞盡野花猶學美人粧丘州判珊珊桐鄉人正德間官州判橫湖湖自澄江一𣲖分湖波如練淨無氛行行鴈落秋空影書破羊家十幅裙支貢士髙髙嘉善人正德間貢士梅道人墓徘徊宿草下荒墟一代風流更莫如海內於今重髙士千金不惜換圖書潘介士鵾鵾字惟逺平湖人家貧苦學友朋憐而授之餐或借以裘葛與共讀書侃侃持論不肯附人草舍中窮空無所有掃地晏坐而已領正德丁卯鄉薦授肇慶府判非其好也未幾挂冠歸歸而窮空如故正席抗顔談經為後生師表里人為之語曰書中車馬多如簇潘明府無一舟一僕年八十餘終學者稱東淵先生沈長水為作兩介士傳寒食試望平原上茫茫烟草滋風花寒食路兒女斷腸時閲世黃塵暗懷人白舫遲韶光看欲暮只是雨絲絲李介士蕚蕚字剛甫平湖人少無朋徒自以意績學毗陵薛方山先生見其文重之以為有道氣蕚遂自命必為聖賢作克念圗從龍溪王先生逰終日正容默坐時出城市默自數步而行或時回步從前路起再整步期不失尺寸人以是迂之環堵蕭然一意好道自稱也醒居士年五十餘卒初夏村居四月江村路田家農事賖勳名看飲犢鼓吹聽鳴蛙野饌炊蠶豆溪風落楝花緑隂清晝靜閒坐閲南華沈訓導輝輝桐鄉人正德間貢為訓導塔院誰從寶地結龍宫塔影亭亭勢入空賸有黃塵飛不到講經人在白雲中孫僉事璽璽字朝信號峰溪平湖人正德戊辰進士令興化有豪徐恩入資為千户交賂權貴橫行邑中璽擊殺之民歌曰惡人殺兮虎翼而飛殺惡人兮尫瘠吾肥轉揚州同知時宸濠反江西攻安慶璽奉檄守儀真厄江之衝捕儀賔之僞諜者歷升雲南僉事乞歸有峰溪集舟次淮河龜山宿舸邉淮次山村春事賖野桃臨水短津栁傍風斜草暗都梁路鷗明釣渚沙自憐非少壯撫景惜年華魏知縣楷楷字良謨崇德人正德庚午貢官順昌令有民懷集張氏園雨花園在玉溪頭曾屬張郎載酒逰今日凄凉舊金谷夕陽衰草動人愁陸太守琳琳字文佩號玉洲平湖人正德庚午舉人授清河尹嵗大祲琳躬啖草根開倉賑之擢御史清戎湖廣有善歌者嬖於楚藩頗橫琳摘發其罪巡按四川西南夷叛單騎抵賊巢示威信賊羅拜降賜金綺指揮劉永昌倚武定侯郭勛與蜀藩訐奏事下三司多右昌琳按實抵昌罪復論罷中人姻黨及邉將張麟不法事大忤權貴左遷撫州守乞休卒初夏泛湖麥秀髙原雨腳收旋拏艇子放中流幾因病起愁聞鴂忽憶春深可飯牛粉竹頂齊蒼蘚合刺桐花老緑隂稠興來咫尺斜陽路指點前溪散白鷗趙參政先生漢漢字鴻逵號漸齊平湖人正德辛未進士授建昌推官李夢陽為江西學政檄毁淫祠漢一日毁十五祠拜給事中居諫垣最久其疏上武廟者三世廟者十有四責回話者二奏詔逮獄受杖者一若論蕭敬之怙終崔文之擅政谷大用之請乞扶安之傳升鑿鑿中窽至論首輔張孚敬専恣尤人所難竟以是出為山西參政乞歸自搆園居曰序芳又曰常足窩海內名人作歌贈之又製一舟名平查優遊林壑詩酒自娛著漸齊詩草錢德洪叙之曰公之綱條節概振策紆謨炳耀當世及與公居嗒然若據槁梧若御冷風瀟瀟物外豫讀其詩見其標格清妍摛詞婉約有詞人之風焉沈龍湫許雲南棋子戲作歌促之老夫性僻百不喜舉手談兵病亦起雲合風生結陳來清簟疏簾對孤壘胸中甲兵紙上策閒邉勝敗尊前紀李泌藏機數語間謝安料敵移時裏客卿何來自荒服從以壯士三百六昨日滇南鑰門户今朝浙上屯耕牧自誇此士極悍勇䝉氏降之段氏恐貌近回回閃爍睛裔出羅羅黑白種金馬征行步驟髙碧雞健鬬精神􅑷巴園剖橘倐已變石室爛柯堅不動老夫聞之轉矍鑠安得招徠事經略購以黃金不受金議直􅖝􅖝人百索􅖝􅖝産在南海角鬼運神輸不可諾客卿一笑盡揮來耳邉人馬聲腷膊贈南城夏裕建陽衛知事南鴈飛將盡行舟出潞灣還擕旴下酒來看建陽山海字兵戈靜幕庭賔客閒囊琴與匣劒壯士為開顔蚤雷北園聞早雷殷殷何處來花霧濕逾重栁風吹未開疏籬從竹長新水買蓮栽亦有營巢鳥雙飛日幾回初秋寫建蘭花代柬張四貞表弟問訊東湖曲溪深入望賖聊慿湘竹扇細寫福蘭花舊雨同人話新秋對客茶西樓凉夜夢和月到詩家送同年許九杞得告南還天涯送客望江鄉去住何心共此觴碧落雲間孤劒倚早秋風急舊袍凉祖行敢祝丘園便報國寧論嵗月長並馬趨朝憶明發曉星幾點殿西廊丙戌夏在告答鍾西臯見寄次韻白沙流水荒苔磯地僻人來問訊稀野竹遍依幽徑緑海雲長近小窗飛自應老去隨吾况敢道迂疏與物違猶記初歸夜堂月夢中顛倒著朝衣小園初治次韻答默齊野圃除荒自去年春來風致已翩然青鞋濕露花前立小簟依雲竹下眠潭水細流曾入畫山亭漫紀有新鐫欲過好客勞相問試啓蓬門掃亂煙圗扇面寄唐荆川懷人荆川上把筆寫川流何日重擕手臨川照白頭將過孫西丘十年江海憶西丘梧竹連隂壯晚秋買得酒船還載鶴共乘凉月渡滄洲沈參政圻圻字子京號龍湫煉仲子正德辛未進士歷任貴州參政有感五十年踰又六春浮名不是為家貧夜來蕉鹿方回夢簡點歸期作散人沈訓導朝陽朝陽字向明嘉善人正德間為靖安訓導春祭陳賢良祠考見題咏清風亭下竹森森玉雪寒生酒客襟特為表賢來社里豈因乘興訪山隂再傾𤣥酒千秋祀一疏青苗萬古心踏遍九墩人不見斷碑荒草夕陽沈秋祭陳賢良祠不到荒墩已十年清風祠宇尚依然典型人物非無賴釋奠儀文幸有傳秋月正開丹兔窟夕陽空下白牛田駿奔我欲揚休烈再拜還歌九柏篇林僉事桂桂字天芳平湖人正德甲戌進士授刑曹以執法忤權貴下獄世廟入繼擢祠部郎升荆湖僉憲民兵綸書十道夜行邉亟發千金臺上懸招來六郡良家子選就三河俠少年大漠落鵰花羽箭平原調馬繡羅韉銀鈎色壯千巖月玉帳寒髙萬竈烟曲磴﨑嶇峰矗矗寒陂嗚咽水濺濺功名誓取封侯印離别安知蕩婦篇擁纛霜清聞鐵笛揚旌雪暗拂金鞭猶勝白首悲秋客篝火寒廬手一編諸副使稱稱字揚伯嘉興人正德丁丑進士授黃梅令轉刑部主事歷員外郎擢福建僉事總理屯政頗號詳密終貴州副使歷官二十五年稱廉介焉東臯園寒烟衰草一蕭蕭歌舞曾經樂事饒古寺頽垣無繫馬夕陽深徑有歸樵樽空落月吟魂杳花老殘春蝶夢銷何事池蛙喧鼓吹惱人鳴向可憐宵附考園在桐鄉青鎮宋處士沈平築有蓬萊堂迷仙徑緑荷池梅花關諸勝時宰執吳履齊賈秋壑嘗來逰之沈秀才燫燫字益峰平湖人正德間文學贈半漁風波滿眼老閒情秋冷蘆花夢不生幾曲滄浪歸去穩江空月白小船輕碧里山樵董穀穀字碩甫號兩湖自稱碧里山樵澐之子正德丙子舉人授安義令改漢陽宦歸耕於海上安貧樂志每當過午未炊散步澉湖采白蘋以嗅吟咏自若相知者或賙之一介不取侍父逰陽明先生門識大進其詩新警可誦有豢龍子四存前後集嘗自贊其像云泊櫓山下有一叟焉穿粗布衣卧白木榻出蟋蟀吟做蝴蝶夢坐顔子禪守老氏黑把五栁杯採東坡杞菊使自已賣文錢飽兒孫種田飯不知此何人哉或曰即帝舜所封豢龍氏一百三十世裔孫穀者也九日滿城風雨作重陽花事東籬未見黃夢逐夜鴻驚逺道鬢先秋葉上繁霜卜居欲就飛鳬里禦嵗難逢煮石方世短意多成一笑家人又進紫萸囊蠶詩六首唐李長吉嘗為馬詩豫謂蠶與馬同氣上應房星其功之大不在馬下何古今賦之鮮也豫乃次其韻以配之雖不以追蹤長吉亦聊闡其德焉桑葉小如錢春容淡似烟吳姬能致冨不羡挂荆鞭春水味能甜桃花浴著鹽掃連看萬蟻蠕蠕細相銜懿筐傾露葉羅襪帶春星誤聽中宵雨寧知滿箔聲三冬營密室一月下簾鈎火候難調適輕寒麥正秋公子將歸鴈幽娥不帶花願言速成繭鳴鴂事青麻嗟汝園中柘雖肥不潤身山東行食盡無計却秦軍塞上曲八首遼陽遙空白浪見𤣥菟野遍黃羊草正枯最苦遼陽城畔戍月明清淚下吹蘆山海貢道紆回馬市平令嚴邉塞敢誅徴聖主不乘照夜白逺臣休貢海東青薊州洗劒潮河氷滿川彎弓古北雪封韉將軍好著燒荒令莫遣花當易視邉宣府疾風衝起馬毛乾萬壑千峰鎖塞垣信是上都堪避暑由來六月鐵衣寒獨石桓州西去驛荒凉李信屯邉草不芳白髮老兵知故事細將沿革說昭皇寧夏朔方一帶重環靈何事皇天不厭兵千古賀蘭山上月當時曾照漢家營鴈門鴈門不見鴈臣過唯見驚鴻拂短莎喚醒十年鄉國夢一行寒影下嵯峨玉門武威張掖至燉煌自昔屯田足外攘莫說明初關外事數聲羌笛轉凄凉臨清栁枝詞三首有序昔楊鐵崖瞿存齊皆有蘇杭竹枝詞以形容其艷冶之盛豫謂臨清亦四方水路一大都㑹也顧人不好文地不産竹頌聲弗聞非缺典歟豫乃作栁枝十闋以寫之蓋陳其實以獻俗亦觀風之遺意云銀條首帕髻中蟠茜子紅裙膝下襴行過浮橋寺中去往來多少駐金鞍結束腰肢細可憐女奴相送上鞦韆風光又是清明近墮却金叉記去年行行簷樹碧隂森緑户朱簾粉堵深睡起日髙無一事紫囊惟費買花金計程口號金陵西達九江城九百烟波九日行送客楚山隨岸轉伴人江月徹宵明弔劉大仲嘉靖間千總援鹽死於倭難百千矛㦸一身當半邏橋邉是戰場半邏地名在海鹽西劉長卿詩半邏鶯滿樹學語小兒知姓氏花卿精爽未應亡顧雲雲秀水人寓南潯詩見吳興藝文補大風屋瓦輕飛亂如葉太虛磅礴無光輝村深虎豹夜多出山下獨行人未歸布菜翁沈槩槩字一之號平齊嘉善麟瑞鄉人少竒頴年十二就試省闈為八校之雋與許雲村同為慈溪張東溟門人正德間以貢授江西布政使司都事非其志也槩性至孝究心理學晚業衰落著布菜翁傳以見志時島夷犯三吳槩抱祭器避郡城卒所著有筆思記鄉約釋義時務議平齊詩文集多古詩詞㫖沈鬱力矯頽靡比事寓情自得其志望而知為鴻儒耆宿不特詞家之選已也聞王伯安過嘉興驅舟特訪不遇出門未梳頭旭日紅欲起遙持十載心養養扁舟裏停橈問北郭遲回復西市髙人不可逢寒雲卧秋水訪姚惟誠一心堂露飲幽花抱古木疏影散庭際露清風力微落葉不滿地我為明月來還向月中醉風流到僮僕翩然雜歌吹憂時感商聲忽墮中宵淚麥秀兩歧歌九五飛龍起淮泗瑞麥遙從寶雞至當時和氣致嘉祥作頌者誰劉學士邇來七十有餘年史策歷書非一事麒麟在郊芝在庭五穀資民乃為瑞四年春王三月朔好風自南甘雨作大田沃野浙東西爾畝我疆天寵渥桑隂碧浪自粼粼壠上黃雲何漠漠金莖翠旗光陸離金粉飄香吹滿畦扶風四穗尚望昨漁陽兩歧今見之兒童走報爭先覩父老傳言喜欲舞繡衣柱史觀風出歸見官僚笑相語皇天有意兆豐年多黍穰穰復多稌我本嘉禾識字農願與王家作編尸但令二稅早輸官不願閒身至官府時復作歌歌聖主吁嗟劉郎不可逢頌聲洋洋美千古題畫一片㑹心景蕭然落畫中逺峰低度鳥流水靜歸篷橋偃疑分月林疏不礙風誰能來此地尊酒故人同秋興柴門本與林壑舊城市夜來清夢稀香粳入户雞蟹賤新酒出篘螺蛤肥天風輕吹野水碧江月欲上寒雲飛深閨暮砧不知急布帛隨分堪為衣陳賢良祠當年秋氣薄浮雲一疏清風萬古聞可是星江無白犢故園歸計尚勞君朱畫士端端字克正平湖乍浦人正德間以畫士直仁智殿授指揮俸賜一樵圗書遂號一樵畫宗馬逺呂紀居京師甚為時所重同時曾和者亦乍人與端同直仁智殿二人初皆貧甚業漁樵事時海上天妃宫未建名一片石端嘗于石上或沙上作白描勢忽一日入山遇一異人問曰汝欲作畫耶我授汝筆和亦跪而乞亦出一筆嚙其頴以授之忽不見由是兩人用筆隨意皆殊絶今端畫猶有存者趙漸齊有題朱一樵平湖圖詩題畫自剪烟綃寫釣竿孤舟一葉楚江灣凉風捲盡秋雲去飽看黃陵數點山沈大使溱公諱溱字惠水號東洲八世孫季友謹按家乘及晴峰太史松鄰韓公傳有云公倜儻多才立然諾喜結客兩浙多有聞其名者正德之季為文思院大使從事京師以事忤劉瑾廷杖下獄欲置之死有松鄰韓公者與公善走泣於項襄毅屠康僖得釋瑾恨未平將復杖之韓公流涕曰沈公繫獄數月再杖必不起我不忍良友倣徨死也請以身代㑹瑾竟不問乃歸耕於東泖之石莊云獄中自述天亦有清霜豈為庸夫計人亦有繫辭豈為賤子慮嗟哉大廷杖乃得鞭小吏俯首傷孤根飄風落秋蒂身繫洛陽獄旦夕且就斃無聊弄赭衣圜扉夜雙閉哀角刺我耳饑鼠嚙我臂我聞常侍橫紛紛生黨議不見乾寧災大權委奴隸悠悠漢唐書三復起流涕張南雄徽徽字德卿號寒崖秀水人正德庚辰進士授大理評事時議大禮忤㫖廷杖尋復其官進寺副奉命慮囚雲貴釋殊死以下百餘人進寺正擢守南雄多惠政歸田十七年卒有和古集秋日漫成村野人家薜荔房西風催葉送秋忙一灣水畔有籬菊五畝宅邉無樹桑語切舊巢歸燕意䓑浮新甕隔鄰香坐來漫動臨池興學草終慙舞大娘檇李詩繫卷十一
