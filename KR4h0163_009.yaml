body:
  text: 檇李詩繫卷九平湖沈季友編明菊莊處士陳昌昌字穎昌號菊莊平湖人我郡自清江巽隱後風雅衰落二陳二李之餘無聞焉至正統天順間而始盛一時如陳菊莊外嘉興有姚穀庵海鹽有張方洲嘉善有周桐村皆卓然大家也菊莊我里先哲才思藻麗長於七言沈石窗兄弟目為畏友著有菊莊集惜其不傳僅從檇李英華録若干首窺其一斑已足俯視流輩豫輯是編遍搜遺稿大抵所傳者多科目中人至於恨人畸士山夫野叟半就湮沒數年來悉力采之一以表微為務古人云非作之難傳之難信乎奉謝楊同府惠箋九龍暖吐沈香水洗出金盆雪花紙半點纎塵不敢汚分明只隔珠宫裏馮夷南來騎大鵬倒握雷斧驅雷丁夜深偷入娑碣窟琤琤斫碎玻璃氷初疑鮫綃脫機杼又疑白繭離霜杵一幅開來一幅新壓倒尋常千萬楮東倭玉版不足稱西蜀薛濤空有名連城價重人莫識千金抵換猶嫌輕伊昔黃門蔡倫造魚網麻頭盡稱好邇來四萬八千秋流落人間為至寶至寶原來不易逢君侯得自波斯中一朝分賜到茅屋隂崖便覺春融融從此光芒動星斗攙搶亂落旄頭吼欲修五鳯文明樓不是公輸運斤手況今作者多如雲騰蛟起鳯何紛紛只須題遍新詩句一束相思寄與君江湖勝覽筆牀茶竈寄生涯來往煙波到處家帆影拂雲過九澤猿聲啼月下三巴黃陵廟古多春草白帝城空有暮鴉寂寞不須傷往事且沽尊酒洗梨花送魏汝賢之遼陽三首海天東去是髙麗若説遼陽更向西馬谷春流和雪凍龍城秋草拂雲齊千家疏雨無砧杵萬壘寒風有鼓鼙却歎浮生江海客百年幾處聽晨雞晚風立馬望中原遙隔齊州九點煙部落已非秦日月幅􅊷猶是漢山川銅駝荆棘埋荒土金雁蘼蕪接大田千古興亡一尊酒莫將往事問蒼天灤河日日北風多嵗晚猶乘一傳過土窟人家低似垤壁門軍壘小于窩避人飢鼠偷紅粟呼伴鳴鴻下緑莎此去龍沙城畔宿相思其奈故人何題戎王出獵圖寒到榆關草木凋沙場射獵擁天驕絨縧背日翻金鶻羽箭穿雲落皂雕得雋未頒紅匼匝割鮮且進紫葡萄閼氏醉倒穹廬底回首長城月正髙送吳素行之廣西廣州南望海冥冥百丈牽江幾日程鯨浪打船風正惡蜃灰塗屋雨初晴蠻巫祭鬼慿雞卜島户編氓事象耕此去化成皆樂土尉他不敢更言兵暮春寄友人風風雨雨禁煙時過盡春光總不知桃李野牆花落早蘼蕪江國燕來遲夜深簷溜寒無寐日晏厨煙濕未炊裘馬蹁躚自年少獨慚衰朽困天涯陸魯望像筆牀茶竈載孤篷家住吳江震澤東鬭鴨聲沈煙水冷何人知是陸龜蒙蘭竹圖時英廟北狩鷓鴣飛處雨斑斑一去鑾輿窅不還日暮東風芳草緑更無人上望夫山秋蝶秋來風露漸凄涼色褪宫黃粉褪香不比未央年少日一雙飛上玉叉梁葡萄宴罷瑶池夜未央歸來帶得紫雲漿劉郎命薄無仙分只識金柈露水涼檜樹提壺不到臨卭市上沽春禽終日呌提壺緑陰遮滿城南路忘却文君舊酒壚衮塵馬圖霧鬛風鬃汗血騧也曾千里渡流沙絲韁不受黃門控間向東風滚落花棠梨白頭公二首唐家羯鼓寢園空猶有棠梨一樹紅幽鳥似關興廢事白頭無語立東風天寶繁華事已休鑾輿西幸劒門遊野棠零落春無主啼得山禽也白頭雪山圖萬壑千巖凍不開璚樓玉宇似天台黃精香冷無尋處誤却劉郎采藥來鈎勒竹秋風白戰楚江濤雪捲空山見海鼇一夜靈妃眠不穩月明飛珮過湘臯題思陵竹石棠梨一片荒涼艮嶽峰竹枝歌罷寢園空不知龍馭歸何處間却棠梨滿樹紅買臣負薪圖出山塵土入山雲斫盡青山幾擔春便是會稽乘五馬也應羞見後車人吕文懿公原原字逢原號介菴秀水人正統六年解元明年成進士以榜眼授翰林院編修景泰中為侍讀學士兼中允天順元年改通政司左參議仍兼侍讀入內閣尋升大學士時曹石怙寵用事嶽正暨原列上曹石罪狀留中不報曹石恐謀摘承天門災詔中語為閣臣訕謗上怒召對近臣厲聲曰正大膽敢爾原素謹厚乃左右正何也正既去原得留與李賢同相李賢通達見事立斷原守正謹恪濟以持重以母憂去卒於家贈禮部左侍郎諡文懿原內端外和不茍取豫性儉約身無紈綺篋中惟賜衣數襲每分祿以贍宗姻平居無疾言遽色楊文懿誄及劉文安挽詞皆實録也嘗著宋元通鑑續編義例精審書成鬚髮盡白曰使我進二階不若稽古獲一事外有詩文集十二卷和許太常遊髙少保南莊二十韻西灝行秋令南莊賸晚馨萸芳聨杞菊松古帶絲苓一鏡開寥廓孤輪轉曜靈碧梧枝綴露丹柿葉藏星爽氣消煩酷晴光豁窅冥鷺飛紅蓼渚蛩響緑莎汀竹塢晨霏斂茭塘宿雨輕元僚居瑣闥休暇出彤廷勝習朝簮盍幽尋野騎停眼將周禹甸心只戀堯庭潄石臨清澗窺園步近坰蘭敷莖已紫荷折柄還青暫憩林邉館仍遊水上亭波平紓素練山秀送藍屏遣興窺銀管忘懷罄玉瓶形骸超字宙襟度散滄溟日暮情難倦天涼酒易醒英標人盡仰偉論衆皆聆歸路無多逺都門尚未扄來朝趨閣早欹枕漏頻聽項襄毅公忠忠字藎臣嘉善人居秀水正統壬戍進士歷刑部員外郎從英廟北狩陷沙漠走七晝夜始達宣府足刺蒺藜數百不覺也歸晉廣東按察副使歷陜西按察使賑活飢民以萬計憂去軍民伏闕請留詔奪情還陜遷右副都御史撫其地時洮岷番亂調兵撫捕之成化元年冦入延綏塞忠及寧逺伯擊走之陜土亢且鹵忠開龍首渠鄭白渠灌田七萬頃固原土達滿四叛有衆二萬廷議推忠總師忠曰此賊須坐困之乃據其水草持百日賊渴甚有降意忠單騎入賊營衆皆來歸而滿四尚率驍騎劫營大小百餘戰皆捷擒其愛將楊虎貍不殺解所珮金鈎遺之遣使內應賊遂平升右都御史京師大水詔忠巡視順天諸郡賑活無算荆襄賊李胡子為亂復詔忠督師往討忠先榜諭散歸流民百四十萬斬首三千餘級因獻俘上便宜十事尋轉刑部尚書改兵部時巨璫汪直擅權忠疏其姦罷直東厰有御史戴縉附直上書白其能仍領厰事遂構忠落職去七年諸姦敗復忠原官卒贈太子太保諡襄毅著有藏史居集出清逺峽野望行盡峽中路蒼茫見逺天平林明旭日飛鳥出寒煙緑樹江頭驛黃茅郭外田孤懷無限思望斷白雲邉夜泊感懷兼葭蕭瑟露華清淡月籠沙淺水平今夜不知廊廟上何人有夢到蒼生題徽宗畫碧桃鸜鵒五國城邉掩淚時汴梁宫闕了無遺爭如鸜鵒知春意猶占東風第一枝沈廣州琮琮字公禮號石窗平湖人正統戊午舉人壬戍進士開邑科甲自琮始授南京兵部主事出知夔州改重慶府皆以喪不赴與弟珒廬墓六年有馴禽靈草之異事聞詔旌其家時珒已卒于墓琮抗疏極陳願以與弟事雖勿果聞者義之後復為廣州守多惠政以病歸卒魏文靖志其墓著有石窗漫稿東宇稿廣遊集紀行稿宦遊筆録今多散失是科吾郡登進士者三人一為吕文懿一為項襄毅皆為國名臣琮雖位不滿德而純孝之風垂裕無極矣逰陳山分韻得山字涼燠互遷易大化斯往還少壯能幾時華髮颯已斑猗彼泉石人如脫紅塵寰佳節值良友丘壑同躋攀有酒相擕持有詩互評刪慮靜水不波心與雲俱間炎炎慿勢徒棄德方崇姦所以五代子自題作癡頑何如侣松菊不為世厚顔俯仰古今事一笑空秋山遊牛首山𢎞覺寺石磴攀蘿逈入雲翠微深處路平分山花帶雨落成片野鳥見人飛作羣杖影秋扶孤客健鐘聲晚落下方聞逺公社裏多幽思且向東林看夕曛遊靈谷寺重向東溪問石橋深深小徑入林坳雨餘竹外僧歸寺日上松顛鶴下巢陶令却憐容入社阮公真喜得行庖相逢未有歸來賦寄語山靈莫獻嘲倪教諭政政字拱德海鹽人正統戊午舉人官教諭以子顒封太守松溪書感一官兩度到南閩路入松溪染客塵馬過嶺頭雲窅渺船來渡口石嶙峋山居屋破多無主野寺門開不見人四十年餘遊此地宦情牢落鬢如銀支孔目立立字中夫號蘧庵嘉善人事母以孝聞正統甲子舉鄉試天成間官翰林院孔目與羅一峰友善敦務本為已之學博通諸經妙於講解時號支五經東作圖一犁春雨盈田疇村南村北啼鈎輈陽和入土土脈潤穀種已見舒銀鈎朝來雨晴天氣燠大牛小牛泥滿腹蚊虻亂集龍貝疏驅牛且向前溪浴浴罷起來勤著鞭趂暖且耕山後田山泉易涸時易過蒔秧肯讓他人先阿翁老倦扶不起阿婆日旰未梳洗鳶魚向人如道飢飛來啄盡盆中米婦且炊兒莫啼蠲租有詔矜黔黎五月不須糶新穀酒壓珍珠飯抄玉謝嘉興邑宰陳瑞卿厯日山北山南丈餘雪牀頭布衾冷於鐵清晨獨自抱衾卧詩骨稜層凍幾折街衢撾鼓迎東皇忽送土牛來草堂陡覺寒威斂鋒鍔輝輝四座生春光土牛雖云三寸腹滿貯東風三萬斛芒兒鞭起地中雷翻轉天杓撼地軸春色多於豪富門誰肯逺分林下人賢侯胸次足春意要使物物皆陽春潦倒自來門第冷最苦窮冬更漏永明年早放此中來莫待梅花弄清影小瀛洲為王學士賦碧香蘿屋小於車門掩篔簹石徑斜池面魚苖吹栁絮矼頭鶴迹印苔花看山靜拄新頒笏摘葉間書舊草麻若比仙家更竒絶濟人别自有丹砂許訓導詢詢一作珣字士章號淡軒海鹽人正統丁卯舉人天順間授安溪訓導張給諫寧劉侍御泰鄭提舉延皆其門人也金山寺砥柱障江心禪宫嵌碧岑峰髙忘地窄波靜覺天沈鷗散驚帆影鼉鳴應谷音紅塵紛兩岸長嘯豁煩襟施同知奎奎字漢章號竹坡秀水人正統丁卯舉人以學職升王府長史改南安同知有竹坡稿人日喜晴次廷冕韻環珮聲中散早朝日華點點麗層霄五花承繖春剛到三素蒸雲凍已消弱栁半含新緑淺疏梅偏逐暗香饒翻思杜老題詩日回首鄜州路更遙劉布衣傑傑字季俊號緩齋正統間海鹽人麟溪小隱麟溪渺渺接滄洲傍水人家事事幽春雨桑麻林谷晚西風禾黍野田秋紅塵路逺無車馬白石磯間有釣舟不用鹿門尋舊隱自將蹤迹寄沙鷗沈御史珒珒字公貴號青璧平湖人八嵗能詩與兄琮齊名時稱雙璧正統甲子解元景泰辛未登進士授御史尋丁父及繼母喪與兄同廬墓哀毁成疾卒年三十有八長轡未騁芳蘭早凋惜哉吳山尋錢道士世外追尋石徑賖憑君一鉢飯胡麻仙人鐵笛邀明月髙士瑶琴泛落花樹杪江帆輕似鳥岡頭籃筍穩于車遲歸不盡看山興又向前林摘枇杷題漁隱故居名落人間數十年一溪漁隱自悠然晚風楊栁堤邉笛秋雨蘆花渡口船沽酒肯邀漁父醉枕蓑時伴野鷗眠只今回首成陳迹贏得人稱似輞川姚布衣綸綸字允言號夢草嘉善人本姓卞正統間布衣著有夢草編題畫風景蒼茫地人家逺近煙雲低長礙樹水逺欲浮天白日消棋局青山落釣船平生蕭瑟意對此轉相憐竹石山房山花種滿碧琅玕怪石相依更好看玉氣暖蒸雲五色翠梢晴弄日三竿白羊未化長眠雨彩鳯深棲不畏寒補遍蒼天人不老清風日日報平安聨璧卷仙子瑶臺玉一雙碧桃紅杏兩生香絳裙拂地春同步寶鏡開奩曉共粧織翠舞衫封蛺蝶泥金歌扇畫鴛鴦卷中乍識春風面惱我題詩一斷腸金沙夕照為雲間陳廷璧題仙巖花落晝漫漫巖下砂明趂晚看金閃亂星千萬點樹留斜日兩三竿虎蹄印處迹猶暖鴉背分來影不寒想見素雲修鍊後應將封鼎養神丹江湖勝覽江湖隨處豁吟眸不滿詩囊卒未休日下風雲瞻魏闕淮東歌舞認揚州一篷疏雨鷗邉晚千里殘霞鶩外秋見説武昌城畔栁尚含青眼待重逰逰汾湖萬里青天萬里湖月輪飛作片雲無影搖黃鶴磯頭夢光奪驪龍頷下珠魚唱悠悠來逺渡雁聲嚦嚦起寒蕪滿船風露秋如水身世分明在玉壺張太學孟顒孟顒字卭之號養素秀水人正統間太學文朝類選國朝文纂檇李英華中俱有孟顒詩錢塘懷古帝子南逰竟不歸六橋陳迹草萋萋月沈孤井銀瓶泣木落空陵鐵馬嘶王氣北隨吳地盡越江東去海天低可憐和靖祠邉路疏影寒香鳥自啼海棠白頭公紅濕胭脂露未收曾燒銀燭照風流不堪狼籍春殘後愁得幽禽也白頭鐵松道人懷悅悅字用和號鐵松嘉興相湖人正統間以漕粟入官嘗輯一時名士詩為士林詩選有鐵松集結屋結屋雲蘿裏窮經日下帷溪深鷗夢穩松老鶴巢危隔竹安茶碓分泉入硯池鄰翁夜相過洗斚遂前期登城望鴛鴦湖一上髙樓思不羣東風吹面洗餘曛紅船烏榜春湖上多載銀筝入暮雲過相湖扁舟飛出相湖東花片紅穿樹底風才聽前村鳩喚雨斜陽又在莫雲中附考在府城東北九里昔為相姓所居俗名相家湖劉延平侃侃字克剛嘉善人景泰庚午舉人知涇州擢守延平多惠政乞歸號樂間公工楷書詩文亦清麗梅花道人墓草色被荒冢苔䀶蝕斷碑長縑留墨竹小草見烏絲鶴化雲深處鵑啼月落時豫生百年後再拜一題詩劉御史泰泰字世亨號蒙齋傑之弟景泰辛未進士入翰林改御史疏劾閣臣江淵移其官天順初與楊瑄極論石亨擅權下獄幾不免臨卒作詩云清白肯為兒女計疏狂曾切國家憂擲筆而逝年三十有八暮春舟中獨客自生愁非關嘆白頭雁迷青海月人老玉關秋冷淡憐江草清間羡野鷗推篷發長嘯詩思滿滄洲挽朱孟寬曾擕孤劒入轅門老大還家荷主恩青草塞邉丹鳯詔緑疇軒外白鷗村一蓑煙雨銷殘夢幾樹松楸泣斷魂尚見鄉人存舊德尋常相對有啼痕休寧道中東風吹我過休寧軋軋肩輿路幾程山鳥有音堪入聽野花無數不知名孤村荒落溪邉繞五嶺﨑嶇樹杪行日暮郵亭暫安憩且將蘇息問蒼生館中春日雲外青山繞禁宫樹分晴色映簾櫳玉堂西畔微香度紅藕花開太液風聞同知恭恭字近禮本姓聞人原籍鄞縣居嘉興景泰癸酉舉人天順間授教聘典順天鄉試官終同知和吳鳴翰栁枝詞聞説細腰多善舞還憐纎葉似蛾眉如何栽向長亭畔只與行人管别離宮詞小立東風翠袖寒湖山隂處數琅玕紅顔不似能言鳥曾得君王一度看伍知州方方字公矩號聽雪一號栁庵嘉興人景泰甲戌進士官武岡州守以罪纍戍栁州有集十八卷和丹丘丁莊道中韻下馬丁莊宿殘陽歸亂鴉深林無旅店隔屋有人家送雨晚雲散欺風新燕斜山翁聞客至來供早春茶次丹丘表兄過桐廬韻兼致别思知君謫宦為彭澤我亦棲遲桂嶺東鴻鴈情深長惜别琴書道在未為窮青山笑客頭先白緑酒欺人頰易紅莫向桐廬悲失意披襟且挹釣絲風為葛都司題三馬圗曾從先皇戰黑山淋漓汗血尚斑斑如今四海無征伐嘶老春風十二間畫竹花點湘雲墮碧川翠梢零落帶秋煙歸篷記得曾看處殘月黃陵古廟前李莆田景孟景孟字養浩號梅南季衡子景泰甲戌進士官莆田令聽月樓莫論無聲與有聲登樓一聽便分明素娥度曲凌風細丹桂迎秋落子輕玉兔不知霜搗就氷輪原許斧修成夜深坐對山河影贏得窗前兩耳清蘭年年五月長中庭緑葉參差覆紫莖自與修篁同冷淡不隨凡卉共飄零月移清影臨書幌風度幽香襲硯屏贏得詩人吟不倦一窗涼雨誦騷經張汀州先生寧寧字靖之號方洲海鹽人或云海寧人誤七嵗題畫龍有莫點金睛恐飛去之句景泰甲戌登進士受知于少保謙姚尚書夔授禮科給事中內閣陳循王文以子不得舉中傷考官寧疏言其失大臣體又疏請裁止曹石陳乞等事聞者竦然天順中奉使朝鮮餽遺一無所受朝鮮為樹亭曰却金陪臣朴元亨從逰太平館寧賦百韻詩朴隨手和之殊不相下寧得溪流才白春前雪栁折新黃夜半風朴乃閣筆曰不能和矣升都給事中憲宗朝首勸經筵又薦起王竑李秉諸大臣不悅太后生辰設齋醮禮官斂大臣金錢祈福寧言不可給事中王徽等劾內閣李賢寧又合六科申救人益忌之出知汀州未幾乞歸家居三十年日杜門以琴書自娛放志山水綵舟蠟屐隨意所之興至成文呼筆立就性喜繪事特饒姿逸然不輕與人點染沒後無子有二妾曰寒香晚翠剪髮自誓不下樓者四十年詔旌為雙節著有方洲集是時風雅寢微寧力為振起厥後董許朱陳輩出武原詩學所以獨盛於他邑也畫米元章拜石圖附一詩吾聞周人拜九辨各有則空稽猶簡易振肅儀已極禮達百不煩力致一可惜蘇卿抗名王鄭從厲絶域亞夫辭介胄汲黯服長揖生死矢不移寵辱安所恤云何後來者軟媚等難極望塵伏牀下不復論曲直黠以諂公卿愚以祈老佛頽流逐靡風掃地盡古迹元章夙竒蕩動止異俗習強項難茍俯捫膝不輕屈自從辭君親久不為是役落落無為鄉寥寥不齊邑伊誰與為禮見此孤立石颯焉松風生隱只雲霧出踞如猛虎化厲若老蛟蟄倣佛入魯廟正我緘口客又疑千秋亭翁仲失其一終知混沌鑿倐忽委靈骨欣然命袍笏雅拜情孔適物我了相忘恭傲吻無隙清狂詎如許深意將有激全勝彼昏人僕僕賈危慝但恐違中庸行怪不可率為吳玉甫侍御題芙蓉圗志在懷寂寥佳人念遲暮本與秋風期不悟春已去嫣然如有情暄妍發寒素紅搖碧潭水緑掩黃葉樹垂垂翠帳煙冉冉錦城路試問涉江人相思在何處寄楊廷憲障海詩吾聞浙江潮湧撼勢莫比回流趨鹽官一射數百里海鹽當其衝適際南北趾何年作長防去郭數丈許疊石類懸崖壁立瞰其涘刳中實外障髙岸湮入水表裏河海間相隔才一指譬如潰表形皮好肉已毁潮來石奮角潮縮石拔齒時平漸離缺風迅遽披靡于役嵗無涯漂蕩日當耳皇皇魚鱉民藐藐軒裳子剝牀不及膚解牛未得理豈無達務才遺吾徒好語使君人中英萬物備諸已咨詢度豁如顧盼心隱只發彼巉巖孤砌作盤屈峙軒然巨鼇側坦若長蛇迤罅漏互散虧力勢相併倚盈不與石鬭縮不隨浪委肉厚骨不疏腹飽背復僂秦鞭竟空談漢絙無用此何期既倒瀾忽見急流砥但恐述者能不類創者美速成功易隳舉重力易弛安得百使君歷嵗如大禹東作莊歌考見題咏朝出耕向平田午就餉翳林木父子婦姑皆願勞趂我農時播嘉穀嘉穀有望先輸官免受催租郡吏辱年年常若今年耕莫效西家賣黃犢士女圖吳城士女越樣粧籠冠盤髻銷金裳東風淡蕩桃李月看花不語情何長女伴相將牽稚子庭院無人花正芳陽春宛宛白日暮空抱花枝歸洞房張靜婉採蓮曲蘭橈桂槳橫江浦玉露金波花正吐蓮步初從掌上移栁腰新罷盤中舞腰纎步窄不勝衣露縠煙綃揚欲飛雨歇朝雲降巫女月明秋水現湘妃蓮房巳實蓮莖短幽思傷心悄停腕弱腹羞看翠褓圓柔腸暗逐氷絲斷眼前歌舞易淹留只恐風流不到頭翠袖香銷紅艷冷無人重上採蓮舟邉景韶畫馬為劉廷器題隴西邉生寫生者拓得唐時紫騮馬赤驃青驄却不前白鼻烏騅價斯下想見開元全盛時海宇無塵戰爭罷七十萬匹錦成陳十二天間沫流赭從來主管張萬福底用誅求王母寡民間自可一縑易官裏或許儒臣假衆中駿逸知幾何此馬翩然空兾野天機自許九方識骨格須煩曹霸寫未辭羈馽欲騰驤步入﨑嶇更間雅當時死骨亦竒貨畫出千金如土苴眼前誰是按圖人苜蓿秋風漫盈把夏仲昭萬竹圖為師知縣題崑山老叟仙中人清和灑落無纎塵平生富貴不足道筆挽造化回陽春坡真可妙真堪惜老息森嚴露形迹鷗波亭外寂無人九龍山氣凌秋碧山氣凌秋勢薄天凝雲挾霧快騰騫巉巖削壁九千仞此老直欲窮其巔金閨鎖闥瀛洲路宣德年來誇獨步名髙價重不復疑世間托筆應無數枝幹依稀叢葉同天機妙解却難工就中一片飛白日爛然琢玉寒玲瓏謇豫最愛瀟湘景見畫令人發深省曲處疑聞爽籟生深中自覺隂風冷深曲低昂路鬱紆幽情欲盡似還餘三湘逐客歸來未二女遊魂今在無從來能事不受迫醉裏蘭亭難再得使君此幅自何來千金寶劒連城璧半窗疏影對愁眠斑管春寒詩思牽玉蟬冷吸鷓鴣雨文綃細簇玻璃煙却思京國頻相見自謂相求當不厭豈料公歸緑野堂至今誤我鵝溪絹江南緑竹漫成林山縣鳴琴白晝隂他日使君江北去披圗應憶嵗寒心並笛圖被裏鴛鴦春睡足蛾眉補尖黛凝緑沈香亭畔鹿眠花倦倚東皇吹紫玉翠鬟嚲香薰柘黃左拍酥肩右按腔官娃張版候節下花奴緩舞隨聲揚流宫變羽都在口縱橫半借君王手就中一指忽差移風驚别調淒涼久蜀江煙水接華清並轡何如並笛情可憐一曲升平調弄作淋鈴哀怨聲寫得一徑野花落孤舟春水生詩意因題林外春隂曉風作門徑幽深野花落東家春色過西家井口籬根亂漂泊溪頭新水繞門生扁舟一葉輕如萍杜陵老病煙波逺欲載詩愁過洞庭題沈石田雲山圗青山白雲無處無幽人寫作雲山圗山荒樹老雲不散落日未沒春愁孤蘼蕪滿地王孫去鶯燕無聲春已暮空谷佳人白髮新清明寒食傷心路重遊金粟山溪深通小艇山峻露層臺木葉經霜盡河氷近午開間雲僧出定舊雨客重來擾擾浮生路經過知幾回松泉軒松葉緣溪密山泉夾岸流雲深常閉户石礙僅通舟鶴宿庭中月厨分澗底秋曾聞軒下客為説似玄洲感事二首羽書昨夜報居庸百萬雄師下九重天子垂衣臨大漠羣臣端笏扈元戎禁中已乏回天諫閫外誰成闢地功千古澶淵扶日轂令人長憶冦萊公寶馬朱輪接上遊時危誰解奉天憂鼎湖龍去英雄盡劒閣雲深日月愁玉輦已隨邉地草青山依舊漢宫秋元勳野死潼關破誤國何人更首丘送史明古過訪還吳江一燈新火映鄰扉話盡殘更未解衣元亮老嗟蕪業改無功生怯醉鄉非天孤逺鴈和雲斷風急春潮帶雨飛暫爾相逢便相别袛應清夢送君歸題伍公矩桂林别意册後五嶺行雲七澤風東將入海泛鴻濛生還却笑征南老往事空驚塞上翁萬里歸心孤磧鴈草年春夢五更鐘曲江院裏看花伴物色於今盡不同澉川圖澉湖新漲碧潺湲秦駐髙峰紫翠間拂暑煙雲蒼壓水過春桑柘緑彌山海門桴客浮何在石屋棋翁去不還欲趂蘭舟一登望杏林深處草堂間資聖古杏樓考見題咏何處招尋泛羽觴髙樓花近淨年芳荒村暮雨曾沽酒梵境春風不出墻老我重思曲江院是誰今卧午橋莊相逢盡是憑闌者莫道偷間過竹房自題方洲草堂一住深山不計年幽居風景勝平泉茂林芳草無行轍流水飛花有釣船白髮人間將老矣紅塵夢醒益蕭然憑誰喚起王摩詰為寫吾齋入輞川莫愁樂金雀玉搔頭生來喚莫愁自從歡去後不出石城逰黃竹子歌儂從江上來歡向江隂去黃竹笋成竿不見歡歸處宋太子墨竹御墨龍香出內庭幾枝疏影拂前星當時粉繪都零落惟有寒梢似舊青為徐甘谷寫枯木竹石梓澤荒涼勝覽空平泉無樹領春風與君共老滄江曲晚色寒聲滿釣篷題子昂馬圗沙磧春深苜蓿肥錦鞍新卸逺行歸健兒不敢從南牧手挽弓梢看雁飛題畫淡煙疏雨過梨花白鷺風髙栁半斜芳草滿池春水漲間尋蚱蜢釣青蛙寄張天所杜陵莊南雲氣昏尚胥橋北水連村春來日日多風雨一棹浮查直到門釣魚圖為劉邦彥題深水浮篙淺礙舟滿林風雨不知秋如今盡結橫江網那有間魚上直鈎題蔣文藻墨竹娟娟叢緑繞流泉萬玉低迷日暮天回首川南與川北鷓鴣聲裏雨如煙張復陽畫山凝嵐氣樹凝煙宿雨才收社後天山下人家夜留客開門花落滿籬邉題鴈孤雲寒影共悠揚塞北江南萬里長最是日斜疏雨歇半拖秋色到衡陽後浦漁歌欸乃新聲度逺汀煙消日出樹冥冥年來悟得滄浪意長近西堂竹下聽題梅道人墓二首荒山亭館客逰稀瀑布無聲野鳥飛愁絶梅花庵外路年來風景故應非曾將心事托寒酸種得梅花遍草庵騎鶴歸來城郭是西風殘雪滿江南畫景千山晴翠濕春雲萬樹凝風晝不分欲趂山童入深處落花填徑鹿成羣題畫雨晴芳渚野鳬飛楊栁條長荇葉肥間展蓬窗看溪水春痕才上釣魚磯蘿雲居士劉常常字世經號蘿雲居士泰之弟諸生嘗輯海鹽邑詩曰武原集題竹滿林煙雨緑參差回首蒼梧輦路迷鳯鳥不來人已去湘江空有鷓鴣啼青樓怨緑楊飛絮撲簾輕百結愁腸夜轉生斜抱銀筝對明月十三絃裏最關情竹枝詞二首瞿塘峽口燕雙飛把袂相看恨獨違勸郎好學雙飛燕一度秋風一度歸送郎萬里戍邉州長日相思怕到秋願得郎情如皓月清光夜夜照儂愁桐村老牧周鼎鼎字伯器號桐村又號疑舫嘉善蘋川人少警敏以文學知名正統間尚書榮襄金公帥兵征閩過嘉興鼎以布衣謁見與語大竒之辟置幕下議進取方略多見用嘗與千户龔遂竒從數騎入龍溪山寨降其衆而還幕府不知也冦平遇土木之難格其賞久之授沐陽典史師次杭州四明章文仲來謁曰聞幕下有周鼎竒才願與之角金公出南征百韻詩朗誦一過各書一通上之不遺一字鼎曰能從末句倒誦至前乎章謝曰服矣尋以淮土民飢鼎欲奏請賑濟忤當道罷歸囊槖蕭然賣文為活吳中墓志譜諜皆出其手造請填咽晚年起家為富翁石田贈詩有山縣軍書前吏迹墓堂文字老生涯之句年近九十修杭州志燈下書蠅頭不爽毫髮平生為文援筆立就不加點竄尤長於詩絶句推江南獨步有土苴集讀之沈雄歷落有橫槊磨盾之風然一往多雋思故是大難耳五馬圖為湯汝明作丹青五馬出神化誰其畫者韓曹亞前行一匹照夜白輕素隨煙淡無迹戲與其羣怒相嚙似耻尋常馬同列玉驄勢欲凌其前青絲苦被他人牽驕騧亦怪奚奴怯勒住玉蹄空蹀躞壯氣都從爾奚老只愛驊騮緩行好豈識春風解相惱稜嶒瘦骨髙如山最後不來神自間嗟爾老奚愁滿顔世間多少驍騰者不得風雷一相假王良造父今豈無嗚呼五馬春風圖題黃定之山亭短歌我有故人别來久武林驛前曾與逢君將買棹過江去我愧誤落塵埃中今年復見蘇臺下十日髙談足清暇酒間傳令信於兵燈下題詩好如畫我家疑舫亭湖上雙鴛鴦青青飛不去濯足歌滄浪都亭橋頭溪水香吳王舊時館娃坊扁舟來向君家泊坐見青山灑晴瀑涓涓流向檻前來洗我客愁三萬斛看山多在硯池頭何待籃輿郭外求只恐白雲浮欲動野亭誰與共清秋閩無紅閩兒手拔閩山舞醉著巫衫代神語絳綃三尺首髼然千里腥風嘯紅虎但欲屠人飽紅腹不管飛花碎紅雨一紅唱而百紅和南劒津頭血漂杵神兵十萬自天來扼紅之喉剪紅羽暮梟紅黨徇軍門晨縛紅魁獻明主尚書氣與秋天杳不忍殱紅紅可撫紅爭悔禍指閩天巫亦今為帳前虜毁紅旗卧紅鼓紅帓紛紛棄如土翠笠衝煙下南畝我作銘詩勗爾紅願閩無紅千萬古嗚呼願閩無紅千萬古老去殘紅雙鬢蒼休説干戈向兒女只説尚書爾慈父題春曉苕溪圖有引右一卷皆國初老為錢繼忠作粵百載而見之於王惟顒杏圃亭上為續貂者鼎也鼎生也晚慨前轍之不可追豈草草者所能逐其萬一哉惟顒新裝而餘紙瑩潔可愛聊為填空成化乙巳暮春朔桐村周鼎海嶽庵前真鳯雛寫此春曉苕溪圖筆精墨妙淡無迹但見一幅雲糢糊千舒萬卷紙欲毛人家倣佛臨江臯市逺不知更幾點村深自覺雞三號苕花流盡餘不月何處煙中棹歌發初疑咫尺天蒼涼又道微茫水空濶鳯凰山下錢王孫載書泛宅來吳門題詩看畫足賔客長篇短章星斗繁百年耆舊竟淪落此圖去作他人物寶劒誰將土花蝕光射牛女寒不沒飛墮王郎杏花圃開户得之喜欲舞卷中半是三吳人詩畫一時皆入神却笑桐村老迂牧葡萄後塵追絶躅吁嗟王郎且珍襲不拜猶當下長揖米家石丈誠難遇牧也徒狂惜無補五色王葩雨吾雨欲起元暉與之語春日見楊花寄章文重見説浮萍草前身是此花只因隨驛騎轉覺戀鷗沙宛宛青春暮茫茫落照斜憐豫根蒂薄相值復天涯南浦推篷南浦上煙雨淡離愁蕭瑟菰蒲晚微茫澤國秋魚鹽通縣市蓑笠語鄰舟無限林泉意憑軒下白鷗幽瀾泉愛此棲禪地佳哉有此泉但聞遺自古不識是何年未濯塵心淨安知此味玄寺門新揭匾薇省筆如椽梅花菴梅花庵戲墨零落滿人間紙愛光逾潤雲空鶴未還野園荒冢在文碣古苔斑結伴尋幽去聊乘半日間江涇村江涇好村巷稠屋似㕓居詞賦工無益耕漁樂有餘土祠春社後野寺暝鐘初我欲頻來往扁舟當筍輿附考在嘉善相村相近蘋川十詠西塘曉市旭日滿晴川翩翩賈客船千金呈百貨跬步塞齊肩布褐解市語童烏識偽錢參差魚網集華屋競烹鮮附考在嘉善縣北二十里又名斜塘亦名平川平一作蘋北翠春耕曾記十年前誰耕北翠田土風新改觀農事舊爭先放犢歸殘照聞鳩隔曉煙市橋連野渡東陌更西阡附考嘉善縣北有北翠墟南洪夜泛洪結兩相銜平分一水南煙波千頃雪風景百花潭月色秋偏好棹歌春正酣東臯有新第稠木露毿毿附考即文水漾見題咏東根古壩兩兩􅄵相當先為水患防潛消春漲惡長憶喻公良斗口輕舟入墟心矮屋藏相望不三里出市即斜塘附考在嘉善蘆墟塘東漁家柵口鄰屋枕溪沙都成網罟家長因修古柵爭欲置新槎細雨春流直寒汀夕照斜芳津人盡識紅蓼似桃花附考西塘有漁家柵又曰吳家柵鴈塔灣頭古塔倚晴灣行人指點間鴈來秋水濶僧去白雲間望逺孤峰碧憑髙落照殷幾回看不盡江上釣歌還附考西塘有鴈塔灣旁有建禪院一名歸真院元至正斜漊來帆雲際見蘇臺輕帆日往回連檣森屋角棲鳥亂林隈自借春風便非關暮雨催翩翩收未盡斜拂漊西來附考嘉善北有斜漊村環秀斷虹三劵好輿梁雄哉壯兩鄉夕陽橫秀水曉市徑斜塘馬識歸程誤虹餘斷影長仙人新架木聊免涉褰裳附考嘉善北有環秀橋福源精舍鐘鼓暮雲長梅臺曉日涼種桃人自夀蒸术火猶香好雨催龍檄涼風振羽裳野人瞻咫尺如近衮衣傍考見題咏桐村書屋得此水雲鄉幽棲有草堂每迎官舫至多買異書藏社飲宜鄰俗春園雜野芳篝燈殘雪夜窗月弄昏黃附考西塘北鼎讀書處栁溪懷古不見當年種栁人數株猶自繞河濵長條只解年年緑飛絮都成衮衮春張緒别來情易老陶潛歸去迹空陳客邉無限登臨興問訊鶯聲幾度新附考在嘉善汾湖之旁桐村小隱書中那得黃金屋命裏惟堪白板扉竹几藤牀安嵗晚牙籖玉軸晃朝輝秋風錦里芙蓉老春水銀塘杜若肥看取碧梧枝上鳯引雛來伴作雙飛追憶施廷偉時菴太守真亷靜故里歸來只杜門野客自憐交白首市人那識是朱幡匆匆時序間情改淡淡文章古意存幾夜璇杓瞻咫尺又看磨蝎指初昏懷石湖陳叔莊紫薇村裏憶曾過天鏡閣前聞棹歌别後忽驚秋老矣醒來那道客愁何一窗風雨交遊少千里江湖夢寐多留得青青雙鬢在少年心事未消磨過和靖先生墓靈光千古故巋然幾樹梅花爾獨賢小結巢居猶昨日歸來籠鶴竟何年淡煙流水斜陽外芳草新亭古墓前欲去徘徊林月上裏湖還有唱歌船聞教諭見訪故人風誼重丘山車騎遙臨巷陌間酌水也能留客醉看山何必待官間傳呼列騎春生屋指點嚴城夜啓關記得鴛鴦湖上月為君三日未言還聽雪篷擁衾何處最冝聽篷底無眠酒半醒急似緑荷酣夜雨輕如畫漿撥春氷寒潮暗度風生港淡月斜明水滿汀却憶灞橋驢背客帽簷時作灑窗聲寄叔莊郭外何須二頃田江湖春水緑如煙扁舟蕩漾不歸去日暮蘋花風滿川漁村湖上炊煙一縷輕隔林聞得紡車聲漁村風景偏宜晚幾幅斜陽透網明閩中曉發戈有重英劒有房馬蹄南入荔枝鄉無端畫角聲中月偏照征人鬢上霜書張將軍屋壁城中車馬自紛紛樹長階前翠拂雲手注隂符銷白日太平間却舊將軍楊妃上馬圖金鞍欲上更遲遲滿鐙春風擁侍兒一種餘酣銷未得漁陽醒眼却多時偶成玉河橋下水如車楊栁當門是我家飛過紅塵三四點有人騎馬向東華春莫淡淡東風又落暉留春不駐送春歸無人更向長亭飲唯有楊花在客衣為魏公美題紅梅東風啼斷翠禽聲却引霓旌下赤城自説有丹能換骨玉顔不及向來清茜墩茜坡庵在吾鄉里八十年來始一登得見前朝好公據古碑間拂翠苔層附考在嘉善祥符蕩西舊生茜草故名又曰茜涇題王孤雲畫蜻蜓詩蜻蜓偷眼蕅花風滿地邉塵遮漢宫怨入孤臣詩畫裏百年遺墨灑啼紅俞知府誥誥字汝欽號畏庵秀水人以父山蔭歷官工科給事中後謫荆門判終建康知府江行微月破黃昏孤吟役旅魂漁燈寒照水野樹暗藏村過鴈飛還語棲烏止復喧客途無限意寂寞向誰言秋夕客樓漫起滿庭香露滴荷盤月弄清暉玉宇寒永夜無勞聽金鑰此身今已是間官陳掾史夀夀字昌年號玉崖後復名延齡嘉興人景泰間郡掾史有松雲集早春詞栁條吐玉蘭芽小羅幕凝寒覺春早腸斷王孫歸未歸東風又緑天涯草箜篌塵滿瓊簫卧熏籠間熱沈香火惱儂題就抱愁眠淚滴珊瑚暗成顆嶽王墓一自班師下內庭中原繁盛竟凋零兩宮環珮煙塵逈百戰山河草木青雨暗靈祠嘶鐵馬月明眢井泣銀瓶凄涼古墓西湖上老樹悲風不忍聽胥山子胥廟一自將軍賜劒歸夫差不覺墮讎機天荒地老英魂泣國破臺傾霸業違吳郡舊愁明月在越江遺恨怒濤飛靈祠寂寂空山裏老樹蒼藤掩夕暉題畫二首洞庭微雨曉生波一棹雲山客裏過緑遍蘼蕪歸未得東風間唱竹枝歌楊花如雪正殘春新水茫茫浸緑蘋桃葉桃根何處是東風愁殺渡江人楊處士森森字用材號東臯嘉興人有東臯集雲間李伯璵序之稱其詩流麗秀穩不讓錢劉擕琴圗空擕三尺桐行盡人間路無人解錦囊依舊還山去捕魚圗薄暮移舟下碧湍一罾明月水聲寒不知此去江南路何處能通七里灘逺歸夜雨有作破屋牽蘿補不成黃昏一雨至天明還思旅邸孤眠夜滴碎鄉心是此聲趙廷玉廷玉字獻之崇德人景黍間納粟為散官有芝巖集金臺留别笑拂紅塵出帝畿一尊重與故人違青雲紫闥辭仙仗白馬滄洲戀釣磯夜雨尚存三徑菊春風仍長故山薇舊逰天上如相憶萬里關湖有鴈飛吕都事思思字得之嘉興人景泰間以資進為江西都事過穆溪懷漁隱朱翁煙水濛濛舊作鄰流鶯恰恰似呼人自從不見玄真子岸草汀花袛自春鍾縣丞海海字巨川海鹽人性剛直雖起家掾史而張靖之特敬其人為懷逺丞靖之畫家山看月圖送之題云小山孤月靜流暉石磴髙寒酒力微清賞正濃眠未穩夜深松露濕秋衣未幾與令不合落職後事白起丞萬安不數月復歸有詩云乏燭樓臺宜夜月單衣兒女怯秋風子梁貴贈刑部主事萬安官舍思鄉心似回頭馬遊宦心如挂角羊何日南臺公事畢釣舟春雨卧滄浪夏布衣正正字時寅號訥齋景天間海鹽人為陳景初題便面雪盡溪山嵗暮天茅齋夜讀自相便舊交盡結朱門伴更有誰乘剡曲船林輔輔爵里未詳景天間人和周內翰遊月河寺韻與僧相對話迦那此日渾忘聽玉珂貝葉每從間處展衰容偏向醉中酡捲簾夜月明於鏡隔岸青山擁若螺我欲相從結蓮社盛時未許理煙蓑檇李詩繫卷九
