body:
  text: 檇李詩繫卷五平湖沈季友編元董處士性存性存名成一字自明嘉興人居胥山鄉世雄于貲好施予人稱長者讀書不仕子良用良史皆頴敏好學治春秋㑹稽楊亷夫避地松江後進多從之遊性存因徒家上海令二子徃學焉聲譽大起明初二子俱貴性存年八十餘不廢吟咏一夕夢入帝閶闔門明旦無疾卒歸塟勸善鄉贈楊山居太史曾懐荆璞詣天關雨露恩深賜珮環玊筍簉班躋鳯沼金閨通籍侍龍顔尚書聽履星辰上太史蜚聲翰墨間厭值承明躭隱興錦袍光彩照湖山送俞子俊麗水廵檢爲官當作執金吾膝上須橫丈二殳㑹見黒頭驚獬豸試看赤手縛於菟醉歌擊碎玊如意行獵射空金僕姑眼底狌鼯俱掃迹胸中有䇿致唐虞弁山小隠黄玠玠字伯成金華人少見知於趙孟頫黄溍有詩名元季客於顧玊山隨父正孫移家嘉興魏塘後析嘉善釋雪廬有詶伯成絶句云詩成嘗共野夫題新構茅堂水郭西是也平生慕郭林宗陶淵明之風不喜儲蓄有輒貸人晚值兵亂益貧困後樂吴興山水之勝卜築弁山號弁山小隱父死仍歸魏塘塟於陸莊碧瀾妾歌切切重切切女蘿附木風吹折中情繚繞了弗離聽我長歌碧瀾妾碧瀾亦是諸王孫世殊事異老且貧少陵尚惜爲奴者况是當時眞貴人春衣典盡春寒悄二妾朱顔正姝好忍將羅帯拆同心懊恨浮生頭白早珠鈿翠靨幸僅存此時猶及嫁夫君十二樓頭燕子去揮手不可㽜仙裙去妾相悲兩相約既去猶煩送肴酌主君詎忍覆棄之見此反令心緒惡一心事天天亦知忍著主衣還事誰遂移衾襆與俱返後君死者常爲尼碧瀾堂下雙溪水使客徃來豈知此不願新恩戀舊恩千萬人中兩人耳題郭天錫畫卷門外馬蹄三尺塵屋底青山看白雲不知身世在城市但覺爽氣吹冠巾鴨觜灘頭露沙渚彷彿西陵與漁浦惱人歸興滿江東烟樹半沉天欲雨題顧仲瑛書畫舫扣舷擊節起歌嗚一榻横舟小結廬篆籒古文三代上丹青妙手六朝初虹光貫月夜將半江影涵秋凉有餘零落宣和舊時譜無情汴水正愁予栁塘春為顧仲瑛賦江南二月栁條青栁下陂塘取次行蘭杜吹香魚隊樂草莎成罽馬蹄輕小蠻多恨身今老張緒少年春有情得似東吴顧文學風前雨後聴鶯聲俞子照漁溪隠居逺結郊居帶水流滿川雲日弄漁舟魴魚何事歌頳尾鷗鳥多情笑白頭拔足風塵雙蠟屐全身天地一羊裘武陵亦是人間世只見桃花不見愁湖光山色樓山色湖光樓上頭闌干十二古今秋一川碧浪與天逺滿地白雲如水流往事但聞吴苑在幽人多愛習池遊長年風景尋常好日日芳筵爛不收釣月軒牀頭書簏似笭箵漁父滄浪寄此生臨水卜居聊逺俗垂竿欲下已忘情斯時我自知魚樂今夜誰同看月明千古羊裘一男子不貪禄位得真名與賀九成知事風流江左人何似猶有清狂賀季真早乞鑑湖為道士肻呼太白作仙人珠簾逺對鷗邊雨玊麈髙吟馬上春最想若耶溪水緑幾時同戴小烏巾山居迴文萋萋草帶書窗碧痩竹輕藤引客看栖鶴伴霞歸岫晩斷雲拖雨過江寒畦分暗水池亭小石帶幽光野館殘西崦松林通境窈共君邀月對琴弹彦明王先生為予言瞿慧夫且出示張伯雨李五峯所贈言為賦此詩聞説瞿文學與交皆偉人曹劉不可作張李故相親已蛻塵中鞅猶存席上珍才名元振厲詩語特清真顧我生何晩思君妙絶倫平生五經笥他日半通綸小試衣冠掾終期科第臣芝蘭居輒化薑桂乆逾辛孟浩吟祗苦虞翻相本屯風雲同律吕時序異參辰有恨月初夕無言草自春能忘正云晤搔首暮江津四時詞二首酒醒簾外日三竿陌上晴泥苦未乾人在花深聞笑語黄金小碾試龍團右春水碧湘筠浪織成粉藍輕縠小惟屛侍児生怪風吹夢故傍牀頭落剪聲右夏梅花夢散羅浮清夜長銀絲挂燭雪生香人間那得量珠斛合與東風聘海棠黄秀才魯徳魯德嘉興魏塘人後析嘉善元末老儒有詩才邑景多其題咏善鍼灸無嗣門人徐中得其學雲間邵復孺有簡黄魯德秀才詩云洛下衣冠逺莫追城南韋杜本同時江山風景今何似湖海襟懷自有期近况俱題鸚鵡賦舊情猶托杜鵑詩蘭舟夢遶清溪曲杜若花開白晝遲亂後經瓶山考見題咏東西十里一㕓無三五行人只露居惟有瓶山銀杏樹至今猶發斧斤餘武塘十詠景德泉幽瀾逺引曹溪水此是人間第幾泉一吸清凉除熱惱不妨頻候煑茶烟大勝塔髙標千尺挿晴空俯仰人寰一氣中終日無風鈴自語不知火起梵王宫附考寺在嘉善治東唐天寶建寺前有橋曰大勝橋慈雲寺唐朝古寺已千年鐵騎來時火歘燃殿閣尚存遺跡在何期一夜逐風烟附考在嘉善治北三國時建唐名保安院胥山百里平田擁翠堆山人傳是伍胥來劒痕猶帶英雄氣白日雲深鎻緑苔鳯凰墩荒丘空得鳯凰名歳歳春來宿草青雨洗燒痕含殺氣簫韶九奏想虞廷附考在嘉善治東永安鄉菖蒲涇陳賢良墓河水東流繞九墩至今不解識真墳白牛曽踏風涇路故老時時説隱君附考墓在嘉善縣東南七里吳氏義塾児童父老尚絃歌共感吳門惠澤多今日文風俱掃地盡抛禮樂事干戈附考在嘉善元吳森捐田二㖽建義塾至大中亷訪使以聞表曰義士愛山花圃削除荆棘創髙臺萬紫千紅二月開日日笙歌樓上醉不知寒雨鎻荒苔附考在嘉善元萬户陳景純闢内有愛山亭雪月樓置書畫玩噐亭榭七十二以延四方之士吳瑩竹莊千尺高榆繞竹莊清風亭上蕅花香如何一旦遭兵燹荒草寒烟怨夕陽附考莊在嘉善城内元吳瓘所闢名竹莊吳仲圭墓老子平生學薊丘晩年筆法似湖州畫圗自冩梅花號荒草空存土一坏附考墓在嘉善城内花園衖之右有橡林今廢蔡景傅鐡網珊瑚清河書畫舫二書俱有元人嘉興蔡景傅詩題袁安卧雪圖隂風響枯梢凍雪埋老屋深逕斷行蹤除道乏童僕閉門事髙枕政爾清寐熟誰與排户入停馬駐車軸問知是令君冷語無欵曲卿去我欲眠毋煩賁空谷升車首重回欲餉不敢凟移書舉孝亷庶以激頽俗後來立朝端諤諤爭楚獄方其髙卧時何意萬鍾禄令君非素交此舉真巨目范史良包羞姓名忘紀録邵公有裔孫眉宇清可掬苕仙贈此圗筆駛意自足老氣近古作冷光淡朝旭當以净眼觀那許汗手觸平生氷雪心展玩亦三沐題趙子固墨蘭靈均楚同姓子固宋宗臣秋色凄九畹墨香垂百春蕭閒入神品爛漫見天真此趣誰能㑹烟霞物外人張顒顒詩亦見鐡網珊瑚題梅道人畫墨菜圗只宜滋淡泊安足奉膏粱食肉非無辱何如此味長沈進士庭珪庭珪字德璋鐡網珊瑚載破窗圖詩有庭珪一作後見吾邑陸芝房記元登科者沈庭珪係至正十三年舉人二十三年進士志俱失載題破窗風雨圖劉君性嗜學孜孜事三餘孤燈破窗下簡編自卷舒蕭蕭風雨來吾伊聲自如安貧人所難味道心常愉我聞顔子淵簞瓢陋巷居千載稱亞聖聲價重璠璵又聞陶淵明所處亦敝廬蕭然環堵間左右惟圖書吁嗟世之人性樂耳目娱華居美飲食所務安其軀良心日以斵疇能返厥初朂哉劉孝亷聖賢以爲徒玉山主人顧瑛瑛字仲瑛别名阿瑛自稱金粟道人崑山人元季辟㑹稽教諭不就築室茜涇曰玊山佳處園池聲妓之盛甲於一時招致海内名士置酒賦詩張士誠入吳遂遯跡隱嘉興之合溪營别業居之釋來復有寄題合溪别業次韻詩云草堂合溪上雲石静無氛春水鱸三尺秋風鶴一羣行厨依竹見吹笛隔花聞最喜逃禪好蒲團擬共分不食諸侯禄閒居避俗氛㟁花紅作陣沙鳥白爲羣貝葉風前讀蔆歌月下聞清遊難再得愁絶一江分陳基有寄仲瑛寓嘉興詩云每憶吳門顧辟疆舊開池館帶滄浪緑波芳草盟鷗鷺錦瑟玊笙悲鳯皇座客詩成誰最好故人酒後我多狂扁舟獨徃鴛湖上老到猶能賦草堂瑛以子元臣封錢塘縣男明洪武元年徙臨濠卒自爲壙志戒其子以紵衣桐帽㯶鞋布襪纒裹入土歸塟綽墩按瑛所著詩曰玊山璞稿又輯交遊諸公詩四十家曰草堂雅集有萃亭館題詠曰玉山名勝集外又有玊山紀遊集在合溪有暮雲集今多遺軼玊山中亭舘拆毁殆盡僅留一草堂耳今于嘉興合溪營一別業頗幽寂因賦五言一首我愛新居好蕭然絶世氛路回青草岸水合白鵝羣野色排簷入書聲隔竹聞是中多野趣難許俗人分夜宿三墖次陳元朗韻水落南湖不露沙又牽舫子到僧家春浮大斗娟娟酒寒隔虚櫺薄薄紗半夜檐鈴傳梵語一林江月照梅花坐來詩句生枯吻指㸃銀瓶索煑茶次韻劉孝章治中邀夏仲信郎中遊永安湖二首考見題詠金粟寺中公𪠘靜白晝事閒如治蒲沙棠爲舟穏可泛郎官之湖今豈無啄花鶯坐水楊栁雪藕人歌山鷓鴣日西上馬踏歸路小隊髙呵驚道吾湖上筵開張水戱掩幔凉風吹短蒲大魚聽樂浪頭出小艇賣花城内無丙鼎庚庚識饕餮甲煎斑斑炙鷓鴣酒酣賦詩動海内絸紙楷書能寄吾次蒲菴長老三首鴛鴦湖上住三年每憶僧中有皎然路逺夢憑蝴蜨去江空信斷鯉魚傳問人盡説山藏寺卓錫應知地湧泉未得青鞵滄海上燒香來看散花筵無官身似一絲輕閒却胸中十萬兵爲愛淵明能入社獨憐靈運不逃名敲門看竹題詩遍煑石煎茶汲水清廷尉雀羅今可設死生誰復見交情神山處處産神芝獨有神仙不可期賈誼過秦曽著論息躬絶命亦摛詞千秋離合雌雄劔一著輸贏黒白棋多少英雄皆鬼録天年全付病支離乙未和孟天暐婁上人家不識春檐頭蛛網亦生塵朱門桃李皆零落只有東風未嫁人題趙子昂畫楚江春曉東方旭日出曈曨照見巴江曲似弓莫遣猿聲到巫峽山頭猶有楚王宫捕魚圖磯頭新水三尺増漁翁兩船攀一罾大魚跳波撥剌去只隔蘆花喚不應西溪先生鮑恂恂字仲孚崇德人元統間三領浙元歴平江教授至正甲申至元癸巳皆入闈校士學士張翥御史劉彦博薦入翰林不就嘗居千金梧桐二鄉後復卜居郡之西溪耕桑自樂自號環中老人迨明洪武初禮部主事劉庸舉吉安余銓髙郵張長年及恂皆明經老儒達於治體可備顧問遣使召至京時年八十餘上見之大悅命爲文華殿大學士以老疾辭諭曰朕以卿年髙德劭故授此職煩輔導東宫耳免卿早朝日晏而入不爾當從卿志恂復固辭遂賜敕放還與貝清江程栁莊結社講道學者稱西溪先生爲人慎重不可狎而學與行名天下少嘗受易於臨川吳草廬著大易傳義詩文有西溪漫稿龍眼池考見題詠寳地多竒跡雙池鑿龍眼秋光涵逺空寒波應靈響隂雲翳或結夜月晴更朗對此長湛然虚心自蕭爽題吴仲圭平逺圖蒼山遥遥幾千里緑樹參差碧烟起雙帆忽從江上歸影落斜陽溼秋水林隂蒼莽鳥不飛石徑蹭蹬行人稀松根似可縳茆屋沙尾亦足容漁磯我曽西遊倚江閣極目長空入寥廓好山不肯過江來恨不乘風跨黄鶴吳君畫手當代無落筆何年成此圖安能著我巖壑底相覓老樵尋釣徒次韻贈李煥章輟棹清谿曲題詩畫閣幽晴雲松上過暗水竹間流把劔時驚鶴持杯不􅏒鷗出門塵滿眼於此且淹畱次竹林先生中秋玩月作三首昔年爲作蟾宫客曾向宫中看月輪萬丈光縣金粟樹三更影落絳河津生憎老兎深爲窟却笑仙娥不嫁人回首歸來舊塵世滿天風露一吟身數年不對中秋月月色依然不負秋嬾問仙人修玉樹且陪帝子上瓊樓斗牛低繞天樞轉河漢斜横左界流却望蓬萊宫闕逺幾隨清影重回頭浪説今宵明月好干戈滿地幾人看惟餘院落清尊賞忍照沙塲白骨寒采筆冩殘思縛兎玊笙吹罷擬乗鸞知君此㑹非忘世只爲良辰一笑難除夕絳蠟髙燒爆竹鳴羣兒奔走喜還驚老夫識得春來慣自伴梅花睡到明趙彦微畫二首昔在苕花谿上住繞溪山色滿高樓别來十載看圖畫山自青青我白頭吳興孫子多才俊曾把文章動九關歸到江南塵滿眼忍將情思冩青山盛叔章畫煙溼空林翠靄飄渚花汀艸共蕭蕭仙家應在雲深處只許人來到石橋王綸綸字爵無攷鐵網珊瑚有嘉興王綸題梅道人畫菜一絶郡志載其栁橋漁唱詩而景德倡和綸亦與焉固當時一詩人也水深歎至正十年夏四月戊戌吉皇帝詔四方夙夜靡暇逸興利與除害守令宜怵怵江南水深蕩租税無所出官府議除豁生民務存恤松江素汙下川陌流汩汩惜哉郡太守民情固沉匿茫茫修竹鄉卑溼難具述只如來字圍積澇恒数尺歸附八十年未始睹穎栗胡爲吝一言歲縻六百石省憲雖至明蔽隱不容詰嗚呼皇天后土皆白日何獨使我寘此幽暗室有食不令充我饑有藥那得療我疾皂胥自此從隳突妻子何時免啾唧繄太守兮民之父母盍自省兮爾俸爾秩縱然民命不爾憂奚爲王言棄如嫉九重閶闔雖深宻民瘼民寃極纎悉爾居郡縣親目擊忍聽咨嗟起蓬蓽巨泖崩隄滙爲一雨不崇朝先汎溢荒蒲衰葦風瑟瑟爾亦何難究其寔掊民聚歛非仁術財聚民離果誰失欺君不容誅戕民有常律我民一何苦爾見一何執君恩寛厚難再得再拜仰天長太息栁橋漁唱二首考見題詠楊栁青白鷗不來烟水昬落日乗風放船去顚倒醉眼包乾坤君不聞西家急科糴東家重築城越上良田無主尋我漁歌發兮君爾聽黄金何似一絲輕楊栁黄秋風一夜蘆花鄉漁釣静忘周日月公卿不换漢桐江君不聞大官呼領兵小官亦戎行天涯歳月多風霜我漁載歌兮情慨慷鑑湖容借賀生狂常山長真真字爵無考徐一䕫於洪武十二年有祭宣公書院山長常先生文詩見至正倡和集又於金蘭集中得七律一首題曰南宫常真題徐良夫遂幽軒萬山深處著柴門窗下流泉屋後邨秪藉耕漁資活計不縈聲利競晨昬松隂欝翠林藏雨桂子飛香月滿軒世事無勞相問及唫餘還共倒芳樽周山長致堯致堯字煥丈初名棐先世來自四明居崇德州石門鎮致堯生極穎異讀書一二過不遺嘗爲宣公書院山長明洪武初與薦辟不就歸隱梨林著有石門集淮海秦約序之稱其詩不事雕飾特以雅致爲佳云述懐平居逺塵市畏觸憂患端矧兹值多故而敢懷自安寄身途旅中戚戚苦饑寒爲生恥無庸緝遺守㣲官雖云匪多秩所職期可觀顧非周圓噐執事仍獨難蹇予亦何爲俛仰徒長歎修禊日偕曹廣文七人遊南湖賦得裴休舊業休字公美捨宅為寺今真如寺是也幽賞殊未窮揚舲濟南湖載瞻裴公宇蕭條乃禪居緬思太和季秩班百僚初晩懐超俗縁息心究空虚歳月既云邁世事亦已徂峩峩清暉堂遺構委榛蕪斯人不可作慨傷獨在予甲辰九日東墖登髙分得竝字東徃有高墖名與福城竝九日陪諸賢登臨期絶頂秋深木葉落不覺天地迥凉飃灑林霏咫尺衣裳冷玊田好開懐何止供香茗幽軒賞佳菊竟夕忘酩酊昔人晝遊此衣錦寧尚褧寥寥千戴間視若空華等清境素情愜塵心未全屛感彼興我懐鈎詩記深省夏夜宿流虹寺有感馳騖竟朝莫似縁饑凍迫如何百年間區區爲形役世途寡相知靦顔徒自飾所獲既非寶所䘮良可惜生理固艸艸進退量我力豈乏希世榮前車已當阨流光急奔馬素業紛㫁織大道卒未聞怛焉増内惕附考寺在府治東北二百歩宋孝宗生於丞㕔後改爲興聖寺御書流虹聖地今廢爲嘉興縣學雨夜感懐二首卧聞窗間雨瀟颯夜將深轉對壁上燈依㣲照孤衾撫茲凄絶候况感遲暮心早起視明鏡白髪應滿簪攬衣起中夜感歎成嘯歌百年事形骸所得良不多生理既茫昧動静虞網羅歸哉南山陲石田䕃松柯題俞仲剛山水我昔四明尋隠者著屐逺過玉几山巖扉苔逕轉森邃結窩乃在雲松間松間迴風蕩空影水流花開春日永苧服涼深團扇開好鳥飛來意俱静為覓漁梁白沙步因識樵人弈棋處扁舟暝泊碧溪隂沿月長歌下山去束帶十年事朝謁鶴怨猿驚總凄切草堂晴晝玩新圖三嘆令人愁欲絶西谿訪鮑先生谿上齋居好幽偏事不侵桑麻存晚計圖史樂初心岸幘幽窗晚移牀緑樹隂卜隣何待老從此數相尋送崇徳州夏同知慷慨持征節雄談思戰塵有生皆帝力無地不王臣為國丹心在論功白髪新他年忠義傳端合繼前人次石監征韻憶子臨東海征㠶㡬日回鼉鳴津鼓合蜃起石樓開官酒應深酌春衣或未裁題詩記遊歴時寄到蓬莱寄道士胡尚悳緑草丰茸碧樹斜清涼琳館即仙家養生不餌千金藥對客時分五色瓜池上雨來飛赤鯉林間月出見金䗫顧予顔色渾如雪曽記松西汲井花寄沂陽劉廷鎮貟外故人相與最從容尚憶論詩向夜中白首無家十年别青山何處一尊同夢回孤館鐙前雨目斷西風塞外鴻誰識離懐愁絶處野亭依舊穆陵東吴中兩岸春雲暗栁條滿篷風雨過楓橋空憐越絶溪山好且聴吴趨巷陌遥官舍晚涼飛燕子水鄉人靜賣魚苗誰家白晳佳公子賸把黄金買阿嬌登崇徳州城有感溪上孤城百雉餘城門猶自䕶儲胥灞陵空宿将軍騎范叔應随使者車雞犬蕭條兵過後漁樵散漫市休初老年觸事多成感閒向芭蕉葉上書寄舎弟鼎生計依人轉寂寥别來心事向誰消鏡中華髪隨年改谿上青山入夢遥對酒便思歸白社将書不敢寄洪喬越情吴思渾無賴獨寄江樓送暮潮臨平道中寄京師諸友雲外羣山綰翠螺馬蹄長是客中過闗河樹色秋光近驛路蟬聲晚更多千古心期空皓首百年人事等滄波自慙薄劣頻趨走㡬度因風想玊珂春日雨中漫成次韻十日春泥懶入城滿湖風雨未開晴草堂欲補寧忘陋沙鳥頻来莫漫驚橋外栁條随意緑坐間苔色傍人生緣知花事渾能㡬好買芳尊對客傾寄劉孝章經歴意氣傾人記昔年東風飛盖日翩翩花明古戍春停騎月上清江夜放船老去交遊誰更健亂來蹤跡總堪憐山光水色渾無賴却數冥鴻野外天次韻送陳壽大之湖州識君雖早送君遲却愧相看在亂離十口一家無别業此身何日是閒時青山滿路春船酒白日空江客枕詩我有好懐誰得共鷗波千頃雨絲絲蔣氏小瀛洲并引漁石先生營室雲塘之間水竹蓊翳幽偏絶塵讀書養道致足樂也楊鐵史顔之曰小瀛洲至正壬寅秋七月予曽一至其處迄今九年所矣適晤其令子文質知先生無恙為賦一首奉呈茫茫人海小瀛洲靈艸丰茸碧樹幽底用風輪通弱水時逢雲袂下浮丘天隂圖畫龍鱗溼月下吹簫鶴背秋我亦平生有仙骨歸來同作采真遊寄吴興張别駕鴛鴦飛去潦波平曾聴驪歌憶送行南浦移舟官樹緑野亭酌酒晚風晴異鄉春近多新夢逺使書回足舊情欲識懐君無限意滿庭芳樹亂啼鶯西津夜泊孤㠶夜落石橋西橋外青山入㑹稽卧聴海潮吹地轉起看江月向人低一春衰謝憐皮骨萬國艱虞厭鼓鼙何處客船歌水調令人歸思益悽迷次韻顧玉山寄張子潤險宦何殊闞九淵且将蕭散事餘年風前白苧裁春服花外青藜挂酒錢聖世敢云輕紱冕野人端合老林泉養生况有封囊藥坐聴流鶯手自圓次韻顧玉山見寄郭外茅堂隐者居竹寒沙碧映窗虚畬田黍熟盈尊酒溪女船回滿匕魚别業定行中使畫佳兒亦拜撫軍除百年人世多馳逐玉麈清風獨晏如春日偕玉山泛舟平家湖訪石仲徳次韻湖上春光生緑波湖頭栁色似新鵝已知出郭塵喧少更喜臨流樂事多穏坐蘭舟勝上馬新裁苧服不須羅茆堂只隔東西瀼隨意相從載酒過謝劉經歴惠厯鳯厯新頒自九天故人相寄感相憐極知帝德符三統共喜春王正八埏海舶逺歸占上日野夫多病惜流年老妻不解歸來意數問臨官在幾篇琦元璞所藏趙子昂馬圖進馭歸來日未西落花芳草滿池泥也知櫪上無凡馬牽過天閑不肻嘶苧邨鳬雁人家春水多淡煙疎雨暗漁蓑分明記得南塘路船尾吹來白苧歌附考嘉興城南一里有白苧鄉卓教授成大成大字噐之其先閩人知平江吳縣值宋亡遂畱居嘉興之甓溪後析嘉善迨成大四世矣至正中爲府學教授嘗創荔軒以寓思鄉之意徐一䕫爲記而傳之荔軒進不得看長安花退不得擘家山茘先人之言何其悲援筆聊題此軒記鮮于典簿樞樞字伯機漁陽人中歳始刻苦讀書因號困學遂善詞翰工行草虞集云漁陽吳興巴西翰墨擅一代謂樞與趙孟頫鄧文原也樞嘗於廢圃中得怪松一株移植之呼爲支離叟朝夕撫翫温日觀至其家醉即抱之或歌或泣又嘗愛一蠻獅水滴乃漢物也偶墜其吸子於西湖水閣百計求之不得既他徃三年復來忽獲於水中以爲神一時詩人多咏其事時浙省廣濟庫歳以冨户司出納侵用官資者府判王某輒拘其妻子以小舟載之西湖趂逐遊人收其姦錢納官樞因作湖邊曲云湖邊蕩槳誰家女緑慘紅愁羞不語低回忍淚傍郎船貪得金錢强歌舞玊壺美酒不消憂魚腹熊蹯棄如土陽臺夢短去匆匆鴛鏁生寒愁日暮安得義士擲千金坐令桑濮歌行露予閲顧玊山草堂集秋華亭扁聨係樞所書自署檇李當亦流寓吾禾故爲入之感寓春風吹緑波淡蕩洛陽栁高樓語錦瑟落花泛樽酒何人白鼻騧䝉茸紫貂袖一字或未識銀章懸兩肘煌煌貝宫珠廼落絡蕭手誰知艸𤣥者窮巷閉白首退宫人引駝絨繡帽紅顴頰素髮㣲連細紗結出宫嫁作海啇妻裙腰尚帶河西褶少年十五二十時中宫教得行歩齊春羅夜剪綉花帖堦前夜舞髙䕫麗寵姬當前翠衿小便覺中原美人少金蓮斜抱捧珠龍玊籠倒挂收香鳥年年宫中春日長小車銀甕蒲萄香香殿吹簫鳯皇語一日再宴諸侯王舞困樓蘭過三十内家别選蛾眉入雖名伴送半無家旋賣珠環問親戚一爲商婦始自憐十年不見囬番船年多不記教坊曲時時尋撥相思絃遊智者寺四圍松是祗園樹三面山開舎衛城逰子心隨仙境化老禪詩似石根清幾人邂逅有今日半載趦趄成此行安得盡抛身外事長年來此學無生靜慧寺四首寂寂僧房半夢中蕭蕭修竹四山風惟應門外蒼髯叟解亂儋州秃鬢翁晩雨纔收日已西石梁沙路凈無泥清泉㶁㶁千峰迥緑栁隂隂一鳥嗁壊壁蒼蒼上緑苔籠沙無復䕶塵埃只應枉駕逰山處總爲坡仙寳墨來學道當知髓與皮聖門壼奥要探窺十年來徃臨平道爭信山中有許奇戲題廣嚴僧房壁幾年門外䇿征驂不料能來共一龕壁上未須書歳月褚河南是䕶伽藍薛相士如鑑如鑑嘉興永安鄉人後析嘉善挾相術游江湖一時名士多與交徃揚亷夫有詩贈之曰銅之鑑僅以見妍媸不若書之鑑可以見是非又不若人之爲鑑可以見善惡之端禍福之機河東薛相士自稱老鑑師一雙神瞳秋水碧三寸長舌霹靂飛曾相水邊遺嬰作貴子道上擔丁爲富児前年山東睡漢是龍虎今年雁山處士非熊羆談言一一中予奪無依違見子勸以孝見父勸以慈見臣勸以忠藻鑑道如此頗近古教規鐡笛道人學讀書與詩誤䝉進士賜緋衣龍門上客一日速十年不調官何遲吳門相見談出處許我再覲黄金墀我心自鑑復自斷子卿唐舉無容知醉來吹笛客且去天青月在梨花枝子月鑑孫鑑心白雲秋蟾皆能世其術亷夫又有秀州相士歌叙曰秀州相士薛氏見心者拜予湖上手出句曲外史自賛一首及縹册一帖且傳其言云持此以見梅花道人道人技癢當爲汝歌歌訖然後乞其竒文章余爲㗲然大笑既爲賦歌詩一解又如其意書梅花道人傳一通俾東歸以復外史其詩曰秀州相士薛見心重湖風雨來相見手把茅山道士詩亦有胡僧冩東絹自云膝不拜公卿海内名人初入卷縹綾方冊錦盤囊首録梅花道人傳道人不讀姑布書兩目看天走青電梅花忽露太極心南枝北枝開一遍秀州相士亦識道一笑求心符鐡劵章生不相一隻眼桑生不相一尺面貌如削𤓰帝治開背如植鰭王業建君不見漢家將軍如牯腰午夜臍燈照悲唁又高啟亦有至正辛丑嘉禾相士薛月鑑過余求詩因贈云我少喜功名輕事勇且狂顧影每自竒磊落七尺長要將二三䇿爲君致時康公卿可俯拾豈數尚書郎回頭幾何年突兀漸老蒼始圖竟無成艱險嗟備嘗歸來省昨非我耕婦自桑擊木野田間高歌誦虞唐薛生逺拏舟訪我南渚旁自言解相人視子難乆藏腦後骨已隆眉間氣初黄我起前謝生弛弓嬾復張請看近時人躍馬冨貴塲非才冒權寵湏臾竟披猖鼎食復鼎烹主父世共傷安居保常分爲計豈不良願生無多言妄念吾已㤀奉詶句曲外史繡簇花攅百幅新故應重喚謫仙人靈䑓一霎交梨熟漫向峰頭拜七真濮隠士允中允中字樂閒崇德梧桐鄉人濮氏自著作郎雲翔從宋南渡占籍於此遂名濮院元大德中有濮鑑字明之封寧逺將軍允中豐於資嘗以中統鈔一千錠買歌児汪佛奴姿色秀麗一日飲桂花下佛奴奉觴允中曰我非乆人世者汝將奈何佛奴垂泣誓無二志允中死佛奴獨居尼寺潔身以終事見輟耕録元末浙西歳有詩社允中集一時名士吳毅軰爲叢桂文㑹以文卷赴者五百餘人延楊鐡崖江朝宗讀書桐香室埋名不出時貝瓊結屋殳山鮑恂居郡城之西溪四方避地者温州陳秀民居竹隣巷閩人卓成大居甓川江隂孫作居南湖崑山顧德輝居合溪天台徐一䕫居春波門外河南高巽志江都丘民錢塘陳世昌皆來僑居四明周棐以宣公書院山長畱居梨林日以文酒倡酬山水間傳爲勝事云自題桐香室研經暇即課子掃榻倦亦畱賔莫嘆秋風蕭颯穿林月片如銀沈元啟辛未年予在京師朱檢討於真蹟中得元人檇李沈元啟題畫一詩因録於此題錢舜舉桃源隠居圖青山何處桃花邨白雲如龍繞山根眼中茅屋參差起若此境趣皆桃源桃源只在人間世流水無情逺朝市重山遮不斷春風萬樹桃花雜雲氣溪上髙軒絶瀟灑人物衣冠猶大雅水行有船陸有馬吾將徃問種桃者檇李詩繫卷五
