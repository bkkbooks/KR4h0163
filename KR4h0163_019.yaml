body:
  text: 檇李詩繫卷十九平湖沈季友編明徐忠襄公石麒石麒字寶摩號虞求嘉善人天啓壬戌進士除工部主事管節慎庫為魏璫所嫉以新城侯王升墳價事奪職崇禎改元由考功郎纍晉刑部尚書時法官引律大抵深文石麒奉旨清獄多所寬減至陳新甲以失事下獄石麒力爭論斬其黨大恨復讞張若麒許定國丁啓睿等大法赫然無幸免者尋科臣薑埰行人熊開元以言事下獄疏救不允責令對狀罷歸十七年南京起右都御史轉吏部尚書上定官制慎破格行久任禁營求嚴起廢明保舉交堂廉七事其時官方濁亂石麒以年例出户科陸朗御史黃耳鼎為藩臬二人夤緣留用疏訐石麒遂乞休明年失國入郡城自經死諡忠襄僕祖敏李升皆從死嗣子爾穀輯遺文曰可經堂集豫謂士人委身王家不幸遭逢世變縱不能殺身殉國亦當飄然行遁與草木同腐耳何至棄封疆貪利祿靦顔自活絶不知人間有羞恥事乎吾郡死節數公名炳天壤慨慕流風宛然如在豫輯是卷不能無三嘆焉苦寒行在句曲道上天寒野行絮如鐵白日如夜車聲咽歷過千山萬山雲時飄三點四點雪寒膚蝟縮毛髮張行人面赤珊瑚僵古道風悲怨遊俠蹇驢蹄滑愁道長暮煙一抹青句曲鞭梢遙指此中宿夜分禪火灸僵身側擁蘆花眠破屋明日到家喜不逺猶恐雪深沒驢眼夜發靜海抵直沽禾黍髙低弄夕醺檣燈零亂破黃昏樹蒸夜氣三分雨帆挂秋風一葉雲靜海金鉦傳古戍直沽牙閫駐新軍籌邊已竭東南力何日辰韓始䇿勳喜居松誤點朝章十五年而今始結一枝緣近窗緑洗機山雨夾屋紅流歇浦泉書舍矮依嘉樹置吟壇髙傍好花懸尚須拳石看雲起擬買南山半畝田偶成裁罷文章步碧苔僧房一半白雲開間中探取花消息春到海棠枝上來吳忠節公麟徵麟徵字來王號磊齋海鹽人天啓壬戌進士纍官吏科給事中同官章正宸莊鼇獻以建言下獄徵疏救庚辰大計與祁彪佳矢志澄清時論快之時盜賊猖獗民生凋瘁屢乞身任危疆不許又請整飭江南為京師應援假南司馬以權為羣議所阻賊既陷秦前後屯失守寧逺孤懸二百里外三面皆絶域守禦甚難督撫鎮臣請撤寧逺兵守關門廷議不決徵獨言撤宜又為議數百言約六科共陳之諸人不肯署名遂獨疏其事疏留中遂寢客有周生者勸徵去徵曰去素志也今既任事事急矣可死不可去也甲申三月遷太常少卿流冦將逼乃發徵前撤寧逺疏立詔赴援京師十五日徵奉命守西直門十七日賊至城下攻甚急為衝棚撞城廨舍皆壞徵引門為楯門被三矢矢貫木徵屹然不少却是夜天微雨賊發大炮碎几案徵端坐自若十八日賊偽樹勤王旗叩門中官欲納之徵麾卒推石塞門俄而兵部騎士持幟請出徵亦拒之復以重賞購健兒縋城殺賊百餘人賊大至徵至午門遇相魏藻德告曰事去矣願見天子德曰上入宫誰為趣起今火石轟然城雉嚴峻何遽言事去徵曰此聲自賊陳非內禦也德曰姑還守所明日司馬門議之徵度不能達望闕叩頭號泣而去十九日賊從德勝門入徵徒步歸邸邸已為賊據因入道左三元祠欲自經家人請待祝孝廉至一訣徵許之二十日祝淵至徵酌酒慷慨與别曰昔吾登第夢一褐衣人咏文丞相零丁洋詩曰此劉宗周也數實為之今老矣山河破碎不死何為相對泣下因揭祠壁敗楮篝燈作書付家人命褫服以單衾殮又與兄麟瑞書囑諸子勿就科舉及處家事各有條理遂投繯而絶後贈兵部侍郎諡忠節夫當明之季冦躪中原潰陷相望關外所存止於六城其輕重緩急不待智者辨之此時果從公議急撤重兵誠救時之良䇿而庸臣不知釋疆場之憂救堂奧之急逮賊勢壓京始言逺撤措手無及而國以亡矣鵜鶘行山林畏豺虎川澤畏鵜鶘鵜鶘大身嘴項有百石壺挈壺赴春波抒水如轆轤鼓翅風雨驟所集無渟汙巨魚擲千尺力絶僵泥塗小魚濡沫乾駢首安就屠羶腴飽饞吻狼籍沾諸雛果腹坐磐石睅目思江湖方笑揭竿勞終覺網罟愚瞥然雙屬玉儴佯意何殊喙微毛領單頗似有道癯飢虛緩行躅鞠躬俯寒蕪翻遭鵜鶘嗔砰嗑聲氣粗鵜鶘亦有云其云多矯誣一云丹穴王竹實供天厨再云隨陽使稻粱事踦􅛤兹爾瑣尾臣致身在菰蒲鱣鮪方發發鯤鮞正于于揚爾頭上絲保爾一捻軀在梁幸可托殄物干天誅佞哉老鵝舌凛若操戈殳神鷺不吞鯉况乃受揶揄髙踔謝叨餮杳向青冥呼始信百族中具有穿窬徒除惡務其本敢用諏司虞金貢士壽明壽明字公朗更字曼倩九成子天啓元年貢士有才華耽聲伎不惜金錢以飾歌兒自撰新劇演之其名豔稱三吳間有麗情雜録即事贈周綺生香風陳陳撲簾聞結束初成麝乍熏獨步銀塘鬭春草落花踏遍濕湘裙淡生自當湖過訪煙花何必下楊州雲雨今宵有莫愁一自彩軿乘月至漢塘冷落弄珠樓李汝寧竒玉竒玉字荆陽嘉善人天啓壬戍進士由國博升武庫郎守汝寧告歸嘗從髙忠憲學精於易忠憲曰發吾藴者子也掩關十年剖奧鈎微著雪園易義過京口蕭條書劒下關河芳草萋萋客裏過原上鶯花三月暮天涯愁病一身多海門帆影移丹嶂山寺鐘聲到緑蘿入望自知鄉國近那堪斜日聽漁歌卞徵君洪載洪載字子靜嘉善人少從髙忠憲得性命之旨遂學道不應試一時大儒如鄒元標葉向髙皆重之講學郡城天心書院邑宰每式廬恭請間登講坐剖析微義紳士梓其説為洛閩一燈忠憲北上招主東林講席及被難守而勿去崇禎間再徴不就有緑雪軒集和魏孔時茅簷詩點綴為佳勝菰蒲落四除衡門間過鳥曲水細通魚皓月蘆花白秋風木葉疏幽人獨宿夜還著幾篇書錢舉人千秋千秋字真長海鹽人天啓辛酉舉人以場屋事謫戍北平後赦歸有塞上草栁花咏蕉隱篇諸刻觀射魚作沙壤别水居取魚不解罟擁衆臨清流關弓如射虎射得三寸鯉拍手歡且舞絭弓帶魚歸聚族觀如堵入市沽酪漿烹魚招部伍旁有江南客笑看思故土何時問煙波鼓枻從漁父塞草不是春深色未開萋萋偏傍戰場栽麥和屯雨吹青去栁挾營風捲翠來時引暗蟲鳴虎落却留歸馬臥龍堆可堪一夜金飇起關塞先悲蕙草摧朱同知治􅍀治􅍀字子暇嘉興人天啓辛酉舉人官肇慶同知國變後卒於粵得家書知敝廬巳賣嘆之拮據經豫手書來巳屬人一身猶長物四壁况浮塵歌哭今無地琴尊别有鄰庭梅應為我望絶嶺南春錢松溪嘉徵嘉徵字孚于海鹽人天啓辛酉順天鄉試以國子監生中副榜抗疏劾魏璫十大罪晚選授松溪知縣還自閩卒於里有松龕剩稿委鬼謡赤劉之亡亡於十常侍武蕃寃抑青蛇至黨人六百同日誅何怪黃巾滿天地吁嗟委鬼亂闕廷磔尸滅族刑猶輕寄聲楊左六君子堯階從此生華蘋與吳去非話舊故人今好在尊酒復何辭惜别言如玉懷歸鬢有絲峙糧秋采菊列陳夜圍碁若問行藏事鴻知燕不知孫州同茂芝茂芝字若英嘉善人天啓辛酉貢授沔陽州同弔梅道人墓荒冢淒淒覆冷煙風流猶賴見當年名同鄭老髙三絶迹類君平隱一㕓清節未甘居竹後素心曾許托梅邊殘碑莫怪題僧號説法從來有畫禪常秀才彞彞字千雄秀水人早卒有詩失傳吟廠為曹不困賦深居山與靜芳草緑階染析義天破荒覓句鬼驚險盤蔬斸溪毛琴絲韌山檿清談坐日曙兩兩懷不厭石交起古人相期在無忝袁髙安儼儼字若思了凡子天啓乙丑進士授髙安令尋卒有抱膝齋集其詩神幽韻異倣佛晚唐至經世之文尋源竟委無出其右者與彭鍊師過鄧尉山夜飲達旦作為語三生約同登二月槎鶯啼將曉樹蝶抱欲開花對竹兩無語看山疑是家吾今􅍆一鍤君好作丹砂禁足林樹散朝晞愁人只掩扉蝸文生敝榻劒氣冷春衣簾外一僮至尊前雙燕飛羊裘隨處著不上釣魚磯東歸遙望蒹葭問舊廬吳淞渺渺獨愁豫月斜銀漢當軒轉雨霽疏星點户虛稚子弓強爭射石遊人劒老不歌魚帶將建業江頭水自寫青蓮醉後書廣陵小集八韻千年山色照孤舟兩岸空濛一寺浮芳草錦帆迷渡口小箏深院合梁州亂紅交壁飛黃鳥叢緑圍池養白鷗長笛遏雲來綺幕朱絃招月下髙樓意中花發庭前艷夢裏人來江上愁么鳯欲飛春絮靜海棠將睡午風柔狂歌白苧翻新曲笑指青山問舊遊莫道間情消未得主人起舞客重留陸提學錫明錫明字玉井平湖人天啓乙丑進士官江西提學有清節以終養歸性嗜吟咏詩家稱之郡齋坐雪招隱今堪咏吾將問澤蘭美人不知處蕭瑟耐春寒風杵舂雲腳花瓷碾月團翻疑山郡裏僵臥似袁安陸按察鏊鏊字味道自號廉石主人在前子天啓乙丑進士授工部主事厯升廣東副使禦海冦有功賜金勦叛猺璽書褒美終福建按察使有集未刻湛園雜咏童子頻呼艇初疑是輞川岩危松月墮塢隱竹風偏怪石藏幽樹間亭㵼曲泉桃源幾欲誤圖畫足流連烏溪砥柱樓晚眺卜築何年水觀開垂楊綴雨入樓臺平分曲溆帆聲出倒挂前洲塔影來近市魚蝦酣暮艇隔溪桃李潤春苔乾坤是處供長嘯拾取嵐煙喚酒杯南湖阻風鴻寶伯命酌東樓虛閣平臨積水坡授衣猶覺暮寒多鐘聲清自洲前出雨色昏從几上過百疊蘼蕪縈逺楫千行鷗鷺隱殘荷凄其士女登臨少靜對犧尊拭太阿陸職方澄原澄原字嗣端號芝房平湖人天啓乙丑進士授工部主事崇禎初魏璫猶視事東厰澄原首劾之并崔呈秀等罪狀請毁生祠以充兵餉於是廷臣紛紛彈射矣後遷大理寺副疏參罪督袁崇煥有旨嘉其敢言令中使捧函至邸舍御書發陸澄原回奏以小臣而蒙委信前此未有也升職方員外當此之時人意其必大用無何久淹郎署終以罷歸奇傑之氣亦遂用於山水文酒間自號隱放主人往往與酒俠談傖歌童舞妓為飛紅捲白之會間以嬉笑嘲謔俊語紛集或興至疾書衮衮數百言搖筆立就性好飲自負酒龍雞鳴燭跋四座偃臥而澄原如未霑宿醒者嘗自言少遊於酒人一往三十餘乃以選人侣於衆人復以言忤要人世目為愚人或曰癡人洎乎拂袖一歸乃復還我不壞之酒人矣故其為詩多秀逸尖新雕香刻翠有佻宕自喜之概焉所著雜集數種行世澄原厭薄門户中立敢言首攻崔魏亦不附東林其疏曰有市恩修怨舉劾失平者雖東林亦謂之小人不得以楊左為護身之符有特立獨行恪共厥職者雖不東林不失為君子不得以崔魏為陷人之穽又曰臣寧寡援孤立為硜硜之小人決不依草附木為疑似之君子嗟乎明之亡也禍胎於閹寺膏肓於門户崇禎時天下事巳大壞而門户益堅得一中立之澄原猶恐不勝任而棄之如遺也何哉三竺即事東家女兒髮垂肩朝朝纎手弄青錢西家女兒髮覆額阿母粧邊乞薌澤門前車馬任紛紛絳蠟栴檀手似君願向佛筵分斷焰將身化作兩峰雲雲去雲來看不見鏡裏燈前窺半面指點胭脂豈誤人紅顔能使黃金賤徐仲和與余先後兩至湖上不值偶過曾波臣為余寫照出所畫仲和小像倚甕獨酌鬚眉皆動為之絶倒因賦短歌徐生五十如童容海濵之東稱醉龍著書萬卷不得意乃以飲酒藏其鋒中秋遲我湖上月我正飛帆度三越今來湖上楓葉酣不見徐生見毛髮武夷曾君寫生手但貌佳士不貌醜徐生盤薄側理中豪氣猶能吸八斗笑余凡骨詎堪傳曾君為發神光鮮更添一個鸕鷀杓便入徐生酒甕邊金華洞天歌贈米友石先生海內洞天三十六盤薄靈胚橫地軸星分婺野金爭華鍾脈坡陀亘天目蜿蜒峰頭三百里芙蓉一片空中起翠蔭俄從松頂飛灘聲每到泉根止泉影松光鎖洞門氤氲元氣無朝昏青斿紺節真人仗瑶草琪花玉女魂孝標堂裏雲無數初平石畔煙常護倣佛桃源見去舟須臾樵徑迷歸路歸路千山杳藹中咄嗟雙馭凌天風仙臺神理豈終閟毛髮或與精靈通洞天仙吏南宫