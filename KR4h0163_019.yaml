一酬烈士喪英氣願逐酒人遊哭盡不平事右荆軻重過蔣氏蓮雪居用昌谷韻十月嚴霜飛江空天在水沙磧霣紅籜荒日下平地大野曠蕭殺萬物絶狐媚宿莽蔚中洲臨風獨蔥翠孤村淡微晃草濕泫寒淚驚絲轉危葉片片楓林醉荒磴蝕苔衣􅀢黑閴幽邃平疇忽波立煙白失涯涘潭深老龍吼石滑蛟涎膩客雁叫髙旻千行作人字怒濤蕩雲色參錯駢寒峙窅隔闤闠聲時見斷篷起急趂半篙日棹入茸蘿裏苦蔓罥黃葛樹卵小垂紫深林人有無敲火煮石髓吳舠狹溪轉斜光照新穟短籬絢殘錦芙蓉映縞帔疏篁韻蕭瑟欹瀨枯枝墜縠雯雜輕靄櫟徑侵沈毖歸鳥飛影疾帆落園扉閟緑藤束行笈病螙避藝氣牀頭魚腸劒銅花射朱几青鳥憶瓊琚白鳯銜玄粹墮髮成蝸牛筍迸北垣圯耳熱商歌發苦調咽秋思冷焰搖素壁古廟嘯木魅長夜讀天問璧賤麩何貴腸輪幾回直心事颸風似壯士破刺促殘編擲疑義詭譎石鼓醉鼎彞漢郊祀聱牙故期期不諳奚復恥巨螯勍如鐵觴政蒼鷹吏歡集餘間情柔絲漾芳餌嫩粉琅玕脆肥緑銀光紙下階莢錢鏄閉閣檢陳事懶譜難忘曲羞裁銅雀妓三閭倘前身數疑宓妃至賦成六螭舞萬岫倒行次風髙山骨瘦月小蛾眉悴長天若鵝溪一潑瀟湘意凍霞珊瑚頳老鶻刀稜翅草甜蒺藜硬鐵騎沙場戲霜撲平城兒愁絶崑崙使王孫擁羅幕葡蔔閙橫吹夾屏金鴨暖睡熟鮫綃漬黛拂青蟲簪蒨脫胭脂臂此夕氍毺歡幾人酸腸刺丈夫貴行樂窮達聊自肆歸來弄錦孩剪梅帖花子茅簷雜詩孰謂貧多暇箋詩更解玄業垂當代後癡到古人前瓶滿陶潛粟囊餘子美錢願奢誰過此老我只丹鉛春晴短夾狎春風簷牙映日紅水流殘雪外家住鳥聲中栁怯顔宜笑梅欹韻特工故人春倍好應訪百花叢夏秀才緇緇字雪子初字幼青嘉善人天啓間文學有西泠維摩孤望三集其詩早務纎艷既悔之漸趨空淡一𣲖至南中夢遊諸作奧削蒼涼點染特妙絶句尤多風調有竹枝縹眇之音曉自雙溪入徑山竹徑十餘里遙遙青未歇密葉罥秋衣曉煙如暮雪睇望直嶺來髙陂愁步滑欲語隨行僧咫尺邈難接嶺過路逾曲盤空螺頂折俯仰竟無數猶未度林㩾舍杖緣危枝帶斷不能結但視崖下泉墜魂輕一葉到寺始坦步松杉古於佛非此辛苦行何由與塵絶夢同錢彥林遊雞足山亦猶盧綸同吉中孚夢桃源也因賦五首異境不受塵洗屐登其巔果有千片雲落我藤杖前絶頂開三峰背面皆嬋娟輕嶮竟懸度躡石時鏗然微飈欲吹落賴有旁枝搴白光布澗壑忽掃歸滇煙霞帆風為柁蕩漾搖銀船掬波不敢潄一咽金雞泉古瀑如清琴能起尊者舞山靈領其意泠泠不時撫我行溼雙履撥草尋來處過嶺逢髙松疑曾挂金縷山花拈不盡紛紛笑巖户擲杖還自嗤空窗想眉嫵何地無寒泉行人自塵土蒼茫沿澗歸踏石驚吼虎青山生白雲雲滿遂無山七十二芙蓉俱沒波濤間我欲往采之涉江恆苦艱嫋嫋出門去細縷隨風刪晴嵐如神女縹眇空中還草木沐新髮長松鬭眉彎雪嶺隱如屏洱江月如環其餘千萬峰俯睇皆低鬟步步焚香燈百里皆禪寮懸巖縛瘦屋髙下隨山椒有如巢林羽一一綴寒條客子脫青笠隨意挂僧瓢飯宿無前期但望風幡飄松杉響今古蟲鳥號晨宵梵唄出澗壑鐘鼓過亭橋如何繁音會聽之增寂寥曹溪一夜雨流沫復如潮尋常愛長松此地多於草花多不勝飯山僧同葉掃石門隱化迹異樹分層繞滑碧青珊瑚垂條覆瑶沼摘瓣娑羅開嚼枝楊栁裊無憂與春浮雜植等葵蓼天女時時來飛鳬如鳯小手把曼陀華却笑蒼髯老大小龍潭巖形既以紆泉勢因之折直下千尺峰洄漩注空穴白練化為環古鉢盛秋雪雲過偶然墮長與髙空絶冷光撲鬚眉照影終不徹蜿蜒誰所蓄藕孔新絲結龍去潭水寒龍來潭水熱去來恆隨風掃此潭上葉雨宿釣臺下翻喜晴行少幽回歷勝多褰裳雲渡筏潑墨嶺浮波樹沒驚沙坐帆遲捫壁過羊裘不奈雨決意買漁蓑盤江渦過鐵橋遊大願寺解轡似停橈孤尋寫泬漻鈴聲遙引杖沙路亦乘橇江束驚蛇網山奔渴驥驕龍歸金粟寺蚪鎖鐵繩橋門壁行鼯鼠逢僧話獦獠佛身鏤石骨禪屋寄藤腰草果時充茗蠻花亦間蕉眉攢峰亂簇繒裂瀑斜飄待住顛愁秃將行踵欲焦徘徊且留飯為我滿椰瓢至滇幕寄答扈芷大師白浪青崖處處愁無端萬里却來遊逺心自欲投雞足秃筆非真羡虎頭海際孤萍來澤國天邊一髮到梁州歸來還約師同住閲盡花開共水流歸舟雜敘二首曾與江波隔嵗期枯楊如髮少青絲樵人歸雨招菱棹估客停風拜栁祠懸溜逢磯驅碓急偃帆入壁下灘遲武陵艷曲新翻得不譜劉家舊竹枝竹近西江水漸青平林新橘小於櫻招來山鬼曾無墓望去仙人舊有城客枕屢移峰近逺漁燈欲亂壑幽明隔舟遙見眉如月疑有琵琶入夜聲夜過伏波營留題蠻雲瘴雨滿山頭火照殘碑識馬侯為問書生緣底事夜深驅馬向辰州昆明女兒歌四首翠滴眉梢眼欲波自憐婸好不如哥偷開銀合挑瓊雪遞與檳榔半口多皂笠遮紗覆額雲猩紅小襖焰如焚為嫌鞋齒頻兜襪髙曳蠻花繡蝶裙隔街艷曲巧相勾一笑簾前小靨柔疑是金陵花有種聞歌開傍玉搔頭鸚鵡新雛不肯籠但將梳掠鬭春風朝來粉頰微添白却繫雙鬟瑟瑟紅宿曹溪僧牀小臥石淙青枕下流泉枕上聽夢入江南深寺裏紙窗疏竹讀殘經南中曲八首女鬟垂緑弱難勝却怪濃粧薄未能逺黛欲浮封皂帽纎腰如削繫紅藤盡説哀牢漢不如江珠片片碎芙蕖竹枝近譜蘆笙曲木夾遙傳貝葉書不數閼支北地能女酋騰騎疾於鷹繡旗閃陳朝擒賊錦幀遮燈夜供僧車逢油壁喚還譍賈客纒頭盡錦繒膾縷堆盤魚帶鬛甕香環坐酒傾藤黔府新翻十二歌南音如梵亦吹螺侍兒記拍分銀豆小史登場換畫鞾緑珠長在小樓前嬌小偏宜石尉憐叉裊辟寒金似粟絲纒合采鏡如錢小小螺山亦破鞋青青草海却通􅑉波燃白火招漁舶路撲紅塵趂虎街蒟醬唐蒙亦漫傳邛西曾不到張騫柔花漬白夷桐布巨節刳青濮竹船劉貢士亮采亮采字德嚴號濤生平湖人天啓丁卯副榜與雲間董思白陳眉公友善至輒掃榻湖墅盤桓旬月時父廷元方顯於朝無紈袴習其擬辭舉人進士書云求為伏闕上書罵欺君之人而恐纍在朝之父令我捫舌捶胸後人亦可悲其遇矣卒年僅三十丙寅秋七月朔自子至酉雨風大異次夜過之晝夜三盡而平何可無詩正虞筆戰怒風刮留塵放雨凝新瀆轟轟欲拆崖久之若崩屋入門翻止榭信耳舉飛瀑舟子蕩浮家漁翁飄釣竹草木突搖落乃豁清秋目水天亦驅馳泉石不棲宿識今多波濤從來盡平陸鍾幕客代英代英字幼芝嘉興人布衣嘗遊九邊諸大帥幕下如李寧逺杜􅌢武皆尊為上客有傳舍稿質研草楊武陵鶴品其詩謂致深而思苦本之工力澤於性情云秋懷借得村居僻蕭然桑苧鄉安貧不為病居簡或疑狂有客唯毛薛無書剩老莊祇因八口纍未遣硯田荒别李大華觀察朝見屯田暮打圍護羌校尉有光輝年年天上求龍種凡馬空從青海歸陶徵君龍見龍見字雲從一字馴之朗先從弟為國子生崇禎元年承詔纂修國史嘗遊三山曹學佺徐渤諸名流一見交契所著詩文未刻而沒才氣清朗不為詭僻佻巧之音旅病旅病傷遲暮溪山空復春户虛風亂帙簾靜鳥窺人蠖伏寧干譽熊經藉衛真自嗤還自愛端不畏人嗔馮秀才武武字玄陵夢禎仲孫諸生僑居武林詩學長慶每於恬淡中寓風藻著有今詩二卷七客篇有序余讀楊鐵崖先生集所謂七客者志蓋先生嘗以斷劒鍊為笛吹之嗚嗚作龍吟一古琴乃賈秋壑故物胡琴象管云是宋道君內府又得古陶甕為秦祖龍藏中器玉帶石硯乃文文山手澤此六者或尊忠臣或紀異域或憐所遇非其主然俱可以飬性靈舒抑鬱於是闢一室皆以客待之自嘗謂老人古之亷士今之怪竒人不遇於世又自客六者之間而七焉遂為七客者志兼有長歌余氣熱其人悲吟朗誦終不能已復作是詩泰定至正間詔徴天下士會稽鐵崖山乃有古亷吏少登萬卷樓老著七客志有客來洞庭鐵龍蒼溟戲巴蚺噤明珠斛律展雲翅焦尾與管筒哀號未能遇古陶皤然姿折花盛酒器獨有白玉圍親識文山字佩帶不忍遺一一書名記世寶登圜牆兹以客禮事老楊縱筆端六子瞪目視嬉笑語默間廓落寧顧忌在上或在旁坐立漫無次同處一室中爾我孰非寄嗟嗟楊維禎舉動直自異或為忠良悲兼為姦邪刺所遇非其人忽從逺方至會合詎偶然何忍相捐棄茍能讀此書莫負長者意答贈陸四叔度舉世盡皆天下士相逢慷慨輕生死豈知俱屬勢利交反覆須臾厚如紙向聞陸郎有心骨貧病未能結交爾余詩狼籍埋荒煙那有多情眼及此東家甕底拾殘編低徊浩歎稱才子尋訪棬樞扣掘門登堂乍見發狂喜忽憶湖湄曾遇君栁岸花堤一瞪視探君囊裏有雲煙鏘金鏗玉聲聲起五湖仙棹讀書船停洲泊渚忘還里把酒誰是髙陽徒千金笑擲金陵市我輩庶幾心可期才華意氣餘事耳阿麗曉起長歌諸暨陳章侯畫贈蕭山來季當代佳人久蕭索圖寫形容境俱惡惟有前身顧虎頭未許秋毫容易落興來不擇楮與綃塗朱傅粉無輕錯忽傳阿麗曉起時近者欲迷逺者愕解鬟初出羅帳寒褰衣緩步鴛鴦閣青絲漠漠掌上盤文犀繡帶腰間綽簇金小袖錦模糊長裙珮玉垂珠絡仰面惟看極目霞低頭不顧如山約世上蛾眉齊閉奩畫裏胭脂盡糟粕從來畫女欲傾城周昉仇英不復作靚粧袪服亦易工凝睇含情難姌嫋苧蘿靈氣歸筆端偶倩章侯縱揮霍麗娘不減來季貧休叱馮生賦輕薄桃花潑浪暮春天記起懷中舊時諾春陰十日春陰斷客行碧莎如髮傍階生櫻桃落盡鳥飛去獨坐虛堂風雨聲王秀才起隆起隆字季延號止庵秀水人諸生有稿未刻惟甲申後咏史詩一百五十首傳於時咏史諸葛事三國蜀龍吳也虎在魏以犬嘲犬亦衛其主五馬應騰槽淮南困孤旅帳士血流渠無一善逃死滔滔犬絶稀弔古淚如雨右諸葛誕玄洲道士徐頴頴字渭友一字巢友海鹽人為諸生以詿誤逃於僧自楚歸入茅山為道士往來句曲道上雙髻道服騎紫牛導以孔翠道路喧譁傳神仙來兒女羅擁不得前且以為天上人攜將怪異物落人間矣久之復出遊江南燕雒間好談兵以徐鴻客姚榮靖自許兵後入閩粵不知所終嘗自言欲作三十六洞天遊以故瓢笠所至幾遍天下葛震甫序其詩有九合曰有間情曰遇佳山水便住曰中年以前能好學曰棄家入山曰無長物曰不交流俗人曰無應酬語曰苦吟曰不多作有玄洲集貧士行白蒿青柘頽垣中三日煙㸑始得紅故書簌簌委鼠穴向夕託宿如鵝籠濁醪難賖值蠶月歸來西市瓶疊空咄嗟枳花且多實井底蕙草無春風瓔萄筆簏歌為吳秋賦嶺南多異石謂為珠玉氣孕結而成先生門人句曲楊蕊仙教授海南購其二以貽先生相其形玉石相錯紫蔓瓔萄殆鬼土也虛其中適堪籠筆屬頴賦之已卯臘嘉平筆記珠胎半尺金錯文三年一葉非宋人石家解食白鳳髓此器不共珊瑚陳海南玉田侵蛋户鼠璞繇來辨胡賈始疑得自大宛歸紫蔓纍纍滴馬乳吾聞天子鋭意戎馬郊四方竹箭如山髙吁嗟毛生久瓠落此器不得隨包茅惜卿愛卿共卿席主人摩挲唾壺側十五城堪裂地償從此山中有封邑答贈黎美周此生期再刖抱璧過江東愁絶青冥外纍然白石中事多傳粵史詩欲續秦風一片冰壺意毋輕語夏蟲雨泊銅陵抱犢過飢嵗側聞魚米登異書探玉笥凍雨上銅陵帆落風三面天蒙水一層獨行人渺渺辛苦蜀江冰翠峰寺行藥不二里名泉尋翠峰中多耐霜果上有負暄松一鳥下香國無人鳴晚鐘未能常襆被看雪過殘冬粵中寄顧不盈古人半流寓余亦度崑崙不為探金穴何緣到海門碧尋榕樹宅紅愛荔枝村洵有神仙迹惟應靜者論望雨禾黍深愁秋未登芙蓉香死暑如蒸雲霓似隔天三尺河漢空懸水一層上國漫傳求馬詔時民間方苦養馬之役中泠新沒咒龍僧金山寺僧禱雨不應輒沉江飢來始念峩眉寺日日風雷夜夜冰此村草堂二首世卜桑榆是此村東臯酒社記曾孫梅花與我年加長春水於人德共溫故劒嘗攜何可賣破書曾讀不須存河汾縱有千言在未敢輕將叩九閽苦竹蒙茸覆舊林莓苔無迹斷人尋石田未可輕焚研山水何繇再入琴隔市魚蝦孤釣逺閉門風雪一燈深橋西便是金張宅見説年多行路心西山梅花四首石公山畔橘洲前香雪層層覆釣船古調化為清瑟怨折枝形得玉叉妍芝田分種當三秀玄圃移根又幾傳欲翦春愁無處寄一簾湘水夜如年仙人黃鶴不知處古雪吹殘鐵笛中行盡幽暉雙袖濕目無青黛四山空冰蠶竊食成香繭白燕驚飛擬玉籠濁厠錦茵俱可惜為君起拜落花風甪里祠邊多手澤華山路口最知名凍雲匝地春無腳碧水搖窗月有聲半夜抱衾投寺宿何人著屐過橋行薛娘縱負金針巧誤捻紅絲繡不成稜稜髙格去人逺碧落崔嵬靜見聞雪曙有僧攜茗具天寒無蝶上湘裙何妨苔涴成蒼璧多恐風吹化水雲村店閉門春釀凍斷除煙火一尋君紅鸚鵡一羣花片攬遊絲金索空留絶艷姿往事能言慙赤鳯它生如憶比紅兒餘霞散綺開籠夕白露霑裳濯錦時轉念隴山深處好上林不用羽毛奇方正學先生墓赤鳯巢焚尚覆雛一杯翻荷主恩殊冶城無鐵鑄肝膽石甃何人藏髮膚信史直須求草野鴟夷幸不殉江湖空憐粉壁多生氣難繪當年負扆圖羅浮石龍渡竹裏仙源半估船水村鮭菜不論錢海南三月無花落一路春風待木棉武山題葛震甫壁草堂疏竹覆漁灣湖面冰髙白鷺間自古風人喜流寓謝公不住會稽山釣臺石几朝朝立鷺鷥苔簷露折野棠枝荒臺千尺非無意不與旁人再下絲塞下曲枯楊磧裏久無春盜得黃羊是漢人駱馬馱金輸塞盡不知何物鑄功臣燕市燈詞雲母屏連畫扇開香煙吹落避風臺小璫帽上珠無價自説承恩得賜來湯秀才蓀蓀字有生秀水人啓禎間文學有薄遊草此村詩西湖偶吟湖上草光泛緑艷平堤疏栁斜陽眼更迷不盡依依湖上思好山多在六橋西沈太學受祉受祉字止伯師昌子太學家世以資雄邑中為人間靜無叫號狂躁之習好與幽人韻士觴咏往還有薜園草杪秋宿南屏圓照堂采茶龍井巔汲水虎跑徑藉此兩地佳以為一山勝遊程達夜商好侣因詩訂行倦亦呼舟林間數聲磬陸徵士時雍時雍字仲昭桐鄉人嘗選古唐諸家詩自為評論曰詩鏡又論列楚辭取王叔師朱考亭兩家注而以已意折衷曰離騷新疏崇禎初詔大臣保舉巖穴才能之士時雍與焉然終不遇久留京邸館於戴冏卿家會戴以事被劾援時雍為證并逮之卒於繫所沈恤部子先讀豫騷疏慨然有咏見贈於其行也賦此酬之桂棹蘭橈束兩頭送君愁共水爭流參差吹罷芙蓉雨雲鬢羅衣不耐秋周秀才拱辰拱辰字孟侯桐鄉人諸生擅詩古文好纂祕册稗乘及國家典故寒暑搦管不輟與陸仲昭交好有聖雨齋集其詩與仲昭相當然才情奇麗終推孟侯桐邑自國初貝程後此道絶響越四百五十餘年始得二子以振之洵乎才之難也咏古謂憐王孫餓詎是漂母慈丈夫不自食姑以飯愧之果腹不知醜俠士所誚惡叱之出胯下亦以整其怒取履良有謂辱胯寧無因倨侮之狎至幻出疑一人吾欲鑄少年黃石同配享大恩與大讐成我原無兩淮水日湯湯英風同一仰聽黃公石彈琴鎮石流雲香滿堂一絲啼出一鳯凰歸昌啞啞聲未歇梧桐滴雨湘流竭南園日午蜻蜓醉玉沙烘夢鴛鴦睡柳髮裊空題晚照雪打琅玕夜半嘯崩濤裂柱海國穿西毒夜撥獅子絃南岡鳯死青鸞寡飢雛呼母聲軋啞寂寞低回古路迷病猿聽雨斷腸啼洞黎寶香香七尺絲將玉戛崑山碧誰其彈此黃公石泠泠千古精靈惜白羊玉鵲翩翾擲金陵别酒母劒光落背青如雪間踏秦淮訪明月六朝舊事入寒流牽引愁心無斷絶黃花插髻壚頭情澆我玉缸千醁醽霜螯大嚼不離口髙勸金巵與鼻平狂歌大呌驚白日一醉千日浮雲輕仙人攜我東南征相驚跨海尋蓬瀛何以酬之酒母笑明朝特遣雙龍迎種竹秋風玉露清不任松花古香吹滿岑琅玕羅羅挺而立菖蒲故應拜此君出廣博物志曉麓沙頭聲簌簌一蓑馱得瀟湘緑石林隱約借片雲種出空除百翠玉蛇蚹罥煙濕不消蜘縈凍粉絲如繅長簷細戛青鸞佩簾影碎拂鸚哥毛主人種此良有以醉與同夢醒與語蛇子蛇孫任意長他年莫作龍飛去田家三首綰髻學吳女紅花向鬢開借機攜杼出汲井抱罌來洗葛揉梅葉漚絲治蛤灰老姑催瓦祭趂月壓新醅不羡勞人肉一蔬聊自厭治爪紅杏蜜燒豆紫蘇鹽魚骨占風雨鶉羮試苦甜瓦盆吾願足時復喜丁添為圃仍秋晚間來息耨鋤菜殘不似甲瓜老欲為魚羊角懸婚酒牛衣晒道書幽懷吾自貴碌碌笑簪裾粵東秋日展陸丞相秀夫祠丞相祠堂古空山啼鴂秋蝸涎迷榜字榕髮裹泥樓麗旭扶桑隕忠魂海國愁潮聲豗日夜猶似抱龍遊客汀遇紅夷人談其國土風俗漫述三首碧眼南蠻種紅夷小國風醁􅌬雜鵝乳靈藥訪龍宫侑客評金甲生兒瘞鐵弓即今聆譯語字字與華同物候中華似初無稻與茶麥長剛半寸桃大約如瓜竹鼠能驅狗蠻禽或變鯊南風來半月不用指南車衣裳雲葉拖剪髮剩周羅兒女擡官轎神鞭選武科椰羮同彘食花布學鮫梭兼之婚禮異鼓吹祭天魔合歡詩貽吳暗生二首寶夢流蘇曉盈盈不自扶掠眉催畫筆信手作花圖紅唾明雙袖金叉顫九雛香肩貪並倚忘却繡工夫瘦玉臨香檻輕羅倚繡叢珠簾窺皓腕緑鬢語春風露文君井雲銜簫史宫流年花裏駐銀甲譜枯桐白燕二首照影還看水似空飛來掌上鬬殷紅春思不到烏衣國曉夢渾迷珠樹宫杏雨泥香開北户孀樓人去怨西風投懷當日曾驚玉却笑零陵舞未工只道烏綃覓主歸簾前狎視影全非宜春畫淺霜鋪額社日寒輕絮點衣翻踏纎羅銀剪下巧窺明鏡玉叉飛仙姿合住瑶筐裏莫向雕梁怨落暉續孌童詩有序古有孌童詩詮情未暢戲為續此當李賀秦宫之什分明楊栁絮揑作一妖童倚髮方蕭史風流軼子充袂裁垂手翠袴剪合歡紅割袖邀深愛分桃莫惱公香奇疑是竊憨稚總成聰髻幻吳宫女腰逾楚國娀引歌秋露滴吐氣石蘭融密意遺梔子幽歡拾鹿蔥彩毬銅沓弄雙陸蜃窗攻舉袂扶雕輦盤靴怯寶驄乘酣春選夢餘興夜吹銅行雨非巫峽牽雲笑螮蝀前魚未應泣憐惜賸秦宫塞下曲拚將七尺報君恩夢裏曾驚斬谷渾聞説霍家新拜爵衆中私檢臂鎗痕小遊仙三首芙蓉冠子璚雲裳玉舄絲纒九鳯凰朝罷帝真三十六方諸宫裏讀歸藏橘中輸却熊盈襪又向松間賭玉簫花影覆棋陰未轉誤人柯爛不成樵南嶽靈車紛曲阿晶盤割饌進郗哥偶然謔笑能噴飯化作飛蜂嚙鳯羅周秀才九罭九罭字公魴崇德人啓禎間諸生五嵗知聲偶少孤家貧舌耕養母四十始娶性簡傲豪於詩酒無攢眉態有周子鳴若干卷詩工近體不作細響下第述懷斜日偏能照逺村寒風吹落舊柴門磻漁老去鈎仍直魏説歸來舌尚存愜志豈容忘廟闕暴鬐終欲想崑崙天涯賸有無窮恨夜半髙歌寄酒尊姑蘇懷古綺羅開作野花間錦雉南飛去不還獨有舊時江上月年年清影照陽山何秀才浩然浩然字希孟號象巖嘉善諸生師同邑袁了凡錢御泠國變後髙臥村野留意星卜之學所居一室惟蓍草瓷罏酒瓢詩簏而巳私諡仁節寄張羽升君言不得意終日掩柴關我有一尊酒期君相往還醉回何所贈明月滿空山張布衣翼翼字羽升嘉善人家貧嗜學洞覽韜鈐符讖之書有膽識技勇能平地躍數仞牆談兵慷慨議論風生與同里何浩然友善語浩然曰天下將亂矣崇禎初客遊三山不知所終寄何希孟曾聞天下士慷慨勞人思不意吾黨中於君復見之議論在家國風雅為文辭惘惘三十年丘壑空棲遲君子何多艱造化能無疑陰陽道循環天心有定時潛居修六翮霄漢以為期余固江湖人顧非英雄姿涉世不合宜還家無茅茨逢人強為語過後唯見嗤得君為吾友夙昔真吾師憂患多所同嘉會相追隨素心懸日月我巳忘吾私形影非一身中情已無岐晤言僅須臾驅車逺别離依然貧賤交行止已參差新人意何樂故人意何悲善言竟無聞至行失其儀所行嘗妄發鄙吝恆在斯執手猶未能念此神先馳聊以不永懷吾姑酌酒巵匡坐對明月俯仰徒嗟咨相守不為意相逺何淒其宛轉縈人心一夕亂如絲陳秀才詩教詩教字四可一字興公晚號醵菴秀水人啓禎間文學有稿自題曰非業石橋小坐落日西山麓平橋枕石磯行人穿樹杪隔水見漁扉龜曝乘荷出蟬鳴抱葉飛薰風時復至獨坐淡忘歸玉泉寺觀魚九里松邊路前朝古寺門客遊多馬迹地僻似漁村非為尋船子將無傲漆園坐來重撫掌更得佐茶樽題新中驛壁三千客路寄征驂旅况凄然總未諳唯有柳枝曾見慣阿那又不似江南湖南賦事懷穆公蕅花居外柳垂絲水淺舟膠未進時望斷南屏山下路竹房僧老坐吟詩王布衣毅毅字叔逺一字初平天啓初自常熟來寓秀水楊家村天懷曠邁作詩懶於近名性巧工鏤刻製核舟不及寸中有賔主僕從几席樽俎器具無不備而人物鬚眉老少無不肖窗楯可以啓閉左右題銘有詩句可讀人疑鬼工魏子敬為記詩名雪崖集雪崖秋晚作草白秋風後花香曉露初扶藤縈蘚石引水灌芙蕖久病多讎藥長貧獨愛書蕭然深閉户自覺送迎疏徐秀才喈喈原名鴻祚字儀仲嘉興人啓禎間文學有寓懷秋尋詩秋感林島遙聞時局紛邊笳愁斷刺茵紋偶驚鴂響苔翻砌初試鷹髙鬼嘯墳渚北沙平揖帝子江南濤沸憶湘君不須買隱耽廬嶽寂寞年年度白雲鉏舉人用登用登字百穀秀水人天啓甲子舉人小園初成陳仲醇過版築登登罷圖書處處遷茅柴過橋酒燈火到門船竹徙上番雨荷開半兩錢醉吟無不可為我拂朋箋沈舉人𢎞度𢎞度字公雅桐鄉人居清風鄉天啓甲子舉人有五願齋集容餘軒稿畏吟小草憶北園頗憶衡門下幽居有北園覆簷新竹嫩滿地剌梅繁好友時來過清琴每自援齊民有要術試驗老農言胡蘄水振芳振芳字來子嘉興人天啓丁卯舉人選授蘄水知縣赴任未一月流冦陷城家屬十三人盡死振芳至省納印放還歸里貧窮無子輿論惜之歸里後碧漪坊黃氏要主童子孰自返牆東宅何曾竈突黔已無五斗米笑脫兩鞾襜旅夢安蕉鹿浮名上竹鮎從今兔園册一任老夫潛張舉人所見所見字曉生後更名介號吉先嘉善人天啓丁卯舉人秋雨懷夏彞仲兀坐清秋夜瀟瀟况雨天故人千里外杯酒一燈前旅雁悲長塞寒溪吼老泉何時明月下肯掉子猷船張布衣志逺志逺字叔明嘉興人有竹嶼吟稿隱於市㕓詩為李九疑太僕所賞集慶寺作參差紅樹倚晴空楖栗行吟度晚風忽憶翠華臨幸處滿山黃葉寺門東檇李詩繫卷十九
