body:
  text: 檇李詩繫卷三平湖沈季友編宋傳貽先生輔廣廣字漢卿父逵流寓崇德生廣少讀濂洛書慨然願學從吕祖謙遊復師事朱子與黃幹並稱時號黃輔慶元初僞學禁興蔡元定貶死廣獨侍熹不去入京師居太學南集同志講學不輟嘗扁其堂曰傳貽學者稱傳貽先生又稱慶源輔氏所著有論孟答問六經集解詩傳童子問通鑑集義諸書資福院平緑軒名區與利壠羊腸競攀躋誰能為芳草四曠成幽棲春風一憑闌秀色無髙低山遙不作障水近何妨隄只恐金氣寒黃枯變碧萋坐令羣目驚有似七聖迷人心無天遊六鑿相攘擠但于平處觀衆有何端倪日月互賔送景物隨乖暌彼昏如執著惟君試金箆王朝郎明清明清字仲言本汝隂人甫十嵗朱三十五希真徐五敦立過其父所詢以國史中數事應之無遺由是受二公之知慶元間居甥館於嘉禾官至朝郎與其父雪溪先生兄仲信俱有史才名卿巨公無不歎慕尤遂初者時之鴻儒也一日詢明清以天臨殿與南唐中主畫像明清詳陳本末無一不符遂初驚愕當時諸公欲告於上收置史館不果明清又嘗剴切上封事故趙師厚贈詩有信史賖靑簡封章窒皂囊之句樓鑰送王仲言之泰倅二詩云萬卷詩書老雪溪頎然二子和塤篪絶憐伯氏久亡矣猶幸夫君及見之來上鵷行人謂晚往舒驥足自嫌遲他時還向雲門否布襪靑鞋尚可期遂初陳迹遽凄涼擊節靑箱極薦揚談笑于儂情最厚典刑使我意差强重屏唐畫論中主古殿遺文話阿章舊事從今向誰問尺書時許到淮鄉曾幾詩云吾宗擇壻得羲之令子傳家又絶竒甥舅從來多酷似弟兄如此信難為陸游詩云汝隂太史萬籖藏酸棗先生六世芳豹尾屬車留不住却尋陳迹海陵倉紫薇傑作傳千載物色分留待下車老病難陪曳裾客同來時寄一行書山谷有跋王仲言乞米詩是時南渡以來簡冊散亡老成凋落明清裒集軼事遺聞編為揮麈録自言無一事一字無所從來又有投轄録清林詩話玉照新志紹興乙卯張安國為右史明清與仲信兄鄭舉善郭世楨李大正李泳多館於安國家春日諸友同遊西湖至普安寺於窗户間得玉叉半股青蚨半文想是遊人歡洽所分授偶遺之者各賦詩以紀其事淒涼寶鈿初分際愁絶清光欲破時留與人間作佳話緑窗瓊户老蛛絲嶽鄴侯珂珂字肅之號倦翁彰德人飛季子霖之子也嘉定間守嘉興有惠政後家郡治西北金陀坊痛其祖武穆為秦檜所陷作籲天辨録等書總名金陀粹編官至寶謨閣學士封鄴侯有玉楮集豫園泰堂之傍有竒右小有有洞箭括有門車箱有谷高廣不袤丈而嵌空之勢宛若飄動暇日獨坐對玩移晷因賦池邊歷平蹊果下動游鞚一笑未必領萬象徒目送淵渟歷危檻日景眩華棟閒情暗不舒倦思悄如瞢忽驚鵲噪檐恍類雞發甕坐開蒼玉壁平揖靑瑶峒疇昔果安在奔走比嶽貢仰觀箭括門廣宇豁晴霿石開車箱谷盤道陟微同中天隱日月遙海插螮蝀居然袤丈間有此具美衆老夫生平嗜酷好泉石弄天巧謝斫削人為漫摶控尚憶三神游俯紀十年夢踞龜曾食蛤騎寉更笞鳯覺來海山蒼倐見雪竇空便疑勢􅍶崒獨缺波澒洞捧罌喜對酌岸幘發孤諷此兄定絶竒吾意當折衷一笑問阿章試與評伯仲病虎行長風吹谷白日暗曠野人稀雲黯淡狐狸嘯舞豺狼嗥病虎妥尾行蓬蒿天寒泉凍山骨髙皮枯髀癢霜爪搔紛紛晴雪爬落毛垂頭帖耳身腥臊羣鴉槎牙噪枯木燐火半青新鬼哭走麕過前不能逐目視耽耽蹲朴􅈪毛風血雨天地肅何日跳踉看食肉天生萬物有盛時當年一嘯天助威坐看雲起行引兒當塗寧復論老羆一朝老去守巖竇落葉滿山氷雪後壯心空在筋力疲寂寞長飢眠白晝古來豪傑多沈淪不用為鼠皆若人范雎折脅西入秦內史長嘆田單嗔可憐百獸為披靡轉顧不如圈中豕男兒奮跲亦渠似肯復虛為倚崖死君不見南山白額曾報恩牆頭金枕投何人病中試張觀筆淮上霜濃哀草黃阿㕙健走如何獐不知聚族加束縛妙手乃有明山張生來阿㕙素狡獪何術聚致如驅羊拔毫擷穎不敢惜一一順聽伏且僵人生切勿恃一技善走古有執蓋郎不惟平地傅兩翼仍以俘馘浮長江一朝發憤遼東岸逝水亦復隨浮梁只今紅綃瑩玊管何人解發千古光明張眼前第一手嗟嗟阿㕙孰能走山中寄楊宗博多病山中客無人傍酒樽與猿分橡子為鹿長禾孫白晝雲歸屋黃昏雨打門忽懷楊司馬烟靄隔重閽宿溪聲閣望爐峰閴歷烟巖古琮琤雪澗橫海潮秋八月山雨夜三更肯作隨流想難忘潄石情壯懷徒激烈聊復以詩鳴題竹院秋枕竹鳴屋晝棋松掩關雨晴猶濕徑雲薄不藏山未洗中原恨難消永日閒西風動征韅空愧鬢毛斑三塔寺寒光亭張于湖書詞寺柱吳毅夫命名後軒考見後竹裏逢僧院殘碑不計年雁題三崒堵龍化兩魁躔寶正號應紀元豐墨尚鮮寒光定何似誰放五湖船蒲萄當年博望奏邊功異種曾携苜蓿同摘乳那煩挏馬令引鬚聊愜好龍公頗憐漢地離宫在未許涼州酒甕空回紇只今重餧肉清隂彌望滿關中嘉定丁卯豫守檇李召還郡人見餞于三塔灣偶至此寺因名有感往年曾佩雙湖組古剎猶題三塔灣墮雁重尋湖浩渺斷虹渾記水回環兩州隔涉名無改二紀棲遲老復還病衲雖無分别想經行莫作少年看紀事人生邂逅適相歡一曲髙歌行路難頻寄詩筒君勿厭種花持釣是閒官病中登山滿山桃李閙紅霞曽約香山白鹿車堪笑東風欺病客攙先且到别人家張堯同堯同字爵未詳栁志載其咏吾郡山川古蹟甚多觀列岫一詩乃知係秀州人也按宋慶元後始立嘉興府而堯同稱吾州且所咏間及寧宗時事當是寧宗時人存之以俟博雅者嘉禾百詠胥山馬革浮尸去君王太忍人此山空廟貌何以勸忠臣附考山在郡東二十五里接嘉善縣境一名張山乃硤石之餘支也吾郡諸山自天目發源盡于海鹽北一支由硤石蜿蜒而來發為胥山平田突兀廣尋數畝舊經云子胥伐越駐兵于此水經云子胥死浮尸至此居民憐之立祠其上俗名伍王廟旁有石龜凝望注水風雨中農人見其行疑為怪鑿其目碑語有石棧自錢塘抵禦兒之胥口凡十一字惜不得其全文又有磨劔石長二丈許劔痕在馬其巔相傳即子胥墓也括異志云隆興間守臣李春請撥𨽻郡學以荒山皆石不果鄉人陳了翁之裔陳煃鑿石結廬名讀書堂下有水曰胥江屠應埈有胥山賦其他題咏甚衆八景之一曰胥山松濤殳山丹竈功成後寥寥掩竹扉但聞蟬巳蛻不見鶴來歸附考山在府城西南五十七里舊屬嘉興今析屬桐鄉縣東南三十五里千金鄉昔有道士殳基尸解于此唯存巾氅葬之號桐棺冢山有兩峯東峯號史山明初貝淸江朱以貞結殳山詩社後郭觀察舜舉吳洪雅公治西林僧公朗輩繼其盛云又有洗藥井藏兵塢潮音院顯靈廟係宋時祀三衢周孝子封顯靈王者慈烏泉喝石嵒陶𢎞景真誥云嘉興殳季真于宋景和元年得晉楊許三真手蹟于剡縣馬氏以呈廢帝又陶隱君弟子題名有嘉興殳興祖滮湖四境田相接烟瀾自渺瀰客來吟此景無或比滮池附考湖在郡城東南二里春波門外一名馬場湖宋志云濶五百丈深三丈北鄰城壕東列㕓市其西則鴛湖也亦名南湖湖濱有濠股塔湖南有樂郊水心列岫三亭及潘尚書園中有烟雨樓俱另見鴛鴦湖東西兩湖水相並比鴛鴦湖裏鴛鴦鳥雙雙錦翼長附考湖在郡城南三里澄海門外湖中多鴛鴦故名又云以東西兩湖相麗如鴛鴦也亦曰雙湖總名南湖宋從事郎聞人滋南湖草堂記云檇李澤國也東南皆陂湖而南湖尤大計百有二十頃元陳世昌有南湖賦湖中有裴島放鶴洲諸勝又名陸瑁養魚池八景之一曰鴛湖春曉長水古來名未滅人好水還清一讀髙僧疏塵勞悟此生附考水在郡城南六里長五十餘里自海寧發源貫硤石東北流入嘉興境始皇東遊過此聞土人水市之謡乃乘舟交易以應之宋時有長水法師明沈懋孝學者稱長水先生谷水一作許尚詩短棹經行處風披藻荇香中宵孤鶴唳片月在滄浪附考舊經云古戰場夾谷口秦長水縣治今谷水是也神異傳曰由拳縣即秦長水縣淪陷為谷因名谷水東南流逞嘉興縣城西又東南徑鹽官縣故城南水經注引吳記曰谷水出吳小湖徑由拳縣故城下九州志云谷水之右有馬睪城吳王濞煮海為鹽于此梁元帝𤣥覽賦曰時度谷水之陽尚想嘉禾之方壯慶亭于吳后雄檇李于越王陸機對晉武云三泖冬溫夏涼谷水在其北金澤章練小蒸大蒸白牛諸塘在其西葑澳走馬諸塘在其東泖橋之外橫絶東渚者秀州塘也又吳地記云海鹽縣東北二百里為長谷陸遜陸凱居此又云嘉興縣東二十五里有長谷亭方輿勝覽云陸遜所封名華亭谷嘉禾志云當湖北有華亭河然則一水異名大抵自硤石襟帶吾禾數邑以至于泖耳天星河拍岸浮春渌菰蒲四逺生網羅人不到魚鳥亦忘情附考河在郡城內東北一名天心河宋嘉禾志云東西廣三十四丈即始皇發徒所掘俗謂天心墜穴泉與海通故大旱不涸水草不生旁有碑存二十餘字剝蝕不可讀穆溪靜練明田外源流笠澤通不因逢歲旱誰識濟時功附考溪在郡城東北四里接上谷湖入太湖水中多龍骨韭溪終與雙溪接分流入郭來市橋人影合不解洗塵埃附考溪在郡城內即南湖之支流經城而達于北運河川瀆記云太湖東通嘉興韭溪是也溪上有西埏里見搜神記雙溪柔櫓聲相應名齊漢魏收可憐一溪水分作兩塘流附考溪在郡城東六里以其近漢塘魏塘故名漢塘入平湖魏塘入嘉善俱可由此以達松江秀水好景明於畫長浮五色波一竿吾欲釣來此聽漁歌附考水在郡城北麗橋之東相傳水浮五色見者獲慶亦稱繡水明析邑名因此白龍潭呼吸風雲合飛潜自有時只愁潭底淺頭角被人窺附考潭在郡城西南四里通越門外景德寺旁有白虎穴風濤溺舟作三塔鎮之今析屬秀水境八景之一曰龍潭暮雲禦兒用此臨吳戰何人為越謀夫差曾不寤亡國始知羞附考水在郡西南去崇德縣治東南一里舊名禦兒中涇俗名沙渚塘吳越時栖兵于此越語勾踐之地北至禦兒左傳吳越春秋皆作禦史記年表作蘌西漢易為語而年表又作蓹水經曰由拳西鄉有産兒便能語因詔為語兒鄉元豐中朱長文續吳郡圖經云范蠡獻西施于吳道中生子至此能語張宮諭廣皇輿考亦云又越絶書曰語兒鄉故越界大夫種曰吾以禦兒臨之又女陽亭者勾踐入官于吳夫人産女此亭養于李鄉勾踐勝吳更名女陽三朝國史云有語兒亭又名女兒亭俗呼囡兒墩漢元封初封轅終古為禦兒侯范蠡湖少伯曾居此螺紋吐綵絲一奩秋鏡好猶可照西施附考湖在郡城內西南金明寺旁中産異螺五綵相傳范蠡曽隱于此有陶朱公里四字碑又有西施妝臺梧桐涇落落梧桐樹何年作鳯鳴試看千古翠流盡一溪聲附考涇舊屬郡境後析桐鄉縣名因之在邑之東即濮川所通處也五代時鳯鳴其樹邑人蔡孟熙繪圖廬陵周忱為記汾湖我是滄浪叟閒來繫釣艭如何一湖水半秀半吳江附考湖舊屬郡境後析嘉善在縣西北三十六里其半為吳江地故名分湖後人加水為汾耳中産巨蟹陶振有賦楊維楨有記柘湖神居隂陽護尋國捍洪波莫慮蛟龍怒年來畏叱呵附考湖舊屬郡境即海鹽舊治淪陷者也今在平湖縣華亭鄉與嘉善接境東界華亭今無復有湖凡張堰亭林黃茅白葦之墟皆是也多生柘樹故山名柘山林名柘林柘一作橐初陷時有女子入湖為三姑神土人祠之馬塘涇疑著風波惡民謡亦畏人築塘成堰後斬馬祭河神附考涇在郡城南七里九域志云始皇至此遏水為堰斬馬祭之屬嘉興杉靑堰舊吏家何在空尋古栁隄世情今亦爾莫笑買臣妻附考堰在郡城東北四里其旁有閘寰宇記謂朱買臣妻改嫁杉靑閘吏北一里有死亭灣為妻死處又有落帆亭宋秀王諸公送鄉人陳確持節江東留題亭址今析屬秀水八景之一曰杉閘奔湍鳯凰洲竹秀水色淨忽來雙鳯凰岐周昔鳴瑞今復見文王附考洲在郡城東七里宋隆興元年有五色鳥飲啄其上故名屬嘉興龍舌頭一吸長川靜烟雲忽有無誰看頷底月誤欲探驪珠附考在郡城東七里即雙溪之觜也今名㑹龍山屬嘉興月壕入徑深於塢滄波近馬蹄每尋蓮社友咫尺走東西附考壕在郡城西其水抱城灣曲如月故名亦曰月河屬秀水靈光井玉甃祥光發難藏世上名定多慈護力一飲百疴輕附考井在郡城內精嚴寺本晉徐􅳹之别業因夜發光捨為寺成帝賜名靈光幽瀾泉神女鍾靈處真堪療渴羌滿罌秋玉色一酌灑清涼附考泉在景德寺中舊屬郡境後析嘉善去縣東一里相傳有僧見一女子厲聲曰窗外誰家女應曰堂中何處僧逐之忽隱掘得石刻有幽瀾二字石下得泉大旱不涸煮茶無滓盛暑經宿而味不變邑人盛唐有記八景之一曰武水幽瀾寺係唐天寶間創又有大悲閣雨花臺翻經室洗鉢池補衲亭蘿屋月竹爐烟諸勝檇李城螳螂方捕楚黃雀遽乘吳交怨終亡國君王到死愚附考城在郡城西南四十五里春秋時越敗吳于檇李因其地産佳李故名越絶書作就李公羊傳作醉里史記載吳王闔閭傷指卒于涇去檇李七里夫差敗越于夫椒報檇李也又曰西施醉于此即今濮院析屬桐鄉射襄城此地連江海曾經古戰爭干戈今不見空有射襄名附考城在郡城東北三十里吳王禦越之所一名聞川今名王江涇又東三里為聞家湖宋聞人氏家焉宋武節將軍聞人宣扈蹕南遷定家于此其𤣥孫恂為進義校尉死崖山之雖四城吳越爭雄日區區在用兵空餘爭戰地無處不髙城附考東顧城西新城南于城北主城皆在郡境吳築以禦越何城報越心何壯貪齊計已輕忠言殊不聽何用築斯城附考郡西有何城在崇德縣西三里又有萱城在崇德縣東三十里晏城屬桐鄉管城屬鹽官皆春秋時築此四城屬越境由拳廢縣故城人不見擊劍淚空霑一絶悲聲逺今猶說孝亷附考在郡城南搜神記曰始皇東巡望氣者云五百年後江東有天子氣始皇至令囚徒十萬餘人掘汚其地鑿審山為硤北迤六十里至天星河止表以惡名曰由拳言囚倦也今春波門外五合水俗訛油潭嘉禾墩寂寞黃龍後紛然壠上碑廢興無處問空詠草離離附考墩在郡城東北四里即吳時生嘉禾之地古戰場自昔干戈地城空草自荒漁樵懷舊事何敢議興亡附考在郡南四十五里舊經云古戰場夾谷口即秦長水縣治也又名吳越戰場其大者曰東蕩界桐溪鹽官間西蕩崇桐相半皆廣數十里土人墾地往往得敗甲朽鏃云村門口昔日荒閒地今聞市井喧人情看促迫無復似當年附考未詳宣公橋祗因裴少保功業敗垂成往往橋邊客今猶恨未平附考橋在郡城東春波門外相傳為宣公建屬嘉興五栁橋為懷陶靖節無復見其人誰種橋邊栁猶含舊日春附考橋在嘉興治西俗名慶豐橋百步橋舊址依然在荒墟未百年還分一橋水流入幾家田附考橋在杉靑堰旁跨塘橋路接張涇近塘連谷水長一聲清鶴唳片月在滄浪附考橋在嘉善縣西北舊屬郡境菩薩橋片雲初出岫南北自飛揚舊日橋邊路猶聞舄履香附考橋在秀水縣治東竹橋腰枕政亭北橫斜古渡頭風吹雙淚落恨逐水東流附考橋在秀水河內亭掾死緣非命兒來哭未休舊時亭下淚疑與水長流附考亭在郡城西漢張武父為郡掾送太守妻還河內為盜所殺武哭於此嘉禾亭五馬來何暮經營指一彈石碑書近事留與後人看附考亭在府子城內西有嘉禾金風二亭東有清風亭北有利川觀風野泉朝宗四亭又有序賓亭皆宋知州張瑜建列岫亭吾州風物好惟是缺靑山忽有洞庭色來從一笑間附考以下三亭俱在滮湖之南水心亭波光磨不盡鏡面絶纎塵照得紅亭子亭亭似美人樂郊亭竹下清風好時來挂幅巾待逢田叟問知是樂郊人㑹景亭有景道不出須來此水濱十分花鳥色團作一亭春附考宋尚書潘師旦園在滮湖濱中有南塢海棠亭白蓮沼桃花亭紅薇徑茶溪仙鶴亭芙蓉塘白苧橋漁溆十景咸㑹于此故名園舊屬柳氏師旦知秀州重築趙孟俯有記南塢岸回波曲曲城轉草層層忽見桃花落還如到武陵海棠亭蘚砌迎烟渚花開忽滿株春風吹爛漫如展蜀川圖白蓮沼滄波圍四面艷艷玉開花自可除簾幕清香不用遮桃花亭不待東風折池塘已自春試看原上客猶恐是秦人紅薇徑漸放秋風晚花無爛漫香淺深紅似錦散影在滄浪茶溪茶林那復有零落付樵人舊日溪邊叟空悲二月春仙鶴亭杳杳雲間路重重隔翠林數聲清夜後來伴月邊吟芙容塘一發連千丈紅雲出素波秋風吹欲老無奈落花何白苧橋遍隴敷靑緑桑麻共幾家滿城羅綺子應笑不栽花漁溆野水連天濶滄波引釣緡寄言溪上叟莫學直鈎人懷蘇亭猶使樽前客常懷沒後名好風吹逺籟如有笑歌聲附考亭在府治東子城上宋建與蘇小墓相望故名後改曰朝陽樓披雲閣兹樓當勝地髙望極崚嶒欲覩靑天色還須上一層附考閣與褱蘇亭相近宋知州方滋建後改名風月無邊樓景龍樓千秋傳異綵百尺護雕䦨欲識金龍瑞丹霄試仰看附考樓即東塔寺東廡鐘樓也宋孝宗父子稱調為嘉興縣丞生孝宗幼時登樓墮地左右失色孝宗屹然不動寺僧先夕夢金龍挂于樓角因名事詳揮麈録烟雨樓妙手誰烘染梳烟沐雨姿一聲長笛晚人在倚樓時附考樓舊在郡城東南滮湖之濱五代時吳越王錢元璙建宋嘉定中王希吕重修元季毁明嘉靖間知府趙瀛濬內隍淤土移填湖中搆樓五楹兵憲沈煃復闢其後為釣鰲磯