趙老園藏書幾萬卷歸老此林泉不為尋蓴鱠于公亦有賢附考園在郡城西三里景德寺後析屬秀水乃宋致政殿丞趙公歸隱藏書之處公名衮字希甫陳舜俞題曰趙老園施墓蒼苔侵壞道晚雀散空林莫問人賢否浮生一古今附考墓在嘉興治東二十里圖經云齊長沙王府長史施修琳墓衛墓惆悵黎陽客飄流浙水濱定忘空腹恨知是赤心人附考墓在嘉興治西南圖經云衛大夫洪演墓也衛懿公為狄人所滅食其肉惟肝在地演剖已腹而內焉劉伶墓荷鍤從吾後叮嚀死便埋人皆譏嗜酒我獨愛忘懷附考墓在府城東二十七里胥山下俗呼金伶墓蓋避吳越王諱也屬嘉興又胥山有荷鍤翁墓嚴忌墓有子如君少終緣叛國亡冢前無後嗣切勿怨張湯附考墓在郡城西北二十七里新城鎮屬秀水子助葬由拳在天寧寺後俗呼後嚴墩蓋以忌為前嚴助為後嚴也朱買臣墓世事春風轉榮枯一夢間繡衣人不見孤冢舊家山附考墓在郡城東三里東塔寺中周都官墓不識君名字應難問子孫一丘浮水際神怪欲誰論附考墓在秀水治西北水中旱不加髙潦不加沒今尚存蘇小小墓泉下骨應朽幽魂獨未消幾畨清夜月孤影度南橋附考墓在嘉興治西南六十步有片石在通判㕔曰蘇小小墓南有賢娼巷寰宇記云墓髙三丈有大井在其側舊生雙桃於上方輿勝覽亦云羞墓傷哉負薪子五十始登朝空使埋羞處山花復採樵附考墓在郡城北十八里買臣妻葬處又曰羞涇又作楸涇木紋觀音雙瞳分日月眉際一星懸照見人間苦三辰不在天附考唐咸通間郡中有木在水濟人遇淨則浮逢羶則沉人知其異取鐫觀音像才畢面目手指皆有光彩人稱木紋觀音又作目紋初在五臺院後以兵火移精嚴寺東廡紹興十一年邦人禱暘重新其宇先是郡守曽侯曽夢白衣人曰我當此方致雨奈面目不淨三十里無所見不能與衆聖㑹明日詰之果匠者用雞子牛膠調粉故爾遂改新之乃應邦藥王龕父老懷遺愛誰傳肘後方藥囊同日葬空憶紫元香附考在嘉興淨相佳李地重因名果如分沆瀣漿傷心吳越戰未敢盡情嘗附考淨相寺在郡城東南三十六里梁武時建地産佳李檇李之名由此符姥瑞竹一幅霜縑外靑靑出自然天機何敢議珍重白衣仙附考在郡城江特科表祖表祖崇德人嘉定甲戌舉特科題平緑軒碧瓦丹稜轉盼成一亭聊復寄閒情人如水墨畫中立山向烟蕪盡處橫舟入栁隂衝鷺去簷依波面䕃魚行題詩每愧臨流意吟苦那知白髮生嘉興侯陸德輿德輿字載之崇德人由童子科舉嘉定進士有文名歷兩浙知貢舉官吏部尚書卒贈嘉興開國侯平緑軒帶市人烟逺連村野色幽山從天際出水向檻前流茅屋無端礙松醪有意留因懷陵谷感無語對歸鷗趙監稅潛夫潜夫字景壽自號鶴所黃巖人嘉定進士寶慶二年監海鹽澉浦稅三年卒於官詩有清思居澉之日嘗泛小舟於永安湖扣舷把酒而歌髙標逺韻逈在物表其卒也澉人趙與珦為立思賢碑建安葛紹體撰詞招之題絃風亭怪他蟹舍蠔房地不是吟情住亦難數尺短牆圍晝寂半鈎疏箔障春寒水生草滿蛙鳴合日薄花隂鶴夢安底處青衫病司馬浩歌東望取琴彈附考亭在海鹽澉浦瀕海收稅處宋紹熙間監稅葉樾建潜夫召之魯布衣應龍應龍字子謙海鹽當湖鎮人後析平湖宋末布衣著有閒窗括異志題陳山飛星石有序陳山觀音殿忽有兩石從半山鬭墜而下一從殿後壁滚入大士座下一墜殿之西屋瓦無損不知從何而入今二石尚存余乙卯歲到祠下賦詩于壁以紀其事錦石雙星下翠微忽看移入小巖扉靈光夜靜歸山徑翠影秋寒上佛衣滇海始知鯨欲動零陵不獨燕能飛只今五色曽何補自採竒峰築釣磯趙承㫖孟堅孟堅字子固别號彞齊其先以安定郡王從宋髙宗南渡賜第於海鹽之廣陳今屬平湖遂家焉寶慶二年登進士歷官朝散大夫嚴州守景定初遷翰林學士承㫖宋亡隱居不出晚徙崇德沒年九十有七諡文簡臨終賦詩有百年處世缺三秋事業都歸海上漚之句孟堅修雅博識善筆札工詩文好飲醉則以酒濡髮歌古樂府自執紅牙以節曲時載一舟中置琴書尊杓泊蓼汀葦岸吟賞自得從弟子昂自苕中來訪閉户不納夫人勸之始令從後門入坐定苐問卞山笠澤近來佳否子昻云佳曰苐奈山澤佳何子昻慙退便令蒼頭濯其坐具蓋惡其作賓朝家也生平酷嗜法書遇三代以來金石名蹟傾家易之嘗得白石舊藏五字不損本褉叙喜甚夜歸霅溪舟覆行李盡沒手持帖立淺水中大呌曰蘭亭在餘不足介意也因題八字卷首云性命可輕至寶是保又善作梅竹得逃禪石室之妙于水仙尤竒有彞齊集里中康節庵畫墨梅求詩因述本末以示之逃禪祖花光得其韻度之清麗閒庵紹逃禪得其蕭散之布置回觀玉面而鼠鬚已見工夫較精緻雙枝倒作鹿角曲生意由來端若爾所傳正統諒未絶捨此的傳皆僞耳僧花工之工則粗夢良意到工則未女中却有鮑夫人能守師繩不輕墜可憐聞名不識面云有江西陸公濟季衡粗醜惡拙祖弊到雪篷濫觴矣所恨二王無巨法多少東鄰擬西子是中有趣豈不傳要以眼力求其㫖踢鬚正七萼則三㸃眼名椒梢鼠尾枝分三疊墨濃淡花有正背多般蕊夫君固已悟筌蹄重說偈言吾亦贅誰家屏障得君畫更以吾詩跋其底康不領此詩又有許梅谷者仍求再賦長律濃寫花枝淡寫梢鱗皴老幹墨微焦筆頭三踢攢成瓣珠暈一圓工㸃椒粧綴蜂鬚擬笑靨穩拖鼠尾施長條盡吹花側風初急猶帶枝頭雪未消松竹襯時明掩映水波浮處見飄颻黃昏時候朦朧月清淺溪山長短橋閙裏相挨如有意靜中背立似無聊筆端的皪明非畫軸上縱橫不是描頓覺坐來春盎盎因思行過雨瀟瀟從頭總是湯楊法判下工夫豈一朝王翠巖寫竹求詩古畫畫物無定形隨物賦形皆逼真其次祖述有師繩如印印泥隨前人尚疑屋下重作屋參以新意意乃足晉魏而來幾百年羲獻斷絃誰解續何況髙束李杜編江湖競賣新詩讀願君種取渭川一千畝飽飯逍遙步捫腹風晴烟雨盡入君心胸吐出毫端自森肅題水仙自欣分得櫧山色地近錢清易買花推案文書雖鞅掌簮瓶金玉且奢華酒邊已愛香風度燭下猶憐舞影斜礬弟梅兄來次第攙春熱閙令君家聞人進士宇宇嘉興人紹定四年以上舍釋褐海鹽鹿苑寺考見題咏郡邑相望路半停屹然香剎聳林坰罷參釋子忘情久應供胡僧入夢靈東去無情波繚繞西來有意柏葱青定知俗駕經過少月上松扉不用扃趙畫史孟淳孟淳字子貞孟堅弟善墨竹自號竹所題桃滴粉挼酥暈幾重風前紅雨一枝濃世間是色皆為妄除却夭桃單種松題梅雪意垂垂浸碧虛香生一縷上琴書何須百萬西湖宅遇有梅花便可居梅屋髙士許棐棐字忱父海鹽人嘉熙中隱居泰溪種梅數十樹構屋讀書自號梅屋室中於三桁下分四槅中垂一簾對懸白香山蘇東坡二像事之積書最富人有竒編見無不録嘗曰四壁天地萬卷春風庾嶺香孤山玉樂而可以忘死著有獻醜集樵談其詩集曰梅屋四藁長于近體頗多清新之調明妃曲漢宫眉嫵息邊塵功壓貔貅百萬人好把香閨舊脂粉艷妝顔色上麒麟帕子萬縷縱橫如妾恨一方輕薄似郎恩多時不繫纎腰舞却對花前拭淚痕晚泊臨平晚缷風帆泊市橋稅亭民屋總蕭條秦封不到河邊栁送去迎來枉折腰元夕後河上作自從樓閣罷燒燈未有今朝一日晴暖折葑邊氷翼破寒留山頂雪痕輕驕驄已印尋芳跡小妓新翻鬻唱聲每箇旗亭商一醉也應排日到清明沈子壽郊居屋外猶餘地百弓經鋤知貴幾年工栽蔬少似於陵仲種菊多于靖節翁偃屈溪山詩卷裏破除風月酒杯中近來又喜禪機透一顧叢林萬衲空贈葉靖逸借我城居一丈寬五車書向腹中安聲華馥似當風桂氣味清於著露蘭朝士時將餘俸贈鋪家傳得近詩刋回看舊隱西湖上誰伴沙鷗度歲寒鄭介道見訪步頭楊栁種多年今日方維勝客船掃石共看山色坐枕書同聽雨聲眠溪羮旋煮蓴絲滑野飯新炊芡玊圓不管歸心忙似箭强留吟過菊花天贈龔彥質慈湖分與半窗燈照得襟懷徹底明得一作出明一作清蒲座夜閒猫占卧筍輿春暖鶴隨行爐香欲盡經猶誦研墨才濃句已成歲晚弟兄俱白首一樓風雨話深更題常穆仲醮碧舫樣一亭小依山復靠池每來分席坐須憶下湖時竹弄當窗影花添蘸水枝人間風浪惡泛宅幾天涯趙叔魯天上除書絡繹飛謫仙何事得來遲旅懷寬似居家日學力髙於未第時山帶晴霏橫畫軸水流清響入琴絲世間多少王孫貴無我寒泉一句詩山間一作山海兜食物也以筍蕨為之又名蝦魚筍蕨兜出稗史趂得山間筍蕨春借厨烹煮自炊薪倩誰分我杯羹去寄與中朝食肉人木山父書院占得丈房一丈強地幽雖夏亦清涼瓶花誤倒水侵案書葉亂掀風滿牀薜長密藤遮半壁桐分疏影出低牆客來莫道無祗待只啜茶甌却味長贈畫魚沈秀才寫字摛文不療飢生涯換得頗新竒錦心暗織臨淵網蓬鬢潜繅釣雨絲落筆易於投餌處得錢多似出罾時漁翁枉占烟波濶不及君家小硯池贈北澗天下名山行腳遍依然形影瘦伶俜攴吾寒暑袈裟耐變眩烟霞筆硯靈對客敬如堂上佛讀書通似藏中經石頭路滑終難到不是詩禪莫扣扃雪曉臘雪連宵接曉飛錦衾公子未曽知起來攜杖敲梅樹扶得輕盈壓損枝枯荷萬柄緑荷衰颯盡雨中無可蓋眠鷗當時乍叠青錢滿肯信池塘有暮秋春晚推過詩編把酒斟挽春幾句讓鶯吟門前却喜無人掃積得殘花一寸深客路客路久驅馳秋深兩鬢知田家投夜宿漁竈寄晨炊契分燈前影生涯槖裏詩遙憐故園菊荒草沒霜枝題倦庵自扁庵為倦斯名恐未然醉巾頻漉破遊屐幾磨穿新種竹都活舊栽花更妍門前春水漲催發考廉船題叔清郊居哦松未了賦歸歟旋買田園結草廬數畝竹隂惟缺鶴半池山影不妨魚舉杯多是沽來酒插架無非讀過書我已倦為都下客願君分與把茅居書郭子度壁禁苑精廬是切鄰衣巾雖舊不沾塵鐘魚聲裏吟連曉花栁香中醉過春和土重泥燒藥竈買絲親接釣魚綸繞湖十萬人家住如此清閒有幾人雁字㸃畫分明印碧空回鸞返鵲勢差同月邊映得銀鈎體雪裏摹成玊箸工斷續似經秦火後悲涼如在楚詞中愁人筆硯多荒廢倩寫相思寄便風宫詞二首卧聽羊車輥夜雷知從誰處燕酣回蟾光也解君王意隔箇簾櫳不入來同入宫來幾許人因何遣妾護長門雲鬟半脫香腮瘦却愛菱花鏡子昏古墓石人猶自立蒿萊拂讀殘碑字字哀鄰冢已澆寒食酒野風分送紙錢來四時宫詞因見落花心覺悟薄羅襟上淚痕乾容顔縱似花枝好能得君王幾日看碧玊涼梳落枕邊懶梳雙鬢學新蟬恩情不及班姬扇縱是炎天亦棄捐涼夜誰同玊簟眠湘波冷浸一枝蓮君王不學中秋月處處分身處處圓雪壓長門消未盡夜衾堆盡舊宫羅鴛鴦瓦下垂氷筯未抵思君玉筯多郭評事廷評滿腹貯陽春筆下從來活幾人㕔小似分幽寺住俸輕如在舊山貧堆書教子猶疑少倒屣迎賓不厭頻欲效林宗巾角墊自嫌雙鬢有紅塵挽吳春伯入門諸子哭褰衣痛說嚴君屬纊時病重刀圭難作效家貧衾含不如儀從春屢有登臨約近日方無唱和詩執紼南屏山下路悲風吹亂緑楊絲挽郭子度連年染忠貌梔黃盧扁猶無起死方稚女自敲尸畔磬鄰僧來炷佛前香生涯漫有千書卷受用惟存一奠觴聽說茶毗心更苦拭乾清淚又成行寄吳宜之文公徒弟無多在學術應如夀數髙好句先教諸子和墊巾翻被俗人嘲湖邊茶店同誰坐井畔柴扉缺我敲昨夜相思眠不穩月眉斜印落花梢瑛上人十二三時便出家何曾頃刻離烟霞晨持數卷日方上夜梵千聲月未斜洗鉢不經鷗浴水插瓶嫌採蝶殘花儒冠誤我駸駸老何日蒲團共結跏木芙蓉芙蓉艷金谷秋色錦機中霜樹不知醜葉與花爭紅張聲父城中破屋妻兒住自向招提借小房壁上碑文皆古篆案頭書册半仙方月嫌碎竹遮窗暗風欵飛花入座香㸃檢未如僧相處只多髭鬢幾莖霜泛剡水濶無風似有風蘆花搖落櫓聲中鷗無一㸃驚猜意認作當時戴雪翁趙野雲載雨駕雷翻覆頃漏星藏月卷舒間若將雲與詩人比政恐雲無日日閒古硯送趙明府一片端州古硯甎翁孫相授當良田寒梅澗下和氷洗秋桂窗前滴露研學字不工空費紙吟詩雖苦未成編贈君攜去薇花畔草詔閒時枕匣眠花墻頭新露一枝紅壓盡隋人萬綵工香艷便棲雲鬢老也勝飄泊晚西風不語僧默坐蒲龕若塑成客來惟聽小鐘鳴却嫌庭樹無禪力時有風枝雨葉聲寄題竹坡郭外移來費俸金幾年擡舉玉成林更無餘地栽閒樹儘有髙枝著卧禽寒影似傳東野貌清聲如寫伯夷心呼童少殺青瑶簡染月濡雲寄我吟數椽數椽茅屋傍林塘幽似山僧獨坐房夜靜只憑猿守户晝閒時有鶴升堂旋收落葉供茶爨細搗枯花作印香書册滿牀詩滿槖别無生計亦何妨春雪東風吹雨作花飛寒勒芳程幾日遲惟有庭前老梅樹謝渠添補落殘枝挽沈晏如不信詩人一例窮如公半世又成空湖邊便缺尋梅友籬下應無采菊翁雪片堆平閒藥竈雨聲敲破舊漁篷墓銘吟槀兒封寄血淚斑斑浣紙紅贈相士澗水溪氷似鏡清自看寒貌已分明煩君别相江湖友來歲誰魁淡墨名田間田間久不到草木半蕭疏鷗占沉舟浴蛩分破壁居僕溫攜到酒鄰送買殘蔬未說催租事黏窗且讀書題野處數畝家園枕碧波樹桑疏處補花窠檐低不礙儒冠入橋矮才通釣艇過雲笛旋裁門外竹雨衣新織檻前莎有時牛背看書罷一曲清風寧戚歌孫祺卿新居幾年銖纍束修錢才向湖邊置一㕓種竹庭深難得月養魚池小易為泉山呈好畫當書案栁撒輕絲罩釣船酒力半酣詩思倦矮牀相對白鷗眠招髙菊澗歸買秦溪屋一閒才如都下僦樓寬門前養草如花賞壁上黏碑當畫看自改舊詩時未穩獨斟新酒不成歡髯仙只在淵明宅泥濘相邀寸步難西真圖翠水池邊宴早秋雲謡聲裏月西流醉歸不信乘鸞穩却擘蓮花作采舟書北庵門十度來敲九不譍隔籬空見竹青青不知池裏黃金鯽聽講楞伽幾卷經葉克齊歙浦租船只載詩一廉如此似君稀雙親猶道行裝重多帶羅紋一硯歸題子固春山上寺圖望得招提見程猶半日間馬嘶曾到處僕指未行山風遞松聲逺雲連草色閒何如添箇我坐石聽潺湲湯婆子一冬專寵道人房不藉華清賜浴湯皤腹却無璋瓦分矮身難稱綺羅妝春生蝴蝶半牀夢暖迫梅花一帳香醉倚肉屏君莫羡北邙多少黑頭郎樂府二首妾心如鏡面一規秋水清郎心如鏡背磨殺不分明小窗寒燭夜結紐綴郎襟不結尋常紐結郎長逺心吳江道中一别吳松二十秋敗荷枯栁總新愁白頭交友凋零盡賴有寒江幾箇鷗小蓑道人滿面瘡痍瘢胸中一泓雪醒吟鶴背風醉卧鷗邊月不賣嚇鬼符不試􅠉金訣笑問舊蓑衣秋來添幾結末利荔枝鄉裏玲瓏雪來助長安一夏涼情味於人最濃處夢回猶覺鬢邊香築城曲日將西杵聲急一聲聲自死腸出城髙不特土纍成半是鋪填怨夫骨儒坑戰地骨更多十二金人隨鬼泣馬塍種花翁東塍白髮翁勤朴種花户盆賣有根花價重無人顧西塍年少郎荒嬉度朝莫盆賣無根花價廉爭奪去年少傳語翁同業勿相妬賣假不賣真何獨是花樹泥孩兒牧瀆一塊泥裝塑恣華侈所恨肌體微金珠載不起雙罩紅紗㡡嬌立瓶花底少婦初嘗酸一玩一心喜潜乞大士靈生子願如爾豈知貧家兒呱呱瘦於鬼棄卧橋巷間誰或顧生死人賤不如泥三歎而巳矣染絲上春機二首染絲上春機春濃絲色淺妾心隨梭飛郎心如軸轉染絲上春機錦成貴無價不忍裁成衣帕剪鴛鴦破破硯碌碌礲磑間得此一雋石磨成三十年貌黧雙鬢白渠亦苦我磨眼穿流淚墨老蟾在傍笑兩窮自相厄對鏡詞烟護杏腮寒日襯桃腮暖惟有鏡中花東風都不管春思朝來一陳無情雨敲得庭花半欲殘燕子不知人冷落飛來簾底避春寒小盆花小小盆中花春風隨分足花肥無賸紅葉瘦無久緑心傾幾㸃香也飽遊蜂腹太盛必易衰荒烟鎖金谷葉祕書隆禮隆禮字士則嘉興人淳祐丁未進士著契丹志上表有淳熙七年三月祕書丞撰詩見栁志烟雨樓傍家庭館占湖東寂寞為鄰祗陸公竹樹一隄如有礙乾坤萬象自無窮棹歌逺入秋波緑塔影中分晚照紅樽酒待遊烟雨景畫圖著我笠蓑翁唐學正天麟天麟嘉興人寶祐丙辰進士曾主嘉興學正烟雨樓百尺樓髙足賞心我來猶記舊登臨四時天色有晴雨一片湖光無古今逺塔連雲知寺隱小舟穿栁覺村深憑䦨多少斜陽景分付漁歌替晚吟焦修撰炳炎炳炎字濟甫宣州人寓居嘉興淳祐中舉進士探花為諫官時宰主括田議逺近騷動炳炎痛疏其害面奏纍數千言上為動容時宰語人曰渠非攻田是攻我也尋除太常少卿辭去或遺以詩曰事至諫官言不得身為宰相有何榮後以右文殿修撰致仕卒弟煥炎字晦用亦舉進士英邁慷慨禦邊多顯效論奏時弊有兄之風稱二焦云去國示人跡雖無地著心實有天知一禽從不獲不改範驅馳常參知楙楙字長孺自忠毅公與秦檜不合退居海鹽遂家焉楙其曾孫也淳祐中舉進士守廣德以公廉稱拜御史論巴陵事觸度宗怒出為兩浙運使所至必捐俸賑民尋以宰掾兼刑侍復知平江既代有事例餘金萬楮悉不受吏驚曰人言常侍郎不愛錢果然德祐元年除吏部尚書二年拜參知政事宋亡自號蒲溪漁叟里居六年卒州人慕之者欲一見不可得其志洵足悲矣題平江集仙宫松菊新來入夢頻公餘乘興得尋真紅塵物外長清境白日壺中不老春柏子灰寒烟寂寂桃花風暖水粼粼逍遙羽士閒如許愧我浮名役此身李學士曽伯曾伯字長孺號可齊懷州人寓居嘉興寶祐中第進士天才卓絶儒而知兵宦轍遍天下所至得將士心仕至觀文殿學士贈少保開府儀同三司曽伯初與賈似道俱為閫帥邊境之事知無不言似道嫉之不竟其用有可齊類稿陸宣公祠考見題咏公不生唐世貞元事若何主恩思報切臣罪忤時多佞舌攻何忍剛腸死不磨倚闌凝望久一鷺㸃蒼波題南溪白龍洞有引淳祐庚戌覃懷李曽伯因勸農來此得四十字是日微風扇和輕雲閣雨千峰翠滴四野緑秀枝禽對語春意駘蕩無極徜徉久之緩轡而去賓佐四明史偉之廬陵曽垓眉山楊埏東嘉林拾三山卓炎子廬陵王真孫長沙胡盛盱江周子榮潼川楊牧之清湘滕處厚續至老龍昔未蛻嘗蟄此山中霖雨春疇足風雲夜壑空兩崖髙下倚一徑往來通不願千金劑惟祈百穀豐遊千山觀有序河內李曽伯再牧桂之明年實開慶改元上命三衢柴士表視邊隘竣事將還夏六月二十一日約憲倉四明豐􅉅兵帥汪光朱廣用符離朱焕載酒千山觀訪招隱過仙奕感今懷昔風物固亡恙也時火􅏛張空水花蘸碧相與徜徉其間清不受暑因得四十字并識諸石自從來嶺嶠豈暇訪湖山緹騎行邊了戎旗護戌閒相看羣玊外一笑六郎間回首西風靜何愁老漢關遊桂林西山玊筍環星拱青螺帶霧披山為天下勝境占嶺南竒援筆難窮者憑䦨盡目之不因無世纍築室在于斯善權竒觀自從團結此山川便作人間小洞天佛母林深從古盛仙翁宅近至今傳青分三洞中開户白瀉雙巖下出泉我自有緣聊乞取萬松隂裏一牛眠朱應龍應龍未詳詩見栁志或即魯應龍趙志云是宋人山月池二詩考俱見題咏德藏寺池底看明月明月在山頭清光連上下分作兩輪秋菊坡口有綺語債長咏菊坡詩最好重陽景雞肥酒熟時正節先生衛富益富益崇德人幼有異質嘗負笈往從金仁山學深探易理金卒復受業於許白雲宋亡于崖山日夜悲泣設壇為文祭文天祥陸秀夫張世傑詞極哀慘聞者無不墮淚隱居教授創白社書院賦詩講學縉紳仕元者不得就列至大間有司欲薦之不從毁其書院遂隱於湖之金蓋山著四書考證性理集義易經集說讀史纂要等録至治間長子迎還故里自號耕讀居士不言世務不履城市或有乞詩文者辭曰吾欲胸中㴠養德性而已有何說為嘗語諸子曰士之品三道德為上功名富貴何足慕哉一日遘疾取所著書悉焚之卒年九十六門人沈夢麟黃彞鄭忠等私諡曰正節先生題趙子昂竹漢宫日莫風雷逺南國秋深水殿寒留得一枝烟雨裏又隨人去報平安三教遺逸趙孟僴孟僴宋宗室文天祥見之曰瑚璉器也其後天祥辟以行及赴闕孟僴留吳僅五十日宋亡元兵執孟僴欲官之辭以疾依親友居絶口不談宋事號三教遺逸居嘉禾天祥卒為文哭之臨終作詩端坐而逝集名湖山汗漫今不傳同時有殷澄字公源家富好施目為殷佛子元兵壓境將屠之澄仗劍說其將楊掃地楊怒欲斬澄澄厲聲曰殺一人活千萬人死何足惜楊感悟一境獲全丞相伯顔欲授以總管澄逸去稱泖南浪翁又有陶菊隱德祐末元兵南下菊隱散家財招集義兵謁文丞相于軍逸士流寓者多依之戒子孫勿仕元二人與孟僴稱秀州三義云臨終口占王室之懿文山之客持此寸心千古忠赤檇李詩繫卷三
