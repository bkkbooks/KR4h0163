body:
  text: 檇李詩繫卷十三平湖沈季友編明沈按察宏宏字惟逺崇德人嘉靖乙未進士授比部郎戚畹張氏繫獄逮諸督囚官廷杖謫夀州同知纍擢廣西副使洞猺訌亂宏有斬馘功賜白金文綺參政雲南勘黔國公偽子冒襲事稱神明升廣東按察使乞歸晚年與里中耆舊蔡典籍天錫吕州倅棟胡上猶鑰范博士栻姚别駕汝吉孫博士穀郭轉運鼎范郡幕鵬吕納言希周吕曹簿翀為真率會徜徉林圃有洛下風所著緯略類抄醫荃芹溪吟稿天文二論藏於家遊涵山覽勝招㩦上碧岑更憑虛閣散幽襟步凌七級開香界話徹三生見佛心晴日倚欄天目近春風拂袖翠微深遊朋借擬東山興對酒何愁乏好音附考在崇德縣西北三十六里又名含山寺中有塔可望吳興馬鞍諸山有龍潭五河涇水出其下舊志云山介兩州故名含又四水涵之故名涵石莊處士沈𢎞光郡邑志載沈𢎞光字子懋號肖山世居平湖石莊里嘉靖間以諸生遊雍遍交海內名士會父兩山抱疴輟業東歸尋值兵荒謹持門户常痛不及事母見手澤必泣生平潛心理學兼精祿命伯子懋孝侍養歸從遊日衆公苧衣棕屩開席講論學者宗之足迹不入公府按使者以幣求見不可得晚悟天道元氣成於貞人心愛德歸於正作愛正編又感里徭之弊作均平議立宗法與兩山訓戒二十條為世誦述申大學士贊之曰君志不用於世而所以效之鄉與修之家者其槩可覩矣六世孫季友謹識顧書堵對月野王堆下暮潮平九點峰頭片月生今日思君君不見寒梅零落夜鐘聲附考在平湖東泖上相傳顧野王讀書圃孫簡肅公植植字斯立號蜃川璽之子嘉靖乙未進士選南比部纍擢少司冦庚戌之變敕守崇文門時多其功拜大司冦中人王采盜伐孝陵樹邢保侵尅工匠銀張進朝矯詔選宫嬪皆據法論罪魏國爭立事起下南法司讞上高新鄭方修虩于徐文貞植文貞門人也給事王楨托蜚語劾植奪職家居十七年後復薦起再疏乞休卒贈太子太保諡簡肅諸省丈㩦遊西山以病不赴聞道香山寺龍宫倚石岑泉聲來樹杪雲氣接峰陰路裊丹梯峻簷窺碧澗深無能陪妙躅延望發孤吟中秋鴛湖泛月尊酒移舟笑語歡平分秋色滿江干笛聲逺度煙光冥鶴夢初驚夜月寒倒浸樓臺天上下斜臨竹樹影檀欒九霄風露清環珮縹眇飛仙接鳯鸞沈副使鎜鎜字大新嘉興人嘉靖乙未進士官終江西副使夜泊步雲橋石井塘隈小市㕓步雲橋外蓼花鮮輕橈載月隨風度目送冥鴻過逺天錢太學蔘蔘字懋仁號西泉琦長子蚤卒有詩一卷新居檻邊四水碧漪連竹徑花欄白晝眠莫笑西泉生計拙煮茶釀酒自年年錢同知萱萱字懋孝琦三子嘉靖乙未進士纍官儀制員外以提調試事降德慶州同知聞德慶命東去三苗地青門别舊儔雲鴻秋不到山鬼晝長遊古樹千巖迫懸崖五月幽重看回首處春雨遍郊丘徐通判文和文和號蛋湖嘉興人嘉靖丁酉舉人任揚州通判罷歸躬督耕耘究心理學臨卒語其子曰我死皇極經世之學絶矣親操算子講畢而逝所著蛋湖吟稿真率自恣有放翁風味甲寅除夕避兵北郭作身世罹多難逡巡六十春殘尊燒竹夜孤劒避兵人夢裏丹霄逈愁中白髮新因嗟城市異涕淚欲沾巾午日菰米炊黃玉蒲根泛紫霞按方惟採藥避老不簮花好雨催田急微風入幕斜騷魂招未得擁几誦懷沙秋夜山空夜靜月朦朧一扇微涼白苧風石鼎煙銷鐙影外竹忩人夢葉聲中仇博士俊卿俊卿字舜徴海鹽人嘉靖丁酉舉人官國子博士有海上京遊閩南淮陽華嶼瀛仙諸稿遊仙詩曾記逍遙絳闕東吹笙緱嶺小桃紅叉留內苑俄成燕帛挂枯枝盡作龍大地雲根風角動靈河查影月輪中葛陂拾得青瓊杖騎向方壺攬太空顧舉人蓂蓂字子期號少豐海鹽人嘉靖丁酉舉人有少豐稿閨思晝永憑闌對落花鶯啼燕舞日將斜春明門外尋芳客開遍荼蘼未到家卜副使大同大同字吉夫號監泉秀水人嘉靖戊戌進士授刑部主事升湖廣僉事期年羣盜屏息遷參議有平苖功再遷福建副使輯備倭圖説畫戰守計閩賴以安弟大有大順皆進士秋日登蘄州城九月寒生木葉稀層城一望思依依自憐北闕心常在誰憶南州客未歸江上孤帆移逺岫天邊獨鳥帶斜暉何難追訪陶彭澤漫學登臨賦式微馮教諭科科嘉善人嘉靖間貢為教諭泛汾湖一片煙霏接逺洲千重萑葦夾中流飛帆欲駭雲邊雁擊楫猶驚水上鷗錢太守芹芹字懋文琦次子嘉靖戊戌進士官永州知府隆慶初求直言芹首陳崇學防海等事有泮泉集寓京有感陌上花光艷江邊柳色新異鄉千里夢離思一霑巾錢太學籥籥字懋穀琦五子讀書好客與文士屠長卿沈嘉則諸人友善金華吳孺子吳下王伯稠同邑姚士粦恆主其家飲酒賦詩有擊轅草秋夜寂莫逢秋夜柴門閉夕陰避人聊借病用拙得知音犬吠風生竹鴉驚雨入林殷勤懷舊事空負昔年心鷹窠山孤峰倚天碧側徑入蒼煙蠟屐還今日題詩自昔年磴雲生古木溜響落寒泉極目滄溟外蓬瀛一點煙新嫁娘蕭娘新嫁倍含羞早起粧成促下樓行到中堂紅發靣小姑推著向前頭雁湖釣叟王周周號質齋嘉善人嘉靖初文學贅居秀水王江涇以子封兵部郎中有别業於雁湖之側嘗具扁舟與波上下稱雁湖釣叟著自在吟二卷晚興林居無個事永日樂陶陶芒履青藜杖檀冠白苧袍摘蔬供晚酌培菊待秋醪幽興憑誰寫清吟月漸高劉御史熠熠字元麗號東沙海鹽人嘉靖庚子舉人官御史有同春堂集贈古泉上人花深竹石迷過客露冷蓮塘問逺公盡日苔階間不掃滿園銀杏落秋風悲妓十六彈筝學舞笙蝦蟆陵下舊知名而今絃調還如昔公子相逢不肯聽顧秀才珊珊字子聲嘉善人湘泉井鑿井井泉冽黎元起頌聲寒流消渴吻清味入詩評汲引舒金索瀠洄泛玉罌湘江發源逺佇看去時旌附考井在嘉善縣西市運河旁嘉靖辛丑令谷汝喬鑿谷號湘涯故名俞主事乾乾字一清平湖人嘉靖甲辰進士授刑部主事時分宜傾夏忠愍死西市乾監刑義憤發中忽仆地遂乞歸衆厚贐之不受楊忠愍贈詩有直道難容君有去孤忠自許我無生之句抵家二日卒歸興眼見沉寃閉九閽挂冠春盡出金門而今拂袖歸鄉曲不用書籖付子孫碧蓮叟陸道乾道乾字子勉自號碧蓮叟嘉善人嘉靖甲辰飢以私積散宗人後以書生赴闕上書請復祭田兩兄蚤世割産恤其孤又因宣公墓在忠州乞官蜀府紀善曾刻吳山漫稿其孫輝錫集其遺文行世過陳舜俞墓考見題咏涇上何人跨白牛鷺飛鷗浴共優遊春風短調梅花笛夜月高酣瓠子甌一疏青苖天下計千年白簡史臣留篁墩舊迹存遺祀碧草黃雲古墓秋彭郎中輅輅字子殷號沖溪嘉興人嘉靖丁未進士知新淦縣纍升刑部郎罷歸刻志撰著有比部集其詩工選體五七言律亦浸淫唐人風致王弇州贈詩有碧雲孤憶賞心人之句行路難酴醿美酒斗十千急管清絲嬌逺天持杯聽曲不能飲志氣索漠風凄然荆棘蓁蓁塞歧路十步九躓行難前詩書置墻穴賈豎凌高賢短衣楚製見者喜高冠投溺誰為憐叔孫虎口力脫去兩生鴻冥棄如屣懸車縶馬卧山阿白雲英英滿人意送監中琉球官生鄭氏兄弟孤帆懸漲海萬里任歸潮龍女時捐珮鮫人或賣綃煙氛混晴雨霞色變昏朝島嶼過蟠木尋春一繫橈為姬人剪綵製花燈賦玉樹尊前起蘭缸四照通飛香縷綵外春色剪刀中淺潤非關露穠開不待風餘暉如永借一玩一丰茸追憶孫太初生平落魄是潛夫袖拂煙林五嶽圖海上碧雲看不斷墓前明月意同孤葛翁去住餘丹竈阮籍浮沉只酒壚問爾吟魂春雨外時應飛鶴過西湖寄沈純甫時以上書戍廣五嶺沙飛碧海潮孤臣腸斷隔丹霄知心半紙無來雁改靣同門盡插貂炎徼鬱蒸椰子瘴春祠紛舞竹郎驕思家莫把刀環咏騰月茅龍夢不遙湖上新築釣鰲磯高臺春滿碧江村一片風煙接海門鼇氣半侵雲壑溟釣絲乍捲雪濤奔三山捧出芙容劒五馬間開桂子樽却笑蟠溪垂白老何如年少是王孫附考磯在嘉興南湖隆慶中兵憲沈煃築陸莊簡公光祖光祖字與繩號五臺平湖人十七舉於鄉丁未成進士授濬令內鄉王奪民田封丘王蒼頭私販皆置之法有盧柟者富而才前令誣以重辟光祖白其寃釋之擢祠祭主事纍轉文選郎汰黜不少假科臣孫丕揚劾其專擅落職陛辭揖孫曰承公教殊荷相成但吏部之門干謁錯至茍非自行其意何由秉公孫沉思良久憮然謝過即日自劾失言力薦光祖光祖亦復起歷太常太僕大理諸卿晉工部侍郎張居正秉政奪情後益自恣光祖貽書規諷居正故同年友善然與議政輒相左及論折漕事不合御史張一鯤希指論劾遂求去居正沒起為少宰會議居正獄光祖曰江陵専權非弄權也且擁護功亦安可泯然衆欲文致之惡其異出遷南司空越三年晉大司冦拜冢宰先是上巳列名御屏書清正二字至是喜曰此昔破鞾郎也時銓部事柄旁落光祖始振刷不復關謁政府一切中涓請托拒不納特簡清節者許孚逺顧憲成等二十一人搜剔臺省諸蠧蘭溪新建出中旨大拜光祖以故事爭之即疏陳祖制會推必不可廢報可初趙少宰用賢沈司馬思孝每廷論靣辱光祖光祖折節不校久之少宰語人曰吾乃為平湖所容司馬家居扼腕時政每嘆曰持公議而不以愛憎奪者平湖一人而已其為人允服如此乞歸五年而卒卒之夕海上星隕如斗擊地有聲諡莊簡光祖歷仕三朝國家大政大議一言立定按尚論録載三太宰首莊簡次孫清簡次陳恭定云攬久頓之轡振積衰之氣比諸唐姚崇宋韓琦洵不誣也贈周居士散髮仍高坐狂吟復倚楹官貧休問業身老不求名早獻長楊賦曾觀細柳營壯圖今落莫秋至獨關情彭城大樹蕭蕭起暮風君王不復渡江東殘霞滿地生新草過客沿溪問舊宫鐡騎八千氷乍合咸陽三月火猶紅英雄轉鬭無完策四靣悲歌入帳中同遊琅琊寺次孟兩峰韻小亭巖畔轉深幽試挈壺觴結伴遊林靜屢聞紅葉落溪深時見白雲流坐無絲竹供賔醉袖有煙霞引客留忽枉小山招隱句叢生桂樹正宜秋李僉事儒烈儒烈字子忠海鹽人景孟曾孫嘉靖丁未進士官閩憲有見川集雨懷水影隨波動大浸欲稽天前丘兩樹花帶雨空自妍忽忽垂玉筯悠悠撫青編悶懷誰與排臨酒徒茫然雲陽道人郁從周從周字泰初秀水人神骨清異喜吟咏善鼓琴舉嘉靖已酉鄉薦再上春官不第即棄去瓢衲出遊或數年一歸省其母嘗至南嶽遇異人有所指授後遇張紫陽授大丹訣要或賣藥武林市中人無識者萬厯壬午春與諸道侣期往建昌煉丹藥一日忽云吾塵劫已滿當去矣遂逝有詩賦一卷人稱雲陽先生風光樓白雲護招提帝子逃禪處鐘聲雜笙簧玄迹埋煙霧井邑多囂喧物外還成趣寧知巖壑水不為空山住一朝驚長安四海相馳騖千年王氣間溪流自朝暮岸芷青未已樓閣空軒翥遺芬渺難攀嵗宴勞豫顧寥寥徒慨吟杳杳猶懷故龍光自消歇寂寞藝忩雨馮參政臯謨臯謨字明卿號豐陽海鹽人嘉靖庚戌進士由刑部郎擢江西僉事時嚴嵩舍中兒多忤勢不法臯謨捕笞高銜之會廣中倭夷海冦與洞賊並發而大盜張璉復反遂升臯謨廣東僉事臯謨乃招服海冦王伯宣等詭為倭裝夜駕輕艘疾至三河布蒺藜令人登山發哨吹笳倭驚竄死大半乃集水陸師於廣州分七哨進攻張璉戰於大埔擒之僅擢福建參政以外艱歸言官又希嵩風旨論廣事無功奪職林居三十年築白鶴園於管山有集十二卷宿荆山悟空寺野客聊乘秋興餘白雲重訪舊禪廬溪邊路失衝泥後谷口寒生入夜初清供爇檀茶未熟幽篁匝徑葉全疏來遊悟得空門意一笑浮生萬事虛附考寺在海鹽西南四十五里荆山上暮春宿覺林寺幽棲何