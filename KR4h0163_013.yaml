有誼槩晚乃留神玄理自比天之放民不降不辱老而愈厲故名其堂曰逸民堂之前卷蓬延檻三面施青簾雜花相映堂後有池池前有山大父與客彈棋軒上遇日髙微酡撫檻喚魚魚聞聲而至由後山過小石梁入歸雲洞洞中多巧石四壁森映登山頂有美人抱獅峯甚雄奇佇此可望三泖從西北繞出山之背多青松碧梧過此又一衡門曰琅玕塢有竹三葛竿雷行雨過新梢出雲每賦詩勒節間如云泉聲帶月鳴秋夜竹影拖煙弄晚風又云竹林數子真吾黨頭白無能了此生竹旁雙渠相灌列百畦甘瓜香芹之屬時摘鮮甲以供客由此出東圃門有紫桂百枝桂前有池種碧蓮花故詩有素蕖含露出清瀾之句池上有來青亭其前又有梅花塢菊塢故詩曰青草小航尋栗里黃昏淡月到林家由此入東廊至小可軒大父團蒲所也自倭變以來林泉竹樹荒蕪盡矣而山之石纍纍存者十之三因憶往事泫然流涕姑記其略云來青樓樓外蓬萊十二重開簾不隔翠芙容主人樓上橫看處恰似天台面面峰萬竹房唯將疏影邀明月那用長絲釣巨魚夢餘記得三天字來向琅玕節上書聽絃者忽聽指下語錚錚似背殘燈對月明夜半十年心上事沾裳爭奈子絃聲鄭光祿履淳履淳字叔初端簡公長子嘉靖壬戌進士隆慶初授比部郎改尚寶丞時羣小雜進淳不勝憤上書切論上怒榜之百繫獄踰年釋為民神宗登極復官擢光祿少卿有少卿集靜志居詩話云光祿受杖血袴至今藏其故宅春閨朝來靈鵲繞簷鳴果得雲箋慰逺情但説别來長見憶歸期依舊不分明孫訓導肯堂肯堂字以升海鹽人官鄱陽訓秋夜人靜柴荆僻玉露何瀼瀼微雲散欲盡衆星搖寒芒秋風忽四起悄然生新涼沈秀才維鋹維鋹字雲涯平湖人嘉靖間文學北墅紅橋出水涯十里北塘賖村徑通商舶煙波繫釣槎竹支茶竈穩桞護酒旗斜况近讀書處時來得看花林教授雨雨字少巖桂子居海畔倭亂力耕自食嘉靖甲寅以明經授代府教授亂後感春古道草如茵蕭蕭已暮春斷紅留蛺蝶殘碧卧麒麟風雨啼新鬼鶯花憶故人那堪談往事雙淚落荆榛馮參政敏功敏功字元卿號小山汝弼長子嘉靖壬戌進士以儀郎歷副使備兵徐州時河決睢寧六百里功經理水道築堤禦患皆可為法晉河南參政後復督漕於淮寶應等三湖舟多覆沒因疏越河通之益自勞瘁疾大作囑同官曰越河誠利國然太逼湖幸别創堤護之顧其子伯禮曰吾死有賻歸之官以佐堤聞者悲之贈太僕卿煙雨樓南湖煙景屬高樓樓下波光接素秋江郭雨餘翻夕照島門月上湧寒流共看遺迹千年勝似泛虛槎八月浮此夜好乘玄鶴去泠然不覺下滄洲戚尚寶元佐元佐字希仲號中嶽秀水人嘉靖壬戌進士初仕儀曹會穆宗登極諸典禮多所匡益宗籓一疏尤見碩畫升尚寶卿告歸居家亷靜不為請謁善楷法與文徴仲頡頏畫祖巨然筆力蒼徑後以苦吟致疾卒詩極秀頴兄事吳徐弟畜宗梁非誣也著有青藜閣集早朝侍內殿班先入中右門待漏鳯掖傳呼早晨趨逼禁闈天香浮輦靜宫漏隔花微仙掌明河動周廬列宿稀不知風露重先濕侍臣衣題天寧法舟禪堂卓錫幾年至松燈一草庵榻虛雲共住定起鳥來參毳衲人間相蓮文世外談平生玄寂意長此對瞿曇鞏華城早朝先駕戒行有述鞏華晴散紫宸朝曉度春風威漠橋世宗所題橋名花映前茅仙蹕引日臨左纛玉驄驕山回御氣雲中轉爐裊天香林外飄六尚才人都後乘綵霞深處擁笙韶寄吳君澤中丞上都開府近皇州共嘆頻年節鉞留三箭令傳紅石夜五營鐃合白羊秋名王欵塞垂櫜入塞馬來庭給印收中國聖人全務德不須身拜義陽侯真如擊竹山房香臺晝鎖白雲深化塔層層出紺林自拂朝衣耽獨卧每教道侣數相尋三天虛寂非人界十地莊嚴盡佛心記得草年前事否月明如水幾登臨西林寺虛臺斜枕白茅岡沉雨隂蘿蔽夕廊寂寞望中煙樹暝空餘一縷佛前香京師上元詞二首月滿天街香霧飄燈樓歌吹咽春宵自來都下傳遺俗一片新粧出走橋火樹光搖照九衢粧成百寶錯流蘇春官自有文皇典每至元宵請大酺春日綺閣香籠繞碧紗夢回亭午試新茶湘簾半捲微風起花汙屏前玉辟邪送人入蜀西看白帝亂雲間少小離家老未還三峽夜猿聽不得如何又有萬重山春日同戴將軍送柴子開立馬章臺酒數巡桞條空自裊殘春花前獨有羌童侍學得吳歌送越人項上林元淇元淇字子瞻號少嶽秀水人性狷介工詩善書與弟元汴並名於時嘉靖中以資為上林監著有少嶽山人集皇甫司勳汸稱之曰古選沖逸陶謝亞也五言典雅王孟流也七言清婉錢郎匹也人以為知言東園秋霽同諸弟擕尊眺賞誕嫚豫成癖清狂爾較深言同池上酌來聽竹間琴水氣澄荷檻秋隂抱石林涼風一披拂竟日懶衣簮月堂夜坐絶磴出雲危虛堂向晚披竹開留客徑樹翦礙山枝海月當忩倚湖帆俯鏡窺投簮屬清曠永夜不知疲治長水故園值春盡諸友㩦觴命韻得來字言從長水涘行翦故山萊鳥有相求樂人今不速來夏隂先灌木春色尚餘杯九里樵風便輕舟暮可回贈隂三嘉判官致政歸嘉州矯矯獨行辭巧宦冥冥霄漢羡飛鴻蛾眉萬疊岷江外劒閣千尋棧路中曉澗翠迷卭竹雨春城香散海棠風圗經云嘉州海棠有香憑君為語狂歌者棲隱於今鳯德同初夏泛南河遵螺潭庵放舟花莊池館作日長風暖桞花新引興揚舲野水濵飛燕掠波如識我遊魚吹藻忽驚人林間池館要山簡物外禪棲遲許詢且共流連休遽返酒杯湖月正相親江上望潮不至戲作竹枝郎君南埧妾北湄早潮望到晚潮時浙江潮信有時失郎約何時可定期墨林山人項元汴元汴字子京號墨林山人嘉靖時布衣博物嗜古精繪事好蓄書畫及鼎彞尊壺琴硯玉器之屬不惜重資購取時人多艷稱項三麻子云龍淵秋集同子瞻兄陳子忠分得天字疏林繚繞帶龍淵三徑悠然接野田秋水不流明似練晚峰相並削成蓮雲忩石几揮毫裏竹色松隂展簟前頻會莫驚星聚夜一尊聊醉菊花天石佛寺山居偶逐白雲過遊戲臨忩筆墨多却愧山隂王逸少逺公不惜聽經鵝附考在嘉興東南二十七里唐獲四石佛寺因名張布衣服采服采嘉興人訪少嶽隱居桃花里欲覔柴桑處士家城南十里碧溪斜武陵不隔人間世暮雨新流泛落花張副使應治應治字體徵號沖泉秀水人嘉靖壬戌進士任行人擢南户科給事疏請正宫闈劾遣巨璫邢保革南司禮監神帛及論輔臣冒恩偽濫皆人所不敢言巳復抗章論新鄭出為九江守升臨清副使卒官著有奏疏及玄陽堂稿憩四祖禪寺得太室詩於石壁和之玉液瀑巉崖琪花拂幽徑颯然萬木驚山堂一聲磬偶題風裏飛花高復低半飄茵席半沾泥春光搖落渾無主腸斷流鶯恰恰啼沈大理玄華玄華字邃伯一作端伯號少河秀水人嘉靖壬戌進士少嗜學不事家人産登第後閉户讀書性善飲左持觴右執卷丙夜不輟為人謙厚口不作雌黃仕至大理卿先是為禮曹時使朝鮮朝鮮贈以金絲帳却之後為尚寶上欲採玉華極諫得寢著有竹葉軒稿其詩與彭比部一𣲖亦多佳作萬壽節早直會極門鳯掖傳呼入金門遇直時爐香浮鎖動宫漏出花遲玉帛陳王會旗常壯羽儀乍來供奉列應起肅雍思贈朱山人海嶽三峰下青藜白髮翁煙霞分世外瑶草託山中放浪真為逹逍遙不諱窮丹砂能鑄骨何必訪崆洞古崖觀堂坐久老僧出松壇盡日間數聲啼雨鳥一片隔江山花馥談經所雲封入定關倦思支遁馬薄莫借乘還咱鍊師芝房圜丘地接碧霞居寂掩玄關白日虛丹竈埋雲流紫火真符堆案散天書盈尊舊識麻姑醴望氣疑來函谷車自是過逢多道侣星壇咫尺即華胥集姚玄嶽玄覽堂芳堤弭棹來賔從細桞隂中啓石門幾處樓臺遙帶郭一叢花竹半成村直將流水為詞賦更借啼鶯侑酒尊盡道德星今夕聚如何明月在西園王參議錫命錫命字豫卿號文泉秀水聞川人嘉靖壬戌進士授刑部主事升江西參議以母病告歸絶意祿仕與二三老友倡酬詩亦蕭散有葆光閣草同明卿訪仲佩王孫夜話誰知帝者裔别有煙霞姿問字不載酒談經能解頥樓高仍對竹山靜且臨池清夜但安坐涼風生露葵酬林從吾年丈頗怪幽棲者偏憐浪迹人耽詩翻是癖縱酒未嫌貧芋栗山租足魚蝦水饌新向來梅徑畔應與鶴相親王參政俸俸字亷甫號會泉周之子嘉靖壬戌進士授武庫主事海冦曽一本跳梁閩廣司馬劉燾督兵俸參其軍凱旋進郎中轉武選會以馬市議忤江陵意出守永州歷升江西參政秋日過友人村居林中把臂日頻斜濁酒枯魚意自嘉易受霜侵惟緑鬢強隨人意是黃花門題凡鳥嵇康宅座有高僧許掾家愧我坐酣無好句多君賦擅赤城霞陳潛山九德九德字子吉初字子忠號仰觀秀水人嘉靖甲子舉人授潛山令有集行世句亦清警鞋杯歌有序豫昔遊燕得一鞋杯藏篋中偶黎趙二文學見訪出以代觴各談艷麗戲作長歌不覺間情之露云昔讀陳王洛神賦每懷裔裔凌波步今來貯酒作飛觴倚醉凝眸重回顧想見雲中一翠蛾遙從洛浦暫經過偏宜花底裙拖錦更稱風前襪映羅風前花底常相見雙宿雙飛誰不羡日暖鶯啼二月天女郎連袂出江邊隊隊分場爭踘蹴翩翩拂架戲鞦韆未誇裊裊枝頭桞先鬭纎纎足下蓮彎弓窄小誰能匹江北江南嗟獨立㛹娟俯仰若有神婀娜趨蹌似無力遮莫楚王進細腰一鈎拾級騁輕蹻翠盤幻出盈盈態錦帳移來步步嬌行行步步香霞裏稱觴上壽天顔喜歌舞淹留玳瑁筵春陽暗擲度流年昔時稱觴人已去空留脫屐向人傳傳觴至我真堪賞飛燕翩躚如入掌杯傾鸚鵡莫辭頻杓奉鸕鷀日數巡遺韻未銷芳徑迹餘香猶印落花塵但能酩酊判長醉絶勝尊前對玉人西湖詞二首西湖日落鏡光斜少女新粧似浣紗乘却蘭舟蕩蘭槳約開蓮葉採蓮花湖上家人帶夕暉野鷗相對亦忘機微風不動波澄碧水底青林開竹扉夜泊鴛湖憶舊二首凄然風景正孤清忽憶當年問水情半夜吳舠勞玉指梅花零落秀州城白蘋花上苦相思紅蓼汀前憶酒巵若箇指頭權作板輕彈竹几度新詞錢舉人與映與映字淵甫號魯南薇之子嘉靖甲子舉人有詩一卷屠隆序之寄吳少君幽意有誰似僑居也竹林有時忘獨坐間亦賞微吟劒冷磨前事瓢懸破後心相思無一寄春水到門深懶翁駱驤驤字子龍號復齋嘉興長水鄉人嘉靖中布衣年三十始讀書博通經史好吟咏同時范國博言彭比部輅項上林元淇皆其唱和友也驤善畫工醫晚與天寧濟公精嚴澤公為方外交精心禪理謝絶世緣更號懶翁作懶翁歌以見志郡丞陳南棠欽其人造廬請見出慕陶真趣卷乞題驤有句云日涉園林總成趣逺公社裏莫相尋人皆稱其高致云著有言志集煙雨亭曲檻浮青靄荒階蘚迹深雲歸滋亂石鳥靜囀空林坐怯草衣冷書貪竹几隂泉聲與山色并作晚來吟漫興園林雨足緑隂肥風靜茅堂乳燕飛睡起不知春又晚籬間花事到薔薇溪上竹樹參差映碧紗槿籬茅屋兩三家前溪一望人煙少水鳥雙飛上釣槎仲舍人春龍春龍字原仁秀水人嘉靖間太學生授文淵閣中書舍人最善楷書亦工詩文與李先芳莫如忠善王弇州亦稱其詩雅尚在襄陽右丞間才具微短有九山樵子集孀娃篇為某氏賦萬花堆裏春風窟錦樣流光莫虛擲繡地朝敷連理枝畫堂夜語單棲翼别有飛樓結半天珊瑚鈎控水晶簾流蘇疊疊鮮花帖帳額盈盈明月懸鮮花明月春偏好二八嬌娃名小小弱態偏隨乳燕輕芳年恰比流鶯早乳燕流鶯浪自誇分花作貌更含葩不從宋玉墻窺立羞向安仁果擲車十二雕闌對清曉細細蛾眉間自掃玉笋慵描交頸鴛金蓮怕踏聨心草秪緣早嵗解瑶琴從姨學得鳯凰吟絃絃掩抑嬌難盡句句凄清怨自深却嫌盡日知音少坐向緑忩彈不了萍葉生憎逐水流楊花愁殺當空攪來來去去碧池邊兩兩三三總是仙此際含情復含態此時相見即相憐珮環無那香風繞况是桃源春未曉拂地飄飄紫繡襦稱身窄窄紅羅襖紅羅紫繡蕩蘭煙兩情兩意忽相牽當時自擬孤生柏此日因成並蒂蓮杏梁梓栱芙蓉帳百尺珊瑚列相向綺鳯差池弱水傍春風繚繞高唐上弱水高唐路幾千詎知只在鏡臺前即教白首難分判若比黃金未是堅胡然龍劒分離早忽聽鸞簫中道窅一朝揮手謝人間枕落遊仙魂縹眇仙家縹眇景色奇紫煙緑霧結成居岧嶤翠館珠星綴暗靄文疏璧月埀珠星璧月分交錯瑶草琪花亦堪樂飛瓊解舞雪花翻雙成美歌珠串落可惜歡娛别有天可憐儂結斷腸緣聞説山中年似日那知世上日如年深深庭館遊絲駐寂寂笙歌空復處秋色偏驚折桞條月華不動高梧樹鄰家少女未經愁十五年光嫁五侯夜夜燈前調錦瑟時時花下弄箜篌燈前花下心相許此日深情復誰語綺忩空織錦文成青鳥不傳素書與夢裏相逢難自憑玉顔雲鬢漸凋零古來薄命非由妾試看迢迢織女星塞上曲單于夜合圍漢士不思歸縱矢雕前獵橫身馬上飛白登霜氣早青海日光微為有封候骨年年卧鐡衣直中作條風輦道淨微塵內詔傳宣促侍臣别殿香飄黃帔揭纒龍帖子賜宜春少年行鏤金鞍子百花裝三尺流虹飲血光白日報讎官市上青春調笑酒壚傍宫詞二首海子周遭長荻芽春深乘艦不乘車阿誰貪看遊魚戲拋却新簮茉莉花曉來别院遞笙歌百子池頭遍緑荷睡起無聊庭下立笑拈竿子打蜂窠郭孝子球球字友虞平湖人母早孀兩目皆瞽球以舌甜目漸明嘉靖間倭入冦負母塗行冦猝至將加刃球以手搏血濺襟帶適尉卒至幸脫天啓間詔旌之有舜鳴集送魯懷楊北上今日何人薦馬卿懷中應賦子虛成十年與爾同風雨愁絶陽關第四聲張訓導滂滂字大霖號芙江海鹽人貢授訓導九日登龍江紅樹著霜殘葉飛山含紫翠晴煙微稻香村落酒初熟秋老江天雁未歸陳秀才楫楫字濟之號來山海鹽人嘉隆間文學流寓梁溪詩見皇明詩統宿金山海潮軒送陳貞父寺剎臨鮫室孤峰峙海門浮雲千仞碧落日半江昏白雪憐巴調青山惜酒尊明朝相憶處只在海潮軒玄嶽山人姚兖兖字叔信自號玄嶽山人又稱西郭翁秀水人嘉隆時布衣父為讎家所陷繫獄兖請以身代居囹圄數年有僧正念能詩亦以事繫獄盡以詩旨授兖一日令聞獄中讀書聲出之日偕戚符卿項上林及四方名士結詩社唱和有尚玄草咏物詩周公瑕山居六月巖扉靜輕舠偶一過涼隂高落梓香氣近浮荷場曠雞豚散林深鳥雀多相逢幽興愜隔岸復聞歌九日登金明寺閣同郭次甫董玄宰限山字考見題咏寶閣千尋起丹梯九日攀雲隂初度海雨氣忽沉山林外楓俱落沙邊鳥獨還誰知寥廓士一半出人間湖涘樓五龍橋畔散芳洲登眺凌虛昔有樓煙靄乍分楊桞榭風光不斷木蘭舟塔懸寶髻當杯出波蕩湘裙入鏡遊共説烈姬詩句好年年春色唤人愁附考在鴛湖北岸即凌虛閣故址廟側有羅愛卿元之名姬善詩死節葬後園銀杏樹下馮秀才敏效敏效字忠卿號季山汝弼次子負才不遇杜門著書有小有亭集初汝弼與諸子避倭假宿東園因拆二字作口號云曲川地可耕長刀砍低樹元來腹有文軍口三十去令諸子合之敏效年十五應聲曰是勦冦二字明日得報大捷京口夜泊客途朝復暮一枕傍孤城戌鼓斷鄉夢破船多月明潮平江有信雲靜雁無聲何處悲歌起推篷問五更山墅雨後風雨逗春寒青山繞畫闌鳥聲穿磴落林靜帶雲看對酒今朝熟憐花昨夜殘誰知苔徑滑莫惜倚笻難宿太倉道中婁江淹客思風急暮蕭蕭挂笠分斜雨停歌聽落潮魚鮮紅舸疾蜃氣碧天遙際此聊棲泊悠然醉濁醪移舟買菊蕭條憐暮色㩦伴訪城隂日落猶穿户花殘半在林不辭溪上棹聊解槖中金載得幽芳去間庭秋正深戈布衣思齊思齊字子賢號龍村平湖人嘉隆間布衣有垂裕堂集湖樓登眺那向三峰索畫圖林花著雨客提壺老夫未倦登臨興且傍圓沙看浴鳬白巖老人沈懋嘉公諱懋嘉字會真號白巖不肖季友五世祖也為人仁厚間雅少頴敏工文章詩體清新蕭蕭跨俗時伯兄晴峰巳入中祕仲兄明石亦舉孝亷公在舉場三十年坎坷不遇乃退而自放時帶葛巾披白衲採蓴行藥以終老焉有白巖遺稿秋鳥陳山西麓海東頭細網長竿帶緑韝買得山禽如粉脆屠墳十里稻花秋附考平湖乍浦陳山屠康僖墓林木蘙薈有鳥從南海來集其上秋來春去初至剖其腹猶有青椒當是日本國所産大者名刺毛鶯亦曰鶘中者花雞小者鑽籬湖中佳品也當湖竹枝十首考見題咏鵡湖春色阿郎曾説漢陽城鸚鵡名傳舊緑汀問郎可似東湖上小小春沙好踏青案山曉翠濛濛曉翠濕鞋弓天晴來上案山峰從頭一望珠樓好港口條條戲九龍三寺兩鐘撑船採菱歌懊儂深深菱蕩翠煙濃日斜風起人歸去三寺聲聲打暮鐘六橋晴市鮮船都在水西棚三尺黃魚似絳繒陳陳腥風朝市散紅旗影裏買春氷東田社鼓夫插新秧婦踏車秋收一半入官家村村鼓社東田晚籬腳開殘野菊花西浦魚罾十里清波湖靣長魚牀蟹籪水風涼瞢騰醉倒漁哥子自挂蓑衣晒夕陽南村書屋張家堆上屋層層聞説當年萬卷稱扇扇碧紗忩影亂為郎深夜剪書燈北原牧笛世事無端去似梭東城西市看忙多不若牧兒北原上夕陽林外唱山歌霍氏行祠花街東畔是儂家間看迎神晚放衙拂拂紅旗春賽罷霍王祠下採藤花魯公古墓家家寒食各紛紛留得輕風上繡裙滿地紙錢人不掃草花紅過魯家墳檇李詩繫卷十三
