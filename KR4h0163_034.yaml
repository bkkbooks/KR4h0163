body:
  text: 檇李詩繫卷三十四平湖沈季友編三國吳義姑陸鬱生陸氏績之女生于鬱林名鬱生海鹽人年十三適同郡張白白溫弟也素有才名溫因使蜀大帝恨之以事幽溫白亦坐廢謫死異郡鬱生嫁甫三月以苦節終姚信有表稱之曰鬱生少履貞特之行幼立匪石之節婦禮未卒遭羅家禍抗聲昭節義形于色冠蓋交橫誓而不許奉白姊妹􅕑巇之中踏履水火志懷霜雪義心固于金石體信貫于神明送終以禮邦士慕則臣聞昭德以行顯行以爵茍非名爵則勸善不嚴故士之有誄魯人志其勇杞婦見書齊人哀其哭乞䝉聖朝褒以義姑之號以厲兩髦之節則皇風穆暢士女改觀矣吳趨行繭滿蓋重簾唯有逺相思藕葉清朝釧何見早還時南齊賢娼蘇小小小小一名簡簡名倡也居嘉興縣南死即葬此人呼為賢娼巷墓旁有大井舊生雙桃宋紹興初衣白以出人多畏之因鎮以塔後宋路分行天心法以驅之遂不復見向傳小小居錢塘墓亦在錢塘然據唐人諸詩俱云在嘉興宋司馬槱才仲初在洛下晝寢夢一美姝牽帷而歌曰妾本錢塘江上住花落花開不管流年度燕子銜將春色去紗忩幾陳黃梅雨才仲愛其詞因詢曲名云是黃金縷後五年才仲以子瞻薦為錢塘幕官為秦少章道其事少章續其後詞云斜插犀梳雲半吐檀板輕敲唱徹黃金縷夢斷綵雲無覓處夜凉明月生南浦頃之復夢美姝迎笑曰夙願諧矣遂與同寢自是每夕必來不逾年才仲得疾而死死之日有見才仲攜一麗人自湖上登舟云或曰宋有蘇小娟亦名小小墓在錢塘槱事蓋小娟也詳見七修類稿西陵歌妾乘油壁車郎騎青驄馬何處結同心西陵松柏下宋女給事沈氏沈氏稗史彚編云秀州人聰慧能屬文少選入宫為給事中孝宗嘗試六宫守宫論沈文最佳其發端云甚矣秦之無道也宫豈必守哉上恱擢為第一弟溥為貢士就試春官沈贈以詩時競傳誦之其餘詩詞不多見或云為明孝廟時宫人未知孰是贈弟自少辭家侍禁闈人間天上兩依稀朝隨鳯輦趨青瑣夕捧鸞書入紫微銀燭燒殘空有淚玉叉敲斷竟無歸年來望爾登金籍同補山龍上衮衣蔣草二孺人蔣十八居士與其妻草二孺人皆海鹽人日誦大乘經四十年同日更衣焚香書頌而終居士頌曰這個幻身四大合成今日分散各歸其根諸幻既滅灰飛煙絶如空中風猶碧天月既無障礙又能皎潔一切永斷無復言說孺人頌録于左頌語看過蓮經萬四千平生香火有因緣西方自是吾歸路風月同乘般若船法雲尼正覺正覺海鹽人樞密郭三益之孫女適雲間葉氏早寡誓節為尼居法雲菴能詩有一絶載邑史絶句春朝湖上風兼雨世事如花落又開退省閉門真樂處閒雲終日去還來孫夫人孫夫人秀州鄭文妻也文久寓行都孫多寄以閨詞一時傳播酒樓妓館皆歌之詠雪朱樓向晚簾開六花片片飛來無奈熏爐煙霧騰騰扶上金叉元貞母禹淑靜禹氏名淑靜字素靖吳守正妻居崇德石門鎮元季苖獠之亂亟與夫撡舟以遁苖及之叱淑靜止淑靜度不免遂抱幼女投水死明日得尸僵立如生藁葬其地守正入越亦死兵間遺孤德昻無依去金華山中為僧後渡錢塘省墓宋學士濓序以送之稱其至孝有儒行㑹修元史德昻入京以母死事告于史氏遂得列傳歸廬母墓榜曰白雲先壠鎮人表為貞母阡徐一夔有記胡奎有詩云石門山前箭如雨朝别良人暮為鬼石門山下百尺泉一日身死名千年至今石門山下路烈婦人稱禹家墓墓前斜日一僧歸即是當年十嵗兒又明初德祥法師詩云雙樹不單伐土中無怨根雙魚得一網水中無怨魂石門水不深不著無義金石門墳不髙凜乎三尺刀傷亂何處行避苖破船觸枯荇不如水底魚翻身入清冷芙蓉妓嘉禾張司令亡其名富而好禮慕楊鐡崖名往迎之鐵崖謂其不知書弗應司令乃延鮑恂為師受業焉後迎鐵崖乃往席間以妓奉酒妓名芙蓉酒名金盤露鐵崖題句妓即應聲答之鐵崖撫掌笑曰妓能文其主可知矣辭去時司令出米滿載送之云是鵠糧鐵崖素愛鵠不能却隨訪顧阿瑛召瑛之鄰人貧者分給之而去又楊至嘉禾貝廷臣以書幣為乞吳越兩山亭志并選諸詞人題詠楊即為命筆稿將就夜已過半俄門外有剝啄聲啓視則皆嘉禾能詩者也率人人持金繒乞留選其詩楊笑曰生平三尺法亦有時以情少借若詩文則心欲借眼眼不從心未嘗敢欺當世遂運筆批選止取鮑恂張翼顧文曄金炯四首謂諸人曰四詩猶為彼善于此諸什尚須托胎耳然被選者無一人在諸人相目驚駭固乞寬假得與姓名至有涕泣長跪者俱揮出門外閉關藏燭曰風雅掃地矣答楊鐵崖芙蓉掌上金盤露楊楊柳頭邊鐵笛風妓明宫正司女史黃婉黃氏名婉嘉興永樂鄉人後析秀水父永生婉有異徴幼敏慧通詩禮善文詞洪武中選入宫為宫正司女史洪熙元年以年老奉敇放歸有司嵗給米帛宣德八年卒葬秀水列字墟楊家村有詩一帙皆歸後所作嵗久蠧蝕不全可讀者僅十餘首載在族譜故選録之孤松孤松生幽澗落落蒼龍骨可憐托處卑掩抑干霄質蕭艾在崇岡春風氣蓬勃不有嵗寒心寧似千年物還家作憶昔辭家四十霜嘗攜彤管侍昭陽㸃班夙負君恩重退老還霑聖澤長弟妹相親真乍識庭幃何處更堪傷宫妝白髮歸來女紫袖空餘惹御香遊仙詩二首東皇夜宴水晶城玉樹瓊葩相映明鶴背坐看波底日酒曛風細露華清碧海芙蓉五色開仙娥分瓣列妝臺身同蝴蝶多遊遍不是南華夢裏來朱孺人妙端妙端字靜菴詩緯又作令文字仲嫺海寧人永宣問尚寶卿祚次女歸光澤學諭周濟後因海溢移家海鹽故淑秀集及明詩粹明詩妙絶俱作海鹽人年八十餘終閨閣著作之富無過靜菴者有詩集十卷遺集五卷雜文史論五卷時稱為女中詩豪以所配非偶每形諸吟詠嘗讀易安詞題云一代才華真可惜錯將閒恨寄新詩籬落見梅云可憐不遇知音賞零落殘香對野人又某使君有一青衣曰寒梅妻亡欲圖再娶青衣過靜菴泣訴靜菴曰吾能止之因題一絶于扇令持視使君云一夜西風滿地霜粗粗麻布勝無裳春來若覩桃花面莫負寒梅舊日香使君感其意遂不復娶其詩才致清贍聲調遒健平平舒寫自然嫻麗無愧名媛矣采蓮曲五月薰風至輕舟出南浦不愛蓮花紅惟采蓮菂苦君去不思家妾愁如亂麻紅顔易憔悴惆悵不如花讀鸚鵡賦作誰云禰正平剛傲而慢侮載讀鸚鵡賦忠誠照千古清音悲且和羈愁益凄楚阿瞞肆梟雄直視何足數黃祖駑下材焉能與君伍玉碎真可嗟珠沉竟何補鳯鳥攬德輝賢人相時輔天地正昏䝉君禍良自取不見商山翁深藏避豺虎白門懷古炎精已熄兵戈起漢苑青青草千里長安日晚歌布乎金刀血染權臣死奉先本非王佐才忠言棄斥成嫌猜區區豈是老瞞敵孤城坐守真堪哀白門已下身將戮搖尾求生尚何欲座上應無大耳公鴟梟又啄奸雄肉扁舟我來事已非登臨懷古徒傷悲凄凉遺跡不可問荒煙落日號狐狸春睡詞茸茸芳草含新緑露井夭桃錦雲簇石䦨干外早鶯啼又喚春光到華屋綺忩花影搖玲瓏玉人夢破春溶溶雲鬟半軃鳯叉滑枕痕一縷消輕紅香汗輕輕透衾溼含情欲起嬌無力海棠庭院鳥聲和睡足東風一竿日從軍行束髮從飛將長驅下玉關秋霜明寶劔朔雪擁雕鞍曉角邊城苦悲笳旅夢殘何時淨疆場歌吹入長安平望舟中即事獨坐篷􅑵下挑燈憶別離旋沽平望酒細詠魯公詩唐顔魯公有登平望橋詩逺寺鐘聲動孤村月上遲含愁緘尺素慰我北堂思客中偶成異鄉久為客風雨阻歸程逺岸數峰碧孤舟一葉輕篷忩殘燭在煙樹早鴉鳴坐待東方曙依稀見海城題明因尼寺陳後主所建六代興亡似擲梭空留尼寺傍山阿殘碑猶識金仙事國破誰傳玉樹歌繞屋煙霞供笑語一龕燈火隔松蘿由來陵谷皆遷變湖水依然自緑波題探梅圖一笻秋老踏蒼苔為有南枝繞徑開小澗風輕歌影瘦孤山雲暮冷香來尋詩曽共巡簷笑問酒還同步月回今日重過幾惆悵翠禽啼處獨徘徊金陵懷古石城風起浪聲齊六代興亡動客思吳苑落花啼杜宇宋臺荒草走狐狸殘香猶染胭脂井遺恨空傳璧月詞誰道鍾山佳氣歇真龍又見起鍾離吳山懷古萬里中原戰血腥宋家南渡若為情忠臣有志清沙漠庸主無心復汴京北塞春風啼蜀魄西湖夜月照瑶箏百年興廢空陳迹回首吳山落照明春雨溼雲漠漠雨如絲花滿西園蝶未知金屋曉寒鶯語澀畫樓春晚燕歸遲宫桃有恨啼紅淚煙柳多情斂翠眉檀板金尊久寥落孤城愁聽角聲悲湖曲湖光山色映柴扉茅屋疏籬客到稀閒摘松花釀春酒旋裁荷葉製秋衣紅分夜火明書屋緑漲晴波沒釣磯惟有溪頭雙白鳥朝朝相對亦忘機夜坐吳蠶初出悄無眠數盡更籌覺暮寒柳色弄隂春已暝角聲吹月夜將闌金爐火冷沉煙細羅幌風生蠟炬殘獨坐空庭望銀漢碧天如水露溥溥采蓮曲采蓮復采蓮水深清見藕欲折紅芳枝緑刺傷儂手惜春挂樹遊絲旖旎撲簾飛絮輕狂杜宇喚將春去小桃落盡紅香柳枝詞樓外春風吹柳枝枝頭新月鬭蛾眉緑隂留待昏鴉宿莫折長條贈别離吹簫士女侍寢昭陽下直回紅蕉花底獨徘徊鳯簫偷得梨園譜閒向深宫奏落梅遊仙詞洞天春暖碧桃芳瑶草金芝滿路香吹徹玉簫天似水笑騎黃鶴過扶桑長信宫詞長信深沉天路遙玉階凉露溼宫袍不辭團扇輕拋擲雙燕俄驚别舊巢虞姬力盡重瞳霸氣消楚歌聲裏恨迢迢貞魂化作原頭草不逐東風入漢郊竹枝詞二首西子湖頭賣酒家春風搖蕩酒旗斜行人沽酒唱歌去踏碎滿隄山杏花橫塘秋老藕花殘兩兩吳姬蕩槳還驚起鴛鴦不成浴翩翩飛過白蘋灘病中作夜剔寒燈夢不成擁衾危坐到三更不知何處吹羌笛落盡梅花月滿城秋日見蝶江空木落雁聲悲霜染丹楓百草萎蝴蝶不知身是夢又隨秋色上寒枝閨怨啼鳥驚回曉夢醒起來無力倚銀屏蛾眉未得張郎畫羞見東風柳眼青春蠶桃花落盡日初長陌上雨晴桑葉黃拜罷三姑祭蠶室漸籠溫火暖蠶房染甲金盤和露搗晴霞紅透纎纎玉筍芽翠袖籠香理瑶瑟緑隂新綻海棠花虞節婦嫄虞氏名嫄海鹽人孝亷勳姪女也幼通文藝年十六歸董湄兩月湄暴死嫄哀慟欲絶歎曰我不從官人死得復見官人如生者庶長瞑乎乃自述其夫狀貌募工刻畫而自雕繪之既成大哭曰官人今果如生矣具酒炙饗之寢興盥櫛裘葛更襲無異生人久而有靈顙忽蔌蔌出汗兩袖時舉湄父以為怪投之火嫄遂鬱悒而死許雲村為之立傳有詠物絶句十餘首詠菊移種春苖愛護周柴桑無主為誰秋寒芳甘抱枯枝萎羞墜飄風逐水流詠竹自矢貞心古井泉清寒徹骨自堪憐相看嵗暮青青色歷盡氷霜戴一天彭夫人淑慧彭氏名淑慧嘉興人比部輅之女大理沈𤣥華繼室秋閨回文秋江度雁逺鳴孤景寂霜天曉宿烏愁舊戀深時憶妾別新傷劇日思夫樓憑攬鬢羞凝翠鏡舞窺人怯㸃朱浮靄盼殘淒想結修睽信羽落關榆王烈婦月妝月妝海鹽向升妻早寡矢節姑欲以從子為後月妝泣曰吾死今其時矣遂自縊嘉靖戊戌嵗也絶句二首孤燈一盞照空房四壁蛩聲欲斷腸休怨凄凉眼前事自燒前世斷頭香平生節孝兩無成遺笑人間作話名寄語湘君賢姊妹東風回首莫關情曹氏曹氏平湖人適諸生陸大礽夫赴省試病革寄夫一絶而卒沈懋孝為立傳寄夫金風吹散碧天雲雞骨支牀體似焚夢想吳山無限恨對人含淚惜劉蕡張烈女張氏嘉隆間秀水張組女居常與女伴好稱述古烈女節孝事年十四許字同邑諸生劉伯春春少負才名未娶卒女聞變號泣截髮誓不更適自為詩哭之足不踰閫口不茹葷三年服闋即絶食旬日死時年二十舅姑迎柩合葬焉哭夫妾身未識良人面良人何事先云亡想應胸有五車史地下召作修文郎妾欲從君即殉死垂白舅姑猶在堂小叔呱呱方五月伶仃襁褓殊可傷妾本儒家寒素女感君一聘守綱常妾身不比雲間月三五團團未幾缺妾身不比天上星永夜明明旦垂滅南山有石雖云堅鎚鑿相攻遽殘囓長江有水固云直百里之外路回折千秋萬古無改移此情此義何休歇妾非矯性以干譽身心自矢無淄涅終期叔兮三嵗强妾當一死來君傍陸聖姬聖姬字文鸞嘉興陸太守女適周槩鬱鬱不得志有詩集王端淑謂其詩景色疏快氣味清芬名列十六名姬宜矣和人山居石徑苔封客到稀林深白日掩柴扉攀蘿飲澗猿常出認嶼盤雲鶴欲歸竹裏泉聲喧藥碓簾間嵐氣溼荷衣杖藜徐步尋詩去一路春風入翠微新秋乍宜凉思袖襟中雲物窺人似不同逺岫著煙矜夕翠倦荷摧露脫秋紅稍將蕭索添文致漸益凄其與病容忽憶夜來山月上一聲絡緯出花叢西樓梧月緑野堂西百尺樓梧桐搖月一天秋夜深獨坐清如許空翠滿身凉月流桑貞白貞白字月姝嘉興人隆萬間布衣周履靖繼室纂組之外留心典籍先後倡和數百餘首刪繁擷精得十之一二題曰月窗詩稿茅鹿門序之閫範淑懿撫前兒如已出有一女適程之逺初婚旬日程以宿疾死女盡屏服用哀哭勿休守制終焉崇禎間有司聞其事于朝立坊旌表有女若此寧非母德所致乎王端淑曰人謂襄陽詩如清溪白石疏柳幽蕉清矣未免于薄嗟乎襄陽之厚人未知也讀月姝詩當自得之春雨三月風光好渾銷一雨中苔生延座碧花落隔簾紅啼鳥枝頭澀遊蜂葉底空應知春夢斷針線總無功采桑四月桑郊緑貧家蠶事忙一筐芳草露兩袖落花香山居山居寂寂俗塵稀石徑雲封晝掩扉摘蕨拂煙攜鍤去採芝帶月杖藜歸疏花傍檻紅侵榻流水臨門緑繞磯風景幽閒堪入畫半林晴旭翠嵐微春夜更䦨獨坐斷啼鴉起憑䦨杆望斗斜好句忽成情思洽梅花和月上窗紗春繡一番風雨動春寒庭畔梨花已半殘燕語隔簾人寂寂金盤滌手繡青鸞五雲仙女謝彩彩字五雲秀水人謝彬吾女相傳為璇妃三女臨凡年十四柔肌纎質不勝綺羅豔冶之態目為神人適雲間丁七郎未幾尸解而去丁後亦不知所終詩緯云讀五雲傳至羣仙夜集侑觴髙歌使人有凌雲之想十二美人之稱惟五雲幻甚遊仙香風吹下蕊珠宫路遇巴園對奕翁笑問先生何處去楸枰移在玉蓮峰贈丁生三生一笑舊姻盟石畔桃花月下笙惆悵滄桑經幾變于今才了昔年情煙雨樓春風遲我一登樓紅染夭桃緑未稠百里練光煙細襯四圍曉色雨初收漁歌每自蘆中起畫舫還從雲外遊我欲騎鯨從此去須知直北是瀛洲瑶簪擊玉缶歌金烏既墜漏箭頻城頭月挂銀粼粼流光照我四座賓贈我以酒歌陽春憶昔瑶臺㑹羣真雲璈玉磬俱列陳既諷丹籙復清論天花四散縈我身于此一別淪海濱宿緣未斷旋謫塵厄滿二九始締姻桃花繞洞空白雲白鶴怨我未返輪靈臺鬱結思未伸庸知鸞馭俄相親際此良夜逢故人留連莫惜傾玉樽須㬰展我眉上顰從此碧落與清津時修尺一通雁鱗何當解縛重作鄰淡掃蛾眉朝紫宸沈恭人紉蘭紉蘭字閒靚秀水大參黃承昊室封恭人著有效顰鋤隱賓廬諸稿時閨秀工近體者比比閒靚獨喜作古詩不為平熟之調七言亦倣佛溫李彤管之盛萃于一門如桐城之方吳江之葉華亭之張檇李之黃皆近代所希有也王端淑曰恭人賦性精敏才藝冠世女紅中饋間如振䝉發落惜未見其全集未免有湘蘭楚橘之悲褉日懷黃皆令却寄麗日念古集樂事競水嬉緬思清川上士女介新禔秉蕳散芳沼踏青膩紅縭洛陽油花卜開元撲蝶戲蘭亭聚昔賢文士掞華辭昻首雲中錦惠我曲水詩春草篇錦褥襴雲繡天地瑶田鋪月迷花魅倚偎香魂展寸心翠鎖紅閨怨女思驪山漳水青無情結風鞶舞空英英冶遊欵襪私香氣沙畔鴛鴦接紫莖旖旎輕揚媚蜂蝶膩滑纎腰開笑靨鬭芳偷贈小鬟竒輸却斜眸揉碧葉露流荆圃曉銜珠荒煙連雨通楚巫長亭助柳悲離別閲盡年年恨始枯次外君寄懷懶性或成癖偏愁往返頻牛衣思舊淚馬首恨羈身故國梅舒萼江干柳報春畫樓今夜月同照别離人豫自已巳春從宦時仲姒陸夫人以小􅘞不得靣别及豫歸自中州又再秋矣聞姒又抱疴賦此代面仲姒所居有夢蓮堂幾年萍絮屬他鄉豈羡維藩向洛陽才到故園憐姊妹又添新淚溼衣裳庭前梧葉經秋老夢裏蓮花隔院香别況不堪常閉閣碧山風雨自淒涼歸途風雪寒雨瀟瀟掩暮扉長途客裏怯單衣無端燕子磯頭夢繚繞隨君到處飛早春憶外映日初花隔檻明春風裊裊透寒輕傷心怕聽枝頭鳥莫向王孫歸路鳴悼柔卿遺扇物在人亡空自悲淚痕時共落花垂泉臺若有回峰雁寄我衷腸知不知悼葉瑶期姊妹才髙各不羣餘音獨惜小蠻裙一償詩債遊仙去紫府瑶臺鎖碧雲幽魂清韻亦生寒倣佛芳姿夢裏看庭際月明人寂寂宛然吟詠在闌干題寒山文夫人畫菊問竒十載繫相思白露懷人又此時陶令有情君有筆共分秋色在東籬黃淑德淑德字柔卿秀水人葵陽先生幼女適屠氏早寡有遺集一卷按邑志淑德太學正憲女適文學屠耀孫早寡遂奉竺乾之教卒年不滿四十著遺芳草秋懷寂莫不禁秋淒淒獨倚樓露凝砧欲動風冷扇初收征雁驚殘夢吟蛩引暮愁多情忩外月斜影到牀頭詠雪同雲密密四山圍凜冽寒風撼竹扉萬樹有花蜂不採三山無路客行稀窗間夜坐衣嫌薄爐到更深火自微惟有煙波江上月漁翁猶帶滿蓑歸秋暮寄懷孟畹孤館蕭條落葉紅故人遙隔水雲東追思往事渾如夢轉覺豪華總是空徑草亂垂猶帶露庭花漸老不禁風愁懷縷縷憑誰訴閒倚䦨干數斷鴻七夕鵲駕成橋事有無年年今夕㑹星娥時人莫訝經年隔猶勝人間長别多沈鳯華鳯華秀水人修撰自邠女未嫁卒暮春悼先太史寂莫當年歌舞臺把杯人去漫徘徊可憐荒却三條徑爛漫春花只自開項孺人蘭貞蘭貞字孟畹秀水太學黃卯錫之室著有裁雲草月露吟寒山陸卿子為序其詩最工寫景清婉有致臨沒書一詩與卯錫訣别曰吾于塵世它無所戀惟雲露小詩得附名閨秀後足矣如幽人心賞間翛然弄秋月晚風吹月上孤鳥帶雲還檻外繁花隨意茂夢中芳草傍愁生野鶴閒雲身外伴落霞飛鶩景中禪惟有秋風解人意故吹魂夢到君旁為語王孫須努力閨中應不悔封侯俱集中警句也武林徐野君曰三吳閨秀自陸卿子徐小淑而外不得不以此事推君王端淑曰夫人玉碎珠沉猶惜詩之不傳豈蛾眉凡質乎風凄月淡鳥怨花愁中無三寸枯毫徒為七尺土木矣選其諸詩音節清潔居然名手揚州野泊長林日暮行人少淮揚古渡聞啼鳥閒雲來去數峰青極浦寒煙浮樹杪岸闊潮平一雁過木蘭舟蕩採蓮歌荒村漁火半明滅新月如鈎映薜蘿忽聞野寺疏鐘動蘆葦簌簌江風送徘徊枕上意如何城笳吹起江南夢聞雁明月照蒼苔橫空一雁來影翻飛葉墮聲帶晚風回塞外征人思閨中少婦哀坐憐砧杵急嘹唳又相催過天竺嵐氣侵衣袂輕風拂鬢鬟徑深芳草合林靜落花殷人集煙中寺僧歸樹杪山﨑嶇探勝槩贏得此身閒移居別舊舍十載相依處今宵忍别離小窗明月夜深院畫眉時去去愁無路行行步較遲庭梅解人意落盡最繁枝憶懿卿佩瑱兩姑關中秋半梧桐葉漸殘函關西去路漫漫同懸明月三千里獨倚西風十二䦨庭際有花零玉露天涯極目候青鸞遙思此夕深閨侣空憶江南夢到難秋宫怨鵲鏡慵開塵霧䝉笙歌遙度粉牆東瑶階夜散梧桐雨紫禁秋髙荷芰風鳯輦不來花暗淡羊車何處月朦朧此生難識君王面玉腕年年繫守宫題秋江送别便面送別空江上凉風滿客舟離情同岸柳搖落不勝秋答趙夫人寄慰乍得山中信挑燈憶昔期别來空有句强半悼亡詩春盡片片紅英落盡萋萋芳草欲迷暖風忽送春去深院無人鳥啼南歸贈別兩姑侍二尊人在關中東風吹雁各分飛柳色青青戀夕暉此去影娥池上月照人千里一帆歸送周夫人歸松陵目送飛鴻無那愁西風颯颯水悠悠可憐垂柳多搖落難向秋江挽去舟詠梅氷玉孤清世外姿娟娟新月上疏枝無情短笛休輕弄未是春風㸃額時柳枝詞緑樹隂深映酒旗欲牽春色上髙枝年年為惜行人別折盡東風總不知采蓮曲新栽白苧泛清溪一棹煙波香霧迷競摘荷花憐並蒂橫塘歌罷月痕低㑹稽女子題三詩于驛亭寫其哀恨豫已兩次其韻為和因復賦此悼之朦朧斜月淡雲封不寐愁聞夜半鐘綵筆漫傳心上事淚痕多處墨痕濃遲凝秀姊不至風吹細雨溼窗紗寶鴨香消一縷斜薄暮酒䦨人不到一枝春信負梅花沈靜專靜專字曼君吳江詞隱先生幼女適嘉興吳文學昌運早寡著有適適草一卷蔥蒨鬱蔚居然風雅其字句局法非閨中人所知鴛湖春日送別女伴之武林樹合雲隂欲問鳩可能喚雨阻行舟紅翻詞影花因瘦緑剪情絲柳亦愁無計慰留鴛水夢有懷難寄虎林遊春風吹斷長天月殘緒應飛暮嶺頭女伴隨任逺行懷念不置得書至因賦片香紅燼雨疑晴燕子分波紫羽輕空有淡煙扶晚照豈堪落月入離情將殘春影憐梅信欲醒秋痕寫笛聲最是夢回難放下何期青鳥破愁城竹枝詞妾住橫塘小有天數株楊柳緑於煙深池淺池俱種藕要使郎君多見蓮芙蓉紫煙吹斷緑萍稀霧捲輕綃寒月圍圖出冶容香欲起彩鸞中夜洛川歸夜泛水光蒼淡暮江風生怕鳴榔起睡鴻分得芙蓉霜袂冷一天煙靄月明中黃德貞德貞字月輝嘉興文學孫曽楠室少工詩賦與歸素英輩為詞壇主持共輯名閨詩選二女蘭媛蕙媛俱能文子渭璜亦名下士著有氷玉雪椒避葉蕉夢諸稿劈蓮詞鼓吹所選止悼亡一律芙蓉石在杭州南關署中為陸主政賦鬱林曽詫翠玲瓏𣙜署光凝拄笏雄半壁煙嵐矜玉立一簾香雨罥花叢筠依夕影寒生碧苔掩秋稜色印紅自是珠宫分蕊出堅貞應與使君同悼亡隂雲慘淡月無光鐵骨寒飛六月霜秋水倒流驚化石溪煙不動怨鳴螿緱山鶴馭空回首巫峽猿聲總斷腸薤露疾摧庭畔草悲風吹夢到池塘新秋坐月次皆令韻夜靜鳴蛩到處聞碧天如洗絶纎雲忽飄一葉添愁思獨坐閒庭每憶君學繡灣行人猶是說西施歌舞當年刺繡遲香骨只今何處所雲迷荒草曉風吹屠􅉅佩􅉅佩字瑶芳德貞子婦文學孫渭璜室著有咽露吟鈿奩遺詠其小詞情思婉約不讓乃姑觀沈氏諸姬演劇梨園喜見屬紅妝三五娉婷出洞房檀口鶯聲歌細細柳枝蝶態舞將將冠簪雅步參軍度粉墨塗顔傖父行底事酒䦨人未散月明照徹錦雲裳徐範範字儀靜號玉卿嘉興徐海門之女海門善書範童而習之又工畫梅蘭家貧日夜洴澼絖以給食齊眉唱詠以終稿曰紅餘沈夫人紉蘭梓而傳之夜讀效顰集篝火暗石壁披襟啓寒牖一讀一呌絶滿紙墮星斗何來覆瓿物呵咤百靈走每爾出一義曽未古今剖或粲如秋花亭亭露光厚含情未得采寒鮮忽脫手或皎如春泉泠泠應岡阜回風蕩微瀾能使飲者夀或竒如人面百變不窮有嬉怒生反掌恆情鮮定守或淡如輕容弱體不勝負塵香夜初暖顒顒絮小婦七步與八義知君未肯後如君古所稀且飲杯中酒秋海棠力薄違春夏花間草露中有誰憐夜雨無奈泣寒蟲冷骨先庭晚秋魂滿地紅自知根蒂弱不敢怨飄風金陵虎抱龍關氣未消鍾陵葱鬱正干霄秋風鐵騎悲三國夜雨歌魂怨六朝燕子磯邊雲自起雞籠山畔鳥空謡隔江玉樹聲何杳惟有沙頭晚落潮雁字弔月書空氣自豪墨池頴出似寒濤至文傳處原無本好字書成不在毫豈逐渚禽栖斷岸每隨飛雪過衡臯江南粱稻村村有何事年年往復勞夏閨緑楊影裏坐啼鴉蕙草才香月又斜閒對小忩無一事戲拈餘墨寫蘭花落花風雨憂春盡蜂聲見所思明年花發處只在此空枝周蘭秀蘭秀字淑英一作弱英吳江周應懿女孫平湖孫愚公之室也其母沈媛著聲香奩淑英秉其家學雅善吟詠王端淑稱其出口妍冷自非凡品有粲花遺稿未刻其死也愚公有悼內四詩見前春日乍浦舟中作芳草重重緑繞坡遊情淡逺欲如何無端紈扇因風墮是處桃花映水多榜女自依煙渚笑林鶯初到客樽歌山光為共春光醉歸櫂沿溪一逶迤和外君帳中梅影一縷春忩淡淡光疏梅清影落寒牀生綃半幅留飛白焦墨一枝吹冷香邀月對人孤作癖須花念我笑空忙那堪夢與羅浮逺曉色臨池並照妝鴛湖煮茶亭相傳坡公三過遺址尚存習習風清乞士家十年三過鬭名茶夕翻珠月分鷗浪春試縹罌泛乳花賸見亭荒猶浦溆却疑人在此蒹葭兹湖一借眉山重品第堪從陸羽誇題松陵楊夫人墨繡擘積春工鬭豔忙那知子墨寸絲藏六朝金粉刪鴛譜百疊煙雲落繡牀手浣露香翻紫脫縷飄湘素冷𤣥霜君家頴握珍如許蘇蕙恆嫌錦字長詠雙蘭雙蕊怯霜殘孤窗惜曉寒祇應圖並蒂留照落輕紈春日寫竹寄姊沈夫人新籜初舒雨後枝碧含香破淡相宜為君寫出疏欄影一片寒光照墨池曉起曉風疏柳挂樓西霧合秋忩半欲迷衾冷不堪重索夢黃鸝飛向隔花啼挽詩五首有序古人云今古駛同拍球榮名迅譬石火影徂心在未若文章之無窮我姨葉宛君夫人及昭齊瓊章兩姊氏風情秀月洛誦成河雖紫玉飛煙眷佳人之不再而瓊枝照案憐逝魄之猶香聊托遙思綴兹數絶敢謂平章有當庶匪淚至無端爾三生石上指空彈讀罷楞嚴靜裏觀塵土何堪埋玉樹梨花小閣又春寒十詠探梅護徑苔柔情端不為春來琴亡誰譜江南弄空使疏香度夜臺柳絮因風淡逺空海棠照夜霧溟濛莫愁强字盧家婦閉影梨花香雪中悵情瓊蕊弄春氷寒悄軒忩日數憑百結回腸魂縹眇充箱漫貴剡溪藤十七齡來聚沫餘芙蓉城冷待爰居臂文朱縷他年識袛恐天都署掌書沈瑶華瑶華進士項鼎鉉妻秀水人鳯華妹詠庭前牽牛花望逺雲凝袖妝餘黛散鈿縹囊承曉露翠蓋拂秋煙嚮慕非葵比凋零在槿先才供少頃玩空廢日髙眠遊仙詩虛皇宫闕九層臺瑶草琪花位置栽三十六雙朱色鳯徊翔對待玉妃來沈翠華翠華文學屠懋和妻嘉興人瑶華妹逰仙詩二首蓮瓣相傳大士舟輕紅淡緑繞江流只今跳出汚泥窟碧浪三山汗漫遊閬苑仙桃初熟釀丹札金書宣共賞飛瓊萼緑並鸞馳三十六峰天籟響山大家錢婉婉山萬春妻嘉興人采蓮雨餘風爽試輕羅薄暮蘭舟采芰荷看去自憐顔色好摘來猶覺苦心多冬日即事遙看春色逺坐待晚霞生擁被風憐鬢開忩雪滿城梅花將有信桐葉轉無聲但寫嵗寒句相思寄逺行徐月英月英嘉興名妓送人惆悵人間萬事違兩人同去一人歸生憎平望亭前水忍照鴛鴦相背飛青峩居士姚氏姚氏號青峩居士嘉興范應宫室人扶牀誦書博通羣籍二十六而卒有玉鴛閣遺稿屠隆為序王端淑曰青峩詩骨寒思窅氣清意冷下筆獨別春閨芳杜傷心碧空庭花雨飄鳥銜幽夢去柳綰别魂遙青被藏金鴨紅樓冷玉簫不關離思苦金粉為誰銷即事二首晚煙翠出草亭斜曲曲深村小築家幾㸃病鷗眠夜月半牀殘雪照梨花簾捲輕寒春帳空夢殘芳草雨摧風隔忩陳陳聲偏急狼籍庭前一夜紅題夢寄半牀蝴蝶迷春思一枕離魂逐恨飛密帳重幃關不住月斜樓上伴君歸溪屋數椽竹屋傍溪沙隔斷煙雲人迹賖漫看前汀浸寒月蛩聲淒老白蘋花黃少女雙蕙雙蕙字柔嘉參政黃承昊仲女母閒靚雅善吟詠柔嘉髫年禪悅絶意家室嘗誦經聞鳥聲有詩云迦陵可解西來意又報人間夢不長年十六而卒參政從妹淑德字柔卿猶子茂仲婦項孟畹皆有集傳世彤管之盛萃于一門近代所未有也有閨禪剩詠王端淑曰柔嘉詩質淡無求工意而下筆獨潔淫哇豔曲中得此如古琴三弄家嚴忤璫被放南歸雲外蒼茫苦問津乍驚鄉夢轉思蓴幾番抗疏惟憂國半老歸田始作民解綬已深泉石願全生何戀宰官身風前楊柳依然緑誰訊孤舟野水濱北上因伯兄抱病復回旬日以志悲喜柳色河橋更幾春驚心南北苦迷津維摩病室重相見疑是天涯夢裏身和㑹稽女子憔悴天涯問阿誰若為多露獨含悲空憐子夜孤亭淚盡作霜楓帶雨垂伎人薛素素字素素又字素卿吳人萬厯中金陵妓能詩工畫花鳥人物畫大士白描尤勝善彈走馬以女俠自命置彈于小婢額上彈去而婢不知廣陵陸弼觀素素挾彈歌云酒酣請為挾彈戲結束單衣聊一試微纒紅袖袒半鞲側度雲鬟引雙臂侍兒拈丸著髮端回身中之丸並墜言遲更疾却應手欲發未停偏有致自此江湖俠少年皆慕稱薛五矣少遊燕中與五陵年少挾彈出郊連騎遨遊觀者如堵為李征蠻所嬖其畫像傳入蠻峒酉陽彭宣慰深慕好之吳人馮生自詭能致素素費金錢無算久之語不售宣尉怒羈留峒中十餘年乃遣北里名姬至于傾動蠻夷古所希有也與海內諸名士交嗣遊吾郡中年長齊禮佛數嫁皆不終沈孝亷德符納之談梁生作詩嘲沈云祗知好女意娉婷誰别麻姑老少形伎倆指尖成狡獪翻堪搔癢在丹青晚歸吳下富家翁為房老以死别蔡幼嶷記得相逢二月春桃花如錦草如裀黃鸝兩兩音載好楊柳絲絲綰住人千金不惜重然諾意氣慷慨欣所托比翼鳥兮連理枝私語丁嚀莫教錯那堪風雨妬芳菲太息春光得幾時自是鴛鴦驚夢斷翻成一段别離悲羅衫紅溼啼痕透可憐酒醒愁依舊須知何處更思君月明人靜黃昏後謝王徵君百谷叙詩一篇勞見贈字字挾煙雲藝圃應無我詞壇獨有君偶曽吟拙句何竟辱雄文爭似山隂客鵝羣報右軍秋日同友飲秦淮舟中二水龍光繞三山王氣連舟浮桃葉渡客醉菊花天玉管隨歌扇金叉墮舞筵幸皆同調者不減挾飛仙寄友别路三千里離情十二時詩成憑寄與一字一相思飲吳太學伯載齊中楊柳簾櫳緑䕃多黃鸝庭院午風和共憐酒似秦淮水痛飲愁聽玉樹歌畫蘭空谷佳人絶世姿翠羅為帶玉為肌獨憐錯雜蕭蕭草一段幽香祗自知畫蘭竹題贈蘇時欽翠竹幽蘭入畫雙清芬徑節伴閒忩知君已得峩眉秀我亦前身在錦江雨夜江城漏轉夜迢迢誰共青尊伴寂寥挑盡銀燈不成寐半簾風雨嚮芭蕉伎人周文文字綺生吳門良家女流落為嘉興妓所得遂為嘉興人聰敏有殊色能詩善小楷與姚士粦楊瑞枝交好檇李縉紳好文墨者每召綺生即席分韻以為風流勝事綺生微辭多所譏評有押池韻用習家池者綺生笑曰無乃太逺乎諸公拂衣而起綺生嘗有詩曰掃眉才子多相忌未敢人前說校書蓋自傷也新安王太古詞場老宿見綺生詩擊節曰薛洪度劉采春今再見矣李本寧流寓廣陵與陸無從顧所建結淮南社太古攜綺生詩詫諸公曰吾能致綺生入淮南以張吾軍諸公大喜相與買舟具裝各賦四絶句以祖其行太古比及吳門松陵一元氏者已負之而趨矣綺生既屬身養卒敝衣毁容重自摧廢晨夕炷香于佛前祈死不復為詩時作小詞寓意一元氏以五七言回環讀之迄不得句綺生乃開顔一笑也嘗有句云侍兒不解春愁報道杏花零落知者咸傷之後歸沈同和沈素不好文色衰見棄遂杜門茹素以終沈千秋寄綺生詩有空餘屐齒斜陽裏記得春心楊柳邉王端淑謂綺生有文心而無慧眼失身瑣類悔何及哉遊韜光菴與沈千秋分韻轉徑白雲近回風清磬殘霜花欺客眼江雁怯秋翰片石泉聲細千峰日影寒煙深鳥不語歸路已漫漫夏日和友人見贈并謝蘭膏名酒題遍碧苔箋吟殘緑水篇流霞穿樹出明月隔溪懸乍聽聲聲笛還逢泛泛船琴心誰共識山水自相憐渡口一水如斯逝滔滔不便休橋分南北岸樹繫去來舟竹粉饞烏啄花房倦蝶留況多漁父引豫亦漫從遊答華南子老大羞顔鏡多君寄逺詩素緘開豓玉上苑折新枝三月孤村雨十年滄海思自來焚筆硯何以謝相知過吳門懷舊香殘帶緩不勝愁又見蕭條一片秋身到故鄉翻是客心隨明月許同舟數聲新雁凌江下幾㸃寒鴉逐水流遮莫生平多少恨閒吟欹枕更悠悠送人愁人數行淚不許秋風吹吹入長江裏江流無盡時口占金炊玉饌滿行厨不惜傾囊向酒壚忽漫相逢便相許比來専畏霍家奴為訥齊贈歌者玉蘭娥娥紅粉惜春樓座客能銷徹夜愁不是新聲名擅早如何偏解唱凉州同屠庚朏董遐周駱天游游武林西山得厨字偕遊玉勒紫騮駒雲白山青去路迂不借僧寮炊午頓竹煙一片繞行厨項隱君珮珮字吹聆秀水人文學吳巨手內子能書擅畫喜讀書工詩本以貴族令淑國破家亡與其君子偕隱荒村諷詠自若誠可謂安貧樂遁白首相莊者著有藕花樓集一卷雪灘陳太史盟為序未刻王端淑曰鴛水為人文藪吹聆具賢淑之姿聰敏之質為詩髙老不減三唐朗雲堂家集次孔彰兄韻詩壇此夕並賢宗彤管風微亦我容月轉簾櫳排雁序雲深庭砌護芝茸本無金谷繁華慕祗似蘭亭少長逢檢㸃溪藤兼石墨老兄雙袖未龍鍾雪後贈鍾姊姚夫人太傅門風舊所思新歡得繫蔦蘿絲夫人弟真逺才士也有女許字易兒女嬃不詈申椒賦道藴原嫺若栁詩寶髻雲光青鳯羽羅衫花樣碧桃枝野漁未漉山南酒白雪遙觴女導師題外居卍齊葺齊遴製雅名卍較蕭殊秋水盈盈碧幽欄曲曲朱影分金粟字光引日南珠觀世悲同佛間家慶有儒菲葑從說項牛斗式躔吳薤篆新題額螺文舊湧膜當軒宜獨寤側席儼雙趺憂國逾簪組談空異苾芻牀塵琴靜拭庭草鶴歸扶解畫襄陽孟曾師安定胡何賓言自牖有婦學撡觚管叶飛隨鳯絲深隱鑒蛛窮安君子固疾禱衆生無室是維摩幻顔非子夏臞六忩隨便應一榻懶輕敷經緯參前謝風流擁大蘇聨吟單作甫合燭耦猶吾啓幕明星爛翺翔弋曉鳬送外已識風塵苦經春又別離釣船迎水去無處不牽絲閲午夢堂返生香集追賦霏霏玉影未全虛照眼分明白鹿車夢到不堪重夢處淒風吹滅舊遺書返生香爇返生時莫倚青蛾認舊眉絶世才華消不得自應長揖作男兒歸隱君淑芬淑芬字素英嘉興人文學髙陽繼室夫婦偕隱初居花村晚遷香溪有雲和閣集崇禎間嘗與秋涇黃月輝德貞吳門申蘭芳蕙共輯名閨詩百花詞歸自為序兼工書畫然筆墨珍惜購之不多得也村居除夕爆竹荒村少蕭條四壁虛幕連殘日捲春向早梅舒蓬鬢來朝整愁心此夜除屠蘇相對飲守嵗只翻書早秋懷外君遊武林一葉飄金井鳴蛩怨早秋徘徊閒對月寂寞自登樓懶看雙星㑹端居萬籟幽無眠難入夢何以慰離愁題陸右黃徐夫人畫茅屋疏籬近水開前峰疊疊樹如苔雖然有路通樵採截斷煙雲未許來詠喚嬌娘次申蘭芳韻隱隱聲傳綺閣中何愁巧畫繡難工休猜仙珮凌風度且數青蚨換綵絨申賢媛蕙蕙字蘭芳吳門申文定公曾孫女適秀水沈廷植草書法孫過庭詩蒼老不作閨閣中語有縫雲閣集與淑芳齊名世稱二雲閣詩草云秋日宴别金陵葉夫人昔別虎丘下今逢鴛水前停橈黃葉浦把盞白雲天去路恰千里看山剛半年天涯戀知已各為檢詩篇林屋洞龍洞雲封處千山路半迷常年人不到終日鳥空啼石泐蒼苔護瀑懸晴雪低有懷探玉簡一傍隔凡栖秋日登屏山樹密影重重秋聲萬壑同不知山上月剛到竹林東出郭出郭尋春日未斜行來溪畔兩三家枯藤半束疏籬外一路寒梅未放花春睡深院回廊鎖緑楊閨中午睡夢初長只嫌春懶慵針線燕落香泥汚繡牀楊柳詞楊柳青青燕子遲曉風初月挂相思欲添鏡裏新蛾樣揀得樓東第一枝題畫結廬斜傍白雲中萬壑濤聲松際通林外有人知問渡深山不盡晚來風長春姐長春姐嘉興人黃氏婢寒山陸夫人嘗以詩贈之云剪破楚山雲繪作芙蓉履有時渡湘江片片隨流水著有惜春記事曉妝作漫學吳姬作淡妝枕痕未減夜來香花簪碧玉扶雲髻妬殺尋常姊妹行和㑹稽女子驛亭二絶弱質何堪馬上塵失身誰復更憐身傷心不作還家夢孤負江南一夜春情緒紛紛訴向誰昔時脂粉盡成悲青燈此夕憐孤影何事天涯不淚垂伎人吳綺綺字繡君嘉興妓與孝亷朱治􅍀甚昵崇禎末朱棄其妻而娶之從宦東粵不知所終自題蘭石清影留紈素疏香隱石苔風微無所著濃淡有由來冬日畫蘭便面幽意隨有得呵凍聊寫生真堪紉作佩霜霰不勝情伎人徐翿翿字雪翾嘉興妓人女小字阿佛性慧能詩隨母遷吳江盛澤遂著聲青樓間每同當湖武原諸公遊然心厭穠華常與一士有所約不果因作秋怨詩後歸貴介周某周卒祝髮為尼秋怨五首有引獨處善懷凉秋易怨兼以病骨支離而永好中絶彤管在御聊代萱蘇以寫幽憂云爾非敢擬盤中作也自許恩情百嵗同那堪棄置任秋風開簾見月還羞月似笑齊紈笥篋中露華㸃砌舞衣單人在空房怯倚闌記得與歡相傍處夜來風雨不知寒枕接離痕兩自知空牀無語只疑癡鸚歌不量伊人逺只管忩前喚畫眉錦簟孤棲燈灺青薰籠斜倚漏三更西風欲破人愁寂吹入芭蕉作雨聲蕭瑟還同落葉蟬輸他吸露飽風煙乍拚身試相思味檢㸃腰肢足可憐姜月上月上烏程比部潘湛妾嘉興人贈黃給諫夫人楓落吳江一葉輕自憐踪迹任浮萍殷勤記取池邊柳曽入東風眼倍青懷黃夫人時夫人赴閩雁字雲飛竚逺思思君惟日誦君詩梅花我自江南寄望到香籠新荔枝鴛湖女郎女郎不知何許人見草堂詩餘王端淑曰情詞兼到開口媚利使人吁絶鴛鴦湖竹枝鴛鴦湖上浪生花煙雨樓頭月吐華此夜與君溪上别夢隨水月到君家寓鴛湖女子女子楚人明季隨父宦白門南都失守父殁於任有母黨宦浙欲往依焉同母舟過嘉興遇中表某生亦避亂寓此一枝暫憩生亦才貌俱優女私與訂盟未五月而郡城復破生隨軍北行勢不能還寄詩通問女子得詩感和隨病而亡念女初未字與改節不同卒至死不二與守貞何異其偶存四詠亦非白頭吟胡笳拍比時逢兵燹遷徙無常亦恐墮家聲祕勿敢語故鮮有知之者竟陵江楚望為女之至戚出詩以示人并述其由有霅溪䒶放翁者梓之以傳和某生詩四首文士非無行其如薄命何今空思化石昔悔不投梭紅葉詩猶在青春日易過自憐憔悴甚懶復畫雙蛾多病腰肢瘦年來減幾分奩餘螺子黛箱疊石榴裙誤解江妃佩羞回織錦文屢憎春夢惡相見尚殷勤追憶從前事空閨漫自評君何曽薄幸妾愧負多情書寄人千里燈挑夜五更别留衣帶字磨滅不分明踐盟原不易況值世情涼自分姻緣短空嗟嵗月長簫聲孤彩鳯燕語傲雕梁共訝癡兒女無端涕滿眶檇李詩繫卷三十四
