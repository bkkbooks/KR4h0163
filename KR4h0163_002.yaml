body:
  text: 檇李詩繫卷二平湖沈季友編宋吕進士諤諤嘉興人天禧初登進士第後天聖景祐間二弟曰詢曰評相繼登進士皆有名於時嘉興登進士者自其兄弟三人始盛題閻立本北齊校書圖由余入秦毁詩書意在兵强黔首愚弊極煨燼㡬無餘髙齊風俗元自殊豈料乃喜知卷舒况復是正叢冠裾公言所貶固不虚我獨謂其勝由余聞人郎中安道安道字彞庚嘉興人寶元戊寅進士禀性沈篤不輕笑語博覽羣書尤精禮樂監睦州酒税趙清獻公為守知其賢遂與定交通判歙州時方行青苗錢散及一萬加俸安道曰吾不能去官然亦不願加俸歴官職方郎中知南康軍罷歸與東坡温公交善詩筒往來最多云題招提院静照堂考見題咏白茅結宇自粼粼靜照初題梵字新己向萬緣無斷處應為一念不生人風幡蕩漾原非動水月澄眀未是真宴坐經行惟此地箇中消息與誰親聞人博士安夀安壽嘉興人以父建䕃國子博士題静照堂名藍小隐惬髙情雅構堂深豁眼明萬慮平時身可外一軒安處道初生花縈寶砌當春盛香滿金爐入座清復有高人乘興至為題佳句遍雕甍白牛居士陳舜俞舜俞字令舉嘉興人慶厯中舉進士嘉祐間中制科第一僉書壽州判官司馬温公贈詩云海隅方萬里豪儁㡬何人百沐求才盡三熏得士新聲華四方聳器業一朝伸他日蒼生望非徒澤壽春熙寧初以屯田員外郎知山隂青苗法行不奉令上疏自劾責監南康酒税在貶所日與太博劉凝之跨雙犢窮泉石之勝李伯時畫為圖休寜吳儆題詩曰汗血聲利塲舉世循一軌霜風老觳觳松路石齒齒牛痩僕夫疲累累山谷裏兩翁非病狂顧獨不取彼牛背有佳處未可語俗子夷齊向千載凛凛有生氣試問齊景公烏用馬千駟及歸嘗乘白牛往來溪上自號白牛居士鄉人因名其居曰清風涇東坡有和陳賢良詩云不學孫吳與六韜敢将駑馬並英豪望窮海表天還逺傾盡葵心日愈髙身外浮名休瑣瑣夢中歸思已滔滔三山舊是神仙地引手東來一釣鼇舜俞有小鬟曰妙奴一日於西湖放舟宴秦少游出以佐酒少㳺贈之詩云西湖水滑多嬌嬙妙奴十二正芬芳肌膚晳白鬢脚長含語未發先有香溪上夜宴侍簮裳皎如華月墮滄浪音聲入雲能斷腸不許北客辭酒漿主人藹藹邦之良少年射䇿謁未央俊詞偉氣森開張玉杓貫斗生怒芒天欲文采老更昌故使斂翮窺羣翔五十僅補尚書郎浩歌騎牛倚徜徉東風戲雨花草狂一溪泱泱青黛光妙奴勿倦侑羽觴主人正欲遊醉鄉又韓魏公有答陳舜俞推官求全瓦古硯詩云鄴宮廢瓦埋荒草取之為硯成堅好求者如麻㡬百年宜乎今日難搜討吾邦匠巧世其業能辨瓌竒幼而老隨材就器固不遺大則棟梁細棼橑必須完者始稱珍何殊巨海尋三島荆人之璧尚有瑕夏后之璜竟無考况乎此物出坏陶千耕萬斸常翻攪吾今所得不專全祕若英瑤藉文繅君詩苦擇未如意持贈只虞咍絶倒君不見鎮圭尺二瑁四寸大小雖異皆君寶及卒蘇軾為文哭之稱其學術才能兼百人之器將以身任天下事而一斥不復士大夫識與不識皆㴱悲之梅聖俞有詩悼之云書對三千字恩科第一人鯤魚飛北海龍劒躍平津直悟崇文主深論險尅臣已能明世弊何怍幕中賔所著有都官集廬山記行記題婁億墓彼何人之門兮雁行馬車老夫懐金兮童子紆朱其取萬鍾兮不差毫銖庖有梁肉兮腹無圖書天之生此兮何罪何辜句讀其話言兮節文其步趨抱筆而宵吟兮鋪楮而晝塗天子招其以仕兮鄉人勉呼衆肩相煦磨兮疾駕争馳驅有司五上吾名兮禮部曾不一如退將羸其角兮進且䟦其胡行年幾六十兮僅免為白徒一秩不能勝兮朝强而暮殂考妣其謂我何兮遑悼妻與孥高者我難諏兮厚者行難語諸百恨寂默兮秋草之墟附考墓在嘉善胥山五都今名婁坟億為機之曾祖宋㕘知政事也保聖院門深鎖蒼苔地靈育嘉樹寂然烟雲宅不接朝市路茍能灰心居即是古樂處林屋洞洞天三十六第九曰林屋神仙固難名瓌恠存記録曠歳懐尋賞兹辰幸臨矚馳神在真游豈復惴深谷解襪納芒履燃松命先燭初行已傴僂漸入但匍匐顧瞻避衝磕濘淖沒手足如此百餘步始可立寓目或垂若鐘簴或植若旌纛有如案而平有類几而曲鐫刻非人工晶瑩粲黄玊遙知竅穴外定有金庭籙凡肌不可往叩擊安敢黷鸞鳳無消息但見白蝙蝠却還望微明既出猶喘促沾衣憐石髓孰悔泥塗辱庶㡬達微慕養生相吾福毛公壇古壇叠亂石草木何㕘差黄衣宇其旁陳迹刋豐碑日初劉真人齒髪不可訾但見紺緑毛被體鬖鬖垂雲駢一日去空山留庭壝弟子散巖谷荆榛蔽荒基晚有周息元探訪親斬披白鹿忽跪前靈符見葳蕤地勝人既偶凝嚴起宫祠束帛下幽聘良馬維素絲前朝揖髙風有美皮陸詩殆令三百年事去物亦隳喬松委樵蘇野蔓號狐狸惟有煉丹井甘冽無等夷一酌匪消渇欽慕尚神禧右二詩見盧熊蘇州府志題秋浦亭牢落真秋浦江山滯客舟身同雁南去心似水東流鷗鳥荒烟裏漁人古渡頭只因山色好來上九華樓題碧鮮亭瀟灑闌干碧玉叢頻來遊賞似兒童縈迴脩竹撩清影刻畫新詩遶翠筒十載雪霜林色改㡬番風月酒尊空子猷老去心長在終擬為隣作醉翁附考一名碧蘇亭在嘉興治東三十六里凈土寺五代時為漢南王宅宋祥符中賜額槎洲聞説槎洲似沃洲一溪分作兩溪流長橋跨㟁虹垂地髙閣凌空蜃吐樓浩蕩乾坤供醉眼凄涼風雨送行舟憑誰為問槎邊客未必無人犯斗牛青龍江醉眠亭酒擔長輕六印腰醉中一枕敵干朝興亡藐比榮枯栁聚散看同旦暮潮清興本應塵外得香魂徒向水邊招已聞佳士過從約不為東風返畫橈題廬山醉石聒䀨飛泉清遶石悠悠天末翠鋪空是非分付干鍾裏日月消磨一醉中栁絮任飄荒逕畔菊花仍在舊籬東水聲山色年年好甚使遊人恥素風谷簾泉玉簾鋪水半天垂行客尋山到此稀陸羽品題真黼黻黄州吟咏盡珠璣重來一酌非無分未挈吾缾可忍歸終欲窮源登絶頂帶雲和月弄清暉弄水亭未識貴池好嘗聞弄水名白鳥鑑中立畫船天上行廬山棲賢寺辟蛇行者應開寺拭眼髙僧尚有墳龍去雨歸三峽水鳥銜花出五峰雲錢御史顗顗字安道無錫人治平末為殿中侍御史王安石新法行顗極言其弊坐貶秀州遂卜居焉家貧母老每貸親舊以給朝哺蘇軾贈詩有烏府先生鐵作肝句目為鐵肝御史又有長歌贈之兼寄其弟惠山山人云鴛央湖邊月如水孤舟夜榜鴛央起平湖繫䌫石橋亭慙愧冒寒髯御史結交最晚情獨厚論心無數今有㡬寂寞抱闗嘆蕭生耆老執㦸哀揚子恠君顔采却秀發無乃遷謫反便美天公欲困無奈何世人共抑真疎矣毘陵髙山錫無骨陸子遺味東氷齒賢哉仲氏早拂衣占斷此山長洗耳山頭望湖光潑眼山下濯足波生指倘容逸少問金堂記與嵇康留石髓嘉興李巨山顗甥也東坡過顗小酌其女數歳以領巾乞詩坡即書一絶云臨池妙墨出元常弄玉嬌姿笑柳娘吟雪屢曾驚太傅斷絃何必試中郎題爛柯山春郊雜遝擁紅旌共訪仙蹤嘯傲行雲徑直從深崦入石梁宛在半霄横巖邊瑶圃新開出洞裏芝田舊種成羽客一枰無復見青山留得爛柯名沈秀州括括字存中湖州人嘉祐中進士累官龍圖學士博學洽聞凡律樂醫卜諸家皆有論著嘗使契丹圖其山川風俗上之元祐間謫知秀州卒柳志收入流寓今仍之秀州秋日草滿池塘霜送梅林疎野色近樓臺天圍故越侵雲盡潮上孤城帶月回客夢冷隨楓葉斷秋心低逐雁聲來流年又喜經重九可意黄花是處開歎老為覓少年心不得當時感舊已澘然情懐此日君休問又老當時二十年鄜延凱歌五首先取西山十二州别分子将打衙頭回看秦塞低如馬漸見黄河直北流天威養地過黄河萬里𦍑人盡漢歌莫堰横山倒流水從教西去作恩波馬尾胡琴隨漢車曲聲猶自怨单于彎弓莫射雲中雁歸雁如今不寄書旗隊渾如錦繡堆銀装背嵬打回回先教净掃安西路待向河源飲馬來靈武西涼不用圍蕃家摠待納王師城中半是闗西種猶有當時軋吃兒郭樞宻三益三益字慎求海鹽人元祐三年進士為常熟丞時常平使者調蘇湖常秀四州人濬青龍江三益所部前期告辦使者留之使助他邑三益竟引歸後累官刑部尚書同知樞宻院事題紫籜山廣度院羲和均四時曜靈有急節沈迷簿領書坐歎春事歇及兹新雨收西郊軔初發蒼頑山氣嘉奔悍溪流活風驚麥翻浪水浄秧抽髪漸窮蕭寺逺頓使煩襟豁蜂喧釀蜜翅鳥落啼林血高僧日無事種植畦畝濶緑苗已紓紓紫花行復結吾欲訪長生終歳期採擷題天台寒巖道人棲碧山雲歸在空曲十年海潮音外物縁已熟時攜貝葉書步入深林讀宵眠䕶神虎晝引穿花鹿庵中三昧語藥我貪癡毒何當脱雙鳬藜杖追高躅題南山寺洗光朝日上旋旋瑞色分臨此地先門迥帆收江市宻山深龍臥海潭圓净然柏子聴幽偈閒立苔痕問小禅莫訝潮平歸渡晚斯遊有意己三年題南岳古木隂森梵帝家簾泉一酌試新芽官符星火催春焙却使山僧怨白蛇華亭逸人李甲甲字景元居海鹽華亭鄉後析平湖自號華亭逸人善為填詞小令有聞於時畫翎毛有意外趣海岳外史嘗稱之東坡題其畫曰郭恕先之後一人而己嘗畫竹於嘉興景徳院東坡過之題詩曰聞説神仙郭恕先醉中狂筆勢瀾翻百年寥落何人在只有華亭李景元甲亦有和詩見柳志又晁無咎有題周彥兼所收李甲畫三絶鵲云上林花妥逐鶯飛愁絶江南雪裏時嚄唶何須傍簷喜毰毸相對兩寒枝雁云網羅無限稻粱肥憐爾冥冥亦庶㡬戲鴨眠鳬滿中沚衡陽無意更南飛鴨云急風吹雪滿汀洲近臘淮南憶舊遊小鴨枯荷野艇冷去年今日凍高郵題竹和東坡韻翠葉彤竿已占先湘雲千叠勢争翻野夫不識天人面知是虞皇第㡬元毛秀州滂滂字澤民江山人政和間守郡因家焉先是元祐中東坡守杭滂為法曹秩滿辭去是夕東坡宴客有妓歌惜分飛詞問誰所作妓以毛法曹對東坡語坐客曰郡寮有詞人不及知某之罪也翼日折柬留連滂因此得名滂嘗受知曾文肅擢寘館閣文肅南遷坐黨與得罪流落久之蔡元度鎮潤州與滂俱臨川王氏壻滂傾心事之唯謹一日家集觀池中鴛央元度賦詩末句云莫學飢鷹飽便飛滂和曰貪戀恩波未肯飛元度夫人笑曰豈非適從曾相公池中飛過來者耶滂慙不能舉首高郵陳造題其東堂集云韻語精湥婉雅視秦黄晁張蓋不多愧其板刋於嘉禾郡庫予校文時得寶藏之詠桂玊堦桂影秋綽約天空為捲浮雲幕婵娟醉眠水晶殿老蟾不守餘花落蒼苔忽生霜月裔仙芬凄冷真珠萼娟娟石畔為誰妍香霧著人清入膜夜深醉月寒相就荼䕷却作傷心痩弄雲仙女淡紵衣烟裙不著鴛央繡眼中寒香誰同惜冷吟徑召梅花魄小蠻為洗玻璃杯晚來秋甕葡萄碧響應山禱雨寄東坡雪意不肯休垂垂閣雲端餘暖蒸衣裘勢作墮指寒曛黄隂雲來俄忽急雨􅟎空堦荅檐語跳珠上闌干世尊儼無説凍坐誰為歡蕭條僧舍影癡兀依蒲團相照憐短檠坐恐膏油乾勞生竟何如歳月如走丸七星在長劔細事何足弹尚想丘園人慙頰時一丹徘徊經屠門飽意只自謾顧唯揮牛刀庶足厭一餐不然學農圃趂此筋力完年豐得飽飯日晏眠茅莞咄嗟萬里空俯仰百歳殚行止信流坎所遇隨足安勲名片紙薄天地如瓢簞離騷幸相逢濁酒聊自寛誰與談此心夜氣方漫漫絶牆過飢鼠翻倒争餘殘紅梅何處曾臨阿母池深将絳雪㸃寒枝東牆羞頰逢誰笑南國駝顏强自持碧玉潭水面平波一境空夜深明月照龍宫猿聲未響潭先響一樹花開兩樹紅定光禅院曉出開霜阪飢烏啄麥畦山腰餘雪痩天面冷雲低寒意梅花北禅心柏子西窗前借殘月照我渡前溪陳學士與義與義字去非汝州人政和初登第宣和中徽宗見其賦墨梅詩遂登冊府厯徽猷閣直學士知湖州紹興間掌内外制㕘知政事乞外除資政殿學士復知湖州卜居崇徳青墩鎮後析桐鄉築簡齋居之遂號簡齋與義不妄言笑接人甚和而中不可犯薦士不使人知其出處氣節翰墨文章為中興大臣之冠當時風雅㡬廢與義獨以詩名有簡齋集評者謂元祐後詩人迭起一種則波瀾富而句律疎一種則煅煉精而性情逺要之不出蘇黄二體而已及簡齋出始以老杜為師建炎以後避地湖嶠行路萬里詩益竒壮造次不忘憂愛以簡嚴掃繁縟以雄渾代尖巧第其品格自當在諸家之上劉辰翁為序而傳之吳草廬題其奏槀後云君臣宻勿紹興中文物依稀貞觀同三幅奏篇存雅製諸家題字總名公已聞玉匣人間見空想銀鈎天上工百八十年如一夢摩挲遺墨視䝉䝉去非少學詩於崔鶠徳符嘗請問作詩之要崔曰凡作詩工拙所未論大要忌俗而已天下書雖不可不讀然慎不可有意於用事去非亦嘗語人言本朝詩人之詩有慎不可讀者梅聖俞有不可不讀者陳無已也見宋睢陽徐度却掃編題簡齋我窗三尺餘可以閲晦明北省雖巨麗無此風竹聲不著散花女而况使鬼兄世間多歧路居士繩牀平未知阮遙集㡬屐了平生領軍一屋鞋千載笑絶纓槐隂自入户知我喜新晴覓句方未了簡齋真虚名美哉亭西出成臯闗土谷僅容駝天挂一匹練雙崖鬭嵯峨忽然五丈闕亭構如危窠青山麗中原白日照大河下視萬里川草木何其多臨髙一吐氣却奈雄風何辛苦生一快造化巧揣摩險易終不償翻身下殘坡出山道中雨歇澹春曉雲氣山腰流高厓落絳葉恍如人世秋避地時忽忽出山意悠悠溪急竹影動谷虚禽響幽同行得快士勝處頻淹留乘除了身世未恨落房州留别天寧永慶乾明金鸞四老我生能㡬何兩脚疲世故忽破巴丘夢還尋邵陽路窮鄉得四老足以慰遲暮勝事逺公蓮深心懶殘芋本是羣山雲暫聚常别去那知天風便不得還相聚凡情我未免臨别吐幽句慎勿過虎溪曉霜侵杖屨别岳州朝食三斗葱暮飲三斗醋寧受此酸辛莫行歳晚路丈夫少壮日忍窮不自恕乘除冀晚泰乃復逢變故經年岳陽樓不見南宫樹辭巢已萬里兩脚未遑住水落君山髙洞庭秋已素浮雲易歸岫逺客盡囘顧飄然一瓶錫未知所挂處寂寞短歌行蕭條逺遊賦學道始恨晩為儒孰非腐乾坤杳茫茫三歎出門去偶成古調十六韻上呈判府兼贈劉興州稽首蘇耽仙乘雲去無迹尚留橘井在與世除狂疾誰能不飲此識味亦可録坐令鄭𤣥牛亦抱荆山玊偉哉稚川裔神交接朝夕游戲及小道造化入大筆優為吳詩父雅命楚騷僕豈其橘井助本自同仙籙坐中有劉子知是當時客書懸元和脚語經建康力先我登公門不數鷙鳥百曾挹兩仙袖自然生羽翼嗟我無長才學架屋下屋詩雖兩牛腰事亦㡬蛇足已窮猶不悔政荷師友徳文盟倘許余幸不疑籍湜再用迹字韻成一首呈判府風雨一葉過黄花已陳迹人貧交舊疎歳暮日月疾貪人積胡椒智不到鬼録那知庾郎菜地瘦飽金玉不如學服氣清坐了晨夕尚餘烟月債驅使入吟筆晚逢葛先生憐我出無僕借車得時詣謬窺文字籙談詩不知疲或作夜半客揮毫冩珠玊治郡盖餘力不羨江千萬不慕李八百願傳公句法容我附風翼城東劉子政著書方滿屋昨示一篇詩三日歎未足仍聞供筆硯家有樊通徳但恐裴公門從此近捨湜廣福院晚眺考見題咏澤國候易變孟冬乃㣲和解襟凭小閣日暮歸雲多蒼蒼散草木莽莽雜山河荒野蟲亂鳴長空鳥時過萬象各有待唯人顧紛羅僃物以養已更用干與戈天風吹我來衣袂生㣲波幽懐渺無寄蕭瑟起悲歌茘枝炎精孕秀多靈植荔枝佳名聞自昔絳囊剖雪出雕盤尋常百果無顔色閩天六月雨初晴星火熒熒耀川澤歘如彩鳳戲翺翔爛若彤雲堆翕爀中郎裁品三十二陳紫方紅冠儔匹鹽蒸蜜漬尚絶倫啄瓊空羨南飛翼我聞政和全盛時貢輸不減開元日涪州距雍已云逺况此奔馳來海側繡衣使者動輶車黄紙封林遍阡陌浮航走轍空四郊妙品人間無復得似聞供給只纎毫往往盡入公侯宅驪山廢苑狐兔静艮嶽新宫鼙鼔急繁華今古共凄涼遶樹行吟悲野客西風刮地戰塵昏一聴胡笳雙淚滴隂風隂風三日吹南極二月巴陵寒裂石長林巨木受軒輊洞庭倒流瀟湘黑君不見古廬竹扉聲䇿䇿中有竛竮落南客曽經破膽向炎官敢不脩容待風伯初至陳留南鎮夙興赴縣五更風搖白竹扉整冠上馬不可遲三家陂口雞喔喔早於昨日朝天時行雲弄月翳復吐林間明滅光景竒川原四望鬱髙下蕩搖蒼茫森陸離客心忽動羣雁起馬影漸薄村墟移須㬰東方雲錦發向來所見今難追兩眼聊隨萬象轉一官已判三年癡只將乘除了吾事推去木枕收此詩寫我新篇作畫障不須更覓丹青師述懐呈十七家叔兒時學道逃悲歡只今未免憂飢寒浮生萬事螘旋磨冷官十年魚上竿竹林步兵亦忍辱長安閉門出無僕門前故人擁廬兒正坐向來甘碌碌君不見古人有待良不多利名溺人甚風波垂露成帷仲長統明月為燭張志和塵中别多㑹日少世事欲談何可了胸中萬卷已無用勸公留眼送飛鳥兩翁觀光今㡬時賦歸有約時已稽未暇藏身北山北且須覓地西枝西願從吾翁歸洗耳不用妓女汚山水肩輿亦莫要僕夫自有門生與兒子題唐希雅畫寒江圖江頭黄雲天醖雪樹枝慘慘凍欲折耐寒野鴨不知歸猶向沙邊弄羽衣黄茅終日不自力影亂弱藻相因依惟有蒼石如臥虎不受隂晴與寒暑舟中過客莫敢侮閒伴長江了今古年華去國頻更歳為官不救飢春生殘雪外酒盡落梅時白日山川映青天草木冝年華不負客一一入吾詩寒食草草隨時事蕭蕭傍水門濃隂花照野寒食柳圍邨客袂空佳節鶯聲忽故園不知何處笛吹恨滿清尊雨雲起谷全暗雨晴山復明青春望中色白澗晚來聲逺樹鳥羣集高原人獨耕老夫逃世久堅坐聴隂晴聞王道濟陷賊海内堂堂左如今在賊圍虚傳袁盎脱不見華元歸浮世身難料危途計易非雲孤馬西嶺老淚不勝揮道中雨子收還急溪流直又斜迢迢傍山路漠漠滿林花破水雙鷗影掀泥百草芽川原有髙下隨處著人家懐天經智老因訪之今年二月凍初融睡起苕溪緑向東客子光隂詩卷裏杏花消息雨聲中西庵禪伯還多病北柵儒生只固窮忽憶輕舟尋二子綸巾鶴氅試春風送熊博士赴瑞安令衣冠衮衮相逢處草木蕭蕭未變時聚散同驚一枕夢悲歡各誦十年詩山林有約吾當去天地無情子亦飢笑領銅章非失計歳寒心事欲深期觀雨山客龍鍾不解耕開軒危坐看隂晴前江後嶺通雲氣萬壑千林送雨聲海壓竹枝低復舉風吹山角晦還明不嫌屋漏無乾處正要羣龍洗甲兵題東家壁斜陽步屧過東家便置清尊不煑茶高栁光隂初罷絮嫩鳬毛羽欲成花羣公天上分時棟閒客江邊管歳華醉裏吟詩空跌宕借君素壁落栖鴉三月二十日聞徳音寄李徳升席大光新有召命皆寓永州塵隔斗牛三月餘徳音再與萬方初又䝉天地寛今歳且掃軒窗讀我書自古安危闗政事隨時憂喜到樵漁零陵并起扶顛手九廟無歸計莫疎除夜城中爆竹已殘更朔吹翻江意未平多事鬢毛隨節换盡情燈火向人明比量舊歳聊堪喜流轉殊方又可驚明日岳陽樓上去島烟湖霧看春生登岳陽樓洞庭之東江水西簾鈎不動夕陽遲登臨吳蜀横分地徙倚湖山欲暮時萬里來遊還望逺三年多難更憑危白頭弔古霜風裏老木蒼波無限悲對酒陳留春色撩詩思一日捜腸一百迴燕子初歸風不定桃花欲動雨頻來人間多待須㣲禄夢裏相逢記此杯白竹扉前容醉舞烟邨渺渺欠高臺感事䘮亂那堪説干戈竟未休公卿危下走江漢故東流風斷黄龍府雲移白鷺洲云何舒國步持底副君憂世事非難料吾生本自浮菊花紛四野作意為誰秋絶句野鴨飛無數桃花溼滿枝竹輿鳴細雨山客有新詩題池亭聊将兩蓬鬢起照千丈鏡微波喜揺人小立待其定墨梅潔白江南萬玊妃别來㡬度見春歸相逢京洛渾依舊只是緇塵染素衣秋夜中庭淡月照三更白露洗空河漢明莫遣西風吹葉盡却愁無處著秋聲西省酴醿架上殘雪可愛戲同王元忠席大光賦酴醿花底當年事夜雪糢糊照酒闌北省今朝枝上雪還揩病眼作花看竇園醉中海棠脉脉要詩催日暮紫綿無數開欲識此花竒絶處明朝有雨試重來重陽有感憶得甲辰重九日天恩曽預宴城東龍沙此日西風冷誰折黄花壽兩宫春寒二月巴陵日日風春寒未了怯園公海棠不惜臙脂色獨立濛濛細雨中次韻傅子文絶句風雨門前十日泥荒街相伴只笻枝從今老子都無事落盡園花不賦詩尋詩楚酒困人三日醉園花經雨百般紅無人畫出陳居士亭角尋詩滿袖風邨景黄昏吹角聞呼鬼清曉持竿看牧鵝蠶上樓時桑葉少水鳴車處稻苗多芙蓉白髪飄蕭一病翁暮年身世藥瓢中芙蓉墻外垂垂發九月憑闌未怯風代葛亞卿作君住江濵起畫樓妾居海角送潮頭潮中有妾相思淚流到樓前更不流青墩看牡丹考見題咏一自邊塵入漢闗十年伊洛路漫漫青墩溪畔龍鍾客獨立東風看牡丹懐二禪者殘年不復徙他邦長與兩禪同夜缸坐到更深都寂寞雪花無數落天窗沈學士晦晦字元用錢塘人微時徙居崇徳舉宣和狀元御試䇿題舉子不能條對晦精通象數一揮千言祐陵于聞喜宴上以御詩寵之除著作郎金人攻汴從肅王出質後得還為給事中高宗將召為中書舎人有論其布衣時事帝白頃在金營見其慷慨士人細行豈足為終身累耶然卒出知平江乞以建康太平鎮江池鄂五郡兵連横守江與韓世忠犄角金必不敢渡召募敢戰練習期年京口可成强藩趙鼎稱其激昂卒不果用進徽猷閣直學士終知鄆州題獨秀山老鶴下遥天昂昂在林表霜毛臨野人逸氣秋天杳矯矯顏始安不受冠帶繞清真自嵇阮一醉萬事了讀書空谷中生芻白駒皎長哦五君詠極目送飛烏竹溪寒流穿清閟支徑入翠㣲山深古木合林静珍禽飛居人本避世遊客亦忘機歸路晚烟暝新月照柴扉遊松陽百仭山山頭白雲如擘絮竹雞無聲鳩唤婦團團朝日上林梢寒食梨花溪口路一峰獨秀横溪隂青林倒影千丈深上有白龍蟄幽洞歳旱往往能為霖如今寂寞空山裏古屋荒壇冷紅紫㑹看前度種花人他年來作巢居子竹􅬃嶺九月亂山中﨑嶇處處同谿流因雨漲木葉著霜紅人跡千年絶松聲萬壑空尋幽自可問不復嘆途窮松陽上方山居五首月斜樹影穿窗入雨過山泉遶舎鳴野寺中宵人不睡蒲團布衲悟無生山中寒早野隂薄慘慘黄昏欲雨時市逺無人與沽酒地爐松火自燒梨天畔羣峰一草亭半溪烟雨花冥冥老翁投老得此景日與谿山同醉醒此生真與世相忘投老生涯寄上方洗足闗門枕書睡連山松檜雨浪浪學道空山歳月深丹成初試馬蹄金猶餘一勺丹泉水洗盡人間名利心吕朝士渭老渭老一作濵老字聖求嘉興人宣和末朝士有集不傳僅從趙師秀序其詞中得一詩稱其諷咏中卒寓愛君憂國意不但弄筆墨清新俊逸而已又有句云憂國憂身到白頭此生風雨一沙鷗又云尚喜山河歸帝子可憐麋鹿入王宫又云未湔嵇紹血誰發諫臣章縉紳巨賢多錄稿家藏但不窺全帙未能為刋行由此序觀之則當時已無鏤本矣惜哉傷世塵斷征車杳雲低毳帳深古今那有此天地亦何心王尚書希吕希吕字仲行宿州人高宗南渡寓居嘉興第進士為正言上章劾佞臣張説出知廬州累遷吏部尚書天性剛勁嘗切論近習用事上變色欲起希吕挽御衣極言之致政歸無屋可居上為賜錢造第入直賦景物玊堂晝永暑風微䔩䔩飛花落小池徙倚幽闌憑問訊夏鶯飛出萬年枝本覺寺三過堂考見後門外驚風吹細沙入門水氣湛清華呼童試向人間看巖桂應開第二花趙都監善應善應字彥逺又字慶公漢王元佐之後建炎間與其父自汴避地崇徳之洲錢因家焉洲錢在縣西北二十七里周遭皆水形如錢布故名南渡時士大夫避地者二十餘家蘇師徳吕正已及趙氏父子皆在焉善應生汝愚范令機扁其里曰生賢紹熙中與蘇吕諸公迭主詩盟即祗園精舎為盍簮之所故詩人沈文伯有翠娥環坐憶洲錢之句其生平流離感慨見諸篇什性純孝嘗刺血和藥愈母母畏雷雷輙走䕶之寒夜歸恐擊門驚母露坐達旦諸弟未製衣必不敢製官江西兵馬都監每四方水旱警報輒不食尤袤稱為古君子陳福公題其墓曰篤行寧師西閣飄泊南來㡬歳寒追談往事漫心酸雲烟暮隔中原望歸折梅花忍淚看次韻李長卿一别芳洲不計年舊時攀折柳依然故人似欲撩詩興賸折梅花向酒邊聞人主簿偲偲嘉興人官主簿題净因院湖海浮家二十年重來春色尚依然杏花籬角紅吹霧栁葉塘腰緑䕶烟草暖遊人分席地鳩鳴刺史勸農天覺塲獨占三災外試問支郎第㡬禪三災兵火盜也建炎兵後惟此院獨存朱少卿敦儒敦儒字希真一作希直號巖壑洛陽人少從陳東野學嘗賦古鏡云試將天下照萬象總分明東野竒之為人天性曠達以詞章擅名能書兼善繪事布衣時遂有朝野之望靖康亂避地自江西走二廣紹興二年詔廣西宣諭明槖訪求山林不仕賢者槖薦敦儒通達治體有經世之才三召皆固辭後復以薦起賜出身為祕書正字遷浙東提刑未㡬致仕僑居嘉禾構室南湖之濵室中所列琴缶阮咸金石名蹟皆目所未覩每貯果核挑以待客時棹小舟徜徉自放陸放翁嘗詣之聞笛聲自烟波間出行者曰此朱先生吹笛聲也及秦檜當國有携敦儒詩及所畫山水謁檜檜欲令敦儒教秦伯陽作詩乃先用其子為删定官復起敦儒為鴻臚少卿盖久廢之官也時頗榮遇嘗與米元暉對御作畫而敦儒耻以畫名輒退避不居敦儒舊有鷓鴣天詞曰云是清都山水郎天教懶慢帶疎狂曽批給露支風勅累奏留雲借月章詩萬首醉千塲㡬曾著眼看侯王玉樓金闕慵歸去且挿梅花住洛陽至是人乃為詩誚之云少室山人久挂冠不知何事到長安如今縱挿梅花醉未必侯王著眼看檜死敦儒亦遭論罷其實敦儒因老愛其子而畏避竄逐不敢不起識者憐之周益公謂觀其字如其詩其詩如其人不待識面知為伊洛勝流矣有樵歌三卷評者稱朱三十五希真五言如剪茅編雀屋篩米聚雞糧燈昏鼠窺硯雨急犬穿籬七言如㡬許少年春欲夏一番夢事緑催紅過時不語鸎解事怕客深藏魚見機人間萬事老無味天下四時秋最愁皆警䇿不蹈襲云洛中有八俊陳簡齋為詩俊朱巖壑為詞俊富季申為衣俊皆一時竒才也南渡以來詩俊衣俊皆為執政大臣相與力引獨巖壑骯髒不偶終以退休因作鶴賦以自况樓大防題之如此周紫芝有聞希真請老詩云平生恨未識朱遊每得新詩慰客愁泛宅清苕真得句挂冠神武更何求又云久厭朱袍裹玊仙幅巾藜杖老山間從今魚鳥緣應熟只恐鴛央債未還盖以希真有道人還了鴛央債之句也王庭珪字民瞻廬陵人紹興時為台州主管有和葛主簿寄希真詩云主簿四海士先生千載人羇遊厭旗鼓談笑出風塵高臥屢違旨榮名忽中身清詩何絶妙韲臼識餘辛小盡行藤州三月作小盡梧州三月作大盡哀哉官厯今不頒憶昔昇平淚成陣我今何異桃源人落葉為秋花為春但恨未能與世隔時聞䘮亂空傷神絶句青羅包髻白行纒不是凡人不是仙家在洛陽城裏住臥吹銅笛過伊川康臺郎與之與之字伯可嘉興人建炎中駕駐維揚與之上中興十䇿聲名大振宰相汪黄輩不能用及秦檜當國擢為臺郎專應制善為樂府時以栁耆卿目之有詞五卷凡中興粉飾治具及慈寧歸養兩宫歡集必假伯可之歌咏嘗與檜對局格天閣下檜戲曰此卒渡河是爾将軍之疥癩伯可應曰今皇御極視公宰相如腹心檜大喜撤碁酣飲而罷檜死與之亦謫五羊名勝志云番禺縣玉虹洞之南曰聚龍崗宋嘉興人康與之流五羊時居此桯史載其在高宗時與左璫狎適睿思殿有徽宗御畫扇上時持玩流涕璫偶下直竊攜至家而康適來留之燕飲出以示康康紿璫入取肴核輒泚筆書一絶於上即玊輦宸遊之句也璫出見之大恐而康已醉無可奈何明日伺間叩頭請死上大怒亟取視之天顏頓霽但一慟而巳鶴舒臺白雲深鎖路﨑嶇鶴去臺空景物殊山展翠屏連綺幕泉分清溜滴明珠道人只問丹砂井隠客猶尋九節蒲試問葛翁昇舉後至今遺跡事何如玊虹洞二首睡起疎簾一半開更無人迹過青苔須臾蒼狗風前變雷雨驅潮出海來滿山一夜風篁響透屋三更月露寒自掩殘書推枕睡江湖秋夢水雲寛題宣和御畫玊輦宸遊事已空尚餘奎藻繪春風年年花鳥無窮恨盡在蒼梧夕照中題清江松風亭二首天涯芳草盡緑路傍栁絮争飛啼鳥一聲春晚落花滿地人歸江上濃隂曉未開痩笻支我上蒼苔春寒前日去已盡今日又從何處來魯太府訔訔字季欽號冷齋海鹽當湖鎮人後析平湖兄詹崇寧初進士訔與弟詧同舉紹興五年進士人以比二陸一時弟兄子姪科第之盛甲於一郡其所居起橋顏曰三登訔官至大府卿嘗言支移折變利弊甚悉詔可其奏於詩喜杜工部嘗取其集考其年編次而箋釋之為十八卷世所傳魯冷齋杜詩定本是也及卒吕祖謙有淳熙四年春挽魯少卿訔詩云慶源滚滚接天流老桂傳香次第秋人物西都九卿選英華南國十洲遊翛然徑下滕王閣已矣長懐范蠡舟身後楚騷誰著録靈光舊草合兼收周必大為作墓忘叙其行事甚悉又系之詩曰競爽雲間陸應同天上張樂堂聨折桂南省繼含香風月三千首金釵十二行初終全五福似續付諸郎自摻江南袂思公歳月徂書來懐棣鄂人去重葭莩東粤仍閩粤當湖遂鏡湖堂成隨一相浮世竟何須訔有集今不傳僅從族譜中採得一詩惜未覩其全耳觀武侯陣圖西川漢鼎倚綸巾翠石纍纍作陣新一夜掃雲驚虎旅九天飛雨泣龍鱗當年已落中原膽今日猶憐故國身曽踏斜陽看舊壘英雄千古只伊人趙議幕汝能汝能字公舉海鹽人贅居崇徳紹興末舉進士知海陵改鬱林州削平巨冦冦所掠金寶盡藏一沼僚吏請發之笑曰鍾離意以為何如調守全州厯浙西沿海議幕壽八十自號雲谷道人題崇福寺羅漢閣即常樂庵考見題詠粉壁龍蛇渾欲動石橋雲水亦生寒香銷日晚人歸去聴盡秋聲到夜闌李提舉正民正民字方叔揚州人官朝奉大夫徽猷閣待制提舉洞霄宫建炎間高宗東狩四明正民著乗桴記以識之其事頗僃紹興中寓海鹽善屬文邑中碑記多出其手子直養即為海鹽令海月亭考見題詠海鹽注危亭注目了無邊脱屣塵寰思杳然萬頃秋濤翻浩渺一輪明月對虚圓光生銀漢疑無地望斷蓬壺别有天赤水棗花君莫問新詩賡唱似朱絃題清節軒考見題詠海鹽注新種修篁翠葉稠凛然清節坐驚秋官曹咸類崔斯立風味仍同王子猷暫却鷺鵷容退食他時鸞鳳小遲留吟哦自是名家事我亦身閒愧食浮題一擊軒考見題詠鹿苑寺本來無物可脩持一擊當年何所知拱手問師都不語等閒拈起布毛吹李正士長民長民字元叔正民弟與兄齊名亦能詩宣和元年舉博學宏詞獻廣汴都賦上甚喜二年除祕書省正字題一擊軒我聴風篁是梵音如何俗耳等閒聞自來擊處無人㑹千古知心只此君王布衣彦和彦和崇徳人工詩有名紹興間其書扇一詩光堯見之稱賞令盡進所作賜對以老賸賜金帛書中貴人扇天邊一線征鴻沒山色淺深墨未勻别浦漁舟待歸去夕陽渡口兩三人張尚書伯垓伯垓字徳象嘉興人紹興庚辰進士官尚書題崇徳莫氏椿桂堂考見題詠藝苑從來誇一第至比梯雲仰攀桂弟兄罕見五枝芳昔說竇郎今莫氏莫氏一門真可榮二難三秀衆美并見者歎羨不易及往往笞兒親短檠開國侯婁機機字彦發嘉興人乾道二年進士孝宗朝厯州縣有聲太子就學以機兼資善堂小學教授機手書累朝事親修身治國愛民四事以獻擢御史時蘇師旦怙勢言者皆罪去而獨惮機韓侂胄議開邊機不可御史鄧友龍附侂胄議遂劾去機侂冑誅召為吏部侍郎累遷參知政事封嘉興郡開國侯機慎惜名器愛選人材方當時艱而多彌縫禆賛之功著有帝王總要班馬字類諸書題日哦軒髙軒多暇日宴寢獨怡神風俗誰今古雲山自主賔灘平分燕尾松老半龍鱗徙倚清隂下吟懐愧昔人趙忠定公汝愚汝愚字子直父善應扈蹕南渡遂家崇徳靖康丁未生汝愚是年孝宗亦生於秀州此南宋君臣基命之數也汝愚少有大志每曰丈夫得汗青一幅始不負此生乾道間舉進士厯給事中知成都府分諸羌以弭邊患孝宗謂其有文武才光宗朝為吏部尚書同知樞宻院事孝宗崩汝愚請成禮上疾不從又請憲聖皇后垂簾主䘮及建太子㑹上臨朝仆地汝愚復請禪位嘉王以繫人心遂扶立寧宗除特進右丞相皆辭乞命朱熹待制經筵悉收召士君子之在外者韓侂胄誣其將不利於社稷逐之祭酒李祥博士楊簡皆言兩宫隔絶國䘮無主汝愚不避殞身滅族之禍戴翊陛下卒受黯黯而去天下後世其謂何乃并罷祥簡太府丞吕祖儉太學生楊宏中等皆上表代白悉就編置遂貶汝愚於永州至衡州暴卒天下聞而寃之初汝愚嘗夢孝宗授以湯鼎背負白龍昇天後翊寧宗以素服登大寶盖其驗也而讒者以為言侂胄誅復原官謚忠定贈太師封沂國公理宗詔配享寧宗廟庭加封福王所著詩文十五卷行世初汝愚之死也太學生敖陶孫賦詩於三元樓壁云左手旋乾右轉坤如何羣小恣流言狼胡無地居姬旦魚腹終天弔屈原一死固知公所欠孤忠幸有史長存九原若遇韓忠獻休說如今有末孫方擲筆飲未一二行壁已舁去陶孫知必為韓所廉頃之捕者至矣急更衣持酒具下樓與捕者交臂問敖上舎在否對曰方酣飲亟亡命走閩乃得免送學士汪大猷歸鄞尚書天官貴持經侍帷幄青冥欲無際白首非故約連檣動南浦父老望巖壑下車入里門執手問歡樂十年㡬風雨寒雞呌屋角勤勞畢我分帝賚出寵渥殊適奉香火禁直連六閣遂令宣室思從今問晦朔題天風海濤亭㡬年奔走厭塵埃此日登臨亦快哉江月不隨流水去天風直送海濤來題竹贈衛青叔之潭州颸颸忽見青鸞尾掃遍翠厓岡上頭昨夜月明仙子過玊笙吹徹萬山秋致爽軒濃隂夾道水流渠吹盡殘花不復餘惟有范家千畝竹青青依舊色侵書陳提轄炳炳字宜之閩人淳熙初主崇徳簿因居焉遷上虞令有西溪瀦水利及三鄉㕘政張綱嘗浚湖刻石歳久為豪右所據夏大早民請復豪右阻之炳曰令寧以罪去必不忍畏避强禦委棄三鄉民命也卒浚復之百姓歌曰前復湖張㕘政後復湖陳縣令與我衣食全我命除提轄文思縣有退庵集資福院平緑軒考見題詠水屋圍春緑雲岑送曉青無心向朝市信步到禅扄野意連天逺疎鐘隔㟁聴杯行莫辭醉簷月笑人醒錢循州文文字文叔崇徳人吴越王裔乾道間進士尉當塗捕敗私茶十數輩法當進秩力辭知萬載縣有異政趙汝愚薦可大用不果除知循州卒官朝奉大夫文體貌魁偉吐音如鐘言温氣和廉而好義居不蔽風雨饘粥不給晏如也詩亦清麗有則題梵竺卿蓬居考見方外梅繞蓬居不計株水仙數畹鬭芳腴竺卿白業二香妙世界紅塵一㸃無可比逺公蓮社勝應嗟陶令菊園蕪鑪薰清鼻茗澆舌月浸松窗對結趺莫大理若沖若沖字子謙崇徳人父琮自仁和徙居生五子元忠若晦似之若拙若沖俱得第時比五竇若沖為淳熙進士知安吉吳江有聲除司農簿輪對時用事者議開邊若沖諫阻之出知岳州賑荒剔盜境内帖然知全州漕司檄解軍糧湘源壤髙客舟不至遂發官帑造輕舟運之明年靖江大水民賴以濟最聞除大理丞乞歸有語溪集初春趙仁甫宴邑官平緑見招平緑題詩四十年尋幽不厭水雲邊一犁還又耕春後三白曽來醉臘前自笑挂冠林下客得陪揮麈坐中賢絶嫌幻色撩人思快覩晴川逺接天過崇勝院首歳融春卜有秋曉行猶自索貂裘身閒暫脱㣲官縛市隠何如此地幽一水相望三里近十年重到片時留買田擬作終焉計真是飄然不繫舟附考在崇徳縣東三里晉徐頵捨宅石門張氏園考見仙鬼為米徒勞束帶難當時彭澤便休官高情曽賦歸來句盡入名園扁署看葉太守廷珪廷珪字嗣忠號翠巖嘉興人紹興十八年由兵部郎中出為泉州太守其所著海録碎事傅安道序之謂其無一日不作詩老而益工如題琴泉軒云不是妙音生妙指只緣流水似流泉無名木云人休清樾摩挲認鳥泊髙枝睥睨看至其和錢起江行百詩士大夫多傳録之又作郡舎羅漢室詩云㡬多雁鶩行間吏衙退頻來禮釋迦可以見大府之風度矣其自序謂予家本田舎貪無書可讀曽大父以押綱至京市書數十部得盡讀之其後肄業郡學升貢上庠入仕四十餘年云兹登一詩出清河書畫舫茉莉露花洗出通身白沈水熏成换骨香近説根苗移上苑休慙系本出南荒莫進士若拙若拙字子才若沖兄淳熙中進士平緑軒即事結屋地猶淺鈎簾景盡還嵐光烟樹外野色酒杯間别墅從渠樂清吟屬我閒狎鷗時㸃白機事不相闗蔡漕司開開字子明崇徳人淳熙中進士宰徳清值軍興征調邑不擾知邵武郡初官租一石帶糴四斗僃賑後為民患開請罷之視時低昂俾民自糴患遂已除漕司兼知岳州㸃軍營田九軍一日而畢又區畫營佃軍國兩利改漕江西屬郡旱捐漕計以濟卒於官有畏齋集平緑軒瞰水地仍敞開窗望不迷良疇連逺近秀野混髙低曉起煙千樹春耕雨一犁道人深樂此壞衲且幽棲王教諭用亨用亨字子安自開封徙居崇徳淳熙間舉進士授丹陽尉益嗜學如舉子時手抄口誦至忘寢食試宏博科與倪思争衡分教襄陽以根抵之學表率士類嘗作二記曰不貪不欺此其行已之實也平緑軒二首翠痕㡬㸃出林端舟撼清流夜月寒却笑監湖臨水寺閉門不借俗人看禪窗虚敞瞰西南野色溪光接畫簷雲去碧天無間斷一眉依約見山尖衛文節公涇涇字清叔嘉興人孝宗親擢進士第一厯起居舎人使金還除直焕章閣知慶元府時權奸用事十年不調開禧初召為吏部尚書御史中丞請誅韓侂胄論罷右相陳自彊拜㕘知政事胄誅又患史彌逺欲去之彌逺乃諷御史劾罷涇知揚州除資政殿學士卒贈太師追封秦國公謚文節涇嘗請召朱熹還朝而熹已卒乃取諸經四書傳註刋布之所著文章奏議五十卷曰後樂集過澱湖疎星殘月尚朦朧閒趂烟波一棹風始覺舟移楊栁㟁直疑身到水晶宫烏鴉天際墨千點白鷺灘頭玊一叢欸乃一聲回首處青山渾在有無中聞人刪定滋滋字茂徳嘉興老儒也陸游老學庵筆記曰茂徳喜留客食然不過蔬豆郡人求舘客者多就謀之又多蓄書喜借人自言作門客牙充書籍行開豆腐羮店予少時與之同在勅局為删定官談經義滚滚不倦發明極多尤邃於小學云汪應辰有送删定聞人丈歸嘉禾詩云漫作中都士柴門每自扄遺經究終始竒字講聲形前輩今無㡬㣲言世莫聴扁舟轉河曲已見故山青周必大二老堂雜誌中載有聞人滋五説蚤秋遊靈巖凭欄山翠濕濛濛佛閣依然水殿風欲採蓮花何處所年年金井落梧桐葉文康公時時字秀發仁和人晚居嘉興淳熙中進士厯事四朝官終龍圖閣學士操履端方博學善属文邃於周禮著禮經㑹元及竹埜詩集行世卒諡文康自號竹埜愚叟還桑澤卿蘭亭考二首書法光芒晉永和後來摹冩不勝多考論又得桑夫子蘭渚風流轉不磨自從蠒紙殉昭陵定武流傳賸得名總輯舊聞為博議即今真贗不將憑陸和州埈埈字子高高郵人建炎初與兄塤徙崇徳登紹熙元年進士厯祕書郎倅和州議散武定軍諸州遂安攝濠州時冦猖獗埈開示大信以收人心散卒聞埈至受㕓者數千乃悉簡為勁兵改知和州養士厲俗修倉浚湟免歸卒有益齋集送奚宰茂宰慈祥意三年只似初折腰寧為米掣肘固難書機静波浮鳥刑疎網漏魚終然清議在衮字到公車醜梨我邑之東有醜梨貌雖惡風味絶勝聞嘗進御因賦五言灰貌凝清古霜津溢脆甜面嫌湯後白心慰邑中黔美實鍾寒谷珍嘗近御奩彼姝徒冠玊争得似無鹽和奚宰春風樓即事恍然楹桷架虚空意匠經營九仞功三載笑談杯酒裏一時人物畫圖中金蘭託契從今始玊燭迎和與衆同却笑楚臺雕篆客强生分别詫雌雄卜祖仁祖仁未詳詩見柳志觀吾侯一語當是嘉郡人攷宋紹興初鹽令李直養有禱雨陳山一事而詩中云侯今官轉吳興去則惟熙寧間鹽令有王震而武康令亦有王震又龔頤正陳山廟記曰紹熙元年郡守趙不迹作文以禱其應立至與李直養同時而不迹於紹熙三年轉吳興守或指此姑記之以質諸博雅者陳山龍湫考見卷八陳山蒼蒼東海頭石壁裂缺蔵靈湫老髯出水歘萬丈青山倒挂黄金虬神光上騰接烟靄挾子攖珠浴滄海雨公載雨推雷車閶闔門開叩真宰今年亢旱民罹殃我侯憫憫心若傷精誠披露動寥廓沛然甘澤來滂滂侯今官轉吳興去回首神峰隔天宇願言變化從雲龍大為蒼生作霖雨檇李詩繫卷二
