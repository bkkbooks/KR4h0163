body:
  text: 檇李詩繫卷八平湖沈季友編明朱大理逢吉逢吉字以貞崇德人洪武初為中書掾授寧津知縣有異政擢湖廣僉事坐事謫屯關中移戍山丹著童子習牧民心鑑二書再起陜西僉事入為大理丞同修國史尋命視蘇湖水利及畿內屯田單騎巡行寒暑不倦所建議皆軍國大計建文庚辰同董倫髙㢲志考試天下貢士年八十卒所著詩文集虞集為序千乘梨雲秋髙美梨熟萬朵絳雲蒸曽得君王喜因為里閈稱春香凝白雪曉夢入青綾何必潘郎賦佳名處處騰附考崇德有千乘鄉吳王飬兵放牧于此鄉有紀目坡遊屯涇錢林李雪花滿錢林社景如嘉慶坊一天風不動萬樹雪生香鮫女鳴珠佩仙人下玉堂清遊喜相遇踏月看春光附考崇德城北有錢林錢節婦詞錢家節婦近代無年才二十早哭夫㷀㷀獨守乳下孤豈無嫁時紅羅襦掩鏡不對雙鸞雛仰天誓養堂上姑青燈明滅啼夜烏教子讀書身辟纑天長地久夫骨枯清氷白玉終相如姑婦白頭心勿渝皇家有詔旌門閭光彩照耀鴛央湖千古流傳太史書附考節婦崇德錢升母詔旌之同貝季翔飲客樓酒半作客從黃鶴樓頭至醉舉鳳凰臺上杯甘雨洗天炎暑淨好風消酒暮懷開坐評月旦推吳士歌聽陽春憶楚臺歸到湖湘見明月有詩須托雁將來寄張世衡文穆公家四世孫清朝今見幾人存衣冠入市爭投轄風雨讀書深閉門坐詠逺山楓葉寺歸從新酒杏花村玉灣橋下莓苔路應有徵賢故轍痕送姑蘇劉孟功之官詔下鳴琴向霅川山中官府似神仙兩堤桑靄青遮縣一路稻花香滿船好客重逢東老樂化民寧讓魯恭先濟時方略平生定早晚聲華到日邊謝東白上人遺惠泉二泉自昔著佳名百里分來故故清卓地不勞飛錫響出罌猶帶潄雲聲酒醒瀹茗魂俱爽病起看山眼倍明才愧長卿能免渴相知誰似上人情題雲林畫昔年來看墨池鵝風雨扁舟載酒過一自春歸清閟閣幾番蛛網落花多㢲隱老人程僉都本立本立字原道自號㢲隱老人崇德鳳鳴里人後析桐鄉洪武丙辰以明經薦為秦府引禮見上奉天門賜馬匹楮幣後改周府忤貴戚謫雲南馬龍他郎甸長官司吏目時緬夷煽亂本立單騎諭之皆悅服後復叛西平侯沐英討之謂非本立未足安諸夷命為守禦乃冒暑雨深入楚雄姚安大理鶴慶麗江永安等地懷柔撫字凡九載夷民晏然建文初學士董倫府尹向瑶等交薦之徵入翰林纂修髙廟實録升僉都御史坐失陪祀調江西按察副使未行靖難兵至與吏部尚書張紞等俱赴應天府學自縊死有㢲隱集其文平易典實詩亦莊重非騁竒鬬妍者比明初渾厚之風猶可想見也送李學正之易州為賦桃花崦野性好林壑胡為來市鄽豈無桃花崦著我屋數椽深深崦中花萬樹春霞鮮居民非避秦鼓腹戴堯天花間長兒孫看花不記年我欲往從之路隔松蘿烟悵望小孤峰玉立青娟娟相逢李博士頗類長庚仙江東事幽討已有青鞋緣得官不厭冷幡然向幽燕振衣山上風洗耳石罅泉期君早歸來和我桃花篇木棉歌宿榮昌縣田家作田家無桑蠶不育寒機不奈蛩聲促陽坡種得木棉花雨晴雪㸃秋雲緑小姑大婦不梳粧日日採花如採桑青裙短短赤雙腳素手纎纎花滿筐歸來閉門月昏黑燃薪代燭光照室姑搖紡車婦在機一夜不能成一匹松州茂州道路難烏䝉烏撒雨雪寒丁夫運糧給邊餉賣布易米還輸官田家不織紈與縠木棉未得裁衣服何日邊城罷戰輸女織男耕衣食足題竹石小畫玉堂仙人松雪公寫竹正似石室翁雲林道人雖後出往往落筆生秋風吳人好書仍好畫百年遺墨千金價比來何處得此圖松雪雲林此其亞娟娟嫩玉才數莖烟梢雨葉縱復橫洞庭寒骨沈水底鐵索下取蛟龍爭却憶江南舊池館筆牀碁局何蕭散一行作吏事便廢十年不歸夢欲斷松雪子孫今幾人雲林弟子誰逼真得歸故鄉倘相覔竹枝掛我頭上巾山行晚至晉寧州太守史公留飲落日孤城小輕烟一水斜青山䝉氏嶮緑樹僰人家絶塞無來雁荒城有噪鴉多情此州尹勸酒說年華過嶠甸山斷村才見溪回路忽迷販茶非土獠勸酒是禾泥碧樹排雲直青秧插水齊欲忘鄉土念多事子規啼乳石詩并引象賢奉常得異石於演樂堂典寶周翁識之云道州乳石也奉常欣然以詩見遺余嘗怪李翰林集有云荆州玉泉山多乳窟中有白蝙蝠飲乳水而長生其大如鴉典寶荆湘人欲一問之未暇也今以道州乳石言之則荆州乳窟可知矣然又聞王烈入山得石髓青泥流出隨手堅凝氣味如粳飯按仙經云服之夀齊天地竊謂髓之與乳皆石之脂也髓其凝者乳其液者乎服髓者夀則蝙蝠飲乳而不死亦無足怪矣獨未知遁世長往之徒亦有服乳而長生者乎因賦詩答奉常并呈長史公且欲質諸典寶翁也聞道山中乳窟多乳泉流出石為窠洞門到夜飛蝙蝠驛路何年載槖駝野色忽看新培塿水痕猶認舊漩渦豈無青髓香如飯老我黃塵奈爾何柏峰為希仙道士作何處仙家紫翠房一峰烟雨柏蒼蒼羊眠白石雲根爛麝過青苔雨氣香羽節凌風天有籟絲囊盛露玉為漿頭顱我巳將華髮便欲傳君却老方麗江雪山玉龍峰髙九千仭日色晦明雲氣寒何當赤腳踏氷雪更有紅顔生羽翰石洞僧來晝騎虎瑶臺仙去夜乘鸞山靈於我豈無意一路天花落錦鞍自姚安出普淜層關飛鞚出寒雲萬木歸鴉亂夕曛山自蜻蛉川口合路從鸚鵡嶺頭分道傍築室新成市塞上屯田久駐軍逺客誰無鄉土念悲笳吹動不堪聞鶴慶驛㑹吳人馮廣文閩人林稅使馬蹄蹴遍隂崖雪直向居庸塞外行日落忽聞牛背笛川平始見鶴州城秋風千里蓴絲滑暑雨三山荔子生遷客相逢話鄉土天涯何限未歸情鄧洲驛平岡走馬神摩洞荒驛聞雞鄧睒川丹壑泄雲朝翳日玉泉隂火夜生烟一年殘厯愁來檢萬里新詩老去編山水不殊人事異中原歸計正茫然送教授致仕歸金華六十看山眼未昏草堂歸去卧烟村朝廷巳許乞骸骨衣食未須憂子孫上馬天風吹席帽落帆江月到柴門美芹炙背區區意他日難忘獻至尊君山别業畫卷題為王伯昂畫圗林壑起雲烟使者髙懷寄靜便背郭真成浣花屋看山如坐洞庭船柴門黃葉鄰僧掃石徑蒼苔野鹿眠如此故巢勞逺憶只應頭白是歸年揚州城門疏栁噪寒鴉郊外青旗是酒家無復春風舊桃李行人不必問瓊花題山水釣漁小圗人間萬事一絲輕江上數峯雙眼明老我不歸空看畫秋風又到洛陽城華陽駐馬橋絶谷層關路屈盤斜岡側嶂石㠝岏今朝駐馬橋頭立華嶽三峰正面看書山水便面送人歸楚西南六詔山無數多在蠻烟瘴雨間不似故鄉歸去好洞庭湖上看君山寄嵩明倅祖原善二首天涯相見故鄉人一話江南一愴神那復鴛央湖上醉畫船簫鼓閙青春風雨山忩客枕孤東方欲曙鳥相呼無人更似嵩明倅日日能來問病夫桐鄉雜咏十一首梧桐䕃清溪溪水波粼粼上有五色鳥下有黃金鱗秋雨洗白石春風生緑蘋願學羊裘子時來垂釣緡附考桐溪即梧桐涇巳見陟彼東山上惘然思謝安華露濕我衣海日升巖巒愧無如花妓醉舞追前歡飄飄谷風來吹墮頭上冠附考東山在桐鄉治東三里橫湖如匹練風景此中稀日暖赤鱗躍天晴白鳥飛寒松蟠石岸春水沒苔磯幾度斜陽晚漁舟渡口歸附考橫湖在桐鄉縣東南三里房星下照天池水水光一碧淨如洗驊騮何來塵滿身解却金羈濯清泚不識誰人樂少年春風栁下曽揚鞭驊騮忽爾化龍去空餘池水凄寒烟我聞渥窪在西極此水得名徒逺憶却憐駿骨世間稀佇立池邊三歎息附考洗馬池在桐鄉又有走馬岡相傳為吳越分疆之地鳳鳥從何來來止桐溪傍錦毛濯春雨綵翮晞朝陽蘋藻動浮彩蘭芷吹幽香鳳去今不返空餘鷗鷺行附考浴鳳沼在桐鄉千尺髙槐舊相門傳聞南渡此移根心經百嵗風霜苦身受三朝雨露恩破穴中宵經電火繁隂六月似雲屯池臺錦繡知何在幸爾青青尚獨存附考建炎槐在桐鄉梧桐生髙岡亭亭凌紫霄鳴鳳丹山來依此百年喬良材中琴瑟和聲合簫韶我非漢中郎詎識爨下焦附考鳳鳴梧已見寶地多竒蹤雙池鑿龍眼秋水涵逺空寒波應靈響陰雲翳或結夜月晴更朗對此長湛然塵心自蕭爽附考龍眼池見題咏鳳過桐溪水溪橋迎鳳名光搖錦翮動影落彩虹明夾岸梧桐老芳洲杜若生尚餘千古迹登覽一傷情附考迎鳳橋在桐鄉老禪西來兜率宫金曇舍利開芙蓉平地起作寶光相七級上凌天九重摩尼頂珠現穹碧丹霞掩映雞足峰八窗玲瓏縣皎月層欄翠滑扶神龍我欲乘虛求帝釋雲梯髙峻紅塵隔檐鈴停語寂籟冷白鶴飛下蒼烟夕附考惠雲塔見題咏天花墮虛空平地忽三尺異哉西方神現此水精域胎非托摩耶意叵勞刻畫乃瞻白玉相安用黃金飾一洗熱惱心悉依清淨力紅日起扶桑終焉化無跡其無本非空其有亦無色君看東逝波滄海不可測我來鳳皇溪古寺久荆棘摩挲雪佛碑碑斷字莫識金石亦已壞況非金石質萬事等泡影感之三嘆息附考雪佛碑在桐鄉楊太守任任字子重嘉興楊港人後析嘉善初生時有胡僧聞啼聲嘆曰此兒異日必顯但不免於刑耳洪武間由人才擢知袁州府黃子澄一見以國士許之壬午之變子澄出徵兵往約蘇守姚善航海善不可子澄乃至任家與任謀求舊君圗大舉事泄任與子澄俱被擒至京磔於市子禮坐死籍産族誅任生平詩文無可考見唯於髙壁所輯幽光録得詩一首為禮部黃侍中觀題翠微書舍射䇿列朝署官登少宗伯仁獸翔夏林天驥驟風陌夙學壯則行舊隱情未釋仰瞻𤣥雲敷俯挹時雨澤輸忠在經綸回夢托泉石丹紱榮緑蘿華軒貢蒼璧人生慎終始於道明損益竚子功業成還理謝公屐袁卜士杞山杞山字無考世居嘉興之陶莊後析嘉善豪俠好義與黃子澄謀匡復事露出逃行至吳江北門作絶命詞行吟數四自投於河有居民吳貴三者援而出之吳亦好義詢得其狀破家相容得免其四世孫即了凡袁黃也杞山神於卜有陶莊人胡浚字元海嘗從之學其母即杞山之姑也二人同遊金陵提㸃姚一山偶失金杯酷責其徒二人憐之占得剝之頤告之曰金在土中汝從西北隅掘下五寸則得矣如其言果得杯永樂八年一山薦二人於朝杞山稱疾不行為胡卜之得乾之五女杞山曰五屬君升陽在四子命又午也其有錫名之慶乎胡曰吾直壬午為水水而午者子之衝也果錫名必不離水杞山曰非徒然也四為淵又值升陽而五居淵上淵而大者乎以草莽之臣踐五位終非吉兆五為火丁者壬之合也遇火則危矣胡至京卜無不驗授欽天監漏刻博士賜名奫杞山聞之曰驗矣死不逺矣時上新作殿命胡卜之布算訖曰某月某日午時當燬上怒囚之以待至期胡倩獄卒覘視返報曰午過矣無火胡服毒午時正三刻殿果焚上急召之則死矣絶命詞北風蕭蕭秋水緑木落松陵野老哭周武豈不仁乃恥食其粟生無益於時九死又奚贖吾將從彭咸寧葬江魚腹蔣侍書兢兢字惟敬先世冝興人張士誠踞吳道梗不得歸寓嘉興通越門後徙大雲塘兢博綜經籍嘗學於髙士敏唐愚士遂工詩文建文即位詔舉人材至京考授文淵閣侍書應奉御前筆札壬午授密㫖從黃子澄走姑蘇至楊任所謀建義旗子澄遣兢往寧波㑹合知府王璉發兵固守錢塘隨逾海抵閩粵檄州郡大舉賦詩囑别云去去涉江海貴速無後時身輕不遑顧厦頽務窮支十日秦庭哭一舉齊桓師持此報國心何事不可為未及至而成祖正位子澄與任被誅兢因亡匿山澤稱東海逋臣逰楚蜀二十餘年乃歸衰麻絰帶終其身遜國前詩文俱散軼惟瑣尾日記友陶軒稿藏於家其神女廟一詩讓皇戊申至廟見之揮淚命剷去載程濟從亡隨筆長相思長相思江悠悠洞庭木落三湘秋夢中不識别時路九疑雲黯蒼梧樹翠華南去不復還雙娥灑淚愁空山五十哀絃雛鳳語鷓鴣啼處斑斑雨長相思思轉深請以白玉璞琢出相思心三湘之深東入海相思之心終不改悼黃子澄太常厦木支窮感昔聞知人不易負吾君但憐共矢心匪石雖死猶噴氣似雲方臘一時符僣號平原千古足流芬盟雞尚憶西塘路風雨淒淒握手分過灧澦堆扁舟西岸玉芙蓉疏鑿由來夏后功逆瀨風髙防馬象清秋水冷問蛟龍家鄉已出五千里山障方穿十二重最是逋臣思惆悵江流嗚咽響淙淙零陵道中望九疑山九峰吐翠隔湘川咫尺征途萬里天欲訴重華無限恨軥輈啼處雨如烟神女廟環珮依然賦不虛千秋一夢致人思襄王此日知何處空見朝雲暮雨時徐大使中中字伯庸號直心道人嘉興人洪永間應明經授鄱陽泊河所大使晚歸鄉里以尚書教授鄉人萍屋為景上人題水上乾坤有許寬舟居猶勝住山間江湖浩蕩基難定鷗鷺聨翩意共閒落月暫依楊栁岸晴風又過荻花灣平生自分無根蒂南北東西任往還張仁栁志載張仁三詩平湖法志云是邑人時未分縣無考松風臺考見題咏德藏寺老樹秦封倚石壇科頭箕踞自盤桓蒼龍捲地翠濤舞青鳥翔空寶蓋翻清氣一襟毛髮顫秋聲萬壑斗牛寒劃然長嘯憑闌處明月中天掛玉盤武湖考見題咏平湖漾晴緑狎鷗自相逐歸艇小於杯輕帆晒蒲幅星萍恣漂流白魚跳玉尺栁線牽人衣香林雨新沐汀尾沙禽鳴人家映修竹步履隨春風席地傾醽醁玩樂當何如回首炎威促西園居士李進進字孟昭號西園居士嘉興人力學明五經尤通春秋工篆隸行草母喪哀毁眇一目不復求仕永樂初郡守齊政欽其人請為郡訓導不久謝歸著有西園集西湖夜宿一詩芙蓉詩話稱其藴藉風流者也題畫松君不見靈隱山前小朵峰入山九里皆青松怒濤翻空捲江海髙秋挂石蟠虯龍西湖三月春意濃錦囊駿馬呼奚童清陰接道生爽氣金粉撲面香濛濛兩年不踏湖頭路轉眼春來又春暮畫中忽見一株松倣佛山前幽絶處幽絶之處多仙靈吾獨何為縛塵纓寄謝仙靈許同隱準擬長鑱尋茯苓丹陽道中茅屋雞聲催早起僮僕相呼戒行李擁袍無計衝曉寒野店春醪薄於水羊頭小車鐵裹輪後推前挽聲轔轔平原極目但衰草西風忽起迷沙塵坦途才過十里餘行行曲磴多﨑嶇松林杳靄不見日凍霧作雪沾衣裾黃泥山岡髙復陡車夫努力成牛吼須臾下坂一何易勢若駿馬爭先走嘗憶當年未為客縱覽方輿遍圗籍太行蜀道雖漫聞七里八岡今始識男兒初生挂弧矢豈分拘拘老桑梓他年為作子長遊賸賦新詩滿人耳花遊曲飛花入簾宫漏長遊絲落絮春茫茫金鞍駿馬青絲勒綺閣小姬紅粉粧黃金作丸落花底啼鳥隔花飛不起明朝更欲載東風早買湖船放春水秋日大雲寺僧房賦贈友陶先生孤踪久矣去人間歸卧家林景亦閒清澗飛泉含宿雨白雲滿壁擁秋山﨑嶇尚憶他年事衰老都非往日顔並坐繩牀談思劇松風謖謖鳥關關題豐樂樓圗錢塘城郭帝王州勝概千年尚有樓南浦雲開朱箔曉西山雨歇畫欄秋玉人歌舞成春夢芳草王孫非舊遊物换星移餘事在蕭條殘墨不勝愁西湖夜宿蹇驢衝雪岸烏紗夜醉西湖賣酒家十六吳姬吹鳳管捲簾燒燭看梅花穆溪漁隱朱僘僘字孟寬崇德嘉㑹鄉人父仁為貝清江門人贅嘉興穆溪屠氏因家焉僘故以資雄里閈永樂初坐黨纍編戍山海洪熙改元赦歸足跡不入城市日惟壘石列卉木搆緑疇軒棲息其中興到則乘小艇攜尊罍之屬沿溪而溯之持竿垂綸徜徉鷺汀鷗渚間得魚貰酒醉則偃仰舟中扣舷而歌聲出林外望之若神仙自號穆溪漁隱一時名流皆與交年八十餘有遺集一卷寄木蘭長老木蘭洲上梵王家門掩松雲禮法華有錫未凌滄海去無山時見白雲遮十年夢斷芙蓉酒幾度香生茉莉茶遙憶暮龕禪定處清風明月滿天涯李訓導孟璿孟璿名璿以字行號南莊一號天目居海鹽之吕冢永樂初以經明行修被薦歷嘉興汝寧訓導著有南莊集弟仲璣季衡皆有文行時海昌二蘇秀州李孟昭每過孟璿兄弟酬和輒淹旬朔好事者多慕之李于鱗詩選不輕進作者獨取其雲深一詩亦可占其大略矣春寒春事今還滯寒愁故故生風威披韭葉雨色湛桐英門徑苔侵石河隄水沒柳未捐乘勝屐猶傍讀書燈清暉樓秋夕髙閣軒窗靜遙城鼓角鳴明河橫夕影烟樹擁秋聲白苧因風度清尊帶月傾寒螀吟砌下惻惻不勝情金碧山水雨餘山色暖如春人掩柴門卧夕曛江上圗書和月載山中雞犬隔雲聞東風瑶草香初滿流水桃花路不分此處仙家渾不逺底須騎鶴訪茅君題童居士雲深處卷舒隨處共無心道者幽居似海深萬頃銀濤連曉色半巖蒼霧鎖秋隂擁關不禁鐘聲出護榻休嫌雨氣侵欲掃氤氲陪杖履重來祗恐路難尋燕秋去春來信有期雙雙依舊啄芹泥網羅不到營巢處肯厭田家草屋低丁珙珙字潤珩號草堂麟之子仙臺雲樹溪流環翠石臺危曽有仙人共奕棋林下枰空樵去久松間雲冷鶴歸遲古碑無字傳遺迹祖壟多蕪動孝思幾度登臨重回首松楸春雨不勝悲陳秀才景融景融號菊逸雷之子永樂間文學莫春春風客路馬蹄輕歸鬢蕭疏恨莫平呼酒且􅍆今夕醉看花又動昔年情朋遊老去鷗盟冷世事看來蝶夢驚咄咄書空徒自苦便應投筆效班生秋江獨釣圗雲山萬叠水烟空白鳥飛邊思莫窮未遇君王後車載釣絲黃葉共秋風李布衣季衡季衡字公平一字希平號西溪孟璿弟著有西溪集其追和元人十臺懷古詩膾炙人口他如隴頭牛出春耕雨海上人歸晚負鹽鵓鳩啼散村前雨蹇犢耕殘谷口雲皆集中佳句也戲馬臺八千子弟江東來函關一叱强秦摧還鄉自比錦衣樂橫槊戲馬登髙臺一朝垓下狂圗靡楚歌四合兵塵起陰陵失道嘆天亡尚騁餘威殱漢騎拔山之力蓋世雄空餘草樹生悲風有舟不渡亦男子揮劍直與騅同死銅雀臺魏家歌舞貯銅雀井幹凌空雲渺漠眉嫵爭誇翠黛濃腰纎競妬羅衣薄秦筝趙瑟無時閒炮鳳烹龍頃刻間綺蘇映水月皎皎朱簾捲雨花斑斑一朝玉匣歸塵土從此髙臺罷歌舞分香賣履屬何人魂斷西陵泣寒雨凌歊臺凌歊髙臺壯南國突兀干雲天咫尺晶簾半捲曉風寒雕闌倒映秋江碧臺邊軋軋金輿來盈盈二八花顔開英雄一去不復返甍殘棟委俱塵埃蜀山雪消清似洗岷江西來幾千里此日豪華安在哉唯聞嗚咽臺前水錢塘懷古大奸竊國正慿陵河洛紛紛甲尚腥無復漢光收故物空餘周顗泣新亭北來勍敵多如雨南去諸孤散似星俯仰不窮千古意夕陽西下亂山青嚴布政貞貞字頤正號養素劉志作閻真字養正非嘉興人永樂癸未例應㑹試以登極故開鄉科貞得領薦至甲申成進士授景陵知縣浙音彚編云貞以寧波籍仕終雲南布政和栁子厚登栁州城樓獨上城樓望海天異鄉愁思正茫然溪雲暝帶桄榔雨野日晴銷薜荔烟百粵湖山通絶徼半江菰米熟秋田舊遊别後多零落目斷滄波只自憐姚袁州文文字敏學崇德人永樂乙未進士選庶吉士改禮部主事宣德中罷調六曹官獨留主文選事出知慶逺猺獞雜處文結以恩信無不感服改袁州將代百姓請留卒於官東山謝安久云亡東山在吾里雲松秋落落澗草晚薿薿昔人徐提刑鬻田訓五子諸昆攀桂後老者樂於此願言一登臨景仰何日巳朱興寧孟德孟德字維新海鹽人寓籍陜西寧夏衛中永樂戊戌進士任廣東興寧知縣出獵圗秋髙絶塞苜蓿死颯颯西風吹馬耳山前獵騎耀戎裝布列沙場平似砥草枯食實馬臕肥風折筋膠徑弧矢旌旄斜捲斷霞明戰袍亂簇團花紫攬轡峩然意且閒導前顧後遙相指勒馬回頭審視餘雕弓滿引雙鴻起寄西溪李季衡不到西溪已半年孤情每自繞君前莓苔色冷尋花徑楊栁陰閒載酒船豈乏琴書消夏日已多稌黍滿秋田懸知别後幽棲意欲謝逢迎獨草𤣥王經歷逵逵字公逵號雲溪嘉興人永樂甲午舉人宣德初官襄陽衛經歷有南溪吟卷管窺集雲溪遺稿題宋髙宗荔枝圗三首有引宋髙宗繪荔枝圗一幅我友于以成所藏求題於余按本紀徽欽鑾輿播遷擁迫而北土崩瓦裂甚可哀憐髙宗南渡僅能中興然無撥亂之才奪于奸檜之和議由是偷安江左乾綱不振功垂成而復墮宴安之際不鑒覆轍猶圗口腹之奉以自玩而忘不共戴天之仇其何心哉上皇西幸劍門時逺憶涪州貢荔枝今日思陵圗畫裏兩宫甘㫖不勝悲畫卷深宫寫荔枝建炎天步屬艱危江南風味真竒甚莫遣當年北使知五國城頭歸夢遲炎風閩海駐旌旗閒將荔子勞宸翰知是天機出孝思俞少傅山山字積之號梅莊嘉興人永樂癸卯舉人歷郕府伴讀景泰初擢鴻臚少卿至吏部左侍郎有請謁正色以拒臺諫言事取嫉權貴者曲為調護時議迎復或有異同山奮然曰鑾輿復然後人心悅而天下安況天倫所繫至重力贊之朝廷知其清慎賞賚有加作嵗寒圗題詩賜之既而有易儲之議山密諌不聽引病歸復進太子少傅囊槖蕭然稱貸以給善大篆工墨梅著有梅莊集不傳英華所載二律俱不佳聞川蔣氏曽於賈人得畫梅卷有二斷句淒清哀婉蓋英廟未旋駕時作也題畫梅二首春簾髙捲透疏風瘦影蕭蕭望若空腸斷不堪還染翰九霄環珮夜玲瓏生來絶勝董嬌嬈凍粉含香玉影搖十二樓頭明月滿不勝清淚濕鮫綃朱琳琳字玉林號雨椿以下三家皆永宣間人爵里無考詩見英華題子陵圗莫道狂奴聘不來客星無意作三台𤣥纁肯博桐江水未必清風滿釣臺李澄澄字若淵贈龍虎山朱道士黃冠道士蓬萊客騎鶴來遊海上城仙券靈符常滿篋丹臺玉室久知名雲開碧漢飛鳬影月落瑶壇散珮聲遙羡閒身居物外無由相共學長生鄭璋璋字無考鶯梭金衣公子度庭柯嘎嘎交交意若何花錦亂穿紅影碎栁絲輕織翠紋多遷喬無意登機杼出谷留心避網羅莫向陶家門外過壁間猶有化龍梭白猫玉狸海外來千里月兔天邊墮五更誤入名園人不見梨花香裏只聞聲陸秀才琦琦字公璐號友蘭宣德四年以嘉興魏塘鎮為嘉善縣琦居汾湖遂為嘉善人父坦故雄於資願輸槖創學宫不果而沒琦承命獻其址復建義孰於汾湖之隂學士曽鶴齡有記題雲林訪友圗次陳漢昭韻為愛幽棲好乘閒一訪君澗喧泉漱石林暝樹藏雲路自山腰轉源從谷口分坐深歸路晚天末有斜曛述懷坐惜年華似水流湖山行樂且悠悠一川烟雨孤村晚千里關河斷雁秋金鳳幸遺天上敕黑貂猶剩篋中裘清樽漫醉新豐市當道何人問馬周梅花雪壓寒香凍未銷江空嵗晏轉蕭條冷雲漠漠知何處夢到西湖第六橋松雲居士姚黼黼字廷章號松雲居士嘉興人宣德間布衣御史綬之父也年四十以家政委綬擅隱居之樂能寫山水宗嶽雪樵工詩日與陳皓韓永倡和優游自得人以可閒先生稱之過友陶舊宅次南野韻蕭蕭茅屋冷溪濵晚嵗孤松雪色新鄰笛不須哀日莫就中多是斷魂人南野遺老韓永永字景修號南野嘉興人出處未詳有詩見蔣氏三徑琳琅冊自署七十七翁嵗在辛未當是宣德六年則永亦遜國遺老也詠梅次竹鄰昔訪逋翁宅牆頭露半梢因吟暗香句行過段家橋張惠惠字孟與秋夜氷簟銀牀夢不成半因秋熱半閒情披衣起看窗前月又到西窗栁上明陶瑾瑾字廷璧號菊莊閒居數椽新築傍溪灣掃石焚香鶴正還幾度捲簾看不厭夕陽紫翠滿南山陸厚厚字無考哭二子風雨撼庭梧寒巢失二雛夢因心上起名向醉時呼鳳泣丹山玉龍吟碧海珠斷機憐爾母淚滴硯苔枯陸宗寶宗寶字善之號橘軒途中偶成燕雲漠漠路迢迢馬上霜風裂紫貂半百年過頭似雪獨憐無計老漁樵孫檢校詢詢字廷言一作佳言號東溪嘉善人從里儒徐中授尚書善屬文宣德間應賢良詔授廣西布政司檢校洞蠻竊發詢諭之皆感服遺以金不受尋致仕時邑民李懷玉等為真率飲尊齒德也適詢歸改為耆英文㑹約里中斑白知禮讓者十二人按一年月朔之數并詢為十三則餘閏也月朔小酌命子弟講禮讀法歌詩撫琴習奢惡儉者勿與焉送容縣周二尹文叙自是濓溪幾葉孫庭前碧草至今存徵賢早對安民策佐邑長懷報主恩春暖有鶯啼栁陌月明無犬吠花村雄藩考課重論舊且共灕江酒一尊陳氏園百畝名園巳變丘每慿故老話風流金叉醉倚觀魚檻畫槳輕移送酒舟簫鼓晚衙花底散笙歌夜月宴中留感懷莫問當年事野菜青青滿地愁文水一曲潺湲繞泮宫小橋斜轉却流東烹茶最愛鐺鳴蚓洗硯長疑墨化龍未許將軍修禊飲只冝童子舞雩風晚來緑淨無波浪雲影天光上下同附考水在嘉善儒學中大勝橋架海為梁事若何分明神劔斫蛟鼉光涵半璧初三後影破連環二八過玉蝀橫秋消宿雨金猊噓霧散晴波憑誰移向髙空外借與天孫夜渡河晚橋漁泊黃昏溪上寂無喧漁艇歸來競後先風偃荻花欹醉笠雨昏江樹濕炊烟甕頭緑蟻時時滿船尾金鱗箇箇鮮不似姑蘇愁絶夜烏啼月落曉霜天附考在嘉善北門外曰華嚴橋俗稱虎塔車橋題雪樵畫詳前本傳踏雪歸來不耐閒每書繭紙百千番烟飛霧走縱橫裏鳳翥龍蟠頃刻間怒若洪濤奔萬壑捷如驍騎出三關一行價值千金重展卷令人欲廢餐題竹所活人種竹不種杏種杏何如種竹寬翠色滿林常帶雨秋聲四座只生寒詩成最好臨軒寫簾捲何勞出户看陰德廣時栽亦廣傳家唯有碧琅玕養正生陸贊贊字德潤號養正生海鹽人宣德間以詩文名兼善篆隸為人嚴毅莊重以禮自持嘗慨世俗湮於佛老憚禮文之難而喪不成葬著居喪撮要為文思緩筆精無急就之作年八十三卒鄉人誄之曰貞一先生東歸掃墓弟宣送至龍江而别東風行旅出江濵兄弟相看淚滿襟欲向先塋供爼豆寧辭客路受風塵春深歸雁愁無侣日暮啼鵑惱殺人酒盡河頭各分袂相思兩地夢應頻張太守振振字孟起號植蘭海鹽人宣德間以承掾起官至四川重慶守南屏山房插天青壁障湖南結屋何愁地主嫌緑樹交隂連古剎白雲移影落虛檐源頭引水惟刳竹門裏看山只捲簾更傍東籬閒采菊悠然相對即陶潛劉舉人稽稽字惟載號緩軒嘉興人宣德丙午舉人和答岑雪崖李膺門在少攀躋自喜聲華得與齊老圃題詩秋賦菊小窗讀易夜燃藜君應善學爭鳴鳳我已差同欲化羝今日相望渾不逺往來猶恨隔雲泥竹鄰子陳皓皓字漢昭號竹鄰景融子宣正間布衣有詩名雲間學士錢溥稱其閒雅典厚力追唐人有竹鄰子稿蓉塘詩話稱其題畫詩怨刺之意見於不言之表較之孟浩然不才明主棄及薛令之苜蓿長闌干之句辭雖隱而意愈露矣夏考功兩竹為趙時俊作髙人愛清不尚繁庭前種竹只兩竿雲影朝分硯池緑風聲夜入書牀寒考功文采丹山羽貌得雙清似曹許只應真宰泣錭鎪月落空林露如雨睡起晝永幽禽驚夢醒起向松西汲寒井隔竹唯聞犬吠聲竹深不見行人影我貧無力種山田多病翻成半月眠市上喜無賖酒券篋中賸有賣文錢寒潭釣雪嵗晏風兼雪扁舟駐釣灘瑶花半篷濕栁絮一蓑寒子厚偏供咏𤣥真若避官如何渭濵叟頭白謝魚竿為曹汝器賦二首鑿地為方沼層巒四面圍天光涵古鏡苔色上春衣幽鳥情相契閒雲影欲飛誰安一拳石比作釣魚磯右涵碧池壘石為梁柱憑誰號彩虹烟雲遮不斷霄漢步應通澗草寒留碧山花暖襯紅此中豪邁氣不愧茂陵翁右彩虹橋景泰壬申正月晦日夜夢至僧舍遇一老叟云欲於靜處少休豫應之曰借來雲半榻睡起日三竿覺而枕上足成漸老疏塵事無營身自安借來雲半榻睡起日三竿松火爐頭暖風波屋外寒行藏皆夢裏何必問邯鄲泊松陵塔寺主僧招晚飯塔院東南湖水長三髙亭下晚風涼鯉魚吹浪楊花白鷗鳥眠沙杜若香僧喜詩人留共飯客隨漁艇泊連檣叮嚀黃帽休辭懶蚤起征帆候曙光新秋江涵秋影雁南過涼思催人可奈何林下久知塵事少水邊惟愛月明多吳鄉鱸美應分鱠楚客衣單自製荷回首滄浪濯纓處髙情慙愧釣魚蓑春日寫懷東風吹雨著輕塵芳草茸茸濕翠裀寒食過來猶自冷海棠開後不多春山中漫憶陶𢎞景谷口誰尋鄭子真聖代只今恩浩蕩東溟不信有窮鱗夜宿大雲寺留題竹深處日暮尋幽到竹深竹煙晴鎖寺門隂苔荒路絶行人跡月出潭空靜者心清供一盂香積飯閒情半榻白雲衾留詩已與青山約莫厭頻來訪道林附考寺在嘉善東南十八里宋乾德間建冬日旅中江國冬來十日陰閉門髙卧擁寒衾貧將乞米無顔帖客久思家有越音雪壓荒橋行路斷山埋老樹凍雲深百壺安得如澠酒細與梅花說舊心過當湖曹汝器所居顔曰林溪清趣中有滴翠峯涵谷池諸勝海邑西偏郡郭東林塘卜築遂髙風松陰避雨周遭緑花影涵波上下紅虛榻掃留吟社客短蓑著伴釣船翁閒居清趣人多有看到君家自不同竹西草堂為曹汝器賦新搆茆堂就竹西渭川千畝共襟期清風掃榻秋來早蒼雪團隂月到遲插棘每遮東面笋脫巾還挂北邊枝尋君記得曽留宿日出三竿尚不知閲瑣尾日記曽供筆硯侍君王九死艱虞不敢忘痛哭衰麻終此老追亡躡屩忽如狂有山到處薇皆緑無邑歸來菊更黃瑣尾一編聊自述猿啼鴉嘯斷人腸竹樹白頭公小畫翠滴疏篁露涼生落木風能知嵗寒意獨有白頭公題竹直節從來瘦虛心本自清涼風屋頭起葉葉是秋聲秋螢寒光一㸃映松蘿零落西風恨更多莫向波間照秋影滿溪涼雨顫新荷立春蕭條書劍客邊身望望歸期過立春官栁漸黃梅已白東風應笑未歸人題畫二首盧橘垂黃雨滿枝山禽飽啄巳多時那知嵗晏空林裏竹實蕭條鳳亦飢右枇杷山鳥老去年來兩鬢秋半因詩債半閒愁不知野鳥緣何事也向西風嘆白頭右楊栁白頭公秋蝶粉褪香消力漸微多情猶自舞斜暉野花籬落西風冷不比春園得意飛張縣丞禮禮字用和海鹽人宣正間以掾起為上饒縣丞辭任有作宦海茫茫我獨醒乞恩歸去一心寧養情賴有書藏篋遣興還須酒滿瓶陶令清風存菊徑右軍髙致出蘭亭故園舊業依然在坐對青山讀道經張封君翥翥字九臯號晚香海鹽人教二子寬寧皆仕於朝與鄉老結社賦詩吟眺遊賞有香山洛下之風寄許竹窗兼柬楊熙春回首秦溪憶舊遊江城寂寞月空留東軒漫誤延徐榻西郭虛乘訪戴舟夢裏青山人未逺鏡中華髮嵗如流秋風不見南來雁烟樹蒼茫動别愁莫布衣藏藏字用行號素軒海鹽人宣正間布衣工詩文及真草篆隸八分諸體及鐫古印章繪花木禽蟲水仙皆可愛親病刲股療之年五十八遘疾占一詩有三徑菊松秋寂寂一庭風月夜沈沈之句吟巳即逝著有佩觿稿詠史詩素軒稿皆失傳唯英華載秋日一詩又有送鄭東谷之廣東詩云津頭貰酒桐花落馬首看山荔子垂句尤警秋日書懷寄崔總戎河橋一别栁初垂又見黃花滿故籬落日江樓王粲賦秋風茅屋杜陵詩關山有望天皆樹嵗月無情鬢欲絲見說東南烽火靜轅門可是晏眠時沈員外淳淳字惟厚號拙庵嘉興人性純朴不妄言笑為弟子時室有妖淫不能亂宣德巳酉舉鄉薦正統丙辰成進士歷吏部員外郎卒年八十七張方洲稱其孝恭和厚不下古人有拙庵集送胡參議致仕封書遙奏五雲間詔許懸車萬里還憂國不知雙鬢改歸田且喜一身閒蘭舟坐釣鷗分月茅屋鈎簾雨滿山自此總無軒冕夢烟霞長護舊柴關閒居天上抽簮萬里回秋風黃菊滿籬開翟公不復為廷尉辜負交知日往來諸秀才斆斆字學文秀水人宣正間茂才以子稱贈僉事送亨上人領薦之京清時膺薦謁承明犯曉袈裟出化城空界鶴隨行錫逺大江龍引法舟輕天官講道飛花雨禁路趨朝逐珮聲寵遇歸來知有日暫違香室話無生唐太醫璵璵字宗魯郡人宣正間太醫吏目武當五龍宫五龍居處有仙宫一徑蒼苔萬壑松風颭疏簾搖翡翠雲開絶壁爛芙蓉忽聞雞犬知何處尚隔烟嵐有幾重昨夜道人行雨遍滿庭涼月露華濃謝御史文昌文昌號東山秀水人善楷書宣正間以資進官至御史郡志誤入洪武薦舉題畫少年為客老應還鄉語依然鬢已斑童子莫嫌停馬久眼前都是舊家山賀秀才麟麟字文徵號南溪嘉興人宣正間文學石門夜泊驛路迢迢送夕陽石門灣共泊連檣買魚人唤溪邊棹乞米僧歸竹下房楓葉經霜多自落羅衣臨水不勝涼且沽尊酒澆離思明日看山認故鄉金都事景輝景輝字養晦邑里未詳見英華宣天間官中府都事嘗見知於郭定襄有呈郭詩二十韻和黃太守衡夫韻金仙樓上遇楊凝倚遍闌干十二層石上每看翻貝葉花間遙聽囀迦陵也堪呼酒酬佳節未暇留衣謝主僧回首溪橋天已暝一彎新月映寒藤岑學究琬琬字公琬號雪崖餘姚人宣正間學究流寓秀水凡郡中慶弔詩文皆出其手為吕公懿所知館穀于雁湖陶氏穆溪朱氏終老焉同朱孟寬陶伯鉉陳竹鄰泛舟雁湖得巵字羣公春宴日一櫂夕陽時山色侵衣袂波光漾酒巵遊情黃鳥唤心事白鷗知覔句篷窗下楊花拂釣絲附考府城北由杉青閘出王江涇東為聞湖西為雁湖朱魚荇沼芳溪錦鬛香依稀相見午橋莊紅蓮落瓣衝風出似與游魚較短長崔指揮端端字惟正海鹽世襲指揮使善詞翰及騎射器識不羣嘗從都督徐恭征鄧葉二冦擒其渠魁景泰中貢倭索攘亦多防護之績云挽虞舜臣舉人擢桂年來志已酬看花有路獨淹留多才共惜歸黃壤力學爭憐賦玉樓月冷藝窗閒舊業雲迷荒冢起新愁君親未報傷心死潮打孤城淚欲流莫布衣遁遁字用嘉藏之弟過故人舊居幽居寂寂掩柴扉碧草寒烟鎖翠微前度故人緘恨老舊家燕子傍誰飛鳥啼深院傷秋雨花落空階護蘚衣回首不堪嗟往事夕陽城下影霏霏刁銛銛字公鋭號靜庵以下四人俱海鹽宣天間人見武原集題留耕堂夜雨荆花田氏宅秋風草蔓習家園何如堂上留耕者萬事無心隱蓽門張綱綱字用常號巢門題翁秉彞得耕中趣卷百畝生涯屋數椽比來甘分隱林泉寒雞日暖桑間社小犢烟生谷口田緑水平疇三月雨黃雲香稻九秋天優游自得隆中趣詩酒忘懷二十年張𢎞𢎞字景容哭內破鏡難圎對影長九秋蘭菊易荒涼只應兒女傷心淚滴作蕭郎兩鬢霜沈寧寧字致逺號梅泉張繡衣見訪老來多病困衡茅坐對青山歎寂寥軒騎有情過僻地林泉無酒燕清宵松邊拂石和雲坐竹裏烹泉掃葉燒為喜故人能逺念肯將青眼顧漁樵張僉事昊昊字景升里居未詳官按察司僉事宣天間人江湖勝覽多君年少異凡流辭却燈窗入勝遊萬里關河窮禹蹟歸來同看冷紅秋許醫官信信字彥孚醫官里居未詳宣天間人赴海寧崔指揮相邀馬上賦此紅纓白馬紫絲韁路出山城踏曉霜潮湧滄溟聲颯沓日升暘谷影微茫青烟矮屋燒鹺竈白日長隄捍海塘笑問侯家何處是轅門細栁兩三行孫陰陽絅絅字文著號雪軒隂陽官里居未詳宣天間人病起寄丁慕松病餘扶下讀書樓寂寞懷人不斷愁十載功名雙短鬢百年身世一浮漚青山古寺疏鐘晚紅葉孤村急杵秋早晚牀頭新酒熟莫辭來此共淹留嚴鼎鼎字用和號新齊以下七人皆宣天間人爵里莫考見英華壺春丹房火候能調內錬功醉吟時覺動春風安期早晚如相遇試問蓬萊路可通張玉玉字廷執號南窗偶成活水流花去濃雲挾雨過故人不可見春色已無多燕子營新壘魚兒戲淺波靜觀應有感飛動奈渠何江淵淵字孔殷號梅谷寄道㑹王以正玉虗仙府久棲遲風景悠然事事宜滿洞緑烟啼鳥處隔簾紅雨落花時丹成藥竈雲常護曲奏霓裳鶴自隨我欲辭家息塵鞅共尋松塢采靈芝檇李詩繫卷八
