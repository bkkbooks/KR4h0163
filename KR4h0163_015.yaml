body:
  text: 檇李詩繫卷十五平湖沈季友編明藿園居士李應徴應徴字伯逺號霽巖嘉興梅溪人萬厯癸酉舉人自少而孤稍長博極羣書沈司馬思孝深契之一時名流如屠長卿沈嘉則胡元瑞張孟竒皆與倡和往還懷才悒悒十上公車乃就滁州學博蓋應徴以駿宕之士雄視一世平生感憤一發於詩故能衆體兼長摛詞獨冨風流俊爽情旨婉切不徒以寫景述事為工也著有青蓮館初編藿園集汗漫遊薊易寓言寄苕漫草等集琴者王生為豫鼓石上流泉之曲走筆贈之涼風颯颯天氣肅髙樓置酒悲夜促新歌妙舞且暫停聽君鼓却流泉曲指下泠泠百道鳴散入秋山萬溪玉一絃一彈清我心欲斷不斷聲相續君不見齊門瑟燕市築獨立狂歌向人哭丈夫轗軻亦如此琴中之聲何為爾蘇生爾宣向嘗任俠報仇兼善秦漢篆刻近從吳門過豫山中作歌贈之君不見專諸魚腸化秋水要離墳樹悲風起吳宮霸氣久已銷俠骨猶然香未死蘇生寶劒光陸離少年報仇人所知即今隱迹埋吳市劒鋒折作囊中錐黃金剖鵲大如斗白玉盤螭壓雙紐雄心鏤向方寸中仇人血濺丹砂紅秋山飛雨聲颯颯慘淡光鋩寒白日看君意氣尚如虎那能老作江湖客丈夫腰下有昆吾何不東梟島夷西擊胡試拂燕然一片石可堪還勒漢銘無薛素臨趙承旨吹簫美人圖歌有引醉香道人出此圖見示墨韻遒婉真得吳興三昧蓋薛工于繪事而尤能以鳯簫度曲故宛轉曲盡其態而所臨宋景濓學士題語真書數行更得臨池之致此何必當年校書即襟紳中恐亦罕此韻士也今薛已歸沈景蒨不可復見覩此如對寫照徒增悵惋遂作歌焉吳興王孫筆楚楚丹青貌得吹簫女宛轉如疑咽素秋月白宵寒鳯飛去題識猶存學士名數行頗得臨池趣誰人書畫兼擅場誰同趙宋稱雁行河東佳人小字素妙曲曽將鳯簫度麗情秀壓錦江濤霞箋色奪芙蓉露標韻俱從指下生妖妍獨向毫端吐吳興得似未得真佳人貌畫兼貌身含嬌轉盼邀鳯史有聲無聲皆入神此時珠簾散華燭此時紫簫奏新曲月痕依微脫口朱星月參差動纎玉朱唇乍啓梁塵空玉指頻弄蘭心通祗覺春風生合坐忽移形影向圖中圖中坐上宛相肖嬴女却對秦宫照天籟俄分倚獨鳴清音倐斷迷雙笑獨鳴雙笑兩依稀只今化作彩雲飛驟然顧態猶疑是覩久尋聲始覺非尋聲顧態神猶動巫峽荆臺別通夢風前屢誤拂書蠅月下初聞罷簫鳯簫聲只隔鴛央水鳯吹蛾眉呼欲起司馬青衫濕盡無春蘭寂寞秋風裏南湖雨後見月放舸傍莎汀悠然笑獨醒雨餘千樹黑月出半湖青水氣澄秋席寒空寫夜亭重輪元自現煙霧莫冥冥人日遣興人日人為客春風春可憐煙波浮宅逺丘壑寄情偏柏葉烏程酒椒盤下若鯿如從習池飲醉卧峴山前宿南禪廢寺寥落春城寺翛然對野僧庭烏朝下食山鬼夜窺燈心義空微晤塵勞斷未能松寮踈雨過片月照枯藤花朝集徐德甫園亭一室成丘壑悠然會逺心餘寒春色淺過雨藥闌深蝶戲才窺幔鶯啼稍出林緑尊留客醉隨意坐花隂落葉二首西風蕭颯戰初降吹落長門淚共雙暗雜繁霜沉曉角亂扶疏雨入秋江迷離空徑深留屐約略寒山逺到忩掃盡玉階愁不去依依簾月對殘缸朝來誰掃拂雲柯搖落偏冝傍晚多漢苑哀螺曽入曲洞庭秋水忽生波柝中影度關山月夢裡聲殘子夜歌咫尺天涯人共逺滿林風雨下松蘿新桞舞罷春梢曉露清縷金試唱不勝情忽牽鷗夢眠難定似怯鶯梭織未成月影乍窺陶令宅風條漸拂漢家營也知今日青青色強半荑枝向舊生登薊門望塞外有感二首經略當年西出師曽傳塞外走燕支如何士馬東歸日猶是朝廷右顧時風偃旌旗間虎豹月寒戈甲卧熊羆長歌一曲燕雲斷坐聽髙城鼓角悲帝障排空斥堠分盧龍刁斗夜無聞單于避飲長城窟都護移屯細栁軍鐵甲聚昏滄海日朱旗逺繞黑山雲班生浪有如椽筆不勒燕然第二勳悼亡詩為方衆父賦玉魄千秋夜悲風起白楊黛銷塵鏡色粉落故衣香蕙帳凄琴瑟金叉墮鳯凰魂應隨上婦貴不待中郎夢失高堂窅猿啼楚峽長回思畫眉處倣佛嫁時粧周評事從龍從龍字彥雲號霖滄嘉興人萬厯癸酉舉人厯官南大理評事著有繹聖堂稿其詩不多見據曹氏詩選所收頗整繕不入輕靡蹊徑題招隱君祠壁荒亭雲落落沙竹雨綿綿漢詔無今日焦峰自昔年山僧供祭酒天子賜江田踏盡寒莎路疏鐘破暝煙懷某上人一溪煙水背孤城洗鉢歸來落日晴幾憶支公舊蘭若青山如在沃州行夏知縣日葵日葵字闕秀水人萬厯癸酉舉人官知縣中秋三日鴛湖詠月結伴尋幽過水西娟娟纎月印清溪空中樓閣微茫見望裏湖山逺近迷光漏一痕涵皓兔影搖千頃挂丹霓秋宵佳色今伊始莫惜頻頻玉碗擕支奉新大綸大綸字心易號華平立之曽孫萬厯甲戌進士試政西曹時江陵秉政進白燕紅蓮以為瑞綸言於朝曰大臣不宜稱祥瑞啓侈心五月蓮固宜開即不然物非其時謂之草妖燕玄鳥也白者金象兆為兵奚瑞之有江陵聞而嗛之遂請教南昌遷泉州司理時侍郎洪朝選失江陵意欲中以法綸嘆曰洪公庇正醜邪范孟博之儔殺之非法乃為書具陳天道人事不宜枉殺大臣以媚人江陵益嗛之遂罷官又七年推補江西藩幕遷奉新令復與上官不協掉首而歸卒年七十有一門人私諡曰文介先生所輯永昭兩陵史屯餘耕餘諸稿華平集行世九日遊柳州亭二首伍相英魂何處尋伍塘堤畔栁隂隂漁舟未解西江劒一飯空投下瀨金都鄀故留忠楚計無疆終殞報吳心英雄幾掬恩讎淚夜夜風濤自古今貰酒狂歌鼓枻遊憑高縹眇入層樓耶溪尤物鶯花老石室遺逋日夜愁入郢漫酬無忌恨使齊翻墮伯嚭謀伍塘千頃堤邉栁猶帶寒鴉訴屬鏤附考亭在嘉善伍子塘塘相傳子胥所開長二十七里今城中南北水門其經流也榖雨即事二首早乘榖雨帶經鋤送酒人來問祓除萬事皆慵猶種竹千金散盡只留書長吟陡覺和風動安步徐看化日舒不是狂夫偏玩世也知天地亦蘧廬當門蘭􅉅故應鋤塞路荆榛詎易除霅水更無修禊侣由拳剛有未焚書啞啞猿鶴聲猶咽楚楚松筠葉乍舒滿目江湖休厝足祗須擕杖入匡廬吳知縣正儒正儒字醇之號貞所嘉興人萬厯丙子舉人官邑令有巳午漫草竹閣亂山圍小閣罨畫出湘雲翠滴春猶冷煙凝晝不分已從憐徑節更為惜清芬寧别此君去當歌至夕曛許州判聞造聞造字長儒號星石相卿子萬厯丙子舉人歷河間東昌推官遷御史首諌東封條議兵餉紏大司馬石星誤國與史官劉虞夔不稱職狀皆人所不敢言未幾引疾歸起按甘肅單車遍歷激揚吏士至勘松山功罪自大帥已下罰治有差聞礦使四出兩疏極諌又言臺省撫按諸臣之言百言而百不聽宦豎之言百言而百不疑是四海之威權歸之陛下而陛下之威權盡挈而歸之宦豎言甚峭厲遂落級為岢嵐州判歸家無疾卒著有詩文集奏疏家乘地理纂要蠶譜等書懷錢淵父南端初月上徙倚正懷人秀句思錢起玄言愧許詢雲光清户牖竹色冷衣巾更愛重湖曲涼風動白蘋黃河舟中日遇同鄉人風波那如許欲寄平安書對面不得語錢太學應曽應曽字長卿籥之子萬厯間太學問友人病行蹤兩月不相聞鴻雁飛飛各有羣採藥欲停何處屐扶藜還看幾峰雲竒書散漫癡憐我瘦骨崚嶒病憶君安得相逢明月夜半忩竹影坐平分錢蓬州應晉應晉字次卿應曽弟萬厯丙子舉人官蓬州守有閬風館集重遊鷹窠頂同許長儒宿隱山上人房重尋古剎遊相對人如舊竹色墮虛簷松風響清晝傑構凌天梯飛泉決雲竇談禪向鳥窠聽潮六時候地逺夢亦清寥寥忘宇宙鐘磬深夜聞月明在孤岫金舉人九成九成字伯韶號望虞秀水人幼以神童稱誦讀餘暇便能旁涉稗官野乘出語驚人萬厯丙子年十九領鄉薦屢上公車不售乃焚去郵傳不復北上浮沉肆志與酒人劒客禪衲道侶締遺世超方之交年僅三十九卒著有借竹軒稿春懷小草讀史小論詩亦清利不俗冬日偕江禹正諸君集天然圖畫閣移酌寶石峯頂眺望共上峰頭望嵐煙薄暮收愛吟遲酒盞乘醉數漁舟塔影沉波靜天風拂鬢秋湖山自今古塵世幾同遊再過桐岡書屋竟日柴關掩穿林竹徑幽欵賔猶舊主沽酒話新愁翠樹深經雨黃花久占秋匆匆城市去應愧昔年遊韓同知子祁子祁字心克號肖南平湖人萬厯丙子舉人授德安推官又補贑州升蘇州同知三董漕挽俱絶饋送戊申春飄然歸里篋中惟書數卷石刻數種生平以翰墨為樂為詩蒼老高潔有醯雞集尤善草書得醉僧遺意時稱清簡其庶幾乎陸藩儀别墅抽簮結隱傍青霞五栁隂籠處士家壘石漸成飛鷲嶺開池疑有蟄龍窪新詞不入梁園簡曲徑分栽玄圃花客去北忩甜睡足碧雲深塢誦南華讀鄂王傳山前山後盡王庭大將旌旗壓栁營海上浮圖俱下駟嶽家赤幟有先聲兩宮未復元戎意九伐方張國賊生五國城枯南望眼康王已是諱稱兵馮祭酒先生夢禎夢禎字開之號具區晚號真實居士秀水人萬厯丁丑會元選庶吉士授編修中遭廢黜起南司業晉祭酒三年乞歸又九年而卒夢禎為人髙曠不喜作俗間生事往往以風流自賞移家武林築室孤山之麓家藏快雪時晴帖因名其堂為紫柏可公幅巾弟子蒲團接席究第一義復與虞德園徐茂吳諸公倡酬四方學者日進身執經卷朱黃甲乙禪燈丈室清歌洞房人望之以為仙真洞府卒後人志其墓曰位不大齒不尊而風流𢎞長衣被海內謝安石之擕妓采藥房次律之鳴琴奕棋天下以王佐歸之固不以用不用為軒輊也今存快雪堂集若干卷其詩不習館閣語登臨古什追蹤陶謝律絶雖多艷體亦有生香真色之妙與髙致不相妨也賦得楊栁可藏烏嫋嫋白門前藏烏倍可憐柔枝排影度密葉引雛穿啼合驚宵陌飛應破曉煙新知樂如此詎惜故腰妍餘不溪回舟寄訊章元禮吏部是日雨雪吏部才名舊瓊瑶昔見詒山川聞問隔日月鬢毛衰身退仍憂國家貧但賦詩回舟緣興盡風雪寄相思弔梅花道人墓聞君畫梅亦畫竹祗是梅花名獨存香徑為君留素影月邊容汝傲黃昏人歸舊里家何在墓托空門道益尊唯有孤山林處士知心兩地薦芳蓀無題二首為憐飛絮趂遊絲一段春愁泣路岐莫道芳魂收未得因風直上最高枝琉璃硯匣鎮隨身彩筆揮來字字新他日長門如有恨千金辭賦不求人沈修撰自邠自邠字茂仁號几軒啓原子萬厯丁丑進士選庶吉士授檢討升修撰自邠生而韶秀嗜學盡讀家所藏書發為文章醇雅清麗無險巇詰屈之態年僅三十有六著有詩文集本覺寺三過堂遵塗出枉渚弭棹攀叢林石幢委陳莽殿壁生幽隂昔賢此流憩登堂復沉吟代往迹如掃聲留感彌深悠悠東逝波閲世成古今古今既巳爾何用役吾心送王侍御伯禎關西王郎氣無敵手持白簡回霜色都市驚呼鐡𩣘驄殿頭捧下團龍敕此行暫作南畿使三輔秋風動旌斾內地新紆復馬恩軍儲已足留田議羽書頃者奏甘泉邊騎憑凌踏塞煙看君飛檄淨沙磧却笑從軍王仲宣送葛太史鳯池封秦清時幾嵗直鑾坡百二崤函擁傳過定有使星催客蚤已占真氣入關多小戎舊俗人如玉大國新盟帶是河斗酒花前擕手别金莖東望莫蹉跎陳儀制泰來泰來字伯符一字員嶠平湖人萬厯丁丑進士歸娶賜內府金花龍燈州里榮之纍官儀制員外郎疏請建儲不報忽傳三王並封草疏死諍又靣質王文肅於朝旁觀悚栗卒寢封議尋以疏救孫鑨謫饒平典史自賦有直道不緣三黜改孤忠只受九重知句年三十六卒於苕川光宗立録贈光祿少卿有員嶠集初謫歸時夢至一山見羣仙咸集共賦云涼風拂拂白雲收宦海茫茫幾日休剪紙作驢輕撥剌桃花洞口笑淹留旁有仙曰汝乾凌子也後一年當會於此歿後翁哭之慟適遇方士能作飛符召魂術翁為祈請附乩書曰仙謫之期止此非不思我阿翁然數有限慟奚為遂賦詩以别泰來慷慨有才略與顧憲成趙南星諸公咸氣節自負竟以抗直困下位夫人營織而食後復貶竄流離以死嗣子無傳風流頓盡悲夫贈揭山人乾坤一散人家在吳山下裹糧遊五嶽自言畢婚嫁口讀軒轅經指掌泄造化似餐紫桂實曽覩青蕖謝大藥可延年訪道無休暇倘逢八公侣將拔白雪舍懷周元孚民部周郎文武備間氣起蘄黃倒峽春濤壯凌霄紫色長人誰似匡弼天不老馮唐湘水行吟日應知笑楚狂寄魏懋中南司勳抗疏英名震九垓憂時重見洛陽才風流贏得山公署骯髒應非子建哀蘿薜雲深休自戀芙蓉秋老向人開凌波欲往無舟楫幾望新亭灑涕回塞曲二首黃雲四合角聲哀擐甲先登烽火臺十道控弦齊落馬幕中賔客上功來哀笳動地逼長城細栁營中輒夜驚老弱嬰城壯士死將軍高枕聽秦笙朱秀才元弼元弼字良叔號武原海鹽人萬厯初茂才安貧力學事後母以孝聞門人私諡曰達隱先生著有猶及編獨醉菴集送朱官宇遊洪都時豫課其伯子秦山何青青秦溪月在亭與君一擕手共指牀頭酒一尊潑醅未曽開苕上春鴻入幕來時君欲度滄江去期豫雪後梅花署安得輕絲繫紙鳶相隨萬里奏離絃朝朝暮暮滕王閣明月當忩長不落君須記取碧珊瑚歸來莫怨東風惡題朱辛江便面自少圖名意誰言世不知僧求開寺記客送買山資細雨魚翻藻斜陽燕哺泥平生無事迫辛苦為尋詩屠副使叔方叔方字宗直號瞻山應埈子萬厯丁丑進士授鄱陽知縣先是遜國諸臣踈屬一丁一地分戌劇邉一遇絶丁輒行勾補飛符所到寃結二百餘年方之令鄱也適有符勾鄱人胡閏絶丁者方憤然擲符於地曰彼死忠何罪其親屬又何罪使吾有言責必碎首爭之矣擢御史即為具疏請諡請祠請修治冢墓恤録子孫及交遊姻黨之株纍編戍者一體赦宥神宗感動蒙宥者千六百餘人京師張赦榜時忽風發榜飛轉展天際觀者如市自午至未仍還故所鄱陽張榜亦然事見顧憲成英風紀異録中轉山東副使乞歸著建文朝野彚編行世讀外舅功德贈言有感二首有引司空公視師海上豫時尚幼猶記督府胡公宗憲欲寬大寇徐海之誅以司空之令應時殄滅吾湖故老一一能誦之既乃功歸督府謗集司空至今不敢頌言其伐議者惜焉書此志感江波猶自鼓悲風廟食今傳在甬東壯士由來思倚劒浮言誰復念韜弓當年帝寵元稱渥此日羣情已抱公天意也憐功未賞有孫新得薦南宫中山嘗憶謗心驚讀罷新篇恨未平豈直枌榆全保障應知吳越賴長城蒼生並脫燃眉急青史唯傳折股名方略於今零落盡深慙李漢善為甥漢是韓退之壻能纂退之文集孫副使成泰成泰字允交號景蜃簡肅公季子萬厯丁丑進士授道州知州革市販例輸官稅升蘇州同知濬諸水利民賴之厯刑部郎升邵武知府調蘇州終大名副使産不踰中人稱亷吏云送尤司訓送君湖上正晴曛楚水吳山咫尺分今日莫辭杯底醉數聲離笛片帆雲黃副使正色正色字貞所秀水人萬厯丁丑進士官漳南副使三塔諸天開霽色煙水望中分塔影搖清漢鐘聲響白雲鳥遷雙樹曉僧定異香聞羡爾空林下翛然隔世氛陳舉人光贊光贊字季襄吳江徐田人徙居秀水領萬厯己卯鄉薦有川流集野老庵為董朝獻題湖上草堂生緑苔荆扉長對小亭開臨池人識右軍宅玩世時拈張翰杯栁岸及泉秋月上石橋垂釣水雲來與君放浪形骸外汀鷺沙鷗總不猜孫舉人成名成名字允仁號儀蜃簡肅公仲子萬厯已卯舉人自號超然道人有薄遊漫草兩京浪遊集釣鼇磯湖面溶溶九𣲖秋碧闌髙映彩虹流磯橫春雨桃花浪簾捲東風燕子樓此日釣鼇成五馬當年放鶴有孤洲明公為築湖中石次第龍門下玉鈎馮貞孝伯禮伯禮字節之號讓伯太僕敏功子萬厯中太學生太僕卒官有賻四百金以遺命築寶應堤生平負竒任俠事母以孝聞好讀異書行文饒有風骨客燕六年無所遇而卒當是時西吳鮑應選江右歐陽瑛俱遊都下與伯禮為文字交時兩生俱無子伯禮出槖裝為兩生買妾開别館以授之兩生各舉一子故伯禮之卒也天下名士為執筆弔誄者數十百人而兩生之文尤佳其孤洪業扶喪南歸沈司馬思孝采輿情撰議私諡曰貞孝所著剩言一卷春秋羅纂十卷皆不傳舟過仲祠下見先太僕手墨涕淚染毫成八韻舟維水市寒逺見任城暮兩岸積人煙有祠祀子路前閥垂丹青後篋開鉛素驚看父手題悲使兒魂仆錚錚言可聞簌簌淚如注只今蒲緑深何似淮黃怒事嗟往境馳政覺留神顧憐豫負笈趨此去將誰遇沈郎中堯中堯中字執甫號瀛壺嘉興人萬厯庚辰進士起家縣令歷升南刑部郎博學嗜古明於典故纂修本郡志著有沈司寇集及沈氏學韜治統紀略邉籌七略高士彚林等書所構城南白苧村居有東郭草亭南陔堂王弇州為記又有題沈執甫釣叟圖詩云蟠溪老翁八十餘此翁釣矦非釣魚若言軒冕異丘壑虞聖亦稱雷澤漁胸中但貯小雲夢焉用形迹分區區沈君家住蓴鱸鄉緑蓑衣底天茫茫一朝鵬化擊寥廓九萬里翼雲飛揚雖然得意挂朝籍忽忽舊遊中不懌晨從大國問烹鮮夕向窮閻憂竭澤孫枝為寫湖頭色展看煙波流几席賀監秃酒徒病昏無所知始乞黃冠去鑑湖能幾時桓家小孺子躁心在塵網何必解郡符始稱五湖長而我故是王𢎞之釣亦不得神長怡藉令物色羊裘去終許菰蘆明月知中秋煙雨樓望月滮湖此夜月常滿遊子數年才得還老去不諳新世路醉中猶識舊家山波光瀲灔浮青雀桂影婆娑擁翠鬟最是橫江羽衣客數聲清唳落人間海鹽觀海長堤東望浩無埃萬里滄溟一鑑開石柱近從潮外落沙棠遙向日邉來吞天隱見蒼龍角仙島參差紫鳯毸便欲乘風慕沖舉不知何處是蓬萊松臯積雪東郭先生坐小舲雪中棹入荻蘆汀江天漫漫迷歸路猶認松頭數點青苧村煙雨誰道城東煙雨多半村桑柘半村莎山深不識朱衣吏春社年年燕子過梅顛道人周履靖履靖字逸之號梅墟秀水人萬厯中布衣築舍鴛湖之濵種梅百餘株時咿唔其下人呼為梅顛道人自稱螺冠子著述甚冨刻有梅顛稿過殷方叔齋次舷公韻西滸曽聞隱接輿朝來得叩白雲居竹忩棐几清如許手自丹鉊種樹書項中書穆穆字德醇號蘭臺元汴之子萬厯初以資進官中書書畫有家法今存貞玄子詩與友人話舊經年南北嗟長别今夕相逢興轉豪雨過捲簾看桂影風來留客聼松濤半生事業徒殘卷萬慮消除祗濁醪劒氣已占遙應斗明時何復賦離騷柳枝溼雨沾泥若見憐穿紅繞紫乍爭妍不如落水為萍葉任著東風處處圓馬主事維銘維銘字𢎞衢號新甫平湖人萬厯庚辰進士授太平知縣攤二畝三分之稅丈科一畝豁黃山虗糧數百頃升兵部主事督山海關革貂皮稅以艱歸築牧圃於東湖上飲酒賦詩自號羼提生有史纂廣文選池塘草諸刻拜石齋送鄭醒生鴻臚北上慙無醒酒石醉後逢醒生君乃獨醒者云作薊門行天子自眀聖羣公贊太平君向府中趨手版能為情雖縻長安米亦遊大人名豈為麴糵苦吏治揚其聲仍當酌一斗與爾解餘酲陸通政長庚長庚字元白號津陽平湖人萬厯庚辰進士授廣德州知州釋寃獄六案去丈量浮額創水陽倉以免陸運之苦裁革縀價四千餘兩禁北鄉煤山採貢等事州人德之升刑部員外歷升湖南道核長沙屯糧侵蝕以俾軍需轉桂平道猺首韋扶仲盤花婆擾府江出沒荔浦時用兵三萬五千糜餉十二萬長庚請撤兵賊果懈長庚密遣副將童元震夜至白馬沖襲之賊大敗八寨悉平播酋楊應龍反升湖廣按察使移治上遊提兵擒之升江西布政歷府尹晉南通政使乞歸尋升兵部侍郎固辭卒年七十有八感興呈景陽兄林藪原吾志年來逺市朝青山歸計穩白髮壯心凋夢逐翻風蝶名疑覆鹿蕉小忩休沐暇間步誦逍遙遊龍光寺玉沙盤繞作龍眠古寺中藏小洞天百尺孤松棲白鶴一池寒水印青蓮上方鐘靜雲生榻别浦僧歸月滿船到此徘徊常竟日年來官况已如禪項太學道民道民字民逸元淇季子幼韶慧能詩長益駿發時馮開之李伯逺皆孝亷負盛名道民鼎足其間文酒淋漓風流掩映逮開之魁天下伯逺終數竒不售道民一日忽盡焚其制義耽禪恱石磴繩牀蕭然一室中六時諷唄不輟也獨不廢吟咏沖和簡逺具雅人深致有春暉堂詩經臨安縣碧澗侵橋濶青山繞縣斜林深惟鹿豕樹老成龍蛇野飯燒松子籬香散栗花煙雲前路暝燈火宿誰家出龍江關得李玄白亦罷浙闈信爾命仍難逹豫懷祗自憐吟邉嫌句短客裏得愁先黃菊深歸興澄江穩晝眠顛毛種種矣非復棄繻年賦得團扇代姬贈别妾命仍宜爾君心詎不同曽擕懷袖裏幾抱月明中巧製裁班女新詩出漢宫炎涼自有分豈敢怨秋風蛺蝶栩栩雙飛蝶書帷點綘紗撩人輕撲粉避雀巧穿花浥露香鬚溼迎風錦翅斜憑君幽夢逺隨意繞天涯初秋庭際忽開朗初秋蔓架除林香收蚤蜜畦翠長新蔬避客扉常掩無人髮懶梳松忩燈火夜還有課兒書寒夜懷李玄白在吳門熏籠香自暖茗碗過三更凍月含霜氣廽風走葉聲殘燈沉幔冷棲鳥壓枝驚此夜難成寐寒衾念友生遊故郭武定侯園先朝貴主故侯家野圃東陵學種瓜金埒晝間天廄馬玉堂晴鎖上林花鳯鸞響斷無璚管蛺蝶圖殘有絳紗青鬢少兒頭白盡自翻新譜按琵琶送陳侍御出守韶陽使君五馬下東方幾載明光草諌章驛路幽花香豆蒄離亭秋樹暗桄榔卜雞自化夷獠俗驅鱷能清瘴海鄉漢代即今容汲黯豈留長卧在淮陽暮春山莊即事溪上田田蓮葉齊墻頭箇箇竹枝低長春花發香凝砌半夏苗生藥滿畦道貌只宜居士服清齋何怪太常妻偶緣對客時揮麈每為看山獨杖藜包知州世杰世杰初名文熠字襲明號心弦秀水人萬厯壬午科官知州秋夜同黃玄之招何士抑沈孺休孫世聲飲湖上且欲留君醉緑莎只今誰復嘆蹉跎放船花外尋洲渚擕手沙邉看芰荷明月似隨歌扇滿涼風偏向舞衣多五湖不惜煙波濶欲去菰蘆奈若何史貢士羊生羊生字玄年號鶯湖吳江人僑居郡城萬厯初嵗貢有吟略一卷孫亶亦能詩閨思秋來庭院夜生涼絡緯聲多思更長莫向交河啼漢壘寒衣搗盡未成裝沈教授大奎大奎字子聚號淡滄嘉善人萬厯初明經官教授有淡滄集歸途作蘆墟四望水粼粼寂寞孤村絶四鄰茅屋數椽無犬吠獨餘殘月照歸人馮秀才盛世盛世字濟之號念羅嘉善人萬厯初文學有桑榆館集慕容家自魯企由谷歌二首慕容家何在谷深不可尋少年抱緑綺相見即知音有谷慕容居有桑慕容樹蠶織製錦衣從戎入句注胡學究碧霞碧霞失名嘉興梅溪人萬厯初學究其詩章一帙題曰百憂集詩亦清徑無俗調雨細雨如絲引空濛夾霧輕霑衣才見溼落葉更無聲旋入行雲去常滋蔓草生簷楹聊騁望徙倚更多情次李二仲美避暑雨上人竹院逃暑翠微際還從支遁居竹光團砌滑山爽入簾虛謝客惟聞鳥澄懷並廢書坐深消白晝塵世復何如草堂漫興滿院清隂午半殘松花香染石牀寒幽棲白日憑詩卷蕭散青林自籜冠避地祗分鄰水竹種花時葺傍池欄主人會有投間意幾處看山興未闌朱文恪公國祚國祚字兆隆號養淳秀水人萬厯癸未狀元授修撰厯禮吏侍郎光宗立起禮部尚書命下而光宗晏駕熹宗嗣位與葉向髙同赴召晉少保武英殿大學士因疏救大司寇王紀不報嘆曰去大臣如小吏事不可為矣遂告歸卒贈太傅諡文恪有介石齋集國祚學問淹雅言行醇篤為政持大體以清白自勵方其為宗伯也東朝未建祚先後疏請言甚剴切錦衣鄭國泰希賢妃旨倡先冠婚後册立之議祚復請誅國泰神宗感悟一夕召祚甚亟至宫門傳旨册立并封福瑞惠桂四王倉卒奉上諭而儀注預定巨典遂行皆祚力也已因災異請罷開礦撤稅使舉趙世卿為少宰救諌官曹學程王德完等皆不令知之及入相凡於人才用舍軍旅虛實諸務雖閣議紛然而祚片言立決可謂有大臣之風矣遊石佛寺靈境深沉試一過俗氛原不到巖阿亭亭老檜乘雲氣孑孑危峯罥薜蘿煙鎖空林人迹絶香浮寶地梵音多從今願學無生法攘攘塵埃奈我何贈麻衣和尚莫言師嗜酒酒原是米汁世人自言醒顛倒混黑白東朝即事二首殿庭香藹接雲平一道爐函夾陛行肅肅講臣齊鵠立金蓮影裏喚先生琉璃光潤絶塵埃咫尺甘霖遍九垓猶恐侍臣侵履溼宣從殿側左邉來嶽郎中元聲元聲字之初號石帆一號潛初子嘉興人萬厯癸未進士由旌德令歷國子監丞詔選良家上疏諌止并言用銅械撻宫侍為傷仁神廟納之升工部郎時有三王並封之議元聲與顧允成張納陛上書復與陳泰來等八人面質相臣於朝又移書比之林甫敬宗相臣始有三誤三愧之疏事乃寢後以姦人沈惟敬日本封貢事元聲三疏爭之落職里居天啓初起南光祿卿纍轉兵部侍郎魏璫擅政應山楊公劾其二十四罪得嚴旨元聲發憤與同官陳道亨等公疏觸璫怒道亨稱疾去臺臣以他事劾元聲削籍思宗御極復原官然元聲已無宦情築室孤山嵗寒巖以老感念東林死難諸友勒名於石而為之記且作詩弔之有潛初子集過石佛寺聞道靡喧寂幽林強自過有生皆爛漫無計出婆娑細雨衝泥滑新涼入檻多夢回聽法鼓清意在山阿贈錢比部讞恤三輔兼懷燕趙諸君子使節風流出帝畿陽春白雪正霏霏含香畫省分雞舌珥筆天垣綴玉衣寧俟璽書封少府佇看胏石靜圜扉相逢燕趙諸君子為道山人飽翠微鍾薊州起鳯起鳯字羽王崇德人萬厯乙酉舉人官薊州守息􅓈園結廬少城隈種竹不盈畝巷列七頭松門栽五株栁緑水浸橫塘紅菱間白蕅石矼平於岸有亭大如斗桃李紛南榮桂杏排北牖頌橘懷餘馨妻梅絶塵垢四序遞芳妍鑒賞來鄰叟彼我各忘言時傾一杯酒俞太學懋相懋相字元簡號季暘平湖人萬厯間由諸生入雍無所遇賦詩自娛名曰酣語馮司成招集梅花莊出歌姬佐酒次年復遊而司成已故感賦此詩司成娛客地零落幾人哀高館啼黃鳥空除見緑苔容華隨淚盡歌舞逐愁來此日孤鸞調吹彈向夜臺為沈白巖悼妓年少當場曲未終忽驚芳信罷簾櫳楚山蝶夢雲俱冷湖水鴛波月乍空即有香痕應化碧徒留絃管自銷紅沈郎多少胭脂淚零落春風夜雨中落花誰將靈藥駐芳年轉盼紅塵歎逝川試問粉香消受處風情多在鳯頭邉吕太學元聲元聲字闕海鹽人萬厯間太學生武原紀災詩少小見人説飢餒壬子兵荒辛酉水此時飽食不關懷老大方知窮戊子兩年田白無草生到處瘟黃哭人死米不滿斛值百千人猶鎖棧等價錢餓夫伸手頭搶地寒士束腹呼髙天家廪才餘三百石一日忍作兩日吃升錢減半周貧閭五日爭門厫底出忽傳湖廣尖新來家户看看改顔色通商亦是救荒䇿昔人有言毋遏糴附考武原鄉即今平湖縣十八十九二都地也吳越春秋云吳增封越地北至平原徐天佑注即武原越絶書云覲鄉北為武原其名最古秦時海鹽陷為柘湖移治此鄉漢順帝時海鹽又陷為當湖復移治明宣德間於此立平湖縣孫副使光啓光啓字子昭嘉興人萬厯癸未進士仕比部出守惠州爭王子龍獄忤上官意遂以疾請歸補延平不赴再補濟南尋以異等遷秩備兵沂州轉升漳南巡道竟以議事卒於福州公署去惠州作捧檄蒞茲土勞勞未匝嵗本思宣上德祗自速厥戾曷勿如脂韋而乃同薑桂由來性夙成並不解阿世骯髒每招尤落落誰相契人生貴知幾出處何必泥矧且嬰錮疾亦復需調劑無藥可醫狂自分當淪替所以輕簮組一官等疣贅寧去無寧就非夷固非惠殷勤辭父老慷慨謝輿𨽻相顧更惓惓欷歔各垂涕豈知氷雪腸榮祿非所計君門萬里遙縹眇青雲際翹首合江樓臨江漫凝睇皎皎羅浮月纎靄不能蔽涓涓豐湖水東流不少滯行矣挂蒲帆悠哉去海裔秋萍逐浪飄野鶴乘風唳俯仰任優遊襟懷自光霽故園松菊存歸來足休憩吁嗟陶彭澤髙風愧難繼陸處士長春長春字景陽長庚從兄隱居種德萬厯丁亥大疫蚤起見五鬼竊語曰正人在我輩當避之一方竟無染者題木芙蓉畫册鏡下誰年少花間獨女郎楚江憔悴極昨夜染秋霜檇李詩繫卷十五
