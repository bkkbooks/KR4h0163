body:
  text: 檇李詩繫卷十二平湖沈季友編明鄭端簡公曉曉字窒甫號淡泉海鹽人少好嬉戲乘屋緣木蹻捷自喜八九歲時猶被絮襖逐羣兒捕蚌也然授以經傳子史及字義講解輒能通之嘉靖壬午鄉舉第一癸未成進士為兵部主事日閲故牘盡知天下厄塞與士馬虛實强弱之數撰九邊圖志一時士大夫始知曉為經世才因議大禮杖闕下後轉文選郎分宜用事為子世蕃求璽承曉謂非故事分宜大恨貶和州判回翔南卿寺十年始以刑右侍改兵部巡撫鳯陽時倭冦江之南北曉日夜謀勵將士戰於海門狼山等處俱大勝斬獲殊衆曉素以文學聞又癯然若不勝衣而乃以武功顯人益知其不可測纍遷吏部尚書右都御史改刑部尚書時有大獄如張翀等忤時宰郭希賢諫立儲王抒阮鵬誤軍機及留都兵變通倭釀亂數事皆與分宜不合益搆之落職歸既卒詔復其官穆宗即位贈太子少保諡端簡曉問學淹博經濟宏深性儉朴編纂不倦著有吾學編古言今言奏議文集等書中秋憶陶選部為憶雙泉子今秋尚戍邊百年心共苦萬里月同圓生死憑誰問饑寒獨爾憐殘星過斷雁愁絶塞門烟自題百可園吾生巳如此抱病對朝暉梅老花偏密桑柔葉正肥隔溪聼鳥唤倚檻看魚飛幽意那不愜誰云心事違乾坤長變化日月共居諸海內誰知已山中此舊廬榮光卑二鳥憔悴憶三閭謝卻周公夢冥心混沌初秋日海上孤城海上若星棋聞說三遷事更悲百谷東南空地力九秋潮汐自天時黃灣水落魚蝦亂白塔烟深草木遲鼛鼓年來猶未息何人肉食抱長思獨立滄溟嘆禹功長隄隱見亂濤中鹽田何處蘆花雨茅屋誰家燕子風漂泊苔㾗連水碧參差楓葉帶霜紅珊瑚樹底埀綸者豈盡天涯白髮翁諸將四首太原天險傍雲中保障今誰第一功西顧榆林東上谷漢家京兆此扶風朔馬前驅摧紫塞材官北靣守黃河風塵不斷千山動渾脫相牽一葦過驃騎未搜青海賊胸奴還結黑山奚朱旗夜屣雙城破白骨秋憐萬鬼啼制府魚符縛錦幃將軍虎印卧征徽隔山傳箭催朝食對靣援兵怕解圍吳尚書鵬鵬字萬里號默泉秀水人嘉靖癸未進士授工部主事參議黔閩以平冦著聲晉刑部侍郎時河决徐淮饑饉相望鵬往賑截漕糧濟之尋以兵侍兼副都御史督理漕河先是有神降桃源能人言自稱柳將軍數為河患忽一日曰吳公至我去矣及鵬至而决口立塞又以平大盜師尚詔功升工部尚書晉冢宰掌銓衡者六年時嚴嵩柄政鵬不無脂韋取容國史有遺議焉歸田之後卒至賈禍可歎也著有飛鴻亭詩贈林雙峰天馬橋東宅高人舊隱居開軒延素月灌藥引通渠徑滿陶濳菊家傳伏氏書有時叨客至自釣錦川魚南湖為欲留春住開尊得賞心湖天浮曙色堤桞足清隂燕掠芹泥墮魚穿荇帶深逢從羣彥後佳㑹許重尋松風亭亭帶蒼崖古松擎翠蓋鮮敗垣蝸篆引高樹鶴雛眠野寺餘春釀遙村接暝烟絃歌非魯邑耕鑿總堯天過黃塘懷洞陽公泛泛青溪水何當此地經江沙連月白嶺樹入雲青歸去覺今是行吟憐獨醒側身天北濶莫誦首陽苓次府江感懷呈劉憲使上化灘前晚繫舟黃茅嶺接楚雲秋一天瘴雨來殘夜千里蠻江有急流短髮獨搔猿送淚疏燈自照角添愁却憐留滯炎荒客巳似當年桞桞州王知州經經秀水人嘉靖壬午舉人官知州挽張雙溪許國身曾萬里還蜀江塵土暗重關凄凉墓木今成拱落日悲風滿故山馬蘄州淮淮字元豫號乾庵秀水人嘉靖壬午舉人官蘄州知州赤壁江中白鶴影雙下山外遊人時一來千古江山只如此且須把酒放眉開袁高士仁仁字良貴號參坡嘉善人或云蘇州人誤凡天文地理律厯書數兵法水利翳卜之屬靡不究心謂醫可濟人遂寓意於醫崑山魏校疾使三至仁謝曰君以心疾召我但當咬咀仁義炮治禮樂以療之不然雖十至不來也仁以祖父皆習春秋有論著復憫世儒溺胡而不信也乃作針胡編詩亦斐然氣殊蒼朴著有一螺集畫竹謝沈啓南昨見石田子惠我一幅竹蕭然展閲清風生丹鳯翩翩下淇澳倣佛坐我瀟湘間葉葉飛霞起華屋見竹如見石田子高節凛然凌衆木一枝獨倚巖谷寒江水㴞㴞為誰緑為君深貯莫輕開葛陂風雨愁龍觸幽瀾泉金谷對叢林高人此夜情引瓶清露裊汲月曉寒生潄玉雲花落飱黃梵宇清翻憐行路客到處覔遺罌弔梅道人墓日落霜飛百草枯橡林暮雨咽寒烏空留妙墨驅塵世猶有清風拂酒壚古壠烟浮閒夜月空林露冷滴庭梧只今歌舞樓前月不照梅花塔影孤香和庵竹鎖茅庵野水邊松篁滿地獲茶烟三千法界元非逺五百聲聞别有緣斷碣卧雲踈雨裏香臺橫草落花前山人自證無生訣不學空門五味禪附考庵在嘉善東南十五里元至正建久雨四月沉隂水拍扉客忩猶未减寒衣澗逢急溜渺難度竹鎖殘雲濕不飛苔蘚上階連草緑蟪蛄啼雨落花稀白頭更覺長安逺盡日江頭坐釣磯陳氏園長安宫殿總成塵悵望豪華立水濵荒苑有禽春草碧故園無主野花新習池錦帳風前絮金谷明珠夢裏人試看武塘川上月巳沉幽澗照青蘋寄沈一之衰草殘陽滿地紅蘋花零落野塘風一枝多少懷君夢半在青燈細雨中神仙宫看竹仙家有地只種竹多少清風激懦夫滿院緑隂餘晚節桃花應合笑𤣥都附考宫在嘉善治東二里唐開耀間建聞王伯安謫龍場白簡霜飛拂紫宸一鞕遙指瘴江春孤身願作南飛㕍萬里隨雲伴逐臣聞王伯安靖江西當年談道薄鵝湖此日揮戈靖國魔夜靜燈前看寶劒先生應悔殺人多沈舉人爚爚字伯逺一字世明號石聫嘉善人概從子嘉靖乙酉舉人居家動遵古禮日咿唔不輟其詩清徑有石聨稿子士立亦能詩尊空菱青竹碧山雲鮮客子狂歌清渭邊風鸛背啼當徑樹暖魚晴跳隔溪船凌競石岫將誰往狼籍烟花亦可憐酒盞鳬飛相趂逐青錢隨意買江天范同知言言字孔嘉號菁山一號訥齊秀水人嘉靖丙戌進士自蒲圻令升大理府同知致仕言博綜經史善屬文與比部彭輅相頡頏范尚體裁彭尚才藻兩家各負氣不相下而時論左袒於范豫特以詩較則彭有高調范稍柔脆矣有菁陽集酬賈實齊憲副水暖躍春魚山晴照客居菰蒲淮水際松檜漢年餘酒熟雲安市田荒鄴下渠嬌兒勝筆硯塗抹老夫書湖上誰開湖上閣獨對晚來曛鶯語排花出潮聲帶雨分遙看鄰牧散閒與海鷗羣自笑江干老悠然卧白雲金明寺佛閣湖曲深藏寺城隂别起樓登高公事了避暑醉鄉遊净啓青蓮社晴分白鷺洲憑虗問牛斗江漢幾時秋陸巡撫垹垹字秀卿號簣齊自稱一簣山人嘉善人嘉靖丙戌進士授南京刑部主事道自河間郡守惡其倨居以廢館館多祟遇者輒死比暮輿皂栗栗告出惟二童子留既寢夜半有聲剨然其怪頎然而黑立於榻前垹怒以手擊牀曰我陸垹也汝何為怪遁去至南都平反寃獄每與大理相軋時嚴嵩為南禮侍屢造垹垹拒不見曰此人雖有時名實奸雄也未幾出知常德府調武昌尋改嶽州歲饑垹不待奏報發倉賑之御史伊敏生至府垹供奉甚簡敏生入其衙唯蒼頭二人敝篋無鎖撿之唯殘書百卷布衣數件而巳遂疏薦拜太僕少卿歷升僉都御史巡撫河南乞歸有簣齊集一簣山人歌一簣山人歸武陵自云作吏非所能上世本是農夫家中嵗頗多丘壑情憶昔十五時讀書始趨庭庭前一簣土乃是先人營三十射䇿登帝廷四十剖符慙專城中敡外歷靡寸補千憂百慮何時寧風塵嵗月厭奔走笑言眉睫羞逢迎匡廬觀瀑欲大呌洞庭釃酒愁冥冥懷賢幾自跨黃鶴訪隱常作桃源行一朝得調忽辭去掉頭那管人間名乘與還回剡曲棹遺安况有鹿門耕不能如馬長卿著討禪書不如能揚子雲草太𤣥經不能如陶朱逐時事貨殖不能如赤松辟穀學長生吏少門前租僅足客來花下酒常傾不愁兒癡是豚犬不恤宦薄非公卿顧以人生百年內塊然簣土猶無成悲來風木不自禁三釜那得為親榮仰看蒼天摩九仞此意突兀難為平上鷹歌君不見楚澤之上鷹爪利若擊目若星雄姿逸氣何橫生翻身猶能墜鵬翼豈但可使燕雀驚稜稜徑翮秋風裏逺勢未看窮所止壯心誰謂便相拋籬落聊回啄文雉築堤謡彼田高我田低高田積土河成蹊低田年年催築堤築堤復取田中泥今年大水百榖傷高田得熟低田荒遂令低鄉有田者唯願有田在高鄉君不見土龍三日雨莫禱高鄉之田為茂草登胥山伍胥來駐馬見說此山頭草木兵猶似乾坤氣未收蒼霞含宿雨野屋抱寒流日晚一登眺天風吹客裘訪柯侍御九華山中留贈趨朝同聽午門鐘九陛森嚴虎豹重何事歸來化城卧硯屏閒弄九芙蓉洞庭歌巴陵城頭白鶴回巴陵城下洞庭開湖面青山隔簾檻暖風吹送酒香來賈汝寧名儒名儒號實齊嘉興人嘉靖丙戌進士授刑部主事抗節持法出守姚安再補汝寧㑹世廟躬詣顯陵時皆斂民以應名儒悉還給民德之乞休後詔起憲副力辭玉龍山館訪薛鶴樓不遇鶴樓何處是窈窕入烟霏陟石雲生屐穿花露濕衣虗枰松底列野鳥竹間飛聞說尋僧去吟笻在翠微屠諭德先生應埈應埈字文升號漸山康僖公第六子嘉靖丙戌進士選庶吉士調禮部郎乙亥復晉諭德同時吳門袁永之錫山華子潜四明陳約之晉江王道思並有盛才與之友其學日益閎大如議禮疏及薛瑄從祀疏皆有原本尤長於詩諸體雄麗允為七子開先王弇州稱其詩含華茹英輝焰奕奕陳黃門詩選中亦多推重之詞著有蘭暉堂集生平好為竒節豪宕風發飲酒百鍾不醉又好內後庭多稚齒婑媠之人卒以病廢方埈之生也康僖公筮之得震之漸曰鸞德如玉飛上高木鼓其羽翼光照四國及歲乙已夢謁衡山君有書在廡間曰明年正月十三日官至二品增年一紀晨起呼諸子曰我殆將死矣我宦遊二十年官不踰五六二品增紀者其易歲之兆乎如期卒霸陵篇憶昔漢文帝行遊霸上園遙指新豐道回瞻渭水原倚歌未終曲慷慨啓長嘆槨發北山石紵絮斫其間左右相嚱噓嗇夫前致言請觀秦皇帝壯哉營酈山白日避層闕銀流涸重淵𤣥臺玉衡建幽戺青藜懸六宫既同盡千夫亦何寃金湯萬年固陵谷須㬰遷愚民諒何知厚葬乃其愆片言感宸極納諫如轉圜高陵不夷塹卑渠㵼通泉聊供陶冶器無改山澤觀當年景遺詔後世稱高賢巍巍霸陵廟迢迢至今安高陽行贈范司成菁山君不見高陽酒徒氣若虹酒酣仗劒謁沛公褒衣側注反遭罵竪儒瞋目稱而翁軍門拾謁使者入麾豫雪足來趨風儒冠自昔為人下豪士纍纍走中野公卿半屬鼓刀人塵埃誰是彈冠者侯門峩峩仁義存金貂白玉多殊恩九逵車馬若霆擊中臺咳吐如春溫丈夫風雲不自致寧能咿嚘齷齪趨華軒菁山先生真握奇文章埀世光陸離懸黎結緑世莫識陽春白雪和者誰憶昔豫為門下士諸子森森並蘭峙白晝行歌秦駐雲醉後清心越溪水即今巳及十餘年人事升沉豈堪紀鳯儀未上金門書吕甥尚曳東郭履埈也雖負鴻漸翼失勢青雲未能舉去年有詔收駿骨沉咸十蹶始一起先生豈是百里才驥伏鹽車埀兩耳幾年卧遊湘水東洞庭雲夢清若空青蠅營營止叢棘白露颯颯摧孤桐長安春半氣猶烈上林水氷柳條折潞水拏舟不得行匹馬蕭蕭踐氷雪高陽客舍行人疏糜珠斧桂為晨餔天寒苜蓿芽未茁夜深鼯鼠時相呼鵠袍諸生半僵卧玉署談經能聽無君不見黃金峩峩千尺臺昭王樂毅俱蒿萊漸離擊筑已絶響荆卿易水歌空哀吁嗟乎人生得失何須數尊前俯仰成今古時來北闕繫金魚歸去南山射猛虎送林僉憲汝雨兵備潁州虛庭落日明嘉林薰風吹我堂上琴故人言别赴河潁使我不覺生離心援琴欲奏啇聲沉感時懷昔多哀音憶昔與君同侍輦奏書朝聞夕稱善扈聖親登太乙壇承恩數奉甘泉宴須㬰雲雨各西東北風栗烈南飛鴻君度石梁看曉日豫隨蘭省卧秋蓬故人才高人所羡飛藻如烟氣如電建節鸞臺日月懸橫經彤署星辰爛寒霜飛空凄北堂三年入謁來明光此時正奏甘露至金莖不動天風香露乳聨珠瑩飛雪松雲晝開暮還結故人新自故鄉來應飽瑶華弄松月夜談坐聽填填雷擎霄碧玉翻空摧閉門共讀祥異志出門向人還語誰九逵車馬朝來㑹共議明堂草書對近臣新冊定陵功常侍總承開府貴君不見人生得失難自量天道盛衰寧有常朱陽受節蘭蕙芳零露夕變蒹葭蒼時來立取封矦印老去猶為執㦸郎又不見披裘採薪登後車箜篌在御朱桐虗歲歲南山叩哀角年年東觀著遺書君行梁臺度潁水梁苑莓莓夕烟起汴水微茫晝不流唯見村原暮塵紫鳯城東山龍作盤萬年陵闕天南端黃河千曲淨回練蒼崖百疊鶱高鸞此中騎士俱羆虎故人有文兼有武嵩山雲生拂羽旗淮海風清雜鉦鼓煌煌絳節坐臨戎爼豆長垂鼎鉉功縱使沙場親校獵絶勝藝閣賦雕蟲太乙壇歌太乙壇高凌紫氛宫中夜夜延神君金盤千尺㵼朱露莖臺五色飛龍雲撞鐘鳴鼓邀百祥回旌駐蹕瞻景光石檢親封緑文閟河圖著紀赤符昌九華燈明列星爛八變樂終萬靈見至尊端笏禮中天北斗埀芒指前殿皇皇圭璧奠甘泉奕奕樓居通列仙侍祀獨有東方朔登歌新協李延年白茅授冊侯五利青鳥銜書作前使貝闕徘徊河漢沉絳節繽紛王母至武皇北靣來相迎稽首至道聞要精能驅三尸鍊五魄可以閲世為長生帝聞斯言再拜受宴罷言歸樂無有祈年何必汾水隂無為自享南山夀贈吳山人擴山人出山何所適來作長安五侯客摛藻朝飛北海雲磨崖夜泣南山石長安二月花含烟意氣翩翩俠少年千場博戲章臺下百發烏號細桞前山人敝衣衣後穿拾謁欲向何人憐投珠委玉盈尺箋饑來不售囊中錢短歌為君君自慰且拂琅玕謝時貴王生解襪只自嗤世間那有張廷尉至日憩東平飲趙二元實舍席上贈長句四明才人趙元實絶壁寒松倚蕭瑟逸興飛翻東海雲赤心直指扶桑日前年天子罷郊雍金書煌煌命上公秉圭植璧對上帝奉璋鍚胙俱宗工諫臣如麻但僵卧君獨抗言陳不可批龍巳荷明主慈履虎真逢貴人怒去年過飲倪生家夜深酒半人爭譁仰天白眼罵流輩嚼杯膝席陵豪華人言趙郎太孤立委心置人人不識徒手欲裂丞相麻直腰不共將軍揖坐令談笑生戈矛白玉被㸃黃金投鷦鷯一枝聊自適騏驥當途遂晚收我來山郭逄長至晤語相歡故人意墨綬猶存粉署香鎬宴曽霑赤墀賜自從天上聽簫韶歸向人間厭歌吹即今束縛如拘囚青山對靣不得遊尊酒豈能容傲吏冠帶時催見督郵尊前起舞歌向君人生得失如車輪君不見甘羅孺兒能貴秦買臣四十行負薪又不見田郎一言取相印馮唐十年官不進我今巳與滄溟期君才不久蓬蒿居盛世豈應無狗監是誰能薦馬相如送陳約之謁祀孝陵萬嵗橋山路三春草木青乾坤黃鉞在風雨翠華扃北極通羣帝中天覲百靈當時貔虎佐一一扈青冥送同年謝子儒致仕歸蜀子真棲谷口潘嶽賦閒居長揖辭明主為農返故廬雪消巴嶺出天入錦江虛莫待楊雄老潜夫早著書聞南太廟災金陵自昔建皇輿太室中天列祖居聞道振雷三伏後遂令煨燼百年餘朱旗寶鉞空人世玉冊金輪返太虛帝遣祲祥憂聖主諸臣應有諫肜書病起東郭為園枕碧流羣峰合沓俯林丘村閒晝日驅黃犢客至晴溪散白鷗璧月近臨珠樹晚銀河西指越山秋思𤣥欲擬張平子卧病無心詠四愁遊城東觀病起尋遊强杖藜琳宫寂寂枕回溪繁花向日俱宜笑幽鳥逢春各異啼雲滿客衣庭樹合氣薰山酌芷蘭齊郊行亦有桃源在明日重來路不迷登太白樓當時不見謫仙人城上樓高空復春勢極中原臨岱嶽境非吾土異三秦遙憐避地東方朔生有相知賀季真斗酒狂歌自今古志存刪述與誰論劉指揮湘湘字文清號雲巢海鹽人嘉靖戊子武舉人官指揮鷲香閣烟村背郭人家逺松壑蘿崖獨自登門外泊船秋水寺溪頭洗鉢夕陽僧買山有意逢支遁入社無詩繼薛能啼鳥催人歸去晚疏林落葉漏寒燈附考閣在桐鄉陸同知鰲鰲字子任號南溟平湖人嘉靖戊子舉人官南康同知宜春臺晚眺南下萬山連百越東來一水自長沙石林倒聽秋風起畫檻平臨返照斜張同知嘉秀嘉秀字文英號文川海鹽人七齡和錢福大樹詩一時稱神童嘉靖巳丑成進士歷南比部郎謫饒州同知秋日偕李拙修王秋園登金山清秋倚閣江天逈落日凌虛望眼孤萬里帆檣通北極百年遊覽失東吳黿鼉浪起回珠閣鸛鶴風高倒練湖莫向山僧記名姓狂懷只擬是前蘇沈副使謐謐字靜夫號石雲秀水人嘉靖巳丑進士授行人擢刑科給事中星隕應詔極陳修省劾罷自宫男子二千餘人出為山東僉事尋偹兵大庾計擒賊酋李彪生平慕王文成之學與羅念庵王龍溪唐一菴友善著有家藏稿遊千佛龍泉洞和康東濵韻三月鶯花飛欲殘郊原春色亦闌珊青青官柳迎人笑白白春醪解客寒石竇一龍鳴澗壑上方千佛見衣冠勝遊相繼無多日寄語山僧仔細看祖訓導晟晟字廷昭海鹽人嘉靖辛卯貢士司訓宿州歸林二十餘年嘗卧病鄭尚書就看晟坐黃草蚊幬見之恬如也性耽吟咏得句秀拔如碧山吏隱尋松子丹井仙方浸木奴人慕荆州求識靣誰逢東野不低頭有東歸稿秋夜晚花含蝶影秋水㸃螢光一夜思歸夢隨風到草堂沂陽子王文祿文祿字世廉號沂川更號沂陽子海鹽人嘉靖辛卯舉人負竒嗜古每憤發必挺劒叱罵不避貴要值有司設宴酒酣起舞呼曰此劒能軒貪汚其戇直如此人皆以為蚩家有書萬軸置之一樓俄失火大慟曰但力救書者賞他不必也年八十餘吟誦不止曰我讀來世書耳私諡文定有王生藝草莠言走索篇綵繩百尺闌青天朱竿對起遙相牽廣場突出層臺外虹梁平鋪如直絃雙娥靚粧迭呈技一來一去渾爭妍玉腕擎衡步移穩恍惚退後還追前特立宫鞋掉羅襪丰姿嫋娜疑飛仙繡帶飄揚綰晴日翠裙展拆拖霏烟慢撚纎腰斜擺桞驀佯失跌倒垂蓮怒虯拔湫迸鎖躍狡猱升木當空懸莫謂輕身博一笑為君撒盡纒頭錢走馬篇燕姬跨馬來江東羅衫窄袖藍對胸翠翹抹額戎裝束恍若矯矯飛蒼龍日搖濤影團花碎塵捲風聲彩雲墜鬛間暗閃奪珠標腹下還穿撒雕轡將非出塞昭君啼無乃歸禁楊妃醉歡娛忘冦擾前秋騎擁嬌娥謔浪遊魚麗陳靡誰敢殿長流難洗文夫羞包御史節節字元逹别號䝉泉子鼎之孫幼孤力學與弟孝相繼成進士節中嘉靖壬辰榜孝中乙未榜為御史亦有直聲節由東昌刑官拜御史接閩滇風裁特著繼按湖廣巨璫𢋫贇鎮守為虐節劾其不法廷杖謫戍莊浪衛居行間十二年聞母訃晝夜哀號又五年弟沒益慟竟以是卒隆慶初贈光祿少卿有苑詩類選臺中湟中二集龍巖曉行鳥道盤輿逈龍巗倚漢斜侵星尋石壁迷瘴問山家過澗惟聞水穿林不辨花貪程行數里引炬候明霞石屋烟霞鑿石開蒼嶺披霞控紫岑潤蒸深洞雨嵐結廢壇隂茗葉煎春溜松花摘晚林山僧閒共語到此益禪心五日同雙溪小坐萬里投荒日三年去國臣偶逢時序感重愴别離神檐杏梢雲密山花過雨新芳華聊可玩况對故鄉人夏日雨後過陳園選勝遵郊郭衝泥試杖藜溪承新瀑水山挂欲晴霓看竹人先至穿花鳥自迷笑豫來幾度才識小亭西玉女潭訪史玉楊吏部不遇九龍宫觀倚天開千里崆峒訪道來玉洞雨深新溜乳碧壇春晚半封苔雲中不見吹笙客潭上空餘鍊藥臺始信嵇康非俗耦却憐王烈是仙才馮太倉汝弼汝弼字惟良號佑山平湖人嘉靖壬辰進士任工科給事中劾中人張時等下獄冢宰汪鋐恃寵驕恣言官爭之不得汝弼投袂起曰擊之不勝則其志益驕事有不可言者吾當以死爭連上七疏久持不下尋有㫖逐鋐時言官廷杖死者二人蔡宗愷曾翀汝弼等八人俱外謫得潜山丞遷太倉守乞歸有集行世新竹夜來湘浦走輕雷驚起斑龍巳作堆老夫早起開三徑翠尾插天風雨來愛川惠菊不道山園菊事荒疏風小雨作重陽喜看折柬來秋色分得韓公晚節香錢給事薇薇字懋垣號海石海鹽人嘉靖壬辰進士授行人拜禮科給事在諫垣四年直言剴切天子每急有任使輒畀錢給事不由推舉如論翊國公郭勛攬權樹黨繼而指摘宫僚非人又以星變乃主德缺誤所致竟忤㫖罷歸方疏之入也薇謂其僕曰上方事𤣥修所忌者災眚疏上必旦暮死今以數金付汝買棺以殮耳命下得免隆慶初贈太常少卿有承啓堂稿時海鹽有三黃門咸以敢諫著張方洲許雲村錢海石是也夜集三塔山房懷玉陽頥山二丈渺渺雲山隔幾重每於勝地憶過逢清吟獨對尊前月高坐雙擕硤上峰僧到講堂時拂麈客來山寺驟鳴鐘昔年曾結東林社回首徒憐去住踪新茶欲向陽羡遊春雨阻行楫山僧擕滿籠門前挂青笠王滁州先生梅梅字時魁號柘湖平湖人嘉靖壬辰進士選庶吉士遷刑部主事初建昌侯張延齡下獄刑官沈椿以戚畹故不令入重獄後代者踵之事發前後提牢官二十四人俱擬杖而梅在其中謫判滁州卒於官梅才氣豪尚欲以功業文章自見惜乎未究其用在滁時雅抱冲淡縱情山水興㑹所至發為詩歌清深老健逈然塵壒之外可以振華啓秀噓枯吹生使千載下猶堪想見其人沒後五年馮祐山刻其遺稿夏日與韓魯淙侍御晚遊陶氏山莊晨與美人期出郭已遲暮頽陽迫崦嵫返照城隂路飛蓋入林樾宛轉緣溪渡長松罥緑蘿夜渚涵芳杜詞人志丘壑不以杯斚故欣然㑹意處袒據磐石坐月出詠而歸凉風在高樹百步橋百步橋下日荒荒江流無聲江草黃行人踟躇立古道沙鳥躑躅啼回塘蒼龍沉沉彩虹偃短棹輕舟采芳卷月落汀洲人不歸腸斷春風穆溪逺贈滁州劉文學賣藥不受值談禪能了元林藏收穀虎座有獻花猿泛蟻常侵曉懸鶉或負暄漢家徵五隱早晚賁丘園縣齊雜詠我愛來安縣依然太古餘居人盡茅屋長吏或柴車里巷多絃誦山溪足畋漁疏慵更何事高枕午忩虗寄石汀王先生二首有引石汀王先生按浙梅時為諸生雅承休盼斗筲黃鍾計偕一見睽離至今風搖心旌川回目練晤言未期沉憂空積觸事宣懷言無倫次聊軫疇昔俟諸將來耳苦憶王夫子清時賦考槃三年不相見一札阻長安蘭雪留彤管雲山照鐡冠因風泛瑶瑟情竭賞音難十年萊子服數口汶陽田荷篠深山裏銜杯曲水前春蘿搖石月夕鳥下汀烟最是論文友時時詣鄭𤣥送林節推赴任瓊州見說瓊州地烟中叠浪開逺天分島溆晴蜃結樓臺水館鮫人識風檣賈舶來桄榔秋樹好莫怨夜猿哀擬欽賜日講官鮮柿詩霜日晴酣萬顆紅金盤琥珀出深宫尚方共喜嘗新早講幄驚傳受賜同青簡可能慙素食瓊漿端合潤丹衷杜陵有客空才思寂寞櫻桃歎轉蓬寄曹𤣥渚與爾别來音信稀臨風常自動瞻依寒雲幽壑羣龍卧斜日滄江獨鳥飛皂蓋屢淹鳴玉渡白蘋應滿釣魚磯何時更鼓湖東棹兩兩波心泛月歸登滁州城淮北淮南節候同荒臺無限北來鴻初懷短夢青山外倦倚高城夕照中雲樹不堪連海岱商歌何處起秋風橫塘寂寂蘋花老欲采寒香薦醉翁在滁州與韓侍御魯淙卜築豐山東麓知爾亨途久息機不妨高卧共巖扉山雲半落烏皮几池月凉分白苧衣抱病秋來行樂倦故人天上尺書稀疏慵自缺經時略浪說東南有少微送客琴鶴蕭然萬里行一官嶺外稱閒情春風緑展桞隂厚霜日紅酣荔子晴賸有詩篇消日永坐看鼙鼓靜嚴城誰云百粵多豺虎談笑胸中有甲兵凉州曲記得行時約言從上黨遊昨傳書信至三嵗在凉州與韓侍御鎮伯同屬疾戲有此絶韓康賣藥不知秋子晉吹笙汗漫遊可是仙人厭蓬島一時高卧在滁州嵩陽山樵徐定夫定夫字士安自號嵩陽山樵海鹽人嘉靖初布衣詩有風骨堪與朱陳相伯仲有蛩吟稿憶昔行贈古松將軍吳堤三月百花殘秣陵歸客停征鞍青山落日意不盡尊前把袂愁相看憶昔論詩君獨好相逢何難别草草海燕還尋故壘飛天涯只恐音塵杳白鷺洲邊芳草青鳯凰臺上雲冥冥風流倘就還鄉賦寄我秦川舊釣汀出塞烽火三秋起天兵萬里征朔風吹徑弩沙月照團營鉦鼓宵連振旌旗曉更明十年腰下劒從此任橫行宫詞禁門秋草雨中生睡醒芙蓉小帳清幾日內庭宣唤少紫薇花底學吹笙趙副使伊伊字子衡漢季子嘉靖壬辰進士授刑部主事升南職方員外轉郎中人以其美呼曰小趙為人清直營卒不役私門郵符不假使客升廣西副使乞歸三召不起日遊湖山賦詩自娛有序芳園稿次答京華故人詩草載京華絶好音故人久矣作啇霖南飛曲奏人猶逺西使書來鳥自臨青鏡數莖添白雪丹沙幾轉得黃金從今莫話為官在野老悠悠只醉吟泛當湖出門理棹即湖中竟日淹留興不窮鏡水巳應歸賀監習池只許醉山翁深深岸桞迎人緑歷歷園葵對酒紅滿眼河山堪送老只今吾慕二疏風陳同知瀚瀚字𤣥海號龍嶽秀水人嘉靖甲午舉人選廉州同知所著詩文曰求志齊言草中賦頌十數篇有魏晉風味其祖教諭禧有武陵倡和父給事中咨有湖溪遺稿皆不可見矣龍游道中百折龍江渺秋天放棹清山圍霜樹合灘轉石濤鳴展簟情何適鈎簾眼獨明疏狂憂忝竊撫景愧平生龍頭山書感龍頭山中太可憐白沙翠竹春相鮮層空古寺出林靄隔水小舟穿浦烟著書虞卿病不廢匡時范老憂常先萍踪岐路亦何意擊楫泝流悲逺天郁主事蘭蘭字文芳號暘川秀水人嘉靖甲午舉人選績溪令時有希執政指論逮胡宗憲者守以屬蘭蘭曰司馬有功東南奈何欲文致之得末减遷南刑部主事乞歸有郁比部稿讀五代史天地沉冥際山河戰伐中可憐長樂老只是愛三公朱臨川佐佐字思忠號少泉海鹽人嘉靖甲午舉人為臨川令登硤山寺閣翠微樓閣與雲齊石磴盤回路不迷幽鳥忽鳴深樹裏好山還在曲欄西聞歌水調滄洲近入望平原落照低老衲莫關塵世事笑揮苔壁乞新題檇李詩繫卷十二
