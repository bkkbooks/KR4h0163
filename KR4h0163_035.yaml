body:
  text: 檇李詩繫卷三十五平湖沈季友編國朝閨孰師黃媛介媛介字皆令秀水人文學象三之妹與姊媛貞俱擅麗才而媛介尤有聲香奩間書法鍾王人以衛夫人目之畫亦點染有致適楊元勳夫婦偕遊江湖為閨孰師以終有湖上草王端淑曰皆令倚馬自命落紙如煙摘其佳篇蒼然秀徑會稽商夫人景蘭贈之詩云門鎖蓬蒿十載居何期千里覯雲裾才華直接班姬後風雅平欺左氏餘八體臨池爭幼婦千言作賦擬相如今朝把臂憐同調始信當年女校書王端淑有寄皆令梅花樓詩云買舠急欲探先春風雪偏羈病裏身聞有梅花供色笑客途如爾未全貧凍筆塗殘半是鴉剡溪渺渺竟迷槎相逢只恐梅花笑怪我春來不憶家嘗自作離隱歌序云豫産自清門歸于素士兄姊雅好文墨自少慕之遭時多艱萍蹤無定轉徙吳閶羈遊白下後入金沙閉迹墻東雖衣食取資于翰墨而聲影未出于衡門古有朝隱市隱漁隱樵隱豫殆以離索之懷成其肥遁之志焉將還省母爰作長歌題曰離隱歸示家兄或者無曹妹續史之才庶幾免蔡琰居身之玷云爾吳梅村製鴛湖閨詠四章贈之詞見本集鴛鴦湖輕風貼水飛春燕佳人宛自簾中見向水闌杆處處園梅花草葉春香變昨夜雲晴日影孤中洲曲沼生新蘆嘉興風景知何處亂帆煙栁鴛鴦湖閬園詩為豫章李太虛先生賦四首堂築修陂外常來書畫船入春花照地不夜水連天香發聞芳杜鴻飛識渚田林居知氣候無事此髙眠居近神仙里丹經早自知堂成初似畫世變巳如棋湓浦雲歸晚廬峰鳥下遲依依天際想去住是前期禹穴探奇嵗摛毫賦兩京坐嫌天地窄行覺水雲輕鐘逺虛聲應林幽夕照生十年耽異致蓬閬豈虛名境逐滄桑換身同詩卷留望雲生絶壑見月老寒湫道在心無染名髙世是求聊將少君隱共賦鹿門遊同祁夫人商媚生祁修嫣湘君張楚纕朱趙璧遊寓山分韻二首名園多異植花繞曲闌邊山抱蒼潭水林藏碧樹煙栖烏啼月下回棹泊霜前酒罷同歸閣開奩納翠鈿佳園饒逸趣逺客一登臺薜老蒼煙靜風髙落木哀看山空翠溼覓路亂雲開欲和金閨句慙非兔苑才旅中秋日憂危只有客心微贏得湖光蔽竹扉囊有新詩聊寄賞家存舊壁亦懷歸青山斷處饒紅葉黃菊開時少白衣近水隂晴容易過忽驚風雨打窗飛南湖竹枝詞三首胭脂點罷拂雙蛾喚整衣裳厭麝多爭向水邉呼不住弄鈎潛自拗輕荷倚屏點拂晚粧濃膩粉中間映淡紅墮髻不粧間首飾鳯叉斜插玉玲瓏嘉興美女慣濃粧絶樣南珠間翠璫廣袖繡完裁四帛外頭單罩紫綃裳湖上西子湖頭千頃春風光不屬去來人朝嵐夕靄誰收得半在憑闌半釣綸秋夜懷月輝孫夫人肅肅秋聲滿院聞晚風吹盡一天雲滿階落葉蛩鳴後好月當空疑是君黃媛貞媛貞字皆德媛介之姊太守朱茂時側室王端淑曽稱其詩律清警初秋草木疏疏緑未乾飄風日夕動林端拈將針線寧心就理得音徽不暇彈曉起簾櫳初退暑晚來樓閣又生寒衣輕扇冷無餘事好向窗前借月看悼亡兒六郎霜飄鴛瓦重月上燕梁遲最是消魂處明珠去掌時立夏日寄懷兄妹一夕南風動鶯啼緑盡知愁深梅子候約過杏花時巳負髙春話無乖新夏期三山天月裏各有一人思弔鶴詩素魄飄然上白雲松風寂寂竹深深月移誤識來時影花落當知去日心錦帳美人思妙舞别峰髙士枕空音碧霄孤冷尋何處日夕間看水木隂立秋日夢分得成字忩前修竹洗來清且理琴書託此生涼到半庭分夏去夢將一字許秋成凌虛久接梧桐影孤坐新驚砧杵聲我意正悲時節易更教重論月中情孫蘭媛蘭媛字介畹德貞長女適同邑文學陸渭工詩詞多韻語不雜脂粉擅寫蘭竹著有研香閣詩王端淑曰介畹詩如行雲流水在有意無意間讀外君登岱詩曽勒先姑沈安人石幢于泰山歇馬崖天下何曽小家鄉吳觀中卧遊詩一坐片石白雲封秋泛煙拖髙栁蕩秋姿落照寒蟬故故悲放棹歸來月初上風吹荷葉斷殘絲雨夜聞梅香作溼盡孤窗燭冷時梅花香破一枝枝逋翁未解黃昏雨清淺間臨照影池孫蕙媛蕙媛字靜畹德貞次女適桐鄉孝廉莊國英蚤寡著有愁餘草詞工小令與介畹爭勝讀縫雲閣草賦贈沈夫人次姊氏韻綺疏髙擷補天樓銀榜新題藻霱流月姊靜窺三素粲風姨不卷五華柔寫情妙句針同聖隱意回文錦可酬組練自知從研北絲絲葉葉幾殘篝沈孺人榛榛字伯虔嘉善麟溪人天啓乙丑進士南昌府推官沈德滋女適進士錢黯紅白瓶梅不盡南枝放軍持入畫裝繁英矜白雪疏蕊點紅粧羃䍥難分影蕭森共一香妬風應莫慮春色喜先藏家園古藤花園有九松勝國時植循墻蜒蜿走龍蛇占盡家山首夏花鬛鬛影隨華鬘動纍纍香貫蘂珠鈄窺園乍對疑朝彩隔檻遙看悮晚霞折得一枝持叩問藤年還似九松耶顧娟娟娟娟嘉興妓贈别南國相思子西番篤耨香留君充離佩休賭紫羅囊行剛行剛號祗園嘉興人處士胡日華女嫁諸生常公振未期而寡中嵗出家為僧通乘弟子住嘉興梅會里伏獅院有語録孟夏關中詠百結鶉衣倒挂肩飢來喫飯倦時眠蒲團穩坐渾忘世一任塵中嵗月遷沈栗栗字仲恂榛之妹諸生陳誼臣室紅白瓶梅曉避狂風落宵隨竹影斜朱顔羞剪彩玉骨絶含瑕漫簇參差蘂同分濃淡花羅浮夢何許一為膽瓶誇王煒煒字功史又字辰若太倉人太原相國之裔海鹽陳文學光縡室能詩善畫有燕譽樓稿與卞夫人為師弟交得其清秀蒼韻之傳有林下風以世亂偕隱于婁博學敦古詩多名句顧伊人稱為笄幃中道學宿儒不當以香奩目之如月光臨水淨雲氣近山多開簾納新燕移榻近髙柯皆佳句也太倉女子黃若從父蜀歸以奇花珍木圖示之日夕模寫致病而殁題介畹陸夫人畫竹卷自昔管仲姬抽毫染修竹娟娟綺石傍琅玕照人目猶屬閨閣才胸中少林麓只今介畹氏潑墨較純熟生綃百尺強渭川千畝簇初苞間枯梢暮雨秋煙緑筆牀螺黛殷玲瓏戛寒玉潛招湘女魂碧忩伴幽獨和吳巖子師湖上詠栁色六橋迷晴雲萬山吐燕帶落花飛鶯隨歌管度倚樹聽提壺疏泉成瀑布小閣遇春隂松聲嘗似雨冬日林居颯颯微風雪長林鎖白雲曳蘿山骨逈汲澗水衣分樹老花猶在霜清雁不羣誰憐搗衣者此夕幾回聞夏日幽居感地僻清曠絶塵喧刪竹蜘蛛墮鈎魚翡翠翻課童親稼穡宴客治蘋蘩唯願垂楊樹清隂掩我門春日間居南郊春色滿人靜鳥聲多久雨魚苗活微風燕子過花飛寒食節草緑夕陽坡盡日無他事援琴對薜蘿感懷二首逺離阿母四年餘百疊愁眉更不舒眷戀庭闈惟有夢播遷南北未成居家園風景三更月夫壻生涯數卷書無限傷心歸未得鷫鸘典酒對相如空傳錦字有才名淚雨春來似未晴倭墮睡殘悲數病扊扅炊盡送遐征心隨吳水鄉關去愁逐春雲晝夜生潦倒三遷名未就誰憐女子賦離情同諸太母登浮圖同登化塔縱遊觀山色蒼茫海色寒風送珮聲臨絶頂日將人影上危闌諸天直向雲中接下界翻如畫裏看到此須知塵相幻凌空誰敢更盤桓送文如師氏歸里寒林小鳥尚嚶嚶獨向東城為送行思逐回風悲落葉夢驚流水作寒聲髙齋有意還遲月短棹無心復計程分手淚傾南北恨孤帆杳杳夕陽橫酬徐姊鄭夫人已知彤管寄情賖金縷珊珊改絳紗隱几尚傳康伯母下帷猶似謝公家桃笙乍轉湘波動灌樹初殷海燕斜翡翠筆牀空作賦輸君相贈有瓊華上已分韻解禊回流蘸逺峰香車碾破緑蒙茸三眠栁下紅牙按四照花邊錦帳重連騎自從金谷遇泛觴疑得酒泉封遙知刻燭揮銀管漏短春深不似冬西泠間咏澄江回抱古城斜一片煙雲接永嘉為愛好山聊住足偶依髙樹便成家湖光瀲灎侵行笈竹影參差帶落花聞道故人將卜隱短衣雙挽鹿門車宫詞宫漏沉沉緩箭流行雲不下殿西頭平明試卷珠簾看陳陳飛紅入御溝洞庭道人趙昭昭字子惠吳郡寒山隱君女祖母陸卿子母文端容俱擅詞翰之席子惠能嗣其美適平湖文學馬仲子班性好煙霞嘗葛衫椎髻自擬道民仲子強之不克會仲子父難破家子惠遂入空門更號德隱結庵于洞庭西山中香林匿影二十餘年亦吳越間一奇女子也有侣雲居遺藁新秋晚眺山中多晚涼清風厲秋節遙瞻四五峰壁立皆奇絶修竹傍林開喬松倚巖列黃菊散芳叢清泉凝白雪對此懷素心千里共明月願保幽貞姿歲寒雙皎潔雨中得家信寄答寂寂空庭雨始自東南隅飛鳥銜書來徘徊顧我廬故巢今尚在新燕誰與居願子念幽獨中道盼回車我心固匪石君意今何如種竹歌南山南北山北其中有竹人不識托根數莖臨嚴霜虛心願並幽溪柏秋深草木零落盡此竹亭亭終不易贈琴如閔夫人曉日下粧閣春風動繡幃侍兒調百舌夫壻畫雙眉舊製芳蘭佩新裁粉荔詩栁花初入咏撫景步遲遲冬日感懷獨坐淚沾衣天涯信未歸幽琴鳴轉寂孤梗斷何依越水雲俱冷吳山雁不飛空庭杉影亂喚婢掩柴扉春日泣懷先慈蘭閨儀範草年餘德耀神葩玉不如坐帳每教吟五字遣奩親自繪雙魚最憐辛苦懷蘭佩猶憶提㩦載鹿車風木有情腸欲斷夢中空自學牽裾當湖文園聞巳填茂草慰外君遙望殘陽落故墟更傳烽火遍州閭緑沉渭畝臨溪竹香散文園滿架書釣艇蒼茫浮少伯琴臺寂寞憶相如多君腹笥依然在詞賦翩翻好似初祀寒山先墓一天風雨倍傷離回首寒泉曲澗西伯道祠邊猿獨唳中郎墓上鳥空啼塵飛臺閣書還在雪壓松筠鶴自棲從此素絲憑世染漫憐志與白雲齊乙酉孟秋兵亂登髙望長水水長人未歸遙憐弄珠女不學九嶷妃皆令黃夫人過寓山閨即事吟得新詩子夜殘銀缸點點照花欄須臾小婢來相報深竹烏啼月滿灘早春次端文舅父韻山中久雨春將半樓外啼鶯日巳斜㩦尊自向蒼苔坐為惜枝頭殘杏花洞庭一粟菴咏梅玉女茅庵白布袍珊珊仙骨道風髙幽情未種曇花樹先插江梅映白毫美人眉鎖春山鬢點鴉莫將桃李鬭芳華無心去逐風流隊間向雕闌數落花氷蟾子吳朏朏號氷蟾子華亭人適嘉善曹允明王端淑曰詩多古意矯矯如千丈松艷曲二首金屋暖長春蘭階人似月但願如月圓不願如月缺贈妾紫金環遺郎白玉玦郎恩環不解妾心玉比潔採蓮曲弱桞繫遊驄叢花映嬌面郎珮紫紋囊儂從扇底見鄒姬蓮午蓮午嘉善人進士丁彥妾其繼妻吳中燕不能容入空門焚修即事初裁白夾立梧庭瘦骨徒憐病葉零酒後紅酥猶帶冷三三五五見疏星彭琬琬字玉映海鹽人進士期生妹浙江總兵馬孟驊媳與妹琰稱雙璧王端淑曰琬詩巧慧俊冷不作淺浮小語懷王辰若夫人湖上煙生碧樹枝柴扉晝掩落花時何當得覩雙文貌堪羡擎來道藴詩曲徑茶香留夜月朱欄鳥下看圍棋三春風雨愁深淺病骨支離無限思彭琰琰字幼玉琬妹適文學朱化鵬詩不多見而名句絡繹王端淑稱其才情兩足似勝姊氏姊惟幽艷妹則英特而博大矣懷王辰若夫人碧草萋迷接桞枝匆匆良晤夕陽時纎眉畫就春山色素紙裁成白雪詩風送花香沾去袂鳥啼竹徑冷殘棋歸來靜掩間庭月欲向清光寄所思病春半簾垂桞夕陽斜香冷間忩日更賖莫道朝來不憔悴撩人偏恨牡丹花周慧貞慧貞字挹芳吳江人嘉興孝廉黃婷之室早夭沈宛君為之作傳王端淑曰挹芳與孟畹柔嘉鼎足三分為一時之勝七夕雙星暗度巧雲飛玉漏聲殘月正西秋思不堪傷獨立數竿風竹小忩低王氏王氏嘉興人王端淑曰鬆雋不凡可與言詩春日晝長門靜掩愁病自應憐倦繡頻餘錦焚香數爇錢護花嫌蝶舞聞桞愛鶯眠偶到樓頭望春光半巳還王湘貞湘貞嘉興兵部侍郎張天植之妾張被逮王同衆妾史蘭若章蘇淑裂帛作小楷寄張以死今存王詩一首臨終詩自入君門乍幾年今朝賫志下黃泉倘然女侣相呼問同是前生未了緣顔畹思畹思字宛在桐鄉人王端淑曰蒼老靈異識度𢎞逺洗去近日蹊徑題墻上薔薇小院隂隂晝漸長一枝掩映似窺墻忩籠白日分紅艷葉鎖輕煙漾碧光半面偶憐香自逺全身何處影能藏誰家錦帳遮春住莫放東風逐路傍顔佩芳佩芳字芳在桐鄉人王端淑曰一氣雄壯出人意外而靈警之句滿幅孝嘉姪過豫併詒以詩同和年來蹤迹各西東乍見翻疑是夢中愧我能裁謝氏絮喜君不墮庾家風千秋事業還憑立數載離情得暫同正沸爐聲歸棹促一番聚散苦匆匆袁瑞英瑞英字素如嘉興人見西湖唱和詩集傅園傷心不敢上髙樓滿目關山使妾愁腸斷意中人去後鵾絃斜整淚先流宋娟娟杭州人以亂被掠至清風店題詩于壁後歸嘉善曹太史王端淑曰哀憤似蔡琰而情思纒綿題清風店妾命如朔風飄然振落葉不入郎羅幃乃逐塵沙陌妾本良家兒流落平康劫十三工秦筝十五好筆墨武林遇公子知心不徒悅忽爾天地崩干戈作長别朔雪戰寒風皴肌冷如鐵誰謂文姬哀猶得過漢闕誰謂明妃怨猶能封馬鬛而我薄命妾終當染鋒血胡不即就死心為公子結公子爾多情豈忘西湖月公子爾多智豈不諒我節公子爾任俠忍妾委虎穴公子爾多交交豈無豪傑媒妁扇上詩顛沛不忍撇忍死一相待悲酸難再説又聞洞山方風流當世杰爾既善顧郎何不一救妾徐簡簡字文漪嘉興人新安吳于庭副室吳遊粵留文漪於吳門或曰後歸楊中翰著有香夢居集王端淑曰其詩輕清宛轉無一率筆和元微之生春詩何處生春早春生錦幔中香吹金篆火夢警玉鈎風緑髻堆鬟膩紅酥壓酒融小忩遐日照花影隔紗叢宫詞三首看春偶立幔亭東天語呼名內殿中敕與司香薰雀尾御衣旋覆象牙籠紅樓昨夜醉春懷玉導當場勝賭牌却被簾鈎輕觸損聖恩重賜九鸞叉沉香亭子玉勾欄植遍名花按月看第一莫栽紅芍藥此花開日又春殘吳氏吳氏嘉興人銓部某之女才色俱絶以所配非偶不自檢束致訟後流寓金陵舟中一泓秋水浸羅衣月色依舟淚滿幃皓魄不隨風落去空留怨骨伴郎歸吳芳吳芳秀水人吏部吳竹亭女適同邑徐然然字撫辰寄逺東風吹就雨廉纎殘夜無言且獨眠翠髻未偏羅帳冷欲憑清夢到君邊沈夫人珵珵字未男嘉善人順治已丑進士工部主事丁彥元配彥妾鄒蓮午亦能詩相繼早沒繼娶吳中燕嘉興人頗解文義性髙寒放迹山水以終王端淑謂珵詩刻畫入情處直令物無遁形雖少陵復起不能過也即事二首山蕚紛紛出槿紅月忩有句向文同鴛鴦錦下支機石可是相如軫上逢睡起春慵拂曉颸攪人幽夢是黃鸝一竿犢鼻隨南阮何事綿綿催畫眉錢涓涓字褧文平湖人薛吏部振猷媳有抱雪吟一卷自為序山雨晚結隂雲日不輝𩅰𩅰雨透濕羅衣忩前萬緑渾如洗坐看巒煙夾岫飛虞美人歌楚歌四面起項王兵敗兮項王敗矣虞何為死王劒兮魂相隨長夢應憐歌舞宴月明從此照空帷堪嘆八千子弟也終無一箇揮戈者玉顔飛血逐東風化作年年淮草紅入春常帶傷心雨至今猶自泣重瞳施璲昭璲昭廣文施鋐女平湖人適文學沈炳孚早年夭卒有詩一卷未刻獨坐見月蕭蕭夜色涼小院驚佳節病骨不禁風垂簾待秋月春日送姊分手河橋淚滿衣渭城三唱落花飛那堪堤畔無情栁搖揚東風送客歸秋日颯颯悲風吹雁聲竹忩寒月露華清殘燈挑盡愁無寐被冷香消漏四更秋閨二首滿院梧桐帶翠凋竹忩疏雨濕芭蕉西風吹遍空閨冷縷縷殘香尚未消雨過幽庭濕翠微新涼初覺懶添衣慵拈針線悲秋咏幾向西風怨落暉早梅點點寒霜飄未盡朝來忽見數枝開東皇豈解愁人意先使庭梅報信來清明懶捲珠簾看燕飛愁魂化蝶杳難依清明情緒都蕭索煬帝堤邊栁不肥暮春囑病感汝誤憐不見别想因錯認作休文如今但願隨春去風舞楊花欲送君馬福娥福娥名家女適禾人沈宏略所居之室扁曰蘭齋因以為號詩名斷叉集里人王庭俞汝言序之喜雨曉起日猶赤雲低雨驟來枯池重積水老石更生苔農務多時苦天心此日回緑忩無一事蕉影亦悠哉春霽偶成微日初開涼氣清強扶病起怯徐行階前嫩草籠煙睡簾外新花帶雨迎雲淡晴光浮碧綴風搖葉色半忩明爐香茗汁時相得頻聽黃鸝樹底聲暮春病起柬姑母陸夫人庭砌蕭疏細草勻韶華病起惜殘春一籬菜暖粘花蝶幾片花飄上繡茵少婦閨中粧似舊垂楊陌上緑還新封侯自古良非易不厭詩書夫壻貧人日病卧晴光轉處盡知春多病依然此一身塵世久知家是客年華又見日為人愁看曲裏梅花落驚對庭前彩勝新沉水香殘茶汁冷薄寒無那透重茵春懷日暖間庭草色明傷春綺閣伴茶鐺吹簫自作秦樓想咏絮羞傳謝女名睡裏花香遲蝶夢靜中忩紙聽蜂聲曰歸惆悵跂豫望却羡翩翩燕羽輕早春見梅未辦探花屐前忩曉忽開春風不相待飛送暗香來中秋夜戲贈鄰女桂子當天落朱門對户開容如春正好人向月中來雪珠乍聽披簷響俄驚繞砌圓明珠如有意留作掌中看惜春何處堪惆悵紅殘雨後春一雙衣袖濕知是折花人漫興風吹滿樹葉蕭蕭睡起珠簾影動搖却怪深閨天易晚藥爐煙重濕芭蕉雨鬘道人陸觀蓮觀蓮字少君别號雨鬘道人嘉善石輝里人也適桐廬殳山人丹生山人初居吳之專諸塔右後隱震澤之西村草屋蕭蕭煙火時絶惟與道人唱和比舍聞歡笑聲則道人詩成山人擊節而歌林烏栖宿皆驚起子訥女默道人恆授書焉山人有詩曰室中有髙士十年樂飢虛又曰憐渠最幼小獻歲解吟詩蓋自詡也復移住嘉興盛澤三年最後以避水患隱嘉善蔣湖之西園亦三年康熙丁未山人將擕家入九峰道人忽病而逝又三日女默亦逝山人當秋風蕭瑟中夢女為言大人頃在舊隱病兒日進湯藥又夢道人言我母女以好禮斗持佛號蒙紫府收録更名女曰瓊真與羣仙遊也道人自集其近詩曰蔣湖寓園草吳江顧有孝為序而題之曰殳氏閨隱集并附其女默之作焉蔣湖寓園對月并序夫觀千劒者能劒觀千賦者能賦服習衆神豈不然哉余少依姆師僅通章句長隨夫子遂曉詩篇柳下栖遲未見薦禽之客隆中髙卧誰為友葛之人以是同梁生之出關深慙德曜異少伯之辭越不羡夷光長與蠧簡為親蕭條三徑獨向藝編為伴離别經年兒既能文女亦識字厯冬夏以靡輟慣飢寒而不啼既而遊子來歸不殊師友之對時有髙人造訪實多贈答之辭稍知工拙之分略窺正變之則荏苒數載常如不繫之舟留滯他鄉盡是若浮之梗昨因避水來止斯園門掩深村對琅玕之個個人歸逺浦泛雨雪之紛紛盼望故廬不逾衣帶言旋舊里終隔山河落花與芳草相依明月共清風自舉顧此幼女夙慕古人如左氏之有芬才華挺茂在荀家則為灌志略英蕤朱粉不施自是蓬門之質丹鉛能好居然林下之風以此消愁愁可知矣嗟夫篇章耽玩詎為失意之悲兒女關情不作無家之别況聞郗公築室植松桂以相招陶令卜鄰樂晨夕而不返興言在邇益復牽懷簡棄舊篇獨存新什豈徒誇謝庭咏絮蔡閣聞琴而已哉青天挂明鏡輝光照我牀展轉不能寐起坐空倣徨倣徨亦何為曰思我故鄉瓶齋舊隱處乃在茜水陽草年幾播遷渺渺天一方回思手栽樹橘柚徒含芳安得生羽翼摩天一翺翔念沈氏老姊昔聞恆山鳥四海各分飛念我同生子四女相因依辛苦效反哺力盡心亦微仲姊久長逝淚落不可揮所遺我三人戀母願空違伯也失所天忍死鞠孤兒兒年近四十與婦同分離煢煢一孫女遣嫁時來歸上堂問祖母終朝無苦飢嗟豫季與叔相見時亦稀撫琴彈此曲此曲聲殊悲寶劒篇贈外吁咄哉荆卿劒術既不成雖有寶劒徒空名千年黯黯閉秋水雙匣渺渺埋龍精狐狸夜號風雨惡蛟螭晝舞波濤驚我持此劒若明月衆星朗朗隨其行又持此劒若白日羣妖退走欃槍平欃槍平衆星沒送君贈君君莫惑古來遇合自有時神物出處當知之辰山步虛詞鬱蕭宴罷列仙歸彩鳯青鸞各自飛敕賜珍珠三百斛滿身瓔珞繞天衣焚香讀道書口占紅忩花影自紛紛一卷常持氷雪文却憶夜深禮斗罷彩雲遙送小茅君墨姑殳默默字齋季小字墨姑嘉善殳丹生山人之女母曰陸少君姑生而奇慧九歲能詩山人有元旦家集聨句姑首唱焉山人好遊獨姑與母居詩益工凡刺繡刀尺無不入妙習小楷摹畫李龍眠白描大士年十六未字母死三日姑亦卒姑容貌端麗聲影不出愛管夫人畫竹一幅與同卧起并玩好文石子十許枚小白瓷罌二器凡零香斷墨殘繪剩繡山人悉內之棺其自跋詩卷云默三歲飄零從二親于外郡十年夢想思一返於故園蔣湖以避水而來舊廬若望洋而止老母倚北堂而興嘆中夜挾寶瑟以長吟非無慰藉之詞實多於邑之調晨忩乍啓琉璃之硯匣自隨夕幄徒薰翡翠之筆牀不去以是長見笑於鄰女不解看花或貽誚於閨人何知鬭草情繇此遣緒以此深矣駕言當秋㩦家渡泖攬九峰之奇勝髣佛金庭專一壑之幽間飄颻雲嶠精瓊爢而延佇齊玉軑以上馳曰父曰兄尋采藥之赤松旦暮可遇為母為女盼傳書之青鳥閨閣非遙爰奉命于慈闈篇分甲乙冀流輝於彤管字辨宫商庶幾染翰而成不須石墨含毫以待有取香茅和母寶劒篇贈兄牀頭夜半雙龍吼光攝羣妖暗星斗風雨霹靂一瞬間木拔沙飛石亂走古來神物太平常遭時遇主生晶光拂拭霜花將解贈時無烈士空倣徨空倣徨莫太息木蘭唧唧當户織阿兄少年射白額歸來摩挲看太白憶震澤西村忽忽難忘處西村明月中荷花低拂露菱葉靜含風煙火經旬斷音書隔歲通茅堂知在否應有白雲封辰山步虛詞閶闔初開黃道邊鳴鐘伐鼓會羣仙多緣誤折瓊枝樹謫下瑶臺十五年彭孫婧孫婧字孌如海鹽人錦縣令陳龍孫配彭孫遹姊有盤城遊草夜聞絃索寒缸桃盡已三更何處歌聲惱客情殘月紙忩眠不穩照人離恨太分明濟寧月夜丹楓兩岸夾長隄滿目征帆夜不迷千里關河同此夜數聲柔櫓過前溪琅琊女子王夢鸞夢鸞字仙御桐鄉人偶興山中古木葉還清山下漁舟釣晚汀夜靜月明人不見自家歌與自家聽姑蘇楊栁枝詞二首家住橫塘春復秋門前楊桞數株柔畫欄長是周遭護不遣行人繫紫騮桞條風靜雨初收更罷羅衣懶上樓花下欲將新月拜一鈎恰到緑梢頭琅琊小女王夢鸞之妹小字仙駕姑蘇楊桞枝詞二首絲絲低罥石欄干擬向階前折取看臨舉玉纎猶障袖吹花風起覺添寒交枝楊桞映重門樹色濛濛帶雨痕繡幕不開人欲倦只疑深閣易黃昏姥峰鸚女陸言豫婦陸孺人閣學雅坪公長女也年十七歸豫連遭先父母喪承敬執勞靡有倦節繼以羣侮交作孤苦煢煢豫唯占畢下帷孺人亦有卧薪嘗膽之槩焉逮生齒日繁家道中落豫復奮䇿入都朋遊日盛孺人縮食減衣而勿傷大體以是得不困其訓子女慈而能整御婢僕肅而有恩鏤剪針織罔勿精工稍嫻文墨以非婦道之常偶吟而巳乙亥十一月病作自言必死凡家事手撥口囑無一遺失危坐而逝若有道者先是癸酉豫宿天姥峰下夢一嫗曰汝前身白鶴童子汝婦則緑鸚仙也遂占一詩曰偕隱何年志頗同前身忘却俗緣中夜來天姥渾猜著是緑鸚仙白鶴童因名言字鸚仙云夜遊虎丘賞心一片石秉燭我來遊月黑松無影苔青露欲流斸雲新石斷飛鍚舊泉留桞色將舒翠帆開憶虎丘哭鹿女握珠入海杳難尋痛極渾如萬鏃侵覆翼六年成曉露埋香一夢委秋衾風翻落葉依新冢月照歸鴉認舊林追憶膝前歡笑處兩行血淚濕羅襟京邸傷母新厝東湖别墅年來顧影暗傷神花月難留去住身痛我先凋萱樹早怕人細誦蓼莪頻望雲何盡天涯路戲綵難娛昶下親佳節每逢垂血淚因風遙灑弄珠津咏丁香小院沉沉欲暮天間階獨步影娟娟驚看密葉添青色却愛繁花吐紫煙拂檻叢叢疑線綰映簾蔌蔌借絲纒愁心欲訴花先結可惜重來二十年秋日遊金鼇玉蝀九鈴殿宇倚青霄碧樹紅亭白玉橋我欲一帆歸去也御河波靜不通潮檇李詩繫卷三十五
